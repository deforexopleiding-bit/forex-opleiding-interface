<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw wachtwoord instellen — De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--surface-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand-secondary);
    }

    .logo-main {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 4px;
    }

    .logo-dot {
      color: var(--brand-secondary);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--brand-secondary);
    }

    .strength-bar {
      margin-top: 6px;
      font-size: 12px;
      font-weight: 600;
      min-height: 18px;
      letter-spacing: 0.02em;
    }

    .strength-bar.weak   { color: var(--color-danger); }
    .strength-bar.medium { color: var(--color-warning); }
    .strength-bar.strong { color: var(--color-success); }

    .btn-primary {
      width: 100%;
      background: var(--brand-primary);
      color: var(--text-primary);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--brand-primary-hover);
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      background: var(--color-danger-soft);
      border: 1px solid var(--color-danger);
      border-radius: 8px;
      color: var(--color-danger);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 14px;
      text-align: center;
    }

    .error-msg.visible {
      display: block;
    }

    .success-msg {
      display: none;
      background: var(--color-success-soft);
      border: 1px solid var(--color-success);
      border-radius: 8px;
      color: var(--color-success);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 14px;
      text-align: center;
    }

    .success-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-text">De Forex Opleiding</div>
      <div class="logo-main">Dashboard<span class="logo-dot">.</span></div>
    </div>

    <!-- Mode A: token aanwezig → nieuw wachtwoord instellen -->
    <div id="modeReset">
      <h1>Nieuw wachtwoord instellen</h1>
      <p class="subtitle">Kies een sterk wachtwoord van minimaal 8 karakters.</p>
      <div class="field">
        <label for="newPassword">Nieuw wachtwoord</label>
        <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password" />
        <div class="strength-bar" id="strengthBar"></div>
      </div>
      <div class="field">
        <label for="confirmPassword">Bevestig wachtwoord</label>
        <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="saveBtn" disabled>Opslaan</button>
    </div>

    <!-- Mode B: geen token → reset-link aanvragen -->
    <div id="modeRequest" style="display:none">
      <h1>Wachtwoord vergeten?</h1>
      <p class="subtitle">Voer je e-mailadres in. Je ontvangt een nieuwe reset-link.</p>
      <div class="field">
        <label for="resetEmail">E-mailadres</label>
        <input type="email" id="resetEmail" placeholder="jouw@email.nl" autocomplete="email" />
      </div>
      <button class="btn-primary" id="requestBtn">Reset-link versturen</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>

  <script src="/modules/shared/theme-shared.js"></script>
  <script src="/modules/shared/supabase-client.js"></script>
  <script>
    (async function () {
      const newPasswordInput     = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const strengthBar          = document.getElementById('strengthBar');
      const saveBtn              = document.getElementById('saveBtn');
      const resetEmail           = document.getElementById('resetEmail');
      const requestBtn           = document.getElementById('requestBtn');
      const errorMsg             = document.getElementById('errorMsg');
      const successMsg           = document.getElementById('successMsg');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
        successMsg.classList.remove('visible');
      }
      function clearError() {
        errorMsg.classList.remove('visible');
        errorMsg.textContent = '';
      }

      function getStrength(pw) {
        if (pw.length === 0) return null;
        if (pw.length < 8) return 'weak';
        const hasDigitOrSpecial = /[0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);
        return (pw.length >= 12 && hasDigitOrSpecial) ? 'strong' : 'medium';
      }

      newPasswordInput.addEventListener('input', function () {
        const s = getStrength(this.value);
        strengthBar.className = 'strength-bar';
        if (s === 'weak')   { strengthBar.textContent = 'Zwak';  strengthBar.classList.add('weak'); }
        else if (s === 'medium') { strengthBar.textContent = 'Matig'; strengthBar.classList.add('medium'); }
        else if (s === 'strong') { strengthBar.textContent = 'Sterk'; strengthBar.classList.add('strong'); }
        else { strengthBar.textContent = ''; }
        updateSaveBtn(); clearError();
      });
      confirmPasswordInput.addEventListener('input', function () { updateSaveBtn(); clearError(); });

      function updateSaveBtn() {
        saveBtn.disabled = newPasswordInput.value.length < 8 || confirmPasswordInput.value.length === 0;
      }

      // Mode detectie: Supabase zet access_token + type=recovery in URL hash na reset-link klik
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const isRecovery = hash.get('type') === 'recovery' && !!hash.get('access_token');

      if (isRecovery) {
        document.getElementById('modeReset').style.display = '';
        document.getElementById('modeRequest').style.display = 'none';
        await initResetMode();
      } else {
        document.getElementById('modeReset').style.display = 'none';
        document.getElementById('modeRequest').style.display = '';
        initRequestMode();
      }

      async function initResetMode() {
        await window._authSharedReady;
        await new Promise(r => setTimeout(r, 600));
        const { data: { session } } = await window.supabase.auth.getSession();
        if (!session) {
          document.getElementById('modeReset').style.display = 'none';
          document.getElementById('modeRequest').style.display = '';
          showError('Je reset-link is verlopen. Vraag een nieuwe aan.');
          return;
        }
        saveBtn.disabled = false;
        updateSaveBtn();
      }

      function initRequestMode() {
        requestBtn.addEventListener('click', async function () {
          clearError();
          const email = resetEmail.value.trim();
          if (!email) { showError('Voer een e-mailadres in'); return; }
          requestBtn.disabled = true;
          requestBtn.textContent = 'Versturen…';
          await window._authSharedReady;
          const { error } = await window.supabase.auth.resetPasswordForEmail(email, {
            redirectTo: window.location.origin + '/reset-password.html'
          });
          if (!error) {
            successMsg.textContent = 'Check je e-mail voor de reset-link.';
            successMsg.classList.add('visible');
            requestBtn.textContent = 'Verstuurd';
          } else {
            showError(error.message || 'Er is een fout opgetreden. Probeer opnieuw.');
            requestBtn.disabled = false;
            requestBtn.textContent = 'Reset-link versturen';
          }
        });
      }

      saveBtn.addEventListener('click', async function () {
        clearError();
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;
        if (newPassword !== confirmPassword) { showError('Wachtwoorden komen niet overeen'); return; }
        if (newPassword.length < 8) { showError('Minimaal 8 karakters vereist'); return; }
        saveBtn.disabled = true;
        saveBtn.textContent = 'Opslaan…';
        const { error } = await window.supabase.auth.updateUser({ password: newPassword });
        if (!error) {
          successMsg.textContent = 'Wachtwoord opgeslagen! Je wordt doorgestuurd…';
          successMsg.classList.add('visible');
          setTimeout(() => { window.location.href = '/login.html?reset=success'; }, 1500);
        } else {
          showError(error.message || 'Er is een fout opgetreden. Probeer opnieuw.');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Opslaan';
        }
      });
    })();
  </script>
</body>
</html>
