<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw wachtwoord instellen — De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-primary: #093d54;
      --brand-secondary: #688b9b;
      --bg-dark: #0a0b10;
      --card-bg: #12151e;
      --border-color: rgba(104, 139, 155, 0.18);
      --text-primary: #e8edf2;
      --text-muted: #8899a8;
      --input-bg: #0e1119;
      --error-color: #e05555;
      --warning-color: #e0a832;
      --success-color: #3db87a;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--brand-secondary);
    }

    .logo-main {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      margin-top: 4px;
    }

    .logo-dot {
      color: var(--brand-secondary);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="password"] {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="password"]:focus {
      border-color: var(--brand-secondary);
    }

    .strength-bar {
      margin-top: 6px;
      font-size: 12px;
      font-weight: 600;
      min-height: 18px;
      letter-spacing: 0.02em;
    }

    .strength-bar.weak   { color: var(--error-color); }
    .strength-bar.medium { color: var(--warning-color); }
    .strength-bar.strong { color: var(--success-color); }

    .btn-primary {
      width: 100%;
      background: var(--brand-primary);
      color: var(--text-primary);
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-primary:hover:not(:disabled) {
      background: #0d5070;
    }

    .btn-primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .error-msg {
      display: none;
      background: rgba(224, 85, 85, 0.1);
      border: 1px solid rgba(224, 85, 85, 0.35);
      border-radius: 8px;
      color: var(--error-color);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 14px;
      text-align: center;
    }

    .error-msg.visible {
      display: block;
    }

    .success-msg {
      display: none;
      background: rgba(61, 184, 122, 0.1);
      border: 1px solid rgba(61, 184, 122, 0.3);
      border-radius: 8px;
      color: var(--success-color);
      font-size: 13px;
      padding: 10px 14px;
      margin-top: 14px;
      text-align: center;
    }

    .success-msg.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <div class="logo-text">De Forex Opleiding</div>
      <div class="logo-main">Dashboard<span class="logo-dot">.</span></div>
    </div>

    <h1>Nieuw wachtwoord instellen</h1>
    <p class="subtitle">Kies een sterk wachtwoord van minimaal 8 karakters.</p>

    <div class="field">
      <label for="newPassword">Nieuw wachtwoord</label>
      <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password" />
      <div class="strength-bar" id="strengthBar"></div>
    </div>

    <div class="field">
      <label for="confirmPassword">Bevestig wachtwoord</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <button class="btn-primary" id="saveBtn" disabled>Opslaan</button>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">Wachtwoord opgeslagen! Je wordt doorgestuurd…</div>
  </div>

  <script src="/modules/shared/supabase-client.js"></script>
  <script>
    (function () {
      const newPasswordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const strengthBar = document.getElementById('strengthBar');
      const saveBtn = document.getElementById('saveBtn');
      const errorMsg = document.getElementById('errorMsg');
      const successMsg = document.getElementById('successMsg');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('visible');
        successMsg.classList.remove('visible');
      }

      function clearError() {
        errorMsg.classList.remove('visible');
        errorMsg.textContent = '';
      }

      function getStrength(pw) {
        if (pw.length === 0) return null;
        if (pw.length < 8) return 'weak';
        const hasDigitOrSpecial = /[0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw);
        if (pw.length >= 12 && hasDigitOrSpecial) return 'strong';
        return 'medium';
      }

      newPasswordInput.addEventListener('input', function () {
        const strength = getStrength(this.value);
        strengthBar.className = 'strength-bar';
        if (strength === 'weak') {
          strengthBar.textContent = 'Zwak';
          strengthBar.classList.add('weak');
        } else if (strength === 'medium') {
          strengthBar.textContent = 'Matig';
          strengthBar.classList.add('medium');
        } else if (strength === 'strong') {
          strengthBar.textContent = 'Sterk';
          strengthBar.classList.add('strong');
        } else {
          strengthBar.textContent = '';
        }
        updateSaveBtn();
        clearError();
      });

      confirmPasswordInput.addEventListener('input', function () {
        updateSaveBtn();
        clearError();
      });

      function updateSaveBtn() {
        const pw = newPasswordInput.value;
        const confirm = confirmPasswordInput.value;
        saveBtn.disabled = pw.length < 8 || confirm.length === 0;
      }

      async function init() {
        await new Promise(r => setTimeout(r, 800));
        const { data: { session } } = await window.supabase.auth.getSession();
        if (!session) {
          window.location.href = '/login.html?error=callback_failed';
          return;
        }
        saveBtn.disabled = false;
        updateSaveBtn();
      }

      saveBtn.addEventListener('click', async function () {
        clearError();
        const newPassword = newPasswordInput.value;
        const confirmPassword = confirmPasswordInput.value;

        if (newPassword !== confirmPassword) {
          showError('Wachtwoorden komen niet overeen');
          return;
        }
        if (newPassword.length < 8) {
          showError('Minimaal 8 karakters vereist');
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'Opslaan…';

        const { error } = await window.supabase.auth.updateUser({ password: newPassword });
        if (!error) {
          successMsg.classList.add('visible');
          setTimeout(() => {
            window.location.href = '/login.html?reset=success';
          }, 1500);
        } else {
          showError(error.message || 'Er is een fout opgetreden. Probeer opnieuw.');
          saveBtn.disabled = false;
          saveBtn.textContent = 'Opslaan';
        }
      });

      function waitForAuth() {
        if (window._authSharedReady) {
          init();
        } else {
          window.addEventListener('authSharedReady', init, { once: true });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', waitForAuth);
      } else {
        waitForAuth();
      }
    })();
  </script>
</body>
</html>
