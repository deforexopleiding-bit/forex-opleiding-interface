<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kennisbank · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <!-- marked.js (markdown → HTML, lichtgewicht) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafafa; --bg-elev: #ffffff; --bg-elev-2: #f8fafc;
      --text: #0f172a; --text-dim: #475569; --text-faint: #94a3b8;
      --border: #e5e7eb; --border-strong: #d1d5db;
      --accent: #093d54; --accent-2: #688b9b;
      --accent-cyan: #2563eb; --accent-violet: #6d28d9;
      --green: #059669; --amber: #d97706; --red: #dc2626;
      --nav-item-hover: rgba(0,0,0,0.04);
    }
    [data-theme="dark"] {
      --bg: #0a0b10; --bg-elev: #13151c; --bg-elev-2: #181b25;
      --text: rgba(255,255,255,0.95); --text-dim: rgba(255,255,255,0.72); --text-faint: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
      --accent-cyan: #22d3ee; --accent-violet: #c4b5fd;
      --green: #10b981; --amber: #f59e0b; --red: #ef4444;
      --nav-item-hover: rgba(255,255,255,0.05);
    }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app {
      margin-left: 220px;
      height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr 460px;
      gap: 0;
      overflow: hidden;
    }
    .kb-col { overflow-y: auto; border-right: 1px solid var(--border); }
    .kb-col:last-child { border-right: none; }
    .kb-col-pad { padding: 18px 16px; }

    /* ── Sidebar (col 1) ── */
    .kb-side h2 { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
    .kb-side-section {
      font-size: 10px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-faint);
      margin: 16px 0 6px;
    }
    .kb-bucket {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      color: var(--text-dim);
      transition: background .15s;
    }
    .kb-bucket:hover { background: var(--nav-item-hover); color: var(--text); }
    .kb-bucket.active { background: var(--bg-elev-2); color: var(--text); font-weight: 600; }
    .kb-bucket .name { flex: 1; }
    .kb-bucket .count {
      background: var(--bg-elev-2);
      color: var(--text-faint);
      font-size: 11px; font-weight: 600;
      padding: 1px 7px; border-radius: 10px;
    }
    .kb-bucket.active .count { background: var(--accent); color: #fff; }

    /* ── List (col 2) ── */
    .kb-list { background: var(--bg-elev); }
    .kb-list-toolbar {
      position: sticky; top: 0; z-index: 5;
      padding: 14px 16px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      flex-wrap: wrap;
    }
    .kb-search {
      flex: 1; min-width: 200px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font: inherit; font-size: 13px;
      outline: none;
    }
    .kb-search:focus { border-color: var(--accent-2); }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; cursor: pointer; font: inherit;
      font-size: 12px; font-weight: 600;
    }
    .btn:hover { opacity: .9; }
    .btn-ghost {
      background: var(--bg-elev); color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg-elev-2); color: var(--text); }
    .btn-danger { background: var(--red); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }

    .kb-item-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
    }
    .kb-item-card:hover { background: var(--bg-elev-2); }
    .kb-item-card.selected { background: var(--bg-elev-2); border-left: 3px solid var(--accent); }
    .kb-item-title { font-size: 13.5px; font-weight: 600; line-height: 1.3; margin-bottom: 4px; color: var(--text); }
    .kb-item-meta { font-size: 11px; color: var(--text-faint); display: flex; gap: 10px; align-items: center; }
    .kb-item-preview { font-size: 12px; color: var(--text-dim); margin-top: 5px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .agent-pill {
      display: inline-block;
      padding: 1px 7px; border-radius: 8px;
      font-size: 10px; font-weight: 600;
      background: var(--bg-elev-2); color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .agent-pill.simon  { background: rgba(34,211,238,0.12); color: #0891b2; border-color: rgba(34,211,238,0.3); }
    .agent-pill.lisa   { background: rgba(244,114,182,0.12); color: #be185d; border-color: rgba(244,114,182,0.3); }
    .agent-pill.leon   { background: rgba(168,85,247,0.12); color: #6d28d9; border-color: rgba(168,85,247,0.3); }
    .agent-pill.aron   { background: rgba(245,158,11,0.12); color: #a16207; border-color: rgba(245,158,11,0.3); }
    .agent-pill.shared { background: rgba(5,150,105,0.12); color: #059669; border-color: rgba(5,150,105,0.3); }
    .agent-pill.profile { background: var(--accent); color: #fff; border-color: var(--accent); }

    .kb-empty { padding: 40px 16px; text-align: center; color: var(--text-faint); font-size: 13px; }

    /* ── Detail (col 3) ── */
    .kb-detail { background: var(--bg); }
    .kb-detail-empty {
      height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: var(--text-faint); font-size: 13px; padding: 40px;
      text-align: center;
    }
    .kb-detail-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-elev);
      display: flex; align-items: center; gap: 8px;
    }
    .kb-detail-head .title { flex: 1; font-size: 15px; font-weight: 700; }
    .kb-detail-body { padding: 20px; }
    .kb-detail-content {
      font-size: 13.5px; line-height: 1.6; color: var(--text);
    }
    .kb-detail-content h1, .kb-detail-content h2, .kb-detail-content h3 { font-weight: 700; margin: 1em 0 .4em; }
    .kb-detail-content h1 { font-size: 18px; }
    .kb-detail-content h2 { font-size: 16px; }
    .kb-detail-content h3 { font-size: 14px; }
    .kb-detail-content p { margin-bottom: .6em; }
    .kb-detail-content ul, .kb-detail-content ol { padding-left: 22px; margin-bottom: .6em; }
    .kb-detail-content code { background: var(--bg-elev-2); padding: 1px 5px; border-radius: 4px; font-family: 'Menlo', monospace; font-size: 12px; }
    .kb-detail-content pre { background: var(--bg-elev-2); padding: 10px 12px; border-radius: 6px; overflow-x: auto; margin-bottom: .6em; }
    .kb-detail-content pre code { background: transparent; padding: 0; }
    .kb-detail-content blockquote { border-left: 3px solid var(--border-strong); padding-left: 10px; color: var(--text-dim); margin-bottom: .6em; }
    .kb-detail-content a { color: var(--accent-cyan); text-decoration: underline; }

    .kb-meta-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      margin-top: 18px;
    }
    .kb-meta-cell .label { font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .kb-meta-cell .value { font-size: 13px; margin-top: 3px; color: var(--text); }

    .kb-agent-toggles {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 4px;
    }
    .agent-toggle {
      cursor: pointer; user-select: none;
      padding: 4px 10px; border-radius: 14px;
      font-size: 11px; font-weight: 600;
      background: var(--bg-elev-2); color: var(--text-faint);
      border: 1px solid var(--border);
      transition: all .12s;
    }
    .agent-toggle:hover { color: var(--text); }
    .agent-toggle.on { background: var(--accent); color: #fff; border-color: var(--accent); }
    .agent-toggle.disabled { opacity: .5; cursor: not-allowed; }

    /* ── Edit-mode (split-view) ── */
    .kb-edit-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
      height: calc(100vh - 200px);
    }
    .kb-edit-pane {
      display: flex; flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .kb-edit-pane-head {
      padding: 6px 10px;
      font-size: 10px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: var(--text-faint);
      background: var(--bg-elev-2);
      border-bottom: 1px solid var(--border);
    }
    .kb-edit-textarea {
      flex: 1; width: 100%;
      padding: 12px;
      border: none; outline: none;
      background: var(--bg-elev);
      color: var(--text);
      font-family: 'Menlo', monospace; font-size: 13px;
      line-height: 1.5;
      resize: none;
    }
    .kb-edit-preview {
      flex: 1; padding: 14px;
      overflow-y: auto;
      background: var(--bg-elev);
      font-size: 13.5px; line-height: 1.6;
    }
    .kb-edit-title-input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-elev);
      color: var(--text);
      font: inherit; font-size: 15px; font-weight: 600;
      outline: none; margin-bottom: 14px;
    }
    .kb-edit-title-input:focus { border-color: var(--accent-2); }
    .kb-edit-actions {
      display: flex; gap: 8px; justify-content: flex-end;
      padding: 12px 0 0;
      border-top: 1px solid var(--border);
      margin-top: 12px;
    }

    /* ── Versie-modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: none; z-index: 1000;
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .modal-overlay.show { display: flex; }
    .modal-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%; max-width: 720px;
      max-height: 80vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-head {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-head .title { font-size: 15px; font-weight: 700; }
    .modal-close {
      background: none; border: none;
      font-size: 22px; line-height: 1; color: var(--text-faint);
      cursor: pointer; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
    .version-row {
      padding: 10px 12px;
      border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 8px;
    }
    .version-row .row-head {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--text-faint); margin-bottom: 5px;
    }
    .version-row .row-title { font-size: 13px; font-weight: 600; }
    .version-row .row-preview {
      font-size: 12px; color: var(--text-dim);
      max-height: 40px; overflow: hidden;
      margin-top: 4px;
    }
    .version-actions { margin-top: 8px; display: flex; gap: 6px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      padding: 10px 18px; border-radius: 8px;
      background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.18);
      z-index: 2000;
      opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: var(--red); }
    .toast.success { background: var(--green); }

    @media (max-width: 1280px) {
      .app { grid-template-columns: 220px 1fr 400px; }
    }
    @media (max-width: 1024px) {
      .app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; height: auto; overflow: visible; }
      .kb-col { border-right: none; border-bottom: 1px solid var(--border); max-height: 400px; }
    }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <!-- COL 1: agent-buckets -->
  <aside class="kb-col kb-side kb-col-pad" id="sideCol">
    <h2>Kennisbank</h2>
    <div class="kb-side-section">Per agent</div>
    <div id="bucketList">
      <div class="kb-bucket active" data-bucket="all"><span class="name">Alle items</span><span class="count" id="cnt-all">—</span></div>
      <div class="kb-bucket" data-bucket="profile"><span class="name">Bedrijfsprofiel</span><span class="count" id="cnt-profile">—</span></div>
      <div class="kb-bucket" data-bucket="simon"><span class="name">Simon (e-mail)</span><span class="count" id="cnt-simon">—</span></div>
      <div class="kb-bucket" data-bucket="lisa"><span class="name">Lisa (Instagram)</span><span class="count" id="cnt-lisa">—</span></div>
      <div class="kb-bucket" data-bucket="leon"><span class="name">Leon (admin)</span><span class="count" id="cnt-leon">—</span></div>
      <div class="kb-bucket" data-bucket="aron"><span class="name">Aron (finance)</span><span class="count" id="cnt-aron">—</span></div>
      <div class="kb-bucket" data-bucket="shared"><span class="name">Gedeeld</span><span class="count" id="cnt-shared">—</span></div>
    </div>
  </aside>

  <!-- COL 2: item-list -->
  <section class="kb-col kb-list">
    <div class="kb-list-toolbar">
      <input class="kb-search" id="searchInput" type="search" placeholder="Zoek titel of inhoud…" />
      <button class="btn" id="newItemBtn">+ Nieuw item</button>
    </div>
    <div id="itemList"></div>
  </section>

  <!-- COL 3: detail -->
  <aside class="kb-col kb-detail">
    <div id="detailMount">
      <div class="kb-detail-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;margin-bottom:14px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <p>Selecteer een item links om de details te zien.</p>
        <p style="margin-top:6px;font-size:11px">Of klik <strong>+ Nieuw item</strong>.</p>
      </div>
    </div>
  </aside>
</div>

<!-- Version history modal -->
<div class="modal-overlay" id="versionModal">
  <div class="modal-card">
    <div class="modal-head">
      <span class="title">Versie-historie</span>
      <button class="modal-close" id="closeVersionsBtn">&times;</button>
    </div>
    <div class="modal-body" id="versionList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════
   Kennisbank Redesign v2 — notion-style 3-col layout.
   Backend: /api/kb-items (CRUD + versions + search).
   Markdown: marked.js (CDN).
   ═══════════════════════════════════════════════════════════════════ */

const AGENT_LABELS = { simon:'Simon', lisa:'Lisa', leon:'Leon', aron:'Aron', shared:'Gedeeld' };

const state = {
  items: [],
  bucket: 'all',
  search: '',
  selectedId: null,
  editing: false,
  draft: null,   // { id?, title, content, agents:[], is_profile }
  perms: null,
};

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function toast(msg, kind) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (kind || '');
  setTimeout(() => { el.classList.remove('show'); }, 2200);
}

function can(key) {
  if (!state.perms) return true; // fail-open vóór load
  if (state.perms.has('*')) return true;
  return state.perms.has(key);
}

function renderMarkdown(text) {
  if (!text) return '<em style="color:var(--text-faint)">Geen inhoud</em>';
  try {
    if (window.marked) {
      window.marked.setOptions({ breaks: true, gfm: true });
      return window.marked.parse(text);
    }
  } catch {}
  return '<pre>' + esc(text) + '</pre>';
}

// ── Data fetching ─────────────────────────────────────────────────────
async function loadItems() {
  try {
    const res = await window.AgentShared.apiFetch('/api/kb-items');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    state.items = data.items || [];
    renderBucketCounts();
    renderItemList();
  } catch (e) {
    toast('Laden mislukt: ' + e.message, 'error');
    document.getElementById('itemList').innerHTML = '<div class="kb-empty">Laden mislukt.</div>';
  }
}

// ── Bucket counts ─────────────────────────────────────────────────────
function renderBucketCounts() {
  const c = { all: state.items.length, profile: 0, simon: 0, lisa: 0, leon: 0, aron: 0, shared: 0 };
  for (const it of state.items) {
    if (it.is_profile) c.profile++;
    const ags = it.agents || [];
    for (const a of ags) if (c[a] !== undefined) c[a]++;
  }
  for (const k of Object.keys(c)) {
    const el = document.getElementById('cnt-' + k);
    if (el) el.textContent = c[k];
  }
}

// ── List rendering ────────────────────────────────────────────────────
function filteredItems() {
  let arr = state.items.slice();
  if (state.bucket === 'profile') arr = arr.filter(i => i.is_profile);
  else if (state.bucket !== 'all') arr = arr.filter(i => (i.agents || []).includes(state.bucket));
  if (state.search) {
    const q = state.search.toLowerCase();
    arr = arr.filter(i =>
      (i.title || '').toLowerCase().includes(q) ||
      (i.content || '').toLowerCase().includes(q) ||
      (i.question || '').toLowerCase().includes(q) ||
      (i.answer || '').toLowerCase().includes(q)
    );
  }
  return arr;
}

function renderItemList() {
  const root = document.getElementById('itemList');
  const arr = filteredItems();
  if (!arr.length) {
    root.innerHTML = '<div class="kb-empty">Geen items in deze selectie.</div>';
    return;
  }
  root.innerHTML = arr.map(i => {
    const pills = i.is_profile
      ? '<span class="agent-pill profile">PROFIEL</span>'
      : (i.agents || []).map(a => `<span class="agent-pill ${esc(a)}">${esc(AGENT_LABELS[a] || a)}</span>`).join(' ');
    const preview = (i.content || i.answer || '').slice(0, 140);
    return `
      <div class="kb-item-card${state.selectedId === i.id ? ' selected' : ''}" data-id="${esc(i.id)}">
        <div class="kb-item-title">${esc(i.title || '(geen titel)')}</div>
        <div class="kb-item-meta">${pills}<span>${i.helpfulness_score ?? 0} pts</span></div>
        ${preview ? `<div class="kb-item-preview">${esc(preview)}</div>` : ''}
      </div>`;
  }).join('');
  root.querySelectorAll('.kb-item-card').forEach(el => {
    el.addEventListener('click', () => selectItem(el.dataset.id));
  });
}

// ── Detail rendering ──────────────────────────────────────────────────
function selectItem(id) {
  state.selectedId = id;
  state.editing = false;
  renderItemList(); // update .selected highlight
  renderDetail();
}

function renderDetail() {
  const mount = document.getElementById('detailMount');
  if (!state.selectedId && !state.editing) {
    mount.innerHTML = `
      <div class="kb-detail-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="opacity:.5;margin-bottom:14px"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <p>Selecteer een item links om de details te zien.</p>
      </div>`;
    return;
  }
  if (state.editing) { renderEditMode(); return; }
  const it = state.items.find(x => x.id === state.selectedId);
  if (!it) { mount.innerHTML = '<div class="kb-empty">Item niet gevonden.</div>'; return; }

  const editKey = it.is_profile ? 'kennisbank.profile.edit' : 'kennisbank.item.edit';
  const canEdit = can(editKey);
  const canDelete = can('kennisbank.item.delete');
  const agentPills = it.is_profile
    ? '<span class="agent-pill profile">PROFIEL — altijd actief</span>'
    : (it.agents || []).map(a => `<span class="agent-pill ${esc(a)}">${esc(AGENT_LABELS[a] || a)}</span>`).join(' ');

  mount.innerHTML = `
    <div class="kb-detail-head">
      <div class="title">${esc(it.title || '(geen titel)')}</div>
      <button class="btn btn-sm btn-ghost" id="historyBtn" data-tooltip="Versie-historie">⟲</button>
      ${canEdit ? '<button class="btn btn-sm" id="editBtn">Bewerken</button>' : ''}
      ${canDelete && !it.is_profile ? '<button class="btn btn-sm btn-danger" id="deleteBtn">Verwijderen</button>' : ''}
    </div>
    <div class="kb-detail-body">
      <div style="margin-bottom:14px">${agentPills}</div>
      ${it.question ? `<div style="font-weight:600;font-size:14px;margin-bottom:6px">${esc(it.question)}</div>` : ''}
      <div class="kb-detail-content">${it.answer ? renderMarkdown(it.answer) : renderMarkdown(it.content)}</div>
      <div class="kb-meta-row">
        <div class="kb-meta-cell"><div class="label">Helpfulness</div><div class="value">${it.helpfulness_score ?? 0}</div></div>
        <div class="kb-meta-cell"><div class="label">Gebruikt</div><div class="value">${it.times_used ?? 0}×</div></div>
        <div class="kb-meta-cell"><div class="label">Aangemaakt</div><div class="value">${fmtDate(it.created_at)}</div></div>
        <div class="kb-meta-cell"><div class="label">Bijgewerkt</div><div class="value">${fmtDate(it.updated_at)}</div></div>
      </div>
    </div>
  `;
  document.getElementById('historyBtn')?.addEventListener('click', () => openVersionModal(it.id));
  document.getElementById('editBtn')?.addEventListener('click', () => startEdit(it));
  document.getElementById('deleteBtn')?.addEventListener('click', () => deleteItem(it));
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── Edit-mode ─────────────────────────────────────────────────────────
function startEdit(item) {
  state.draft = {
    id:         item?.id || null,
    title:      item?.title || '',
    content:    item?.content || '',
    question:   item?.question || '',
    answer:     item?.answer || '',
    is_profile: !!item?.is_profile,
    agents:     [...(item?.agents || ['shared'])],
  };
  state.editing = true;
  renderEditMode();
}

function renderEditMode() {
  const mount = document.getElementById('detailMount');
  const d = state.draft;
  if (!d) return;
  const isNew = !d.id;
  const agentChecks = ['simon','lisa','leon','aron','shared']
    .map(a => `<span class="agent-toggle ${d.agents.includes(a) ? 'on' : ''}" data-toggle="${a}">${esc(AGENT_LABELS[a])}</span>`)
    .join('');

  mount.innerHTML = `
    <div class="kb-detail-head">
      <div class="title">${isNew ? 'Nieuw item' : 'Bewerken'}</div>
      <button class="btn btn-sm btn-ghost" id="cancelEditBtn">Annuleren</button>
      <button class="btn btn-sm" id="saveBtn">Opslaan</button>
    </div>
    <div class="kb-detail-body">
      <input class="kb-edit-title-input" id="titleInput" value="${esc(d.title)}" maxlength="200" placeholder="Titel (verplicht)" />

      <div style="margin-bottom:14px">
        <div class="label" style="font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.06em;font-weight:600;margin-bottom:6px">Zichtbaar voor agents</div>
        <div class="kb-agent-toggles">${agentChecks}</div>
        ${d.is_profile ? '<div style="margin-top:6px;font-size:11px;color:var(--text-faint)">Dit is het bedrijfsprofiel — altijd actief voor alle agents.</div>' : ''}
      </div>

      <div class="kb-edit-grid">
        <div class="kb-edit-pane">
          <div class="kb-edit-pane-head">Markdown</div>
          <textarea class="kb-edit-textarea" id="contentInput" placeholder="Schrijf hier in markdown...\n\n# Kop\n- Lijst\n**vet**, *cursief*">${esc(d.content)}</textarea>
        </div>
        <div class="kb-edit-pane">
          <div class="kb-edit-pane-head">Voorbeeld</div>
          <div class="kb-edit-preview kb-detail-content" id="previewPane">${renderMarkdown(d.content)}</div>
        </div>
      </div>
    </div>
  `;
  document.getElementById('cancelEditBtn').addEventListener('click', () => { state.editing = false; state.draft = null; renderDetail(); });
  document.getElementById('saveBtn').addEventListener('click', saveDraft);
  document.getElementById('titleInput').addEventListener('input', e => { d.title = e.target.value; });
  document.getElementById('contentInput').addEventListener('input', e => {
    d.content = e.target.value;
    document.getElementById('previewPane').innerHTML = renderMarkdown(e.target.value);
  });
  mount.querySelectorAll('[data-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      const a = el.dataset.toggle;
      const i = d.agents.indexOf(a);
      if (i >= 0) d.agents.splice(i, 1); else d.agents.push(a);
      if (d.agents.length === 0) d.agents.push('shared'); // mag niet leeg zijn
      el.classList.toggle('on');
    });
  });
}

async function saveDraft() {
  const d = state.draft;
  if (!d) return;
  const titleClean = (d.title || '').trim();
  if (!titleClean) { toast('Titel is verplicht', 'error'); return; }
  const body = JSON.stringify({
    title:      titleClean,
    content:    d.content || '',
    is_profile: d.is_profile,
    agents:     d.agents,
  });
  const url = d.id ? '/api/kb-items?id=' + encodeURIComponent(d.id) : '/api/kb-items';
  const method = d.id ? 'PUT' : 'POST';
  try {
    const res = await window.AgentShared.apiFetch(url, { method, headers: { 'Content-Type': 'application/json' }, body });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || ('HTTP ' + res.status));
    }
    const data = await res.json();
    toast(d.id ? 'Opgeslagen' : 'Aangemaakt', 'success');
    state.editing = false;
    state.draft = null;
    state.selectedId = data.item?.id || state.selectedId;
    await loadItems();
    renderDetail();
  } catch (e) {
    toast('Opslaan mislukt: ' + e.message, 'error');
  }
}

async function deleteItem(item) {
  if (!confirm(`Verwijder "${item.title}"?`)) return;
  try {
    const res = await window.AgentShared.apiFetch('/api/kb-items?id=' + encodeURIComponent(item.id), { method: 'DELETE' });
    if (!res.ok && res.status !== 204) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || ('HTTP ' + res.status));
    }
    toast('Verwijderd', 'success');
    state.selectedId = null;
    await loadItems();
    renderDetail();
  } catch (e) {
    toast('Verwijderen mislukt: ' + e.message, 'error');
  }
}

// ── Version modal ─────────────────────────────────────────────────────
async function openVersionModal(itemId) {
  const overlay = document.getElementById('versionModal');
  const list = document.getElementById('versionList');
  list.innerHTML = '<div class="kb-empty">Laden…</div>';
  overlay.classList.add('show');
  try {
    const res = await window.AgentShared.apiFetch('/api/kb-items?action=versions&id=' + encodeURIComponent(itemId));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const versions = data.versions || [];
    if (!versions.length) {
      list.innerHTML = '<div class="kb-empty">Nog geen versies — eerste bewerking maakt versie 1 aan.</div>';
      return;
    }
    list.innerHTML = versions.map(v => `
      <div class="version-row">
        <div class="row-head">
          <span>Versie ${v.version_number} · ${fmtDate(v.created_at)}${v.changed_by_name ? ' · ' + esc(v.changed_by_name) : ''}</span>
        </div>
        <div class="row-title">${esc(v.title || '(geen titel)')}</div>
        <div class="row-preview">${esc((v.content || '').slice(0, 200))}</div>
        ${can('kennisbank.item.edit') ? `<div class="version-actions"><button class="btn btn-sm" data-restore="${v.version_number}">Terugzetten naar deze versie</button></div>` : ''}
      </div>
    `).join('');
    list.querySelectorAll('[data-restore]').forEach(btn => {
      btn.addEventListener('click', () => restoreVersion(itemId, btn.dataset.restore));
    });
  } catch (e) {
    list.innerHTML = '<div class="kb-empty">Versies laden mislukt: ' + esc(e.message) + '</div>';
  }
}

async function restoreVersion(itemId, version) {
  if (!confirm(`Terugzetten naar versie ${version}? Huidige inhoud wordt versie ${parseInt(version) + 1}.`)) return;
  try {
    const res = await window.AgentShared.apiFetch(`/api/kb-items?action=restore&id=${encodeURIComponent(itemId)}&version=${encodeURIComponent(version)}`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || ('HTTP ' + res.status));
    }
    toast('Versie hersteld', 'success');
    document.getElementById('versionModal').classList.remove('show');
    await loadItems();
    renderDetail();
  } catch (e) {
    toast('Herstel mislukt: ' + e.message, 'error');
  }
}

// ── Init / wiring ─────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  state.search = e.target.value;
  renderItemList();
});
document.getElementById('newItemBtn').addEventListener('click', () => {
  if (!can('kennisbank.item.create')) { toast('Geen rechten om item aan te maken', 'error'); return; }
  startEdit(null);
});
document.querySelectorAll('[data-bucket]').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('.kb-bucket').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    state.bucket = el.dataset.bucket;
    renderItemList();
  });
});
document.getElementById('closeVersionsBtn').addEventListener('click', () => {
  document.getElementById('versionModal').classList.remove('show');
});
document.getElementById('versionModal').addEventListener('click', (e) => {
  if (e.target.id === 'versionModal') e.currentTarget.classList.remove('show');
});

(async () => {
  await window._authSharedReady;
  const profile = await window.AuthShared?.requireAuth();
  if (!profile) return;
  if (window.AgentShared) await window.AgentShared.renderUserSection(profile);

  // RBAC: laad permissions voor edit/delete-gating in UI.
  try {
    if (window.RBAC && typeof window.RBAC.ensurePermissionsLoaded === 'function') {
      state.perms = await window.RBAC.ensurePermissionsLoaded();
    }
  } catch (e) { /* fail-open */ }

  await loadItems();
})();
</script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script src="/modules/shared/quick-task-button.js" data-module="Kennisbank" defer></script>
</body>
</html>
