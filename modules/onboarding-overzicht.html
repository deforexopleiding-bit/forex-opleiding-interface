<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .app{margin-left:220px;padding:24px 28px 60px;max-width:1400px}
    .page-head{padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:18px}
    h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
    .sub{font-size:12.5px;color:var(--text-dim);margin-top:2px}
  </style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="app">
  <div class="page-head">
    <h1>Onboarding overzicht</h1>
    <div class="sub">Klanten met een getekende offerte — mentor-toewijzing en eerste-call-planning.</div>
  </div>

  <div class="sr-filterstrip">
    <label class="sr-toggle"><input type="checkbox" id="onbMineToggle"> Alleen mijne</label>
    <button class="sr-iconbtn sr-spacer" id="onbRefresh" title="Vernieuwen"><i class="ti ti-refresh"></i></button>
  </div>
  <div id="onboardingsList"><div class="sr-empty">Laden…</div></div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmtDateNL(iso){ if(!iso) return '—'; const d=new Date(iso); return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; }
function avatarHash(name){ let h=0; const s=String(name||''); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%6; }
function avatarInitials(name){ const p=String(name||'').trim().split(/\s+/).filter(Boolean); return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'?'; }
function avatarHtml(name){ return `<span class="sr-avatar sr-av-${avatarHash(name)}">${esc(avatarInitials(name))}</span>`; }
function entityTag(label){ if(!label) return '<span class="sr-cellsub">—</span>'; const l=label.toLowerCase(); const cls=l.includes('online')?'blue':l.includes('fysiek')?'teal':l.includes('retentie')?'pink':'gray'; return `<span class="sr-tag ${cls}">${esc(label)}</span>`; }
const ONB_STATUS = { not_sent: { l: 'Niet verzonden', c: 'gray' }, sent: { l: 'Verzonden', c: 'blue' }, completed: { l: 'Afgerond', c: 'green' } };

async function loadOnboardings() {
  const wrap = document.getElementById('onboardingsList');
  wrap.innerHTML = '<div class="sr-empty">Laden…</div>';
  const params = new URLSearchParams();
  if (document.getElementById('onbMineToggle').checked) params.set('owned_by_me', 'true');
  try {
    const res = await window.AgentShared.apiFetch('/api/sales-onboardings?' + params);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const items = data.items || [];
    if (!items.length) { wrap.innerHTML = '<div class="sr-empty">Geen klanten met getekende offerte.</div>'; return; }
    wrap.innerHTML = `<div class="sr-tablewrap"><table class="sr-table">
      <thead><tr><th>Naam</th><th>Verkoper</th><th>Traject</th><th>Entiteit</th><th>Onboarding</th><th>Eerste call</th><th>Mentor</th><th></th></tr></thead>
      <tbody>${items.map(it => {
        const b = ONB_STATUS[it.onboarding_status] || ONB_STATUS.not_sent;
        return `<tr>
          <td><a class="sr-userline" href="/modules/klanten.html?id=${esc(it.customer_id)}" style="text-decoration:none;color:inherit">${avatarHtml(it.customer_name)}<span class="sr-uname">${esc(it.customer_name)}</span></a></td>
          <td>${esc(it.sales_user || '—')}</td>
          <td>${esc(it.traject_label || '—')}</td>
          <td>${entityTag(it.entity)}</td>
          <td><span class="sr-tag ${b.c}">${b.l}</span></td>
          <td>${it.first_call_at ? fmtDateNL(it.first_call_at) : '<span class="sr-cellsub">wachten</span>'}</td>
          <td><span class="sr-tag warning">Binnenkort</span></td>
          <td class="sr-actions"><a class="sr-ibtn" href="/modules/klanten.html?id=${esc(it.customer_id)}" title="Klant-detail"><i class="ti ti-arrow-right"></i></a></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  } catch (e) { wrap.innerHTML = '<div class="sr-empty">Laden mislukt: ' + esc(e.message) + '</div>'; }
}
document.getElementById('onbMineToggle').addEventListener('change', () => loadOnboardings());
document.getElementById('onbRefresh').addEventListener('click', () => loadOnboardings());

(async () => {
  await window._authSharedReady;
  const profile = await window.AuthShared?.requireAuth();
  if (!profile) return;
  if (window.AgentShared) await window.AgentShared.renderUserSection(profile);
  loadOnboardings();
})();
</script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
</body>
</html>
