    .main-content { margin-left: var(--sidebar-w, 220px); min-height: 100vh; padding: 28px 28px 64px; max-width: 1200px; position: relative; z-index: 1; }
    .admin-card {
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .admin-result-suspicious { color: var(--color-warning-text); font-weight: 600; font-size: 14px; }
    .admin-result-missing { color: var(--color-danger-text); font-weight: 600; font-size: 14px; }
    .admin-date { color: var(--text-secondary); font-size: 13px; }
    .admin-reasoning {
      color: var(--text-secondary);
      margin: 8px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .admin-screenshot {
      max-width: 100%;
      max-height: 400px;
      border-radius: 6px;
      margin-top: 10px;
      display: block;
    }
    .admin-actions { display: flex; gap: 8px; margin-top: 12px; }
    .admin-btn-approve {
      background: var(--brand-primary);
      color: var(--text-inverse);
      border: none;
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .admin-btn-reject {
      background: transparent;
      color: var(--text-primary);
      border: 1px solid var(--border-default);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .admin-btn-approve:hover { opacity: 0.85; }
    .admin-btn-reject:hover { background: var(--surface-card-hover); }
    .admin-btn-approve:disabled, .admin-btn-reject:disabled { opacity: 0.4; cursor: default; }
    .admin-empty {
      padding: 40px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 14px;
    }
    .admin-error {
      padding: 20px;
      background: var(--color-danger-soft);
      border: 1px solid var(--color-danger);
      border-radius: 8px;
      color: var(--color-danger-text);
      font-size: 14px;
    }
    .admin-appt-link {
      color: var(--color-info-text);
      text-decoration: none;
      font-size: 13px;
    }
    .admin-appt-link:hover { text-decoration: underline; }
  </style>

  <main class="main-content">
    <a href="follow-up.html" style="display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);font-size:14px;text-decoration:none;margin-bottom:20px;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
      Terug naar Follow-up
    </a>
    <header class="page-header">
      <div>
        <h1>Screenshot Review Queue</h1>
        <p class="page-subtitle">Screenshots gemarkeerd als verdacht of ontbrekend — handmatige review.</p>
      </div>
    </header>

    <div id="admin-queue">
      <div class="admin-empty">Laden…</div>
    </div>
  </main>

  <script>
    const ALLOWED_ROLES = ['admin', 'manager', 'super_admin'];

    async function init() {
      await window._authSharedReady;
      const profile = await window.AuthShared.requireAuth(ALLOWED_ROLES);
      window.AgentShared?.renderUserSection(profile);

      const container = document.getElementById('admin-queue');

      try {
        const { data, error } = await window.supabase
          .from('follow_up_screenshot_audit')
          .select('id, sales_user_id, screenshot_url, appointment_id, ai_review_result, ai_review_reasoning, uploaded_at')
          .in('ai_review_result', ['suspicious', 'missing'])
          .eq('admin_reviewed', false)
          .order('uploaded_at', { ascending: false });

        if (error) throw error;

        if (!data || data.length === 0) {
          container.innerHTML = '<div class="admin-empty">Geen openstaande reviews. 🎉</div>';
          return;
        }

        container.innerHTML = '';

        for (const item of data) {
          const card = document.createElement('div');
          card.className = 'admin-card';
          card.dataset.auditId = item.id;

          const { data: signedUrlData } = await window.supabase.storage
            .from('follow-up-screenshots')
            .createSignedUrl(item.screenshot_url, 300);

          const imgHtml = signedUrlData?.signedUrl
            ? `<img class="admin-screenshot" src="${signedUrlData.signedUrl}" alt="Screenshot">`
            : '<div class="admin-empty">Kon screenshot niet laden.</div>';

          card.innerHTML = `
            <div class="admin-header">
              <div class="admin-result-${item.ai_review_result}">
                ${item.ai_review_result === 'suspicious' ? '⚠ Verdacht' : '✗ Ontbrekend'}
              </div>
              <div class="admin-date">${new Date(item.uploaded_at).toLocaleString('nl-NL')}</div>
            </div>
            <div class="admin-reasoning">${item.ai_review_reasoning || '(geen reasoning)'}</div>
            <a class="admin-appt-link" href="follow-up-lead.html?id=${item.appointment_id}">Appointment bekijken →</a>
            ${imgHtml}
            <div class="admin-actions">
              <button class="admin-btn-approve" data-action="approve" data-id="${item.id}">Goedkeuren</button>
              <button class="admin-btn-reject" data-action="reject" data-id="${item.id}">Afkeuren</button>
            </div>`;

          container.appendChild(card);
        }

        container.addEventListener('click', async (e) => {
          const btn = e.target.closest('button[data-action]');
          if (!btn) return;

          const action = btn.dataset.action;
          const auditId = btn.dataset.id;

          let notes = null;
          if (action === 'reject') {
            notes = prompt('Reden voor afkeuren (optioneel):');
            if (notes === null) return;
          }

          btn.disabled = true;
          const card = btn.closest('.admin-card');
          card.querySelectorAll('button').forEach(b => b.disabled = true);

          try {
            const { data: { user } } = await window.supabase.auth.getUser();
            const { error } = await window.supabase
              .from('follow_up_screenshot_audit')
              .update({
                admin_reviewed: true,
                admin_reviewer_id: user.id,
                review_notes: notes || (action === 'approve' ? 'Goedgekeurd' : 'Afgekeurd'),
              })
              .eq('id', auditId);

            if (error) throw error;

            card.style.transition = 'opacity 0.3s';
            card.style.opacity = '0';
            setTimeout(() => {
              card.remove();
              if (container.querySelectorAll('.admin-card').length === 0) {
                container.innerHTML = '<div class="admin-empty">Geen openstaande reviews. 🎉</div>';
              }
            }, 300);
          } catch (err) {
            alert('Fout: ' + err.message);
            card.querySelectorAll('button').forEach(b => b.disabled = false);
          }
        });
      } catch (err) {
        container.innerHTML = `<div class="admin-error">Fout bij laden: ${err.message}</div>`;
      }
    }

    init();
  </script>
