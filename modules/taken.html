<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taken · Agency Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* === LIGHT THEME (default) === */
      --bg: #fafafa; --bg-elev: #ffffff; --bg-elev-2: #f8fafc;
      --text: #0f172a; --text-dim: #475569; --text-faint: #94a3b8;
      --border: #e5e7eb; --border-strong: #d1d5db;
      --brand-secondary: #688b9b; --brand-secondary-light: #8aa5b3;
      --accent-cyan: #2563eb; --accent-violet: #6d28d9;
      --accent-grad: linear-gradient(135deg, #093d54 0%, #688b9b 100%);
      --green: #059669; --amber: #d97706; --red: #dc2626;
      --nav-item-hover: rgba(0,0,0,0.04);
      --nav-item-active: rgba(9,61,84,0.10);
      --nav-item-active-text: #093d54;
    }
    [data-theme="dark"] {
      --bg: #0a0b10; --bg-elev: #13151c; --bg-elev-2: #181b25;
      --text: rgba(255,255,255,0.95); --text-dim: rgba(255,255,255,0.72); --text-faint: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.14);
      --accent-cyan: #22d3ee; --accent-violet: #c4b5fd;
      --green: #10b981; --amber: #f59e0b; --red: #ef4444;
      --nav-item-hover: rgba(255,255,255,0.05);
      --nav-item-active: rgba(34,211,238,0.12);
      --nav-item-active-text: #22d3ee;
    }

    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 15% 10%, rgba(34,211,238,0.10), transparent 45%),
        radial-gradient(circle at 85% 90%, rgba(168,85,247,0.10), transparent 50%);
      pointer-events: none; z-index: 0;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 30%, transparent 75%);
      -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 75%);
      pointer-events: none; z-index: 0;
    }

    .app {
      position: relative; z-index: 1;
      margin-left: 220px;
      padding: 28px 24px 64px;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: 220px; z-index: 200;
      background: var(--bg-elev);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      padding: 20px 12px 16px;
      gap: 4px;
    }
    .sidebar-logo {
      display: flex; align-items: center; justify-content: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo img { max-height: 40px; width: auto; max-width: 160px; object-fit: contain; display: block; }
    .sidebar-logo .logo-dark  { display: block; }
    .sidebar-logo .logo-light { display: none; }
    [data-theme="dark"] .sidebar-logo .logo-dark  { display: none; }
    [data-theme="dark"] .sidebar-logo .logo-light { display: block; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-dim);
      font-size: 13px; font-weight: 500;
      transition: background .15s, color .15s;
      position: relative;
    }
    .nav-item:hover { background: var(--nav-item-hover); color: var(--text); }
    .nav-item.active { background: var(--nav-item-active); color: var(--nav-item-active-text); }
    .nav-item.concept { opacity: 0.45; pointer-events: none; }
    .nav-item.nav-concept { color: var(--text-faint); cursor: default; opacity: .65; }
    /* Sidebar SVG-icons: shared sidebar.js rendert <svg class="nav-icon"> zonder
       inline width/height; size komt normaal uit modules/shared/agent-shared.css.
       taken.html laadt die CSS niet, dus zonder onderstaande regel renderen
       browsers het SVG op default (~300px) en wordt de hele sidebar verstoord. */
    .nav-item svg, .nav-icon { width: 15px; height: 15px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      font-size: 10px; font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      line-height: 1.6;
    }
    .nav-badge:empty { display: none; }
    .nav-soon { margin-left: auto; font-size: 9px; font-weight: 600; color: var(--text-faint); background: var(--nav-item-hover); border-radius: 4px; padding: 1px 5px; }
    .nav-section {
      font-size: 10px; font-weight: 600;
      color: var(--text-faint);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 12px 10px 4px;
    }
    .sidebar-spacer { flex: 1; }
    .sidebar-user {
      display: flex; align-items: center; gap: 10px;
      padding: 10px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .sidebar-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent-grad);
      display: grid; place-items: center;
      font-size: 11px; font-weight: 700;
      color: #fff; flex-shrink: 0;
    }
    .sidebar-footer { flex-shrink: 0; padding: 8px 8px 14px; border-top: 1px solid var(--border); }
    .footer-user { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; color: var(--text-dim); font-size: 13px; font-weight: 500; cursor: pointer; transition: background .15s; }
    .footer-user:hover { background: var(--nav-item-hover); color: var(--text); }
    .footer-avatar { width: 26px; height: 26px; flex-shrink: 0; border-radius: 50%; background: var(--accent-grad); display: grid; place-items: center; font-size: 10px; font-weight: 800; color: #fff; }
    .sidebar-user-info { font-size: 12px; font-weight: 600; }
    .sidebar-user-role { font-size: 11px; color: var(--text-dim); font-weight: 400; }

    .logo-mark {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--accent-grad);
      display: grid; place-items: center;
      font-weight: 800; font-size: 15px;
      color: #fff;
    }
    .page-title { font-size: 20px; font-weight: 700; }
    .page-subtitle { font-size: 13px; color: var(--text-dim); margin-top: 1px; }
    .header-actions { display: flex; gap: 10px; align-items: center; }

    /* Gebruiker-selector */
    .user-badge {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 12px;
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      font-size: 13px; cursor: pointer;
    }
    .user-badge select {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 13px; font-family: inherit;
      cursor: pointer;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--accent-grad);
      border: none; border-radius: 8px;
      color: #fff; font-weight: 700; font-size: 13px;
      cursor: pointer; transition: opacity .15s;
      text-decoration: none;
    }
    .btn:hover { opacity: .85; }
    .btn-ghost {
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      color: var(--text-dim);
      font-weight: 500;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--accent-cyan); background: none; }
    .btn-sm { padding: 5px 11px; font-size: 12px; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--text-faint); margin-bottom: 6px; }
    .stat-val { font-size: 28px; font-weight: 800; }
    .stat-val.cyan { color: var(--accent-cyan); }
    .stat-val.violet { color: var(--accent-violet); }
    .stat-val.red { color: var(--red); }
    .stat-val.green { color: var(--green); }

    /* ── Filters ── */
    .filters-bar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-select {
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px; font-family: inherit;
      padding: 7px 10px;
      outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--accent-cyan); }
    .filters-bar .spacer { flex: 1; }

    /* ── Kanban ── */
    .kanban {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      align-items: start;
    }
    .kanban-col {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-height: 300px;
    }
    .kanban-col.drag-over {
      border-color: var(--accent-cyan);
      background: rgba(34,211,238,0.04);
    }
    .col-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .col-title {
      display: flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 14px;
    }
    .col-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .col-count {
      font-size: 11px; font-weight: 600;
      background: var(--bg-elev-2);
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 1px 7px;
      color: var(--text-dim);
    }

    /* ── Taakkaart ── */
    .task-card {
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: grab;
      transition: border-color .15s, transform .1s;
      position: relative;
    }
    .task-card:last-child { margin-bottom: 0; }
    .task-card:hover { border-color: var(--border-strong); }
    .task-card:active { cursor: grabbing; transform: scale(.98); }
    .task-card.dragging { opacity: .4; }

    .task-card.prio-laag    { border-left: 3px solid var(--green); }
    .task-card.prio-normaal { border-left: 3px solid var(--accent-cyan); }
    .task-card.prio-hoog    { border-left: 3px solid var(--amber); }
    .task-card.prio-urgent  { border-left: 3px solid var(--red); }

    .task-card.overdue .task-deadline { color: var(--red); }

    .task-top {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 8px; margin-bottom: 6px;
    }
    .task-titel { font-size: 13px; font-weight: 600; flex: 1; }
    .prio-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .4px;
      padding: 2px 7px; border-radius: 10px; flex-shrink: 0;
    }
    .prio-badge.laag    { background: rgba(34,197,94,.15); color: var(--green); }
    .prio-badge.normaal { background: rgba(34,211,238,.15); color: var(--accent-cyan); }
    .prio-badge.hoog    { background: rgba(245,158,11,.15); color: var(--amber); }
    .prio-badge.urgent  { background: rgba(239,68,68,.15); color: var(--red); }

    .task-meta {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-faint); margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .task-cat { display: flex; align-items: center; gap: 4px; }
    .task-deadline { display: flex; align-items: center; gap: 4px; }
    .task-email-ref {
      display: flex; align-items: center; gap: 4px;
      background: rgba(34,211,238,.08);
      border: 1px solid rgba(34,211,238,.15);
      border-radius: 6px; padding: 1px 6px;
      color: var(--accent-cyan); font-size: 10px;
    }
    .task-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .collega-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: grid; place-items: center;
      font-size: 10px; font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .overdue-badge {
      font-size: 9px; font-weight: 700; letter-spacing: .4px;
      background: rgba(239,68,68,.15); color: var(--red);
      border-radius: 10px; padding: 2px 7px;
    }

    .empty-col {
      text-align: center; padding: 32px 16px;
      color: var(--text-faint); font-size: 13px;
      border: 1px dashed var(--border-strong);
      border-radius: 8px;
    }

    /* ── Modals ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 28px;
      width: 100%; max-width: 540px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-lg { max-width: 680px; }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 22px;
    }
    .modal-title { font-size: 18px; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px;
      display: grid; place-items: center;
      background: var(--bg-elev-2); border: 1px solid var(--border-strong);
      border-radius: 8px; cursor: pointer; color: var(--text-dim);
      font-size: 16px; transition: color .15s;
    }
    .modal-close:hover { color: var(--text); }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-dim); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: var(--bg-elev-2);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px; font-family: inherit;
      padding: 9px 12px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus, .form-textarea:focus, .form-select:focus {
      border-color: var(--accent-cyan);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-actions {
      display: flex; gap: 10px; justify-content: flex-end;
      margin-top: 22px; padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    /* Detail modal specifiek */
    .detail-status-bar {
      display: flex; gap: 8px; margin-bottom: 18px;
    }
    .status-btn {
      flex: 1; padding: 8px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border-strong);
      border-radius: 8px; color: var(--text-dim);
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: all .15s; text-align: center;
    }
    .status-btn.active {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
      background: rgba(34,211,238,.08);
    }
    .detail-omschrijving {
      font-size: 13px; color: var(--text-dim);
      margin-bottom: 14px; white-space: pre-wrap;
    }
    .detail-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 18px;
    }
    .detail-meta-item { font-size: 12px; }
    .detail-meta-label { color: var(--text-faint); margin-bottom: 3px; }
    .detail-meta-val { color: var(--text); font-weight: 500; }
    .notities-label {
      font-size: 12px; font-weight: 600;
      color: var(--text-dim); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    .email-link-ref {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(34,211,238,.08);
      border: 1px solid rgba(34,211,238,.2);
      border-radius: 8px; padding: 6px 12px;
      color: var(--accent-cyan); font-size: 12px;
      text-decoration: none; margin-bottom: 14px;
    }
    .detail-actions {
      display: flex; gap: 8px; margin-top: 18px;
      padding-top: 18px; border-top: 1px solid var(--border);
    }
    .btn-danger {
      background: rgba(239,68,68,.15);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--red); font-weight: 600;
    }
    .btn-danger:hover { background: rgba(239,68,68,.25); }

    /* Collega-beheer modal */
    .collega-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
    .collega-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 14px;
    }
    .collega-row .collega-avatar { width: 32px; height: 32px; font-size: 12px; }
    .collega-name-input {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .color-picker { width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; padding: 0; background: none; }
    .collega-del {
      background: none; border: none; cursor: pointer;
      color: var(--text-faint); font-size: 18px; line-height: 1;
      transition: color .15s;
    }
    .collega-del:hover { color: var(--red); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

    @media (max-width: 900px) {
      .kanban { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .form-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .detail-meta-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar-mount"></div>

<script>
(function() {
  var taken = JSON.parse(localStorage.getItem('taken_lijst') || '[]');
  var urgent = taken.filter(function(t) {
    return t.status !== 'done' && (t.prioriteit === 'Urgent' || t.prioriteit === 'Hoog');
  }).length;
  if (urgent > 0) {
    var el = document.getElementById('sidebarTaakBadge');
    if (el) { el.textContent = urgent; el.style.display = ''; }
  }
})();
</script>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-left">
      <div class="logo-mark">T</div>
      <div>
        <div class="page-title">Takenbeheer</div>
        <div class="page-subtitle">Agency Command Center · Kanban</div>
      </div>
    </div>
    <div class="header-actions">
      <!-- Tab-switcher: scope serverside (mine / assigned_by_me).
           Geen user-picker meer — taken altijd op de ingelogde user. -->
      <div class="user-badge" style="padding:4px;gap:2px">
        <button type="button" class="btn btn-ghost tk-tab-btn active" id="tabScopeMine"
                style="padding:6px 10px;font-size:12px" onclick="setScope('mine')">Mijn taken</button>
        <button type="button" class="btn btn-ghost tk-tab-btn" id="tabScopeAssignedBy"
                style="padding:6px 10px;font-size:12px" onclick="setScope('assigned_by_me')">Toegewezen door mij</button>
      </div>
      <button class="btn btn-ghost" id="takenCollegaBtn" onclick="openCollega()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Collega's
      </button>
      <button class="btn" id="takenNieuwBtn" onclick="openNieuweTaak()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nieuwe taak
      </button>
    </div>
  </header>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Totaal open</div>
      <div class="stat-val cyan" id="statTotaal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Mijn taken</div>
      <div class="stat-val violet" id="statMijn">0</div>
    </div>
    <div class="stat-card">

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
  <script src="/modules/shared/theme-shared.js"></script>
<script>
// ════════════════════════════════════════════════════
// State & helpers
// ════════════════════════════════════════════════════

const PRIO_ORDER = { Urgent: 4, Hoog: 3, Normaal: 2, Laag: 1 };
const CAT_ICONS  = { 'E-mail': '✉', Factuur: '🧾', Klant: '🤝', Intern: '⚙', Overige: '📌' };

let taken     = load('taken_lijst') || [];
let collegas  = load('taken_collegas') || defaultCollegas();
let huidig    = load('taken_huidige_gebruiker') || (collegas[0]?.id || '');
let dragId    = null;
let detailId  = null;
let editMode  = false; // true = modal is editing existing task

// Server-side scope: 'mine' = aan mij toegewezen; 'assigned_by_me' = door
// mij aangemaakt. Vervangt de oude #userSelect-flow. Sticky via localStorage.
let currentScope = (load('taken_scope') === 'assigned_by_me') ? 'assigned_by_me' : 'mine';

// Cross-rol assignee-bron uit /api/profiles-list (alle actieve gebruikers).
let _profilesList = null;
async function ensureProfilesList() {
  if (Array.isArray(_profilesList)) return _profilesList;
  try {
    const r = await window.AgentShared.apiFetch('/api/profiles-list');
    if (!r.ok) throw new Error('profiles-list HTTP ' + r.status);
    const d = await r.json();
    _profilesList = Array.isArray(d?.members) ? d.members : [];
  } catch (e) {
    console.warn('[taken] profiles-list fetch faalde:', e?.message || e);
    _profilesList = [];
  }
  return _profilesList;
}

function load(key) {
  try { return JSON.parse(localStorage.getItem(key)); } catch { return null; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

// ── Supabase sync ────────────────────────────────────────────────────────────
// Server-side scoped GET; user.id is hard server-side, scope-param wisselt
// alleen tussen 'mine' en 'assigned_by_me'.
async function loadTaken() {
  const res = await window.AgentShared.apiFetch('/api/taken?scope=' + encodeURIComponent(currentScope));
  if (!res.ok) return;
  const d = await res.json();
  taken = Array.isArray(d?.taken) ? d.taken : [];
  render();
}
async function loadTakenFromSupabase() {
  try {
    const res = await window.AgentShared.apiFetch('/api/taken?scope=' + encodeURIComponent(currentScope));
    if (!res.ok) return;
    const { taken: rows } = await res.json();

    // Éénmalige migratie: push localStorage-taken die niet in Supabase staan
    if (taken.length > 0 && Array.isArray(rows)) {
      const inSupabase = new Set(rows.map(r => r.id));
      const toMigrate  = taken.filter(t => !inSupabase.has(t.id));
      if (toMigrate.length > 0) {
        window.AgentShared.apiFetch('/api/taken', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'bulk_upsert', tasks: toMigrate })
        }).catch(() => {});
      }
      // Voeg Supabase-taken toe die ontbreken in localStorage (bv. via ander apparaat)
      const inLocal = new Set(taken.map(t => t.id));
      const fromSupabase = (rows || []).filter(r => !inLocal.has(r.id)).map(fromRow);
      if (fromSupabase.length > 0) {
        taken = [...taken, ...fromSupabase];
        save('taken_lijst', taken);
        render();
      }
      return;
    }

    // localStorage leeg: laad alles vanuit Supabase
    if (!Array.isArray(rows) || rows.length === 0) return;
    taken = rows.map(fromRow);
    save('taken_lijst', taken);
    render();
  } catch {}
}

function fromRow(r) {
  return {
    id:            r.id,
    titel:         r.titel          || '',
    omschrijving:  r.omschrijving   || '',
    prioriteit:    r.prioriteit     || 'Normaal',
    categorie:     r.categorie      || 'Overige',
    toegewezenAan: r.toegewezen_aan || '',
    deadline:      r.deadline       || '',
    emailId:       r.email_id       || '',
    emailSubject:  r.email_subject  || '',
    status:        r.status         || 'todo',
    notities:      r.notities       || '',
    aangemaakt:    r.aangemaakt     || r.updated_at,
    afgerondOp:    r.afgerond_op    || null
  };
}

function syncTaakToSupabase(taak) {
  window.AgentShared.apiFetch('/api/taken', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ task: taak })
  }).catch(() => {});
}

function deleteTaakFromSupabase(id) {
  window.AgentShared.apiFetch('/api/taken', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action: 'delete', id })
  }).catch(() => {});
}

function defaultCollegas() {
  return [
    { id: crypto.randomUUID(), naam: 'Jeffrey', kleur: '#22d3ee' },
    { id: crypto.randomUUID(), naam: '',        kleur: '#a855f7' },
    { id: crypto.randomUUID(), naam: '',        kleur: '#f59e0b' }
  ];
}

function collegaById(id) { return collegas.find(c => c.id === id); }
function taakById(id)     { return taken.find(t => t.id === id); }

function initials(naam) {
  if (!naam) return '?';
  return naam.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function isOverdue(t) {
  if (!t.deadline || t.status === 'done') return false;
  return new Date(t.deadline) < new Date(new Date().toDateString());
}

function startOfWeek() {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() + (d.getDay() === 0 ? -6 : 1));
  d.setHours(0,0,0,0);
  return d;
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
}

// ════════════════════════════════════════════════════
// Gebruiker
// ════════════════════════════════════════════════════

// Server-side scope wisselen. 'mine' = taken aan mij toegewezen;
// 'assigned_by_me' = taken die ik heb aangemaakt voor anderen.
function setScope(s) {
  if (s !== 'mine' && s !== 'assigned_by_me') s = 'mine';
  if (currentScope === s) return;
  currentScope = s;
  try { save('taken_scope', s); } catch (_) {}
  // Update tab-knop visueel.
  document.getElementById('tabScopeMine').classList.toggle('active', s === 'mine');
  document.getElementById('tabScopeAssignedBy').classList.toggle('active', s === 'assigned_by_me');
  // Herlaad taken met nieuwe scope.
  loadTaken().catch((e) => console.warn('[taken] loadTaken', e?.message || e));
}

// Backward-compat stub: oude code roept deze nog hier en daar aan; we negeren
// hem (we tonen geen user-picker meer — scope vervangt huidige-gebruiker).
function setHuidigeGebruiker(/* id */) { /* no-op sinds Takenbeheer-userbased */ }
function populeerUserSelect()           { /* no-op — userSelect is verwijderd */ }

async function populeerToegewezenDropdownProfiles() {
  // Cross-rol assignee-picker uit /api/profiles-list (alle actieve gebruikers).
  // Zet assigned_to_id naar profiles.id zodat de creator-rol los staat van
  // de assignee-rol; geen lokale collegas-restrictie meer.
  const sel = document.getElementById('fToegewezen');
  if (!sel) return;
  const prevVal = sel.value || '';
  sel.innerHTML = '<option value="">— Niemand —</option>';
  const list = await ensureProfilesList();
  list.forEach((p) => {
    const o = document.createElement('option');
    o.value = p.id;
    o.textContent = (p.full_name || p.email || p.id) + (p.role ? '  ·  ' + p.role : '');
    sel.appendChild(o);
  });
  if (prevVal) sel.value = prevVal;
}
function populeerToegewezenDropdown() {
  const sel = document.getElementById('fToegewezen');
  sel.innerHTML = '<option value="">— Niemand —</option>';
  collegas.filter(c => c.naam).forEach(c => {
    const o = document.createElement('option');
    o.value = c.id; o.textContent = c.naam;
    sel.appendChild(o);
  });
}

function populeerFilterCollega() {
  const sel = document.getElementById('filterCollega');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Alle collega\'s</option>';
  collegas.filter(c => c.naam).forEach(c => {
    const o = document.createElement('option');
    o.value = c.naam; o.textContent = c.naam;
    if (c.naam === cur) o.selected = true;
    sel.appendChild(o);
  });
}

// ════════════════════════════════════════════════════
// Render
// ════════════════════════════════════════════════════

function filteredTaken() {
  const fc = document.getElementById('filterCollega').value;
  const fp = document.getElementById('filterPrio').value;
  const fcat = document.getElementById('filterCat').value;
  const sort = document.getElementById('sortBy').value;

  let list = taken.filter(t => {
    if (fc && (collegaById(t.toegewezenAan)?.naam || t.toegewezenAan) !== fc) return false;
    if (fp && t.prioriteit !== fp) return false;
    if (fcat && t.categorie !== fcat) return false;
    return true;
  });

  list.sort((a, b) => {
    if (sort === 'deadline') {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return new Date(a.deadline) - new Date(b.deadline);
    }
    if (sort === 'prioriteit') return (PRIO_ORDER[b.prioriteit]||0) - (PRIO_ORDER[a.prioriteit]||0);
    return new Date(b.aangemaakt) - new Date(a.aangemaakt);
  });
  return list;
}

function render() {
  populeerUserSelect();
  populeerFilterCollega();
  updateStats();

  const list = filteredTaken();
  const statuses = ['todo','progress','done'];
  statuses.forEach(st => {
    const group = list.filter(t => t.status === st);
    const container = document.getElementById('cards-' + st);
    document.getElementById('count-' + st).textContent = group.length;

    if (!group.length) {
      container.innerHTML = '<div class="empty-col">Geen taken</div>';
      return;
    }
    container.innerHTML = group.map(t => taskCard(t)).join('');
    // attach drag listeners
    group.forEach(t => {
      const el = document.getElementById('card-' + t.id);
      if (!el) return;
      el.addEventListener('dragstart', e => { dragId = t.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
      el.addEventListener('click', () => openDetail(t.id));
    });
  });
}

function taskCard(t) {
  const c = collegaById(t.toegewezenAan);
  const od = isOverdue(t);
  const prioClass = t.prioriteit ? t.prioriteit.toLowerCase() : 'normaal';

  let emailRef = '';
  if (t.emailId) {
    emailRef = `<div class="task-email-ref">✉ ${escHtml(t.emailSubject || t.emailId)}</div>`;
  }

  const avatar = c
    ? `<div class="collega-avatar" style="background:${c.kleur}">${initials(c.naam)}</div>`
    : '';

  const overdueBadge = od ? '<span class="overdue-badge">VERLOPEN</span>' : '';
  const deadline = t.deadline ? `<span class="task-deadline">📅 ${fmtDate(t.deadline)}</span>` : '';

  return `
    <div class="task-card prio-${prioClass}${od ? ' overdue' : ''}" id="card-${t.id}" draggable="true">
      <div class="task-top">
        <div class="task-titel">${escHtml(t.titel)}</div>
        <span class="prio-badge ${prioClass}">${t.prioriteit}</span>
      </div>
      <div class="task-meta">
        ${t.categorie ? `<span class="task-cat">${CAT_ICONS[t.categorie]||'📌'} ${t.categorie}</span>` : ''}
        ${deadline}
        ${emailRef}
      </div>
      <div class="task-footer">
        ${avatar}
        ${overdueBadge}
      </div>
    </div>`;
}

function updateStats() {
  const nu = new Date();
  const bow = startOfWeek();
  let totaal = 0, mijn = 0, vervallen = 0, afgerond = 0;
  taken.forEach(t => {
    if (t.status !== 'done') {
      totaal++;
      if (t.toegewezenAan === huidig) mijn++;
      if (isOverdue(t)) vervallen++;
    } else {
      if (t.afgerondOp && new Date(t.afgerondOp) >= bow) afgerond++;
    }
  });
  document.getElementById('statTotaal').textContent   = totaal;
  document.getElementById('statMijn').textContent     = mijn;
  document.getElementById('statVervallen').textContent = vervallen;
  document.getElementById('statAfgerond').textContent = afgerond;
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ════════════════════════════════════════════════════
// Drag & Drop
// ════════════════════════════════════════════════════

function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }

function onDrop(e, newStatus) {
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  const t = taakById(dragId);
  if (!t) return;
  t.status = newStatus;
  if (newStatus === 'done' && !t.afgerondOp) t.afgerondOp = new Date().toISOString();
  if (newStatus !== 'done') t.afgerondOp = null;
  dragId = null;
  save('taken_lijst', taken);
  syncTaakToSupabase(t);
  render();
}

// ════════════════════════════════════════════════════
// Modal: Nieuwe taak / Bewerken
// ════════════════════════════════════════════════════

function openNieuweTaak(prefill = {}) {
  editMode = false;
  detailId = null;
  document.getElementById('modalNieuwTitel').textContent = 'Nieuwe taak';
  document.getElementById('fTitel').value          = prefill.titel || '';
  document.getElementById('fOmschrijving').value   = prefill.omschrijving || '';
  document.getElementById('fDeadline').value       = prefill.deadline || '';

  populeerToegewezenDropdown();
  populeerToegewezenDropdownProfiles().catch((e) => console.warn('[taken] profiles dropdown', e?.message || e));
  const selP = document.getElementById('fPrioriteit');
  selP.value = prefill.prioriteit || 'Normaal';
  const selC = document.getElementById('fCategorie');
  selC.value = prefill.categorie || 'Overige';
  const selT = document.getElementById('fToegewezen');
  selT.value = prefill.toegewezenAan || huidig || '';

  const emailGroup = document.getElementById('emailRefGroup');
  if (prefill.emailId) {
    document.getElementById('fEmailId').value = `${prefill.emailId} — ${prefill.emailSubject||''}`;
    emailGroup.style.display = '';
  } else {
    emailGroup.style.display = 'none';
    document.getElementById('fEmailId').value = '';
  }

  // store prefill data attrs for save
  document.getElementById('fEmailId').dataset.emailId      = prefill.emailId || '';
  document.getElementById('fEmailId').dataset.emailSubject = prefill.emailSubject || '';

  document.getElementById('overlayNieuw').classList.add('open');
  document.getElementById('fTitel').focus();
}

function openEditTaak(id) {
  const t = taakById(id);
  if (!t) return;
  editMode = true;
  detailId = id;
  document.getElementById('modalNieuwTitel').textContent = 'Taak bewerken';
  document.getElementById('fTitel').value        = t.titel;
  document.getElementById('fOmschrijving').value = t.omschrijving || '';
  document.getElementById('fDeadline').value     = t.deadline || '';

  populeerToegewezenDropdown();
  populeerToegewezenDropdownProfiles().catch((e) => console.warn('[taken] profiles dropdown', e?.message || e));
  document.getElementById('fPrioriteit').value  = t.prioriteit || 'Normaal';
  document.getElementById('fCategorie').value   = t.categorie || 'Overige';
  document.getElementById('fToegewezen').value  = t.toegewezenAan || '';

  const emailGroup = document.getElementById('emailRefGroup');
  if (t.emailId) {
    document.getElementById('fEmailId').value = `${t.emailId} — ${t.emailSubject||''}`;
    document.getElementById('fEmailId').dataset.emailId      = t.emailId;
    document.getElementById('fEmailId').dataset.emailSubject = t.emailSubject || '';
    emailGroup.style.display = '';
  } else {
    emailGroup.style.display = 'none';
  }

  document.getElementById('overlayNieuw').classList.add('open');
}

function closeNieuweTaak() {
  document.getElementById('overlayNieuw').classList.remove('open');
}

function saveNieuweTaak() {
  const titel = document.getElementById('fTitel').value.trim();
  if (!titel) { document.getElementById('fTitel').focus(); return; }

  const emailEl = document.getElementById('fEmailId');
  const emailId = emailEl.dataset.emailId || '';
  const emailSubject = emailEl.dataset.emailSubject || '';

  if (editMode && detailId) {
    const t = taakById(detailId);
    if (t) {
      t.titel         = titel;
      t.omschrijving  = document.getElementById('fOmschrijving').value.trim();
      t.prioriteit    = document.getElementById('fPrioriteit').value;
      t.categorie     = document.getElementById('fCategorie').value;
      t.toegewezenAan = document.getElementById('fToegewezen').value;
      t.deadline      = document.getElementById('fDeadline').value;
    }
  } else {
    taken.push({
      id:            crypto.randomUUID(),
      titel,
      omschrijving:  document.getElementById('fOmschrijving').value.trim(),
      prioriteit:    document.getElementById('fPrioriteit').value,
      categorie:     document.getElementById('fCategorie').value,
      toegewezenAan: document.getElementById('fToegewezen').value,
      deadline:      document.getElementById('fDeadline').value,
      emailId,
      emailSubject,
      status:        'todo',
      notities:      '',
      aangemaakt:    new Date().toISOString(),
      afgerondOp:    null
    });
  }

  save('taken_lijst', taken);
  const savedTaak = editMode ? taakById(detailId) : taken[taken.length - 1];
  if (savedTaak) syncTaakToSupabase(savedTaak);
  closeNieuweTaak();
  render();
}

// ════════════════════════════════════════════════════
// Modal: Taakdetail
// ════════════════════════════════════════════════════

function openDetail(id) {
  const t = taakById(id);
  if (!t) return;
  detailId = id;

  document.getElementById('detailTitel').textContent = t.titel;

  // status knoppen
  document.querySelectorAll('.status-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.s === t.status);
  });

  // e-mail ref
  const refEl = document.getElementById('detailEmailRef');
  if (t.emailId) {
    refEl.innerHTML = `<a class="email-link-ref" href="email.html?open=${encodeURIComponent(t.emailId)}">✉ ${escHtml(t.emailSubject || t.emailId)} → Bekijk e-mail</a>`;
  } else { refEl.innerHTML = ''; }

  // omschrijving
  document.getElementById('detailOmschrijving').textContent = t.omschrijving || '';

  // meta
  const c = collegaById(t.toegewezenAan);
  document.getElementById('detailMeta').innerHTML = `
    <div class="detail-meta-item"><div class="detail-meta-label">Prioriteit</div><div class="detail-meta-val">${t.prioriteit}</div></div>
    <div class="detail-meta-item"><div class="detail-meta-label">Categorie</div><div class="detail-meta-val">${CAT_ICONS[t.categorie]||''} ${t.categorie}</div></div>
    <div class="detail-meta-item"><div class="detail-meta-label">Toegewezen aan</div><div class="detail-meta-val">${c ? c.naam : '—'}</div></div>
    <div class="detail-meta-item"><div class="detail-meta-label">Deadline</div><div class="detail-meta-val"${isOverdue(t) ? ' style="color:var(--red)"' : ''}>${fmtDate(t.deadline)}</div></div>
    <div class="detail-meta-item"><div class="detail-meta-label">Aangemaakt</div><div class="detail-meta-val">${fmtDate(t.aangemaakt)}</div></div>
    ${t.afgerondOp ? `<div class="detail-meta-item"><div class="detail-meta-label">Afgerond</div><div class="detail-meta-val" style="color:var(--green)">${fmtDate(t.afgerondOp)}</div></div>` : ''}
  `;

  document.getElementById('detailNotities').value = t.notities || '';
  // Reactie-thread (lazy fetch). Toon "Laden…" tot de fetch klaar is.
  const cbox = document.getElementById('detailComments');
  if (cbox) cbox.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:4px 0">Laden…</div>';
  const cinp = document.getElementById('detailCommentInput');
  if (cinp) cinp.value = '';
  loadDetailComments(id).catch((e) => console.warn('[taken] comments load', e?.message || e));
  document.getElementById('overlayDetail').classList.add('open');
}

// ── Reactie-thread (taken_comments) ─────────────────────────────────────
let _commentsBusy = false;
async function loadDetailComments(taskId) {
  const cbox = document.getElementById('detailComments');
  if (!cbox || !taskId) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/taken-comments?task_id=' + encodeURIComponent(taskId));
    if (!r.ok) {
      const d = await r.json().catch(() => ({}));
      cbox.innerHTML = '<div style="color:var(--red);font-size:12px">Reacties laden mislukt: ' + escHtml(d?.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    const d = await r.json().catch(() => ({}));
    const list = Array.isArray(d?.comments) ? d.comments : [];
    if (list.length === 0) {
      cbox.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:4px 0">Nog geen reacties.</div>';
      return;
    }
    // Identify own comments — we hebben de huidige user via auth-shared.
    const myId = (window.AuthShared && (await window.AuthShared.getUser())?.id) || null;
    cbox.innerHTML = list.map((c) => {
      const dt = c.created_at ? new Date(c.created_at) : null;
      const dtStr = dt ? dt.toLocaleString('nl-NL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : '';
      const isMe = (myId && c.user_id === myId);
      const bg   = isMe ? 'rgba(34,197,94,0.10)' : 'var(--bg-elev)';
      const author = escHtml(c.author_name || c.user_id || 'Onbekend');
      return '<div style="margin-bottom:8px;padding:6px 8px;border-radius:6px;background:' + bg + '">' +
               '<div style="font-size:11.5px;color:var(--text-dim);margin-bottom:2px"><strong>' + author + '</strong> · ' + escHtml(dtStr) + '</div>' +
               '<div style="white-space:pre-wrap;color:var(--text)">' + escHtml(c.body || '') + '</div>' +
             '</div>';
    }).join('');
    cbox.scrollTop = cbox.scrollHeight;
  } catch (e) {
    cbox.innerHTML = '<div style="color:var(--red);font-size:12px">Fout: ' + escHtml(e?.message || e) + '</div>';
  }
}
async function postDetailComment() {
  if (_commentsBusy || !detailId) return;
  const inp = document.getElementById('detailCommentInput');
  const btn = document.getElementById('detailCommentSendBtn');
  const text = (inp.value || '').trim();
  if (!text) return;
  _commentsBusy = true; btn.disabled = true;
  try {
    const r = await window.AgentShared.apiFetch('/api/taken-comments', {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify({ task_id: detailId, body: text }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      alert(d?.error || ('Reactie versturen mislukt (HTTP ' + r.status + ')'));
      return;
    }
    inp.value = '';
    await loadDetailComments(detailId);
  } catch (e) {
    alert('Reactie versturen mislukt: ' + (e?.message || e));
  } finally {
    _commentsBusy = false; btn.disabled = false;
  }
}

function closeDetail() {
  document.getElementById('overlayDetail').classList.remove('open');
  detailId = null;
}

function setDetailStatus(st) {
  if (!detailId) return;
  const t = taakById(detailId);
  if (!t) return;
  t.status = st;
  if (st === 'done' && !t.afgerondOp) t.afgerondOp = new Date().toISOString();
  if (st !== 'done') t.afgerondOp = null;
  document.querySelectorAll('.status-btn').forEach(b => b.classList.toggle('active', b.dataset.s === st));
  save('taken_lijst', taken);
  syncTaakToSupabase(t);
  render();
}

function saveDetail() {
  if (!detailId) return;
  const t = taakById(detailId);
  if (!t) return;
  t.notities = document.getElementById('detailNotities').value;
  save('taken_lijst', taken);
  syncTaakToSupabase(t);
  closeDetail();
  render();
}

function editTaakFromDetail() {
  const id = detailId;
  closeDetail();
  openEditTaak(id);
}

function deleteTaak() {
  if (!detailId) return;
  if (!confirm('Taak verwijderen?')) return;
  const id = detailId;
  taken = taken.filter(t => t.id !== id);
  save('taken_lijst', taken);
  deleteTaakFromSupabase(id);
  closeDetail();
  render();
}

// ════════════════════════════════════════════════════
// Modal: Collega-beheer
// ════════════════════════════════════════════════════

let tempCollegas = [];

function openCollega() {
  tempCollegas = collegas.map(c => ({ ...c }));
  renderCollegaList();
  document.getElementById('overlayCollega').classList.add('open');
}

function closeCollega() {
  document.getElementById('overlayCollega').classList.remove('open');
}

function renderCollegaList() {
  const list = document.getElementById('collegaList');
  list.innerHTML = tempCollegas.map((c, i) => `
    <div class="collega-row" id="crow-${i}">
      <div class="collega-avatar" style="background:${c.kleur}" id="cavatar-${i}">${initials(c.naam)}</div>
      <input class="collega-name-input" type="text" value="${escHtml(c.naam)}" placeholder="Naam collega"
             oninput="tempCollegas[${i}].naam=this.value; document.getElementById('cavatar-${i}').textContent=initials(this.value)" />
      <input class="color-picker" type="color" value="${c.kleur}"
             oninput="tempCollegas[${i}].kleur=this.value; document.getElementById('cavatar-${i}').style.background=this.value" />
      <button class="collega-del" onclick="removeCollega(${i})">×</button>
    </div>
  `).join('');
}

function addCollega() {
  tempCollegas.push({ id: crypto.randomUUID(), naam: '', kleur: '#22d3ee' });
  renderCollegaList();
}

function removeCollega(i) {
  tempCollegas.splice(i, 1);
  renderCollegaList();
}

function saveCollegas() {
  collegas = tempCollegas.filter(c => c.naam.trim());
  save('taken_collegas', collegas);
  if (!collegas.find(c => c.id === huidig)) {
    huidig = collegas[0]?.id || '';
    save('taken_huidige_gebruiker', huidig);
  }
  closeCollega();
  render();
}

// ════════════════════════════════════════════════════
// Overlay click-outside
// ════════════════════════════════════════════════════

function overlayClick(e, overlayId) {
  if (e.target.id === overlayId) {
    if (overlayId === 'overlayNieuw') closeNieuweTaak();
    else if (overlayId === 'overlayDetail') closeDetail();
    else if (overlayId === 'overlayCollega') closeCollega();
  }
}

// ════════════════════════════════════════════════════
// URL prefill (from email module)
// ════════════════════════════════════════════════════

function handleUrlParams() {
  const p = new URLSearchParams(window.location.search);

  // Scroll naar en highlight een specifieke taak (van dashboard)
  if (p.has('taskId')) {
    const taskId = p.get('taskId');
    window.history.replaceState({}, '', window.location.pathname);
    // Wacht tot render klaar is, open dan het detail-panel
    requestAnimationFrame(() => {
      const el = document.getElementById('card-' + taskId);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.boxShadow = '0 0 0 2px #a855f7, 0 0 16px rgba(168,85,247,0.4)';
        setTimeout(() => { el.style.boxShadow = ''; }, 2500);
      }
      openDetail(taskId);
    });
    return;
  }

  if (p.has('from_email') || p.has('titel')) {
    openNieuweTaak({
      emailId:      p.get('from_email') || '',
      emailSubject: p.get('subject') || '',
      titel:        p.get('titel') || '',
      categorie:    p.get('categorie') || 'E-mail',
      prioriteit:   p.get('prioriteit') || 'Normaal',
      omschrijving: p.get('omschrijving') || ''
    });
    window.history.replaceState({}, '', window.location.pathname);
  }
}

// ════════════════════════════════════════════════════
// Init
// ════════════════════════════════════════════════════

async function init() {
  await window._authSharedReady;
  const profile = await window.AuthShared.requireAuth();
  if (!profile) return;
  // adminNavLink wordt nu centraal door sidebar.js gegate (RBAC-voorbereiding)
  // Ensure all collegas have ids
  collegas = collegas.map(c => ({ id: c.id || crypto.randomUUID(), naam: c.naam || '', kleur: c.kleur || '#22d3ee' }));
  if (!huidig && collegas.length) huidig = collegas[0].id;
  window.AgentShared?.renderUserSection(profile);
  // Zet tab-knoppen actief volgens persistente scope.
  const tMine = document.getElementById('tabScopeMine');
  const tAssBy = document.getElementById('tabScopeAssignedBy');
  if (tMine && tAssBy) {
    tMine.classList.toggle('active', currentScope === 'mine');
    tAssBy.classList.toggle('active', currentScope === 'assigned_by_me');
  }
  render();
  handleUrlParams();
  if (!localStorage.getItem('db_migrated_v1')) {
    fetch('/api/db-migrate').then(r => { if (r.ok) localStorage.setItem('db_migrated_v1', '1'); }).catch(() => {});
  }
  // Server-side scoped fetch — vervangt loadTakenFromSupabase().
  loadTaken().catch((e) => console.warn('[taken] loadTaken init', e?.message || e));
}

init();
</script>
<script>
// RBAC frontend-gating (fail-open) — Takenbeheer. super_admin = alles.
(function () {
  var RULES = [
    ['#takenNieuwBtn', 'taken.task.create'],
    ['#takenSaveNieuwBtn', 'taken.task.create'],
    ['#takenCollegaBtn', 'taken.collega.manage'],
    ['#takenEditBtn', 'taken.task.edit'],
    ['#takenSaveDetailBtn', 'taken.task.edit'],
    ['#takenDeleteBtn', 'taken.task.delete'],
    ['.status-btn', 'taken.task.status_change']
  ];
  async function applyRbacGating() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch (e) {}
    if (!window.RBAC || typeof window.RBAC.ensurePermissionsLoaded !== 'function') return;
    var perms;
    try { perms = await window.RBAC.ensurePermissionsLoaded(); } catch (e) { return; }
    var roles = (typeof window.RBAC.getUserRoles === 'function' && window.RBAC.getUserRoles()) || [];
    if (!roles.length) return;
    if (perms.has('*')) return;
    var css = RULES.filter(function (r) { return !perms.has(r[1]); })
      .map(function (r) { return r[0] + '{display:none !important;}'; }).join('\n');
    if (css) { var st = document.createElement('style'); st.id = 'rbac-gating'; st.textContent = css; document.head.appendChild(st); }
  }
  applyRbacGating();
})();
</script>
