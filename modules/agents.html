<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Agents · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/modules/shared/agent-shared.css"/>
  <style>
    /* ── AI Agents accent kleur (violet) — bewust niet in shared tokens; agent-specifiek ── */
    :root             { --ai-accent: #6d28d9; --ai-accent-soft: rgba(109,40,217,0.14); --ai-accent-hover: #5b21b6; }
    [data-theme="light"] { --ai-accent-text: #6d28d9; }
    [data-theme="dark"]  { --ai-accent: #8b5cf6; --ai-accent-soft: rgba(139,92,246,0.18); --ai-accent-hover: #7c3aed; --ai-accent-text: #c4b5fd; }

    /* ── Agent cards (overview) ── */
    .agents-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
    .agent-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;transition:border-color .2s,transform .2s;}
    .agent-card:hover{border-color:var(--border-strong);transform:translateY(-2px);}
    .avatar-wrap{display:inline-block;margin-bottom:14px;animation:breathe 3s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
    .agent-name{font-size:18px;font-weight:800;margin-bottom:4px;}
    .agent-role{font-size:12px;color:var(--text-dim);margin-bottom:4px;}
    .agent-dept{font-size:11px;color:var(--text-faint);}
    .status-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--green);margin:10px 0;}
    .status-dot::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    .module-link{font-size:11px;color:var(--accent-violet);}
    .caps-list{margin:12px 0;text-align:left;}
    .cap-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim);padding:2px 0;}
    .cap-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
    .card-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}

    /* ── Chat ── */
    .chat-layout{display:grid;grid-template-columns:260px 1fr;gap:0;height:calc(100vh - 112px);min-height:400px;}
    .chat-sidebar{background:var(--bg-elev);border:1px solid var(--border);border-radius:14px 0 0 14px;padding:20px;overflow-y:auto;}
    .chat-agent-name{font-size:16px;font-weight:800;margin-bottom:2px;}
    .chat-agent-role{font-size:11px;color:var(--text-dim);margin-bottom:14px;}
    .chat-caps-title{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);font-weight:600;margin-bottom:8px;}
    .chat-cap{font-size:11px;color:var(--text-dim);padding:3px 0;display:flex;align-items:center;gap:6px;}
    .chat-main{display:flex;flex-direction:column;background:var(--bg-elev);border:1px solid var(--border);border-left:none;border-radius:0 14px 14px 0;}
    .chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
    .chat-title{font-size:14px;font-weight:700;}
    .chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
    .msg{display:flex;gap:10px;align-items:flex-start;max-width:85%;}
    .msg.msg-user{margin-left:auto;flex-direction:row-reverse;}
    .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:12px;font-weight:800;}
    .msg-bubble{padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.5;}
    .msg-agent .msg-bubble{background:var(--bg-elev-2);color:var(--text);border-radius:4px 12px 12px 12px;}
    .msg-user  .msg-bubble{background:var(--ai-accent-soft);color:var(--ai-accent-text);border-radius:12px 4px 12px 12px;}
    .msg-time{font-size:10px;color:var(--text-faint);margin-top:4px;}
    .typing{display:flex;gap:5px;align-items:center;padding:12px 14px;background:var(--bg-elev-2);border-radius:4px 12px 12px 12px;width:fit-content;}
    .typing span{width:6px;height:6px;border-radius:50%;background:var(--text-faint);animation:typing-dot 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:.2s;}
    .typing span:nth-child(3){animation-delay:.4s;}
    @keyframes typing-dot{0%,80%,100%{transform:scale(0.8);opacity:.5;}40%{transform:scale(1.1);opacity:1;}}
    .chat-input-area{padding:12px 16px;border-top:1px solid var(--border);}
    .chat-input-row{display:flex;gap:8px;}
    .chat-input{flex:1;padding:10px 14px;background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:10px;color:var(--text);font-size:13px;font-family:inherit;resize:none;outline:none;}
    .chat-input:focus{border-color:rgba(168,85,247,0.5);}
    .chat-send{padding:10px 16px;background:var(--ai-accent);border:none;border-radius:10px;color:var(--text-inverse);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;}
    .chat-send:hover{opacity:0.85;}
    .quick-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .quick-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border-strong);background:var(--bg-elev-2);color:var(--text-dim);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
    .quick-btn:hover{background:var(--bg);color:var(--text);}
    /* Tool-gebruik indicator */
    .typing-note{font-size:11px;color:var(--text-faint);margin-top:6px;padding:0 2px;animation:fade-in .3s ease;}
    .tools-used-note{font-size:11px;color:var(--text-faint);margin-top:4px;padding:2px 0;display:flex;align-items:center;gap:4px;}
    @keyframes fade-in{from{opacity:0}to{opacity:1}}
    /* Feedback & training */
    .chat-msg-actions{display:flex;gap:6px;margin-top:6px;}
    .chat-like-btn,.chat-train-btn{padding:3px 8px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;color:var(--text-faint);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;line-height:1.4;}
    .chat-like-btn:hover{background:var(--color-success-soft);color:var(--color-success);border-color:var(--color-success);}
    .chat-train-btn:hover{background:rgba(168,85,247,0.12);color:var(--ai-accent-text);border-color:rgba(168,85,247,0.3);}
    .chat-train-form{margin-top:8px;display:flex;flex-direction:column;gap:6px;}
    .chat-train-textarea{padding:8px 10px;background:var(--bg-elev-2);border:1px solid var(--border-strong);border-radius:8px;color:var(--text);font-size:12px;font-family:inherit;resize:none;outline:none;overflow-y:auto;}
    .chat-train-textarea:focus{border-color:rgba(168,85,247,0.5);}
    @media(max-width:1024px){.agents-grid{grid-template-columns:1fr 1fr;}.chat-layout{grid-template-columns:1fr;height:auto;}}
    @media(max-width:680px){.agents-grid{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<!-- Hash-redirects: stuur oude deep-links door naar de juiste module -->
<script>
  (function () {
    var h = location.hash;
    if (h === '#vergaderruimte' || h === '#vergadering') {
      window.location.replace('/modules/meetings.html');
      throw new Error('redirect');
    }
    if (h === '#control-center' || h === '#cc' || h === '#approvals') {
      window.location.replace('/modules/control-center.html');
      throw new Error('redirect');
    }
  })();
</script>

<div id="sidebar-mount"></div>

<div class="main">
  <div class="main-inner">

    <!-- ══ VIEW: OVERVIEW ══ -->
    <div id="viewOverview">
      <div class="page-header">
        <div>
          <div class="page-title">AI Agents · De Forex Opleiding</div>
          <div class="page-sub">Jouw team van intelligente medewerkers</div>
        </div>
        <div class="header-actions">
          <a href="meetings.html" class="btn btn-primary">🏛️ Vergaderruimte</a>
        </div>
      </div>
      <div class="agents-grid" id="agentsGrid"></div>
    </div>

    <!-- ══ VIEW: CHAT ══ -->
    <div id="viewChat" class="hidden">
      <div class="page-header" style="margin-bottom:16px">
        <div>
          <button class="btn" onclick="showView('overview')" style="margin-bottom:8px">← Terug</button>
          <div class="page-title" id="chatPageTitle">Chat</div>
        </div>
      </div>
      <div class="chat-layout">
        <div class="chat-sidebar">
          <div id="chatAgentAvatar" style="margin-bottom:12px;text-align:center"></div>
          <div class="chat-agent-name" id="chatAgentName"></div>
          <div class="chat-agent-role" id="chatAgentRole"></div>
          <div class="chat-caps-title">Capabilities</div>
          <div id="chatCaps"></div>
        </div>
        <div class="chat-main">
          <div class="chat-header">
            <div id="chatHeaderEmoji" style="font-size:18px"></div>
            <div class="chat-title" id="chatHeaderTitle"></div>
            <button class="btn-sm" id="newSessionBtn" style="margin-left:auto" title="Nieuwe sessie starten">+ Nieuwe sessie</button>
            <button class="btn-sm js-report-btn" onclick="generateReport()">📊 Rapport</button>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-input-area">
            <div class="chat-input-row">
              <textarea class="chat-input" id="chatInput" rows="2" placeholder="Typ je bericht..." onkeydown="handleChatKey(event)"></textarea>
              <button class="chat-send" onclick="sendChat()">→</button>
            </div>
            <div class="quick-btns" id="quickBtns"></div>
            <div style="font-size:11px;color:var(--text-faint);margin-top:6px">💡 Wil je Simon een regel leren? Gebruik <strong style="color:var(--text-dim)">✏️ Train mij</strong> op een antwoord, niet 👍</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
  <script src="/modules/shared/theme-shared.js"></script>
<script>
const { esc, formatMd, showToast } = AgentShared;

// ═══════════════════════════════════
// AGENT DEFINITIONS
// ═══════════════════════════════════
const AGENTS_FALLBACK = [
  { id: null, name:'Simon', role:'E-mail Agent', department:'Communicatie', avatar_color:'#1a5773', avatar_emoji:'📧', module_url:'/modules/email.html',
    capabilities:['E-mails categoriseren','AI antwoorden genereren','Leads tellen','Kennisbank vullen','Rapporten genereren'],
    quick_actions:[{key:'dagrapport',label:'📊 Dagrapport'},{key:'inbox_status',label:'📧 Inbox status'},{key:'heranalyseer',label:'🔄 Heranalyseer'},{key:'train_agent',label:'📚 Train agent'}] },
  { id: null, name:'Leon',  role:'Administratief Medewerker', department:'Administratie', avatar_color:'#1D9E75', avatar_emoji:'📋', module_url:null,
    capabilities:['Documenten beheren','Contracten opstellen','Klanten onboarden','Taken coördineren','Rapporten maken'],
    quick_actions:[{key:'taken_overzicht',label:'📋 Taken overzicht'},{key:'openstaande_contracten',label:'📄 Contracten'},{key:'rapport',label:'📊 Rapport'}] },
  { id: null, name:'Aron',  role:'Financieel Medewerker', department:'Financiën', avatar_color:'#EF9F27', avatar_emoji:'💰', module_url:null,
    capabilities:['Facturen opvolgen','Wanbetalers beheren','Financiële rapporten','Teamleader koppeling','Betalingsherinneringen'],
    quick_actions:[{key:'openstaande_facturen',label:'💸 Facturen'},{key:'betalingen',label:'💳 Betalingen'},{key:'rapport',label:'📊 Rapport'}] },
];

// ── Avatars via DiceBear (agent-shared.js levert getAvatarUrl) ────────────────

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════
let agents = [];
let activeAgent = null;
let chatHistory = [];
let chatSessionId = 'session_' + Date.now();
let chatHistoryLoaded = false;
let lastUserMessage = '';

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
async function init() {
  await window._authSharedReady;
  const profile = await window.AuthShared.requireAuth();
  if (!profile) return;
  // adminNavLink wordt nu centraal door sidebar.js gegate (RBAC-voorbereiding)
  try {
    const r    = await window.AgentShared.apiFetch('/api/agents');
    const data = await r.json();
    if (data.agents?.length) {
      agents = data.agents.map(a => {
        const fb = AGENTS_FALLBACK.find(f => f.name === a.name);
        return { ...a, quick_actions: fb?.quick_actions || [], capabilities: a.capabilities || fb?.capabilities || [] };
      });
    } else { agents = AGENTS_FALLBACK; }
  } catch { agents = AGENTS_FALLBACK; }
  renderOverview();

  document.getElementById('newSessionBtn')?.addEventListener('click', () => {
    if (!activeAgent) return;
    if (!confirm(`Nieuwe sessie starten met ${activeAgent.name}? De huidige chat verdwijnt van het scherm (geschiedenis blijft bewaard in de database).`)) return;
    startFreshSession();
  });

  // Laad approval badge voor CC link
  AgentShared.loadApprovals();
}

// ═══════════════════════════════════
// VIEW MANAGEMENT
// ═══════════════════════════════════
function showView(view, agent) {
  document.getElementById('viewOverview').classList.toggle('hidden', view !== 'overview');
  document.getElementById('viewChat').classList.toggle('hidden', view !== 'chat');
  if (view === 'chat' && agent) openChat(agent);
}

// ═══════════════════════════════════
// OVERVIEW
// ═══════════════════════════════════
function renderOverview() {
  const grid = document.getElementById('agentsGrid');
  grid.innerHTML = agents.map(a => {
    const caps = (a.capabilities || []).slice(0, 4).map(c =>
      `<div class="cap-item"><span class="cap-dot" style="background:${a.avatar_color}"></span>${esc(c)}</div>`
    ).join('');
    const moduleLink = a.module_url ? `<a href="${esc(a.module_url)}" class="module-link" style="color:${a.avatar_color}" target="_blank">Module openen →</a>` : '';
    return `
      <div class="agent-card">
        <div class="avatar-wrap" onclick="showView('chat','${esc(a.name)}')" style="cursor:pointer">
          <img src="${esc(AgentShared.getAvatarUrl(a.name))}"
            style="width:90px;height:90px;border-radius:50%;border:2px solid ${a.avatar_color}40;background:var(--surface-2);display:block;object-fit:cover"
            alt="${esc(a.name)}" loading="lazy"/>
        </div>
        <div class="agent-name" style="color:${a.avatar_color}">${esc(a.name)}</div>
        <div class="agent-role">${esc(a.role)}</div>
        <div class="agent-dept">${esc(a.department)}</div>
        <div class="status-dot">Actief</div>
        ${moduleLink}
        <div class="caps-list">${caps}</div>
        <div class="card-actions">
          <button class="btn-sm" style="border-color:${a.avatar_color}40;color:${a.avatar_color}" onclick="showView('chat','${esc(a.name)}')">💬 Chat</button>
          <button class="btn-sm js-report-btn" onclick="generateReportFor('${esc(a.name)}')">📊 Rapport</button>
        </div>
      </div>`;
  }).join('');
}

// ═══════════════════════════════════
// CHAT
// ═══════════════════════════════════
async function openChat(agentName) {
  activeAgent = agents.find(a => a.name === agentName);
  if (!activeAgent) return;

  document.getElementById('chatPageTitle').textContent = `Chat met ${activeAgent.name}`;
  document.getElementById('chatHeaderTitle').textContent = `${activeAgent.name} — ${activeAgent.role}`;
  document.getElementById('chatHeaderEmoji').textContent = activeAgent.avatar_emoji || '🤖';
  document.getElementById('chatAgentName').textContent = activeAgent.name;
  document.getElementById('chatAgentRole').textContent = activeAgent.role + ' · ' + activeAgent.department;
  document.getElementById('chatAgentAvatar').innerHTML = `<img src="${AgentShared.getAvatarUrl(activeAgent.name)}"
    style="width:80px;height:80px;border-radius:50%;border:2px solid ${activeAgent.avatar_color}40;background:var(--surface-2);object-fit:cover"
    alt="${AgentShared.esc(activeAgent.name)}" loading="lazy"/>`;
  document.getElementById('chatCaps').innerHTML = (activeAgent.capabilities || []).map(c =>
    `<div class="chat-cap"><span style="width:5px;height:5px;border-radius:50%;background:${activeAgent.avatar_color};flex-shrink:0"></span>${esc(c)}</div>`
  ).join('');

  const qa = activeAgent.quick_actions || [];
  document.getElementById('quickBtns').innerHTML = qa.map(q =>
    `<button class="quick-btn" onclick="sendQuickAction('${q.key}')">${q.label}</button>`
  ).join('');

  chatHistory = [];
  lastUserMessage = '';
  chatHistoryLoaded = false;
  const msgs = document.getElementById('chatMessages');
  msgs.innerHTML = '<div style="color:var(--text-faint);text-align:center;padding:32px;font-size:13px">Geschiedenis laden…</div>';

  const lsKey      = `agent_active_session_${activeAgent.name}`;
  const savedSession = localStorage.getItem(lsKey);

  try {
    const url = savedSession
      ? `/api/agent-conversations?session=${encodeURIComponent(savedSession)}`
      : `/api/agent-conversations?agent_name=${encodeURIComponent(activeAgent.name)}`;

    const r = await window.AgentShared.apiFetch(url);
    if (r.ok) {
      const data = await r.json();
      const sid  = data.session_id || savedSession || ('session_' + Date.now());
      chatSessionId = sid;
      localStorage.setItem(lsKey, sid);
      if (data.messages?.length > 0) {
        msgs.innerHTML = '';
        data.messages.forEach(m => addChatMsg(m.role === 'user' ? 'user' : 'assistant', m.content, false));
        chatHistoryLoaded = true;
        msgs.scrollTop = msgs.scrollHeight;
        return;
      }
    }
  } catch (e) {
    console.warn('[agents] history laden fout:', e.message);
  }

  chatHistory = [];
  lastUserMessage = '';
  chatHistoryLoaded = false;
  msgs.innerHTML = '';
  const hour  = new Date().getHours();
  const greet = hour < 12 ? 'Goedemorgen' : hour < 18 ? 'Goedemiddag' : 'Goedenavond';
  addChatMsg('assistant', `${greet} Jeffrey! Ik ben ${activeAgent.name}, jouw ${activeAgent.role}. Hoe kan ik je vandaag helpen?`);
}

function startFreshSession() {
  chatHistory = [];
  lastUserMessage = '';
  chatHistoryLoaded = false;
  chatSessionId = 'session_' + Date.now();
  if (activeAgent) localStorage.setItem(`agent_active_session_${activeAgent.name}`, chatSessionId);
  document.getElementById('chatMessages').innerHTML = '';
  const hour  = new Date().getHours();
  const greet = hour < 12 ? 'Goedemorgen' : hour < 18 ? 'Goedemiddag' : 'Goedenavond';
  addChatMsg('assistant', `${greet} Jeffrey! Ik ben ${activeAgent.name}, jouw ${activeAgent.role}. Hoe kan ik je vandaag helpen?`);
}

function showSearchingHint(agentName) {
  const TOOL_HINTS = {
    Simon: ['📊 Email statistieken ophalen…','✅ Open taken controleren…','🔍 Inbox doorzoeken…','📬 Onbeantwoorde mails checken…','🧠 Kennisbank raadplegen…','📈 Categorisatie-prestaties analyseren…'],
    Leon:  ['✅ Taken bekijken…'],
    Aron:  ['✅ Taken bekijken…'],
  };
  const hints   = TOOL_HINTS[agentName] || ['🔍 Gegevens ophalen…'];
  let i = 0;
  const ti = document.getElementById('typingIndicator');
  if (!ti) return null;
  const typingDiv = ti.querySelector('.typing');
  if (!typingDiv || ti.querySelector('.typing-note')) return null;
  const noteEl = document.createElement('div');
  noteEl.className = 'typing-note';
  noteEl.textContent = hints[0];
  typingDiv.insertAdjacentElement('afterend', noteEl);
  const interval = setInterval(() => { i = (i + 1) % hints.length; noteEl.textContent = hints[i]; }, 2500);
  return interval;
}

function addChatMsg(role, content, pushToHistory = true, toolsUsed = []) {
  const msgs   = document.getElementById('chatMessages');
  const isUser = role === 'user';
  const color  = isUser ? '#688b9b' : (activeAgent?.avatar_color || '#1a5773');
  const timeStr = new Date().toLocaleTimeString('nl-NL', { hour:'2-digit', minute:'2-digit' });
  const triggerForFeedback = isUser ? '' : lastUserMessage;
  if (isUser) lastUserMessage = content;

  const avatarHtml = isUser
    ? `<div class="msg-avatar" style="background:${color}22;color:${color}">JB</div>`
    : `<img src="${AgentShared.getAvatarUrl(activeAgent?.name || '')}"
        style="width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1px solid ${color}40;background:var(--surface-2);object-fit:cover"
        alt="${AgentShared.esc(activeAgent?.name || '')}" loading="lazy"/>`;

  const div = document.createElement('div');
  div.className = `msg msg-${isUser ? 'user' : 'agent'}`;

  if (isUser) {
    div.innerHTML = `
      ${avatarHtml}
      <div>
        <div class="msg-bubble">${formatMd(esc(content))}</div>
        <div class="msg-time">${timeStr}</div>
      </div>`;
  } else {
    div.innerHTML = `
      ${avatarHtml}
      <div style="min-width:0;flex:1">
        <div class="msg-bubble">${formatMd(esc(content))}</div>
        <div class="msg-time">${timeStr}</div>
        ${(toolsUsed || []).length > 0 ? `<div class="tools-used-note">🔧 ${toolsUsed.join(', ')}</div>` : ''}
        <div class="chat-msg-actions">
          <button class="chat-like-btn" title="Goed voorbeeld — markeer dit antwoord als ideale stijl">👍</button>
          <button class="chat-train-btn" title="Leer mij een specifieke regel of correctie">✏️ Train mij</button>
        </div>
      </div>`;
    const likeBtn  = div.querySelector('.chat-like-btn');
    const trainBtn = div.querySelector('.chat-train-btn');
    likeBtn.addEventListener('click',  () => saveLearning(triggerForFeedback, content, likeBtn));
    trainBtn.addEventListener('click', () => toggleTrainForm(div, triggerForFeedback));
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  if (pushToHistory) chatHistory.push({ role: isUser ? 'user' : 'assistant', content });
}

function showTyping() {
  const msgs  = document.getElementById('chatMessages');
  const color = activeAgent?.avatar_color || '#1a5773';
  const div   = document.createElement('div');
  div.className = 'msg msg-agent';
  div.id = 'typingIndicator';
  div.innerHTML = `<img src="${AgentShared.getAvatarUrl(activeAgent?.name || '')}"
    style="width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1px solid ${color}40;background:var(--surface-2);object-fit:cover"
    alt="${AgentShared.esc(activeAgent?.name || '')}" loading="lazy"/>
    <div class="typing"><span></span><span></span><span></span></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

async function sendChat(message) {
  const input = document.getElementById('chatInput');
  const msg   = (message || input.value).trim();
  if (!msg || !activeAgent) return;
  input.value = '';
  const lsKey = `agent_active_session_${activeAgent.name}`;
  if (!localStorage.getItem(lsKey)) localStorage.setItem(lsKey, chatSessionId);
  addChatMsg('user', msg);
  showTyping();
  let hintInterval = null;
  const searchHint = setTimeout(() => { hintInterval = showSearchingHint(activeAgent.name); }, 1500);
  try {
    const r = await window.AgentShared.apiFetch('/api/agent-chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_id: activeAgent.id, agent_name: activeAgent.name, message: msg, conversation_history: chatHistory.slice(-20), session_id: chatSessionId }),
    });
    clearTimeout(searchHint);
    if (hintInterval) { clearInterval(hintInterval); hintInterval = null; }
    const data = await r.json();
    removeTyping();
    if (data.error) { addChatMsg('assistant', `⚠️ ${data.error}`); }
    else {
      addChatMsg('assistant', data.response, true, data.tools_used);
      if (data.pending_approvals?.length) addInlineApprovalCards(data.pending_approvals);
    }
  } catch (err) {
    clearTimeout(searchHint);
    if (hintInterval) { clearInterval(hintInterval); hintInterval = null; }
    removeTyping();
    addChatMsg('assistant', '⚠️ Verbindingsfout. Probeer opnieuw.');
  }
}

async function sendQuickAction(key) {
  if (!activeAgent) return;
  const lsKey = `agent_active_session_${activeAgent.name}`;
  if (!localStorage.getItem(lsKey)) localStorage.setItem(lsKey, chatSessionId);
  const qa = activeAgent.quick_actions?.find(q => q.key === key);
  if (qa) addChatMsg('user', qa.label);

    });

    if (hintInterval) { clearInterval(hintInterval); hintInterval = null; }
    const data = await r.json();
    removeTyping();
    if (data.error) { addChatMsg('assistant', `⚠️ ${data.error}`); }
    else {
      addChatMsg('assistant', data.response, true, data.tools_used);
      if (data.pending_approvals?.length) addInlineApprovalCards(data.pending_approvals);
    }
  } catch {
    clearTimeout(searchHint);
    if (hintInterval) { clearInterval(hintInterval); hintInterval = null; }

  }
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
}

// ═══════════════════════════════════
// RAPPORT
// ═══════════════════════════════════
async function generateReport() { generateReportFor(activeAgent?.name); }

async function generateReportFor(agentName) {
  const agent = agents.find(a => a.name === agentName);
  if (!agent) return;
  AgentShared.showReport(`📊 Dagrapport — ${agent.name}`, 'Rapport genereren…');
  document.getElementById('reportContent').innerHTML = '<div style="color:var(--text-faint);text-align:center;padding:32px">Rapport genereren…</div>';
  try {
    const r    = await window.AgentShared.apiFetch('/api/agent-report', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent_id: agent.id, agent_name: agent.name, report_type: 'dagrapport' }),
    });
    const data = await r.json();
    document.getElementById('reportContent').innerHTML = data.error
      ? `<div style="color:var(--red)">⚠️ ${esc(data.error)}</div>`
      : formatMd(esc(data.report || ''));
  } catch {
    document.getElementById('reportContent').innerHTML = '<div style="color:var(--red)">⚠️ Kon rapport niet genereren.</div>';
  }
}

// ═══════════════════════════════════
// LEARNING FEEDBACK
// ═══════════════════════════════════
async function saveLearning(triggerText, idealResponse, btn) {
  if (!triggerText || !idealResponse || !activeAgent) {
    showToast('Geen context beschikbaar voor opslaan', 'error');
    return;
  }
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/agent-learnings', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ agent_id: activeAgent.id || null, agent_name: activeAgent.name, trigger_text: triggerText, ideal_response: idealResponse }),
    });
    const data = await r.json();
    if (data.ok) { showToast('Goed onthouden! ✓'); if (btn) { btn.textContent = '✓'; btn.style.color = 'var(--green)'; } }
    else { showToast('Opslaan mislukt: ' + (data.error || '?'), 'error'); if (btn) { btn.disabled = false; btn.textContent = '👍'; } }
  } catch {
    showToast('Verbindingsfout bij opslaan', 'error');
    if (btn) { btn.disabled = false; btn.textContent = '👍'; }
  }
}

function toggleTrainForm(msgDiv, triggerText) {
  const existing = msgDiv.querySelector('.chat-train-form');
  if (existing) { existing.remove(); return; }
  const form  = document.createElement('div');
  form.className = 'chat-train-form';
  const ta    = document.createElement('textarea');
  ta.className = 'chat-train-textarea';
  ta.rows = 1;
  ta.placeholder = 'Typ het ideale antwoord…';
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    const lh   = parseFloat(getComputedStyle(ta).lineHeight) || 20;
    const maxH = lh * 3 + 16;
    ta.style.height = Math.min(ta.scrollHeight, maxH) + 'px';
    ta.style.overflowY = ta.scrollHeight > maxH ? 'auto' : 'hidden';
  });
  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-sm';
  saveBtn.textContent = 'Opslaan';
  saveBtn.addEventListener('click', async () => {
    const val = ta.value.trim();
    if (!val) return;
    saveBtn.disabled = true;
    saveBtn.textContent = 'Opslaan…';
    await saveLearning(triggerText, val, null);
    form.remove();
  });
  form.appendChild(ta);
  form.appendChild(saveBtn);
  const actionsDiv = msgDiv.querySelector('.chat-msg-actions');
  if (actionsDiv) actionsDiv.after(form);
  ta.focus();
}

// ═══════════════════════════════════
// INLINE APPROVAL (Pad 1 — vanuit chat)
// ═══════════════════════════════════
function addInlineApprovalCards(approvals) {
  const msgs = document.getElementById('chatMessages');
  if (!msgs || !approvals?.length) return;
  const color = activeAgent?.avatar_color || '#1a5773';
  for (const ap of approvals) {
    const items = ap.preview || [];
    const previewHtml = items.length
      ? items.map((item, idx) => {
          const label   = esc(item.subject || item.titel || item.title || item.task_title || `Item ${idx + 1}`);
          const details = Object.entries(item)
            .filter(([k]) => !['subject','titel','title','task_title'].includes(k))
            .map(([k, v]) => `<span style="color:var(--text-faint)">${esc(k)}:</span> ${esc(String(v ?? '').slice(0, 80))}`).join('  ·  ');
          return `<div style="padding:8px 10px;background:var(--bg-elev);border-radius:6px;margin-top:6px">
            <div style="font-size:11px;font-weight:600;margin-bottom:3px">${label}</div>
            <div style="font-size:10px;line-height:1.5">${details}</div>
          </div>`;
        }).join('')
      : '';
    const wrapper = document.createElement('div');
    wrapper.className = 'msg msg-agent';
    wrapper.innerHTML = `
      <img src="${AgentShared.getAvatarUrl(activeAgent?.name || '')}"
        style="width:36px;height:36px;border-radius:50%;flex-shrink:0;border:1px solid ${color}40;background:var(--surface-2);object-fit:cover"
        alt="${AgentShared.esc(activeAgent?.name || '')}" loading="lazy"/>
      <div class="inline-approval-card" id="apcard-${ap.approval_id}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <span style="font-size:14px">🔔</span>
          <span style="font-size:13px;font-weight:600;flex:1">${esc(ap.title || ap.action_type)}</span>
          ${ap.description ? `<span style="font-size:10px;color:var(--text-faint)">${esc(ap.description)}</span>` : ''}
        </div>
        ${previewHtml}
        <div class="inline-approval-actions">
          <button class="btn btn-sm" style="background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25)"
            onclick="inlineReject('${ap.approval_id}',this)">✗ Afkeuren</button>
          <button class="btn btn-sm btn-primary"
            onclick="inlineApprove('${ap.approval_id}',this)">✓ Goedkeuren</button>
        </div>
      </div>`;
    msgs.appendChild(wrapper);
  }
  msgs.scrollTop = msgs.scrollHeight;
}

async function inlineApprove(approvalId, btn) {
  if (btn) { btn.disabled = true; btn.textContent = 'Uitvoeren…'; }
  const data = await handleInlineApproval(approvalId, 'approve');
  const card = document.getElementById(`apcard-${approvalId}`);
  if (data?.ok !== false && !data?.error) {
    if (card) card.innerHTML = `<div style="color:var(--green);font-size:12px;padding:6px">✓ Uitgevoerd${data?.executed ? ` (${data.executed} actie${data.executed > 1 ? 's' : ''})` : ''}</div>`;
    showToast(data?.executed ? `${data.executed} actie(s) uitgevoerd ✓` : 'Goedgekeurd ✓', 'success');
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '✓ Goedkeuren'; }
    showToast('Fout: ' + (data?.errors?.[0] || data?.error || 'onbekend'), 'error');
  }
}

async function inlineReject(approvalId, btn) {
  if (btn) { btn.disabled = true; }
  await handleInlineApproval(approvalId, 'reject');
  const card = document.getElementById(`apcard-${approvalId}`);
  if (card) card.innerHTML = `<div style="color:var(--text-faint);font-size:12px;padding:6px">✗ Afgewezen</div>`;
  showToast('Afgewezen', 'error');
}

async function handleInlineApproval(approvalId, action) {
  try {
    const res  = await window.AgentShared.apiFetch('/api/agent-approval', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ action, approval_id: approvalId, approved_item_indices: null, decided_by: 'Jeffrey' }),
    });
    const data = await res.json();
    // Refresh CC badge
    AgentShared.loadApprovals();
    return data;
  } catch (e) { return { ok: false, error: e.message }; }
}

init();
if (window._authSharedReady) {
  window._authSharedReady.then(() => window.AgentShared?.renderUserSection());
}

<script>
// RBAC frontend-gating (fail-open) — AI Agents. super_admin = alles.
// view.overview/view.chat + train.rule/example.mark_good niet gegate
// (geen stabiele selector / showView-gedreven) — server is echte verdediging.
(function () {
  var RULES = [
    ['#newSessionBtn', 'agents.session.new'],
    ['.chat-send', 'agents.chat.use'],
    ['#chatInput', 'agents.chat.use'],
    ['.quick-btn', 'agents.chat.use'],
    ['.js-report-btn', 'agents.report.generate'],
    ['.inline-approval-actions', 'agents.approval.act']
  ];
  async function applyRbacGating() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch (e) {}
    if (!window.RBAC || typeof window.RBAC.ensurePermissionsLoaded !== 'function') return;
    var perms;
    try { perms = await window.RBAC.ensurePermissionsLoaded(); } catch (e) { return; }
    var roles = (typeof window.RBAC.getUserRoles === 'function' && window.RBAC.getUserRoles()) || [];
    if (!roles.length) return;
    if (perms.has('*')) return;
    var css = RULES.filter(function (r) { return !perms.has(r[1]); })
      .map(function (r) { return r[0] + '{display:none !important;}'; }).join('\n');
    if (css) { var st = document.createElement('style'); st.id = 'rbac-gating'; st.textContent = css; document.head.appendChild(st); }
  }
  applyRbacGating();
})();
</script>
