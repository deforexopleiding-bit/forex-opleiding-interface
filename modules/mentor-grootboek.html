<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor-grootboek · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1280px; }
    .redirect-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      max-width: 560px;
      margin: 60px auto;
      text-align: center;
    }
    .redirect-card .icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(20,115,214,0.15);
      color: #1160bd;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }
    .redirect-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .redirect-card p { font-size: 13.5px; color: var(--text-dim); margin-bottom: 18px; line-height: 1.5; }
    .redirect-card .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--brand-primary, #093d54);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
    }
    .redirect-card .btn-primary:hover { opacity: .9; }
    @media (max-width: 880px) { .app { margin-left: 0; padding: 14px; } }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <!-- PR-A — Mentor-grootboek is verhuisd naar Events → Mentor-grootboek-tab.
       Tab-button + endpoint mentor-ledger-overview + RBAC mentor.ledger.view
       blijven exact gelijk. Deze pagina toont alleen een doorverwijs-banner
       zodat bestaande bookmarks niet breken. -->
  <div class="redirect-card">
    <div class="icon"><i class="ti ti-arrow-right"></i></div>
    <h2>Mentor-grootboek is verhuisd</h2>
    <p>
      Het mentor-grootboek vind je nu in <strong>Events → Mentor-grootboek</strong>.
      Endpoints, scope-gating en RBAC zijn ongewijzigd.
    </p>
    <a href="/modules/events.html#mentor-grootboek" class="btn-primary">
      <i class="ti ti-external-link"></i> Open in Events
    </a>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
</body>
</html>
