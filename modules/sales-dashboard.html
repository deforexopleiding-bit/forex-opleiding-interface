<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Dashboard — Agency Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="shared/agent-shared.css">
  <script src="shared/supabase-client.js"></script>
  <script src="shared/agent-shared.js"></script>
  <script src="shared/theme-shared.js"></script>
  <style>
    :root { --fg: var(--text-primary); --muted: var(--text-secondary); --card-bg: var(--surface-card); }
    .main-content { margin-left: var(--sidebar-w, 220px); min-height: 100vh; padding: 28px 28px 64px; max-width: 1280px; }

    .sd-header { display:flex; align-items:baseline; justify-content:space-between; margin: 4px 0 24px; gap: 16px; flex-wrap: wrap; }
    .sd-header h1 { font-size: 22px; font-weight: 700; margin: 0; color: var(--fg); }
    .sd-header .sd-sub { font-size: 13px; color: var(--muted); }

    .sd-section-title { font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--muted); margin: 0 0 10px; }

    .sd-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 0 0 24px; }
    @media (max-width: 760px) { .sd-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .sd-row { grid-template-columns: 1fr; } }

    .sd-card { background: var(--card-bg); border: 1px solid var(--border-default); border-radius: 10px; padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; min-height: 78px; }
    .sd-card .sd-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .sd-card .sd-label i { font-size: 14px; }
    .sd-card .sd-value { font-size: 24px; font-weight: 700; color: var(--fg); line-height: 1.1; }

    .sd-row-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 0 0 24px; }
    @media (max-width: 880px) { .sd-row-3 { grid-template-columns: 1fr; } }

    .sd-panel { background: var(--card-bg); border: 1px solid var(--border-default); border-radius: 10px; padding: 16px 18px; }
    .sd-panel-head { display:flex; align-items:center; justify-content:space-between; margin: 0 0 12px; }
    .sd-panel-head h3 { font-size: 14px; font-weight: 600; margin: 0; color: var(--fg); }
    .sd-panel-head .sd-count { font-size: 12px; color: var(--muted); }

    .sd-next { display: flex; flex-direction: column; gap: 6px; }
    .sd-next .sd-next-name { font-size: 18px; font-weight: 700; color: var(--fg); }
    .sd-next .sd-next-countdown { font-size: 14px; font-weight: 600; color: var(--accent-violet, #6d28d9); }
    .sd-next .sd-next-when { font-size: 12px; color: var(--muted); }
    .sd-next .sd-empty { font-size: 13px; color: var(--muted); font-style: italic; }

    /* Open-acties-panel — totaal-getal + 4 sub-counts (zoals follow-up "ACTIE NODIG"). */
    .sd-oa-total-link { display: block; color: inherit; text-decoration: none; margin: 0 0 8px; }
    .sd-oa-total { font-size: 28px; font-weight: 700; color: var(--fg); line-height: 1.1; }
    .sd-oa-total.is-zero { color: var(--muted); }
    .sd-oa-total-link:hover .sd-oa-total { text-decoration: underline; }
    .sd-oa-sub { display: flex; flex-direction: column; gap: 2px; }
    .sd-oa-sub-link {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 13px; color: var(--fg); text-decoration: none;
      padding: 6px 8px; margin: 0 -8px; border-radius: 6px;
    }
    .sd-oa-sub-link:hover { background: var(--surface-subtle, rgba(0,0,0,0.04)); }
    .sd-oa-sub-link .sd-oa-sub-label { color: var(--muted); }
    .sd-oa-sub-link .sd-oa-sub-value { font-weight: 600; }
    .sd-oa-hint { font-size: 11px; color: var(--muted); margin: 8px 0 0; font-style: italic; }

    .sd-row-extra { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 560px) { .sd-row-extra { grid-template-columns: 1fr; } }

    .sd-loading { font-size: 13px; color: var(--muted); padding: 14px 0; }
    .sd-error { font-size: 13px; color: #dc2626; padding: 14px 16px; background: rgba(220,38,38,0.08); border: 1px solid rgba(220,38,38,0.2); border-radius: 8px; margin: 0 0 24px; }

  </style>
</head>
<body>
  <div id="sidebar-mount"></div>

  <main class="main-content">
    <div class="sd-header">
      <div>
        <h1>Sales Dashboard</h1>
        <div class="sd-sub" id="sd-greeting">Welkom</div>
      </div>
      <div class="sd-sub" id="sd-refreshed"></div>
    </div>

    <div id="sd-error" class="sd-error" style="display:none"></div>
    <div id="sd-loading" class="sd-loading">Statistieken laden…</div>

    <div id="sd-content" style="display:none">
      <h2 class="sd-section-title">Vandaag</h2>
      <div class="sd-row">
        <div class="sd-card"><div class="sd-label"><i class="ti ti-user-plus"></i>Nieuwe leads</div><div class="sd-value" id="sd-today-leads">–</div></div>
        <div class="sd-card"><div class="sd-label"><i class="ti ti-calendar-event"></i>Event-aanmeldingen</div><div class="sd-value" id="sd-today-events">–</div></div>
        <div class="sd-card"><div class="sd-label"><i class="ti ti-calendar-stats"></i>Afspraken</div><div class="sd-value" id="sd-today-appts">–</div></div>
      </div>

      <h2 class="sd-section-title">Deze week</h2>
      <div class="sd-row">
        <div class="sd-card"><div class="sd-label"><i class="ti ti-user-plus"></i>Nieuwe leads</div><div class="sd-value" id="sd-week-leads">–</div></div>
        <div class="sd-card"><div class="sd-label"><i class="ti ti-calendar-event"></i>Event-aanmeldingen</div><div class="sd-value" id="sd-week-events">–</div></div>
        <div class="sd-card"><div class="sd-label"><i class="ti ti-calendar-stats"></i>Afspraken</div><div class="sd-value" id="sd-week-appts">–</div></div>
      </div>

      <h2 class="sd-section-title">Werkvoorraad</h2>
      <div class="sd-row-extra" style="margin-bottom: 12px">
        <div class="sd-card"><div class="sd-label"><i class="ti ti-calendar-due"></i>Afspraken morgen</div><div class="sd-value" id="sd-tomorrow-appts">–</div></div>
        <div class="sd-card"><div class="sd-label"><i class="ti ti-list-check"></i>Open follow-ups</div><div class="sd-value" id="sd-open-followups">–</div></div>
      </div>

      <!-- Open acties widget tijdelijk verborgen — definitie nog niet correct,
           zie commit historie sales-open-acties. Render-code in JS blijft staan
           zodat re-enable straks alleen het tweede sd-panel terugzet. -->
      <div class="sd-panel">
        <div class="sd-panel-head"><h3>Volgende afspraak</h3></div>
        <div id="sd-next" class="sd-next"><span class="sd-empty">Geen geplande afspraken.</span></div>
      </div>
    </div>
  </main>

  <script>
    const ALLOWED_ROLES = ['super_admin', 'admin', 'manager', 'sales'];
    const PAGE_FEATURE  = 'dashboard.sales.view';

    let currentProfile = null;

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // 5-level countdown: "nu" / "over X min" / "over Xu" / "morgen HH:MM" /
    // "{weekdag} HH:MM" (binnen 7 dagen) / "DD MMM HH:MM" (verder).
    function formatCountdown(iso) {
      const target = new Date(iso);
      const now    = new Date();
      const diffMs = target.getTime() - now.getTime();
      const diffMin = Math.round(diffMs / 60000);
      if (diffMin < 5)   return 'nu';
      if (diffMin < 60)  return `over ${diffMin} min`;
      const diffHr = Math.floor(diffMin / 60);
      const sameCalDay = target.toDateString() === now.toDateString();
      if (sameCalDay)    return `over ${diffHr}u`;
      const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
      const hhmm = target.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      if (target.toDateString() === tomorrow.toDateString()) return `morgen ${hhmm}`;
      const daysDiff = Math.floor((target - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / (24*60*60*1000));
      if (daysDiff < 7) {
        const wkd = target.toLocaleDateString('nl-NL', { weekday: 'long' });
        return `${wkd} ${hhmm}`;
      }
      const dm = target.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short' });
      return `${dm} ${hhmm}`;
    }

    function setVal(id, v) { const el = document.getElementById(id); if (el) el.textContent = String(v ?? 0); }

    function renderNext(next) {
      const box = document.getElementById('sd-next');
      if (!next) { box.innerHTML = '<span class="sd-empty">Geen geplande afspraken.</span>'; return; }
      const when = new Date(next.scheduled_at).toLocaleString('nl-NL', {
        weekday: 'short', day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit',
      });
      box.innerHTML =
        '<div class="sd-next-name">' + escapeHtml(next.lead_name) + '</div>' +
        '<div class="sd-next-countdown">' + escapeHtml(formatCountdown(next.scheduled_at)) + '</div>' +
        '<div class="sd-next-when">' + escapeHtml(when) + '</div>';
    }

    function renderOpenActies(openActies) {
      const totalEl = document.getElementById('sd-oa-total');
      if (!totalEl) return; // widget tijdelijk verborgen — niets te renderen
      const o = openActies || {};
      const total = o.total || 0;
      totalEl.textContent = total;
      totalEl.classList.toggle('is-zero', total === 0);
      setVal('sd-oa-opvolgingen', o.opvolgingen);
      setVal('sd-oa-outcomes',    o.outcomes);
      setVal('sd-oa-wacht',       o.wacht_reschedule);
      setVal('sd-oa-voicememos',  o.voicememos);
    }

    function showError(msg) {
      document.getElementById('sd-loading').style.display = 'none';
      const e = document.getElementById('sd-error');
      e.textContent = msg;
      e.style.display = '';
    }

    async function loadStats() {
      try {
        const token = await window.AuthShared.getAccessToken();
        const r = await fetch('/api/sales-dashboard-stats', { headers: { 'Authorization': 'Bearer ' + token } });
        if (r.status === 403) { showError('Geen toegang tot sales-statistieken.'); return; }
        if (!r.ok) { showError('Statistieken laden mislukt (status ' + r.status + ').'); return; }
        const data = await r.json();

        setVal('sd-today-leads',   data.today?.leads);
        setVal('sd-today-events',  data.today?.events);
        setVal('sd-today-appts',   data.today?.appointments);
        setVal('sd-week-leads',    data.week?.leads);
        setVal('sd-week-events',   data.week?.events);
        setVal('sd-week-appts',    data.week?.appointments);
        setVal('sd-tomorrow-appts',data.appointments_tomorrow_count);
        setVal('sd-open-followups',data.open_follow_ups);

        renderNext(data.next_appointment);
        renderOpenActies(data.open_acties);

        document.getElementById('sd-loading').style.display = 'none';
        document.getElementById('sd-content').style.display = '';
        document.getElementById('sd-refreshed').textContent =
          'Bijgewerkt om ' + new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      } catch (err) {
        console.error('[sales-dashboard] load error:', err);
        showError('Statistieken laden mislukt: ' + (err.message || 'onbekende fout'));
      }
    }

    // Page-level RBAC check (defense-in-depth — sidebar.js doet ook gating).
    async function rbacGate() {
      if (!window.RBAC || typeof window.RBAC.ensurePermissionsLoaded !== 'function') return true;
      try {
        const perms = await window.RBAC.ensurePermissionsLoaded();
        if (perms.has('*')) return true;
        if (perms.has(PAGE_FEATURE)) return true;
        showError('Je hebt geen rechten om dit dashboard te bekijken.');
        return false;
      } catch (e) { return true; /* fail-open */ }
    }

    async function init() {
      await window._authSharedReady;
      const profile = await window.AuthShared.requireAuth(ALLOWED_ROLES);
      if (!profile) return;
      currentProfile = profile;
      window.AgentShared?.renderUserSection(profile);
      document.getElementById('sd-greeting').textContent =
        'Welkom ' + (profile.full_name || profile.email || '') ;

      const ok = await rbacGate();
      if (!ok) return;

      await loadStats();
    }

    init();
  </script>
  <script src="/modules/shared/permissions.js"></script>
  <script src="/modules/shared/sidebar.js"></script>
</body>
</html>
