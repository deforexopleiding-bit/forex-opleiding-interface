<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offerte · De Forex Opleiding</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1000px; }
    .page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; padding-bottom:14px; border-bottom:1px solid var(--border); margin-bottom:18px; flex-wrap:wrap; }
    h1 { font-size: 20px; font-weight: 800; }
    .sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .badge { display:inline-block; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:700; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(200px,1fr)); gap:14px; margin-bottom:20px; }
    .card { background: var(--bg-elev); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .card h3 { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin-bottom:8px; }
    .row { display:flex; justify-content:space-between; font-size:12.5px; padding:3px 0; }
    .row .lbl { color:var(--text-dim); }
    table { width:100%; border-collapse:collapse; background:var(--bg-elev); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
    th { text-align:left; padding:9px 12px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); border-bottom:1px solid var(--border); }
    td { padding:10px 12px; font-size:12.5px; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .totals { margin-top:14px; max-width:320px; margin-left:auto; }
    .totals .row.big { font-weight:800; font-size:14px; border-top:1px solid var(--border); padding-top:6px; margin-top:4px; }
    .btn-danger { background: var(--red,#dc2626); color:#fff; }
    .btn-success { background:#059669; color:#fff; }

    /* Onboarding-aanmelden modal (F0.2) — minimaal modal-patroon i.l.m. de
       toast-overlay-stijl. Reactivere CSS-classes (.btn etc) komen van
       sales-redesign.css / agent-shared.css; hier alleen modal-shell. */
    .ob-modal { position:fixed; inset:0; background:rgba(15,23,42,0.45); display:none; align-items:center; justify-content:center; z-index:200; padding:14px; }
    .ob-modal.open { display:flex; }
    .ob-modal-card { background:var(--bg); border:1px solid var(--border); border-radius:12px; width:100%; max-width:520px; max-height:90vh; overflow:auto; box-shadow:0 20px 50px rgba(15,23,42,0.25); }
    .ob-modal-h { display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--border); }
    .ob-modal-h h2 { font-size:15px; font-weight:700; }
    .ob-modal-x { background:transparent; border:0; color:var(--text-dim); cursor:pointer; font-size:18px; line-height:1; padding:4px 8px; border-radius:6px; }
    .ob-modal-x:hover { background:var(--bg-elev); color:var(--text); }
    .ob-modal-body { padding:18px; }
    .ob-modal-body label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--text-faint); margin-bottom:6px; }
    .ob-modal-body .read-only { padding:8px 10px; background:var(--bg-elev); border:1px solid var(--border); border-radius:7px; font-size:13.5px; color:var(--text); margin-bottom:14px; }
    .ob-modal-body select { width:100%; padding:8px 10px; font-size:13.5px; border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); font-family:inherit; margin-bottom:14px; }
    .ob-modal-body select:disabled { opacity:0.6; cursor:not-allowed; }
    .ob-modal-body input[type="date"] { width:100%; padding:8px 10px; font-size:13.5px; border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); font-family:inherit; margin-bottom:14px; }
    /* Type-segmented (1op1 / membership) — segmented control boven het traject-veld. */
    .ob-type-switch { display:flex; gap:0; margin-bottom:14px; border:1px solid var(--border); border-radius:8px; padding:3px; background:var(--bg-elev); }
    .ob-type-switch button { flex:1; padding:8px 12px; font-size:12.5px; font-weight:600; border:0; border-radius:6px; background:transparent; color:var(--text-dim); cursor:pointer; font-family:inherit; transition:background .12s, color .12s; }
    .ob-type-switch button:hover { color:var(--text); }
    .ob-type-switch button.active { background:#0a2f63; color:#fff; }
    .ob-type-switch button.active:hover { color:#fff; }
    .ob-modal-body .ob-error { background:rgba(220,38,38,0.08); border:1px solid rgba(220,38,38,0.25); color:#b91c1c; padding:9px 11px; border-radius:7px; font-size:12.5px; margin-bottom:12px; }
    .ob-modal-body .ob-success { background:rgba(5,150,105,0.10); border:1px solid rgba(5,150,105,0.30); color:#047857; padding:11px 13px; border-radius:8px; font-size:13px; margin-bottom:12px; line-height:1.45; }
    .ob-modal-body .ob-link-row { display:flex; gap:6px; align-items:stretch; margin-top:8px; }
    .ob-modal-body .ob-link-input { flex:1; padding:7px 9px; font-size:12px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; border:1px solid var(--border); border-radius:6px; background:var(--bg-elev); color:var(--text); }
    .ob-modal-f { display:flex; justify-content:flex-end; gap:8px; padding:12px 18px; border-top:1px solid var(--border); background:var(--bg-elev); }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-head">
    <div>
      <a href="/modules/sales.html" style="font-size:12px;color:var(--text-dim);text-decoration:none">← Terug naar Sales</a>
      <h1 id="detailTitle">Offerte laden…</h1>
      <div class="sub" id="detailSub"></div>
    </div>
    <div class="actions">
      <button class="btn btn-ghost" id="refreshBtn" title="Ververs status">🔄 Vernieuwen</button>
      <button class="btn btn-ghost" id="tlSyncBtn" title="Haal live status uit Teamleader">↻ Ververs vanuit Teamleader</button>
      <span class="actions" id="detailActions"></span>
    </div>
  </div>

  <div id="detailBody"><div class="sub">Laden…</div></div>
</div>

<div class="toast" id="toast"></div>

<!-- Onboarding-aanmelden modal (F0.2). Verborgen tot user klikt op
     "Onboarding-traject aanmelden" in de actie-zone. -->
<div class="ob-modal" id="obModal" role="dialog" aria-modal="true" aria-labelledby="obModalTitle" hidden>
  <div class="ob-modal-card">
    <div class="ob-modal-h">
      <h2 id="obModalTitle">Onboarding-traject aanmelden</h2>
      <button type="button" class="ob-modal-x" id="obModalClose" aria-label="Sluiten">&times;</button>
    </div>
    <div class="ob-modal-body" id="obModalBody">
      <div id="obStepForm">
        <label>Klant</label>
        <div class="read-only" id="obCustomerLabel">—</div>
        <label>Type begeleiding</label>
        <div class="ob-type-switch" id="obTypeSwitch" role="tablist" aria-label="Type begeleiding">
          <button type="button" role="tab" data-ob-type="1op1"      aria-selected="false">1-op-1 begeleiding</button>
          <button type="button" role="tab" data-ob-type="membership" aria-selected="false">Membership</button>
        </div>
        <label for="obTrajectSel">Traject</label>
        <select id="obTrajectSel" disabled><option value="">Kies eerst een type</option></select>
        <label for="obStartDate">Startdatum</label>
        <input type="date" id="obStartDate" />
        <div style="font-size:11.5px;color:var(--text-faint);margin:-8px 0 14px;line-height:1.45">
          Vooringevuld uit de offerte. Aanpasbaar. De looptijd in Bubble loopt vanaf deze datum
          (of vanaf nu als de datum in het verleden ligt) — toegang start direct.
        </div>
        <div id="obError" class="ob-error" hidden></div>
      </div>
      <div id="obStepDone" hidden></div>
    </div>
    <div class="ob-modal-f" id="obModalFooter">
      <button type="button" class="btn btn-ghost" id="obCancelBtn">Annuleren</button>
      <button type="button" class="btn btn-success" id="obSubmitBtn" disabled>Aanmelden</button>
    </div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script>
const STATUS = { draft:{l:'Concept',c:'#64748b'}, sent:{l:'Verzonden',c:'#0891b2'}, accepted:{l:'Bevestigd',c:'#059669'}, declined:{l:'Afgewezen',c:'#b91c1c'}, expired:{l:'Verlopen',c:'#94a3b8'} };
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg,kind){ const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show '+(kind||''); setTimeout(()=>el.classList.remove('show'),2400); }
function eur(v){ return v==null?'—':'€'+Number(v).toLocaleString('nl-NL',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtDate(iso){ return iso?new Date(iso).toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'}):'—'; }
function avatarHash(n){ let h=0; const s=String(n||''); for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h%6; }
function avatarInitials(n){ const p=String(n||'').trim().split(/\s+/).filter(Boolean); return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'?'; }
function avatarHtml(n){ return `<span class="sr-avatar sr-av-${avatarHash(n)}">${esc(avatarInitials(n))}</span>`; }
const dealId = new URLSearchParams(location.search).get('id');

// State voor de F0.2 onboarding-aanmeld-knop. Pas zichtbaar als de
// gebruiker 'onboarding.create' heeft; server gate't sowieso.
let _canCreateOnb = false;
// Snapshot van de huidige customer-context voor de modal (uit render()).
let _obCtx = { customerId: null, customerName: '', startDate: null };

async function init(){
  await window._authSharedReady;
  const profile = await window.AuthShared?.requireAuth();
  if (!profile) return;
  if (window.AgentShared) await window.AgentShared.renderUserSection(profile);
  // RBAC: bepaal of de F0 onboarding-aanmeld-knop zichtbaar mag zijn.
  try {
    if (window.RBAC && typeof window.RBAC.ensurePermissionsLoaded === 'function') {
      await window.RBAC.ensurePermissionsLoaded();
      _canCreateOnb = !!window.RBAC.canSync && window.RBAC.canSync('onboarding.create');
    }
  } catch (e) { console.warn('[offerte-detail] RBAC load faalde:', e?.message || e); }
  document.getElementById('refreshBtn').addEventListener('click', () => { toast('Verversen…'); load(); });
  // Expliciete live-pull uit Teamleader: eerst sync-status, dan detail herladen.
  // sales-deal-detail syncet zelf al bij openen; deze knop is voor "ik weet dat
  // er in TL iets is veranderd, haal het nu op". Fail-soft toast bij fout.
  document.getElementById('tlSyncBtn').addEventListener('click', async () => {
    if (!dealId) return;
    const btn = document.getElementById('tlSyncBtn');
    btn.disabled = true;
    toast('TL-status ophalen…');
    try {
      const r = await window.AgentShared.apiFetch('/api/sales-deal-sync-status', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ deal_id: dealId }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        toast('Sync mislukt: ' + (d?.error || ('HTTP ' + r.status)));
      } else if (d?.updated > 0) {
        toast('Status bijgewerkt uit Teamleader.');
      } else {
        toast('Status ongewijzigd.');
      }
    } catch (e) {
      toast('Sync mislukt: ' + (e?.message || e));
    } finally {
      btn.disabled = false;
      load();
    }
  });
  // Modal-handlers één keer wiren (modal-DOM is statisch).
  _wireObModal();
  if (!dealId){ document.getElementById('detailBody').innerHTML='<div class="sub">Geen offerte-id.</div>'; return; }
  load();
}

async function load(){
  try {
    const res = await window.AgentShared.apiFetch('/api/sales-deal-detail?id='+encodeURIComponent(dealId));
    if (!res.ok) throw new Error('HTTP '+res.status);
    const d = await res.json();
    render(d);
  } catch(e){ document.getElementById('detailBody').innerHTML='<div class="sub">Laden mislukt: '+esc(e.message)+'</div>'; }
}

function render(d){
  const deal=d.deal||{}, c=d.customer||{}, lines=d.line_items||[], t=d.totals||{};
  const st=deal.tl_quotation_status||'draft';
  const sb=STATUS[st]||STATUS.draft;
  document.getElementById('detailTitle').textContent = (d.traject?.label) || `Offerte ${String(deal.id).slice(0,8)}`;
  const stCls = { draft:'gray', sent:'blue', accepted:'green', signed:'green', declined:'danger', expired:'gray' }[st] || 'gray';
  const offNr = deal.quote_reference || ('#' + String(deal.id).slice(0,8));
  const metaParts = [offNr, 'Aangemaakt ' + fmtDate(deal.created_at)];
  if (deal.tl_quotation_accepted_at) metaParts.push('Getekend ' + fmtDate(deal.tl_quotation_accepted_at));
  document.getElementById('detailSub').innerHTML = `<span class="sr-tag ${stCls}">${sb.l}</span>`
    + (deal.tl_quotation_id?` <span class="sr-tag blue">TL gekoppeld</span>`:'')
    + `<span style="color:var(--text-faint);margin-left:8px">${metaParts.map(esc).join(' · ')}</span>`;

  // BTW per tarief (zeroVat + korting-aware, identiek aan de detail-endpoint).
  const factor = 1 - (Number(deal.discount_percentage)||0)/100;
  const zeroVat = deal.sale_type && deal.sale_type !== 'domestic';
  const btwByRate = {};
  for (const l of lines) {
    const rate = zeroVat ? 0 : (Number(l.vat_percentage)||0);
    const base = Number(l.quantity)*Number(l.unit_price);
    const lineExcl = (l.price_includes_vat && rate>0 ? base/(1+rate/100) : base) * factor;
    if (rate>0) btwByRate[rate] = (btwByRate[rate]||0) + lineExcl*rate/100;
  }
  const btwRows = Object.keys(btwByRate).sort((a,b)=>b-a).map(r => `<div class="row"><span class="lbl">BTW ${r}%</span><span>${eur(btwByRate[r])}</span></div>`).join('');
  const disc = Number(deal.discount_percentage)||0;

  // Betalingsvoorwaarden (optioneel).
  const pay = [];
  if (deal.payment_downpayment_amount) pay.push(['Aanbetaling', `${eur(deal.payment_downpayment_amount)}${deal.payment_downpayment_date?' op '+fmtDate(deal.payment_downpayment_date):''}`]);
  if (deal.payment_term_count) pay.push(['Termijnen', `${deal.payment_term_count}× ${deal.payment_term_amount?eur(deal.payment_term_amount)+' incl.':''}`]);
  if (deal.payment_term_start_date) pay.push(['1e termijn', fmtDate(deal.payment_term_start_date)]);
  if (deal.payment_start_date) pay.push(['Startdatum cursus', fmtDate(deal.payment_start_date)]);

  document.getElementById('detailBody').innerHTML = `
    <div class="grid">
      <div class="sr-card"><div class="sr-card-h">Klant</div>
        <div class="sr-userline" style="margin-bottom:8px">${typeof avatarHtml==='function'?avatarHtml(c.is_company?(c.company_name||''):(c.first_name||'')+' '+(c.last_name||'')):''}<span><span class="sr-uname">${esc(c.is_company?(c.company_name||''):((c.first_name||'')+' '+(c.last_name||'')).trim())}</span>${c.is_company?' <span class="sr-tag blue">Bedrijf</span>':''}${c.risk_tag_auto?' <span class="sr-tag danger">Risico</span>':''}<br><span class="sr-cellsub">${esc(d.entity||'—')}</span></span></div>
        <div class="row"><span class="lbl">E-mail</span><span>${c.email?`<a href="mailto:${encodeURIComponent(c.email)}">${esc(c.email)}</a>`:'—'}</span></div>
        <div class="row"><span class="lbl">Telefoon</span><span>${c.phone?`<a href="tel:${encodeURIComponent(c.phone)}">${esc(c.phone)}</a>`:'—'}</span></div>
        <div style="margin-top:8px"><a class="sr-abtn" href="/modules/klanten.html?id=${esc(c.id)}"><i class="ti ti-user"></i> Klant-detail</a></div>
      </div>
      <div class="sr-card"><div class="sr-card-h">Offerte-info</div>
        <div class="row"><span class="lbl">Entiteit</span><span>${esc(d.entity||'—')}</span></div>
        <div class="row"><span class="lbl">Type verkoop</span><span>${esc(deal.sale_type==='intracommunautair'?'Intracommunautair':(deal.sale_type==='outside_eu'?'Buiten EU':'Normaal NL/BE'))}</span></div>
        <div class="row"><span class="lbl">Looptijd</span><span>${deal.duration_months?deal.duration_months+' mnd':'—'}</span></div>
        <div class="row"><span class="lbl">Startdatum cursus</span><span>${fmtDate(deal.payment_start_date||deal.start_date)}</span></div>
      </div>
    </div>

    <div class="sr-card" style="padding:0;margin-bottom:14px"><div style="padding:12px 16px;font-size:13px;font-weight:600">Producten (${lines.length} regel${lines.length===1?'':'s'})</div>
    <div class="sr-tablewrap" style="border:none;border-radius:0"><table class="sr-table">
      <thead><tr><th>Product</th><th class="center">Aantal</th><th class="num">Prijs/stuk excl.</th><th class="center">BTW</th><th class="num">Subtotaal excl.</th><th class="num">Incl. BTW</th></tr></thead>
      <tbody>${lines.map(l=>{
        const rate=zeroVat?0:(Number(l.vat_percentage)||0);
        const base=Number(l.quantity)*Number(l.unit_price);
        const unitExcl=l.price_includes_vat&&rate>0?Number(l.unit_price)/(1+rate/100):Number(l.unit_price);
        const subExcl=(l.price_includes_vat&&rate>0?base/(1+rate/100):base);
        const incl=subExcl*(1+rate/100);
        return `<tr><td>${esc(l.product_name)}</td><td class="center">${l.quantity}×</td><td class="num">${eur(unitExcl)}</td><td class="center"><span class="sr-tag ${({0:'green',9:'teal',21:'purple'})[l.vat_percentage]||'gray'}">${zeroVat?0:l.vat_percentage}%</span></td><td class="num">${eur(subExcl)}</td><td class="num">${eur(incl)}</td></tr>`;
      }).join('') || '<tr><td colspan="6" class="sr-empty">Geen regels</td></tr>'}</tbody>
    </table></div></div>

    <div class="grid" style="grid-template-columns:1fr 1fr">
      <div class="sr-card"><div class="sr-card-h">Totalen</div>
        <div class="row"><span class="lbl">Subtotaal excl. BTW</span><span>${eur(t.excl)}</span></div>
        ${disc>0?`<div class="row"><span class="lbl">Korting</span><span>−${disc}%</span></div>`:''}
        ${btwRows}
        <div style="background:var(--bg-elev-2);border-radius:8px;padding:8px 10px;margin-top:8px;display:flex;justify-content:space-between;font-weight:600;font-size:15px"><span>Totaal incl. BTW</span><span>${eur(t.incl)}</span></div>
      </div>
      ${pay.length?`<div class="sr-card"><div class="sr-card-h">Betalingsvoorwaarden</div>${pay.map(p=>`<div class="row"><span class="lbl">${esc(p[0])}</span><span>${esc(p[1])}</span></div>`).join('')}</div>`:'<div class="sr-card"><div class="sr-card-h">Betalingsvoorwaarden</div><div class="sr-cellsub">Geen betalingsschema — alleen totaalbedrag.</div></div>'}
    </div>`;

  // Acties op basis van status.
  const A=document.getElementById('detailActions');
  const tlBtn = deal.tl_quotation_id ? `<a class="btn btn-ghost" href="https://focus.teamleader.eu/quotations/${esc(deal.tl_quotation_id)}" target="_blank">↗ Open in TL</a>` : '';
  let btns='';
  if (st==='accepted' || st==='signed'){
    // Snapshot klant-context voor de F0.2 modal.
    _obCtx.customerId   = c.id || null;
    _obCtx.customerName = c.is_company ? (c.company_name||'') : ((c.first_name||'')+' '+(c.last_name||'')).trim();
    // Offerte-startdatum als prefill voor de aanmeld-modal. Eerste keuze
    // is payment_start_date (= 'Startdatum cursus' op de detail-pagina);
    // fallback op start_date. Normaliseer naar yyyy-mm-dd (Postgres date).
    const rawStart = deal.payment_start_date || deal.start_date || null;
    _obCtx.startDate = (typeof rawStart === 'string' && rawStart) ? rawStart.slice(0, 10) : null;
    // F0.2-knop: traject-keuze + create. Alleen tonen bij recht
    // 'onboarding.create' en geldige customer_id. Vervangt de oude
    // legacy welkomstmail-knop (verwijderd in chore/remove-legacy-onboarding-button).
    const obF0Btn = (_canCreateOnb && _obCtx.customerId)
      ? `<button class="btn" style="background:#0a2f63;color:#fff" onclick="openObModal()" type="button"><i class="ti ti-clipboard-plus"></i> Onboarding-traject aanmelden</button>`
      : '';
    btns = `<a class="btn btn-success" href="/modules/subscription-wizard.html?deal_id=${esc(deal.id)}">Omzetten naar abonnement</a> ${obF0Btn} <button class="btn btn-ghost" onclick="editConfirm('${esc(deal.id)}')">Bewerken</button> ${tlBtn}`;
  } else if (st==='sent'){
    btns = `<button class="btn" onclick="doSend()">Opnieuw versturen</button> <button class="btn" style="background:#f59e0b;color:#fff" onclick="doMarkAccepted()">Markeer als getekend</button> <button class="btn btn-danger" onclick="doDelete()">Verwijderen</button> ${tlBtn}`;
  } else if (st==='draft'){
    const sendOrPush = deal.tl_quotation_id ? `<button class="btn btn-success" onclick="doSend()">Versturen</button>` : `<button class="btn" onclick="doPush()">Push naar TL</button>`;
    btns = `${sendOrPush} <a class="btn btn-ghost" href="/modules/sales-wizard.html?edit_deal_id=${esc(deal.id)}">Bewerken</a> <button class="btn btn-danger" onclick="doDelete()">Verwijderen</button> ${tlBtn}`;
  } else {
    btns = tlBtn;
  }

// ── F0.2 Onboarding-traject aanmelden ─────────────────────────────────
// Modal-handlers (één keer in init() gewired) + open/submit/copy.
let _obTrajecten        = [];
let _obTrajectenLoaded  = false;
let _obSelectedType     = null;   // '1op1' | 'membership' | null

// Whitelist + helper. Matcht api/_lib/onboarding-wizard-default.js
// (WIZARD_FLOW_TYPES) en is de UI-tegenhanger van traject.type.
const OB_TYPES = ['1op1', 'membership'];

function _wireObModal(){
  const m  = document.getElementById('obModal');
  const x  = document.getElementById('obModalClose');
  const c  = document.getElementById('obCancelBtn');
  const sb = document.getElementById('obSubmitBtn');
  const sel= document.getElementById('obTrajectSel');
  const sw = document.getElementById('obTypeSwitch');
  if (!m) return;
  const close = () => closeObModal();
  if (x) x.addEventListener('click', close);
  if (c) c.addEventListener('click', close);
  // Klik op overlay (buiten de card) sluit.
  m.addEventListener('click', (ev) => { if (ev.target === m) close(); });
  // Esc sluit.
  document.addEventListener('keydown', (ev) => {
    if (ev.key === 'Escape' && m.classList.contains('open')) close();
  });
  if (sel) sel.addEventListener('change', () => {
    sb.disabled = !sel.value;
  });
  if (sb) sb.addEventListener('click', submitObCreate);
  if (sw) {
    sw.querySelectorAll('button[data-ob-type]').forEach((b) => {
      b.addEventListener('click', () => _selectObType(b.dataset.obType));
    });
  }
}

// Renders de active-class op de juiste knop in de type-switch.
function _renderObTypeSwitch(){
  const sw = document.getElementById('obTypeSwitch');
  if (!sw) return;
  sw.querySelectorAll('button[data-ob-type]').forEach((b) => {
    const isActive = b.dataset.obType === _obSelectedType;
    b.classList.toggle('active', isActive);
    b.setAttribute('aria-selected', isActive ? 'true' : 'false');
  });
}

// (Her)vult <select id="obTrajectSel"> met alleen de trajecten van het
// huidige type. Reset altijd de huidige keuze + disable de submit-knop.
// Lege filter → disabled option "Geen trajecten voor dit type", submit
// blijft uit. Geen type gekozen → disabled placeholder.
function _renderObTrajectOptions(){
  const sel = document.getElementById('obTrajectSel');
  const sb  = document.getElementById('obSubmitBtn');
  if (!sel) return;
  if (sb) sb.disabled = true;
  if (!_obSelectedType) {
    sel.disabled  = true;
    sel.innerHTML = '<option value="">Kies eerst een type</option>';
    return;
  }
  if (!_obTrajectenLoaded) {
    sel.disabled  = true;
    sel.innerHTML = '<option value="">Trajecten laden…</option>';
    return;
  }
  const filtered = _obTrajecten.filter((t) => t && t.type === _obSelectedType);
  if (filtered.length === 0) {
    sel.disabled  = true;
    sel.innerHTML = '<option value="">Geen trajecten voor dit type</option>';
    return;
  }
  sel.disabled  = false;
  sel.innerHTML = '<option value="">— kies traject —</option>'
    + filtered.map((t) => `<option value="${esc(t.id)}">${esc(t.label || t.key || t.id)}</option>`).join('');
  sel.value = '';
}

// Type-keuze: zet de actieve flow + verbird de traject-lijst. Wisselen
// reset altijd de eerdere traject-keuze (submit gaat uit) — voorkomt dat
// een onzichtbaar geworden traject-id alsnog gesubmit wordt.
function _selectObType(type){
  if (!OB_TYPES.includes(type)) return;
  if (_obSelectedType === type) return;
  _obSelectedType = type;
  _renderObTypeSwitch();
  _renderObTrajectOptions();
}

function _resetObModal(){
  // Stap terug naar formulier-staat, ook na een eerdere success.
  document.getElementById('obStepForm').hidden = false;
  document.getElementById('obStepDone').hidden = true;
  document.getElementById('obStepDone').innerHTML = '';
  document.getElementById('obError').hidden = true;
  document.getElementById('obError').textContent = '';
  document.getElementById('obModalFooter').style.display = '';
  const sb = document.getElementById('obSubmitBtn');
  sb.disabled = true;
  sb.textContent = 'Aanmelden';
  sb.style.display = '';
  const cb = document.getElementById('obCancelBtn');
  cb.textContent = 'Annuleren';
  // Type-keuze + traject-lijst terug naar lege start-staat zodat een
  // heropende modal schoon begint.
  _obSelectedType = null;
  _renderObTypeSwitch();
  _renderObTrajectOptions();
  // Start-datum legen — openObModal prefilled 'm opnieuw uit _obCtx.
  const dt = document.getElementById('obStartDate');
  if (dt) dt.value = '';
}

function _showObError(msg){
  const el = document.getElementById('obError');
  el.textContent = msg;
  el.hidden = false;
}

async function _ensureObTrajectenLoaded(){
  if (_obTrajectenLoaded) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/onboarding-trajecten-list');
    let d = null; try { d = await r.json(); } catch {}
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    _obTrajecten = Array.isArray(d?.trajecten) ? d.trajecten : [];
    _obTrajectenLoaded = true;
    // Hervul de select op basis van de huidige type-keuze (kan nog leeg
    // zijn — dan blijft de placeholder staan).
    _renderObTrajectOptions();
  } catch (e) {
    const sel = document.getElementById('obTrajectSel');
    if (sel) sel.innerHTML = '<option value="">Laden mislukt</option>';
    _showObError('Trajecten ophalen mislukt: ' + (e?.message || e));
  }
}

function openObModal(){
  if (!_obCtx.customerId) { toast('Geen klant-id beschikbaar', 'error'); return; }
  _resetObModal();
  document.getElementById('obCustomerLabel').textContent = _obCtx.customerName || _obCtx.customerId;
  // Prefill startdatum uit de offerte (payment_start_date / start_date). Leeg
  // → veld blijft leeg en de admin kan handmatig invullen of laten staan.
  const dt = document.getElementById('obStartDate');
  if (dt) dt.value = _obCtx.startDate || '';
  const m = document.getElementById('obModal');
  m.removeAttribute('hidden');
  m.classList.add('open');
  _ensureObTrajectenLoaded();
}

function closeObModal(){
  const m = document.getElementById('obModal');
  m.classList.remove('open');
  m.setAttribute('hidden', '');
}

async function submitObCreate(){
  const sel = document.getElementById('obTrajectSel');
  const sb  = document.getElementById('obSubmitBtn');
  const trajectId = (sel.value || '').trim();
  if (!_obCtx.customerId || !trajectId) return;
  document.getElementById('obError').hidden = true;
  sb.disabled = true;
  sb.textContent = 'Bezig…';
  // Optionele startdatum uit het input-veld. Leeg → null (server valt
  // dan terug op now in de provisioning-stap, identiek aan oud gedrag).
  const dtEl = document.getElementById('obStartDate');
  const startDate = dtEl && dtEl.value ? dtEl.value : null;
  const payload = { customer_id: _obCtx.customerId, traject_id: trajectId };
  if (startDate) payload.start_date = startDate;
  try {
    const r = await window.AgentShared.apiFetch('/api/onboarding-create', {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify(payload),
    });
    let d = null; try { d = await r.json(); } catch {}
    if (r.status === 409) {
      _showObError('Er bestaat al een (actieve) onboarding voor deze klant.');
      sb.disabled = false;
      sb.textContent = 'Aanmelden';
      return;
    }
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    // Succes — toon link + copy-knop.
    const linkPath = d?.link || '';
    const fullLink = linkPath ? (location.origin + linkPath) : '';
    const done = document.getElementById('obStepDone');
    done.innerHTML = `
      <div class="ob-success">
        <strong>✓ Aangemeld.</strong> De persoonlijke onboarding-link is hieronder kopieerbaar.
      </div>
      <label>Persoonlijke link</label>
      <div class="ob-link-row">
        <input type="text" class="ob-link-input" id="obLinkInput" readonly value="${esc(fullLink)}" />
        <button type="button" class="btn" id="obCopyBtn">📋 Kopieer link</button>
      </div>
      <div class="sub" style="margin-top:10px;font-size:11.5px;color:var(--text-faint)">
        Status: <strong>${esc(d?.onboarding?.status || 'aangemeld')}</strong>
      </div>`;
    document.getElementById('obStepForm').hidden = true;
    done.hidden = false;
    sb.style.display = 'none';
    document.getElementById('obCancelBtn').textContent = 'Sluiten';
    const cp = document.getElementById('obCopyBtn');
    cp.addEventListener('click', async () => {
      const v = document.getElementById('obLinkInput').value;
      try {
        if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(v);
        else {
          const inp = document.getElementById('obLinkInput');
          inp.select(); inp.setSelectionRange(0, v.length);
          document.execCommand('copy');
        }
        cp.textContent = '✓ Gekopieerd';
        setTimeout(() => { cp.textContent = '📋 Kopieer link'; }, 1800);
      } catch (e) {
        toast('Kopiëren mislukt — selecteer handmatig', 'error');
      }
    });
    toast('Onboarding aangemeld', 'success');
  } catch (e) {
    _showObError('Aanmelden mislukt: ' + (e?.message || e));
    sb.disabled = false;
    sb.textContent = 'Aanmelden';
  }
}

init();
</script>
