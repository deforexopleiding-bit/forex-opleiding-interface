<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Meta Ads · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/modules/shared/agent-shared.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    /* Layout-offset (margin-left:var(--sidebar-w) + padding) komt uit
       agent-shared.css .main + .main-inner — géén eigen .app-wrap meer, want
       die zat direct na #sidebar-mount zonder offset en viel over de sidebar. */
    .page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; flex-wrap:wrap }
    .page-head h1 { font-size:22px; font-weight:700; color:var(--text-primary); margin:0 }
    .page-head .sub { color:var(--text-dim); font-size:13px; margin-top:4px }
    .range-chips { display:flex; gap:6px; flex-wrap:wrap }
    .range-chip {
      padding:6px 12px; border:1px solid var(--border); border-radius:999px;
      background:var(--bg-elev); color:var(--text-primary); cursor:pointer;
      font-size:12.5px; font-weight:500;
    }
    .range-chip:hover { border-color:var(--border-strong, #94a3b8) }
    .range-chip.active { background:#0e7c6b; color:#fff; border-color:#0e7c6b }

    .kpi-strip { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin:14px 0 }
    @media (max-width:900px) { .kpi-strip { grid-template-columns:repeat(2, 1fr) } }
    .kpi-card {
      background:var(--bg-elev); border:1px solid var(--border);
      border-radius:12px; padding:14px 16px;
    }
    .kpi-label {
      font-size:11px; color:var(--text-faint); text-transform:uppercase;
      letter-spacing:.06em; margin-bottom:6px; font-weight:600;
    }
    .kpi-value {
      font-size:22px; font-weight:700; color:var(--text-primary);
      font-variant-numeric:tabular-nums; letter-spacing:-.3px;
    }
    .kpi-sub { font-size:11.5px; color:var(--text-dim); margin-top:2px }

    .card {
      background:var(--bg-elev); border:1px solid var(--border);
      border-radius:12px; padding:14px 16px; margin-bottom:16px;
    }
    .card h3 {
      font-size:11px; color:var(--text-faint); text-transform:uppercase;
      letter-spacing:.05em; margin-bottom:10px; font-weight:600;
    }
    .card h3 .h3-sub { font-weight:400; color:var(--text-dim); text-transform:none; letter-spacing:0; margin-left:8px }

    .trend-svg { width:100%; height:200px; overflow:visible }
    .trend-svg .axis { stroke:var(--border); stroke-width:1 }
    .trend-svg .grid { stroke:var(--border); stroke-width:.5; stroke-dasharray:2 3; opacity:.5 }
    .trend-svg .label { font-size:10px; fill:var(--text-faint); font-family:'Inter', sans-serif }
    .trend-svg .line-spend { stroke:#0e7c6b; stroke-width:2; fill:none }
    .trend-svg .line-leads { stroke:#a16207; stroke-width:2; fill:none; stroke-dasharray:4 3 }
    .trend-legend { display:flex; gap:16px; font-size:11.5px; color:var(--text-dim); margin-top:8px }
    .trend-legend .lg-dot { display:inline-block; width:10px; height:2px; margin-right:4px; vertical-align:middle }

    .ads-table { width:100%; border-collapse:collapse; font-size:12.5px }
    .ads-table thead th {
      text-align:left; font-weight:600; color:var(--text-faint);
      font-size:11px; text-transform:uppercase; letter-spacing:.04em;
      padding:8px 10px; border-bottom:1px solid var(--border);
    }
    .ads-table thead th.n { text-align:right }
    .ads-table tbody td {
      padding:10px; border-bottom:1px solid var(--border);
      color:var(--text-primary);
    }
    .ads-table tbody td.n { text-align:right; font-variant-numeric:tabular-nums }
    .ads-table tbody tr.clickable { cursor:pointer }
    .ads-table tbody tr.clickable:hover { background:var(--bg-elev-2, rgba(0,0,0,0.03)) }
    .ads-name { font-weight:600; display:flex; align-items:center; gap:6px }
    .status-pill {
      display:inline-block; padding:1px 8px; border-radius:10px;
      font-size:10.5px; font-weight:600;
    }
    .status-pill.active   { background:rgba(14,124,107,0.10); color:#0e7c6b }
    .status-pill.paused   { background:rgba(234,179,8,0.12);  color:#a16207 }
    .status-pill.archived, .status-pill.deleted { background:rgba(107,114,128,0.10); color:#6b7280 }
    .cpl-warn { color:#b91c1c; font-weight:600 }
    .drill-btn {
      background:none; border:none; color:#0e7c6b; cursor:pointer;
      font-weight:600; padding:2px 6px; font-size:12px;
    }
    .drill-btn:hover { text-decoration:underline }

    .breadcrumb { display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-dim); margin-bottom:10px }
    .breadcrumb a { color:#0e7c6b; text-decoration:none; cursor:pointer }
    .breadcrumb a:hover { text-decoration:underline }
    .breadcrumb .sep { color:var(--text-faint) }

    .empty-state {
      padding:40px 24px; text-align:center; color:var(--text-dim);
      background:var(--bg-elev); border:1px solid var(--border);
      border-radius:12px;
    }
    .empty-state .es-icon { font-size:36px; color:var(--text-faint); margin-bottom:10px }
    .empty-state .es-title { font-size:14px; font-weight:600; color:var(--text-primary); margin-bottom:4px }
    .empty-state .es-sub { font-size:12.5px }

    .status-line { font-size:11.5px; color:var(--text-faint); text-align:right; margin-top:4px }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>
<div class="main">
  <div class="main-inner">
    <div class="page-head">
      <div>
        <h1><i class="ti ti-brand-meta"></i> Meta Ads</h1>
        <div class="sub">Overzicht, campagne-prestaties en drill-down. Data ververst elke 30 min.</div>
      </div>
      <div class="range-chips" id="rangeChips" role="tablist">
        <button class="range-chip" data-range="today" role="tab">Vandaag</button>
        <button class="range-chip active" data-range="7d" role="tab">7 dagen</button>
        <button class="range-chip" data-range="30d" role="tab">30 dagen</button>
        <button class="range-chip" data-range="month" role="tab">Deze maand</button>
      </div>
    </div>

    <div class="status-line" id="statusLine"></div>

    <!-- KPI-strip -->
    <div class="kpi-strip" id="kpiStrip">
      <div class="kpi-card"><div class="kpi-label">Uitgegeven</div><div class="kpi-value" id="kpiSpend">—</div><div class="kpi-sub" id="kpiSpendSub"></div></div>
      <div class="kpi-card"><div class="kpi-label">Leads</div><div class="kpi-value" id="kpiLeads">—</div><div class="kpi-sub" id="kpiLeadsSub"></div></div>
      <div class="kpi-card"><div class="kpi-label">Kosten per lead</div><div class="kpi-value" id="kpiCpl">—</div><div class="kpi-sub" id="kpiCplSub"></div></div>
      <div class="kpi-card"><div class="kpi-label">CTR</div><div class="kpi-value" id="kpiCtr">—</div><div class="kpi-sub" id="kpiCtrSub"></div></div>
    </div>

    <!-- Trend-grafiek -->
    <div class="card">
      <h3>Trend <span class="h3-sub" id="trendRangeLabel"></span></h3>
      <svg class="trend-svg" id="trendSvg" viewBox="0 0 800 200" preserveAspectRatio="none"></svg>
      <div class="trend-legend">
        <span><span class="lg-dot" style="background:#0e7c6b"></span> Spend (EUR)</span>
        <span><span class="lg-dot" style="background:#a16207;height:0;border-top:2px dashed #a16207"></span> Leads</span>
      </div>
    </div>

    <!-- Entiteiten-tabel -->
    <div class="card">
      <h3 id="tableHeader">Campagnes</h3>
      <div class="breadcrumb" id="breadcrumb" hidden></div>
      <div id="tableContainer">
        <div class="empty-state">
          <div class="es-icon"><i class="ti ti-loader-2"></i></div>
          <div class="es-title">Laden…</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script>
(async function initMetaAdsPage(){
  // Auth-gate: ads.module.access. Fail-open pattern zoals klanten.html /
  // finance.html — pas RBAC-check zodra shared client + permissies zijn geladen.
  try {
    await (window._authSharedReady || Promise.resolve());
    if (!window.AuthShared?.requireAuth) {
      // Auth-shared kan lokaal falen (test-env); ga door in prod-app wordt dit gedekt.
    } else {
      const ok = await window.AuthShared.requireAuth();
      if (!ok) return;
    }
  } catch (_) {}

  // ── State ─────────────────────────────────────────────────────────────
  const state = {
    range: '7d',      // today | 7d | 30d | month
    level: 'campaign',
    parentMetaId: null,
    parentName: null,   // voor breadcrumb (campagne-naam bij adset-drill; adset-naam bij ad-drill)
    grandparentName: null, // adset->ad-drill toont ook campagne
    loading: false,
    last: null,
  };

  const $ = (id) => document.getElementById(id);
  const fmtEur = (v, dec = 2) => v == null ? '—'
    : new Intl.NumberFormat('nl-NL', { style: 'currency', currency: 'EUR', minimumFractionDigits: dec, maximumFractionDigits: dec }).format(v);
  const fmtInt = (v) => v == null ? '—' : new Intl.NumberFormat('nl-NL').format(v);
  const fmtPct = (v) => v == null ? '—' : (Number(v).toFixed(2) + '%');
  const escHtml = (s) => String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  const CPL_WARN_THRESHOLD = 100; // EUR — kleurt cost_per_lead rood boven dit bedrag.

  // ── Rendering ─────────────────────────────────────────────────────────
  function renderKPIs(totals) {
    $('kpiSpend').textContent = fmtEur(totals?.spend, 2);
    $('kpiLeads').textContent = fmtInt(totals?.leads);
    $('kpiCpl').textContent   = fmtEur(totals?.cost_per_lead, 2);
    $('kpiCtr').textContent   = fmtPct(totals?.ctr);
    $('kpiSpendSub').textContent = totals?.impressions ? (fmtInt(totals.impressions) + ' impressies') : '';
    $('kpiLeadsSub').textContent = totals?.clicks ? (fmtInt(totals.clicks) + ' clicks') : '';
    $('kpiCplSub').textContent   = (totals?.leads > 0 ? '' : (totals?.spend > 0 ? 'nog geen leads' : ''));
    $('kpiCtrSub').textContent   = totals?.cpc != null ? ('CPC ' + fmtEur(totals.cpc, 3)) : '';
  }

  function renderTrend(trend, rangeLabel) {
    const svg = $('trendSvg');
    $('trendRangeLabel').textContent = rangeLabel ? ('· ' + rangeLabel) : '';
    if (!trend || !trend.length) {
      svg.innerHTML = '<text x="400" y="100" class="label" text-anchor="middle">Geen data in deze periode.</text>';
      return;
    }
    const W = 800, H = 200, PAD_L = 40, PAD_R = 20, PAD_T = 12, PAD_B = 24;
    const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;
    const n = trend.length;
    const maxSpend = Math.max(1, ...trend.map((d) => Number(d.spend || 0)));
    const maxLeads = Math.max(1, ...trend.map((d) => Number(d.leads || 0)));
    const xFor = (i) => PAD_L + (n === 1 ? innerW/2 : (i * innerW) / (n - 1));
    const ySpend = (v) => PAD_T + innerH - (v / maxSpend) * innerH;
    const yLeads = (v) => PAD_T + innerH - (v / maxLeads) * innerH;
    const pathSpend = trend.map((d, i) => (i === 0 ? 'M' : 'L') + xFor(i) + ' ' + ySpend(Number(d.spend || 0))).join(' ');
    const pathLeads = trend.map((d, i) => (i === 0 ? 'M' : 'L') + xFor(i) + ' ' + yLeads(Number(d.leads || 0))).join(' ');
    // X-labels: eerste, midden, laatste (dagformaat DD/MM).
    const xLbl = (i) => {
      const [_y, m, d] = trend[i].date.split('-');
      return d + '/' + m;
    };
    const labelIdxs = n <= 3 ? trend.map((_, i) => i) : [0, Math.floor(n/2), n - 1];
    const xLabels = labelIdxs.map((i) =>
      '<text x="' + xFor(i) + '" y="' + (H - 6) + '" class="label" text-anchor="middle">' + escHtml(xLbl(i)) + '</text>'
    ).join('');
    // Y-labels links (max spend, 0).
    const yLabels = [
      '<text x="' + (PAD_L - 4) + '" y="' + (PAD_T + 4) + '" class="label" text-anchor="end">' + escHtml(fmtEur(maxSpend, 0)) + '</text>',
      '<text x="' + (PAD_L - 4) + '" y="' + (PAD_T + innerH) + '" class="label" text-anchor="end">€0</text>',
    ].join('');
    // Grid: 4 horizontale lijnen.
    let gridLines = '';
    for (let i = 1; i <= 3; i++) {
      const y = PAD_T + (i * innerH) / 4;
      gridLines += '<line class="grid" x1="' + PAD_L + '" x2="' + (W - PAD_R) + '" y1="' + y + '" y2="' + y + '"/>';
    }
    svg.innerHTML =
      gridLines +
      '<line class="axis" x1="' + PAD_L + '" x2="' + (W - PAD_R) + '" y1="' + (PAD_T + innerH) + '" y2="' + (PAD_T + innerH) + '"/>' +
      xLabels + yLabels +
      '<path class="line-spend" d="' + pathSpend + '"/>' +
      '<path class="line-leads" d="' + pathLeads + '"/>';
  }

  function statusPill(status) {
    const s = String(status || '').toLowerCase();
    const cls = s.includes('active')   ? 'active'
              : s.includes('paused')   ? 'paused'
              : s.includes('archived') || s.includes('deleted') ? 'archived'
              : '';
    if (!cls) return '';
    const label = s === 'active' ? 'Actief' : s === 'paused' ? 'Gepauzeerd' : s === 'archived' ? 'Gearchiveerd' : s === 'deleted' ? 'Verwijderd' : status;
    return '<span class="status-pill ' + cls + '">' + escHtml(label) + '</span>';
  }

  function renderTable(data) {
    const c = $('tableContainer');
    const rows = data.entities || [];
    const level = data.level || 'campaign';
    const drillLabel = level === 'campaign' ? 'Ad sets' : level === 'adset' ? 'Advertenties' : null;
    // Titel bijwerken.
    $('tableHeader').textContent = level === 'campaign' ? 'Campagnes' : level === 'adset' ? 'Ad sets' : 'Advertenties';

    if (!rows.length) {
      const isEmptyDB = !data.data_available;
      c.innerHTML = '<div class="empty-state">' +
        '<div class="es-icon"><i class="ti ' + (isEmptyDB ? 'ti-cloud-off' : 'ti-inbox') + '"></i></div>' +
        '<div class="es-title">' + (isEmptyDB
          ? 'Nog geen Meta-data — de sync draait elke 30 min zodra de token is ingesteld.'
          : 'Geen ' + (level === 'campaign' ? 'campagnes' : level === 'adset' ? 'ad sets' : 'advertenties') + ' met data in deze periode.') + '</div>' +
        '<div class="es-sub">' + (isEmptyDB
          ? 'Zodra META_ADS_ACCESS_TOKEN en META_ADS_ACCOUNT_ID gezet zijn verschijnen hier campagnes.'
          : 'Kies een andere periode of drill een niveau terug.') + '</div>' +
      '</div>';
      return;
    }

    const hdr = level === 'campaign' ? 'Campagne' : level === 'adset' ? 'Ad set' : 'Advertentie';
    let html = '<table class="ads-table"><thead><tr>' +
      '<th>' + hdr + '</th>' +
      '<th class="n">Uitgegeven</th>' +
      '<th class="n">Impressies</th>' +
      '<th class="n">Clicks</th>' +
      '<th class="n">CTR</th>' +
      '<th class="n">Leads</th>' +
      '<th class="n">Kosten/lead</th>' +
      (drillLabel ? '<th></th>' : '') +
      '</tr></thead><tbody>';
    for (const r of rows) {
      const cplCls = (r.cost_per_lead != null && r.cost_per_lead > CPL_WARN_THRESHOLD) ? ' cpl-warn' : '';
      html += '<tr' + (drillLabel ? ' class="clickable" data-drill="' + escHtml(r.meta_id) + '" data-name="' + escHtml(r.name || '') + '"' : '') + '>' +
        '<td><div class="ads-name">' + escHtml(r.name || '(zonder naam)') + ' ' + statusPill(r.effective_status) + '</div></td>' +
        '<td class="n">' + fmtEur(r.spend, 2) + '</td>' +
        '<td class="n">' + fmtInt(r.impressions) + '</td>' +
        '<td class="n">' + fmtInt(r.clicks) + '</td>' +
        '<td class="n">' + fmtPct(r.ctr) + '</td>' +
        '<td class="n">' + fmtInt(r.leads) + '</td>' +
        '<td class="n' + cplCls + '">' + fmtEur(r.cost_per_lead, 2) + '</td>' +
        (drillLabel ? '<td class="n"><button type="button" class="drill-btn" data-drill="' + escHtml(r.meta_id) + '" data-name="' + escHtml(r.name || '') + '">' + drillLabel + ' →</button></td>' : '') +
      '</tr>';
    }
    html += '</tbody></table>';
    c.innerHTML = html;
    // Delegated click-handler op drill-triggers.
    c.querySelectorAll('[data-drill]').forEach((el) => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = el.getAttribute('data-drill');
        const nm = el.getAttribute('data-name') || '';
        drillDown(id, nm);
      });
    });
  }

  function renderBreadcrumb() {
    const bc = $('breadcrumb');
    if (state.level === 'campaign') { bc.hidden = true; return; }
    bc.hidden = false;
    let html = '<a data-nav="campaign">Campagnes</a>';
    if (state.level === 'adset') {
      html += ' <span class="sep">›</span> <span>' + escHtml(state.parentName || 'Ad sets') + '</span>';
    } else if (state.level === 'ad') {
      html += ' <span class="sep">›</span> <a data-nav="adset">' + escHtml(state.grandparentName || 'Campagne') + '</a>' +
              ' <span class="sep">›</span> <span>' + escHtml(state.parentName || 'Advertenties') + '</span>';
    }
    bc.innerHTML = html;
    bc.querySelectorAll('[data-nav]').forEach((el) => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const target = el.getAttribute('data-nav');
        if (target === 'campaign') { state.level = 'campaign'; state.parentMetaId = null; state.parentName = null; state.grandparentName = null; }
        else if (target === 'adset') { state.level = 'adset'; state.parentMetaId = state.grandparentMetaId; state.parentName = state.grandparentName; state.grandparentName = null; state.grandparentMetaId = null; }
        load();
      });
    });
  }

  function drillDown(metaId, name) {
    if (state.level === 'campaign') {
      // Drill campagne → adsets. Bewaar campagne als parent voor breadcrumb.
      state.level = 'adset';
      state.grandparentMetaId = null;
      state.grandparentName = null;
      state.parentMetaId = metaId;
      state.parentName = name;
    } else if (state.level === 'adset') {
      // Drill adset → ads. Bewaar adset als parent + campaign als grandparent.
      const currentCampaignName = state.parentName;
      state.grandparentMetaId = state.parentMetaId;   // adset boven de ads (want we drillen naar ad's onder deze adset)
      state.grandparentName = currentCampaignName;    // adset-naam voor breadcrumb-terug
      state.level = 'ad';
      state.parentMetaId = metaId;
      state.parentName = name;
    }
    load();
  }

  // ── Data-load ─────────────────────────────────────────────────────────
  async function load() {
    if (state.loading) return;
    state.loading = true;
    $('statusLine').textContent = 'Laden…';
    // Update range chips.
    document.querySelectorAll('.range-chip').forEach((el) => {
      el.classList.toggle('active', el.getAttribute('data-range') === state.range);
    });

    const params = new URLSearchParams({ range: state.range, level: state.level });
    if (state.parentMetaId) params.set('parent_meta_id', state.parentMetaId);

    try {
      const r = await window.AgentShared.apiFetch('/api/meta-ads-insights?' + params.toString());
      if (r.status === 403) {
        $('tableContainer').innerHTML = '<div class="empty-state"><div class="es-icon"><i class="ti ti-lock"></i></div><div class="es-title">Geen toegang tot deze module.</div><div class="es-sub">Vraag een admin om ads.module.access voor jouw rol in te schakelen.</div></div>';
        renderKPIs({}); renderTrend([], '');
        return;
      }
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const d = await r.json();
      state.last = d;
      renderKPIs(d.totals || {});
      const rangeLabel = (d.range?.from && d.range?.to) ? (d.range.from + ' → ' + d.range.to) : '';
      renderTrend(d.trend || [], rangeLabel);
      renderBreadcrumb();
      renderTable(d);
      $('statusLine').textContent = d.data_available
        ? ('Data van ' + rangeLabel + '. Automatisch ververst elke 30 min.')
        : 'Geen data beschikbaar. Sync draait elke 30 min zodra de token is ingesteld.';
    } catch (e) {
      $('tableContainer').innerHTML = '<div class="empty-state"><div class="es-icon"><i class="ti ti-alert-triangle" style="color:#b91c1c"></i></div><div class="es-title">Laden mislukt: ' + escHtml(e.message || 'onbekend') + '</div><div class="es-sub">Check Vercel-logs voor details.</div></div>';
      $('statusLine').textContent = '';
    } finally {
      state.loading = false;
    }
  }

  // ── Wire-up ───────────────────────────────────────────────────────────
  document.querySelectorAll('.range-chip').forEach((el) => {
    el.addEventListener('click', () => {
      state.range = el.getAttribute('data-range');
      load();
    });
  });

  await load();
})();
</script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
</body>
</html>
