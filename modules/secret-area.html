<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Area · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    /* Secret Area — LICHT, on-brand. Alle waardes komen uit
       modules/shared/agent-shared.css (--surface-*, --border-*, --text-*,
       --brand-primary, --color-*, --shadow-*). Class-namen blijven .sa-*
       zodat de JS ongewijzigd blijft. */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* Scope-container: gedraagt zich als een gewone module-pagina, links van
       de sidebar. Achtergrond komt uit --bg (licht). */
    .sa-scope {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin-left: 220px;
      padding: 24px 28px 60px;
      max-width: 1500px;
    }
    .sa-scope .page-header {
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sa-scope .page-header .lock {
      width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center;
      background: var(--brand-primary);
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .page-header h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
      color: var(--text);
    }
    .sa-scope .page-header .sub {
      font-size: 12px; color: var(--text-dim);
      letter-spacing: .12em; text-transform: uppercase; margin-top: 2px;
    }

    /* Mono / display helpers voor cijfers en cockpit-cellen. */
    .sa-scope .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .sa-scope .disp { font-family: 'Space Grotesk', system-ui, sans-serif; letter-spacing: -0.01em; }
    .sa-scope .lbl {
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-dim); font-weight: 700;
    }

    /* Cockpit-panel — was donker gradient, nu een subtiele info-tint. */
    .sa-scope .cockpit {
      background: var(--color-info-soft);
      border: 1px solid var(--color-info);
      border-radius: 14px; padding: 18px 20px;
      box-shadow: var(--shadow-sm);
      color: var(--text);
    }
    .sa-scope .cockpit .lbl { color: var(--color-info-text); }

    /* Standaard kaart — witte surface, subtiele border, no drop-shadow-orgie. */
    .sa-scope .sa-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-card h2 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 14px;
      margin-bottom: 10px; letter-spacing: .01em;
      display: flex; align-items: center; gap: 8px;
      color: var(--text);
    }
    .sa-scope .sa-card h2 .ti { color: var(--brand-primary); }

    /* Form-elementen. */
    .sa-scope .sa-input,
    .sa-scope .sa-textarea,
    .sa-scope .sa-select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-default, var(--border));
      border-radius: 8px;
      background: var(--surface-1); color: var(--text);
      font: inherit; font-size: 13px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .sa-scope .sa-input:focus,
    .sa-scope .sa-textarea:focus,
    .sa-scope .sa-select:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px var(--brand-primary-soft);
    }
    .sa-scope .sa-textarea { min-height: 68px; resize: vertical; }
    .sa-scope input[type="file"] { color: var(--text-dim); font-size: 12.5px; }

    /* Knoppen. Primary = navy #093d54. */
    .sa-scope .sa-btn {
      appearance: none; border: 1px solid transparent;
      background: var(--brand-primary); color: #fff;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 13px;
      padding: 9px 16px; border-radius: 8px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      transition: background .15s, transform .15s;
    }
    .sa-scope .sa-btn:hover:not(:disabled) { background: var(--brand-primary-hover); }
    .sa-scope .sa-btn:disabled { opacity: .55; cursor: not-allowed; }
    .sa-scope .sa-btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border-default, var(--border));
    }
    .sa-scope .sa-btn-ghost:hover:not(:disabled) {
      background: var(--brand-primary-soft);
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }
    .sa-scope .sa-btn-danger {
      background: var(--color-danger); color: #fff;
    }
    .sa-scope .sa-btn-danger:hover:not(:disabled) { background: var(--color-danger-text, #b91c1c); }

    .sa-scope .sa-err { color: var(--color-danger); font-size: 12.5px; margin-top: 8px; min-height: 16px; }
    .sa-scope .sa-loading {
      color: var(--text-dim); font-size: 13px; padding: 12px 0;
      display: flex; gap: 8px; align-items: center;
    }
    .sa-scope .sa-empty { color: var(--text-faint); font-size: 12.5px; padding: 16px 0; text-align: center; }

    /* Denied fallback (redirect). */
    .sa-scope .sa-denied {
      background: var(--surface-card);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 22px; max-width: 480px; color: var(--text-dim); font-size: 13.5px;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-denied strong {
      color: var(--text); font-size: 14px; display: block; margin-bottom: 4px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* PIN-card. */
    .sa-scope .sa-pincard {
      background: var(--surface-card);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 24px 26px; box-shadow: var(--shadow-md);
      max-width: 440px;
    }
    .sa-scope .sa-pincard h2 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700; font-size: 17px; margin-bottom: 6px;
      color: var(--text);
    }
    .sa-scope .sa-pincard p {
      font-size: 13px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.5;
    }

    /* Tabs. */
    .sa-scope .sa-tabs {
      display: flex; gap: 4px; padding: 4px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .sa-scope .sa-tab {
      appearance: none; background: transparent; border: 0;
      padding: 7px 12px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 500; font-size: 12.5px;
      color: var(--text-dim);
      border-radius: 7px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color .15s, background .15s;
    }
    .sa-scope .sa-tab:hover:not(.active) { color: var(--text); background: var(--surface-card-hover); }
    .sa-scope .sa-tab.active {
      background: var(--brand-primary); color: #fff;
    }
    .sa-scope .sa-tab-sep {
      opacity: .5; padding: 0 4px; align-self: center; color: var(--text-faint);
    }

    /* Grids. */
    .sa-scope .sa-grid { display: grid; gap: 14px; }
    .sa-scope .sa-grid-2 { grid-template-columns: 1fr 1fr; }
    .sa-scope .sa-grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    @media (max-width: 900px) {
      .sa-scope .sa-grid-2, .sa-scope .sa-grid-3 { grid-template-columns: 1fr; }
    }

    /* Grade-badges A+/B/C mapping op status-kleuren. */
    .sa-scope .sa-grade {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700; font-size: 11.5px;
      border-radius: 8px; padding: 3px 9px; letter-spacing: .02em;
      display: inline-flex; align-items: center; justify-content: center; min-width: 32px;
    }
    .sa-scope .sa-grade.A\+ {
      background: var(--color-success-soft); color: var(--color-success-text);
      box-shadow: inset 0 0 0 1px var(--color-success);
    }
    .sa-scope .sa-grade.B   {
      background: var(--color-warning-soft); color: var(--color-warning-text);
      box-shadow: inset 0 0 0 1px var(--color-warning);
    }
    .sa-scope .sa-grade.C   {
      background: var(--color-danger-soft);  color: var(--color-danger-text);
      box-shadow: inset 0 0 0 1px var(--color-danger);
    }

    .sa-scope .sa-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: var(--surface-2); border-radius: 8px; object-fit: cover;
    }
    .sa-scope .sa-row-item {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface-1);
      margin-bottom: 6px; font-size: 13px;
    }
    .sa-scope .sa-row-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brand-primary); }
    .sa-scope .sa-row-item .ti { color: var(--brand-primary); }

    /* Cockpit-strip cells (grote KPI-cijfers). */
    .sa-scope .sa-strip { display: flex; gap: 16px; flex-wrap: wrap; }
    .sa-scope .sa-strip .cell { flex: 1 1 140px; min-width: 140px; }
    .sa-scope .sa-strip .cell .v {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 22px; font-weight: 600; color: var(--text);
    }
    .sa-scope .sa-strip .cell .l {
      font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .12em; margin-top: 2px;
    }

    /* ── HOME-view ────────────────────────────────────────────────────── */
    .sa-scope .sa-hi {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 24px; margin: 4px 0 2px;
      letter-spacing: -0.01em;
    }
    .sa-scope .sa-hi span { color: var(--brand-primary); }
    .sa-scope .sa-subhead {
      color: var(--text-dim); margin-bottom: 22px; font-size: 14px;
    }

    /* Hero — "doe dit nu". Subtiele brand-tint met witte kaart-basis. */
    .sa-scope .sa-hero {
      background: var(--brand-primary-soft);
      border: 1px solid var(--brand-primary);
      border-radius: 14px;
      padding: 20px 22px; display: flex; gap: 18px; align-items: center;
      box-shadow: var(--shadow-sm);
      margin-bottom: 22px;
    }
    .sa-scope .sa-hero .badge {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--brand-primary);
      background: var(--surface-card);
      border: 1px solid var(--brand-primary);
      border-radius: 20px; padding: 3px 10px;
      display: inline-block; margin-bottom: 10px;
    }
    .sa-scope .sa-hero h2 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 19px;
      margin: 0 0 6px; line-height: 1.25; color: var(--text);
    }
    .sa-scope .sa-hero p {
      margin: 0; color: var(--text-dim); font-size: 14px; max-width: 620px;
    }
    .sa-scope .sa-hero .ic {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--surface-card); border: 1px solid var(--brand-primary);
      display: grid; place-items: center; flex: none;
    }
    .sa-scope .sa-hero .ic .ti { font-size: 22px; color: var(--brand-primary); }
    .sa-scope .sa-hero .go { flex: none; }

    /* Reis-tijdlijn. */
    .sa-scope .sa-journey {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 22px; margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-steps { display: flex; position: relative; margin-top: 14px; }
    .sa-scope .sa-steps::before {
      content: ""; position: absolute; top: 15px; left: 24px; right: 24px;
      height: 2px; background: var(--border);
    }
    .sa-scope .sa-steps .sa-fill {
      position: absolute; top: 15px; left: 24px; height: 2px;
      background: linear-gradient(90deg, var(--color-success), var(--brand-primary));
      border-radius: 2px;
    }
    .sa-scope .sa-ms { flex: 1; text-align: center; position: relative; z-index: 1; padding: 0 4px; }
    .sa-scope .sa-ms .node {
      width: 32px; height: 32px; border-radius: 50%;
      margin: 0 auto 10px; display: grid; place-items: center;
      background: var(--surface-1);
      box-shadow: inset 0 0 0 2px var(--border-default, var(--border));
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px; color: var(--text-dim);
      transition: .15s;
    }
    .sa-scope .sa-ms.done .node {
      background: var(--color-success); color: #fff; box-shadow: none;
    }
    .sa-scope .sa-ms.here .node {
      background: var(--brand-primary); color: #fff;
      box-shadow: 0 0 0 5px var(--brand-primary-soft);
      animation: sa-pp 2.4s infinite;
    }
    @keyframes sa-pp {
      0%,100% { box-shadow: 0 0 0 5px var(--brand-primary-soft); }
      50%     { box-shadow: 0 0 0 9px var(--brand-primary-soft-hover); }
    }
    .sa-scope .sa-ms .t {
      font-size: 11px; color: var(--text-dim); line-height: 1.3;
    }
    .sa-scope .sa-ms.here .t { color: var(--text); font-weight: 600; }
    .sa-scope .sa-ms.here .youare {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 9px; color: var(--brand-primary);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px;
    }

    /* Ring-meters (strategie / trader / detectie). */
    .sa-scope .sa-meters {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 22px;
    }
    @media (max-width: 720px) { .sa-scope .sa-meters { grid-template-columns: 1fr; } }
    .sa-scope .sa-meter {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-ring { width: 96px; height: 96px; margin: 2px auto 12px; position: relative; }
    .sa-scope .sa-ring svg { transform: rotate(-90deg); }
    .sa-scope .sa-ring .val {
      position: absolute; inset: 0; display: grid; place-items: center;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-weight: 600; font-size: 20px;
    }
    .sa-scope .sa-meter .mt {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 13.5px; margin-bottom: 3px;
      color: var(--text);
    }
    .sa-scope .sa-meter .md {
      font-size: 11.5px; color: var(--text-dim); line-height: 1.4;
    }

    /* Sectiekaarten met status-pill. */
    .sa-scope .sa-cards {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 720px) { .sa-scope .sa-cards { grid-template-columns: 1fr; } }
    .sa-scope .sa-c {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 17px; cursor: pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      display: flex; gap: 13px; align-items: flex-start;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-c:hover {
      border-color: var(--brand-primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .sa-scope .sa-c .ci {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--brand-primary-soft);
      display: grid; place-items: center; flex: none;
    }
    .sa-scope .sa-c .ci .ti {
      color: var(--brand-primary); font-size: 19px;
    }
    .sa-scope .sa-c h4 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 14px;
      margin: 0 0 3px; display: flex; align-items: center; gap: 8px;
      color: var(--text);
    }
    .sa-scope .sa-c .why {
      font-size: 12px; color: var(--text-dim); line-height: 1.45;
    }
    .sa-scope .sa-st {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 9.5px; padding: 2px 7px;
      border-radius: 20px; font-weight: 600; white-space: nowrap;
    }
    .sa-scope .sa-st.done {
      background: var(--color-success-soft); color: var(--color-success-text);
    }
    .sa-scope .sa-st.part {
      background: var(--color-warning-soft); color: var(--color-warning-text);
    }
    .sa-scope .sa-st.todo {
      background: var(--color-neutral-soft); color: var(--color-neutral-text);
    }

    @media (prefers-reduced-motion: reduce) {
      .sa-scope * { animation: none !important; transition: none !important; }
    }

    /* ── OANDA chart-cockpit: TradingView-layout (watchlist rechts) + fullscreen ── */
    .oanda-main { display: flex; align-items: stretch; gap: 5px; }
    .oanda-watchlist {
      flex: 0 0 172px; overflow-y: auto; overflow-x: hidden;
      /* Eigen verticale scroll met max-hoogte ≈ de chart (zelfde regel als
         .oanda-chart-full) → de lijst wordt nooit langer dan de chart en scrollt
         binnen z'n eigen kolom. Fullscreen zet 'm op height:100%. */
      height: calc(100vh - 240px); min-height: 520px;
      border: 1px solid var(--sa-line); border-radius: 8px;
      background: var(--sa-panel);
    }
    .oanda-wl-hd {
      font-size: 9.5px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--sa-tx-mid); font-weight: 700; padding: 4px 8px;
      border-bottom: 1px solid var(--sa-line); position: sticky; top: 0;
      background: var(--sa-panel);
    }
    .oanda-wl-row {
      display: flex; align-items: center; gap: 6px; width: 100%; text-align: left;
      border: none; background: none; cursor: pointer;
      font-family: ui-monospace, monospace; font-size: 11px;
      padding: 3px 7px; color: var(--sa-tx); border-bottom: 1px solid var(--sa-line);
    }
    .oanda-wl-row .wl-sym { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .oanda-wl-row .wl-r { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.1; flex: 0 0 auto; }
    .oanda-wl-row .wl-px { font-size: 10.5px; color: var(--sa-tx); }
    .oanda-wl-row .wl-ch { font-size: 9.5px; color: var(--sa-tx-mid); }
    .oanda-wl-row:last-child { border-bottom: none; }
    .oanda-wl-row:hover { background: var(--color-neutral-soft, rgba(0,0,0,.04)); }
    .oanda-wl-row.active {
      background: var(--color-info-soft, rgba(37,99,235,.10));
      color: var(--color-info-text, #2563eb); font-weight: 600;
    }
    .oanda-fib-btn.active, .oanda-hline-btn.active, .oanda-trend-btn.active, .oanda-rect-btn.active, .oanda-text-btn.active {
      background: var(--color-info-soft, rgba(37,99,235,.12)) !important;
      color: var(--color-info-text, #2563eb) !important;
      border-color: var(--color-info, #2563eb) !important;
    }
    /* Verticale teken-tool-kolom LINKS van de chart (TradingView-layout). */
    .oanda-toolcol {
      flex: 0 0 38px; display: flex; flex-direction: column; gap: 3px;
      padding: 4px 4px; align-items: center;
      border: 1px solid var(--sa-line); border-radius: 8px; background: var(--sa-panel);
    }
    .oanda-toolcol .sa-btn {
      width: 28px; height: 28px; padding: 0; display: grid; place-items: center; font-size: 13px;
    }

    /* Standaard-hoogte volledige cockpit-chart: fors, meebewegend met de
       viewport, met een verstandige min-height. (Compacte dashboard-chart
       houdt zijn eigen kleine inline-hoogte.) Iets minder offset → meer chart. */
    .oanda-chart-full { height: calc(100vh - 240px) !important; min-height: 520px; }

    /* Fullscreen-overlay: cockpit vult het HELE venster, boven sidebar (z200),
       mobiele menu-overlay (z10000) en notif-panel (z10001). De inline
       position:relative op .oanda-cockpit wordt hier met !important overruled
       (anders wint inline en blijft de overlay "maar een beetje groter"). */
    .oanda-cockpit.oanda-fs {
      position: fixed !important; inset: 0 !important; z-index: 100000 !important;
      width: 100vw; height: 100vh;
      background: var(--bg, #fff); margin: 0 !important; padding: 12px 14px !important;
      display: flex; flex-direction: column;
    }
    .oanda-cockpit.oanda-fs .oanda-main { flex: 1 1 auto; min-height: 0; }
    .oanda-cockpit.oanda-fs .oanda-chart-wrap { height: 100%; }
    .oanda-cockpit.oanda-fs .oanda-chart { height: 100% !important; min-height: 0 !important; }
    .oanda-cockpit.oanda-fs .oanda-watchlist { height: 100% !important; }
    .oanda-cockpit.oanda-fs .oanda-toolcol { height: 100% !important; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="sa-scope">
  <div class="page-header">
    <div class="lock" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
      </svg>
    </div>
    <div>
      <h1>Strategie-trainer</h1>

<script src="/modules/shared/supabase-client.js"></script>

<!-- TradingView Lightweight Charts (open-source, geen account/key) — voor OANDA chart-cockpit.
     Pin op v4: v5 heeft addCandlestickSeries verwijderd (breaking) en verwacht
     chart.addSeries(LightweightCharts.CandlestickSeries, ...). Onze code gebruikt de v4-API. -->
<script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = document.getElementById('saRoot');
  const apiFetch = () => (window.AgentShared && window.AgentShared.apiFetch) || null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }
  function showDenied(msg) {
    ROOT.innerHTML = '<div class="sa-denied"><strong>Geen toegang</strong>' + esc(msg || 'Je hebt geen toegang tot deze pagina. Je wordt teruggestuurd naar het dashboard…') + '</div>';
    setTimeout(function () { window.location.href = '/index.html'; }, 1400);
  }
  function toast(msg, kind) {
    try { window.AgentShared?.showToast?.(msg, kind || 'info'); } catch (_) {}
  }

  // ── State ────────────────────────────────────────────────────────────
  const state = {
    tab: 'home',            // 'home' is nu de default landingsview.
    workspace: { strategies: [], tools: [] },
    trades: { list: [], stats: null },
    activeStrategyId: null,
    activeStrategy: null,   // volledige detail (steps + checklist)
    activeToolId: null,
    activeTool: null,       // volledige detail (examples)
    checkedItems: new Set(),// client-side check-state → grade
    conditions: [],         // owner-scoped condities (global + strategy)
  };

  // ── Fetch helpers ────────────────────────────────────────────────────
  async function api(url, opts) {
    const f = apiFetch();
    if (!f) throw new Error('apiFetch niet beschikbaar');
    const r = await f(url, opts || {});
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    return d;
  }

  async function loadWorkspace() {
    const d = await api('/api/secret-area-workspace');
    state.workspace = { strategies: d.strategies || [], tools: d.tools || [] };
  }
  async function loadTrades() {
    const d = await api('/api/secret-area-trade');
    state.trades = { list: d.trades || [], stats: d.stats || null };
  }
  async function loadStrategy(id) {
    if (!id) { state.activeStrategy = null; state.checkedItems.clear(); return; }
    const d = await api('/api/secret-area-strategy?id=' + encodeURIComponent(id));
    state.activeStrategy = d.strategy || null;
    state.checkedItems.clear();
  }
  async function loadTool(id) {
    if (!id) { state.activeTool = null; return; }
    const d = await api('/api/secret-area-tool?id=' + encodeURIComponent(id));
    state.activeTool = d.tool ? { ...d.tool, examples: d.examples || [] } : null;
  }
  async function loadConditions() {
    try {
      const d = await api('/api/secret-area-condition');
      state.conditions = d.conditions || [];
    } catch (e) { console.warn('[sa] loadConditions:', e.message); state.conditions = []; }
  }

  // ── Pijplijn-status: uit data afgeleide gereedheid per stap ─────────
  // Voor pijplijn-berekening kiezen we een "peil-strategie":
  //   activeStrategy (indien geladen) → anders eerste in workspace.
  function _peilStrategy() {
    if (state.activeStrategy) return state.activeStrategy;
    const first = state.workspace.strategies[0] || null;
    return first ? { ...first, steps: [], checklist: [] } : null;
  }
  function pipelineStatus() {
    const tools = state.workspace.tools || [];
    const trained = tools.filter((t) => t.detection_rule && String(t.detection_rule).trim().length > 0);
    const s = _peilStrategy();
    const stratComplete = s && s.name && s.entry_signal && s.sl_signal && s.tp_signal;
    const stratPartial  = s && (s.name || s.entry_signal || s.sl_signal || s.tp_signal);
    const condsForS     = state.conditions.filter((c) => c.scope === 'global' || (s && c.strategy_id === s.id));
    const cl            = state.activeStrategy?.checklist || [];
    const specPresent   = state.activeStrategy?.recognition_spec && state.activeStrategy.recognition_spec.trim().length > 0;

    return {
      peil: s,
      steps: [
        {
          key:      'tools',
          label:    '1. Tools',
          status:   tools.length === 0 ? 'todo' : (trained.length >= tools.length ? 'done' : 'partial'),
          detail:   trained.length + ' van ' + tools.length + ' getraind',
        },
        {
          key:      'strategy',
          label:    '2. Strategie',
          status:   stratComplete ? 'done' : (stratPartial ? 'partial' : 'todo'),
          detail:   s ? (stratComplete ? s.name : (s.name || 'aanmaken')) : 'nog geen strategie',
        },
        {
          key:      'conditions',
          label:    '3. Marktcondities',
          status:   condsForS.length === 0 ? 'todo' : (condsForS.length >= 3 ? 'done' : 'partial'),
          detail:   condsForS.length + ' condities',
        },
        {
          key:      'checklist',
          label:    '4. Checklist',
          status:   cl.length === 0 ? 'todo' : (cl.length >= 3 ? 'done' : 'partial'),
          detail:   cl.length + ' items',
        },
        {
          key:      'review',
          label:    '5. Systeem-review',
          status:   specPresent ? 'done' : (stratComplete && cl.length > 0 ? 'partial' : 'todo'),
          detail:   specPresent ? 'setup-herkenning opgeslagen' : 'nog niet gegenereerd',
        },
      ],
    };
  }
  function readiness(steps) {
    const w = { done: 1.0, partial: 0.5, todo: 0.0 };
    const total = steps.reduce((a, s) => a + w[s.status], 0);
    return Math.round((total / steps.length) * 100);
  }

  // ── Grade compute (client-side, alle checks = A+, 1 mist = B, 2+ = C).
  function computeGrade() {
    const items = state.activeStrategy?.checklist || [];
    if (items.length === 0) return null;
    const missing = items.filter((c) => !state.checkedItems.has(c.id)).length;
    if (missing === 0) return 'A+';
    if (missing === 1) return 'B';
    return 'C';
  }

  // ── Render — pijplijn-nav (v2) ───────────────────────────────────────
  // Volgorde: Home · Dashboard · 1 Tools · 2 Strategie · 3 Marktcondities ·
  //           4 Checklist · 5 Systeem-review · | Detectie · Trades
  function renderWorkspace() {
    const st = pipelineStatus();
    const stepIcon = (k) => {
      const s = st.steps.find((x) => x.key === k);
      if (!s) return '';
      if (s.status === 'done')    return ' <i class="ti ti-circle-check" style="color:var(--sa-win)"></i>';
      if (s.status === 'partial') return ' <i class="ti ti-circle-dashed" style="color:var(--sa-amber)"></i>';
      return ' <i class="ti ti-circle" style="color:var(--sa-tx-dim)"></i>';
    };
    ROOT.innerHTML =
      '<div class="sa-tabs" role="tablist">'
      + tab('home',       'Home')
      + tab('dashboard',  'Dashboard')
      + tab('tools',      '1 Tools'         + stepIcon('tools'))
      + tab('strategy',   '2 Strategie'     + stepIcon('strategy'))
      + tab('conditions', '3 Marktcondities'+ stepIcon('conditions'))
      + tab('checklist',  '4 Checklist'     + stepIcon('checklist'))
      + tab('setup',      '5 Setup-eisen')
      + tab('review',     '6 Systeem-review'+ stepIcon('review'))
      + '<span class="sa-tab-sep">|</span>'
      + tab('chart',      'Chart')
      + tab('backtest',   'Backtest')
      + tab('analyse',    'Chart-analyse')
      + tab('detection',  'Detectie & signalen')
      + tab('trades',     'Trades')
      + '</div>'
      + '<div id="saPane"></div>';
    document.querySelectorAll('.sa-tab').forEach((b) => b.addEventListener('click', () => {
      state.tab = b.dataset.tab || 'home';
      renderPane();
      document.querySelectorAll('.sa-tab').forEach((x) => x.classList.toggle('active', x.dataset.tab === state.tab));
    }));
    renderPane();
  }
  function tab(key, labelHtml) {
    const cls = state.tab === key ? 'sa-tab active' : 'sa-tab';
    return '<button type="button" class="' + cls + '" data-tab="' + key + '" role="tab">' + labelHtml + '</button>';
  }

  function renderPane() {
    const p = document.getElementById('saPane');
    if (!p) return;
    // Cleanup actieve OANDA-cockpits in de vorige pane (voorkomt
    // interval-leaks + dubbele fetches bij tab-switch of re-render).
    for (const el of [..._oandaActive]) _oandaCleanup(el);
    if (state.tab === 'home')       return renderHome(p);
    if (state.tab === 'dashboard')  return renderDashboard(p);
    if (state.tab === 'tools')      return renderTools(p);
    if (state.tab === 'strategy')   return renderStrategyBuilder(p);
    if (state.tab === 'conditions') return renderConditions(p);
    if (state.tab === 'checklist')  return renderChecklist(p);
    if (state.tab === 'review')     return renderReview(p);
    if (state.tab === 'detection')  return renderDetection(p);
    if (state.tab === 'trades')     return renderTradesCombined(p);
    if (state.tab === 'analyse')    return renderAnalyse(p);
    if (state.tab === 'setup')      return renderSetup(p);
    if (state.tab === 'chart')      return renderChartTab(p);
    if (state.tab === 'backtest')   return renderBacktestTab(p);
  }

  // ── OANDA chart-cockpit component ───────────────────────────────────────
  // Herbruikbaar op meerdere plekken (dashboard-compact + Chart-tab). Beheert
  // paar/timeframe-selectie, initiele fetch, en live-refresh van de open
  // candle. Cleanup via container._oanda bij re-mount of tab-switch.
  // Set van actieve cockpit-containers. Wordt gebruikt om bij tab-switch of
  // re-render alle draaiende timers/aborts in één klap op te ruimen zonder
  // te hoeven speuren via querySelector.
  const _oandaActive = new Set();

  const OANDA_INSTRUMENTS = [
    'EUR_USD','GBP_USD','USD_JPY','USD_CHF','AUD_USD','USD_CAD','NZD_USD',
    'EUR_GBP','EUR_JPY','GBP_JPY','EUR_CHF','AUD_JPY','CAD_JPY','CHF_JPY',
    'NZD_JPY','GBP_CHF','GBP_AUD','GBP_CAD','GBP_NZD','EUR_AUD','EUR_CAD',
    'EUR_NZD','AUD_CAD','AUD_CHF','AUD_NZD','XAU_USD',
  ];
  const OANDA_TIMEFRAMES = ['M1','M5','M15','M30','H1','H4','D','W'];
  // Fib-tekentool niveaus (zelfde oriëntatie/conventie als de backtest-fib):
  // 1.0 = swing-extreme (SL-kant), 0 = impuls-extreme, 0.71 = OTE/entry,
  // -0.27 = TP1-extensie voorbij 0. Prijs = zero + f·(one − zero), met one = het
  // 1.0-anker (swing) en zero = het 0-anker (impuls); reverse wisselt one/zero.
  //
  // Volledige niveau-catalogus voor het per-fib settings-paneel (TradingView-
  // stijl). FIB_DEFAULT_ON bepaalt welke standaard AAN staan (jouw setup); de
  // rest kan de gebruiker per fib aanvinken.
  const FIB_LEVELS_ALL = [
    { f: 1.618, color: '#a855f7' },
    { f: 1.0,   color: '#dc2626' },
    { f: 0.786, color: '#db2777' },
    { f: 0.71,  color: '#2563eb' },
    { f: 0.618, color: '#f59e0b' },
    { f: 0.382, color: '#0ea5e9' },
    { f: 0.236, color: '#14b8a6' },
    { f: 0.0,   color: '#9ca3af' },
    { f: -0.27, color: '#059669' },
  ];
  const FIB_DEFAULT_ON = new Set([1.0, 0.71, 0.0, -0.27]);
  const SA_FIB_LS_KEY = 'sa_fib_defaults_v1';

  // Config-fabriek + merge/load/save voor de per-fib instellingen. De LAATST
  // gekozen config wordt (best-effort) in localStorage bewaard als default voor
  // nieuwe fibs, zodat je niet elke keer opnieuw hoeft in te stellen.
  function _fibDefaultCfg() {
    return {
      levels: FIB_LEVELS_ALL.map((l) => ({ f: l.f, on: FIB_DEFAULT_ON.has(l.f), color: l.color })),
      reverse: false,
      labelSide: 'right',   // 'left' | 'right'
      showPrice: true,      // prijswaarde in label
      showPct: true,        // percentage in label
      width: 1,             // lijndikte in CSS-px: 0.5 | 1 | 1.5 | 2 | 3
      lineStyle: 'solid',   // 'solid' | 'dashed' | 'dotted'
      extend: 'none',       // 'none' | 'right' | 'left' | 'both' (lijn tot rand)
      // Uitgebreide TradingView-opties (veilige defaults → bestaande fibs blijven werken):
      trendLine: false,     // diagonale lijn punt 1 → punt 2
      trendColor: '#888888',
      trendStyle: 'solid',  // 'solid' | 'dashed'
      useOneColor: false,   // alle niveaus in één kleur
      oneColor: '#2563eb',
      background: false,     // vlakken tussen niveaus vullen
      bgOpacity: 20,         // 0..100
      labelVPos: 'above',   // 'above' | 'middle' | 'below'
      fontSize: 10,          // 10 | 12 | 14
    };
  }
  function _fibCloneCfg(cfg) { try { return JSON.parse(JSON.stringify(cfg)); } catch (_) { return _fibDefaultCfg(); } }
  function _fibMergeCfg(saved) {
    const d = _fibDefaultCfg();
    if (!saved || typeof saved !== 'object') return d;
    const byF = new Map((Array.isArray(saved.levels) ? saved.levels : []).map((l) => [l.f, l]));
    const levels = FIB_LEVELS_ALL.map((l) => {
      const s = byF.get(l.f);
      return {
        f: l.f,
        on: s && typeof s.on === 'boolean' ? s.on : FIB_DEFAULT_ON.has(l.f),
        color: s && typeof s.color === 'string' ? s.color : l.color,
      };
    });
    return {
      levels,
      reverse: typeof saved.reverse === 'boolean' ? saved.reverse : d.reverse,
      labelSide: (saved.labelSide === 'left' || saved.labelSide === 'right') ? saved.labelSide : d.labelSide,
      showPrice: typeof saved.showPrice === 'boolean' ? saved.showPrice : d.showPrice,
      showPct: typeof saved.showPct === 'boolean' ? saved.showPct : d.showPct,
      width: [0.5, 1, 1.5, 2, 3].includes(saved.width) ? saved.width : d.width,
      lineStyle: ['solid', 'dashed', 'dotted'].includes(saved.lineStyle) ? saved.lineStyle : d.lineStyle,
      extend: ['none', 'right', 'left', 'both'].includes(saved.extend) ? saved.extend : d.extend,
      trendLine: typeof saved.trendLine === 'boolean' ? saved.trendLine : d.trendLine,
      trendColor: typeof saved.trendColor === 'string' ? saved.trendColor : d.trendColor,
      trendStyle: ['solid', 'dashed'].includes(saved.trendStyle) ? saved.trendStyle : d.trendStyle,
      useOneColor: typeof saved.useOneColor === 'boolean' ? saved.useOneColor : d.useOneColor,
      oneColor: typeof saved.oneColor === 'string' ? saved.oneColor : d.oneColor,
      background: typeof saved.background === 'boolean' ? saved.background : d.background,
      bgOpacity: (Number.isFinite(saved.bgOpacity) && saved.bgOpacity >= 0 && saved.bgOpacity <= 100) ? saved.bgOpacity : d.bgOpacity,
      labelVPos: ['above', 'middle', 'below'].includes(saved.labelVPos) ? saved.labelVPos : d.labelVPos,
      fontSize: [10, 12, 14].includes(saved.fontSize) ? saved.fontSize : d.fontSize,
    };
  }
  function _fibLoadDefaultCfg() {
    try { const raw = localStorage.getItem(SA_FIB_LS_KEY); if (raw) return _fibMergeCfg(JSON.parse(raw)); } catch (_) {}
    return _fibDefaultCfg();
  }
  function _fibSaveDefaultCfg(cfg) { try { localStorage.setItem(SA_FIB_LS_KEY, JSON.stringify(cfg)); } catch (_) {} }

  // ── Horizontale-lijn config (per hline; localStorage-default) ──────────
  const SA_HLINE_LS_KEY = 'sa_hline_defaults_v1';
  const HLINE_STYLES = ['solid', 'dashed', 'dotted'];
  const LINE_WIDTHS = [0.5, 1, 1.5, 2, 3];
  function _hlineDefaultCfg() {
    return { color: '#eab308', width: 1, style: 'solid', extend: 'both' };
  }
  function _hlineCloneCfg(cfg) { try { return JSON.parse(JSON.stringify(cfg)); } catch (_) { return _hlineDefaultCfg(); } }
  function _hlineMergeCfg(saved) {
    const d = _hlineDefaultCfg();
    if (!saved || typeof saved !== 'object') return d;
    return {
      color: typeof saved.color === 'string' ? saved.color : d.color,
      width: LINE_WIDTHS.includes(saved.width) ? saved.width : d.width,
      style: HLINE_STYLES.includes(saved.style) ? saved.style : d.style,
      extend: ['none', 'right', 'left', 'both'].includes(saved.extend) ? saved.extend : d.extend,
    };
  }
  function _hlineLoadDefaultCfg() {
    try { const raw = localStorage.getItem(SA_HLINE_LS_KEY); if (raw) return _hlineMergeCfg(JSON.parse(raw)); } catch (_) {}
    return _hlineDefaultCfg();
  }
  function _hlineSaveDefaultCfg(cfg) { try { localStorage.setItem(SA_HLINE_LS_KEY, JSON.stringify(cfg)); } catch (_) {} }

  // ── Trendlijn config (per trend; localStorage-default) ─────────────────
  const SA_TREND_LS_KEY = 'sa_trend_defaults_v1';
  function _trendDefaultCfg() {
    return { color: '#2563eb', width: 1, style: 'solid', extend: 'none' };
  }
  function _trendCloneCfg(cfg) { try { return JSON.parse(JSON.stringify(cfg)); } catch (_) { return _trendDefaultCfg(); } }
  function _trendMergeCfg(saved) {
    const d = _trendDefaultCfg();
    if (!saved || typeof saved !== 'object') return d;
    return {
      color: typeof saved.color === 'string' ? saved.color : d.color,
      width: LINE_WIDTHS.includes(saved.width) ? saved.width : d.width,
      style: HLINE_STYLES.includes(saved.style) ? saved.style : d.style,
      extend: ['none', 'right', 'left', 'both'].includes(saved.extend) ? saved.extend : d.extend,
    };
  }
  function _trendLoadDefaultCfg() {
    try { const raw = localStorage.getItem(SA_TREND_LS_KEY); if (raw) return _trendMergeCfg(JSON.parse(raw)); } catch (_) {}
    return _trendDefaultCfg();
  }
  function _trendSaveDefaultCfg(cfg) { try { localStorage.setItem(SA_TREND_LS_KEY, JSON.stringify(cfg)); } catch (_) {} }

  // ── Rechthoek/zone config (per rect; localStorage-default) ─────────────
  // Twee tegenoverliggende hoeken (p1/p2) spannen een prijs- + tijd-range.
  // Rand (kleur/dikte/stijl) + optionele vulling (kleur + transparantie).
  const SA_RECT_LS_KEY = 'sa_rect_defaults_v1';
  function _rectDefaultCfg() {
    return { color: '#2563eb', width: 1, style: 'solid', fill: true, fillColor: '#2563eb', fillOpacity: 15 };
  }
  function _rectCloneCfg(cfg) { try { return JSON.parse(JSON.stringify(cfg)); } catch (_) { return _rectDefaultCfg(); } }
  function _rectMergeCfg(saved) {
    const d = _rectDefaultCfg();
    if (!saved || typeof saved !== 'object') return d;
    const op = Number(saved.fillOpacity);
    return {
      color: typeof saved.color === 'string' ? saved.color : d.color,
      width: LINE_WIDTHS.includes(saved.width) ? saved.width : d.width,
      style: HLINE_STYLES.includes(saved.style) ? saved.style : d.style,
      fill: typeof saved.fill === 'boolean' ? saved.fill : d.fill,
      fillColor: typeof saved.fillColor === 'string' ? saved.fillColor : d.fillColor,
      fillOpacity: (Number.isFinite(op) && op >= 0 && op <= 100) ? op : d.fillOpacity,
    };
  }
  function _rectLoadDefaultCfg() {
    try { const raw = localStorage.getItem(SA_RECT_LS_KEY); if (raw) return _rectMergeCfg(JSON.parse(raw)); } catch (_) {}
    return _rectDefaultCfg();
  }
  function _rectSaveDefaultCfg(cfg) { try { localStorage.setItem(SA_RECT_LS_KEY, JSON.stringify(cfg)); } catch (_) {} }

  // ── Tekst/label config (per text; localStorage-default) ────────────────
  // Eén anker (p1) + inhoud. Kleur/lettergrootte + optioneel achtergrond-kader.
  const SA_TEXT_LS_KEY = 'sa_text_defaults_v1';
  const TEXT_SIZES = [10, 12, 14, 16, 18];
  function _textDefaultCfg() {
    return { color: '#2563eb', fontSize: 12, bg: true, bgColor: '#ffffff', bgOpacity: 80 };
  }
  function _textCloneCfg(cfg) { try { return JSON.parse(JSON.stringify(cfg)); } catch (_) { return _textDefaultCfg(); } }
  function _textMergeCfg(saved) {
    const d = _textDefaultCfg();
    if (!saved || typeof saved !== 'object') return d;
    const op = Number(saved.bgOpacity);
    return {
      color: typeof saved.color === 'string' ? saved.color : d.color,
      fontSize: TEXT_SIZES.includes(saved.fontSize) ? saved.fontSize : d.fontSize,
      bg: typeof saved.bg === 'boolean' ? saved.bg : d.bg,
      bgColor: typeof saved.bgColor === 'string' ? saved.bgColor : d.bgColor,
      bgOpacity: (Number.isFinite(op) && op >= 0 && op <= 100) ? op : d.bgOpacity,
    };
  }
  function _textLoadDefaultCfg() {
    try { const raw = localStorage.getItem(SA_TEXT_LS_KEY); if (raw) return _textMergeCfg(JSON.parse(raw)); } catch (_) {}
    return _textDefaultCfg();
  }
  function _textSaveDefaultCfg(cfg) { try { localStorage.setItem(SA_TEXT_LS_KEY, JSON.stringify(cfg)); } catch (_) {} }

  // Label voor een fractie: heel getal → 1 decimaal weg (bv "1"), anders zoals is.
  function _fibLabel(f) { return String(f); }
  // Live-tick interval: elke seconde de laatste (open) candle bijwerken via
  // series.update — geen full reload, geen invloed op de lazy-load-historie.
  const OANDA_REFRESH_MS = 1000;
  const OANDA_INITIAL_COUNT = 1500;   // eerste load
  const OANDA_OLDER_COUNT   = 1500;   // batch bij terugscrollen
  // Bij hoeveel candles vanaf de linkerrand triggeren we een lazy-load.
  // Kies iets meer dan de gemiddelde zichtbare-range zodat de fetch al start
  // voordat de user echt de rand raakt.
  const OANDA_EDGE_TRIGGER  = 30;

  function _oandaCleanup(container) {
    if (!container) return;
    if (container._oanda) {
      try { clearInterval(container._oanda.timer); } catch (_) {}
      try { clearInterval(container._oanda.wlTimer); } catch (_) {} // watchlist-prijzen
      try { container._oanda.hist?.abort(); } catch (_) {}
      try { container._oanda.live?.abort(); } catch (_) {}
      try { container._oanda.ro?.disconnect(); } catch (_) {}
      // Document-level Esc-listener (fullscreen) opruimen om leaks te voorkomen.
      try { if (container._oanda.escHandler) document.removeEventListener('keydown', container._oanda.escHandler); } catch (_) {}
      // Shift-magneet-listeners opruimen.
      try { if (container._oanda.shiftDownH) document.removeEventListener('keydown', container._oanda.shiftDownH); } catch (_) {}
      try { if (container._oanda.shiftUpH)   document.removeEventListener('keyup', container._oanda.shiftUpH); } catch (_) {}
      try { if (container._oanda.shiftBlurH) window.removeEventListener('blur', container._oanda.shiftBlurH); } catch (_) {}
      // Teken-laag: rAF stoppen + document-listeners opruimen.
      try {
        const f = container._oanda.draw;
        if (f) {
          if (f.raf) cancelAnimationFrame(f.raf);
          if (f._ro) f._ro.disconnect();
          if (f.onMove) document.removeEventListener('mousemove', f.onMove, true);
          if (f.onUp)   document.removeEventListener('mouseup', f.onUp, true);
          if (f.onKey)  document.removeEventListener('keydown', f.onKey);
        }
      } catch (_) {}
      try { container._oanda.chart?.remove(); } catch (_) {}
      container._oanda = null;
    }
    _oandaActive.delete(container);
  }

  // Prijs-precisie per instrument. Anders zou de as afronden tot 2 decimalen
  // en zouden waardes zoals 1.33677 als 1.34 verschijnen.
  //   JPY-paren → 3 decimalen (waarde-orde 100+ → 3e decimaal is pip)
  //   XAU_USD  → 2 decimalen (goud in USD, orde 1000+)
  //   overige FX → 5 decimalen (majors/crosses, orde 0.5–2)
  function _oandaPrecisionFor(instr) {
    if (typeof instr !== 'string') return 5;
    if (instr.indexOf('JPY') !== -1) return 3;
    if (instr === 'XAU_USD')        return 2;
    return 5;
  }
  function _oandaPriceFormatFor(instr) {
    const precision = _oandaPrecisionFor(instr);
    return {
      type    : 'price',
      precision,
      minMove : Math.pow(10, -precision),
    };
  }
  function _oandaFormatPrice(v, precision) {
    if (v == null || !Number.isFinite(v)) return '—';
    return Number(v).toFixed(precision);
  }

  function _oandaTimeToUnix(iso) {
    // OANDA levert RFC3339 met nano-seconden ("2024-06-01T09:15:00.000000000Z").
    // Lightweight Charts wil UNIX seconds voor intraday én daily.
    if (!iso) return null;
    const t = Date.parse(iso);
    if (!Number.isFinite(t)) return null;
    return Math.floor(t / 1000);
  }

  function _oandaMapCandle(c) {
    const t = _oandaTimeToUnix(c?.time);
    if (t == null) return null;
    const o = Number(c?.o), h = Number(c?.h), l = Number(c?.l), cl = Number(c?.c);
    if (![o,h,l,cl].every(Number.isFinite)) return null;
    return { time: t, open: o, high: h, low: l, close: cl };
  }

  async function _oandaFetchCandles(instrument, granularity, count, signal, opts) {
    const f = apiFetch();
    if (!f) throw new Error('apiFetch niet beschikbaar');
    const includeIncomplete = !(opts && opts.includeIncomplete === false);
    let url = '/api/secret-area-oanda'
      + '?instrument=' + encodeURIComponent(instrument)
      + '&granularity=' + encodeURIComponent(granularity)
      + '&count=' + encodeURIComponent(count);
    if (includeIncomplete) url += '&includeIncomplete=1';
    if (opts && Number.isFinite(opts.beforeSec)) {
      url += '&before=' + encodeURIComponent(Math.floor(opts.beforeSec));
    }
    const r = await f(url, { signal });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    return Array.isArray(d.candles) ? d.candles : [];
  }

  // ── Chart-instellingen (tandwiel-paneel, TradingView-stijl) ─────────────
  // Per apparaat onthouden in localStorage; gedeeld door beide chart-instanties
  // (dashboard-compact + Chart-tab) omdat ze dezelfde key laden. Alle storage
  // in try/catch i.v.m. privacy-modus. Defaults = de huidige lichte on-brand
  // look, zodat er zonder opgeslagen voorkeuren niets verandert.
  const SA_CHART_LS_KEY = 'sa_chart_settings_v1';

  // Granularity → candle-duur in seconden, voor de "countdown to bar close".
  const SA_TF_DURATION_SEC = {
    M1: 60, M5: 300, M15: 900, M30: 1800, H1: 3600, H4: 14400, D: 86400, W: 604800,
  };

  // CSS-kleur → #rrggbb (color-inputs willen hex). Vangt #rgb/#rrggbb en
  // rgb()/rgba(); valt anders terug op de meegegeven fallback.
  function _saToHex(raw, fallback) {
    const s = String(raw || '').trim();
    if (!s) return fallback;
    if (/^#[0-9a-fA-F]{6}$/.test(s)) return s.toLowerCase();
    if (/^#[0-9a-fA-F]{3}$/.test(s)) return ('#' + s[1] + s[1] + s[2] + s[2] + s[3] + s[3]).toLowerCase();
    const m = s.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/i);
    if (m) {
      const h = (n) => Math.max(0, Math.min(255, parseInt(n, 10))).toString(16).padStart(2, '0');
      return ('#' + h(m[1]) + h(m[2]) + h(m[3])).toLowerCase();
    }
    return fallback;
  }
  function _saRgba(hex, a) {
    const h = _saToHex(hex, '#000000').replace('#', '');
    const r = parseInt(h.slice(0, 2), 16), g = parseInt(h.slice(2, 4), 16), b = parseInt(h.slice(4, 6), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
  }
  // Geldige hex voor de tekstvelden naast de color pickers: #RGB of #RRGGBB.
  // (Geen alpha: <input type=color> ondersteunt alleen 6-cijferig, dus we
  //  houden picker + hex-veld synchroon op #RRGGBB.)
  const SA_HEX_RE = /^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/;
  // Path-helpers voor het generieke [data-set]="a.b.c" paneel-wiring.
  function _saGetPath(obj, path) { return path.split('.').reduce((o, k) => (o == null ? o : o[k]), obj); }
  function _saSetPath(obj, path, val) {
    const parts = path.split('.');
    let o = obj;
    for (let i = 0; i < parts.length - 1; i++) o = o[parts[i]];
    o[parts[parts.length - 1]] = val;
  }

  // Defaults afgeleid van de brand-tokens op runtime (lichte look).
  function _saDefaultChartSettings() {
    const cs = getComputedStyle(document.documentElement);
    const rv = (name, fb) => _saToHex((cs.getPropertyValue(name) || '').trim(), fb);
    const up    = rv('--color-success', '#25c79b');
    const down  = rv('--color-danger',  '#dc2626');
    const line  = rv('--sa-line',       '#e5e7eb');
    const panel = rv('--sa-panel',      '#ffffff');
    return {
      version: 1,
      style: 'candles',            // 'candles' | 'line' | 'area'
      colorByPrevClose: false,
      colors: {
        bodyUp: up, bodyDown: down,
        borderUp: up, borderDown: down,
        wickUp: up, wickDown: down,
        background: panel,
        crosshair: line,
      },
      grid: { vert: true, vertColor: line, horz: true, horzColor: line },
      time: { hour24: true, weekday: false },
      countdown: false,
      magnet: false,   // crosshair vrij (mode 0); AAN = klemt aan OHLC incl. wick
    };
  }
  function _saMergeChartSettings(saved) {
    const d = _saDefaultChartSettings();
    if (!saved || typeof saved !== 'object') return d;
    const s = saved;
    return {
      version: 1,
      style: (['candles', 'line', 'area'].includes(s.style)) ? s.style : d.style,
      colorByPrevClose: typeof s.colorByPrevClose === 'boolean' ? s.colorByPrevClose : d.colorByPrevClose,
      colors: Object.assign({}, d.colors, (s.colors && typeof s.colors === 'object') ? s.colors : {}),
      grid:   Object.assign({}, d.grid,   (s.grid   && typeof s.grid   === 'object') ? s.grid   : {}),
      time:   Object.assign({}, d.time,   (s.time   && typeof s.time   === 'object') ? s.time   : {}),
      countdown: typeof s.countdown === 'boolean' ? s.countdown : d.countdown,
      magnet: typeof s.magnet === 'boolean' ? s.magnet : d.magnet,
    };
  }
  function _saLoadChartSettings() {
    try {
      const raw = localStorage.getItem(SA_CHART_LS_KEY);
      if (raw) return _saMergeChartSettings(JSON.parse(raw));
    } catch (_) { /* privacy-modus / geen storage — val terug op defaults */ }
    return _saDefaultChartSettings();
  }
  function _saSaveChartSettings(s) {
    try { localStorage.setItem(SA_CHART_LS_KEY, JSON.stringify(s)); } catch (_) { /* negeer */ }
  }

  // Tijd-format helpers (respecteren 24-uurs + weekdag-toggle).
  const _SA_WD  = ['zo', 'ma', 'di', 'wo', 'do', 'vr', 'za'];
  const _SA_MON = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
  function _saPad(n) { return String(n).padStart(2, '0'); }
  function _saClock(d, hour24, withSeconds) {
    let hh = d.getHours();
    const mm = _saPad(d.getMinutes());
    const ss = _saPad(d.getSeconds());
    if (hour24) {
      const base = _saPad(hh) + ':' + mm;
      return withSeconds ? base + ':' + ss : base;
    }
    const ampm = hh >= 12 ? 'PM' : 'AM';
    hh = hh % 12; if (hh === 0) hh = 12;
    const base = hh + ':' + mm;
    return (withSeconds ? base + ':' + ss : base) + ' ' + ampm;
  }
  // Axis tick-formatter: houdt de multi-resolutie labels intact (jaar/maand/
  // dag/tijd) maar respecteert 24u + weekdag. `type` is LightweightCharts
  // TickMarkType (0 Year, 1 Month, 2 DayOfMonth, 3 Time, 4 TimeWithSeconds).
  function _saFmtTick(timeSec, type, settings) {
    const d = new Date(timeSec * 1000);
    if (type === 3) return _saClock(d, settings.time.hour24, false);
    if (type === 4) return _saClock(d, settings.time.hour24, true);
    if (type === 2) { const day = d.getDate(); return settings.time.weekday ? (_SA_WD[d.getDay()] + ' ' + day) : String(day); }
    if (type === 1) return _SA_MON[d.getMonth()];
    return String(d.getFullYear());
  }
  // Crosshair vertical-label formatter (volledige datum + tijd).
  function _saFmtFull(timeSec, settings) {
    const d = new Date(timeSec * 1000);
    const wd = settings.time.weekday ? (_SA_WD[d.getDay()] + ' ') : '';
    const date = _saPad(d.getDate()) + ' ' + _SA_MON[d.getMonth()] + ' ' + d.getFullYear();
    return wd + date + '  ' + _saClock(d, settings.time.hour24, false);
  }
  function _saFmtCountdown(sec) {
    const s = Math.max(0, Math.floor(sec));
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    if (h > 0) return h + ':' + _saPad(m) + ':' + _saPad(ss);
    return m + ':' + _saPad(ss);
  }
