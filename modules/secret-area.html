<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Area · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 20px 24px 60px; max-width: 1500px; --brand-primary:#093d54; --brand-azure:#1e6cd6; --brand-deep:#0a2f63; }
    .page-header { margin-bottom: 14px; }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header p  { font-size: 12.5px; color: var(--text-dim); margin-top: 3px; }
    /* Cockpit look — donker paneel voor "getekende inhoud". */
    .cockpit { background: linear-gradient(180deg, #082031 0%, #0a2f63 100%); color:#e6f0f7; border-radius:14px; padding:16px 18px; }
    .cockpit .lbl { color:#8bb7d1; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    .sa-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .sa-card h2 { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .sa-input, .sa-textarea, .sa-select { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); font: inherit; font-size: 13px; }
    .sa-textarea { min-height: 60px; resize: vertical; }
    .sa-btn { appearance:none; border:none; background: var(--brand-deep); color:#fff; font: inherit; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    .sa-btn:hover:not(:disabled){ background: var(--brand-azure); }
    .sa-btn:disabled { opacity:.55; cursor:not-allowed; }
    .sa-btn-ghost { background:transparent; color: var(--text); border:1px solid var(--border); }
    .sa-btn-danger { background:#dc2626; }
    .sa-btn-danger:hover:not(:disabled){ background:#b91c1c; }
    .sa-err { color:#b91c1c; font-size:12.5px; margin-top:8px; min-height:16px; }
    .sa-loading { color: var(--text-faint); font-size: 13px; padding: 14px 0; }
    .sa-denied  { background: var(--bg-elev); border:1px solid var(--border); border-radius:12px; padding:18px 20px; max-width:480px; color: var(--text-dim); font-size:13.5px; }
    .sa-denied strong { color: var(--text); font-size:14px; display:block; margin-bottom:4px; }
    /* PIN-gate. */
    .sa-pincard { background: var(--bg-elev); border:1px solid var(--border); border-radius:14px; padding:22px 24px; box-shadow: 0 6px 22px rgba(0,0,0,0.06); max-width:420px; }
    .sa-pincard h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
    .sa-pincard p { font-size:13px; color: var(--text-dim); margin-bottom:14px; line-height:1.5; }
    /* Workspace-tabs. */
    .sa-tabs { display:flex; gap:6px; border-bottom:1px solid var(--border); margin-bottom:14px; flex-wrap:wrap; }
    .sa-tab { appearance:none; background:transparent; border:none; border-bottom:2px solid transparent; padding:9px 14px; font: inherit; font-size:13px; font-weight:600; color: var(--text-dim); cursor:pointer; }
    .sa-tab.active { color: var(--text); border-bottom-color: var(--brand-azure); }
    .sa-grid { display:grid; gap:12px; }
    .sa-grid-2 { grid-template-columns: 1fr 1fr; }
    .sa-grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    @media (max-width:900px){ .sa-grid-2,.sa-grid-3 { grid-template-columns:1fr; } }
    /* Grade badges. */
    .sa-grade { display:inline-flex; align-items:center; padding:2px 10px; border-radius:999px; font-weight:700; font-size:11px; }
    .sa-grade.A\\+ { background:#16a34a; color:#fff; }
    .sa-grade.B  { background:#f59e0b; color:#fff; }
    .sa-grade.C  { background:#dc2626; color:#fff; }
    .sa-thumb { width:100%; aspect-ratio: 16/9; background:#0a2f63; border-radius:8px; object-fit:cover; }
    .sa-row-item { display:flex; gap:10px; align-items:center; padding:8px 10px; border:1px solid var(--border); border-radius:9px; background: var(--bg); margin-bottom:6px; }
    .sa-empty { color: var(--text-faint); font-size:12.5px; padding:18px 0; text-align:center; }
    .sa-strip { display:flex; gap:16px; flex-wrap:wrap; }
    .sa-strip .cell { flex:1 1 140px; min-width:140px; }
    .sa-strip .cell .v { font-size:22px; font-weight:800; }
    .sa-strip .cell .l { font-size:11px; color:#8bb7d1; text-transform:uppercase; letter-spacing:0.05em; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-header">
    <h1>Secret Area</h1>
    <p>Persoonlijke werkplek. Toegang verloopt via PIN-slot.</p>
  </div>

  <div id="saRoot">
    <div class="sa-loading"><i class="ti ti-loader"></i> Controleren…</div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = document.getElementById('saRoot');
  const apiFetch = () => (window.AgentShared && window.AgentShared.apiFetch) || null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }
  function showDenied(msg) {
    ROOT.innerHTML = '<div class="sa-denied"><strong>Geen toegang</strong>' + esc(msg || 'Je hebt geen toegang tot deze pagina. Je wordt teruggestuurd naar het dashboard…') + '</div>';
    setTimeout(function () { window.location.href = '/index.html'; }, 1400);
  }
  function toast(msg, kind) {
    try { window.AgentShared?.showToast?.(msg, kind || 'info'); } catch (_) {}
  }

  // ── State ────────────────────────────────────────────────────────────
  const state = {
    tab: 'overview',
    workspace: { strategies: [], tools: [] },
    trades: { list: [], stats: null },
    activeStrategyId: null,
    activeStrategy: null,     // volledige detail (steps + checklist)
    activeToolId: null,
    activeTool: null,         // volledige detail (examples)
    checkedItems: new Set(),  // client-side check-state → grade
  };

  // ── Fetch helpers ────────────────────────────────────────────────────
  async function api(url, opts) {
    const f = apiFetch();
    if (!f) throw new Error('apiFetch niet beschikbaar');
    const r = await f(url, opts || {});
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    return d;
  }

  async function loadWorkspace() {
    const d = await api('/api/secret-area-workspace');
    state.workspace = { strategies: d.strategies || [], tools: d.tools || [] };
  }
  async function loadTrades() {
    const d = await api('/api/secret-area-trade');
    state.trades = { list: d.trades || [], stats: d.stats || null };
  }
  async function loadStrategy(id) {
    if (!id) { state.activeStrategy = null; state.checkedItems.clear(); return; }
    const d = await api('/api/secret-area-strategy?id=' + encodeURIComponent(id));
    state.activeStrategy = d.strategy || null;
    state.checkedItems.clear();
  }
  async function loadTool(id) {
    if (!id) { state.activeTool = null; return; }
    const d = await api('/api/secret-area-tool?id=' + encodeURIComponent(id));
    state.activeTool = d.tool ? { ...d.tool, examples: d.examples || [] } : null;
  }

  // ── Grade compute (client-side, alle checks = A+, 1 mist = B, 2+ = C).
  function computeGrade() {
    const items = state.activeStrategy?.checklist || [];
    if (items.length === 0) return null;
    const missing = items.filter((c) => !state.checkedItems.has(c.id)).length;
    if (missing === 0) return 'A+';
    if (missing === 1) return 'B';
    return 'C';
  }

  // ── Render ───────────────────────────────────────────────────────────
  function renderWorkspace() {
    ROOT.innerHTML =
      '<div class="sa-tabs" role="tablist">'
      + tab('overview',  'Overzicht')
      + tab('tools',     'Tools')
      + tab('strategy',  'Opbouw')
      + tab('checklist', 'Checklist')
      + tab('trade',     'Entry / Exit / Trade')
      + tab('trades',    'Trades')
      + '</div>'
      + '<div id="saPane"></div>';
    document.querySelectorAll('.sa-tab').forEach((b) => b.addEventListener('click', () => {
      state.tab = b.dataset.tab || 'overview';
      renderPane();
      document.querySelectorAll('.sa-tab').forEach((x) => x.classList.toggle('active', x.dataset.tab === state.tab));
    }));
    renderPane();
  }
  function tab(key, label) {
    const cls = state.tab === key ? 'sa-tab active' : 'sa-tab';
    return '<button type="button" class="' + cls + '" data-tab="' + key + '" role="tab">' + esc(label) + '</button>';
  }

  function renderPane() {
    const p = document.getElementById('saPane');
    if (!p) return;
    if (state.tab === 'overview')  return renderOverview(p);
    if (state.tab === 'tools')     return renderTools(p);
    if (state.tab === 'strategy')  return renderStrategyBuilder(p);
    if (state.tab === 'checklist') return renderChecklist(p);
    if (state.tab === 'trade')     return renderTradeForm(p);
    if (state.tab === 'trades')    return renderTradesList(p);
  }

  // Overview.
  function renderOverview(p) {
    const s = state.trades.stats || { win_rate: 0, avg_rr: 0, expectancy: 0, count: 0, per_grade: [] };
    p.innerHTML =
      '<div class="cockpit" style="margin-bottom:14px">'
      + '<div class="sa-strip">'
      +   cell('Win-rate',        s.win_rate + '%')
      +   cell('Gem. RR',         s.avg_rr)
      +   cell('Expectancy (€)',  s.expectancy)
      +   cell('# Trades',        s.count)
      + '</div></div>'
      + '<div class="sa-grid sa-grid-2">'
      +   '<div class="sa-card"><h2>Strategieën</h2>'
      +     (state.workspace.strategies.length === 0
          ? '<div class="sa-empty">Nog niks — voeg je eerste strategie toe in "Opbouw".</div>'
          : state.workspace.strategies.map((st) =>
              '<div class="sa-row-item"><i class="ti ti-target"></i>'
              + '<div style="flex:1"><b>' + esc(st.name || '(zonder naam)') + '</b>'
              + (st.entry_signal ? '<div style="font-size:12px;color:var(--text-dim)">' + esc(st.entry_signal).slice(0,90) + '</div>' : '')
              + '</div>'
              + '<button class="sa-btn sa-btn-ghost" data-open-strat="' + esc(st.id) + '">Openen</button></div>'
            ).join(''))
      +   '</div>'
      +   '<div class="sa-card"><h2>Tools</h2>'
      +     (state.workspace.tools.length === 0
          ? '<div class="sa-empty">Nog niks — voeg je eerste tool toe in "Tools".</div>'
          : state.workspace.tools.map((t) =>
              '<div class="sa-row-item"><i class="ti ti-tool"></i>'
              + '<div style="flex:1"><b>' + esc(t.name || '(zonder naam)') + '</b>'
              + '<div style="font-size:11.5px;color:var(--text-faint)">' + t.examples_ideal + ' ideaal · ' + t.examples_counter + ' tegen</div></div>'
              + '<button class="sa-btn sa-btn-ghost" data-open-tool="' + esc(t.id) + '">Openen</button></div>'
            ).join(''))
      +   '</div>'
      + '</div>';
    p.querySelectorAll('[data-open-strat]').forEach((b) => b.addEventListener('click', async () => {
      state.activeStrategyId = b.dataset.openStrat;
      await loadStrategy(state.activeStrategyId);
      state.tab = 'strategy'; renderWorkspace();
    }));
    p.querySelectorAll('[data-open-tool]').forEach((b) => b.addEventListener('click', async () => {
      state.activeToolId = b.dataset.openTool;
      await loadTool(state.activeToolId);
      state.tab = 'tools'; renderWorkspace();
    }));
  }
  function cell(l, v) { return '<div class="cell"><div class="v mono">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  // Tools.
  function renderTools(p) {
    const toolsHtml = state.workspace.tools.length === 0
      ? '<div class="sa-empty">Nog geen tools — voeg je eerste toe.</div>'
      : state.workspace.tools.map((t) =>
          '<div class="sa-row-item"><i class="ti ti-tool"></i>'
          + '<div style="flex:1"><b>' + esc(t.name || '') + '</b>'
          + '<div style="font-size:11.5px;color:var(--text-faint)">' + t.examples_ideal + ' ideaal · ' + t.examples_counter + ' tegen</div></div>'
          + '<button class="sa-btn sa-btn-ghost" data-open-tool="' + esc(t.id) + '">Openen</button>'
          + '<button class="sa-btn sa-btn-danger" data-del-tool="' + esc(t.id) + '"><i class="ti ti-trash"></i></button>'
          + '</div>'
        ).join('');
    const detail = state.activeTool ? toolDetailHtml(state.activeTool) : '';
    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      +   '<div class="sa-card"><h2>Tools</h2>'
      +     toolsHtml
      +     '<div style="margin-top:12px"><h2>Nieuwe tool</h2>'
      +     '<input class="sa-input" id="toolName" placeholder="Naam (bv. FVG, OB, LiqSweep)"/>'
      +     '<textarea class="sa-textarea" id="toolDesc" placeholder="Korte beschrijving" style="margin-top:6px"></textarea>'
      +     '<div style="margin-top:8px"><button class="sa-btn" id="toolCreate"><i class="ti ti-plus"></i>Aanmaken</button></div>'
      +     '</div></div>'
      +   '<div class="sa-card"><h2>Detail</h2>' + (detail || '<div class="sa-empty">Kies een tool om examples toe te voegen.</div>') + '</div>'
      + '</div>';
    p.querySelectorAll('[data-open-tool]').forEach((b) => b.addEventListener('click', async () => {
      state.activeToolId = b.dataset.openTool;
      await loadTool(state.activeToolId); renderPane();
    }));
    p.querySelectorAll('[data-del-tool]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Deze tool verwijderen?')) return;
      try {
        await api('/api/secret-area-tool?id=' + encodeURIComponent(b.dataset.delTool), { method: 'DELETE' });
        toast('Tool verwijderd', 'success');
        state.activeTool = null; state.activeToolId = null;
        await loadWorkspace(); renderPane();
      } catch (e) { toast('Verwijderen mislukt: ' + e.message, 'error'); }
    }));
    const cr = document.getElementById('toolCreate');
    if (cr) cr.addEventListener('click', async () => {
      const name = document.getElementById('toolName').value.trim();
      if (!name) return toast('Naam vereist', 'error');
      try {
        const d = await api('/api/secret-area-tool', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ name, description: document.getElementById('toolDesc').value.trim() }),
        });
        await loadWorkspace();
        state.activeToolId = d.tool?.id || null;
        if (state.activeToolId) await loadTool(state.activeToolId);
        renderPane();
      } catch (e) { toast('Aanmaken mislukt: ' + e.message, 'error'); }
    });
    wireExampleForm();
  }
  function toolDetailHtml(t) {
    const exs = (t.examples || []).map((ex) =>
      '<div class="sa-row-item">'
      + (ex.image_url ? '<img class="sa-thumb" style="width:80px;aspect-ratio:16/10;flex:none" src="' + esc(ex.image_url) + '" alt=""/>'
                     : (ex.source_url ? '<a href="' + esc(ex.source_url) + '" target="_blank" rel="noopener" style="color:var(--brand-azure)">TV-link</a>' : '<i class="ti ti-photo-off"></i>'))
      + '<div style="flex:1"><span class="sa-grade ' + (ex.kind === 'ideal' ? 'A+' : 'C') + '">'
      + (ex.kind === 'ideal' ? 'IDEAAL' : 'TEGEN') + '</span>'
      + ' <span style="font-size:12px;color:var(--text-dim)">' + esc(ex.timeframe || '') + ' ' + esc(ex.instrument || '') + '</span>'
      + (ex.note ? '<div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + esc(ex.note).slice(0,100) + '</div>' : '')
      + '</div>'
      + '<button class="sa-btn sa-btn-danger" data-del-ex="' + esc(ex.id) + '"><i class="ti ti-x"></i></button>'
      + '</div>'
    ).join('');
    // AI-meelezen paneel (Fase 3). Toont bestaande detection_rule als die er is
    // en biedt een knop om Claude ernaar te laten kijken.
    const rulePanel =
      '<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:12px">'
      +   '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">'
      +     '<h2 style="margin:0"><i class="ti ti-sparkles"></i> AI meelezen</h2>'
      +     '<div style="display:flex;gap:6px">'
      +       '<button class="sa-btn" id="aiRun"><i class="ti ti-brain"></i>AI meelezen</button>'
      +     '</div>'
      +   '</div>'
      +   (t.detection_rule
          ? '<div id="aiCurrent" style="margin-top:8px"><div class="lbl" style="color:var(--text-dim);font-size:11px;text-transform:uppercase">Huidige regel</div>'
            + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--bg);padding:10px;border:1px solid var(--border);border-radius:8px">' + esc(t.detection_rule) + '</div></div>'
          : '')
      +   '<div id="aiResult" style="margin-top:10px" hidden></div>'
      + '</div>';
    return '<div><b>' + esc(t.name || '') + '</b></div>'
      + (t.description ? '<div style="font-size:12px;color:var(--text-dim);margin-top:2px">' + esc(t.description) + '</div>' : '')
      + rulePanel
      + '<div style="margin-top:10px"><h2>Voorbeelden</h2>'
      + (exs || '<div class="sa-empty">Nog geen examples.</div>') + '</div>'
      + '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">'
      +   '<h2>Nieuw voorbeeld</h2>'
      +   '<div class="sa-grid sa-grid-2">'
      +     '<select class="sa-select" id="exKind"><option value="ideal">Ideaal</option><option value="counter">Tegen</option></select>'
      +     '<input class="sa-input" id="exTf" placeholder="Timeframe (bv. 15m)"/>'
      +   '</div>'
      +   '<input class="sa-input" id="exInstr" placeholder="Instrument (bv. XAUUSD)" style="margin-top:6px"/>'
      +   '<textarea class="sa-textarea" id="exNote" placeholder="Toelichting" style="margin-top:6px"></textarea>'
      +   '<div class="sa-grid sa-grid-2" style="margin-top:6px">'
      +     '<input type="file" id="exFile" accept="image/png,image/jpeg,image/webp"/>'
      +     '<input class="sa-input" id="exTvUrl" placeholder="of TradingView-link (https://www.tradingview.com/x/…)"/>'
      +   '</div>'
      +   '<div style="margin-top:8px"><button class="sa-btn" id="exSubmit"><i class="ti ti-plus"></i>Voorbeeld toevoegen</button></div>'
      + '</div>';
  }
  function wireExampleForm() {
    const btn = document.getElementById('exSubmit');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (!state.activeToolId) return toast('Kies eerst een tool', 'error');
      btn.disabled = true;
      try {
        let image_path = null, source_url = null;
        const file  = document.getElementById('exFile').files[0];
        const tvUrl = document.getElementById('exTvUrl').value.trim();
        if (file) {
          const up = await uploadFile(file, 'tool', state.activeToolId);
          image_path = up.image_path;
        } else if (tvUrl) {
          const up = await uploadTv(tvUrl, 'tool', state.activeToolId);
          image_path = up.image_path;
          source_url = up.source_url || null;
        }
        await api('/api/secret-area-example', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({
            tool_id:    state.activeToolId,
            kind:       document.getElementById('exKind').value,
            timeframe:  document.getElementById('exTf').value.trim(),
            instrument: document.getElementById('exInstr').value.trim(),
            note:       document.getElementById('exNote').value.trim(),
            image_path, source_url,
          }),
        });
        toast('Voorbeeld toegevoegd', 'success');
        await loadWorkspace();
        await loadTool(state.activeToolId);
        renderPane();
      } catch (e) {
        toast('Toevoegen mislukt: ' + e.message, 'error');
      } finally { btn.disabled = false; }
    });
    document.querySelectorAll('[data-del-ex]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Voorbeeld verwijderen?')) return;
      try {
        await api('/api/secret-area-example?id=' + encodeURIComponent(b.dataset.delEx), { method: 'DELETE' });
        toast('Verwijderd', 'success');
        await loadWorkspace(); await loadTool(state.activeToolId); renderPane();
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
    wireAiPanel();
  }

  // ── AI meelezen (Fase 3) ─────────────────────────────────────────────
  // Roept /api/secret-area-ai aan met tool_id → toont voorstel in #aiResult.
  // Knoppen "Bewaar als regel" (save:true) en "Opnieuw" verschijnen NA
  // eerste run. Fail-soft: 502 → nette foutmelding, geen kapotte UI.
  async function runAiForActiveTool(save) {
    if (!state.activeToolId) return;
    const runBtn = document.getElementById('aiRun');
    const box    = document.getElementById('aiResult');
    if (!box) return;
    if (runBtn) runBtn.disabled = true;
    box.hidden = false;
    box.innerHTML = '<div class="sa-loading"><i class="ti ti-loader"></i> Claude leest mee…</div>';
    try {
      const d = await api('/api/secret-area-ai', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ tool_id: state.activeToolId, save: !!save }),
      });
      const rule = d?.rule || '';
      box.innerHTML =
        '<div class="lbl" style="color:var(--text-dim);font-size:11px;text-transform:uppercase">Voorstel (model: ' + esc(d?.model || '') + ', ' + (d?.images_used || 0) + ' afbeeldingen)</div>'
        + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--bg);padding:10px;border:1px solid var(--border);border-radius:8px">' + esc(rule) + '</div>'
        + '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +   '<button class="sa-btn" id="aiSave"' + (d?.saved ? ' disabled' : '') + '><i class="ti ti-device-floppy"></i>' + (d?.saved ? 'Opgeslagen' : 'Bewaar als regel') + '</button>'
        +   '<button class="sa-btn sa-btn-ghost" id="aiRetry"><i class="ti ti-refresh"></i>Opnieuw</button>'
        + '</div>'
        + (d?.save_error ? '<div class="sa-err">Bewaren mislukt: ' + esc(d.save_error) + '</div>' : '');
      if (d?.saved) {
        toast('Regel opgeslagen', 'success');
        await loadTool(state.activeToolId);
      }
      document.getElementById('aiSave')?.addEventListener('click', () => runAiForActiveTool(true));
      document.getElementById('aiRetry')?.addEventListener('click', () => runAiForActiveTool(false));
    } catch (e) {
      box.innerHTML = '<div class="sa-err">AI-fout: ' + esc(e.message) + '</div>'
        + '<div style="margin-top:8px"><button class="sa-btn sa-btn-ghost" id="aiRetry2"><i class="ti ti-refresh"></i>Opnieuw</button></div>';
      document.getElementById('aiRetry2')?.addEventListener('click', () => runAiForActiveTool(false));
    } finally { if (runBtn) runBtn.disabled = false; }
  }
  function wireAiPanel() {
    document.getElementById('aiRun')?.addEventListener('click', () => runAiForActiveTool(false));
  }

  // Strategy builder (Opbouw).
  function renderStrategyBuilder(p) {
    const strats = state.workspace.strategies;
    const st = state.activeStrategy;
    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      + '<div class="sa-card"><h2>Strategieën</h2>'
      +   (strats.length === 0
          ? '<div class="sa-empty">Nog geen strategieën.</div>'
          : strats.map((s) => '<div class="sa-row-item"><b style="flex:1">' + esc(s.name || '') + '</b>'
              + '<button class="sa-btn sa-btn-ghost" data-open-s="' + esc(s.id) + '">Open</button>'
              + '<button class="sa-btn sa-btn-danger" data-del-s="' + esc(s.id) + '"><i class="ti ti-trash"></i></button></div>').join(''))
      +   '<div style="margin-top:12px"><h2>Nieuwe strategie</h2>'
      +   '<input class="sa-input" id="stName" placeholder="Naam"/>'
      +   '<div style="margin-top:8px"><button class="sa-btn" id="stCreate"><i class="ti ti-plus"></i>Aanmaken</button></div></div>'
      + '</div>'
      + '<div class="sa-card"><h2>Detail</h2>' + (st ? strategyEditorHtml(st) : '<div class="sa-empty">Kies een strategie.</div>') + '</div>'
      + '</div>';
    p.querySelectorAll('[data-open-s]').forEach((b) => b.addEventListener('click', async () => {
      state.activeStrategyId = b.dataset.openS;
      await loadStrategy(state.activeStrategyId); renderPane();
    }));
    p.querySelectorAll('[data-del-s]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Strategie verwijderen?')) return;
      try {
        await api('/api/secret-area-strategy?id=' + encodeURIComponent(b.dataset.delS), { method: 'DELETE' });
        state.activeStrategy = null; state.activeStrategyId = null;
        await loadWorkspace(); renderPane(); toast('Verwijderd', 'success');
      } catch (e) { toast('Verwijderen mislukt: ' + e.message, 'error'); }
    }));
    const cr = document.getElementById('stCreate');
    if (cr) cr.addEventListener('click', async () => {
      const name = document.getElementById('stName').value.trim();
      if (!name) return toast('Naam vereist', 'error');
      try {
        const d = await api('/api/secret-area-strategy', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ name }),
        });
        await loadWorkspace();
        state.activeStrategyId = d.strategy?.id || null;
        if (state.activeStrategyId) await loadStrategy(state.activeStrategyId);
        renderPane();
      } catch (e) { toast('Aanmaken mislukt: ' + e.message, 'error'); }
    });
    wireStrategyEditor();
  }
  function strategyEditorHtml(s) {
    const steps = (s.steps || []).map((sp, i) =>
      '<div class="sa-row-item"><span class="mono" style="color:var(--text-faint)">#' + (i+1) + '</span>'
      + '<input class="sa-input" data-step-desc="' + i + '" value="' + esc(sp.description || '') + '"/>'
      + '<button class="sa-btn sa-btn-danger" data-step-del="' + i + '"><i class="ti ti-x"></i></button></div>'
    ).join('');
    const cl = (s.checklist || []).map((c, i) =>
      '<div class="sa-row-item"><span class="mono" style="color:var(--text-faint)">#' + (i+1) + '</span>'
      + '<input class="sa-input" data-cl-lbl="' + i + '" value="' + esc(c.label || '') + '"/>'
      + '<button class="sa-btn sa-btn-danger" data-cl-del="' + i + '"><i class="ti ti-x"></i></button></div>'
    ).join('');
    return '<input class="sa-input" id="stEditName" value="' + esc(s.name || '') + '" placeholder="Naam"/>'
      + '<textarea class="sa-textarea" id="stEntry" placeholder="Entry-signaal" style="margin-top:6px">' + esc(s.entry_signal || '') + '</textarea>'
      + '<textarea class="sa-textarea" id="stSL" placeholder="Stop-loss regel" style="margin-top:6px">' + esc(s.sl_signal || '') + '</textarea>'
      + '<textarea class="sa-textarea" id="stTP" placeholder="Take-profit regel" style="margin-top:6px">' + esc(s.tp_signal || '') + '</textarea>'
      + '<div class="sa-grid sa-grid-2" style="margin-top:6px">'
      +   '<input class="sa-input" id="stRisk" type="number" step="0.01" placeholder="Risk %" value="' + (s.risk_pct ?? '') + '"/>'
      +   '<input class="sa-input" id="stSessions" placeholder="Sessies (comma-sep, bv. London, NY)" value="' + esc((s.sessions || []).join(', ')) + '"/>'
      + '</div>'
      + '<div style="margin-top:12px"><h2>Steps (Opbouw)</h2>' + (steps || '<div class="sa-empty">Nog geen stappen.</div>')
      + '<button class="sa-btn sa-btn-ghost" id="stStepAdd" style="margin-top:6px"><i class="ti ti-plus"></i>Stap toevoegen</button></div>'
      + '<div style="margin-top:12px"><h2>Checklist</h2>' + (cl || '<div class="sa-empty">Nog geen items.</div>')
      + '<button class="sa-btn sa-btn-ghost" id="stClAdd" style="margin-top:6px"><i class="ti ti-plus"></i>Item toevoegen</button></div>'
      + '<div style="margin-top:14px"><button class="sa-btn" id="stSave"><i class="ti ti-device-floppy"></i>Opslaan</button></div>';
  }
  function wireStrategyEditor() {
    if (!state.activeStrategy) return;
    const s = state.activeStrategy;
    document.getElementById('stStepAdd')?.addEventListener('click', () => {
      s.steps = s.steps || []; s.steps.push({ description: '' }); renderPane();
    });
    document.getElementById('stClAdd')?.addEventListener('click', () => {
      s.checklist = s.checklist || []; s.checklist.push({ label: '' }); renderPane();
    });
    document.querySelectorAll('[data-step-del]').forEach((b) => b.addEventListener('click', () => {
      const i = Number(b.dataset.stepDel); s.steps.splice(i, 1); renderPane();
    }));
    document.querySelectorAll('[data-cl-del]').forEach((b) => b.addEventListener('click', () => {
      const i = Number(b.dataset.clDel); s.checklist.splice(i, 1); renderPane();
    }));
    document.getElementById('stSave')?.addEventListener('click', async () => {
      const steps = Array.from(document.querySelectorAll('[data-step-desc]')).map((e, i) => ({
        position: i + 1, description: e.value.trim(),
      }));
      const checklist = Array.from(document.querySelectorAll('[data-cl-lbl]')).map((e, i) => ({
        position: i + 1, label: e.value.trim(),
      }));
      const sessions = document.getElementById('stSessions').value.split(',').map((x) => x.trim()).filter(Boolean);
      try {
        await api('/api/secret-area-strategy?id=' + encodeURIComponent(s.id), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify({
            name:         document.getElementById('stEditName').value.trim(),
            entry_signal: document.getElementById('stEntry').value.trim(),
            sl_signal:    document.getElementById('stSL').value.trim(),
            tp_signal:    document.getElementById('stTP').value.trim(),
            risk_pct:     Number(document.getElementById('stRisk').value) || null,
            sessions,
            steps, checklist,
          }),
        });
        toast('Opgeslagen', 'success');
        await loadWorkspace(); await loadStrategy(s.id); renderPane();
      } catch (e) { toast('Opslaan mislukt: ' + e.message, 'error'); }
    });
  }

  // Checklist tab — leef-tabel voor grade.
  function renderChecklist(p) {
    const s = state.activeStrategy;
    if (!s) {
      p.innerHTML = '<div class="sa-card sa-empty">Kies eerst een strategie in "Opbouw".</div>';
      return;
    }
    const grade = computeGrade();
    p.innerHTML =
      '<div class="cockpit" style="margin-bottom:12px"><div class="lbl">Live grade</div>'
      + '<div class="v mono" style="font-size:32px">' + (grade ? '<span class="sa-grade ' + grade + '">' + grade + '</span>' : '—') + '</div></div>'
      + '<div class="sa-card"><h2>' + esc(s.name || '') + ' — Checklist</h2>'
      + ((s.checklist || []).length === 0
        ? '<div class="sa-empty">Geen checklist-items — voeg toe in "Opbouw".</div>'
        : (s.checklist || []).map((c) => {
            const on = state.checkedItems.has(c.id);
            return '<label class="sa-row-item" style="cursor:pointer">'
              + '<input type="checkbox" data-cl="' + esc(c.id) + '"' + (on ? ' checked' : '') + '/>'
              + '<span style="flex:1">' + esc(c.label || '') + '</span></label>';
          }).join(''))
      + '</div>';
    p.querySelectorAll('[data-cl]').forEach((b) => b.addEventListener('change', (e) => {
      const id = e.target.getAttribute('data-cl');
      if (e.target.checked) state.checkedItems.add(id); else state.checkedItems.delete(id);
      renderPane();
    }));
  }

  // Trade form (Entry/Exit).
  function renderTradeForm(p) {
    const g = computeGrade();
    p.innerHTML =
      '<div class="sa-card"><h2>Nieuwe trade</h2>'
      + '<div class="sa-grid sa-grid-2">'
      +   '<input class="sa-input" id="trInstr" placeholder="Instrument (XAUUSD, EURUSD, …)"/>'
      +   '<select class="sa-select" id="trDir"><option value="long">Long</option><option value="short">Short</option></select>'
      + '</div>'
      + '<div class="sa-grid sa-grid-3" style="margin-top:6px">'
      +   '<input class="sa-input mono" id="trEntry" type="number" step="0.0001" placeholder="Entry"/>'
      +   '<input class="sa-input mono" id="trSL"    type="number" step="0.0001" placeholder="SL"/>'
      +   '<input class="sa-input mono" id="trTP"    type="number" step="0.0001" placeholder="TP"/>'
      + '</div>'
      + '<div class="sa-grid sa-grid-3" style="margin-top:6px">'
      +   '<input class="sa-input mono" id="trExit" type="number" step="0.0001" placeholder="Exit"/>'
      +   '<input class="sa-input mono" id="trRR"   type="number" step="0.01"   placeholder="R multiple"/>'
      +   '<input class="sa-input mono" id="trPnl"  type="number" step="0.01"   placeholder="PnL (€)"/>'
      + '</div>'
      + '<textarea class="sa-textarea" id="trNotes" placeholder="Notitie" style="margin-top:6px"></textarea>'
      + '<div class="sa-grid sa-grid-2" style="margin-top:6px">'
      +   '<input type="file" id="trFile" accept="image/png,image/jpeg,image/webp"/>'
      +   '<input class="sa-input" id="trTvUrl" placeholder="of TradingView-link"/>'
      + '</div>'
      + '<div style="margin-top:8px"><div class="lbl" style="color:var(--text-dim);font-size:11px">Berekende grade uit checklist: '
      + (g ? '<span class="sa-grade ' + g + '">' + g + '</span>' : '—') + '</div></div>'
      + '<div style="margin-top:10px"><button class="sa-btn" id="trSubmit"><i class="ti ti-plus"></i>Trade opslaan</button></div>'
      + '</div>';
    document.getElementById('trSubmit')?.addEventListener('click', async () => {
      const btn = document.getElementById('trSubmit'); btn.disabled = true;
      try {
        let images = [];
        const file  = document.getElementById('trFile').files[0];
        const tvUrl = document.getElementById('trTvUrl').value.trim();
        // Trade insert eerst om ref_id te krijgen? Nee: upload gebruikt strategy-id niet;
        // we uploaden onder een tijdelijke ref (de sa_trade-uuid krijgen we pas na insert).
        // Oplossing: insert eerst zonder images, dan upload+insert-images. Sim­peler:
        // upload nu naar een ref_id gelijk aan strategy_id of "pending" en wijzig later niet.
        // We doen: insert eerst, dan upload met ref_id=trade.id, dan tweede request voor image.
        const payload = {
          strategy_id:  state.activeStrategyId || null,
          occurred_at:  new Date().toISOString(),
          instrument:   document.getElementById('trInstr').value.trim(),
          direction:    document.getElementById('trDir').value,
          entry:        parseFloat(document.getElementById('trEntry').value) || null,
          sl:           parseFloat(document.getElementById('trSL').value)    || null,
          tp:           parseFloat(document.getElementById('trTP').value)    || null,
          exit:         parseFloat(document.getElementById('trExit').value)  || null,
          r_multiple:   parseFloat(document.getElementById('trRR').value)    || null,
          pnl:          parseFloat(document.getElementById('trPnl').value)   || null,
          grade:        g,
          notes:        document.getElementById('trNotes').value.trim(),
          images: [],   // vullen we in tweede stap
          tools:  [],
        };
        const d = await api('/api/secret-area-trade', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify(payload),
        });
        const tradeId = d.trade?.id;
        // Optionele afbeelding uploaden nadat we een ref_id hebben.
        if (tradeId && (file || tvUrl)) {
          try {
            if (file) await uploadFile(file, 'trade', tradeId);
            else      await uploadTv(tvUrl, 'trade', tradeId);
            // Note: eenvoudige MVP — we koppelen image na aan trade via separate PATCH? Nee, we
            // hebben geen PATCH. De upload-endpoint slaat het bestand in de bucket op; om 'm bij
            // de trade te loggen zou een tweede endpoint nodig zijn. Voor deze GATE-PR loggen we
            // enkel dat het bestand geüpload is (toast) — koppeling volgt in een refresh-PR.
            toast('Trade opgeslagen (afbeelding is geüpload).', 'success');
          } catch (e) { toast('Afbeelding upload faalde: ' + e.message, 'error'); }
        } else {
          toast('Trade opgeslagen.', 'success');
        }
        await loadTrades(); renderPane();
      } catch (e) { toast('Opslaan mislukt: ' + e.message, 'error'); }
      finally { btn.disabled = false; }
    });
  }

  function renderTradesList(p) {
    const t = state.trades.list || [];
    const s = state.trades.stats || {};
    p.innerHTML =
      '<div class="cockpit" style="margin-bottom:12px"><div class="sa-strip">'
      + cell('Win-rate', (s.win_rate || 0) + '%')
      + cell('Gem. RR',  s.avg_rr  || 0)
      + cell('Expectancy (€)', s.expectancy || 0)
      + cell('# Trades', s.count || 0)
      + '</div>'
      + '<div class="lbl" style="margin-top:10px">Win-rate per grade</div>'
      + '<div class="sa-strip">'
      + ((s.per_grade || []).map((r) => cell(r.grade, r.win_rate + '% (' + r.count + ')')).join('') || '<span style="color:#8bb7d1">nog geen data</span>')
      + '</div></div>'
      + '<div class="sa-card"><h2>Trades</h2>'
      + (t.length === 0
        ? '<div class="sa-empty">Nog geen trades — leg je eerste vast in "Entry / Exit / Trade".</div>'
        : t.map((tr) =>
            '<div class="sa-row-item">'
            + (tr.grade ? '<span class="sa-grade ' + tr.grade + '">' + tr.grade + '</span>' : '')
            + '<span class="mono" style="min-width:110px">' + esc(tr.instrument || '') + ' ' + esc(tr.direction || '') + '</span>'
            + '<span class="mono">' + (Number.isFinite(tr.r_multiple) ? (tr.r_multiple + 'R') : '') + '</span>'
            + '<span class="mono" style="flex:1">' + (Number.isFinite(tr.pnl) ? ('€ ' + tr.pnl.toFixed(2)) : '') + '</span>'
            + '<span style="color:var(--text-faint);font-size:12px">' + esc((tr.occurred_at || '').slice(0,10)) + '</span>'
            + '<button class="sa-btn sa-btn-danger" data-del-tr="' + esc(tr.id) + '"><i class="ti ti-trash"></i></button>'
            + '</div>'
          ).join(''))
      + '</div>';
    p.querySelectorAll('[data-del-tr]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Trade verwijderen?')) return;
      try {
        await api('/api/secret-area-trade?id=' + encodeURIComponent(b.dataset.delTr), { method: 'DELETE' });
        await loadTrades(); renderPane(); toast('Verwijderd', 'success');
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
  }

  // Upload helpers.
  async function uploadFile(file, kind, refId) {
    const buf = await file.arrayBuffer();
    const b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
    return await api('/api/secret-area-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body:   JSON.stringify({
        kind, ref_id: refId,
        filename:     file.name,
        content_type: file.type || 'image/png',
        data_base64:  b64,
      }),
    });
  }
  async function uploadTv(url, kind, refId) {
    return await api('/api/secret-area-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body:   JSON.stringify({ kind, ref_id: refId, tradingview_url: url }),
    });
  }

  // ── PIN gate ─────────────────────────────────────────────────────────
  function showPinForm() {
    ROOT.innerHTML =
      '<div class="sa-pincard">'
      + '<h2>Voer je PIN in</h2>'
      + '<p>Toegang tot deze pagina is met een PIN beveiligd. PIN wordt nergens opgeslagen of doorgegeven aan derden.</p>'
      + '<input id="saPin" type="password" inputmode="numeric" autocomplete="off" class="sa-input" placeholder="PIN"/>'
      + '<div style="margin-top:10px;display:flex;gap:10px"><button id="saUnlock" type="button" class="sa-btn"><i class="ti ti-lock-open"></i>Ontgrendelen</button></div>'
      + '<div id="saErr" class="sa-err" role="alert" aria-live="polite"></div>'
      + '</div>';
    const pinEl = document.getElementById('saPin');
    const btn   = document.getElementById('saUnlock');
    const errEl = document.getElementById('saErr');
    async function submit() {
      const pin = String(pinEl.value || '').trim();
      if (!pin) { errEl.textContent = 'PIN is leeg.'; return; }
      btn.disabled = true; errEl.textContent = '';
      try {
        const r = await apiFetch()('/api/secret-area', {
          method: 'POST', headers: { 'Content-Type':'application/json' },
          body:   JSON.stringify({ pin }),
        });
        let d = null; try { d = await r.json(); } catch (_) {}
        if (r.ok && d && d.ok === true) {
          // Unlock: laad data + toon werkplek. State alleen in memory.
          await Promise.all([loadWorkspace(), loadTrades()]);
          renderWorkspace();
          return;
        }
        if (r.status === 403) { showDenied('Geen toegang tot deze pagina.'); return; }
        errEl.textContent = 'Onjuiste PIN.';
      } catch (_) { errEl.textContent = 'Verbinding mislukt.'; }
      finally { btn.disabled = false; pinEl.value = ''; try { pinEl.focus(); } catch (_) {} }
    }
    btn.addEventListener('click', submit);
    pinEl.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); submit(); } });
    try { pinEl.focus(); } catch (_) {}
  }

  async function init() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch (_) {}
    if (window.AuthShared && typeof window.AuthShared.requireAuth === 'function') {
      const profile = await window.AuthShared.requireAuth();
      if (!profile) return;
    }
    try {
      if (!apiFetch()) { showDenied(); return; }
      const r = await apiFetch()('/api/secret-area');
      const d = await r.json().catch(() => ({}));
      if (r.ok && d && d.allowed === true) { showPinForm(); return; }
      showDenied();
    } catch (_) { showDenied(); }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
