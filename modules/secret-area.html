<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Area · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    /* Secret Area — LICHT, on-brand. Alle waardes komen uit
       modules/shared/agent-shared.css (--surface-*, --border-*, --text-*,
       --brand-primary, --color-*, --shadow-*). Class-namen blijven .sa-*
       zodat de JS ongewijzigd blijft. */

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
    }

    /* Scope-container: gedraagt zich als een gewone module-pagina, links van
       de sidebar. Achtergrond komt uit --bg (licht). */
    .sa-scope {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      margin-left: 220px;
      padding: 24px 28px 60px;
      max-width: 1500px;
    }
    .sa-scope .page-header {
      margin-bottom: 22px;
      display: flex; align-items: center; gap: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sa-scope .page-header .lock {
      width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center;
      background: var(--brand-primary);
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .page-header h1 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 20px; font-weight: 700; letter-spacing: -0.01em;
      color: var(--text);
    }
    .sa-scope .page-header .sub {
      font-size: 12px; color: var(--text-dim);
      letter-spacing: .12em; text-transform: uppercase; margin-top: 2px;
    }

    /* Mono / display helpers voor cijfers en cockpit-cellen. */
    .sa-scope .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .sa-scope .disp { font-family: 'Space Grotesk', system-ui, sans-serif; letter-spacing: -0.01em; }
    .sa-scope .lbl {
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--text-dim); font-weight: 700;
    }

    /* Cockpit-panel — was donker gradient, nu een subtiele info-tint. */
    .sa-scope .cockpit {
      background: var(--color-info-soft);
      border: 1px solid var(--color-info);
      border-radius: 14px; padding: 18px 20px;
      box-shadow: var(--shadow-sm);
      color: var(--text);
    }
    .sa-scope .cockpit .lbl { color: var(--color-info-text); }

    /* Standaard kaart — witte surface, subtiele border, no drop-shadow-orgie. */
    .sa-scope .sa-card {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-card h2 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 14px;
      margin-bottom: 10px; letter-spacing: .01em;
      display: flex; align-items: center; gap: 8px;
      color: var(--text);
    }
    .sa-scope .sa-card h2 .ti { color: var(--brand-primary); }

    /* Form-elementen. */
    .sa-scope .sa-input,
    .sa-scope .sa-textarea,
    .sa-scope .sa-select {
      width: 100%; padding: 9px 12px;
      border: 1px solid var(--border-default, var(--border));
      border-radius: 8px;
      background: var(--surface-1); color: var(--text);
      font: inherit; font-size: 13px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .sa-scope .sa-input:focus,
    .sa-scope .sa-textarea:focus,
    .sa-scope .sa-select:focus {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px var(--brand-primary-soft);
    }
    .sa-scope .sa-textarea { min-height: 68px; resize: vertical; }
    .sa-scope input[type="file"] { color: var(--text-dim); font-size: 12.5px; }

    /* Knoppen. Primary = navy #093d54. */
    .sa-scope .sa-btn {
      appearance: none; border: 1px solid transparent;
      background: var(--brand-primary); color: #fff;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 13px;
      padding: 9px 16px; border-radius: 8px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      transition: background .15s, transform .15s;
    }
    .sa-scope .sa-btn:hover:not(:disabled) { background: var(--brand-primary-hover); }
    .sa-scope .sa-btn:disabled { opacity: .55; cursor: not-allowed; }
    .sa-scope .sa-btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--border-default, var(--border));
    }
    .sa-scope .sa-btn-ghost:hover:not(:disabled) {
      background: var(--brand-primary-soft);
      border-color: var(--brand-primary);
      color: var(--brand-primary);
    }
    .sa-scope .sa-btn-danger {
      background: var(--color-danger); color: #fff;
    }
    .sa-scope .sa-btn-danger:hover:not(:disabled) { background: var(--color-danger-text, #b91c1c); }

    .sa-scope .sa-err { color: var(--color-danger); font-size: 12.5px; margin-top: 8px; min-height: 16px; }
    .sa-scope .sa-loading {
      color: var(--text-dim); font-size: 13px; padding: 12px 0;
      display: flex; gap: 8px; align-items: center;
    }
    .sa-scope .sa-empty { color: var(--text-faint); font-size: 12.5px; padding: 16px 0; text-align: center; }

    /* Denied fallback (redirect). */
    .sa-scope .sa-denied {
      background: var(--surface-card);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 20px 22px; max-width: 480px; color: var(--text-dim); font-size: 13.5px;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-denied strong {
      color: var(--text); font-size: 14px; display: block; margin-bottom: 4px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
    }

    /* PIN-card. */
    .sa-scope .sa-pincard {
      background: var(--surface-card);
      border: 1px solid var(--border); border-radius: 14px;
      padding: 24px 26px; box-shadow: var(--shadow-md);
      max-width: 440px;
    }
    .sa-scope .sa-pincard h2 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700; font-size: 17px; margin-bottom: 6px;
      color: var(--text);
    }
    .sa-scope .sa-pincard p {
      font-size: 13px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.5;
    }

    /* Tabs. */
    .sa-scope .sa-tabs {
      display: flex; gap: 4px; padding: 4px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .sa-scope .sa-tab {
      appearance: none; background: transparent; border: 0;
      padding: 7px 12px;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 500; font-size: 12.5px;
      color: var(--text-dim);
      border-radius: 7px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color .15s, background .15s;
    }
    .sa-scope .sa-tab:hover:not(.active) { color: var(--text); background: var(--surface-card-hover); }
    .sa-scope .sa-tab.active {
      background: var(--brand-primary); color: #fff;
    }
    .sa-scope .sa-tab-sep {
      opacity: .5; padding: 0 4px; align-self: center; color: var(--text-faint);
    }

    /* Grids. */
    .sa-scope .sa-grid { display: grid; gap: 14px; }
    .sa-scope .sa-grid-2 { grid-template-columns: 1fr 1fr; }
    .sa-scope .sa-grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    @media (max-width: 900px) {
      .sa-scope .sa-grid-2, .sa-scope .sa-grid-3 { grid-template-columns: 1fr; }
    }

    /* Grade-badges A+/B/C mapping op status-kleuren. */
    .sa-scope .sa-grade {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 700; font-size: 11.5px;
      border-radius: 8px; padding: 3px 9px; letter-spacing: .02em;
      display: inline-flex; align-items: center; justify-content: center; min-width: 32px;
    }
    .sa-scope .sa-grade.A\+ {
      background: var(--color-success-soft); color: var(--color-success-text);
      box-shadow: inset 0 0 0 1px var(--color-success);
    }
    .sa-scope .sa-grade.B   {
      background: var(--color-warning-soft); color: var(--color-warning-text);
      box-shadow: inset 0 0 0 1px var(--color-warning);
    }
    .sa-scope .sa-grade.C   {
      background: var(--color-danger-soft);  color: var(--color-danger-text);
      box-shadow: inset 0 0 0 1px var(--color-danger);
    }

    .sa-scope .sa-thumb {
      width: 100%; aspect-ratio: 16/9;
      background: var(--surface-2); border-radius: 8px; object-fit: cover;
    }
    .sa-scope .sa-row-item {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--surface-1);
      margin-bottom: 6px; font-size: 13px;
    }
    .sa-scope .sa-row-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brand-primary); }
    .sa-scope .sa-row-item .ti { color: var(--brand-primary); }

    /* Cockpit-strip cells (grote KPI-cijfers). */
    .sa-scope .sa-strip { display: flex; gap: 16px; flex-wrap: wrap; }
    .sa-scope .sa-strip .cell { flex: 1 1 140px; min-width: 140px; }
    .sa-scope .sa-strip .cell .v {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 22px; font-weight: 600; color: var(--text);
    }
    .sa-scope .sa-strip .cell .l {
      font-size: 10px; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: .12em; margin-top: 2px;
    }

    /* ── HOME-view ────────────────────────────────────────────────────── */
    .sa-scope .sa-hi {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 24px; margin: 4px 0 2px;
      letter-spacing: -0.01em;
    }
    .sa-scope .sa-hi span { color: var(--brand-primary); }
    .sa-scope .sa-subhead {
      color: var(--text-dim); margin-bottom: 22px; font-size: 14px;
    }

    /* Hero — "doe dit nu". Subtiele brand-tint met witte kaart-basis. */
    .sa-scope .sa-hero {
      background: var(--brand-primary-soft);
      border: 1px solid var(--brand-primary);
      border-radius: 14px;
      padding: 20px 22px; display: flex; gap: 18px; align-items: center;
      box-shadow: var(--shadow-sm);
      margin-bottom: 22px;
    }
    .sa-scope .sa-hero .badge {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 10px; letter-spacing: .14em; text-transform: uppercase;
      color: var(--brand-primary);
      background: var(--surface-card);
      border: 1px solid var(--brand-primary);
      border-radius: 20px; padding: 3px 10px;
      display: inline-block; margin-bottom: 10px;
    }
    .sa-scope .sa-hero h2 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 19px;
      margin: 0 0 6px; line-height: 1.25; color: var(--text);
    }
    .sa-scope .sa-hero p {
      margin: 0; color: var(--text-dim); font-size: 14px; max-width: 620px;
    }
    .sa-scope .sa-hero .ic {
      width: 48px; height: 48px; border-radius: 12px;
      background: var(--surface-card); border: 1px solid var(--brand-primary);
      display: grid; place-items: center; flex: none;
    }
    .sa-scope .sa-hero .ic .ti { font-size: 22px; color: var(--brand-primary); }
    .sa-scope .sa-hero .go { flex: none; }

    /* Reis-tijdlijn. */
    .sa-scope .sa-journey {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 22px; margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-steps { display: flex; position: relative; margin-top: 14px; }
    .sa-scope .sa-steps::before {
      content: ""; position: absolute; top: 15px; left: 24px; right: 24px;
      height: 2px; background: var(--border);
    }
    .sa-scope .sa-steps .sa-fill {
      position: absolute; top: 15px; left: 24px; height: 2px;
      background: linear-gradient(90deg, var(--color-success), var(--brand-primary));
      border-radius: 2px;
    }
    .sa-scope .sa-ms { flex: 1; text-align: center; position: relative; z-index: 1; padding: 0 4px; }
    .sa-scope .sa-ms .node {
      width: 32px; height: 32px; border-radius: 50%;
      margin: 0 auto 10px; display: grid; place-items: center;
      background: var(--surface-1);
      box-shadow: inset 0 0 0 2px var(--border-default, var(--border));
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px; color: var(--text-dim);
      transition: .15s;
    }
    .sa-scope .sa-ms.done .node {
      background: var(--color-success); color: #fff; box-shadow: none;
    }
    .sa-scope .sa-ms.here .node {
      background: var(--brand-primary); color: #fff;
      box-shadow: 0 0 0 5px var(--brand-primary-soft);
      animation: sa-pp 2.4s infinite;
    }
    @keyframes sa-pp {
      0%,100% { box-shadow: 0 0 0 5px var(--brand-primary-soft); }
      50%     { box-shadow: 0 0 0 9px var(--brand-primary-soft-hover); }
    }
    .sa-scope .sa-ms .t {
      font-size: 11px; color: var(--text-dim); line-height: 1.3;
    }
    .sa-scope .sa-ms.here .t { color: var(--text); font-weight: 600; }
    .sa-scope .sa-ms.here .youare {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 9px; color: var(--brand-primary);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px;
    }

    /* Ring-meters (strategie / trader / detectie). */
    .sa-scope .sa-meters {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 22px;
    }
    @media (max-width: 720px) { .sa-scope .sa-meters { grid-template-columns: 1fr; } }
    .sa-scope .sa-meter {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 20px; text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-ring { width: 96px; height: 96px; margin: 2px auto 12px; position: relative; }
    .sa-scope .sa-ring svg { transform: rotate(-90deg); }
    .sa-scope .sa-ring .val {
      position: absolute; inset: 0; display: grid; place-items: center;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-weight: 600; font-size: 20px;
    }
    .sa-scope .sa-meter .mt {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 13.5px; margin-bottom: 3px;
      color: var(--text);
    }
    .sa-scope .sa-meter .md {
      font-size: 11.5px; color: var(--text-dim); line-height: 1.4;
    }

    /* Sectiekaarten met status-pill. */
    .sa-scope .sa-cards {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    @media (max-width: 720px) { .sa-scope .sa-cards { grid-template-columns: 1fr; } }
    .sa-scope .sa-c {
      background: var(--surface-card);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 17px; cursor: pointer;
      transition: border-color .15s, transform .15s, box-shadow .15s;
      display: flex; gap: 13px; align-items: flex-start;
      box-shadow: var(--shadow-sm);
    }
    .sa-scope .sa-c:hover {
      border-color: var(--brand-primary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }
    .sa-scope .sa-c .ci {
      width: 38px; height: 38px; border-radius: 10px;
      background: var(--brand-primary-soft);
      display: grid; place-items: center; flex: none;
    }
    .sa-scope .sa-c .ci .ti {
      color: var(--brand-primary); font-size: 19px;
    }
    .sa-scope .sa-c h4 {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-weight: 600; font-size: 14px;
      margin: 0 0 3px; display: flex; align-items: center; gap: 8px;
      color: var(--text);
    }
    .sa-scope .sa-c .why {
      font-size: 12px; color: var(--text-dim); line-height: 1.45;
    }
    .sa-scope .sa-st {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 9.5px; padding: 2px 7px;
      border-radius: 20px; font-weight: 600; white-space: nowrap;
    }
    .sa-scope .sa-st.done {
      background: var(--color-success-soft); color: var(--color-success-text);
    }
    .sa-scope .sa-st.part {
      background: var(--color-warning-soft); color: var(--color-warning-text);
    }
    .sa-scope .sa-st.todo {
      background: var(--color-neutral-soft); color: var(--color-neutral-text);
    }

    @media (prefers-reduced-motion: reduce) {
      .sa-scope * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="sa-scope">
  <div class="page-header">
    <div class="lock" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
      </svg>
    </div>
    <div>
      <h1>Strategie-trainer</h1>
      <div class="sub">Secret Area · persoonlijke werkplek</div>
    </div>
  </div>

  <div id="saRoot">
    <div class="sa-loading"><i class="ti ti-loader"></i> Controleren…</div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<!-- TradingView Lightweight Charts (open-source, geen account/key) — voor OANDA chart-cockpit.
     Pin op v4: v5 heeft addCandlestickSeries verwijderd (breaking) en verwacht
     chart.addSeries(LightweightCharts.CandlestickSeries, ...). Onze code gebruikt de v4-API. -->
<script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = document.getElementById('saRoot');
  const apiFetch = () => (window.AgentShared && window.AgentShared.apiFetch) || null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }
  function showDenied(msg) {
    ROOT.innerHTML = '<div class="sa-denied"><strong>Geen toegang</strong>' + esc(msg || 'Je hebt geen toegang tot deze pagina. Je wordt teruggestuurd naar het dashboard…') + '</div>';
    setTimeout(function () { window.location.href = '/index.html'; }, 1400);
  }
  function toast(msg, kind) {
    try { window.AgentShared?.showToast?.(msg, kind || 'info'); } catch (_) {}
  }

  // ── State ────────────────────────────────────────────────────────────
  const state = {
    tab: 'home',            // 'home' is nu de default landingsview.
    workspace: { strategies: [], tools: [] },
    trades: { list: [], stats: null },
    activeStrategyId: null,
    activeStrategy: null,   // volledige detail (steps + checklist)
    activeToolId: null,
    activeTool: null,       // volledige detail (examples)
    checkedItems: new Set(),// client-side check-state → grade
    conditions: [],         // owner-scoped condities (global + strategy)
  };

  // ── Fetch helpers ────────────────────────────────────────────────────
  async function api(url, opts) {
    const f = apiFetch();
    if (!f) throw new Error('apiFetch niet beschikbaar');
    const r = await f(url, opts || {});
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    return d;
  }

  async function loadWorkspace() {
    const d = await api('/api/secret-area-workspace');
    state.workspace = { strategies: d.strategies || [], tools: d.tools || [] };
  }
  async function loadTrades() {
    const d = await api('/api/secret-area-trade');
    state.trades = { list: d.trades || [], stats: d.stats || null };
  }
  async function loadStrategy(id) {
    if (!id) { state.activeStrategy = null; state.checkedItems.clear(); return; }
    const d = await api('/api/secret-area-strategy?id=' + encodeURIComponent(id));
    state.activeStrategy = d.strategy || null;
    state.checkedItems.clear();
  }
  async function loadTool(id) {
    if (!id) { state.activeTool = null; return; }
    const d = await api('/api/secret-area-tool?id=' + encodeURIComponent(id));
    state.activeTool = d.tool ? { ...d.tool, examples: d.examples || [] } : null;
  }
  async function loadConditions() {
    try {
      const d = await api('/api/secret-area-condition');
      state.conditions = d.conditions || [];
    } catch (e) { console.warn('[sa] loadConditions:', e.message); state.conditions = []; }
  }

  // ── Pijplijn-status: uit data afgeleide gereedheid per stap ─────────
  // Voor pijplijn-berekening kiezen we een "peil-strategie":
  //   activeStrategy (indien geladen) → anders eerste in workspace.
  function _peilStrategy() {
    if (state.activeStrategy) return state.activeStrategy;
    const first = state.workspace.strategies[0] || null;
    return first ? { ...first, steps: [], checklist: [] } : null;
  }
  function pipelineStatus() {
    const tools = state.workspace.tools || [];
    const trained = tools.filter((t) => t.detection_rule && String(t.detection_rule).trim().length > 0);
    const s = _peilStrategy();
    const stratComplete = s && s.name && s.entry_signal && s.sl_signal && s.tp_signal;
    const stratPartial  = s && (s.name || s.entry_signal || s.sl_signal || s.tp_signal);
    const condsForS     = state.conditions.filter((c) => c.scope === 'global' || (s && c.strategy_id === s.id));
    const cl            = state.activeStrategy?.checklist || [];
    const specPresent   = state.activeStrategy?.recognition_spec && state.activeStrategy.recognition_spec.trim().length > 0;

    return {
      peil: s,
      steps: [
        {
          key:      'tools',
          label:    '1. Tools',
          status:   tools.length === 0 ? 'todo' : (trained.length >= tools.length ? 'done' : 'partial'),
          detail:   trained.length + ' van ' + tools.length + ' getraind',
        },
        {
          key:      'strategy',
          label:    '2. Strategie',
          status:   stratComplete ? 'done' : (stratPartial ? 'partial' : 'todo'),
          detail:   s ? (stratComplete ? s.name : (s.name || 'aanmaken')) : 'nog geen strategie',
        },
        {
          key:      'conditions',
          label:    '3. Marktcondities',
          status:   condsForS.length === 0 ? 'todo' : (condsForS.length >= 3 ? 'done' : 'partial'),
          detail:   condsForS.length + ' condities',
        },
        {
          key:      'checklist',
          label:    '4. Checklist',
          status:   cl.length === 0 ? 'todo' : (cl.length >= 3 ? 'done' : 'partial'),
          detail:   cl.length + ' items',
        },
        {
          key:      'review',
          label:    '5. Systeem-review',
          status:   specPresent ? 'done' : (stratComplete && cl.length > 0 ? 'partial' : 'todo'),
          detail:   specPresent ? 'setup-herkenning opgeslagen' : 'nog niet gegenereerd',
        },
      ],
    };
  }
  function readiness(steps) {
    const w = { done: 1.0, partial: 0.5, todo: 0.0 };
    const total = steps.reduce((a, s) => a + w[s.status], 0);
    return Math.round((total / steps.length) * 100);
  }

  // ── Grade compute (client-side, alle checks = A+, 1 mist = B, 2+ = C).
  function computeGrade() {
    const items = state.activeStrategy?.checklist || [];
    if (items.length === 0) return null;
    const missing = items.filter((c) => !state.checkedItems.has(c.id)).length;
    if (missing === 0) return 'A+';
    if (missing === 1) return 'B';
    return 'C';
  }

  // ── Render — pijplijn-nav (v2) ───────────────────────────────────────
  // Volgorde: Home · Dashboard · 1 Tools · 2 Strategie · 3 Marktcondities ·
  //           4 Checklist · 5 Systeem-review · | Detectie · Trades
  function renderWorkspace() {
    const st = pipelineStatus();
    const stepIcon = (k) => {
      const s = st.steps.find((x) => x.key === k);
      if (!s) return '';
      if (s.status === 'done')    return ' <i class="ti ti-circle-check" style="color:var(--sa-win)"></i>';
      if (s.status === 'partial') return ' <i class="ti ti-circle-dashed" style="color:var(--sa-amber)"></i>';
      return ' <i class="ti ti-circle" style="color:var(--sa-tx-dim)"></i>';
    };
    ROOT.innerHTML =
      '<div class="sa-tabs" role="tablist">'
      + tab('home',       'Home')
      + tab('dashboard',  'Dashboard')
      + tab('tools',      '1 Tools'         + stepIcon('tools'))
      + tab('strategy',   '2 Strategie'     + stepIcon('strategy'))
      + tab('conditions', '3 Marktcondities'+ stepIcon('conditions'))
      + tab('checklist',  '4 Checklist'     + stepIcon('checklist'))
      + tab('setup',      '5 Setup-eisen')
      + tab('review',     '6 Systeem-review'+ stepIcon('review'))
      + '<span class="sa-tab-sep">|</span>'
      + tab('chart',      'Chart')
      + tab('analyse',    'Chart-analyse')
      + tab('detection',  'Detectie & signalen')
      + tab('trades',     'Trades')
      + '</div>'
      + '<div id="saPane"></div>';
    document.querySelectorAll('.sa-tab').forEach((b) => b.addEventListener('click', () => {
      state.tab = b.dataset.tab || 'home';
      renderPane();
      document.querySelectorAll('.sa-tab').forEach((x) => x.classList.toggle('active', x.dataset.tab === state.tab));
    }));
    renderPane();
  }
  function tab(key, labelHtml) {
    const cls = state.tab === key ? 'sa-tab active' : 'sa-tab';
    return '<button type="button" class="' + cls + '" data-tab="' + key + '" role="tab">' + labelHtml + '</button>';
  }

  function renderPane() {
    const p = document.getElementById('saPane');
    if (!p) return;
    // Cleanup actieve OANDA-cockpits in de vorige pane (voorkomt
    // interval-leaks + dubbele fetches bij tab-switch of re-render).
    for (const el of [..._oandaActive]) _oandaCleanup(el);
    if (state.tab === 'home')       return renderHome(p);
    if (state.tab === 'dashboard')  return renderDashboard(p);
    if (state.tab === 'tools')      return renderTools(p);
    if (state.tab === 'strategy')   return renderStrategyBuilder(p);
    if (state.tab === 'conditions') return renderConditions(p);
    if (state.tab === 'checklist')  return renderChecklist(p);
    if (state.tab === 'review')     return renderReview(p);
    if (state.tab === 'detection')  return renderDetection(p);
    if (state.tab === 'trades')     return renderTradesCombined(p);
    if (state.tab === 'analyse')    return renderAnalyse(p);
    if (state.tab === 'setup')      return renderSetup(p);
    if (state.tab === 'chart')      return renderChartTab(p);
  }

  // ── OANDA chart-cockpit component ───────────────────────────────────────
  // Herbruikbaar op meerdere plekken (dashboard-compact + Chart-tab). Beheert
  // paar/timeframe-selectie, initiele fetch, en live-refresh van de open
  // candle. Cleanup via container._oanda bij re-mount of tab-switch.
  // Set van actieve cockpit-containers. Wordt gebruikt om bij tab-switch of
  // re-render alle draaiende timers/aborts in één klap op te ruimen zonder
  // te hoeven speuren via querySelector.
  const _oandaActive = new Set();

  const OANDA_INSTRUMENTS = [
    'EUR_USD','GBP_USD','USD_JPY','USD_CHF','AUD_USD','USD_CAD','NZD_USD',
    'EUR_GBP','EUR_JPY','GBP_JPY','EUR_CHF','AUD_JPY','CAD_JPY','CHF_JPY',
    'NZD_JPY','GBP_CHF','GBP_AUD','GBP_CAD','GBP_NZD','EUR_AUD','EUR_CAD',
    'EUR_NZD','AUD_CAD','AUD_CHF','AUD_NZD','XAU_USD',
  ];
  const OANDA_TIMEFRAMES = ['M1','M5','M15','M30','H1','H4','D','W'];
  // Live-tick interval: elke seconde de laatste (open) candle bijwerken via
  // series.update — geen full reload, geen invloed op de lazy-load-historie.
  const OANDA_REFRESH_MS = 1000;
  const OANDA_INITIAL_COUNT = 1500;   // eerste load
  const OANDA_OLDER_COUNT   = 1500;   // batch bij terugscrollen
  // Bij hoeveel candles vanaf de linkerrand triggeren we een lazy-load.
  // Kies iets meer dan de gemiddelde zichtbare-range zodat de fetch al start
  // voordat de user echt de rand raakt.
  const OANDA_EDGE_TRIGGER  = 30;

  function _oandaCleanup(container) {
    if (!container) return;
    if (container._oanda) {
      try { clearInterval(container._oanda.timer); } catch (_) {}
      try { container._oanda.hist?.abort(); } catch (_) {}
      try { container._oanda.live?.abort(); } catch (_) {}
      try { container._oanda.ro?.disconnect(); } catch (_) {}
      try { container._oanda.chart?.remove(); } catch (_) {}
      container._oanda = null;
    }
    _oandaActive.delete(container);
  }

  function _oandaTimeToUnix(iso) {
    // OANDA levert RFC3339 met nano-seconden ("2024-06-01T09:15:00.000000000Z").
    // Lightweight Charts wil UNIX seconds voor intraday én daily.
    if (!iso) return null;
    const t = Date.parse(iso);
    if (!Number.isFinite(t)) return null;
    return Math.floor(t / 1000);
  }

  function _oandaMapCandle(c) {
    const t = _oandaTimeToUnix(c?.time);
    if (t == null) return null;
    const o = Number(c?.o), h = Number(c?.h), l = Number(c?.l), cl = Number(c?.c);
    if (![o,h,l,cl].every(Number.isFinite)) return null;
    return { time: t, open: o, high: h, low: l, close: cl };
  }

  async function _oandaFetchCandles(instrument, granularity, count, signal, opts) {
    const f = apiFetch();
    if (!f) throw new Error('apiFetch niet beschikbaar');
    const includeIncomplete = !(opts && opts.includeIncomplete === false);
    let url = '/api/secret-area-oanda'
      + '?instrument=' + encodeURIComponent(instrument)
      + '&granularity=' + encodeURIComponent(granularity)
      + '&count=' + encodeURIComponent(count);
    if (includeIncomplete) url += '&includeIncomplete=1';
    if (opts && Number.isFinite(opts.beforeSec)) {
      url += '&before=' + encodeURIComponent(Math.floor(opts.beforeSec));
    }
    const r = await f(url, { signal });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    return Array.isArray(d.candles) ? d.candles : [];
  }

  // Publieke component (aangeroepen door renderDashboard + renderChartTab).
  //
  // container: DOM-element waarin de cockpit gemount wordt.
  // opts.instrument (default 'EUR_USD')
  // opts.granularity (default 'M15')
  // opts.compact (default false) → kleinere chart-hoogte + "Open in Chart-tab" link
  function renderOandaChart(container, opts) {
    if (!container) return;
    if (typeof window.LightweightCharts === 'undefined') {
      container.innerHTML = '<div class="sa-err">Chart-library niet geladen (CDN geblokkeerd?)</div>';
      return;
    }
    _oandaCleanup(container);

    const cfg = {
      instrument : (opts && opts.instrument)  || 'EUR_USD',
      granularity: (opts && opts.granularity) || 'M15',
      compact    : !!(opts && opts.compact),
    };

    // Vaste hoogtes; compact voor dashboard-blok.
    const chartHeight = cfg.compact ? 240 : 460;

    // Rendering — één keer DOM zetten; daarna alleen chart-instance beheren.
    const optionsHtml = OANDA_INSTRUMENTS.map((i) =>
      '<option value="' + esc(i) + '"' + (i === cfg.instrument ? ' selected' : '') + '>' + esc(i) + '</option>'
    ).join('');
    const tfBtnsHtml = OANDA_TIMEFRAMES.map((tf) =>
      '<button type="button" class="sa-btn sa-btn-ghost oanda-tf-btn' + (tf === cfg.granularity ? ' active' : '') + '"'
      + ' data-tf="' + esc(tf) + '" style="padding:4px 10px;font-size:12px">' + esc(tf) + '</button>'
    ).join('');
    const openInChartHtml = cfg.compact
      ? '<button type="button" class="sa-btn sa-btn-ghost" data-open-chart-tab style="padding:4px 10px;font-size:12px"><i class="ti ti-external-link"></i>Open in Chart-tab</button>'
      : '';

    container.innerHTML =
      '<div class="oanda-cockpit">'
      +   '<div class="oanda-toolbar" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:8px">'
      +     '<select class="sa-input oanda-pair" style="min-width:120px;padding:6px 8px">' + optionsHtml + '</select>'
      +     '<div class="oanda-tf-row" style="display:flex;gap:4px;flex-wrap:wrap">' + tfBtnsHtml + '</div>'
      +     '<span class="oanda-live" style="display:inline-flex;align-items:center;gap:4px;font-size:11.5px;color:var(--sa-tx-mid)">'
      +       '<span class="oanda-live-dot" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--sa-tx-dim)"></span>'
      +       '<span class="oanda-live-txt">idle</span>'
      +     '</span>'
      +     '<div style="flex:1"></div>'
      +     openInChartHtml
      +   '</div>'
      +   '<div class="oanda-chart" style="width:100%;height:' + chartHeight + 'px;background:var(--sa-panel);border:1px solid var(--sa-line);border-radius:8px;overflow:hidden"></div>'
      +   '<div class="oanda-err sa-err" style="display:none;margin-top:6px"></div>'
      + '</div>';

    const chartEl   = container.querySelector('.oanda-chart');
    const errEl     = container.querySelector('.oanda-err');
    const liveDot   = container.querySelector('.oanda-live-dot');
    const liveTxt   = container.querySelector('.oanda-live-txt');

    // Kleur-tokens uit de brand (agent-shared.css).
    const cs = getComputedStyle(document.documentElement);
    const up   = (cs.getPropertyValue('--color-success') || '#25c79b').trim() || '#25c79b';
    const down = (cs.getPropertyValue('--color-danger')  || '#dc2626').trim() || '#dc2626';
    const grid = (cs.getPropertyValue('--sa-line') || '#e5e7eb').trim() || '#e5e7eb';
    const text = (cs.getPropertyValue('--sa-tx')   || '#1f2937').trim() || '#1f2937';

    const chart = window.LightweightCharts.createChart(chartEl, {
      layout: { background: { type: 'solid', color: 'transparent' }, textColor: text, fontSize: 11 },
      grid:   { vertLines: { color: grid }, horzLines: { color: grid } },
      timeScale: { timeVisible: true, secondsVisible: false, borderColor: grid },
      rightPriceScale: { borderColor: grid },
      crosshair: { mode: 1 },
      width: chartEl.clientWidth,
      height: chartHeight,
    });
    const series = chart.addCandlestickSeries({
      upColor: up, downColor: down, borderVisible: false,
      wickUpColor: up, wickDownColor: down,
    });

    // Resize-observer zodat de chart mee-ademt met het paneel (bv. tab-switch of window-resize).
    const ro = new ResizeObserver(() => {
      try { chart.applyOptions({ width: chartEl.clientWidth }); } catch (_) {}
    });
    ro.observe(chartEl);

    // NB: outer scope heeft al een `state`-const (globale app-state); daarom
    // heet de component-scoped state hier `cx` om schaduwing te vermijden.
    //
    // cx.candles: geordende Map<epochSec, candle>. We houden alles wat we ooit
    // hebben opgehaald in memory zodat lazy-load naar links een simpele
    // prepend-merge is en de series in één setData-call geüpdatet wordt.
    // cx.oldestSec: kleinste time van de gehaalde set — startpunt voor 'before'.
    // cx.loadingOlder / cx.exhausted: gate tegen overlappende + zinloze fetches.
    // cx.hist / cx.live: aparte AbortControllers zodat een lazy-load nooit een
    // live-tick aborteert en andersom.
    const cx = {
      chart, series, ro,
      hist: null, live: null,
      timer: null,
      pair: cfg.instrument,
      tf  : cfg.granularity,
      candles: new Map(),
      oldestSec: null,
      loadingOlder: false,
      exhausted: false,
      generation: 0, // bump bij pair/tf-wissel zodat stale responses genegeerd worden
    };
    container._oanda = cx;
    _oandaActive.add(container);

    function setLive(status) {
      if (!liveDot || !liveTxt) return;
      if (status === 'busy')  { liveDot.style.background = 'var(--sa-amber)'; liveTxt.textContent = 'laden…'; }
      if (status === 'live')  { liveDot.style.background = up;                 liveTxt.textContent = 'live'; }
      if (status === 'error') { liveDot.style.background = down;               liveTxt.textContent = 'fout'; }
      if (status === 'idle')  { liveDot.style.background = 'var(--sa-tx-dim)'; liveTxt.textContent = 'idle'; }
      if (status === 'older') { liveDot.style.background = 'var(--sa-azure, var(--sa-amber))'; liveTxt.textContent = 'ouder…'; }
    }
    function showErr(msg) {
      if (!errEl) return;
      if (!msg) { errEl.style.display = 'none'; errEl.textContent = ''; return; }
      errEl.style.display = ''; errEl.textContent = msg;
    }

    function _applySeries() {
      // Rebuild sorted array uit Map. Cheap voor 1500..15000 candles; O(n log n)
      // op sort. Lightweight Charts vereist strict-ascending unieke tijden.
      const arr = Array.from(cx.candles.values()).sort((a, b) => a.time - b.time);
      try { cx.series.setData(arr); } catch (_) {}
      cx.oldestSec = arr.length ? arr[0].time : null;
    }

    async function fullReload() {
      showErr(null); setLive('busy');
      // Bump generation eerst zodat parallel-in-flight requests hun mapping
      // niet meer in de nieuwe series pushen.
      const gen = ++cx.generation;
      cx.candles.clear();
      cx.oldestSec = null;
      cx.exhausted = false;
      cx.loadingOlder = false;
      try {
        if (cx.hist) cx.hist.abort();
        cx.hist = new AbortController();
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, OANDA_INITIAL_COUNT, cx.hist.signal);
        if (gen !== cx.generation) return; // superseded
        const mapped = raw.map(_oandaMapCandle).filter(Boolean);
        for (const c of mapped) cx.candles.set(c.time, c);
        _applySeries();
        try { cx.chart.timeScale().fitContent(); } catch (_) {}
        setLive('live');
      } catch (e) {
        if (e?.name === 'AbortError') return;
        showErr('Candles laden mislukt: ' + (e?.message || 'onbekend'));
        setLive('error');
      }
    }

    async function loadOlder() {
      if (cx.loadingOlder || cx.exhausted) return;
      if (cx.oldestSec == null) return;
      cx.loadingOlder = true;
      const gen = cx.generation;
      const prevStatus = liveTxt?.textContent || '';
      setLive('older');
      try {
        if (cx.hist) cx.hist.abort();
        cx.hist = new AbortController();
        // 'before' = tijd van de OUDSTE candle die we al hebben. OANDA geeft
        // candles die eindigen op/vóór dit punt terug (v20 'to'). De oudste
        // die we al hebben duiken opnieuw op → dedup Map vangt dat af.
        // includeIncomplete=0 voor historische fetches: geen lopende candle nodig.
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, OANDA_OLDER_COUNT, cx.hist.signal, {
          beforeSec: cx.oldestSec,
          includeIncomplete: false,
        });
        if (gen !== cx.generation) return;
        const mapped = raw.map(_oandaMapCandle).filter(Boolean);
        // Tel hoeveel écht nieuw zijn (vóór de huidige oudste).
        let fresh = 0;
        for (const c of mapped) {
          if (!cx.candles.has(c.time)) {
            cx.candles.set(c.time, c);
            if (c.time < cx.oldestSec) fresh++;
          }
        }
        if (fresh === 0) {
          // OANDA gaf niks ouder terug → history is (praktisch) uitgeput.
          cx.exhausted = true;
        } else {
          _applySeries();
        }
        // Herstel status naar 'live' (of 'idle' als we niks meer terug gaan halen).
        setLive(cx.exhausted ? 'idle' : 'live');
      } catch (e) {
        if (e?.name === 'AbortError') return;
        showErr('Oudere candles laden mislukt: ' + (e?.message || 'onbekend'));
        setLive('error');
      } finally {
        cx.loadingOlder = false;
        // suppress-lint: prevStatus is momenteel ongebruikt maar dokumenteert intent.
        void prevStatus;
      }
    }

    async function liveTick() {
      // Alleen de laatste 2 candles ophalen (goedkoop) en de open-candle updaten.
      // Aparte AbortController zodat een lazy-load hem niet aborteert.
      const gen = cx.generation;
      try {
        if (cx.live) cx.live.abort();
        cx.live = new AbortController();
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, 2, cx.live.signal);
        if (gen !== cx.generation) return; // pair/tf tussentijds gewijzigd
        const mapped = raw.map(_oandaMapCandle).filter(Boolean).sort((a,b) => a.time - b.time);
        for (const c of mapped) {
          cx.candles.set(c.time, c);
          try { cx.series.update(c); } catch (_) { /* time-ordering guard, negeer */ }
        }
        if (!cx.loadingOlder) setLive('live');
      } catch (e) {
        if (e?.name === 'AbortError') return;
        // Live-fout niet spammen — één regel is genoeg.
        if (!cx.loadingOlder) setLive('error');
      }
    }

    function startLive() {
      if (cx.timer) clearInterval(cx.timer);
      cx.timer = setInterval(liveTick, OANDA_REFRESH_MS);
    }

    // Lazy-load trigger: als de gebruiker naar de linkerrand (oudste candle)
    // scrollt en de zichtbare logische range binnen OANDA_EDGE_TRIGGER van 0
    // komt, laad een oudere batch bij. Live-refresh triggert dit NIET (die
    // stuurt geen visible-range event).
    try {
      cx.chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
        if (!range) return;
        if (cx.loadingOlder || cx.exhausted) return;
        if (Number(range.from) <= OANDA_EDGE_TRIGGER) loadOlder();
      });
    } catch (_) { /* v4 API-guard; fail-soft */ }

    // Wire pair + tf.
    container.querySelector('.oanda-pair')?.addEventListener('change', (e) => {
      cx.pair = String(e.target.value || 'EUR_USD').toUpperCase();
      fullReload().then(startLive);
    });
    container.querySelectorAll('.oanda-tf-btn').forEach((b) => b.addEventListener('click', () => {
      const tf = b.dataset.tf;
      if (!OANDA_TIMEFRAMES.includes(tf)) return;
      cx.tf = tf;
      container.querySelectorAll('.oanda-tf-btn').forEach((x) => x.classList.toggle('active', x.dataset.tf === tf));
      fullReload().then(startLive);
    }));
    // Compact-only: link naar volledige Chart-tab (behoud gekozen paar/tf).
    container.querySelector('[data-open-chart-tab]')?.addEventListener('click', () => {
      window.__oandaChartTabDefaults = { instrument: cx.pair, granularity: cx.tf };
      const chartTabBtn = document.querySelector('.sa-tab[data-tab="chart"]');
      if (chartTabBtn) chartTabBtn.click();
    });

    // Kick off.
    fullReload().then(startLive);
  }

  // Chart-tab: volledige cockpit + info-tekst.
  function renderChartTab(p) {
    const hint = window.__oandaChartTabDefaults || null;
    p.innerHTML =
      '<div class="sa-card">'
      +   '<h2><i class="ti ti-chart-candle"></i> Chart — OANDA live</h2>'
      +   '<p style="color:var(--sa-tx-mid);font-size:12.5px;margin-bottom:12px">Alleen kijken — geen detectie of opslag. Wissel paar of timeframe; de laatste candle beweegt live mee.</p>'
      +   '<div id="oandaChartFull"></div>'
      + '</div>';
    const el = document.getElementById('oandaChartFull');
    if (el) {
      renderOandaChart(el, {
        instrument : hint?.instrument  || 'EUR_USD',
        granularity: hint?.granularity || 'H4',
        compact    : false,
      });
    }
    // Reset de hint zodat een volgend bezoek de default oppakt.
    window.__oandaChartTabDefaults = null;
  }

  // Utility: jump-to-tab from home/dashboard/next-step.
  async function jumpTab(key) {
    // Zorg dat activeStrategy geladen is voor Checklist/Review/Detection.
    if (['checklist', 'review', 'detection'].includes(key) && !state.activeStrategy) {
      const s = state.workspace.strategies[0];
      if (s) { state.activeStrategyId = s.id; await loadStrategy(s.id); }
    }
    state.tab = key;
    renderWorkspace();
  }

  // ── HOME: coach-thuisscherm — "doe dit nu" + reis + meters + secties.
  // Afgeleid uit workspace + trades + conditions. Geen nieuwe endpoints.
  function homeContext() {
    const st  = pipelineStatus();
    const s   = st.peil;
    const tools = state.workspace.tools || [];
    const trained  = tools.filter((t) => t.detection_rule && String(t.detection_rule).trim().length > 0).length;
    const trades = state.trades.list || [];
    const tradesCount = trades.length;
    const traderGoal  = 50;                   // "gevoel voor scherpte"-doel — na 50 trades = 100%.
    const traderPct   = Math.min(100, Math.round((tradesCount / traderGoal) * 100));
    const stratPct    = readiness(st.steps);
    const specPresent = !!(s && s.recognition_spec && s.recognition_spec.trim().length > 0);
    // Detectie-gereedheid: strategie-pijplijn + trader-groei gecombineerd.
    // Extra weging: spec aanwezig telt zwaar (35% van totaal).
    const detectionPct = Math.round(
      (stratPct * 0.5) + (specPresent ? 35 : 0) + (Math.min(30, tradesCount) * 0.5)
    );
    // Volgende stap: eerste onvoltooide mijlpaal → hero.
    let next = { key: 'trades', title: 'Log je trades', tone: 'trades',
                 sub: 'Blijf je uitgespeelde setups vastleggen — daar leert je systeem wat écht werkt.' };
    const toolsNoTraining = tools.length > 0 && trained < tools.length;
    if (tools.length === 0) {
      next = {
        key: 'tools',
        title: 'Maak je eerste tool aan',
        tone: 'tools',
        sub: 'Bouwstenen zoals FVG, sweep en order block leggen de basis voor herkenning.',
      };
    } else if (toolsNoTraining) {
      next = {
        key: 'tools',
        title: 'Upload een paar voorbeelden bij je tools',
        tone: 'tools',
        sub: 'Nog ' + (tools.length - trained) + ' tool(s) zonder detection-regel. Voeg ideaal- en tegenvoorbeelden toe — daar leert je systeem herkenning.',
      };
    } else if (!s || !s.name) {
      next = {
        key: 'strategy',
        title: 'Bouw je eerste strategie',
        tone: 'strategy',
        sub: 'Entry, SL, TP en risk — de spelregels voor je systeem.',
      };
    } else if (!(s.entry_signal && s.sl_signal && s.tp_signal)) {
      next = {
        key: 'strategy',
        title: 'Rond je strategie af',
        tone: 'strategy',
        sub: 'Entry-, SL- en TP-signaal invullen zodat je systeem weet waar het op moet reageren.',
      };
    } else if ((state.activeStrategy?.checklist || []).length === 0) {
      next = {
        key: 'checklist',
        title: 'Zet je checklist op',
        tone: 'checklist',
        sub: 'De controle-items die A+/B/C bepalen — de grade van elke setup.',
      };
    } else if (!specPresent) {
      next = {
        key: 'review',
        title: 'Draai de systeem-review',
        tone: 'review',
        sub: 'Smelt alles tot één herkenning die je systeem straks in de markt zoekt.',
      };
    }
    return { st, stratPct, traderPct, detectionPct, next, tools, trained, tradesCount, specPresent };
  }

  function ringSvg(pct, color) {
    const CIRC = 264; // 2πr voor r=42
    const off  = Math.max(0, Math.round(CIRC - (CIRC * Math.min(100, Math.max(0, pct)) / 100)));
    return '<svg width="96" height="96">'
      +   '<circle cx="48" cy="48" r="42" stroke="rgba(255,255,255,.08)" stroke-width="7" fill="none"/>'
      +   '<circle cx="48" cy="48" r="42" stroke="' + color + '" stroke-width="7" fill="none" stroke-linecap="round" '
      +          'stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + off + '"/>'
      + '</svg>';
  }

  // Dashboard = command center. Pijplijn-voortgang + volgende-stap-kaart +
  // wat-mist-er-nog + gereedheids-meter, met deep-links per stap.
  function renderDashboard(p) {
    const s   = state.trades.stats || { win_rate: 0, avg_rr: 0, expectancy: 0, count: 0, per_grade: [] };
    const st  = pipelineStatus();
    const pct = readiness(st.steps);
    const next = st.steps.find((x) => x.status !== 'done') || null;
    const meterColor = pct === 100 ? 'var(--sa-win)' : (pct >= 50 ? 'var(--sa-amber)' : 'var(--sa-loss)');
    const meter =
      '<div style="background:var(--sa-bg-2);border:1px solid var(--sa-line);border-radius:8px;overflow:hidden;height:10px;margin-top:6px">'
      + '<div style="height:10px;width:' + pct + '%;background:' + meterColor + '"></div>'
      + '</div>';

    const nextCard = next
      ? '<div class="sa-card" style="border-left:4px solid var(--sa-azure)">'
        + '<div class="lbl">Volgende stap</div>'
        + '<div class="disp" style="font-size:15px;font-weight:600;margin-top:4px">' + esc(next.label.replace(/^\d+\.\s*/, '')) + '</div>'
        + '<div style="font-size:12.5px;color:var(--sa-tx-mid);margin-top:4px">' + esc(next.detail) + '</div>'
        + '<div style="margin-top:10px"><button class="sa-btn" data-jump="' + esc(next.key) + '"><i class="ti ti-arrow-right"></i>Ga verder</button></div>'
        + '</div>'
      : '<div class="sa-card" style="border-left:4px solid var(--sa-win)">'
        + '<div class="lbl">Pijplijn</div>'
        + '<div class="disp" style="font-size:15px;font-weight:600;margin-top:4px">Alle stappen af — klaar voor Detectie</div>'
        + '<div style="margin-top:10px"><button class="sa-btn" data-jump="detection"><i class="ti ti-radar"></i>Naar Detectie</button></div>'
        + '</div>';

    const missing = st.steps.filter((x) => x.status !== 'done').map((x) =>
      '<div class="sa-row-item"><i class="ti ti-alert-circle" style="color:var(--sa-amber)"></i>'
      + '<div style="flex:1"><b>' + esc(x.label) + '</b> <span style="color:var(--sa-tx-mid);font-size:12px">— ' + esc(x.detail) + '</span></div>'
      + '<button class="sa-btn sa-btn-ghost" data-jump="' + esc(x.key) + '">Openen</button></div>'
    ).join('');

    p.innerHTML =
      '<div class="sa-card" style="margin-bottom:14px">'
      +   '<h2><i class="ti ti-chart-candle"></i> Live chart <span style="font-size:11px;color:var(--sa-tx-mid);font-weight:400">EUR/USD · H4 (default)</span></h2>'
      +   '<div id="oandaChartCompact"></div>'
      + '</div>'

      + '<div class="cockpit" style="margin-bottom:14px">'
      +   '<div class="sa-strip">'
      +     cell('Win-rate',       s.win_rate + '%')
      +     cell('Gem. RR',        s.avg_rr)
      +     cell('Expectancy (€)', s.expectancy)
      +     cell('# Trades',       s.count)
      +   '</div>'
      +   '<div style="margin-top:14px"><div class="lbl">Systeem-gereedheid: ' + pct + '%</div>' + meter + '</div>'
      + '</div>'

      + '<div class="sa-card" style="margin-bottom:14px"><h2><i class="ti ti-flag"></i> Pijplijn</h2>'
      +   '<div class="sa-strip">'
      +     st.steps.map((x) => {
              const color = x.status === 'done' ? 'var(--sa-win)' : (x.status === 'partial' ? 'var(--sa-amber)' : 'var(--sa-tx-dim)');
              return '<div class="cell" style="cursor:pointer" data-jump="' + esc(x.key) + '">'
                + '<div class="v mono" style="color:' + color + '">' + (x.status === 'done' ? '✓' : (x.status === 'partial' ? '~' : '·')) + '</div>'
                + '<div class="l">' + esc(x.label) + '</div>'

      + '<div class="sa-grid sa-grid-2">'

    p.querySelectorAll('[data-jump]').forEach((b) => b.addEventListener('click', () => jumpTab(b.dataset.jump)));

  }
  function cell(l, v) { return '<div class="cell"><div class="v mono">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  // Tools.
  function renderTools(p) {
    const toolsHtml = state.workspace.tools.length === 0
      ? '<div class="sa-empty">Nog geen tools — voeg je eerste toe.</div>'
      : state.workspace.tools.map((t) =>
          '<div class="sa-row-item"><i class="ti ti-tool"></i>'
          + '<div style="flex:1"><b>' + esc(t.name || '') + '</b>'
          + '<div style="font-size:11.5px;color:var(--sa-tx-dim)">' + t.examples_ideal + ' ideaal · ' + t.examples_counter + ' tegen</div></div>'
          + '<button class="sa-btn sa-btn-ghost" data-open-tool="' + esc(t.id) + '">Openen</button>'
          + '<button class="sa-btn sa-btn-danger" data-del-tool="' + esc(t.id) + '"><i class="ti ti-trash"></i></button>'
          + '</div>'
        ).join('');
    const detail = state.activeTool ? toolDetailHtml(state.activeTool) : '';
    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      +   '<div class="sa-card"><h2><i class="ti ti-tool"></i> Tools</h2>'
      +     toolsHtml
      +     '<div style="margin-top:14px"><h2><i class="ti ti-plus"></i> Nieuwe tool</h2>'
      +     '<input class="sa-input" id="toolName" placeholder="Naam (bv. FVG, OB, LiqSweep)"/>'
      +     '<textarea class="sa-textarea" id="toolDesc" placeholder="Korte beschrijving" style="margin-top:6px"></textarea>'
      +     '<div style="margin-top:10px"><button class="sa-btn" id="toolCreate"><i class="ti ti-plus"></i>Aanmaken</button></div>'
      +     '</div></div>'
      +   '<div class="sa-card"><h2>Detail</h2>' + (detail || '<div class="sa-empty">Kies een tool om examples toe te voegen.</div>') + '</div>'
      + '</div>';
    p.querySelectorAll('[data-open-tool]').forEach((b) => b.addEventListener('click', async () => {
      state.activeToolId = b.dataset.openTool;
      await loadTool(state.activeToolId); renderPane();
    }));
    p.querySelectorAll('[data-del-tool]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Deze tool verwijderen?')) return;
      try {
        await api('/api/secret-area-tool?id=' + encodeURIComponent(b.dataset.delTool), { method: 'DELETE' });
        toast('Tool verwijderd', 'success');
        state.activeTool = null; state.activeToolId = null;
        await loadWorkspace(); renderPane();
      } catch (e) { toast('Verwijderen mislukt: ' + e.message, 'error'); }
    }));
    const cr = document.getElementById('toolCreate');
    if (cr) cr.addEventListener('click', async () => {
      const name = document.getElementById('toolName').value.trim();
      if (!name) return toast('Naam vereist', 'error');
      try {
        const d = await api('/api/secret-area-tool', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ name, description: document.getElementById('toolDesc').value.trim() }),
        });
        await loadWorkspace();
        state.activeToolId = d.tool?.id || null;
        if (state.activeToolId) await loadTool(state.activeToolId);
        renderPane();
      } catch (e) { toast('Aanmaken mislukt: ' + e.message, 'error'); }
    });
    wireExampleForm();
  }

  // ── AI meelezen (Fase 3) ─────────────────────────────────────────────
  // Roept /api/secret-area-ai aan met tool_id → toont voorstel in #aiResult.
  // Knoppen "Bewaar als regel" (save:true) en "Opnieuw" verschijnen NA
  // eerste run. Fail-soft: 502 → nette foutmelding, geen kapotte UI.
  async function runAiForActiveTool(save) {
    if (!state.activeToolId) return;
    const runBtn = document.getElementById('aiRun');
    const box    = document.getElementById('aiResult');
    if (!box) return;
    if (runBtn) runBtn.disabled = true;
    box.hidden = false;
    box.innerHTML = '<div class="sa-loading"><i class="ti ti-loader"></i> Claude leest mee…</div>';
    try {
      const d = await api('/api/secret-area-ai', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ tool_id: state.activeToolId, save: !!save }),
      });
      const rule = d?.rule || '';
      box.innerHTML =
        '<div class="lbl">Voorstel (model: ' + esc(d?.model || '') + ', ' + (d?.images_used || 0) + ' afbeeldingen)</div>'
        + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--sa-bg-2);padding:10px;border:1px solid var(--sa-line);border-radius:8px">' + esc(rule) + '</div>'
        + '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +   '<button class="sa-btn" id="aiSave"' + (d?.saved ? ' disabled' : '') + '><i class="ti ti-device-floppy"></i>' + (d?.saved ? 'Opgeslagen' : 'Bewaar als regel') + '</button>'
        +   '<button class="sa-btn sa-btn-ghost" id="aiRetry"><i class="ti ti-refresh"></i>Opnieuw</button>'
        + '</div>'
        + (d?.save_error ? '<div class="sa-err">Bewaren mislukt: ' + esc(d.save_error) + '</div>' : '');
      if (d?.saved) {
        toast('Regel opgeslagen', 'success');
        await loadTool(state.activeToolId);
      }
      document.getElementById('aiSave')?.addEventListener('click', () => runAiForActiveTool(true));
      document.getElementById('aiRetry')?.addEventListener('click', () => runAiForActiveTool(false));
    } catch (e) {
      box.innerHTML = '<div class="sa-err">AI-fout: ' + esc(e.message) + '</div>'
        + '<div style="margin-top:8px"><button class="sa-btn sa-btn-ghost" id="aiRetry2"><i class="ti ti-refresh"></i>Opnieuw</button></div>';
      document.getElementById('aiRetry2')?.addEventListener('click', () => runAiForActiveTool(false));
    } finally { if (runBtn) runBtn.disabled = false; }
  }
  function wireAiPanel() {
    document.getElementById('aiRun')?.addEventListener('click', () => runAiForActiveTool(false));
  }

    });
    document.querySelectorAll('[data-step-del]').forEach((b) => b.addEventListener('click', () => {

          method: 'PUT', headers: { 'Content-Type': 'application/json' },

            name:         document.getElementById('stEditName').value.trim(),

  // ── Setup-eisen (Stap 5) ─────────────────────────────────────────────
  // Definitie-laag: per strategie N modellen (Confirmation/Continuation/…),
  // elk met eisen (vereist | confluentie) + min_confluence. Wiring naar
  // chart-analyse/review komt in een aparte PR.
  //
  // Input-persist patroon: alle inputs zijn state-gebonden; keystrokes
  // updaten state.setup.drafts en pushen naar de server via een
  // "Opslaan"-knop of blur. GEEN renderPane op keystroke.
  state.setup = {
    strategyId: null,      // gekozen strategie
    models: [],            // [{ id, name, min_confluence, position, active, requirements: [] }]
    loaded: false,
    loading: false,
    drafts: {              // per-veld staged waarde vóór save
      newModelName: '',
      newModelMinConfluence: 0,
      newReq: {},          // { [model_id]: { label, kind:'vereist'|'confluentie', weight, tool_id } }
    },
    err: '',
  };
  const KIND_VEREIST     = 'vereist';
  const KIND_CONFLUENTIE = 'confluentie';

  function _saSetupError(msg) {
    state.setup.err = msg || '';
    const el = document.getElementById('setupErr');
    if (el) el.textContent = state.setup.err;
  }
  function _saSetupSyncInputs() {
    // Sync alle open input-velden voor state-persistence vóór een re-render.
    const nm = document.getElementById('setupNewModelName');
    if (nm) state.setup.drafts.newModelName = String(nm.value || '');
    const mc = document.getElementById('setupNewModelMinConfl');
    if (mc) state.setup.drafts.newModelMinConfluence = Number(mc.value) || 0;
    document.querySelectorAll('[data-setup-nr-label]').forEach((el) => {
      const modelId = el.getAttribute('data-setup-nr-label');
      const d = state.setup.drafts.newReq[modelId] || {};
      d.label = String(el.value || '');
      state.setup.drafts.newReq[modelId] = d;
    });
    document.querySelectorAll('[data-setup-nr-weight]').forEach((el) => {
      const modelId = el.getAttribute('data-setup-nr-weight');
      const d = state.setup.drafts.newReq[modelId] || {};
      d.weight = Number(el.value) || 0;
      state.setup.drafts.newReq[modelId] = d;
    });
  }

  async function loadSetupForStrategy(strategyId) {
    state.setup.strategyId = strategyId || null;
    state.setup.loaded = false;
    state.setup.loading = true;
    _saSetupError('');
    if (!strategyId) { state.setup.models = []; state.setup.loading = false; renderPane(); return; }
    try {
      const d = await api('/api/secret-area-setup?strategy_id=' + encodeURIComponent(strategyId));
      state.setup.models = Array.isArray(d?.models) ? d.models : [];
      state.setup.loaded = true;
    } catch (e) {
      state.setup.models = [];
      _saSetupError('Laden mislukt: ' + e.message);
    } finally {
      state.setup.loading = false;
      renderPane();
    }
  }

  async function addSetupModel() {
    _saSetupSyncInputs();
    const name = String(state.setup.drafts.newModelName || '').trim();
    const minC = Math.max(0, Number(state.setup.drafts.newModelMinConfluence) || 0);
    if (!name)                     { _saSetupError('Modelnaam vereist.'); return; }
    if (!state.setup.strategyId)   { _saSetupError('Kies eerst een strategie.'); return; }
    try {
      await api('/api/secret-area-setup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ entity: 'model', strategy_id: state.setup.strategyId, name, min_confluence: minC }),
      });
      state.setup.drafts.newModelName = '';
      state.setup.drafts.newModelMinConfluence = 0;
      await loadSetupForStrategy(state.setup.strategyId);
      toast('Model toegevoegd', 'success');
    } catch (e) { _saSetupError('Aanmaken mislukt: ' + e.message); }
  }

  async function updateSetupModel(modelId, patch) {
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(modelId), {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ entity: 'model', ...patch }),
      });
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Wijzigen mislukt: ' + e.message); }
  }

  async function deleteSetupModel(modelId) {
    if (!confirm('Model + alle bijbehorende eisen verwijderen?')) return;
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(modelId) + '&entity=model', { method: 'DELETE' });
      await loadSetupForStrategy(state.setup.strategyId);
      toast('Model verwijderd', 'success');
    } catch (e) { _saSetupError('Verwijderen mislukt: ' + e.message); }
  }

  async function addSetupRequirement(modelId) {
    _saSetupSyncInputs();
    const draft = state.setup.drafts.newReq[modelId] || {};
    const label = String(draft.label || '').trim();
    const kind  = draft.kind || KIND_VEREIST;
    const weight = Number(draft.weight) || 1;
    const toolId = draft.tool_id || null;
    if (!label) { _saSetupError('Label van de eis vereist.'); return; }
    try {
      await api('/api/secret-area-setup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          entity:  'requirement',
          model_id: modelId,
          label, kind, weight, tool_id: toolId,
        }),
      });
      state.setup.drafts.newReq[modelId] = { label: '', kind, weight: 1, tool_id: null };
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Eis toevoegen mislukt: ' + e.message); }
  }

  async function updateSetupRequirement(reqId, patch) {
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(reqId), {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ entity: 'requirement', ...patch }),
      });
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Wijzigen mislukt: ' + e.message); }
  }

  async function deleteSetupRequirement(reqId) {
    if (!confirm('Eis verwijderen?')) return;
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(reqId) + '&entity=requirement', { method: 'DELETE' });
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Verwijderen mislukt: ' + e.message); }
  }

  function renderSetup(p) {

    if (!state.setup.strategyId && strats.length) {
      state.setup.strategyId = strats[0].id;
      loadSetupForStrategy(state.setup.strategyId);
    }

    if (!strats.length) {
      p.innerHTML = '<div class="sa-card sa-empty">Maak eerst een strategie in "Strategie" — daarna kun je hier de setup-modellen definiëren.</div>';

      '<div class="sa-card" style="margin-bottom:12px">'

      + '</div>'

    } else {
      modelsHtml = state.setup.models.map((m) => {

          '<div style="font-size:12px;color:var(--text-dim);margin-top:6px">'
          + 'Geldig = alle <b>' + req.length + '</b> vereiste eisen aanwezig + minstens <b>' + esc(String(m.min_confluence || 0)) + '</b> confluentiepunten '
          + '<span style="color:var(--text-faint)">(beschikbaar: ' + totalConfWeight + ')</span>.'
          + '</div>';
        const reqRow = (r) =>

          +   '<div class="lbl" style="margin-bottom:6px">Nieuwe eis</div>'
          +   '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
          +     '<input class="sa-input" style="flex:1;min-width:180px" placeholder="Label van de eis" value="' + esc(nrLabel) + '" data-setup-nr-label="' + esc(m.id) + '"/>'
          +     '<select class="sa-select" style="width:140px" data-setup-nr-kind="' + esc(m.id) + '">'
          +       '<option value="vereist"' + (nrKind === 'vereist' ? ' selected' : '') + '>Vereist</option>'
          +       '<option value="confluentie"' + (nrKind === 'confluentie' ? ' selected' : '') + '>Confluentie</option>'
          +     '</select>'
          +     '<input class="sa-input" style="width:80px" type="number" min="0" step="1" placeholder="weight" value="' + esc(String(nrWeight)) + '" data-setup-nr-weight="' + esc(m.id) + '"/>'
          +     '<select class="sa-select" style="width:180px" data-setup-nr-tool="' + esc(m.id) + '">'
          +       '<option value="">— geen tool —</option>'
          +       tools.map((t) => '<option value="' + esc(t.id) + '"' + (nrTool === t.id ? ' selected' : '') + '>' + esc(t.name) + '</option>').join('')
          +     '</select>'
          +     '<button class="sa-btn" data-setup-add-req="' + esc(m.id) + '"><i class="ti ti-plus"></i>Voeg toe</button>'
          +   '</div>'
          + '</div>'

    p.innerHTML =
      stratPicker
      + '<div id="setupErr" class="sa-err" style="min-height:16px;margin:0 0 8px 0">' + esc(state.setup.err || '') + '</div>'
      + newModelForm
      + modelsHtml;

    // ── Wire input-persist (state-bound; GEEN renderPane op keystroke) ──
    document.getElementById('setupStrategy')?.addEventListener('change', (e) => {
      loadSetupForStrategy(e.target.value);
    });
    // Nieuw-model form.
    document.getElementById('setupNewModelName')?.addEventListener('input', (e) => {
      state.setup.drafts.newModelName = String(e.target.value || '');
    });
    document.getElementById('setupNewModelMinConfl')?.addEventListener('input', (e) => {
      state.setup.drafts.newModelMinConfluence = Number(e.target.value) || 0;
    });
    document.getElementById('setupAddModelBtn')?.addEventListener('click', () => addSetupModel());

    // Bestaande model-name + min_confl: state-bound, save op blur.
    p.querySelectorAll('[data-model-name]').forEach((el) => {
      el.addEventListener('blur', () => {
        const modelId = el.getAttribute('data-model-name');
        const val = String(el.value || '').trim();
        const m = state.setup.models.find((x) => x.id === modelId);
        if (m && val && val !== m.name) updateSetupModel(modelId, { name: val });
      });
    });
    p.querySelectorAll('[data-model-minconf]').forEach((el) => {
      el.addEventListener('blur', () => {
        const modelId = el.getAttribute('data-model-minconf');
        const val = Math.max(0, Number(el.value) || 0);
        const m = state.setup.models.find((x) => x.id === modelId);
        if (m && val !== Number(m.min_confluence || 0)) updateSetupModel(modelId, { min_confluence: val });
      });
    });
    p.querySelectorAll('[data-model-del]').forEach((btn) => {
      btn.addEventListener('click', () => deleteSetupModel(btn.getAttribute('data-model-del')));
    });

    // Requirement-rijen — save-op-blur voor label/weight/kind/tool.
    p.querySelectorAll('[data-req-label]').forEach((el) => {

        if (val) updateSetupRequirement(rid, { label: val });

    });
    p.querySelectorAll('[data-req-kind]').forEach((el) => {
      el.addEventListener('change', () => updateSetupRequirement(el.getAttribute('data-req-kind'), { kind: el.value }));
    });
    p.querySelectorAll('[data-req-weight]').forEach((el) => {
      el.addEventListener('blur', () => updateSetupRequirement(el.getAttribute('data-req-weight'), { weight: Math.max(0, Number(el.value) || 0) }));
    });
    p.querySelectorAll('[data-req-tool]').forEach((el) => {

    p.querySelectorAll('[data-setup-nr-label]').forEach((el) => {
      el.addEventListener('input', () => {
        const modelId = el.getAttribute('data-setup-nr-label');

        d.label = String(el.value || '');
        state.setup.drafts.newReq[modelId] = d;

    p.querySelectorAll('[data-setup-nr-kind]').forEach((el) => {
      el.addEventListener('change', () => {
        const modelId = el.getAttribute('data-setup-nr-kind');
        const d = state.setup.drafts.newReq[modelId] || {};
        d.kind = el.value;
        state.setup.drafts.newReq[modelId] = d;

    p.querySelectorAll('[data-setup-nr-weight]').forEach((el) => {
      el.addEventListener('input', () => {

        state.setup.drafts.newReq[modelId] = d;

    p.querySelectorAll('[data-setup-nr-tool]').forEach((el) => {
      el.addEventListener('change', () => {

        state.setup.drafts.newReq[modelId] = d;

    if (c === 'uitzondering') return 'TENZIJ';

  }
  function renderConditions(p) {

        + state.workspace.strategies.map((s) => '<option value="' + esc(s.id) + '"' + (active && s.id === active.id ? ' selected' : '') + '>' + esc(s.name || '(zonder naam)') + '</option>').join('')
        + '</select></div>'
      : '<div class="sa-empty" style="margin-bottom:10px">Maak eerst een strategie in "Strategie".</div>';

    const renderList = (arr, showInherited) => arr.length === 0
      ? '<div class="sa-empty">Nog geen regels.</div>'
      : arr.map((c) =>
          '<div class="sa-row-item">'
          + '<span class="sa-grade ' + (c.ctype === 'filter' ? 'C' : (c.ctype === 'voorwaarde' ? 'A+' : 'B')) + '">'
          + _cprefix(c.ctype) + '</span>'
          + '<div style="flex:1"><span style="' + (c.active === false ? 'text-decoration:line-through;color:var(--sa-tx-dim)' : '') + '">' + esc(c.label) + '</span>'
          + (showInherited && c.scope === 'global' ? ' <span style="font-size:11px;color:var(--sa-azure)">· geërfd</span>' : '')
          + '</div>'
          + '<button class="sa-btn sa-btn-ghost" data-cond-toggle="' + esc(c.id) + '" data-cond-active="' + (c.active === false ? '0' : '1') + '">'
          + (c.active === false ? 'Aan' : 'Uit') + '</button>'
          + '<button class="sa-btn sa-btn-danger" data-cond-del="' + esc(c.id) + '"><i class="ti ti-x"></i></button>'
          + '</div>'
        ).join('');

    const addForm = (scope) =>
      '<div style="margin-top:12px;border-top:1px solid var(--sa-line);padding-top:12px">'
      +   '<div class="sa-grid sa-grid-2">'
      +     '<select class="sa-select" data-cond-scope="' + scope + '" data-cond-field="ctype">'
      +       '<option value="filter">NOOIT als (filter)</option>'
      +       '<option value="voorwaarde">ALLEEN als (voorwaarde)</option>'
      +       '<option value="uitzondering">TENZIJ (uitzondering)</option>'
      +     '</select>'
      +     '<input class="sa-input" data-cond-scope="' + scope + '" data-cond-field="label" placeholder="Regel (bv. NFP-dag; buiten London-sessie)"/>'
      +   '</div>'
      +   '<div style="margin-top:8px"><button class="sa-btn" data-cond-add="' + scope + '"><i class="ti ti-plus"></i>Regel toevoegen</button></div>'
      + '</div>';

    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      +   '<div class="sa-card"><h2><i class="ti ti-alert-triangle"></i> Globaal — voor ALLE strategieën</h2>'
      +     renderList(globals, false)
      +     addForm('global')
      +   '</div>'
      +   '<div class="sa-card"><h2><i class="ti ti-target"></i> Deze strategie</h2>'
      +     stratPicker
      +     (active
                ? renderList([...globals, ...perS], true) + addForm('strategy')
                : '<div class="sa-empty">Kies (of maak) eerst een strategie hierboven.</div>')
      +   '</div>'
      + '</div>';

    document.getElementById('condStrat')?.addEventListener('change', async (e) => {
      const id = e.target.value;
      if (!id) { state.activeStrategy = null; state.activeStrategyId = null; renderPane(); return; }
      state.activeStrategyId = id;
      await loadStrategy(id);
      renderPane();
    });
    p.querySelectorAll('[data-cond-add]').forEach((b) => b.addEventListener('click', async () => {
      const scope = b.dataset.condAdd;
      if (scope === 'strategy' && !state.activeStrategyId) return toast('Kies eerst een strategie', 'error');
      const ctypeEl = p.querySelector('select[data-cond-scope="' + scope + '"][data-cond-field="ctype"]');
      const labelEl = p.querySelector('input[data-cond-scope="' + scope + '"][data-cond-field="label"]');
      const label = String(labelEl?.value || '').trim();
      if (!label) return toast('Label vereist', 'error');
      try {
        await api('/api/secret-area-condition', {
          method:  'POST', headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            scope,
            strategy_id: scope === 'strategy' ? state.activeStrategyId : null,
            ctype:       ctypeEl?.value || 'filter',
            label,
          }),
        });
        await loadConditions();
        renderPane();
        toast('Regel toegevoegd', 'success');
      } catch (e) { toast('Fout: ' + e.message, 'error'); }

    p.querySelectorAll('[data-cond-toggle]').forEach((b) => b.addEventListener('click', async () => {
      const id = b.dataset.condToggle;
      const wasActive = b.dataset.condActive === '1';
      try {
        await api('/api/secret-area-condition?id=' + encodeURIComponent(id), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify({ active: !wasActive }),
        });
        await loadConditions(); renderPane();
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
    p.querySelectorAll('[data-cond-del]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Regel verwijderen?')) return;
      try {
        await api('/api/secret-area-condition?id=' + encodeURIComponent(b.dataset.condDel), { method: 'DELETE' });
        await loadConditions(); renderPane(); toast('Verwijderd', 'success');
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
  }

  async function runReview(save) {
    if (!state.activeStrategyId) return;
    const btn = document.getElementById('rvRun');
    const box = document.getElementById('rvResult');
    if (!box) return;
    if (btn) btn.disabled = true;
    box.hidden = false;
    box.innerHTML = '<div class="sa-loading"><i class="ti ti-loader"></i> Claude analyseert…</div>';
    try {
      const d = await api('/api/secret-area-review', {
        method:  'POST', headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ strategy_id: state.activeStrategyId, save: !!save }),
      });
      box.innerHTML =
        '<div class="lbl">Voorstel (model: ' + esc(d?.model || '') + ')</div>'
        + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--sa-bg-2);padding:10px;border:1px solid var(--sa-line);border-radius:8px">' + esc(d?.spec || '') + '</div>'
        + '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +   '<button class="sa-btn" id="rvSave"' + (d?.saved ? ' disabled' : '') + '><i class="ti ti-device-floppy"></i>' + (d?.saved ? 'Opgeslagen' : 'Bewaar') + '</button>'
        +   '<button class="sa-btn sa-btn-ghost" id="rvRetry"><i class="ti ti-refresh"></i>Verfijn (opnieuw)</button>'
        + '</div>'
        + (d?.save_error ? '<div class="sa-err">Bewaren mislukt: ' + esc(d.save_error) + '</div>' : '');
      if (d?.saved) {
        toast('Setup-herkenning opgeslagen', 'success');
        await loadStrategy(state.activeStrategyId);
      }
      document.getElementById('rvSave')?.addEventListener('click', () => runReview(true));
      document.getElementById('rvRetry')?.addEventListener('click', () => runReview(false));
    } catch (e) {
      box.innerHTML = '<div class="sa-err">AI-fout: ' + esc(e.message) + '</div>'
        + '<div style="margin-top:8px"><button class="sa-btn sa-btn-ghost" id="rvRetry2"><i class="ti ti-refresh"></i>Opnieuw</button></div>';
      document.getElementById('rvRetry2')?.addEventListener('click', () => runReview(false));
    } finally { if (btn) btn.disabled = false; }
  }
