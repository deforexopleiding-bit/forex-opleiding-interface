  // Teken een trade = de kandidaat-elementen + de exit-lijn met uitkomst.
  function _btDrawTrade(chartEl, trade) {
    if (!chartEl || !trade || !trade.draw) return;
    _btDrawCandidate(chartEl, trade.draw); // sweep/MSS/fib/entry/SL/TP + zoom (forceert M15)
    const cx = chartEl._oanda;
    if (!cx || !cx.series) return;
    const ov = chartEl._btOverlay || { lines: [] };
    if (Number.isFinite(Number(trade.exit))) {
      try {
        ov.lines.push(cx.series.createPriceLine({
          price: Number(trade.exit),
          color: trade.outcome === 'WIN' ? BT_COLORS.long : (trade.outcome === 'LOSS' ? BT_COLORS.sl : BT_COLORS.fib),
          lineWidth: 1, lineStyle: 3, axisLabelVisible: true, title: 'Exit (' + (trade.outcome || '') + ')',
        }));
      } catch (_) {}
    }
    chartEl._btOverlay = ov;
  }

  function _btRenderResults(resultsEl, chartEl) {
    if (!resultsEl) return;
    const rows = btState.candidates;
    if (!rows.length) { resultsEl.innerHTML = '<p style="color:var(--sa-tx-mid);font-size:12.5px">Geen kandidaten gevonden in deze periode.</p>'; return; }
    let html = '<div style="overflow:auto"><table class="mono" style="width:100%;border-collapse:collapse;font-size:11.5px">'
      + '<thead><tr style="text-align:left;color:var(--sa-tx-mid)">'
      + '<th style="padding:4px 8px 4px 0">Datum (UTC)</th><th style="padding:4px 8px">Richting</th>'
      + '<th style="padding:4px 8px;text-align:right">Entry</th><th style="padding:4px 8px;text-align:right">SL</th>'
      + '<th style="padding:4px 8px">Bouwstenen</th></tr></thead><tbody>';
    rows.forEach((c, idx) => {
      const dir = c.direction === 'long'
        ? '<span style="color:' + BT_COLORS.long + ';font-weight:600">long</span>'
        : '<span style="color:' + BT_COLORS.short + ';font-weight:600">short</span>';
      const dt = String(c.ts || '').replace('T', ' ').slice(0, 16);
      html += '<tr class="bt-row" data-idx="' + idx + '" style="border-top:1px solid var(--border);cursor:pointer">'
        + '<td style="padding:4px 8px 4px 0">' + esc(dt) + '</td>'
        + '<td style="padding:4px 8px">' + dir + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(c.entry?.price ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(c.sl?.price ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;color:var(--sa-tx-mid)">' + esc((c.matched || []).join(' · ')) + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
    resultsEl.innerHTML = html;
    resultsEl.querySelectorAll('.bt-row').forEach((tr) => {
      tr.addEventListener('click', () => {
        const idx = Number(tr.dataset.idx);
        const cand = btState.candidates[idx];
        if (!cand) return;
        resultsEl.querySelectorAll('.bt-row').forEach((x) => x.style.background = '');
        tr.style.background = 'var(--color-info-soft, rgba(37,99,235,.08))';
        _btDrawCandidate(chartEl, cand);
      });
    });
  }

  // Teken alle elementen van één kandidaat als overlay (v4-primitieven:
  // createPriceLine + setMarkers). Wist eerst de vorige tekeningen.
  function _btDrawCandidate(chartEl, cand) {
    if (!chartEl) return;
    const cx = chartEl._oanda;
    if (!cx || !cx.series) return;
    _btClearDrawings(chartEl);
    const ov = { lines: [] };
    const mkLine = (price, color, title, style) => {
      if (!Number.isFinite(Number(price))) return;
      try {
        ov.lines.push(cx.series.createPriceLine({
          price: Number(price), color, lineWidth: 1,
          lineStyle: (style == null ? 0 : style), axisLabelVisible: true, title,
        }));
      } catch (_) {}
    };
    // Horizontale niveaus. Fib-oriëntatie: 1.0 = swing-extreme (SL-kant),
    // 0 = impuls/sweep-extreme, 0.71 = entry, -0.27 = TP1.
    mkLine(cand.sweep?.sweptLevel, BT_COLORS.sweep, 'Sweep-niveau', 2);
    mkLine(cand.mss?.brokenLevel, BT_COLORS.mss, 'MSS', 2);
    mkLine(cand.fib?.level1Price, BT_COLORS.fib, 'Fib 1.0 (swing)', 1);
    mkLine(cand.fib?.level0Price, BT_COLORS.fib, 'Fib 0 (impuls)', 1);
    mkLine(cand.fib?.level071Price, BT_COLORS.entry, 'Fib 0.71', 0);
    mkLine(cand.fib?.levelNeg027Price, BT_COLORS.tp, 'Fib -0.27 / TP1', 0);
    mkLine(cand.entry?.price, BT_COLORS.entry, 'Entry (0.71)', 0);
    mkLine(cand.sl?.price, BT_COLORS.sl, 'SL (1.0)', 0);

    // Markers op de relevante candles.
    const dirUp = cand.direction === 'long';
    const markers = [
      { time: _oandaTimeToUnix(cand.sweep?.ts),          position: 'belowBar', color: BT_COLORS.sweep, shape: 'circle',    text: 'sweep' },
      { time: _oandaTimeToUnix(cand.displacement?.fromTs), position: 'belowBar', color: BT_COLORS.entry, shape: 'circle',    text: 'disp' },
      { time: _oandaTimeToUnix(cand.displacement?.toTs),   position: 'aboveBar', color: BT_COLORS.entry, shape: 'circle',    text: '' },
      { time: _oandaTimeToUnix(cand.mss?.ts),            position: 'aboveBar', color: BT_COLORS.mss,   shape: 'square',    text: 'MSS' },
      { time: _oandaTimeToUnix(cand.ts),                 position: dirUp ? 'belowBar' : 'aboveBar', color: BT_COLORS[cand.direction] || BT_COLORS.long, shape: dirUp ? 'arrowUp' : 'arrowDown', text: 'entry' },
    ].filter((m) => Number.isFinite(m.time)).sort((a, b) => a.time - b.time);
    try { cx.series.setMarkers(markers); } catch (_) {}

    chartEl._btOverlay = ov;
    btState.selectedId = cand.id;

    // Zoom naar het kandidaat-moment op M15 (forceer M15; laadt zo nodig
    // oudere candles bij).
    const focusSec = _oandaTimeToUnix(cand.ts);
    if (cx.focusAround && Number.isFinite(focusSec)) cx.focusAround(focusSec, 60, 'M15');
  }

  function _btClearDrawings(chartEl) {
    if (!chartEl) return;
    const cx = chartEl._oanda;
    const ov = chartEl._btOverlay;
    if (cx && cx.series) {
      if (ov && ov.lines) for (const ln of ov.lines) { try { cx.series.removePriceLine(ln); } catch (_) {} }
      try { cx.series.setMarkers([]); } catch (_) {}
    }
    chartEl._btOverlay = { lines: [] };
  }

  // ── Candle-backfill (beheer) ─────────────────────────────────────────
  // Slaat H4 + M15 historie sinds 2025-01-01 op in sa_candles voor alle
  // cockpit-instrumenten. Loopt client-side serieel door alle
  // (instrument × timeframe)-combinaties en roept per combinatie herhaald
  // action='backfill_chunk' aan (from=lastTs) tot done=true. Geen cron.
  const SA_BACKFILL_GRANS = ['H4', 'M15'];
  let _saBackfillRunning = false;

  function renderBackfillCard() {
    const total = OANDA_INSTRUMENTS.length * SA_BACKFILL_GRANS.length;
    return ''
      + '<div class="sa-card" style="margin-top:16px">'
      +   '<h2><i class="ti ti-database-import"></i> Candle-opslag &amp; backfill</h2>'
      +   '<p style="color:var(--sa-tx-mid);font-size:12.5px;margin-bottom:12px">'
      +     'Vult <span class="mono">sa_candles</span> met H4 + M15 sinds 2025-01-01 voor alle '
      +     OANDA_INSTRUMENTS.length + ' instrumenten (' + total + ' combinaties). '
      +     'Elke combinatie wordt in behapbare stukken opgehaald; veilig om te herhalen.'
      +   '</p>'
      +   '<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'
      +     '<button type="button" class="sa-btn" data-backfill-start><i class="ti ti-player-play"></i>Start backfill (H4+M15 sinds 2025)</button>'
      +     '<button type="button" class="sa-btn sa-btn-ghost" data-backfill-status><i class="ti ti-refresh"></i>Ververs status</button>'
      +   '</div>'
      +   '<div data-backfill-progress-wrap style="display:none;margin-bottom:10px">'
      +     '<div style="display:flex;justify-content:space-between;font-size:11.5px;color:var(--sa-tx-mid);margin-bottom:4px">'
      +       '<span data-backfill-progress-label>—</span>'
      +       '<span data-backfill-progress-count class="mono">0 / ' + total + '</span>'
      +     '</div>'
      +     '<div style="height:8px;border-radius:99px;background:var(--surface-muted,rgba(0,0,0,.08));overflow:hidden">'
      +       '<div data-backfill-progress-fill style="height:100%;width:0%;background:var(--brand-primary);transition:width .2s ease"></div>'
      +     '</div>'
      +   '</div>'
      +   '<div data-backfill-log class="mono" style="display:none;max-height:190px;overflow:auto;font-size:11.5px;line-height:1.7;'
      +     'background:var(--surface-muted,rgba(0,0,0,.04));border:1px solid var(--border);border-radius:10px;padding:8px 10px"></div>'
      +   '<div data-backfill-status-out style="margin-top:12px"></div>'
      + '</div>';
  }

  function mountBackfill(root) {
    const startBtn  = root.querySelector('[data-backfill-start]');
    const statusBtn = root.querySelector('[data-backfill-status]');
    if (startBtn)  startBtn.addEventListener('click', () => runBackfill(root));
    if (statusBtn) statusBtn.addEventListener('click', () => refreshBackfillStatus(root));
  }

  function _bfLog(root, msg, kind) {
    const box = root.querySelector('[data-backfill-log]');
    if (!box) return;
    box.style.display = 'block';
    const line = document.createElement('div');
    if (kind === 'err')  line.style.color = 'var(--color-danger,#c0392b)';
    if (kind === 'done') line.style.color = 'var(--color-success,#1e8e5a)';
    line.textContent = msg;
    box.appendChild(line);
    box.scrollTop = box.scrollHeight;
  }

  async function runBackfill(root) {
    if (_saBackfillRunning) return;
    _saBackfillRunning = true;

    const startBtn = root.querySelector('[data-backfill-start]');
    const wrap     = root.querySelector('[data-backfill-progress-wrap]');
    const fill     = root.querySelector('[data-backfill-progress-fill]');
    const countEl  = root.querySelector('[data-backfill-progress-count]');
    const labelEl  = root.querySelector('[data-backfill-progress-label]');
    const logBox   = root.querySelector('[data-backfill-log]');

    const combos = [];
    for (const instrument of OANDA_INSTRUMENTS) {
      for (const granularity of SA_BACKFILL_GRANS) combos.push({ instrument, granularity });
    }
    const total = combos.length;

    if (startBtn) startBtn.disabled = true;
    if (wrap) wrap.style.display = 'block';
    if (logBox) { logBox.style.display = 'block'; logBox.innerHTML = ''; }
    let grandInserted = 0;
    let failed = 0;

    for (let i = 0; i < combos.length; i++) {
      const { instrument, granularity } = combos[i];
      if (labelEl) labelEl.textContent = instrument + ' ' + granularity + ' …';

      let from = null;         // eerste chunk → server default (2025-01-01)
      let comboInserted = 0;
      let guard = 0;           // harde stop tegen onverwachte lus (max ~50 chunks/combo)
      try {
        while (true) {
          const payload = { action: 'backfill_chunk', instrument, granularity };
          if (from) payload.from = from;
          const d = await api('/api/secret-area-candles', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          comboInserted += (d.inserted || 0);
          grandInserted += (d.inserted || 0);
          if (d.done || !d.lastTs) break;
          from = d.lastTs;
          if (++guard > 60) { _bfLog(root, instrument + ' ' + granularity + ': gestopt na 60 chunks (veiligheid)', 'err'); break; }
        }
        _bfLog(root, instrument + ' ' + granularity + ': ' + comboInserted + ' candles', 'done');
      } catch (e) {
        failed++;
        _bfLog(root, instrument + ' ' + granularity + ': FOUT — ' + (e?.message || 'onbekend') + ' (doorgaan met de rest)', 'err');
      }

      const doneCount = i + 1;
      if (countEl) countEl.textContent = doneCount + ' / ' + total;
      if (fill)    fill.style.width = Math.round((doneCount / total) * 100) + '%';
    }

    if (labelEl) labelEl.textContent = 'Klaar';
    _bfLog(root, '— Klaar. Totaal nieuw opgeslagen: ' + grandInserted + ' candles' + (failed ? (', ' + failed + ' combinatie(s) met fout') : ''), 'done');
    if (startBtn) startBtn.disabled = false;
    _saBackfillRunning = false;

    // Ververs de statustabel automatisch na afloop.
    refreshBackfillStatus(root);
  }

  async function refreshBackfillStatus(root) {
    const out = root.querySelector('[data-backfill-status-out]');
    if (!out) return;
    out.innerHTML = '<span style="color:var(--sa-tx-mid);font-size:12px">Status ophalen…</span>';
    try {
      const d = await api('/api/secret-area-candles?action=status');
      const rows = Array.isArray(d.rows) ? d.rows : [];
      const fmt = (ts) => {
        if (!ts) return '—';
        try { return String(ts).slice(0, 10); } catch (_) { return '—'; }
      };
      let html = '<div style="font-size:11.5px;color:var(--sa-tx-mid);margin-bottom:6px">Totaal opgeslagen: '
        + '<span class="mono">' + (d.total || 0) + '</span> candles</div>'
        + '<div style="overflow:auto"><table class="mono" style="width:100%;border-collapse:collapse;font-size:11.5px">'
        + '<thead><tr style="text-align:left;color:var(--sa-tx-mid)">'
        + '<th style="padding:3px 8px 3px 0">Instrument</th><th style="padding:3px 8px">TF</th>'
        + '<th style="padding:3px 8px;text-align:right">Aantal</th><th style="padding:3px 8px">Van</th><th style="padding:3px 8px">Tot</th>'
        + '</tr></thead><tbody>';
      for (const r of rows) {
        html += '<tr style="border-top:1px solid var(--border)">'
          + '<td style="padding:3px 8px 3px 0">' + esc(r.instrument) + '</td>'
          + '<td style="padding:3px 8px">' + esc(r.granularity) + '</td>'
          + '<td style="padding:3px 8px;text-align:right">' + (r.count || 0) + '</td>'
          + '<td style="padding:3px 8px">' + fmt(r.minTs) + '</td>'
          + '<td style="padding:3px 8px">' + fmt(r.maxTs) + '</td>'
          + '</tr>';
      }
      html += '</tbody></table></div>';
      out.innerHTML = html;
    } catch (e) {
      out.innerHTML = '<span style="color:var(--color-danger,#c0392b);font-size:12px">Status mislukt: ' + esc(e?.message || 'onbekend') + '</span>';
    }
  }

  // Utility: jump-to-tab from home/dashboard/next-step.
  async function jumpTab(key) {
    // Zorg dat activeStrategy geladen is voor Checklist/Review/Detection.
    if (['checklist', 'review', 'detection'].includes(key) && !state.activeStrategy) {
      const s = state.workspace.strategies[0];
      if (s) { state.activeStrategyId = s.id; await loadStrategy(s.id); }
    }
    state.tab = key;
    renderWorkspace();
  }

  // ── HOME: coach-thuisscherm — "doe dit nu" + reis + meters + secties.
  // Afgeleid uit workspace + trades + conditions. Geen nieuwe endpoints.
  function homeContext() {
    const st  = pipelineStatus();
    const s   = st.peil;
    const tools = state.workspace.tools || [];
    const trained  = tools.filter((t) => t.detection_rule && String(t.detection_rule).trim().length > 0).length;
    const trades = state.trades.list || [];
    const tradesCount = trades.length;
    const traderGoal  = 50;                   // "gevoel voor scherpte"-doel — na 50 trades = 100%.
    const traderPct   = Math.min(100, Math.round((tradesCount / traderGoal) * 100));
    const stratPct    = readiness(st.steps);
    const specPresent = !!(s && s.recognition_spec && s.recognition_spec.trim().length > 0);
    // Detectie-gereedheid: strategie-pijplijn + trader-groei gecombineerd.
    // Extra weging: spec aanwezig telt zwaar (35% van totaal).
    const detectionPct = Math.round(
      (stratPct * 0.5) + (specPresent ? 35 : 0) + (Math.min(30, tradesCount) * 0.5)
    );
    // Volgende stap: eerste onvoltooide mijlpaal → hero.
    let next = { key: 'trades', title: 'Log je trades', tone: 'trades',
                 sub: 'Blijf je uitgespeelde setups vastleggen — daar leert je systeem wat écht werkt.' };
    const toolsNoTraining = tools.length > 0 && trained < tools.length;
    if (tools.length === 0) {
      next = {
        key: 'tools',
        title: 'Maak je eerste tool aan',
        tone: 'tools',
        sub: 'Bouwstenen zoals FVG, sweep en order block leggen de basis voor herkenning.',
      };
    } else if (toolsNoTraining) {
      next = {
        key: 'tools',
        title: 'Upload een paar voorbeelden bij je tools',
        tone: 'tools',
        sub: 'Nog ' + (tools.length - trained) + ' tool(s) zonder detection-regel. Voeg ideaal- en tegenvoorbeelden toe — daar leert je systeem herkenning.',
      };
    } else if (!s || !s.name) {
      next = {
        key: 'strategy',
        title: 'Bouw je eerste strategie',
        tone: 'strategy',
        sub: 'Entry, SL, TP en risk — de spelregels voor je systeem.',
      };
    } else if (!(s.entry_signal && s.sl_signal && s.tp_signal)) {
      next = {
        key: 'strategy',
        title: 'Rond je strategie af',
        tone: 'strategy',
        sub: 'Entry-, SL- en TP-signaal invullen zodat je systeem weet waar het op moet reageren.',
      };
    } else if ((state.activeStrategy?.checklist || []).length === 0) {
      next = {
        key: 'checklist',
        title: 'Zet je checklist op',
        tone: 'checklist',
        sub: 'De controle-items die A+/B/C bepalen — de grade van elke setup.',
      };
    } else if (!specPresent) {
      next = {
        key: 'review',
        title: 'Draai de systeem-review',
        tone: 'review',
        sub: 'Smelt alles tot één herkenning die je systeem straks in de markt zoekt.',
      };
    }
    return { st, stratPct, traderPct, detectionPct, next, tools, trained, tradesCount, specPresent };
  }

  function ringSvg(pct, color) {
    const CIRC = 264; // 2πr voor r=42
    const off  = Math.max(0, Math.round(CIRC - (CIRC * Math.min(100, Math.max(0, pct)) / 100)));
    return '<svg width="96" height="96">'
      +   '<circle cx="48" cy="48" r="42" stroke="rgba(255,255,255,.08)" stroke-width="7" fill="none"/>'
      +   '<circle cx="48" cy="48" r="42" stroke="' + color + '" stroke-width="7" fill="none" stroke-linecap="round" '
      +          'stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + off + '"/>'
      + '</svg>';
  }

  function renderHome(p) {
    const ctx = homeContext();
    const { st, stratPct, traderPct, detectionPct, next, tools, trained, tradesCount, specPresent } = ctx;

    // Reis-tijdlijn: 6 mijlpalen. "Je bent hier" = eerste niet-voltooide.
    const journey = [
      { key: 'strategy', label: 'Strategie<br>bouwen', done: st.steps.find(x => x.key === 'strategy').status === 'done' },
      { key: 'tools',    label: 'Voorbeelden<br>trainen', done: st.steps.find(x => x.key === 'tools').status === 'done' },
      { key: 'review',   label: 'Herkenning<br>genereren', done: specPresent },
      { key: 'detection',label: 'Detectie<br>live',       done: false },  // pas als engine live is — huidige scaffold = false
      { key: 'detection',label: 'Semi-<br>automatisch',   done: false },
      { key: 'detection',label: 'Vol-<br>automatisch',    done: false },
    ];
    let hereIdx = journey.findIndex((j) => !j.done);
    if (hereIdx < 0) hereIdx = journey.length - 1;
    const fillPct = Math.round((hereIdx / (journey.length - 1)) * 100);

    // Sectiekaarten (met status uit pijplijn + trades).
    const cards = [
      { key:'tools',      icon:'ti-tool',        title:'Tools',
        why:'Leert het systeem je bouwstenen herkennen — FVG, sweep, MSS, order block…',
        st: tools.length === 0 ? 'todo' : (trained >= tools.length ? 'done' : 'part'),
        note: tools.length === 0 ? 'nog niet' : (trained + '/' + tools.length + ' getraind') },
      { key:'strategy',   icon:'ti-list-tree',   title:'Strategie',
        why:'Je entry-signaal, SL en TP — de spelregels voor je systeem.',

  // Dashboard = command center. Pijplijn-voortgang + volgende-stap-kaart +
  // wat-mist-er-nog + gereedheids-meter, met deep-links per stap.
  function renderDashboard(p) {
    const s   = state.trades.stats || { win_rate: 0, avg_rr: 0, expectancy: 0, count: 0, per_grade: [] };
    const st  = pipelineStatus();
    const pct = readiness(st.steps);
    const next = st.steps.find((x) => x.status !== 'done') || null;
    const meterColor = pct === 100 ? 'var(--sa-win)' : (pct >= 50 ? 'var(--sa-amber)' : 'var(--sa-loss)');
    const meter =
      '<div style="background:var(--sa-bg-2);border:1px solid var(--sa-line);border-radius:8px;overflow:hidden;height:10px;margin-top:6px">'
      + '<div style="height:10px;width:' + pct + '%;background:' + meterColor + '"></div>'
      + '</div>';

    const nextCard = next
      ? '<div class="sa-card" style="border-left:4px solid var(--sa-azure)">'
        + '<div class="lbl">Volgende stap</div>'
        + '<div class="disp" style="font-size:15px;font-weight:600;margin-top:4px">' + esc(next.label.replace(/^\d+\.\s*/, '')) + '</div>'
        + '<div style="font-size:12.5px;color:var(--sa-tx-mid);margin-top:4px">' + esc(next.detail) + '</div>'
        + '<div style="margin-top:10px"><button class="sa-btn" data-jump="' + esc(next.key) + '"><i class="ti ti-arrow-right"></i>Ga verder</button></div>'
        + '</div>'
      : '<div class="sa-card" style="border-left:4px solid var(--sa-win)">'
        + '<div class="lbl">Pijplijn</div>'
        + '<div class="disp" style="font-size:15px;font-weight:600;margin-top:4px">Alle stappen af — klaar voor Detectie</div>'
        + '<div style="margin-top:10px"><button class="sa-btn" data-jump="detection"><i class="ti ti-radar"></i>Naar Detectie</button></div>'
        + '</div>';

    const missing = st.steps.filter((x) => x.status !== 'done').map((x) =>
      '<div class="sa-row-item"><i class="ti ti-alert-circle" style="color:var(--sa-amber)"></i>'
      + '<div style="flex:1"><b>' + esc(x.label) + '</b> <span style="color:var(--sa-tx-mid);font-size:12px">— ' + esc(x.detail) + '</span></div>'
      + '<button class="sa-btn sa-btn-ghost" data-jump="' + esc(x.key) + '">Openen</button></div>'
    ).join('');

    p.innerHTML =
      '<div class="sa-card" style="margin-bottom:14px">'
      +   '<h2><i class="ti ti-chart-candle"></i> Live chart <span style="font-size:11px;color:var(--sa-tx-mid);font-weight:400">EUR/USD · H4 (default)</span></h2>'
      +   '<div id="oandaChartCompact"></div>'
      + '</div>'

      + '<div class="cockpit" style="margin-bottom:14px">'
      +   '<div class="sa-strip">'
      +     cell('Win-rate',       s.win_rate + '%')
      +     cell('Gem. RR',        s.avg_rr)
      +     cell('Expectancy (€)', s.expectancy)
      +     cell('# Trades',       s.count)
      +   '</div>'
      +   '<div style="margin-top:14px"><div class="lbl">Systeem-gereedheid: ' + pct + '%</div>' + meter + '</div>'
      + '</div>'

      + '<div class="sa-card" style="margin-bottom:14px"><h2><i class="ti ti-flag"></i> Pijplijn</h2>'
      +   '<div class="sa-strip">'
      +     st.steps.map((x) => {
              const color = x.status === 'done' ? 'var(--sa-win)' : (x.status === 'partial' ? 'var(--sa-amber)' : 'var(--sa-tx-dim)');
              return '<div class="cell" style="cursor:pointer" data-jump="' + esc(x.key) + '">'
                + '<div class="v mono" style="color:' + color + '">' + (x.status === 'done' ? '✓' : (x.status === 'partial' ? '~' : '·')) + '</div>'
                + '<div class="l">' + esc(x.label) + '</div>'
                + '<div style="font-size:11px;color:var(--sa-tx-dim);margin-top:2px">' + esc(x.detail) + '</div>'
                + '</div>';
            }).join('')
      +   '</div>'
      + '</div>'

      + '<div class="sa-grid sa-grid-2">'
      +   nextCard
      +   '<div class="sa-card"><h2>Wat mist er nog?</h2>'
      +     (missing || '<div class="sa-empty">Niks meer op de todo-lijst — mooi werk.</div>')
      +   '</div>'
      + '</div>';

    p.querySelectorAll('[data-jump]').forEach((b) => b.addEventListener('click', () => jumpTab(b.dataset.jump)));

    // Mount de compacte live-chart (EUR_USD H4). Component regelt zelf
    // fetch + live-refresh + cleanup bij re-mount.
    const chartEl = document.getElementById('oandaChartCompact');
    if (chartEl) renderOandaChart(chartEl, { instrument: 'EUR_USD', granularity: 'H4', compact: true });

  function cell(l, v) { return '<div class="cell"><div class="v mono">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  // Tools.
  function renderTools(p) {
    const toolsHtml = state.workspace.tools.length === 0
      ? '<div class="sa-empty">Nog geen tools — voeg je eerste toe.</div>'
      : state.workspace.tools.map((t) =>
          '<div class="sa-row-item"><i class="ti ti-tool"></i>'
          + '<div style="flex:1"><b>' + esc(t.name || '') + '</b>'

          + '<button class="sa-btn sa-btn-ghost" data-open-tool="' + esc(t.id) + '">Openen</button>'
          + '<button class="sa-btn sa-btn-danger" data-del-tool="' + esc(t.id) + '"><i class="ti ti-trash"></i></button>'
          + '</div>'
        ).join('');
    const detail = state.activeTool ? toolDetailHtml(state.activeTool) : '';
    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      +   '<div class="sa-card"><h2><i class="ti ti-tool"></i> Tools</h2>'

      +     '<div style="margin-top:14px"><h2><i class="ti ti-plus"></i> Nieuwe tool</h2>'
      +     '<input class="sa-input" id="toolName" placeholder="Naam (bv. FVG, OB, LiqSweep)"/>'
      +     '<textarea class="sa-textarea" id="toolDesc" placeholder="Korte beschrijving" style="margin-top:6px"></textarea>'
      +     '<div style="margin-top:10px"><button class="sa-btn" id="toolCreate"><i class="ti ti-plus"></i>Aanmaken</button></div>'
      +     '</div></div>'
      +   '<div class="sa-card"><h2>Detail</h2>' + (detail || '<div class="sa-empty">Kies een tool om examples toe te voegen.</div>') + '</div>'
      + '</div>';
    p.querySelectorAll('[data-open-tool]').forEach((b) => b.addEventListener('click', async () => {
      state.activeToolId = b.dataset.openTool;
      await loadTool(state.activeToolId); renderPane();
    }));
    p.querySelectorAll('[data-del-tool]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Deze tool verwijderen?')) return;
      try {
        await api('/api/secret-area-tool?id=' + encodeURIComponent(b.dataset.delTool), { method: 'DELETE' });
        toast('Tool verwijderd', 'success');
        state.activeTool = null; state.activeToolId = null;
        await loadWorkspace(); renderPane();
      } catch (e) { toast('Verwijderen mislukt: ' + e.message, 'error'); }
    }));
    const cr = document.getElementById('toolCreate');
    if (cr) cr.addEventListener('click', async () => {
      const name = document.getElementById('toolName').value.trim();
      if (!name) return toast('Naam vereist', 'error');
      try {
        const d = await api('/api/secret-area-tool', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ name, description: document.getElementById('toolDesc').value.trim() }),
        });
        await loadWorkspace();
        state.activeToolId = d.tool?.id || null;
        if (state.activeToolId) await loadTool(state.activeToolId);
        renderPane();
      } catch (e) { toast('Aanmaken mislukt: ' + e.message, 'error'); }
    });
    wireExampleForm();
  }

    return '<div><b>' + esc(t.name || '') + '</b></div>'

      +     '<input class="sa-input" id="exTf" placeholder="Timeframe (bv. 15m)"/>'

  function wireExampleForm() {
    const btn = document.getElementById('exSubmit');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (!state.activeToolId) return toast('Kies eerst een tool', 'error');
      btn.disabled = true;
      try {
        let image_path = null, source_url = null;
        const file  = document.getElementById('exFile').files[0];
        const tvUrl = document.getElementById('exTvUrl').value.trim();
        if (file) {
          const up = await uploadFile(file, 'tool', state.activeToolId);
          image_path = up.image_path;
        } else if (tvUrl) {
          const up = await uploadTv(tvUrl, 'tool', state.activeToolId);
          image_path = up.image_path;
          source_url = up.source_url || null;
        }
        await api('/api/secret-area-example', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({
            tool_id:    state.activeToolId,
            kind:       document.getElementById('exKind').value,
            timeframe:  document.getElementById('exTf').value.trim(),
            instrument: document.getElementById('exInstr').value.trim(),
            note:       document.getElementById('exNote').value.trim(),
            image_path, source_url,
          }),
        });
        toast('Voorbeeld toegevoegd', 'success');
        await loadWorkspace();
        await loadTool(state.activeToolId);
        renderPane();
      } catch (e) {
        toast('Toevoegen mislukt: ' + e.message, 'error');
      } finally { btn.disabled = false; }
    });
    document.querySelectorAll('[data-del-ex]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Voorbeeld verwijderen?')) return;
      try {
        await api('/api/secret-area-example?id=' + encodeURIComponent(b.dataset.delEx), { method: 'DELETE' });
        toast('Verwijderd', 'success');
        await loadWorkspace(); await loadTool(state.activeToolId); renderPane();
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
    wireAiPanel();
  }

  // ── AI meelezen (Fase 3) ─────────────────────────────────────────────
  // Roept /api/secret-area-ai aan met tool_id → toont voorstel in #aiResult.
  // Knoppen "Bewaar als regel" (save:true) en "Opnieuw" verschijnen NA
  // eerste run. Fail-soft: 502 → nette foutmelding, geen kapotte UI.
  async function runAiForActiveTool(save) {
    if (!state.activeToolId) return;
    const runBtn = document.getElementById('aiRun');
    const box    = document.getElementById('aiResult');
    if (!box) return;
    if (runBtn) runBtn.disabled = true;
    box.hidden = false;
    box.innerHTML = '<div class="sa-loading"><i class="ti ti-loader"></i> Claude leest mee…</div>';
    try {
      const d = await api('/api/secret-area-ai', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ tool_id: state.activeToolId, save: !!save }),
      });
      const rule = d?.rule || '';
      box.innerHTML =
        '<div class="lbl">Voorstel (model: ' + esc(d?.model || '') + ', ' + (d?.images_used || 0) + ' afbeeldingen)</div>'
        + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--sa-bg-2);padding:10px;border:1px solid var(--sa-line);border-radius:8px">' + esc(rule) + '</div>'
        + '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +   '<button class="sa-btn" id="aiSave"' + (d?.saved ? ' disabled' : '') + '><i class="ti ti-device-floppy"></i>' + (d?.saved ? 'Opgeslagen' : 'Bewaar als regel') + '</button>'
        +   '<button class="sa-btn sa-btn-ghost" id="aiRetry"><i class="ti ti-refresh"></i>Opnieuw</button>'
        + '</div>'
        + (d?.save_error ? '<div class="sa-err">Bewaren mislukt: ' + esc(d.save_error) + '</div>' : '');
      if (d?.saved) {
        toast('Regel opgeslagen', 'success');
        await loadTool(state.activeToolId);
      }
      document.getElementById('aiSave')?.addEventListener('click', () => runAiForActiveTool(true));
      document.getElementById('aiRetry')?.addEventListener('click', () => runAiForActiveTool(false));
    } catch (e) {
      box.innerHTML = '<div class="sa-err">AI-fout: ' + esc(e.message) + '</div>'
        + '<div style="margin-top:8px"><button class="sa-btn sa-btn-ghost" id="aiRetry2"><i class="ti ti-refresh"></i>Opnieuw</button></div>';
      document.getElementById('aiRetry2')?.addEventListener('click', () => runAiForActiveTool(false));
    } finally { if (runBtn) runBtn.disabled = false; }
  }
  function wireAiPanel() {
    document.getElementById('aiRun')?.addEventListener('click', () => runAiForActiveTool(false));
  }

  // Strategy builder (Opbouw).
  function renderStrategyBuilder(p) {
    const strats = state.workspace.strategies;
    const st = state.activeStrategy;
    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      + '<div class="sa-card"><h2><i class="ti ti-list-tree"></i> Strategieën</h2>'
      +   (strats.length === 0
          ? '<div class="sa-empty">Nog geen strategieën.</div>'
          : strats.map((s) => '<div class="sa-row-item"><b style="flex:1">' + esc(s.name || '') + '</b>'
              + '<button class="sa-btn sa-btn-ghost" data-open-s="' + esc(s.id) + '">Open</button>'
              + '<button class="sa-btn sa-btn-danger" data-del-s="' + esc(s.id) + '"><i class="ti ti-trash"></i></button></div>').join(''))
      +   '<div style="margin-top:14px"><h2><i class="ti ti-plus"></i> Nieuwe strategie</h2>'
      +   '<input class="sa-input" id="stName" placeholder="Naam"/>'
      +   '<div style="margin-top:10px"><button class="sa-btn" id="stCreate"><i class="ti ti-plus"></i>Aanmaken</button></div></div>'
      + '</div>'
      + '<div class="sa-card"><h2>Detail</h2>' + (st ? strategyEditorHtml(st) : '<div class="sa-empty">Kies een strategie.</div>') + '</div>'
      + '</div>';
    p.querySelectorAll('[data-open-s]').forEach((b) => b.addEventListener('click', async () => {
      state.activeStrategyId = b.dataset.openS;
      await loadStrategy(state.activeStrategyId); renderPane();
    }));
    p.querySelectorAll('[data-del-s]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Strategie verwijderen?')) return;
      try {
        await api('/api/secret-area-strategy?id=' + encodeURIComponent(b.dataset.delS), { method: 'DELETE' });
        state.activeStrategy = null; state.activeStrategyId = null;
        await loadWorkspace(); renderPane(); toast('Verwijderd', 'success');
      } catch (e) { toast('Verwijderen mislukt: ' + e.message, 'error'); }
    }));
    const cr = document.getElementById('stCreate');
    if (cr) cr.addEventListener('click', async () => {
      const name = document.getElementById('stName').value.trim();
      if (!name) return toast('Naam vereist', 'error');
      try {
        const d = await api('/api/secret-area-strategy', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({ name }),
        });
        await loadWorkspace();
        state.activeStrategyId = d.strategy?.id || null;
        if (state.activeStrategyId) await loadStrategy(state.activeStrategyId);
        renderPane();
      } catch (e) { toast('Aanmaken mislukt: ' + e.message, 'error'); }
    });
    wireStrategyEditor();
  }
  function strategyEditorHtml(s) {
    const steps = (s.steps || []).map((sp, i) =>
      '<div class="sa-row-item"><span class="mono" style="color:var(--sa-tx-dim)">#' + (i+1) + '</span>'
      + '<input class="sa-input" data-step-desc="' + i + '" value="' + esc(sp.description || '') + '"/>'
      + '<button class="sa-btn sa-btn-danger" data-step-del="' + i + '"><i class="ti ti-x"></i></button></div>'
    ).join('');
    const cl = (s.checklist || []).map((c, i) =>
      '<div class="sa-row-item"><span class="mono" style="color:var(--sa-tx-dim)">#' + (i+1) + '</span>'
      + '<input class="sa-input" data-cl-lbl="' + i + '" value="' + esc(c.label || '') + '"/>'
      + '<button class="sa-btn sa-btn-danger" data-cl-del="' + i + '"><i class="ti ti-x"></i></button></div>'
    ).join('');
    return '<input class="sa-input" id="stEditName" value="' + esc(s.name || '') + '" placeholder="Naam"/>'
      + '<textarea class="sa-textarea" id="stEntry" placeholder="Entry-signaal" style="margin-top:6px">' + esc(s.entry_signal || '') + '</textarea>'
      + '<textarea class="sa-textarea" id="stSL" placeholder="Stop-loss regel" style="margin-top:6px">' + esc(s.sl_signal || '') + '</textarea>'
      + '<textarea class="sa-textarea" id="stTP" placeholder="Take-profit regel" style="margin-top:6px">' + esc(s.tp_signal || '') + '</textarea>'
      + '<div class="sa-grid sa-grid-2" style="margin-top:6px">'
      +   '<input class="sa-input" id="stRisk" type="number" step="0.01" placeholder="Risk %" value="' + (s.risk_pct ?? '') + '"/>'
      +   '<input class="sa-input" id="stSessions" placeholder="Sessies (comma-sep, bv. London, NY)" value="' + esc((s.sessions || []).join(', ')) + '"/>'
      + '</div>'
      + '<div style="margin-top:14px"><h2>Steps (Opbouw)</h2>' + (steps || '<div class="sa-empty">Nog geen stappen.</div>')
      + '<button class="sa-btn sa-btn-ghost" id="stStepAdd" style="margin-top:6px"><i class="ti ti-plus"></i>Stap toevoegen</button></div>'
      + '<div style="margin-top:14px"><h2>Checklist</h2>' + (cl || '<div class="sa-empty">Nog geen items.</div>')
      + '<button class="sa-btn sa-btn-ghost" id="stClAdd" style="margin-top:6px"><i class="ti ti-plus"></i>Item toevoegen</button></div>'
      + '<div style="margin-top:16px"><button class="sa-btn" id="stSave"><i class="ti ti-device-floppy"></i>Opslaan</button></div>';
  }
  function wireStrategyEditor() {
    if (!state.activeStrategy) return;
    const s = state.activeStrategy;
    document.getElementById('stStepAdd')?.addEventListener('click', () => {
      s.steps = s.steps || []; s.steps.push({ description: '' }); renderPane();
    });
    document.getElementById('stClAdd')?.addEventListener('click', () => {
      s.checklist = s.checklist || []; s.checklist.push({ label: '' }); renderPane();
    });
    document.querySelectorAll('[data-step-del]').forEach((b) => b.addEventListener('click', () => {
      const i = Number(b.dataset.stepDel); s.steps.splice(i, 1); renderPane();
    }));
    document.querySelectorAll('[data-cl-del]').forEach((b) => b.addEventListener('click', () => {
      const i = Number(b.dataset.clDel); s.checklist.splice(i, 1); renderPane();
    }));
    document.getElementById('stSave')?.addEventListener('click', async () => {
      const steps = Array.from(document.querySelectorAll('[data-step-desc]')).map((e, i) => ({
        position: i + 1, description: e.value.trim(),
      }));
      const checklist = Array.from(document.querySelectorAll('[data-cl-lbl]')).map((e, i) => ({
        position: i + 1, label: e.value.trim(),
      }));
      const sessions = document.getElementById('stSessions').value.split(',').map((x) => x.trim()).filter(Boolean);
      try {
        await api('/api/secret-area-strategy?id=' + encodeURIComponent(s.id), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify({
            name:         document.getElementById('stEditName').value.trim(),
            entry_signal: document.getElementById('stEntry').value.trim(),
            sl_signal:    document.getElementById('stSL').value.trim(),
            tp_signal:    document.getElementById('stTP').value.trim(),
            risk_pct:     Number(document.getElementById('stRisk').value) || null,
            sessions,
            steps, checklist,
          }),
        });
        toast('Opgeslagen', 'success');
        await loadWorkspace(); await loadStrategy(s.id); renderPane();
      } catch (e) { toast('Opslaan mislukt: ' + e.message, 'error'); }
    });
  }

  // Checklist tab — leef-tabel voor grade.
  function renderChecklist(p) {
    const s = state.activeStrategy;
    if (!s) {
      p.innerHTML = '<div class="sa-card sa-empty">Kies eerst een strategie in "Strategie".</div>';
      return;
    }
    const grade = computeGrade();
    p.innerHTML =
      '<div class="cockpit" style="margin-bottom:14px"><div class="lbl">Live grade</div>'
      + '<div class="disp" style="font-size:34px;margin-top:6px">' + (grade ? '<span class="sa-grade ' + grade + '">' + grade + '</span>' : '—') + '</div></div>'
      + '<div class="sa-card"><h2><i class="ti ti-checks"></i> ' + esc(s.name || '') + ' — Checklist</h2>'
      + ((s.checklist || []).length === 0
        ? '<div class="sa-empty">Geen checklist-items — voeg toe in "Strategie".</div>'
        : (s.checklist || []).map((c) => {
            const on = state.checkedItems.has(c.id);
            return '<label class="sa-row-item" style="cursor:pointer">'
              + '<input type="checkbox" data-cl="' + esc(c.id) + '"' + (on ? ' checked' : '') + '/>'
              + '<span style="flex:1">' + esc(c.label || '') + '</span></label>';
          }).join(''))
      + '</div>';
    p.querySelectorAll('[data-cl]').forEach((b) => b.addEventListener('change', (e) => {
      const id = e.target.getAttribute('data-cl');
      if (e.target.checked) state.checkedItems.add(id); else state.checkedItems.delete(id);
      renderPane();
    }));
  }

  // ── Setup-eisen (Stap 5) ─────────────────────────────────────────────
  // Definitie-laag: per strategie N modellen (Confirmation/Continuation/…),
  // elk met eisen (vereist | confluentie) + min_confluence. Wiring naar
  // chart-analyse/review komt in een aparte PR.
  //
  // Input-persist patroon: alle inputs zijn state-gebonden; keystrokes
  // updaten state.setup.drafts en pushen naar de server via een
  // "Opslaan"-knop of blur. GEEN renderPane op keystroke.
  state.setup = {
    strategyId: null,      // gekozen strategie
    models: [],            // [{ id, name, min_confluence, position, active, requirements: [] }]
    loaded: false,
    loading: false,
    drafts: {              // per-veld staged waarde vóór save
      newModelName: '',
      newModelMinConfluence: 0,
      newReq: {},          // { [model_id]: { label, kind:'vereist'|'confluentie', weight, tool_id } }
    },
    err: '',
  };
  const KIND_VEREIST     = 'vereist';
  const KIND_CONFLUENTIE = 'confluentie';

  function _saSetupError(msg) {
    state.setup.err = msg || '';
    const el = document.getElementById('setupErr');
    if (el) el.textContent = state.setup.err;
  }
  function _saSetupSyncInputs() {
    // Sync alle open input-velden voor state-persistence vóór een re-render.
    const nm = document.getElementById('setupNewModelName');
    if (nm) state.setup.drafts.newModelName = String(nm.value || '');
    const mc = document.getElementById('setupNewModelMinConfl');
    if (mc) state.setup.drafts.newModelMinConfluence = Number(mc.value) || 0;
    document.querySelectorAll('[data-setup-nr-label]').forEach((el) => {
      const modelId = el.getAttribute('data-setup-nr-label');
      const d = state.setup.drafts.newReq[modelId] || {};
      d.label = String(el.value || '');
      state.setup.drafts.newReq[modelId] = d;
    });
    document.querySelectorAll('[data-setup-nr-weight]').forEach((el) => {
      const modelId = el.getAttribute('data-setup-nr-weight');
      const d = state.setup.drafts.newReq[modelId] || {};
      d.weight = Number(el.value) || 0;
      state.setup.drafts.newReq[modelId] = d;
    });
  }

  async function loadSetupForStrategy(strategyId) {
    state.setup.strategyId = strategyId || null;
    state.setup.loaded = false;
    state.setup.loading = true;
    _saSetupError('');
    if (!strategyId) { state.setup.models = []; state.setup.loading = false; renderPane(); return; }
    try {
      const d = await api('/api/secret-area-setup?strategy_id=' + encodeURIComponent(strategyId));
      state.setup.models = Array.isArray(d?.models) ? d.models : [];
      state.setup.loaded = true;
    } catch (e) {
      state.setup.models = [];
      _saSetupError('Laden mislukt: ' + e.message);
    } finally {
      state.setup.loading = false;
      renderPane();
    }
  }

  async function addSetupModel() {
    _saSetupSyncInputs();
    const name = String(state.setup.drafts.newModelName || '').trim();
    const minC = Math.max(0, Number(state.setup.drafts.newModelMinConfluence) || 0);
    if (!name)                     { _saSetupError('Modelnaam vereist.'); return; }
    if (!state.setup.strategyId)   { _saSetupError('Kies eerst een strategie.'); return; }
    try {
      await api('/api/secret-area-setup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ entity: 'model', strategy_id: state.setup.strategyId, name, min_confluence: minC }),
      });
      state.setup.drafts.newModelName = '';
      state.setup.drafts.newModelMinConfluence = 0;
      await loadSetupForStrategy(state.setup.strategyId);
      toast('Model toegevoegd', 'success');
    } catch (e) { _saSetupError('Aanmaken mislukt: ' + e.message); }
  }

  async function updateSetupModel(modelId, patch) {
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(modelId), {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ entity: 'model', ...patch }),
      });
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Wijzigen mislukt: ' + e.message); }
  }

  async function deleteSetupModel(modelId) {
    if (!confirm('Model + alle bijbehorende eisen verwijderen?')) return;
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(modelId) + '&entity=model', { method: 'DELETE' });
      await loadSetupForStrategy(state.setup.strategyId);
      toast('Model verwijderd', 'success');
    } catch (e) { _saSetupError('Verwijderen mislukt: ' + e.message); }
  }

  async function addSetupRequirement(modelId) {
    _saSetupSyncInputs();
    const draft = state.setup.drafts.newReq[modelId] || {};
    const label = String(draft.label || '').trim();
    const kind  = draft.kind || KIND_VEREIST;
    const weight = Number(draft.weight) || 1;
    const toolId = draft.tool_id || null;
    if (!label) { _saSetupError('Label van de eis vereist.'); return; }
    try {
      await api('/api/secret-area-setup', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          entity:  'requirement',
          model_id: modelId,
          label, kind, weight, tool_id: toolId,
        }),
      });
      state.setup.drafts.newReq[modelId] = { label: '', kind, weight: 1, tool_id: null };
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Eis toevoegen mislukt: ' + e.message); }
  }

  async function updateSetupRequirement(reqId, patch) {
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(reqId), {
        method:  'PUT',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ entity: 'requirement', ...patch }),
      });
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Wijzigen mislukt: ' + e.message); }
  }

  async function deleteSetupRequirement(reqId) {
    if (!confirm('Eis verwijderen?')) return;
    try {
      await api('/api/secret-area-setup?id=' + encodeURIComponent(reqId) + '&entity=requirement', { method: 'DELETE' });
      await loadSetupForStrategy(state.setup.strategyId);
    } catch (e) { _saSetupError('Verwijderen mislukt: ' + e.message); }
  }

  function renderSetup(p) {
    const strats = state.workspace.strategies || [];
    const tools  = state.workspace.tools || [];

    // Auto-selecteer eerste strategie bij eerste bezoek.
    if (!state.setup.strategyId && strats.length) {
      state.setup.strategyId = strats[0].id;
      loadSetupForStrategy(state.setup.strategyId);
    }

    if (!strats.length) {
      p.innerHTML = '<div class="sa-card sa-empty">Maak eerst een strategie in "Strategie" — daarna kun je hier de setup-modellen definiëren.</div>';
      return;
    }

    const stratPicker =
      '<div class="sa-card" style="margin-bottom:12px">'
      + '<h2><i class="ti ti-list-tree"></i> Strategie</h2>'
      + '<select class="sa-select" id="setupStrategy">'
      + strats.map((s) => '<option value="' + esc(s.id) + '"' + (state.setup.strategyId === s.id ? ' selected' : '') + '>' + esc(s.name || '(zonder naam)') + '</option>').join('')
      + '</select>'
      + '</div>';

    // Nieuw model — form.
    const newModelForm =
      '<div class="sa-card" style="margin-bottom:12px">'
      + '<h2><i class="ti ti-plus"></i> Nieuw model</h2>'
      + '<div class="sa-grid sa-grid-2">'
      +   '<input class="sa-input" id="setupNewModelName" placeholder="Bv. FMES Confirmation" value="' + esc(state.setup.drafts.newModelName || '') + '" autocomplete="off"/>'
      +   '<input class="sa-input" id="setupNewModelMinConfl" type="number" min="0" step="1" placeholder="Min. confluentiepunten" value="' + esc(String(state.setup.drafts.newModelMinConfluence || 0)) + '"/>'
      + '</div>'
      + '<div style="margin-top:10px"><button class="sa-btn" id="setupAddModelBtn"><i class="ti ti-plus"></i>Model aanmaken</button></div>'
      + '</div>';

    // Bestaande modellen.
    let modelsHtml = '';
    if (state.setup.loading && !state.setup.loaded) {
      modelsHtml = '<div class="sa-card sa-loading"><i class="ti ti-loader"></i> Laden…</div>';
    } else if (!state.setup.models.length) {
      modelsHtml = '<div class="sa-card sa-empty">Nog geen setup-modellen voor deze strategie.</div>';
    } else {
      modelsHtml = state.setup.models.map((m) => {
        const req = (m.requirements || []).filter((r) => r.kind === KIND_VEREIST);
        const conf = (m.requirements || []).filter((r) => r.kind === KIND_CONFLUENTIE);
        const totalConfWeight = conf.reduce((s, r) => s + (Number(r.weight) || 0), 0);
        const nr = state.setup.drafts.newReq[m.id] || {};
        const nrLabel  = String(nr.label || '');
        const nrKind   = nr.kind || KIND_VEREIST;
        const nrWeight = Number.isFinite(nr.weight) ? nr.weight : 1;
        const nrTool   = nr.tool_id || '';
        const summary  =
          '<div style="font-size:12px;color:var(--text-dim);margin-top:6px">'
          + 'Geldig = alle <b>' + req.length + '</b> vereiste eisen aanwezig + minstens <b>' + esc(String(m.min_confluence || 0)) + '</b> confluentiepunten '
          + '<span style="color:var(--text-faint)">(beschikbaar: ' + totalConfWeight + ')</span>.'
          + '</div>';
        const reqRow = (r) =>
          '<div class="sa-row-item" data-req-id="' + esc(r.id) + '">'
          + '<input class="sa-input" style="flex:1" value="' + esc(r.label) + '" data-req-label="' + esc(r.id) + '"/>'
          + '<select class="sa-select" style="width:130px" data-req-kind="' + esc(r.id) + '">'
          +   '<option value="vereist"' + (r.kind === 'vereist' ? ' selected' : '') + '>Vereist</option>'
          +   '<option value="confluentie"' + (r.kind === 'confluentie' ? ' selected' : '') + '>Confluentie</option>'
          + '</select>'
          + '<input class="sa-input" style="width:70px" type="number" min="0" step="1" value="' + (r.weight ?? 1) + '" data-req-weight="' + esc(r.id) + '"/>'
          + '<select class="sa-select" style="width:150px" data-req-tool="' + esc(r.id) + '">'
          +   '<option value="">— geen tool —</option>'
          +   tools.map((t) => '<option value="' + esc(t.id) + '"' + (r.tool_id === t.id ? ' selected' : '') + '>' + esc(t.name) + '</option>').join('')
          + '</select>'
          + '<button class="sa-btn sa-btn-danger" data-req-del="' + esc(r.id) + '" title="Verwijder"><i class="ti ti-x"></i></button>'
          + '</div>';
        return ''
          + '<div class="sa-card" style="margin-bottom:12px" data-model-id="' + esc(m.id) + '">'
          + '<div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">'
          +   '<input class="sa-input" style="flex:1;font-family:\'Space Grotesk\',system-ui,sans-serif;font-weight:600" value="' + esc(m.name) + '" data-model-name="' + esc(m.id) + '"/>'
          +   '<span class="lbl" style="white-space:nowrap">Min. confluentie</span>'
          +   '<input class="sa-input" style="width:80px" type="number" min="0" step="1" value="' + esc(String(m.min_confluence || 0)) + '" data-model-minconf="' + esc(m.id) + '"/>'
          +   '<button class="sa-btn sa-btn-danger" data-model-del="' + esc(m.id) + '" title="Model verwijderen"><i class="ti ti-trash"></i></button>'
          + '</div>'
          + summary
          + '<div style="margin-top:12px"><div class="lbl">Vereist</div>'
          +   (req.length ? req.map(reqRow).join('') : '<div class="sa-empty">Geen vereist-eisen.</div>')
          + '</div>'
          + '<div style="margin-top:12px"><div class="lbl">Confluentie</div>'
          +   (conf.length ? conf.map(reqRow).join('') : '<div class="sa-empty">Geen confluentie-eisen.</div>')
          + '</div>'
          + '<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">'
          +   '<div class="lbl" style="margin-bottom:6px">Nieuwe eis</div>'
          +   '<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">'
          +     '<input class="sa-input" style="flex:1;min-width:180px" placeholder="Label van de eis" value="' + esc(nrLabel) + '" data-setup-nr-label="' + esc(m.id) + '"/>'
          +     '<select class="sa-select" style="width:140px" data-setup-nr-kind="' + esc(m.id) + '">'
          +       '<option value="vereist"' + (nrKind === 'vereist' ? ' selected' : '') + '>Vereist</option>'
          +       '<option value="confluentie"' + (nrKind === 'confluentie' ? ' selected' : '') + '>Confluentie</option>'
          +     '</select>'
          +     '<input class="sa-input" style="width:80px" type="number" min="0" step="1" placeholder="weight" value="' + esc(String(nrWeight)) + '" data-setup-nr-weight="' + esc(m.id) + '"/>'
          +     '<select class="sa-select" style="width:180px" data-setup-nr-tool="' + esc(m.id) + '">'
          +       '<option value="">— geen tool —</option>'
          +       tools.map((t) => '<option value="' + esc(t.id) + '"' + (nrTool === t.id ? ' selected' : '') + '>' + esc(t.name) + '</option>').join('')
          +     '</select>'
          +     '<button class="sa-btn" data-setup-add-req="' + esc(m.id) + '"><i class="ti ti-plus"></i>Voeg toe</button>'
          +   '</div>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    p.innerHTML =
      stratPicker
      + '<div id="setupErr" class="sa-err" style="min-height:16px;margin:0 0 8px 0">' + esc(state.setup.err || '') + '</div>'
      + newModelForm
      + modelsHtml;

    // ── Wire input-persist (state-bound; GEEN renderPane op keystroke) ──
    document.getElementById('setupStrategy')?.addEventListener('change', (e) => {
      loadSetupForStrategy(e.target.value);
    });
    // Nieuw-model form.
    document.getElementById('setupNewModelName')?.addEventListener('input', (e) => {
      state.setup.drafts.newModelName = String(e.target.value || '');
    });
    document.getElementById('setupNewModelMinConfl')?.addEventListener('input', (e) => {
      state.setup.drafts.newModelMinConfluence = Number(e.target.value) || 0;
    });
    document.getElementById('setupAddModelBtn')?.addEventListener('click', () => addSetupModel());

    // Bestaande model-name + min_confl: state-bound, save op blur.
    p.querySelectorAll('[data-model-name]').forEach((el) => {
      el.addEventListener('blur', () => {
        const modelId = el.getAttribute('data-model-name');
        const val = String(el.value || '').trim();
        const m = state.setup.models.find((x) => x.id === modelId);
        if (m && val && val !== m.name) updateSetupModel(modelId, { name: val });
      });
    });
    p.querySelectorAll('[data-model-minconf]').forEach((el) => {
      el.addEventListener('blur', () => {
        const modelId = el.getAttribute('data-model-minconf');
        const val = Math.max(0, Number(el.value) || 0);
        const m = state.setup.models.find((x) => x.id === modelId);
        if (m && val !== Number(m.min_confluence || 0)) updateSetupModel(modelId, { min_confluence: val });
      });
    });
    p.querySelectorAll('[data-model-del]').forEach((btn) => {
      btn.addEventListener('click', () => deleteSetupModel(btn.getAttribute('data-model-del')));
    });

    // Requirement-rijen — save-op-blur voor label/weight/kind/tool.
    p.querySelectorAll('[data-req-label]').forEach((el) => {
      el.addEventListener('blur', () => {
        const rid = el.getAttribute('data-req-label');
        const val = String(el.value || '').trim();
        if (val) updateSetupRequirement(rid, { label: val });
      });
    });
    p.querySelectorAll('[data-req-kind]').forEach((el) => {
      el.addEventListener('change', () => updateSetupRequirement(el.getAttribute('data-req-kind'), { kind: el.value }));
    });
    p.querySelectorAll('[data-req-weight]').forEach((el) => {
      el.addEventListener('blur', () => updateSetupRequirement(el.getAttribute('data-req-weight'), { weight: Math.max(0, Number(el.value) || 0) }));
    });
    p.querySelectorAll('[data-req-tool]').forEach((el) => {
      el.addEventListener('change', () => updateSetupRequirement(el.getAttribute('data-req-tool'), { tool_id: el.value || null }));
    });
    p.querySelectorAll('[data-req-del]').forEach((btn) => {
      btn.addEventListener('click', () => deleteSetupRequirement(btn.getAttribute('data-req-del')));
    });

    // Nieuwe-eis form per model (state-bound).
    p.querySelectorAll('[data-setup-nr-label]').forEach((el) => {
      el.addEventListener('input', () => {
        const modelId = el.getAttribute('data-setup-nr-label');
        const d = state.setup.drafts.newReq[modelId] || {};
        d.label = String(el.value || '');
        state.setup.drafts.newReq[modelId] = d;
      });
    });
    p.querySelectorAll('[data-setup-nr-kind]').forEach((el) => {
      el.addEventListener('change', () => {
        const modelId = el.getAttribute('data-setup-nr-kind');
        const d = state.setup.drafts.newReq[modelId] || {};
        d.kind = el.value;
        state.setup.drafts.newReq[modelId] = d;
      });
    });
    p.querySelectorAll('[data-setup-nr-weight]').forEach((el) => {
      el.addEventListener('input', () => {
        const modelId = el.getAttribute('data-setup-nr-weight');
        const d = state.setup.drafts.newReq[modelId] || {};
        d.weight = Number(el.value) || 0;
        state.setup.drafts.newReq[modelId] = d;
      });
    });
    p.querySelectorAll('[data-setup-nr-tool]').forEach((el) => {
      el.addEventListener('change', () => {
        const modelId = el.getAttribute('data-setup-nr-tool');
        const d = state.setup.drafts.newReq[modelId] || {};
        d.tool_id = el.value || null;
        state.setup.drafts.newReq[modelId] = d;
      });
    });
    p.querySelectorAll('[data-setup-add-req]').forEach((btn) => {
      btn.addEventListener('click', () => addSetupRequirement(btn.getAttribute('data-setup-add-req')));
    });
  }

  // ── Marktcondities (Stap 3) ──────────────────────────────────────────
  function _cprefix(c) {
    if (c === 'filter')       return 'NOOIT als';
    if (c === 'voorwaarde')   return 'ALLEEN als';
    if (c === 'uitzondering') return 'TENZIJ';
    return c;
  }
  function renderConditions(p) {
    const active = state.activeStrategy;
    const globals = state.conditions.filter((c) => c.scope === 'global');
    const perS    = active ? state.conditions.filter((c) => c.strategy_id === active.id) : [];

    const stratPicker = state.workspace.strategies.length > 0
      ? '<div style="margin-bottom:10px"><select class="sa-select" id="condStrat">'
        + '<option value="">— kies strategie —</option>'
        + state.workspace.strategies.map((s) => '<option value="' + esc(s.id) + '"' + (active && s.id === active.id ? ' selected' : '') + '>' + esc(s.name || '(zonder naam)') + '</option>').join('')
        + '</select></div>'
      : '<div class="sa-empty" style="margin-bottom:10px">Maak eerst een strategie in "Strategie".</div>';

    const renderList = (arr, showInherited) => arr.length === 0
      ? '<div class="sa-empty">Nog geen regels.</div>'
      : arr.map((c) =>
          '<div class="sa-row-item">'
          + '<span class="sa-grade ' + (c.ctype === 'filter' ? 'C' : (c.ctype === 'voorwaarde' ? 'A+' : 'B')) + '">'
          + _cprefix(c.ctype) + '</span>'
          + '<div style="flex:1"><span style="' + (c.active === false ? 'text-decoration:line-through;color:var(--sa-tx-dim)' : '') + '">' + esc(c.label) + '</span>'
          + (showInherited && c.scope === 'global' ? ' <span style="font-size:11px;color:var(--sa-azure)">· geërfd</span>' : '')
          + '</div>'
          + '<button class="sa-btn sa-btn-ghost" data-cond-toggle="' + esc(c.id) + '" data-cond-active="' + (c.active === false ? '0' : '1') + '">'
          + (c.active === false ? 'Aan' : 'Uit') + '</button>'
          + '<button class="sa-btn sa-btn-danger" data-cond-del="' + esc(c.id) + '"><i class="ti ti-x"></i></button>'
          + '</div>'
        ).join('');

    const addForm = (scope) =>
      '<div style="margin-top:12px;border-top:1px solid var(--sa-line);padding-top:12px">'
      +   '<div class="sa-grid sa-grid-2">'
      +     '<select class="sa-select" data-cond-scope="' + scope + '" data-cond-field="ctype">'
      +       '<option value="filter">NOOIT als (filter)</option>'
      +       '<option value="voorwaarde">ALLEEN als (voorwaarde)</option>'
      +       '<option value="uitzondering">TENZIJ (uitzondering)</option>'
      +     '</select>'
      +     '<input class="sa-input" data-cond-scope="' + scope + '" data-cond-field="label" placeholder="Regel (bv. NFP-dag; buiten London-sessie)"/>'
      +   '</div>'
      +   '<div style="margin-top:8px"><button class="sa-btn" data-cond-add="' + scope + '"><i class="ti ti-plus"></i>Regel toevoegen</button></div>'
      + '</div>';

    p.innerHTML =
      '<div class="sa-grid sa-grid-2">'
      +   '<div class="sa-card"><h2><i class="ti ti-alert-triangle"></i> Globaal — voor ALLE strategieën</h2>'
      +     renderList(globals, false)
      +     addForm('global')
      +   '</div>'
      +   '<div class="sa-card"><h2><i class="ti ti-target"></i> Deze strategie</h2>'
      +     stratPicker
      +     (active
                ? renderList([...globals, ...perS], true) + addForm('strategy')
                : '<div class="sa-empty">Kies (of maak) eerst een strategie hierboven.</div>')
      +   '</div>'
      + '</div>';

    document.getElementById('condStrat')?.addEventListener('change', async (e) => {
      const id = e.target.value;
      if (!id) { state.activeStrategy = null; state.activeStrategyId = null; renderPane(); return; }
      state.activeStrategyId = id;
      await loadStrategy(id);
      renderPane();
    });
    p.querySelectorAll('[data-cond-add]').forEach((b) => b.addEventListener('click', async () => {
      const scope = b.dataset.condAdd;
      if (scope === 'strategy' && !state.activeStrategyId) return toast('Kies eerst een strategie', 'error');
      const ctypeEl = p.querySelector('select[data-cond-scope="' + scope + '"][data-cond-field="ctype"]');
      const labelEl = p.querySelector('input[data-cond-scope="' + scope + '"][data-cond-field="label"]');
      const label = String(labelEl?.value || '').trim();
      if (!label) return toast('Label vereist', 'error');
      try {
        await api('/api/secret-area-condition', {
          method:  'POST', headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            scope,
            strategy_id: scope === 'strategy' ? state.activeStrategyId : null,
            ctype:       ctypeEl?.value || 'filter',
            label,
          }),
        });
        await loadConditions();
        renderPane();
        toast('Regel toegevoegd', 'success');
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
    p.querySelectorAll('[data-cond-toggle]').forEach((b) => b.addEventListener('click', async () => {
      const id = b.dataset.condToggle;
      const wasActive = b.dataset.condActive === '1';
      try {
        await api('/api/secret-area-condition?id=' + encodeURIComponent(id), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify({ active: !wasActive }),
        });
        await loadConditions(); renderPane();
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
    p.querySelectorAll('[data-cond-del]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Regel verwijderen?')) return;
      try {
        await api('/api/secret-area-condition?id=' + encodeURIComponent(b.dataset.condDel), { method: 'DELETE' });
        await loadConditions(); renderPane(); toast('Verwijderd', 'success');
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
  }

  // ── Systeem-review (Stap 5) ──────────────────────────────────────────
  function renderReview(p) {
    const s = state.activeStrategy;
    if (!s) {
      p.innerHTML = '<div class="sa-card sa-empty">Kies eerst een strategie in "Strategie".</div>';
      return;
    }
    const st = pipelineStatus();
    const checks = st.steps.filter((x) => x.key !== 'review');
    const completeness = checks.map((x) =>
      '<div class="sa-row-item">'
      + (x.status === 'done'
          ? '<i class="ti ti-circle-check" style="color:var(--sa-win)"></i>'
          : (x.status === 'partial'
              ? '<i class="ti ti-circle-dashed" style="color:var(--sa-amber)"></i>'
              : '<i class="ti ti-circle" style="color:var(--sa-tx-dim)"></i>'))
      + '<div style="flex:1"><b>' + esc(x.label) + '</b> <span style="color:var(--sa-tx-mid);font-size:12px">— ' + esc(x.detail) + '</span></div>'
      + '</div>'
    ).join('');

    p.innerHTML =
      '<div class="sa-card" style="margin-bottom:14px"><h2><i class="ti ti-list-check"></i> Compleetheid</h2>'
      + completeness
      + '</div>'
      + '<div class="sa-card"><h2><i class="ti ti-sparkles"></i> Setup-herkenning</h2>'
      +   '<div style="margin:4px 0 10px">Voor: <b>' + esc(s.name || '(zonder naam)') + '</b></div>'
      +   '<button class="sa-btn" id="rvRun"><i class="ti ti-brain"></i>Genereer setup-herkenning</button>'
      +   (s.recognition_spec
          ? '<div style="margin-top:12px"><div class="lbl">Huidige recognition_spec</div>'
            + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--sa-bg-2);padding:10px;border:1px solid var(--sa-line);border-radius:8px">' + esc(s.recognition_spec) + '</div></div>'
          : '')
      +   '<div id="rvResult" style="margin-top:10px" hidden></div>'
      + '</div>';

    document.getElementById('rvRun')?.addEventListener('click', () => runReview(false));
  }
  async function runReview(save) {
    if (!state.activeStrategyId) return;
    const btn = document.getElementById('rvRun');
    const box = document.getElementById('rvResult');
    if (!box) return;
    if (btn) btn.disabled = true;
    box.hidden = false;
    box.innerHTML = '<div class="sa-loading"><i class="ti ti-loader"></i> Claude analyseert…</div>';
    try {
      const d = await api('/api/secret-area-review', {
        method:  'POST', headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ strategy_id: state.activeStrategyId, save: !!save }),
      });
      box.innerHTML =
        '<div class="lbl">Voorstel (model: ' + esc(d?.model || '') + ')</div>'
        + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--sa-bg-2);padding:10px;border:1px solid var(--sa-line);border-radius:8px">' + esc(d?.spec || '') + '</div>'
        + '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +   '<button class="sa-btn" id="rvSave"' + (d?.saved ? ' disabled' : '') + '><i class="ti ti-device-floppy"></i>' + (d?.saved ? 'Opgeslagen' : 'Bewaar') + '</button>'
        +   '<button class="sa-btn sa-btn-ghost" id="rvRetry"><i class="ti ti-refresh"></i>Verfijn (opnieuw)</button>'
        + '</div>'
        + (d?.save_error ? '<div class="sa-err">Bewaren mislukt: ' + esc(d.save_error) + '</div>' : '');
      if (d?.saved) {
        toast('Setup-herkenning opgeslagen', 'success');
        await loadStrategy(state.activeStrategyId);
      }
      document.getElementById('rvSave')?.addEventListener('click', () => runReview(true));
      document.getElementById('rvRetry')?.addEventListener('click', () => runReview(false));
    } catch (e) {
      box.innerHTML = '<div class="sa-err">AI-fout: ' + esc(e.message) + '</div>'
        + '<div style="margin-top:8px"><button class="sa-btn sa-btn-ghost" id="rvRetry2"><i class="ti ti-refresh"></i>Opnieuw</button></div>';
      document.getElementById('rvRetry2')?.addEventListener('click', () => runReview(false));
    } finally { if (btn) btn.disabled = false; }
  }

  // ── Chart-analyse (multi-timeframe) ─────────────────────────────────
  // FMES-analyse werkt met twee timeframes: 4H (context/bias) én 15M
  // (uitvoering). De gebruiker levert per TF een bron aan (link of upload),
  // minstens één van beide. De AI beoordeelt beide beelden in samenhang.
  //
  // Input-persist patroon (blijft geldig, nu per TF):
  //  - state.analyse.h4/m15 = { mode:'link'|'upload', tvUrl:'' }
  //  - Elke tvUrl-keystroke schrijft naar state, GEEN renderPane.
  //  - Idem state.analyse.notes[detId] voor per-detectie textareas.
  //  - loadAnalyseLog() rendert alleen het log-blok opnieuw (renderAnalyseLog),
  //    niet de hele pane — zo overleeft actieve tekst-input een async-fetch.
  //  - Mode-switch (link ↔ upload) per TF syncet de huidige tvUrl VOOR renderPane
  //    zodat de waarde behouden blijft over de wissel heen.
  //
  // File-inputs (<input type=file>) kunnen niet programmatisch een value
  // krijgen — bij mode-switch binnen dezelfde TF gaat de file-selectie weg.
  // Dat is een bewuste trade-off; user kan gewoon opnieuw kiezen.
  state.analyse = {
    busy: false, current: null, log: null,
    h4:  { mode: 'link', tvUrl: '' },
    m15: { mode: 'link', tvUrl: '' },
    notes: {},
  };

  const TV_URL_CLIENT_RE = /^https:\/\/(www\.)?tradingview\.com\/x\/[A-Za-z0-9]+\/?$/;

  // Sync huidige DOM-inputs naar state — voor mode-switch of andere re-renders
  // zodat de invoer NIET verloren gaat als de node wordt vervangen.
  function _saSyncAnalyseInputs() {
    const h4El  = document.getElementById('anTvUrlH4');
    const m15El = document.getElementById('anTvUrlM15');
    if (h4El)  state.analyse.h4.tvUrl  = String(h4El.value  || '');
    if (m15El) state.analyse.m15.tvUrl = String(m15El.value || '');
    document.querySelectorAll('textarea[data-det-note]').forEach((el) => {
      const id = el.getAttribute('data-det-note');
      if (id) state.analyse.notes[id] = String(el.value || '');
    });
  }

  async function loadAnalyseLog() {
    try {
      const d = await api('/api/secret-area-analyze');
      state.analyse.log = { analyses: d.analyses || [], detections: d.detections || [] };
    } catch (e) {
      console.warn('[sa-analyse] loadLog:', e.message);
      state.analyse.log = { analyses: [], detections: [] };
    }
  }

  // Partial re-render: alleen het logboek-blok. Wordt aangeroepen na een
  // async loadAnalyseLog() zodat een actieve tvUrl-input of note-textarea
  // NIET vervangen wordt (en dus behouden blijft tijdens typen).
  function renderAnalyseLog() {
    const box = document.getElementById('anLogBox');
    if (!box) return;
    const log = state.analyse.log || { analyses: [], detections: [] };
    const rows = (log.analyses || []).slice(0, 8).map((a) => {
      const verdict = a.setup_verdict || {};
      const dets = (log.detections || []).filter((d) => d.analysis_id === a.id);
      const gradeClass = ['A+','B','C'].includes(a.grade) ? a.grade : '';
      return '<div class="sa-row-item">'
        + '<span style="color:var(--sa-tx-dim);font-size:12px;min-width:110px">' + esc((a.created_at || '').slice(0,16).replace('T',' ')) + '</span>'
        + '<div style="flex:1">'
        +   '<div><b>' + esc(verdict.model || 'setup n.v.t.') + '</b> '
        +     (gradeClass ? '<span class="sa-grade ' + gradeClass + '" style="margin-left:6px">' + gradeClass + '</span>' : '')
        +     ' <span style="font-size:11.5px;color:var(--sa-tx-dim);margin-left:6px">' + esc(a.source || '') + '</span>'
        +   '</div>'
        +   (a.ai_summary ? '<div style="font-size:12px;color:var(--sa-tx-mid);margin-top:2px">' + esc(a.ai_summary).slice(0, 220) + '</div>' : '')
        +   '<div style="font-size:11px;color:var(--sa-tx-dim);margin-top:2px">' + dets.length + ' detectie(s) · '
        +     dets.filter((d) => d.status === 'confirmed').length + ' bevestigd</div>'
        + '</div>'
        + (a.source_url ? '<a href="' + esc(a.source_url) + '" target="_blank" rel="noopener" style="color:var(--sa-azure);font-size:12px">bron ↗</a>' : '')
        + '</div>';
    }).join('') || '<div class="sa-empty">Nog geen analyses.</div>';
    box.innerHTML = rows;
  }
  function _confPill(c) {
    if (c === 'hoog')   return '<span class="sa-st done">hoog</span>';
    if (c === 'midden') return '<span class="sa-st part">midden</span>';
    return '<span class="sa-st todo">laag</span>';
  }
  function _statusPill(s) {
    if (s === 'confirmed') return '<span class="sa-st done">bevestigd</span>';
    if (s === 'rejected')  return '<span class="sa-st todo">afgewezen</span>';
    return '<span class="sa-st part">nog beoordelen</span>';
  }
  // Timeframe-label per detectie (4H / 15M / beide). null → geen pill.
  function _tfPill(tf) {
    if (tf === '4H')  return '<span class="sa-st part" style="background:rgba(47,134,240,.16);color:var(--sa-azure)">4H</span>';
    if (tf === '15M') return '<span class="sa-st part" style="background:rgba(37,199,155,.16);color:var(--sa-win)">15M</span>';
    return '';
  }
  // Bouw één TF-invoerblok (mode-picker + input) met state-persist. tf = 'h4'|'m15'.
  function _tfInputBlock(tf, label, hint) {
    const st   = state.analyse[tf];
    const mode = st.mode;
    const linkInputId = tf === 'h4' ? 'anTvUrlH4' : 'anTvUrlM15';
    const fileInputId = tf === 'h4' ? 'anFileH4'  : 'anFileM15';
    return '<div class="sa-card" style="margin-bottom:10px;background:linear-gradient(180deg,var(--sa-panel-2),var(--sa-bg-2))">'
      +   '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">'
      +     '<span class="sa-grade ' + (tf === 'h4' ? 'B' : 'A+') + '" style="min-width:36px">' + esc(label) + '</span>'
      +     '<div style="font-size:12.5px;color:var(--sa-tx-mid)">' + esc(hint) + '</div>'
      +   '</div>'
      +   '<div class="sa-tabs" style="margin:0 0 8px">'
      +     '<button class="sa-tab' + (mode === 'link' ? ' active' : '') + '" data-tf-mode="' + tf + ':link"><i class="ti ti-link"></i>TradingView-link</button>'
      +     '<button class="sa-tab' + (mode === 'upload' ? ' active' : '') + '" data-tf-mode="' + tf + ':upload"><i class="ti ti-upload"></i>Screenshot uploaden</button>'
      +   '</div>'
      +   (mode === 'link'
          ? '<input class="sa-input" id="' + linkInputId + '" placeholder="https://www.tradingview.com/x/…" value="' + esc(st.tvUrl || '') + '" autocomplete="off"/>'
          : '<input type="file" id="' + fileInputId + '" accept="image/png,image/jpeg,image/webp"/>')
      + '</div>';
  }

  function renderAnalyse(p) {
    // Lazy-load logboek — partial re-render (renderAnalyseLog), NIET de hele pane.
    // Zo overleeft een actieve tvUrl-input een async fetch die 200-500ms duurt.
    if (state.analyse.log === null) {
      loadAnalyseLog().then(() => { if (state.tab === 'analyse') renderAnalyseLog(); });
    }

    const tfBlocks =

    // Resultaat (indien current) — dual beeld-preview + setup-kaart + detecties.
    let result = '';
    const cur = state.analyse.current;
    if (cur) {

      // Per TF: eerst client-side data-url (bij upload), anders source_url (bij link).
      const h4Src  = cur._h4DataUrl  || a.source_url_h4  || null;
      const m15Src = cur._m15DataUrl || a.source_url_m15 || null;
      const grade = verdict.grade || a.grade || 'n.v.t.';
      const gradeClass = ['A+','B','C'].includes(grade) ? grade : '';
      const missing = Array.isArray(verdict.missing) ? verdict.missing : [];

      const previewBlock = (src, label, badgeGrade) => src
        ? '<div style="flex:1;min-width:220px">'
          +   '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
          +     '<span class="sa-grade ' + badgeGrade + '" style="min-width:36px">' + esc(label) + '</span>'
          +     '<span style="font-size:11.5px;color:var(--sa-tx-dim)">' + (label === '4H' ? 'context / bias' : 'uitvoering') + '</span>'
          +   '</div>'
          +   '<img src="' + esc(src) + '" alt="' + esc(label) + ' chart" style="width:100%;max-height:320px;object-fit:contain;border-radius:10px;border:1px solid var(--sa-line);background:var(--sa-bg-2)"/>'
          + '</div>'
        : '';

      result =
        '<div class="sa-card" style="margin-top:14px"><h2><i class="ti ti-photo"></i> Analyse</h2>'
        + (h4Src || m15Src
            ? '<div style="display:flex;gap:12px;flex-wrap:wrap">' + previewBlock(h4Src, '4H', 'B') + previewBlock(m15Src, '15M', 'A+') + '</div>'
            : '<div class="sa-empty">Geen preview beschikbaar.</div>')
        + '</div>'

        + (function buildSetupCard() {
            // Dual-oordeel: server-side REGEL-grade (rule_*) vs AI-oordeel (ai_*).
            // Beide worden altijd getoond; met een subtiele markering als ze verschillen.
            // Legacy readers (verdict.grade / valid) blijven werken als fallback.
            const ruleGrade  = verdict.rule_grade || verdict.grade || 'n.v.t.';
            const aiGrade    = verdict.ai_grade   || verdict.grade || 'n.v.t.';
            const ruleClass  = ['A+','B','C'].includes(ruleGrade) ? ruleGrade : '';
            const aiClass    = ['A+','B','C'].includes(aiGrade)   ? aiGrade   : '';
            const ruleValid  = verdict.rule_valid !== undefined ? !!verdict.rule_valid : !!verdict.valid;
            const aiValid    = verdict.ai_valid   !== undefined ? !!verdict.ai_valid   : !!verdict.valid;
            const chosen     = verdict.chosen_model || verdict.model || 'n.v.t.';
            const confScore  = verdict.rule_conf_score != null ? verdict.rule_conf_score : null;
            const minConf    = verdict.min_confluence  != null ? verdict.min_confluence  : null;
            const reqList    = Array.isArray(verdict.requirements) ? verdict.requirements : [];
            const reqOnly    = reqList.filter((r) => r.kind === 'vereist');
            const confOnly   = reqList.filter((r) => r.kind === 'confluentie');
            const reqOkCount = reqOnly.filter((r) => r.met === true).length;

            const mismatchHint = (ruleGrade !== aiGrade || ruleValid !== aiValid)
              ? ' <span class="sa-st part" style="margin-left:6px" title="Regel en AI komen niet overeen — kijk goed naar de per-eis lijst">verschil</span>'
