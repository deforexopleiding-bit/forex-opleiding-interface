<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Area · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1280px; }
    .app { --brand-primary: #093d54; --brand-azure: #1e6cd6; --brand-deep: #0a2f63; }
    .page-header { margin-bottom: 18px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-header p  { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
    .sa-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; box-shadow: 0 6px 22px rgba(0,0,0,0.06); max-width: 420px; }
    .sa-card h2 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .sa-card p  { font-size: 13px; color: var(--text-dim); margin-bottom: 14px; line-height: 1.5; }
    .sa-input { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); font: inherit; font-size: 14px; letter-spacing: 0.04em; }
    .sa-input:focus { outline: none; border-color: var(--brand-azure, #1e6cd6); box-shadow: 0 0 0 3px rgba(30,108,214,0.18); }
    .sa-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    .sa-btn { appearance: none; border: none; background: var(--brand-deep, #0a2f63); color: #fff; font: inherit; font-size: 13.5px; font-weight: 700; padding: 9px 18px; border-radius: 9px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .sa-btn:disabled { opacity: 0.55; cursor: not-allowed; }
    .sa-btn:hover:not(:disabled) { background: var(--brand-azure, #1e6cd6); }
    .sa-err { color: #b91c1c; font-size: 12.5px; margin-top: 8px; min-height: 16px; }
    .sa-vault { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; max-width: 720px; }
    .sa-vault h2 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    .sa-vault p  { font-size: 13px; color: var(--text-dim); line-height: 1.55; }
    .sa-loading { color: var(--text-faint); font-size: 13px; padding: 14px 0; }
    .sa-denied  { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; max-width: 480px; color: var(--text-dim); font-size: 13.5px; }
    .sa-denied strong { color: var(--text); font-size: 14px; display: block; margin-bottom: 4px; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-header">
    <h1>Secret Area</h1>
    <p>Persoonlijke werkplek. Toegang verloopt via PIN-slot.</p>
  </div>

  <div id="saRoot">
    <div class="sa-loading"><i class="ti ti-loader"></i> Controleren…</div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = document.getElementById('saRoot');

  function _esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }

  function showDenied(msg) {
    ROOT.innerHTML =
      '<div class="sa-denied">' +
        '<strong>Geen toegang</strong>' +
        _esc(msg || 'Je hebt geen toegang tot deze pagina. Je wordt teruggestuurd naar het dashboard…') +
      '</div>';
    setTimeout(function () { window.location.href = '/index.html'; }, 1400);
  }

  function showVault() {
    ROOT.innerHTML =
      '<div class="sa-vault">' +
        '<h2>Welkom in de Secret Area</h2>' +
        '<p>Trading-werkplek. Inhoud volgt — dit is de placeholder na een geslaagde PIN-unlock. ' +
        'De ontgrendel-status leeft alleen in dit tabblad; na een page-reload moet je de PIN opnieuw invoeren.</p>' +
      '</div>';
  }

  function showPinForm() {
    ROOT.innerHTML =
      '<div class="sa-card">' +
        '<h2>Voer je PIN in</h2>' +
        '<p>Toegang tot deze pagina is met een PIN beveiligd. PIN wordt nergens opgeslagen of doorgegeven aan derden.</p>' +
        '<input id="saPin" type="password" inputmode="numeric" autocomplete="off" class="sa-input" placeholder="PIN" aria-label="PIN" />' +
        '<div class="sa-row">' +
          '<button id="saUnlock" type="button" class="sa-btn"><i class="ti ti-lock-open"></i> Ontgrendelen</button>' +
        '</div>' +
        '<div id="saErr" class="sa-err" role="alert" aria-live="polite"></div>' +
      '</div>';

    const pinEl  = document.getElementById('saPin');
    const btn    = document.getElementById('saUnlock');
    const errEl  = document.getElementById('saErr');

    async function submitPin() {
      if (!pinEl || !btn) return;
      const pin = String(pinEl.value || '').trim();
      if (!pin) { errEl.textContent = 'PIN is leeg.'; return; }
      btn.disabled = true;
      errEl.textContent = '';
      try {
        const apiFetch = window.AgentShared && window.AgentShared.apiFetch;
        if (typeof apiFetch !== 'function') throw new Error('apiFetch ontbreekt');
        const r = await apiFetch('/api/secret-area', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ pin: pin }),
        });
        let d = null; try { d = await r.json(); } catch (_) {}
        if (r.ok && d && d.ok === true) {
          // Status alleen in geheugen — geen sessionStorage / localStorage.
          showVault();
          return;
        }
        if (r.status === 403) { showDenied('Geen toegang tot deze pagina.'); return; }
        errEl.textContent = 'Onjuiste PIN.';
      } catch (e) {
        errEl.textContent = 'Verbinding mislukt. Probeer opnieuw.';
      } finally {
        btn.disabled = false;
        pinEl.value = '';
        try { pinEl.focus(); } catch (_) {}
      }
    }

    btn.addEventListener('click', submitPin);
    pinEl.addEventListener('keydown', function (ev) {
      if (ev.key === 'Enter') { ev.preventDefault(); submitPin(); }
    });
    try { pinEl.focus(); } catch (_) {}
  }

  async function init() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch (_) {}
    if (window.AuthShared && typeof window.AuthShared.requireAuth === 'function') {
      const profile = await window.AuthShared.requireAuth();
      if (!profile) return;
    }
    try {
      const apiFetch = window.AgentShared && window.AgentShared.apiFetch;
      if (typeof apiFetch !== 'function') { showDenied(); return; }
      const r = await apiFetch('/api/secret-area');
      const d = await r.json().catch(function () { return {}; });
      if (r.ok && d && d.allowed === true) {
        showPinForm();
        return;
      }
      showDenied();
    } catch (_) {
      showDenied();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
