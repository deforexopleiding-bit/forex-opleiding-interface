<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Area · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    /* Cockpit tokens — override op agent-shared voor deze pagina. */
    .sa-scope {
      --sa-bg:#061725; --sa-bg-2:#08202f;
      --sa-panel:#0b2b3f; --sa-panel-2:#0e3350;
      --sa-line:rgba(255,255,255,.08); --sa-line-2:rgba(255,255,255,.14);
      --sa-tx:#e9f2fb; --sa-tx-mid:#9db4cc; --sa-tx-dim:#5f7c96;
      --sa-azure:#2f86f0; --sa-azure-soft:rgba(47,134,240,.16);
      --sa-win:#25c79b; --sa-win-soft:rgba(37,199,155,.14);
      --sa-amber:#f2b13f; --sa-amber-soft:rgba(242,177,63,.15);
      --sa-loss:#f0556b; --sa-loss-soft:rgba(240,85,107,.14);
      --sa-brand-azure:#1e6cd6; --sa-brand-deep:#0a2f63;
      --sa-disp:'Space Grotesk',system-ui,sans-serif;
      --sa-body:'Inter',system-ui,sans-serif;
      --sa-mono:'IBM Plex Mono',ui-monospace,monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: var(--sa-body,'Inter'), system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

    /* Scope-gebonden achtergrond + tekst — sidebar/topchrome blijven ongewijzigd. */
    .sa-scope {
      background:
        radial-gradient(1100px 640px at 82% -12%,rgba(30,108,214,.16),transparent 60%),
        radial-gradient(900px 600px at -5% 108%,rgba(10,47,99,.4),transparent 55%),
        var(--sa-bg);
      color: var(--sa-tx);
      min-height: 100vh;
      margin-left: 220px;
      padding: 22px 26px 60px;
      max-width: 1500px;
      line-height: 1.5;
    }
    .sa-scope .page-header { margin-bottom: 18px; display:flex; align-items:center; gap:12px; }
    .sa-scope .page-header .lock {
      width:34px; height:34px; border-radius:9px; display:grid; place-items:center;
      background: linear-gradient(135deg, var(--sa-brand-azure), var(--sa-brand-deep));
      box-shadow: 0 4px 14px rgba(30,108,214,.4);
    }
    .sa-scope .page-header h1 { font-family: var(--sa-disp); font-weight:600; font-size:18px; letter-spacing:.2px; }
    .sa-scope .page-header .sub { font-size: 11px; color: var(--sa-tx-dim); letter-spacing:.14em; text-transform:uppercase; margin-top:2px; }

    /* Mono + display helpers. */
    .sa-scope .mono { font-family: var(--sa-mono); }
    .sa-scope .disp { font-family: var(--sa-disp); }
    .sa-scope .lbl {
      font-size: 10px; letter-spacing:.16em; text-transform:uppercase;
      color: var(--sa-tx-dim); font-weight: 600;
    }

    /* Cockpit-panel + generieke card. */
    .sa-scope .cockpit {
      background: linear-gradient(115deg, rgba(47,134,240,.18), rgba(11,43,63,.5));
      border: 1px solid rgba(47,134,240,.35);
      border-radius: 16px; padding: 18px 20px;
      box-shadow: 0 10px 30px rgba(8,25,45,.4);
    }
    .sa-scope .sa-card {
      background: linear-gradient(180deg, var(--sa-panel), var(--sa-bg-2));
      border: 1px solid var(--sa-line);
      border-radius: 14px; padding: 16px 18px;
    }
    .sa-scope .sa-card h2 {
      font-family: var(--sa-disp); font-weight: 600; font-size: 14px;
      margin-bottom: 10px; letter-spacing:.02em;
      display:flex; align-items:center; gap:8px;
    }
    .sa-scope .sa-card h2 .ti { color: var(--sa-azure); }

    /* Inputs + knoppen. */
    .sa-scope .sa-input, .sa-scope .sa-textarea, .sa-scope .sa-select {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--sa-line); border-radius: 10px;
      background: var(--sa-bg-2); color: var(--sa-tx);
      font: inherit; font-size: 13px; outline: none;
    }
    .sa-scope .sa-input:focus, .sa-scope .sa-textarea:focus, .sa-scope .sa-select:focus { border-color: var(--sa-azure); }
    .sa-scope .sa-textarea { min-height: 68px; resize: vertical; }
    .sa-scope input[type="file"] { color: var(--sa-tx-mid); font-size: 12.5px; }
    .sa-scope .sa-btn {
      appearance: none; border: 1px solid transparent;
      background: linear-gradient(135deg, var(--sa-brand-azure), #1857b8);
      color: #fff; font-family: var(--sa-disp); font-weight: 600; font-size: 13px;
      padding: 10px 16px; border-radius: 10px; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      box-shadow: 0 6px 18px rgba(30,108,214,.35);
      transition: transform .15s, background .15s, border-color .15s;
    }
    .sa-scope .sa-btn:hover:not(:disabled) { transform: translateY(-1px); }
    .sa-scope .sa-btn:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
    .sa-scope .sa-btn-ghost {
      background: transparent; color: var(--sa-tx);
      border: 1px solid var(--sa-line-2); box-shadow: none;
    }
    .sa-scope .sa-btn-ghost:hover:not(:disabled) { border-color: var(--sa-azure); color: #fff; }
    .sa-scope .sa-btn-danger { background: linear-gradient(135deg,#c33648,#8a2532); box-shadow: 0 6px 18px rgba(195,54,72,.3); }
    .sa-scope .sa-btn-danger:hover:not(:disabled) { transform: translateY(-1px); }

    .sa-scope .sa-err { color: var(--sa-loss); font-size: 12.5px; margin-top: 8px; min-height: 16px; }
    .sa-scope .sa-loading { color: var(--sa-tx-mid); font-size: 13px; padding: 12px 0; display:flex; gap:8px; align-items:center; }
    .sa-scope .sa-empty { color: var(--sa-tx-dim); font-size: 12.5px; padding: 16px 0; text-align: center; }

    /* Denied (redirect-fallback). */
    .sa-scope .sa-denied {
      background: linear-gradient(180deg, var(--sa-panel), var(--sa-bg-2));
      border: 1px solid var(--sa-line); border-radius: 14px;
      padding: 20px 22px; max-width: 480px; color: var(--sa-tx-mid); font-size: 13.5px;
    }
    .sa-scope .sa-denied strong { color: var(--sa-tx); font-size: 14px; display: block; margin-bottom: 4px; font-family: var(--sa-disp); }

    /* PIN-card. */
    .sa-scope .sa-pincard {
      background: linear-gradient(180deg, var(--sa-panel), var(--sa-bg-2));
      border: 1px solid var(--sa-line-2); border-radius: 16px;
      padding: 26px 28px; box-shadow: 0 20px 60px rgba(0,0,0,.35);
      max-width: 440px;
    }
    .sa-scope .sa-pincard h2 { font-family: var(--sa-disp); font-weight: 600; font-size: 17px; margin-bottom: 6px; }
    .sa-scope .sa-pincard p  { font-size: 13px; color: var(--sa-tx-mid); margin-bottom: 14px; line-height: 1.5; }

    /* Tabs — cockpit-strook. */
    .sa-scope .sa-tabs {
      display: flex; gap: 4px; padding: 5px;
      background: var(--sa-bg-2); border: 1px solid var(--sa-line);
      border-radius: 12px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .sa-scope .sa-tab {
      appearance: none; background: transparent; border: 0;
      padding: 8px 13px; font-family: var(--sa-disp); font-weight: 500; font-size: 12.5px;
      color: var(--sa-tx-mid); border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
      transition: color .15s, background .15s;
    }
    .sa-scope .sa-tab:hover:not(.active) { color: var(--sa-tx); }
    .sa-scope .sa-tab.active {
      background: var(--sa-azure-soft); color: #dcebff;
      box-shadow: inset 0 0 0 1px rgba(47,134,240,.5);
    }
    .sa-scope .sa-tab-sep { opacity: .35; padding: 0 4px; align-self: center; color: var(--sa-tx-dim); }

    /* Grid. */
    .sa-scope .sa-grid { display: grid; gap: 14px; }
    .sa-scope .sa-grid-2 { grid-template-columns: 1fr 1fr; }
    .sa-scope .sa-grid-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
    @media (max-width: 900px) { .sa-scope .sa-grid-2, .sa-scope .sa-grid-3 { grid-template-columns: 1fr; } }

    /* Grade-badges (mono, A+ / B / C). */
    .sa-scope .sa-grade {
      font-family: var(--sa-disp); font-weight: 700; font-size: 11.5px;
      border-radius: 8px; padding: 3px 9px; letter-spacing: .02em;
      display: inline-flex; align-items: center; justify-content: center; min-width: 32px;
    }
    .sa-scope .sa-grade.A\+ { background: var(--sa-win-soft); color: var(--sa-win); box-shadow: inset 0 0 0 1px rgba(37,199,155,.4); }
    .sa-scope .sa-grade.B   { background: var(--sa-amber-soft); color: var(--sa-amber); box-shadow: inset 0 0 0 1px rgba(242,177,63,.4); }
    .sa-scope .sa-grade.C   { background: var(--sa-loss-soft);  color: var(--sa-loss);  box-shadow: inset 0 0 0 1px rgba(240,85,107,.4); }

    .sa-scope .sa-thumb { width: 100%; aspect-ratio: 16/9; background: var(--sa-bg-2); border-radius: 9px; object-fit: cover; }
    .sa-scope .sa-row-item {
      display: flex; gap: 10px; align-items: center;
      padding: 10px 12px; border: 1px solid var(--sa-line);
      border-radius: 10px; background: var(--sa-bg-2);
      margin-bottom: 6px; font-size: 13px;
    }
    .sa-scope .sa-row-item input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--sa-azure); }
    .sa-scope .sa-row-item .ti { color: var(--sa-azure); }

    /* Cockpit-strip (cells). */
    .sa-scope .sa-strip { display: flex; gap: 16px; flex-wrap: wrap; }
    .sa-scope .sa-strip .cell {
      flex: 1 1 140px; min-width: 140px;
    }
    .sa-scope .sa-strip .cell .v { font-family: var(--sa-mono); font-size: 22px; font-weight: 600; color: var(--sa-tx); }
    .sa-scope .sa-strip .cell .l { font-size: 10px; color: var(--sa-tx-dim); text-transform: uppercase; letter-spacing: .12em; margin-top: 2px; }

    /* ── HOME-view ────────────────────────────────────────────────────── */
    .sa-scope .sa-hi { font-family: var(--sa-disp); font-weight: 600; font-size: 24px; margin: 4px 0 2px; }
    .sa-scope .sa-hi span { color: var(--sa-azure); }
    .sa-scope .sa-subhead { color: var(--sa-tx-mid); margin-bottom: 22px; font-size: 14px; }

    /* Hero — "doe dit nu". */
    .sa-scope .sa-hero {
      background: linear-gradient(115deg, rgba(47,134,240,.22), rgba(11,43,63,.5));
      border: 1px solid rgba(47,134,240,.4); border-radius: 18px;
      padding: 22px 24px; display: flex; gap: 20px; align-items: center;
      box-shadow: 0 12px 40px rgba(8,25,45,.5); margin-bottom: 24px;
    }
    .sa-scope .sa-hero .badge {
      font-family: var(--sa-mono); font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
      color: var(--sa-azure); background: var(--sa-azure-soft);
      border: 1px solid rgba(47,134,240,.4); border-radius: 20px; padding: 4px 11px;
      display: inline-block; margin-bottom: 10px;
    }
    .sa-scope .sa-hero h2 { font-family: var(--sa-disp); font-weight: 600; font-size: 20px; margin: 0 0 6px; line-height: 1.25; }
    .sa-scope .sa-hero p  { margin: 0; color: var(--sa-tx-mid); font-size: 14px; max-width: 620px; }
    .sa-scope .sa-hero .ic {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(47,134,240,.2); display: grid; place-items: center; flex: none;
    }
    .sa-scope .sa-hero .ic .ti { font-size: 24px; color: var(--sa-azure); }
    .sa-scope .sa-hero .go { flex: none; }

    /* Reis-tijdlijn. */
    .sa-scope .sa-journey {
      background: linear-gradient(180deg, var(--sa-panel), var(--sa-bg-2));
      border: 1px solid var(--sa-line); border-radius: 16px;
      padding: 20px 24px; margin-bottom: 22px;
    }
    .sa-scope .sa-steps { display: flex; position: relative; margin-top: 14px; }
    .sa-scope .sa-steps::before {
      content: ""; position: absolute; top: 15px; left: 24px; right: 24px;
      height: 2px; background: var(--sa-line-2);
    }
    .sa-scope .sa-steps .sa-fill {
      position: absolute; top: 15px; left: 24px; height: 2px;
      background: linear-gradient(90deg, var(--sa-win), var(--sa-azure));
      border-radius: 2px;
    }
    .sa-scope .sa-ms { flex: 1; text-align: center; position: relative; z-index: 1; padding: 0 4px; }
    .sa-scope .sa-ms .node {
      width: 32px; height: 32px; border-radius: 50%;
      margin: 0 auto 10px; display: grid; place-items: center;
      background: var(--sa-bg-2); box-shadow: inset 0 0 0 2px var(--sa-line-2);
      font-family: var(--sa-mono); font-size: 12px; color: var(--sa-tx-dim);
      transition: .15s;
    }
    .sa-scope .sa-ms.done .node { background: var(--sa-win); color: #04120c; box-shadow: none; }
    .sa-scope .sa-ms.here .node {
      background: var(--sa-azure); color: #fff; box-shadow: 0 0 0 5px var(--sa-azure-soft);
      animation: sa-pp 2.4s infinite;
    }
    @keyframes sa-pp {
      0%,100% { box-shadow: 0 0 0 5px var(--sa-azure-soft); }
      50%     { box-shadow: 0 0 0 9px rgba(47,134,240,.05); }
    }
    .sa-scope .sa-ms .t { font-size: 11px; color: var(--sa-tx-mid); line-height: 1.3; }
    .sa-scope .sa-ms.here .t { color: var(--sa-tx); font-weight: 600; }
    .sa-scope .sa-ms.here .youare {
      font-family: var(--sa-mono); font-size: 9px; color: var(--sa-azure);
      text-transform: uppercase; letter-spacing: .1em; margin-bottom: 3px;
    }

    /* Ring-meters (drie: strategie/trader/detectie). */
    .sa-scope .sa-meters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 22px; }
    @media (max-width: 720px) { .sa-scope .sa-meters { grid-template-columns: 1fr; } }
    .sa-scope .sa-meter {
      background: linear-gradient(180deg, var(--sa-panel), var(--sa-bg-2));
      border: 1px solid var(--sa-line); border-radius: 16px;
      padding: 20px; text-align: center;
    }
    .sa-scope .sa-ring { width: 96px; height: 96px; margin: 2px auto 12px; position: relative; }
    .sa-scope .sa-ring svg { transform: rotate(-90deg); }
    .sa-scope .sa-ring .val {
      position: absolute; inset: 0; display: grid; place-items: center;
      font-family: var(--sa-mono); font-weight: 600; font-size: 20px;
    }
    .sa-scope .sa-meter .mt { font-family: var(--sa-disp); font-weight: 600; font-size: 13.5px; margin-bottom: 3px; }
    .sa-scope .sa-meter .md { font-size: 11.5px; color: var(--sa-tx-dim); line-height: 1.4; }

    /* Sectiekaarten met status-pill. */
    .sa-scope .sa-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 720px) { .sa-scope .sa-cards { grid-template-columns: 1fr; } }
    .sa-scope .sa-c {
      background: linear-gradient(180deg, var(--sa-panel), var(--sa-bg-2));
      border: 1px solid var(--sa-line); border-radius: 14px;
      padding: 16px 17px; cursor: pointer; transition: .15s;
      display: flex; gap: 13px; align-items: flex-start;
    }
    .sa-scope .sa-c:hover { border-color: var(--sa-azure); transform: translateY(-2px); }
    .sa-scope .sa-c .ci {
      width: 38px; height: 38px; border-radius: 11px;
      background: var(--sa-panel-2); display: grid; place-items: center; flex: none;
    }
    .sa-scope .sa-c .ci .ti { color: var(--sa-azure); font-size: 19px; }
    .sa-scope .sa-c h4 {
      font-family: var(--sa-disp); font-weight: 600; font-size: 14px;
      margin: 0 0 3px; display: flex; align-items: center; gap: 8px;
    }
    .sa-scope .sa-c .why { font-size: 12px; color: var(--sa-tx-mid); line-height: 1.45; }
    .sa-scope .sa-st {
      font-family: var(--sa-mono); font-size: 9.5px; padding: 2px 7px;
      border-radius: 20px; font-weight: 600; white-space: nowrap;
    }
    .sa-scope .sa-st.done { background: var(--sa-win-soft);   color: var(--sa-win); }
    .sa-scope .sa-st.part { background: var(--sa-amber-soft); color: var(--sa-amber); }
    .sa-scope .sa-st.todo { background: rgba(255,255,255,.06); color: var(--sa-tx-dim); }

    @media (prefers-reduced-motion: reduce) { .sa-scope *{ animation: none !important; transition: none !important; } }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="sa-scope">
  <div class="page-header">
    <div class="lock" aria-hidden="true">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/>
      </svg>
    </div>
    <div>
      <h1>Strategie-trainer</h1>
      <div class="sub">Secret Area · persoonlijke werkplek</div>
    </div>
  </div>

  <div id="saRoot">
    <div class="sa-loading"><i class="ti ti-loader"></i> Controleren…</div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  const ROOT = document.getElementById('saRoot');
  const apiFetch = () => (window.AgentShared && window.AgentShared.apiFetch) || null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
    });
  }
  function showDenied(msg) {
    ROOT.innerHTML = '<div class="sa-denied"><strong>Geen toegang</strong>' + esc(msg || 'Je hebt geen toegang tot deze pagina. Je wordt teruggestuurd naar het dashboard…') + '</div>';
    setTimeout(function () { window.location.href = '/index.html'; }, 1400);
  }
  function toast(msg, kind) {
    try { window.AgentShared?.showToast?.(msg, kind || 'info'); } catch (_) {}
  }

  // ── State ────────────────────────────────────────────────────────────
  const state = {
    tab: 'home',            // 'home' is nu de default landingsview.
    workspace: { strategies: [], tools: [] },
    trades: { list: [], stats: null },
    activeStrategyId: null,
    activeStrategy: null,   // volledige detail (steps + checklist)
    activeToolId: null,
    activeTool: null,       // volledige detail (examples)
    checkedItems: new Set(),// client-side check-state → grade
    conditions: [],         // owner-scoped condities (global + strategy)
  };

  // ── Fetch helpers ────────────────────────────────────────────────────
  async function api(url, opts) {
    const f = apiFetch();
    if (!f) throw new Error('apiFetch niet beschikbaar');
    const r = await f(url, opts || {});
    const d = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
    return d;
  }

  async function loadWorkspace() {
    const d = await api('/api/secret-area-workspace');
    state.workspace = { strategies: d.strategies || [], tools: d.tools || [] };
  }
  async function loadTrades() {
    const d = await api('/api/secret-area-trade');
    state.trades = { list: d.trades || [], stats: d.stats || null };
  }
  async function loadStrategy(id) {
    if (!id) { state.activeStrategy = null; state.checkedItems.clear(); return; }
    const d = await api('/api/secret-area-strategy?id=' + encodeURIComponent(id));
    state.activeStrategy = d.strategy || null;
    state.checkedItems.clear();
  }
  async function loadTool(id) {
    if (!id) { state.activeTool = null; return; }
    const d = await api('/api/secret-area-tool?id=' + encodeURIComponent(id));
    state.activeTool = d.tool ? { ...d.tool, examples: d.examples || [] } : null;
  }
  async function loadConditions() {
    try {
      const d = await api('/api/secret-area-condition');
      state.conditions = d.conditions || [];
    } catch (e) { console.warn('[sa] loadConditions:', e.message); state.conditions = []; }
  }

  // ── Pijplijn-status: uit data afgeleide gereedheid per stap ─────────
  // Voor pijplijn-berekening kiezen we een "peil-strategie":
  //   activeStrategy (indien geladen) → anders eerste in workspace.
  function _peilStrategy() {
    if (state.activeStrategy) return state.activeStrategy;
    const first = state.workspace.strategies[0] || null;
    return first ? { ...first, steps: [], checklist: [] } : null;
  }
  function pipelineStatus() {
    const tools = state.workspace.tools || [];
    const trained = tools.filter((t) => t.detection_rule && String(t.detection_rule).trim().length > 0);
    const s = _peilStrategy();
    const stratComplete = s && s.name && s.entry_signal && s.sl_signal && s.tp_signal;
    const stratPartial  = s && (s.name || s.entry_signal || s.sl_signal || s.tp_signal);
    const condsForS     = state.conditions.filter((c) => c.scope === 'global' || (s && c.strategy_id === s.id));
    const cl            = state.activeStrategy?.checklist || [];
    const specPresent   = state.activeStrategy?.recognition_spec && state.activeStrategy.recognition_spec.trim().length > 0;

    return {
      peil: s,
      steps: [
        {
          key:      'tools',
          label:    '1. Tools',
          status:   tools.length === 0 ? 'todo' : (trained.length >= tools.length ? 'done' : 'partial'),
          detail:   trained.length + ' van ' + tools.length + ' getraind',
        },
        {
          key:      'strategy',
          label:    '2. Strategie',
          status:   stratComplete ? 'done' : (stratPartial ? 'partial' : 'todo'),
          detail:   s ? (stratComplete ? s.name : (s.name || 'aanmaken')) : 'nog geen strategie',
        },
        {
          key:      'conditions',
          label:    '3. Marktcondities',
          status:   condsForS.length === 0 ? 'todo' : (condsForS.length >= 3 ? 'done' : 'partial'),
          detail:   condsForS.length + ' condities',
        },
        {
          key:      'checklist',
          label:    '4. Checklist',
          status:   cl.length === 0 ? 'todo' : (cl.length >= 3 ? 'done' : 'partial'),
          detail:   cl.length + ' items',
        },
        {
          key:      'review',
          label:    '5. Systeem-review',
          status:   specPresent ? 'done' : (stratComplete && cl.length > 0 ? 'partial' : 'todo'),
          detail:   specPresent ? 'setup-herkenning opgeslagen' : 'nog niet gegenereerd',
        },
      ],
    };
  }
  function readiness(steps) {
    const w = { done: 1.0, partial: 0.5, todo: 0.0 };
    const total = steps.reduce((a, s) => a + w[s.status], 0);
    return Math.round((total / steps.length) * 100);
  }

  // ── Grade compute (client-side, alle checks = A+, 1 mist = B, 2+ = C).
  function computeGrade() {
    const items = state.activeStrategy?.checklist || [];
    if (items.length === 0) return null;
    const missing = items.filter((c) => !state.checkedItems.has(c.id)).length;
    if (missing === 0) return 'A+';
    if (missing === 1) return 'B';
    return 'C';
  }

  // ── Render — pijplijn-nav (v2) ───────────────────────────────────────
  // Volgorde: Home · Dashboard · 1 Tools · 2 Strategie · 3 Marktcondities ·
  //           4 Checklist · 5 Systeem-review · | Detectie · Trades
  function renderWorkspace() {
    const st = pipelineStatus();
    const stepIcon = (k) => {
      const s = st.steps.find((x) => x.key === k);
      if (!s) return '';
      if (s.status === 'done')    return ' <i class="ti ti-circle-check" style="color:var(--sa-win)"></i>';
      if (s.status === 'partial') return ' <i class="ti ti-circle-dashed" style="color:var(--sa-amber)"></i>';
      return ' <i class="ti ti-circle" style="color:var(--sa-tx-dim)"></i>';
    };
    ROOT.innerHTML =
      '<div class="sa-tabs" role="tablist">'
      + tab('home',       'Home')
      + tab('dashboard',  'Dashboard')
      + tab('tools',      '1 Tools'         + stepIcon('tools'))
      + tab('strategy',   '2 Strategie'     + stepIcon('strategy'))
      + tab('conditions', '3 Marktcondities'+ stepIcon('conditions'))
      + tab('checklist',  '4 Checklist'     + stepIcon('checklist'))
      + tab('review',     '5 Systeem-review'+ stepIcon('review'))
      + '<span class="sa-tab-sep">|</span>'
      + tab('analyse',    'Chart-analyse')
      + tab('detection',  'Detectie & signalen')
      + tab('trades',     'Trades')
      + '</div>'
      + '<div id="saPane"></div>';
    document.querySelectorAll('.sa-tab').forEach((b) => b.addEventListener('click', () => {
      state.tab = b.dataset.tab || 'home';
      renderPane();
      document.querySelectorAll('.sa-tab').forEach((x) => x.classList.toggle('active', x.dataset.tab === state.tab));
    }));
    renderPane();
  }
  function tab(key, labelHtml) {
    const cls = state.tab === key ? 'sa-tab active' : 'sa-tab';
    return '<button type="button" class="' + cls + '" data-tab="' + key + '" role="tab">' + labelHtml + '</button>';
  }

  function renderPane() {
    const p = document.getElementById('saPane');
    if (!p) return;
    if (state.tab === 'home')       return renderHome(p);
    if (state.tab === 'dashboard')  return renderDashboard(p);
    if (state.tab === 'tools')      return renderTools(p);
    if (state.tab === 'strategy')   return renderStrategyBuilder(p);
    if (state.tab === 'conditions') return renderConditions(p);
    if (state.tab === 'checklist')  return renderChecklist(p);
    if (state.tab === 'review')     return renderReview(p);
    if (state.tab === 'detection')  return renderDetection(p);
    if (state.tab === 'trades')     return renderTradesCombined(p);
    if (state.tab === 'analyse')    return renderAnalyse(p);
  }

  // Utility: jump-to-tab from home/dashboard/next-step.
  async function jumpTab(key) {
    // Zorg dat activeStrategy geladen is voor Checklist/Review/Detection.
    if (['checklist', 'review', 'detection'].includes(key) && !state.activeStrategy) {
      const s = state.workspace.strategies[0];
      if (s) { state.activeStrategyId = s.id; await loadStrategy(s.id); }
    }
    state.tab = key;
    renderWorkspace();
  }

  // ── HOME: coach-thuisscherm — "doe dit nu" + reis + meters + secties.
  // Afgeleid uit workspace + trades + conditions. Geen nieuwe endpoints.
  function homeContext() {
    const st  = pipelineStatus();
    const s   = st.peil;
    const tools = state.workspace.tools || [];
    const trained  = tools.filter((t) => t.detection_rule && String(t.detection_rule).trim().length > 0).length;
    const trades = state.trades.list || [];
    const tradesCount = trades.length;
    const traderGoal  = 50;                   // "gevoel voor scherpte"-doel — na 50 trades = 100%.
    const traderPct   = Math.min(100, Math.round((tradesCount / traderGoal) * 100));
    const stratPct    = readiness(st.steps);
    const specPresent = !!(s && s.recognition_spec && s.recognition_spec.trim().length > 0);
    // Detectie-gereedheid: strategie-pijplijn + trader-groei gecombineerd.
    // Extra weging: spec aanwezig telt zwaar (35% van totaal).
    const detectionPct = Math.round(
      (stratPct * 0.5) + (specPresent ? 35 : 0) + (Math.min(30, tradesCount) * 0.5)
    );
    // Volgende stap: eerste onvoltooide mijlpaal → hero.
    let next = { key: 'trades', title: 'Log je trades', tone: 'trades',
                 sub: 'Blijf je uitgespeelde setups vastleggen — daar leert je systeem wat écht werkt.' };
    const toolsNoTraining = tools.length > 0 && trained < tools.length;
    if (tools.length === 0) {
      next = {
        key: 'tools',
        title: 'Maak je eerste tool aan',
        tone: 'tools',
        sub: 'Bouwstenen zoals FVG, sweep en order block leggen de basis voor herkenning.',
      };
    } else if (toolsNoTraining) {
      next = {
        key: 'tools',
        title: 'Upload een paar voorbeelden bij je tools',
        tone: 'tools',
        sub: 'Nog ' + (tools.length - trained) + ' tool(s) zonder detection-regel. Voeg ideaal- en tegenvoorbeelden toe — daar leert je systeem herkenning.',
      };
    } else if (!s || !s.name) {
      next = {
        key: 'strategy',
        title: 'Bouw je eerste strategie',
        tone: 'strategy',
        sub: 'Entry, SL, TP en risk — de spelregels voor je systeem.',
      };
    } else if (!(s.entry_signal && s.sl_signal && s.tp_signal)) {
      next = {
        key: 'strategy',
        title: 'Rond je strategie af',
        tone: 'strategy',
        sub: 'Entry-, SL- en TP-signaal invullen zodat je systeem weet waar het op moet reageren.',
      };
    } else if ((state.activeStrategy?.checklist || []).length === 0) {
      next = {
        key: 'checklist',
        title: 'Zet je checklist op',
        tone: 'checklist',
        sub: 'De controle-items die A+/B/C bepalen — de grade van elke setup.',
      };
    } else if (!specPresent) {
      next = {
        key: 'review',
        title: 'Draai de systeem-review',
        tone: 'review',
        sub: 'Smelt alles tot één herkenning die je systeem straks in de markt zoekt.',
      };
    }
    return { st, stratPct, traderPct, detectionPct, next, tools, trained, tradesCount, specPresent };
  }

  function ringSvg(pct, color) {
    const CIRC = 264; // 2πr voor r=42
    const off  = Math.max(0, Math.round(CIRC - (CIRC * Math.min(100, Math.max(0, pct)) / 100)));
    return '<svg width="96" height="96">'
      +   '<circle cx="48" cy="48" r="42" stroke="rgba(255,255,255,.08)" stroke-width="7" fill="none"/>'
      +   '<circle cx="48" cy="48" r="42" stroke="' + color + '" stroke-width="7" fill="none" stroke-linecap="round" '
      +          'stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + off + '"/>'
      + '</svg>';
  }

             (st.steps.find(x=>x.key==='checklist').status === 'partial' ? 'part' : 'todo'),

      { key:'review',     icon:'ti-sparkles',    title:'Systeem-review',

      +   '</div>'

  // Dashboard = command center. Pijplijn-voortgang + volgende-stap-kaart +
  // wat-mist-er-nog + gereedheids-meter, met deep-links per stap.
  function renderDashboard(p) {
    const s   = state.trades.stats || { win_rate: 0, avg_rr: 0, expectancy: 0, count: 0, per_grade: [] };
    const st  = pipelineStatus();
    const pct = readiness(st.steps);
    const next = st.steps.find((x) => x.status !== 'done') || null;
    const meterColor = pct === 100 ? 'var(--sa-win)' : (pct >= 50 ? 'var(--sa-amber)' : 'var(--sa-loss)');
    const meter =
      '<div style="background:var(--sa-bg-2);border:1px solid var(--sa-line);border-radius:8px;overflow:hidden;height:10px;margin-top:6px">'

      + '</div>';

    const nextCard = next
      ? '<div class="sa-card" style="border-left:4px solid var(--sa-azure)">'
        + '<div class="lbl">Volgende stap</div>'
        + '<div class="disp" style="font-size:15px;font-weight:600;margin-top:4px">' + esc(next.label.replace(/^\d+\.\s*/, '')) + '</div>'
        + '<div style="font-size:12.5px;color:var(--sa-tx-mid);margin-top:4px">' + esc(next.detail) + '</div>'
        + '<div style="margin-top:10px"><button class="sa-btn" data-jump="' + esc(next.key) + '"><i class="ti ti-arrow-right"></i>Ga verder</button></div>'

      '<div class="sa-row-item"><i class="ti ti-alert-circle" style="color:var(--sa-amber)"></i>'
      + '<div style="flex:1"><b>' + esc(x.label) + '</b> <span style="color:var(--sa-tx-mid);font-size:12px">— ' + esc(x.detail) + '</span></div>'

      +   '<div style="margin-top:14px"><div class="lbl">Systeem-gereedheid: ' + pct + '%</div>' + meter + '</div>'
      + '</div>'

      + '<div class="sa-card" style="margin-bottom:14px"><h2><i class="ti ti-flag"></i> Pijplijn</h2>'
      +   '<div class="sa-strip">'
      +     st.steps.map((x) => {
              const color = x.status === 'done' ? 'var(--sa-win)' : (x.status === 'partial' ? 'var(--sa-amber)' : 'var(--sa-tx-dim)');
              return '<div class="cell" style="cursor:pointer" data-jump="' + esc(x.key) + '">'
                + '<div class="v mono" style="color:' + color + '">' + (x.status === 'done' ? '✓' : (x.status === 'partial' ? '~' : '·')) + '</div>'
                + '<div class="l">' + esc(x.label) + '</div>'
                + '<div style="font-size:11px;color:var(--sa-tx-dim);margin-top:2px">' + esc(x.detail) + '</div>'

      + '</div>';

    p.querySelectorAll('[data-jump]').forEach((b) => b.addEventListener('click', () => jumpTab(b.dataset.jump)));

  function cell(l, v) { return '<div class="cell"><div class="v mono">' + esc(v) + '</div><div class="l">' + esc(l) + '</div></div>'; }

  // Tools.

      await loadTool(state.activeToolId); renderPane();

  function wireExampleForm() {
    const btn = document.getElementById('exSubmit');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      if (!state.activeToolId) return toast('Kies eerst een tool', 'error');
      btn.disabled = true;
      try {
        let image_path = null, source_url = null;
        const file  = document.getElementById('exFile').files[0];
        const tvUrl = document.getElementById('exTvUrl').value.trim();
        if (file) {
          const up = await uploadFile(file, 'tool', state.activeToolId);
          image_path = up.image_path;
        } else if (tvUrl) {
          const up = await uploadTv(tvUrl, 'tool', state.activeToolId);
          image_path = up.image_path;
          source_url = up.source_url || null;
        }
        await api('/api/secret-area-example', {
          method:  'POST', headers: { 'Content-Type':'application/json' },
          body:    JSON.stringify({
            tool_id:    state.activeToolId,
            kind:       document.getElementById('exKind').value,
            timeframe:  document.getElementById('exTf').value.trim(),
            instrument: document.getElementById('exInstr').value.trim(),
            note:       document.getElementById('exNote').value.trim(),
            image_path, source_url,
          }),
        });
        toast('Voorbeeld toegevoegd', 'success');
        await loadWorkspace();
        await loadTool(state.activeToolId);
        renderPane();
      } catch (e) {
        toast('Toevoegen mislukt: ' + e.message, 'error');
      } finally { btn.disabled = false; }
    });
    document.querySelectorAll('[data-del-ex]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Voorbeeld verwijderen?')) return;
      try {
        await api('/api/secret-area-example?id=' + encodeURIComponent(b.dataset.delEx), { method: 'DELETE' });
        toast('Verwijderd', 'success');
        await loadWorkspace(); await loadTool(state.activeToolId); renderPane();
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
    wireAiPanel();
  }

  // ── AI meelezen (Fase 3) ─────────────────────────────────────────────
  // Roept /api/secret-area-ai aan met tool_id → toont voorstel in #aiResult.
  // Knoppen "Bewaar als regel" (save:true) en "Opnieuw" verschijnen NA
  // eerste run. Fail-soft: 502 → nette foutmelding, geen kapotte UI.
  async function runAiForActiveTool(save) {
    if (!state.activeToolId) return;
    const runBtn = document.getElementById('aiRun');
    const box    = document.getElementById('aiResult');
    if (!box) return;
    if (runBtn) runBtn.disabled = true;
    box.hidden = false;
    box.innerHTML = '<div class="sa-loading"><i class="ti ti-loader"></i> Claude leest mee…</div>';
    try {
      const d = await api('/api/secret-area-ai', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ tool_id: state.activeToolId, save: !!save }),
      });
      const rule = d?.rule || '';
      box.innerHTML =
        '<div class="lbl">Voorstel (model: ' + esc(d?.model || '') + ', ' + (d?.images_used || 0) + ' afbeeldingen)</div>'
        + '<div style="white-space:pre-wrap;font-size:12.5px;margin-top:4px;background:var(--sa-bg-2);padding:10px;border:1px solid var(--sa-line);border-radius:8px">' + esc(rule) + '</div>'
        + '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'
        +   '<button class="sa-btn" id="aiSave"' + (d?.saved ? ' disabled' : '') + '><i class="ti ti-device-floppy"></i>' + (d?.saved ? 'Opgeslagen' : 'Bewaar als regel') + '</button>'
        +   '<button class="sa-btn sa-btn-ghost" id="aiRetry"><i class="ti ti-refresh"></i>Opnieuw</button>'
        + '</div>'
        + (d?.save_error ? '<div class="sa-err">Bewaren mislukt: ' + esc(d.save_error) + '</div>' : '');
      if (d?.saved) {
        toast('Regel opgeslagen', 'success');
        await loadTool(state.activeToolId);
      }
      document.getElementById('aiSave')?.addEventListener('click', () => runAiForActiveTool(true));
      document.getElementById('aiRetry')?.addEventListener('click', () => runAiForActiveTool(false));
    } catch (e) {
      box.innerHTML = '<div class="sa-err">AI-fout: ' + esc(e.message) + '</div>'
        + '<div style="margin-top:8px"><button class="sa-btn sa-btn-ghost" id="aiRetry2"><i class="ti ti-refresh"></i>Opnieuw</button></div>';
      document.getElementById('aiRetry2')?.addEventListener('click', () => runAiForActiveTool(false));
    } finally { if (runBtn) runBtn.disabled = false; }
  }
  function wireAiPanel() {
    document.getElementById('aiRun')?.addEventListener('click', () => runAiForActiveTool(false));
  }

  function wireStrategyEditor() {
    if (!state.activeStrategy) return;
    const s = state.activeStrategy;
    document.getElementById('stStepAdd')?.addEventListener('click', () => {
      s.steps = s.steps || []; s.steps.push({ description: '' }); renderPane();
    });
    document.getElementById('stClAdd')?.addEventListener('click', () => {
      s.checklist = s.checklist || []; s.checklist.push({ label: '' }); renderPane();
    });
    document.querySelectorAll('[data-step-del]').forEach((b) => b.addEventListener('click', () => {
      const i = Number(b.dataset.stepDel); s.steps.splice(i, 1); renderPane();
    }));
    document.querySelectorAll('[data-cl-del]').forEach((b) => b.addEventListener('click', () => {
      const i = Number(b.dataset.clDel); s.checklist.splice(i, 1); renderPane();
    }));
    document.getElementById('stSave')?.addEventListener('click', async () => {
      const steps = Array.from(document.querySelectorAll('[data-step-desc]')).map((e, i) => ({
        position: i + 1, description: e.value.trim(),
      }));
      const checklist = Array.from(document.querySelectorAll('[data-cl-lbl]')).map((e, i) => ({
        position: i + 1, label: e.value.trim(),
      }));
      const sessions = document.getElementById('stSessions').value.split(',').map((x) => x.trim()).filter(Boolean);
      try {
        await api('/api/secret-area-strategy?id=' + encodeURIComponent(s.id), {
          method: 'PUT', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify({
            name:         document.getElementById('stEditName').value.trim(),
            entry_signal: document.getElementById('stEntry').value.trim(),
            sl_signal:    document.getElementById('stSL').value.trim(),
            tp_signal:    document.getElementById('stTP').value.trim(),
            risk_pct:     Number(document.getElementById('stRisk').value) || null,
            sessions,
            steps, checklist,
          }),
        });
        toast('Opgeslagen', 'success');
        await loadWorkspace(); await loadStrategy(s.id); renderPane();
      } catch (e) { toast('Opslaan mislukt: ' + e.message, 'error'); }
    });
  }

  // Checklist tab — leef-tabel voor grade.

      p.innerHTML = '<div class="sa-card sa-empty">Kies eerst een strategie in "Strategie".</div>';
      return;
    }
    const grade = computeGrade();

      '<div class="cockpit" style="margin-bottom:14px"><div class="lbl">Live grade</div>'
      + '<div class="disp" style="font-size:34px;margin-top:6px">' + (grade ? '<span class="sa-grade ' + grade + '">' + grade + '</span>' : '—') + '</div></div>'
