            const reqRow = (r) => ''
              + '<div class="sa-row-item" style="padding:6px 10px">'
              +   '<span style="min-width:20px">' + (r.met ? '<i class="ti ti-check" style="color:var(--color-success,#059669)"></i>' : '<i class="ti ti-x" style="color:var(--color-danger,#dc2626)"></i>') + '</span>'
              +   '<span style="flex:1"><b>' + esc(r.label || '') + '</b>'
              +     (r.kind === 'confluentie' ? ' <span style="font-size:11px;color:var(--text-dim)">(weight ' + esc(String(r.weight ?? 0)) + ')</span>' : '')
              +     (r.note ? '<div style="font-size:11.5px;color:var(--text-dim);margin-top:2px">' + esc(r.note) + '</div>' : '')
              +   '</span>'
              + '</div>';

            return ''
              + '<div class="sa-card" style="margin-top:14px">'
              +   '<h2><i class="ti ti-target"></i> Setup-oordeel</h2>'
              +   '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px">'
              +     '<span class="mono" style="color:var(--text-dim)">model:</span> <b>' + esc(chosen) + '</b>'
              +     mismatchHint
              +   '</div>'
              +   '<div class="sa-grid sa-grid-2" style="margin-bottom:10px">'
              +     '<div class="sa-card" style="padding:10px 14px;background:var(--brand-primary-soft, rgba(9,61,84,0.06))">'
              +       '<div class="lbl">Volgens jouw regels</div>'

              +       '</div>'
              +       (reqOnly.length
                        ? '<div style="font-size:12px;color:var(--text-dim);margin-top:6px">' + reqOkCount + '/' + reqOnly.length + ' vereist aanwezig'

                          + '</div>'
                        : '')
              +     '</div>'
              +     '<div class="sa-card" style="padding:10px 14px">'
              +       '<div class="lbl">AI-oordeel</div>'
              +       '<div style="display:flex;gap:10px;align-items:center;margin-top:4px">'
              +         (aiClass ? '<span class="sa-grade ' + aiClass + '">' + aiClass + '</span>' : '<span class="sa-st todo">n.v.t.</span>')
              +         '<span class="sa-st ' + (aiValid ? 'done' : 'todo') + '">' + (aiValid ? 'geldige setup' : 'geen geldige setup') + '</span>'
              +       '</div>'
              +     '</div>'
              +   '</div>'
              +   (verdict.reason ? '<div style="font-size:13px;color:var(--text);white-space:pre-wrap;margin-bottom:10px">' + esc(verdict.reason) + '</div>' : '')
              +   (reqOnly.length
                    ? '<div style="margin-top:8px"><div class="lbl">Vereist</div>' + reqOnly.map(reqRow).join('') + '</div>'

        + '<div class="sa-card" style="margin-top:14px"><h2><i class="ti ti-tool"></i> Tool-detecties</h2>'
        + (dets.length === 0
            ? '<div class="sa-empty">Geen tools herkend in deze beelden.</div>'
            : dets.map((d) => {
                const status = d.status || 'pending';
                const linked = !!d.tool_id;
                return '<div class="sa-row-item" style="flex-wrap:wrap;align-items:flex-start" data-det-id="' + esc(d.id) + '">'
                  + '<div style="flex:1;min-width:220px">'
                  +   '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'
                  +     '<b>' + esc(d.tool_name || '(onbekend)') + '</b>'
                  +     _tfPill(d.timeframe)
                  +     _confPill(d.confidence)
                  +     _statusPill(status)
                  +     (linked ? '' : '<span class="sa-st todo">niet gekoppeld aan tool</span>')
                  +   '</div>'
                  +   (d.ai_reason ? '<div style="font-size:12.5px;color:var(--sa-tx-mid);margin-top:4px">' + esc(d.ai_reason) + '</div>' : '')
                  +   (status === 'pending'
                        ? '<textarea class="sa-textarea" data-det-note="' + esc(d.id) + '" placeholder="Jouw uitleg — waarom klopt/niet-klopt dit? (optioneel)" style="margin-top:8px;min-height:56px">'
                          + esc(state.analyse.notes[d.id] || '') + '</textarea>'
                        : (d.user_note ? '<div style="font-size:12px;color:var(--sa-tx-dim);margin-top:6px;font-style:italic">"' + esc(d.user_note) + '"</div>' : ''))
                  + '</div>'
                  + '<div style="display:flex;flex-direction:column;gap:6px;margin-left:auto">'
                  +   (status === 'pending'
                        ? '<button class="sa-btn" data-det-act="confirm" data-det-id="' + esc(d.id) + '"><i class="ti ti-check"></i>Bevestig</button>'
                          + '<button class="sa-btn sa-btn-ghost" data-det-act="reject" data-det-id="' + esc(d.id) + '"><i class="ti ti-x"></i>Afwijzen</button>'

    // Logboek — container krijgt id="anLogBox" zodat renderAnalyseLog()
    // 'm partial kan updaten zonder de rest van de pane te vervangen.
    const log = state.analyse.log || { analyses: [], detections: [] };
    const logRows = (log.analyses || []).slice(0, 8).map((a) => {
      const verdict = a.setup_verdict || {};
      const dets = (log.detections || []).filter((d) => d.analysis_id === a.id);
      const gradeClass = ['A+','B','C'].includes(a.grade) ? a.grade : '';
      return '<div class="sa-row-item">'
        + '<span style="color:var(--sa-tx-dim);font-size:12px;min-width:110px">' + esc((a.created_at || '').slice(0,16).replace('T',' ')) + '</span>'
        + '<div style="flex:1">'
        +   '<div><b>' + esc(verdict.model || 'setup n.v.t.') + '</b> '
        +     (gradeClass ? '<span class="sa-grade ' + gradeClass + '" style="margin-left:6px">' + gradeClass + '</span>' : '')
        +     ' <span style="font-size:11.5px;color:var(--sa-tx-dim);margin-left:6px">' + esc(a.source || '') + '</span>'
        +   '</div>'
        +   (a.ai_summary ? '<div style="font-size:12px;color:var(--sa-tx-mid);margin-top:2px">' + esc(a.ai_summary).slice(0, 220) + '</div>' : '')
        +   '<div style="font-size:11px;color:var(--sa-tx-dim);margin-top:2px">' + dets.length + ' detectie(s) · '
        +     dets.filter((d) => d.status === 'confirmed').length + ' bevestigd</div>'
        + '</div>'
        + (a.source_url ? '<a href="' + esc(a.source_url) + '" target="_blank" rel="noopener" style="color:var(--sa-azure);font-size:12px">bron ↗</a>' : '')
        + '</div>';
    }).join('') || (state.analyse.log === null ? '<div class="sa-empty">Logboek laden…</div>' : '<div class="sa-empty">Nog geen analyses.</div>');

    p.innerHTML =
      '<div class="sa-card"><h2><i class="ti ti-sparkles"></i> Nieuwe chart-analyse (multi-timeframe)</h2>'
      +   '<p style="color:var(--sa-tx-mid);font-size:13px;margin-bottom:12px">Lever een beeld aan voor <b>4H</b> (context/bias) en/of <b>15M</b> (uitvoering). Minstens één is vereist; beide levert het beste oordeel. Elk beeld: TradingView-snapshotlink of upload.</p>'
      +   tfBlocks
      +   '<div style="margin-top:8px">' + stratPicker + '</div>'
      +   '<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">'
      +     '<button class="sa-btn" id="anRun"' + (state.analyse.busy ? ' disabled' : '') + '>'
      +       '<i class="ti ' + (state.analyse.busy ? 'ti-loader' : 'ti-brain') + '"></i>'
      +       (state.analyse.busy ? 'Analyseren…' : 'Analyseer')
      +     '</button>'
      +     (cur ? '<button class="sa-btn sa-btn-ghost" id="anReset"><i class="ti ti-refresh"></i>Nieuwe analyse</button>' : '')
      +   '</div>'
      +   '<div id="anErr" class="sa-err"></div>'
      + '</div>'
      + result
      + '<div class="sa-card" style="margin-top:14px"><h2><i class="ti ti-history"></i> Recente analyses</h2>'
      +   '<div id="anLogBox">' + logRows + '</div>'
      + '</div>';

    // Wire tvUrl-inputs per TF: keystroke → alleen state. GEEN renderPane.
    // Zo blijft de waarde behouden tijdens typen, ongeacht async fetches.
    const h4El = document.getElementById('anTvUrlH4');
    if (h4El)  h4El.addEventListener('input',  () => { state.analyse.h4.tvUrl  = String(h4El.value  || ''); });
    const m15El = document.getElementById('anTvUrlM15');
    if (m15El) m15El.addEventListener('input', () => { state.analyse.m15.tvUrl = String(m15El.value || ''); });
    // Wire per-detectie textarea: idem — state-persist zonder renderPane.
    p.querySelectorAll('textarea[data-det-note]').forEach((el) => {
      el.addEventListener('input', () => {
        const id = el.getAttribute('data-det-note');
        if (id) state.analyse.notes[id] = String(el.value || '');
      });
    });
    // Wire TF-mode-toggle (per TF, formaat "h4:link" of "m15:upload"):
    // sync huidige inputs → state VOOR re-render, zodat de tvUrl van beide TF's
    // over de link↔upload-wissel heen bewaard blijft.
    p.querySelectorAll('[data-tf-mode]').forEach((b) => b.addEventListener('click', () => {
      _saSyncAnalyseInputs();
      const [tf, mode] = String(b.dataset.tfMode || '').split(':');
      if ((tf === 'h4' || tf === 'm15') && (mode === 'link' || mode === 'upload')) {
        state.analyse[tf].mode = mode;
      }
      renderPane();
    }));
    // Wire Analyseer.
    document.getElementById('anRun')?.addEventListener('click', () => runAnalyse());
    document.getElementById('anReset')?.addEventListener('click', () => {
      state.analyse.current = null;
      state.analyse.notes = {};
      state.analyse.h4.tvUrl  = '';
      state.analyse.m15.tvUrl = '';
      renderPane();
    });
    // Wire detectie-acties.
    p.querySelectorAll('[data-det-act]').forEach((b) => b.addEventListener('click', async () => {
      const detId  = b.dataset.detId;
      const action = b.dataset.detAct;
      const status = action === 'confirm' ? 'confirmed' : 'rejected';
      // Sync alle actieve inputs vóór de POST, zodat renderPane() na-de-fetch
      // niets kwijtraakt en de note van deze detectie wordt meegestuurd.
      _saSyncAnalyseInputs();
      const note = String(state.analyse.notes[detId] || '').trim();
      b.disabled = true;
      try {
        const d = await api('/api/secret-area-analyze', {
          method:  'POST', headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ action: 'confirm', detection_id: detId, status, user_note: note }),
        });
        // Merge terug in state.analyse.current.
        if (state.analyse.current) {
          const cur = state.analyse.current;
          cur.detections = (cur.detections || []).map((x) => x.id === detId ? { ...x, ...d.detection } : x);
        }
        // Bevestigd/afgewezen → deze note is verwerkt; wis 'm uit state.
        delete state.analyse.notes[detId];
        // Logboek verversen (partial in .then na renderPane).
        loadAnalyseLog().then(() => { if (state.tab === 'analyse') renderAnalyseLog(); });
        toast(status === 'confirmed'
          ? (d.example_created ? 'Bevestigd + als voorbeeld toegevoegd' : 'Bevestigd')
          : 'Afgewezen', 'success');
        renderPane();
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
      finally { b.disabled = false; }
    }));
    // Wire "Verscherp deze tool" — sluit door naar bestaand /api/secret-area-ai.
    p.querySelectorAll('[data-det-sharp]').forEach((b) => b.addEventListener('click', async () => {
      const toolId = b.dataset.detSharp;
      b.disabled = true;
      try {
        const d = await api('/api/secret-area-ai', {
          method:  'POST', headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ tool_id: toolId, save: true }),
        });
        if (d.saved) toast('Tool-regel bijgewerkt (' + (d.images_used || 0) + ' voorbeelden meegenomen)', 'success');
        else toast('AI-antwoord ontvangen, opslaan mislukt: ' + (d.save_error || 'onbekend'), 'error');
      } catch (e) { toast('Verscherpen mislukt: ' + e.message, 'error'); }
      finally { b.disabled = false; }
    }));
  }

  // Inline validatie-melding — nooit stil stoppen. Toont in #anErr en
  // (indien geen anErr) via toast als backup.
  function _saAnalyseError(msg) {
    const errEl = document.getElementById('anErr');
    if (errEl) errEl.textContent = msg;
    else toast(msg, 'error');
  }

  // Bouw één TF-block voor de POST-body. Retourneert
  // { block?, previewDataUrl?, error? } — error is een inline-melding.
  async function _buildTfBlock(tf, label) {
    const st = state.analyse[tf];
    if (st.mode === 'link') {
      const tvUrl = String(st.tvUrl || '').trim();
      if (!tvUrl) return { skipped: true }; // niets ingevuld → deze TF overslaan
      if (!TV_URL_CLIENT_RE.test(tvUrl)) {
        return { error: label + ': deze link matcht niet met een TradingView-snapshot (/x/CODE). Kopieer de "Copy link"-URL vanuit TradingView.' };
      }
      return {
        block: { source: 'link', tvlink: tvUrl },
        previewSourceUrl: tvUrl,
      };
    }
    // Upload
    const fileInputId = tf === 'h4' ? 'anFileH4' : 'anFileM15';
    const file = document.getElementById(fileInputId)?.files?.[0];
    if (!file) return { skipped: true };
    try {
      const buf = await file.arrayBuffer();
      const b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
      const ct  = file.type || 'image/png';
      return {
        block: { source: 'upload', filename: file.name, content_type: ct, data_base64: b64 },
        previewDataUrl: 'data:' + ct + ';base64,' + b64,
      };
    } catch (e) {
      return { error: label + ': kon bestand niet lezen — ' + (e?.message || 'onbekend') };
    }
  }

  async function runAnalyse() {
    // Sync alle actieve DOM-inputs naar state VOOR we iets doen — zo lezen
    // we de laatste keystroke betrouwbaar uit state (single source of truth).
    _saSyncAnalyseInputs();
    const errEl = document.getElementById('anErr');
    if (errEl) errEl.textContent = '';

    const strategyEl = document.getElementById('anStrategy');
    const strategyId = strategyEl ? String(strategyEl.value || '').trim() : '';

    // Bouw beide TF-blocks. Elke returnt { skipped } (leeg), { block } (klaar)
    // of { error } (ongeldig invoer). Inline-meldingen; nooit stil stoppen.
    const [h4, m15] = await Promise.all([
      _buildTfBlock('h4',  '4H'),
      _buildTfBlock('m15', '15M'),
    ]);
    if (h4.error)  { _saAnalyseError(h4.error);  return; }
    if (m15.error) { _saAnalyseError(m15.error); return; }
    if (!h4.block && !m15.block) {
      _saAnalyseError('Vul minstens één timeframe in (4H of 15M) — plak een TradingView-link of upload een screenshot.');
      return;
    }

    const body = { action: 'analyze', strategy_id: strategyId || null };
    if (h4.block)  body.h4  = h4.block;
    if (m15.block) body.m15 = m15.block;

    // Preview-URLs per TF (data-URL bij upload voor directe preview; source_url
    // bij link — server-side ingest slaat 'm ook op, dus dat komt later terug).
    const h4Preview  = h4.previewDataUrl  || h4.previewSourceUrl  || null;
    const m15Preview = m15.previewDataUrl || m15.previewSourceUrl || null;

    // Actie: knop op "Analyseren…" en re-render éénmaal om busy te tonen.
    state.analyse.busy = true;
    renderPane();

    try {
      const d = await api('/api/secret-area-analyze', {
        method:  'POST', headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(body),
      });
      state.analyse.current = {
        analysis:   d.analysis,
        detections: d.detections || [],
        setup:      d.setup,
        _h4DataUrl:  h4Preview,
        _m15DataUrl: m15Preview,
      };
      // Notes-map opnieuw beginnen voor de nieuwe detectie-set.
      state.analyse.notes = {};
      // Logboek verversen — partial na renderPane (niet vervangend).
      loadAnalyseLog().then(() => { if (state.tab === 'analyse') renderAnalyseLog(); });
      toast('Analyse klaar', 'success');
    } catch (e) {
      const msg = (e && e.message) ? e.message : 'Onbekende server-fout';
      _saAnalyseError('Analyse mislukt: ' + msg);
    } finally {
      state.analyse.busy = false;
      if (state.tab === 'analyse') renderPane();
    }
  }

  // ── Trades gecombineerd — input + list op één pagina ─────────────────
  function renderTradesCombined(p) {
    p.innerHTML = '<div id="trFormMount" style="margin-bottom:14px"></div><div id="trListMount"></div>';

      +   '<select class="sa-select" id="trDir"><option value="long">Long</option><option value="short">Short</option></select>'
      + '</div>'
      + '<div class="sa-grid sa-grid-3" style="margin-top:6px">'
      +   '<input class="sa-input mono" id="trEntry" type="number" step="0.0001" placeholder="Entry"/>'
      +   '<input class="sa-input mono" id="trSL"    type="number" step="0.0001" placeholder="SL"/>'
      +   '<input class="sa-input mono" id="trTP"    type="number" step="0.0001" placeholder="TP"/>'
      + '</div>'
      + '<div class="sa-grid sa-grid-3" style="margin-top:6px">'
      +   '<input class="sa-input mono" id="trExit" type="number" step="0.0001" placeholder="Exit"/>'
      +   '<input class="sa-input mono" id="trRR"   type="number" step="0.01"   placeholder="R multiple"/>'
      +   '<input class="sa-input mono" id="trPnl"  type="number" step="0.01"   placeholder="PnL (€)"/>'
      + '</div>'
      + '<textarea class="sa-textarea" id="trNotes" placeholder="Notitie" style="margin-top:6px"></textarea>'
      + '<div class="sa-grid sa-grid-2" style="margin-top:6px">'
      +   '<input type="file" id="trFile" accept="image/png,image/jpeg,image/webp"/>'
      +   '<input class="sa-input" id="trTvUrl" placeholder="of TradingView-link"/>'
      + '</div>'
      + '<div style="margin-top:10px"><div class="lbl">Berekende grade uit checklist: '
      + (g ? '<span class="sa-grade ' + g + '">' + g + '</span>' : '—') + '</div></div>'
      + '<div style="margin-top:12px"><button class="sa-btn" id="trSubmit"><i class="ti ti-plus"></i>Trade opslaan</button></div>'
      + '</div>';
    document.getElementById('trSubmit')?.addEventListener('click', async () => {
      const btn = document.getElementById('trSubmit'); btn.disabled = true;
      try {
        const file  = document.getElementById('trFile').files[0];
        const tvUrl = document.getElementById('trTvUrl').value.trim();
        // Trade insert eerst om ref_id te krijgen. De upload-endpoint slaat
        // het bestand in de bucket op; koppeling aan de trade volgt in een
        // refresh-PR (er is nog geen PATCH).
        const payload = {
          strategy_id:  state.activeStrategyId || null,
          occurred_at:  new Date().toISOString(),
          instrument:   document.getElementById('trInstr').value.trim(),
          direction:    document.getElementById('trDir').value,
          entry:        parseFloat(document.getElementById('trEntry').value) || null,
          sl:           parseFloat(document.getElementById('trSL').value)    || null,
          tp:           parseFloat(document.getElementById('trTP').value)    || null,
          exit:         parseFloat(document.getElementById('trExit').value)  || null,
          r_multiple:   parseFloat(document.getElementById('trRR').value)    || null,
          pnl:          parseFloat(document.getElementById('trPnl').value)   || null,
          grade:        g,
          notes:        document.getElementById('trNotes').value.trim(),
          images: [],
          tools:  [],
        };
        const d = await api('/api/secret-area-trade', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body:   JSON.stringify(payload),
        });
        const tradeId = d.trade?.id;
        if (tradeId && (file || tvUrl)) {
          try {
            if (file) await uploadFile(file, 'trade', tradeId);
            else      await uploadTv(tvUrl, 'trade', tradeId);
            toast('Trade opgeslagen (afbeelding is geüpload).', 'success');
          } catch (e) { toast('Afbeelding upload faalde: ' + e.message, 'error'); }
        } else {
          toast('Trade opgeslagen.', 'success');
        }
        await loadTrades(); renderPane();
      } catch (e) { toast('Opslaan mislukt: ' + e.message, 'error'); }
      finally { btn.disabled = false; }
    });
  }

  function renderTradesList(p) {
    const t = state.trades.list || [];
    const s = state.trades.stats || {};
    p.innerHTML =
      '<div class="cockpit" style="margin-bottom:14px"><div class="sa-strip">'
      + cell('Win-rate', (s.win_rate || 0) + '%')
      + cell('Gem. RR',  s.avg_rr  || 0)
      + cell('Expectancy (€)', s.expectancy || 0)
      + cell('# Trades', s.count || 0)
      + '</div>'
      + '<div class="lbl" style="margin-top:12px">Win-rate per grade</div>'
      + '<div class="sa-strip">'
      + ((s.per_grade || []).map((r) => cell(r.grade, r.win_rate + '% (' + r.count + ')')).join('') || '<span style="color:var(--sa-tx-dim)">nog geen data</span>')
      + '</div></div>'
      + '<div class="sa-card"><h2><i class="ti ti-chart-line"></i> Trades</h2>'
      + (t.length === 0
        ? '<div class="sa-empty">Nog geen trades — leg je eerste vast in "Trades".</div>'
        : t.map((tr) =>
            '<div class="sa-row-item">'
            + (tr.grade ? '<span class="sa-grade ' + tr.grade + '">' + tr.grade + '</span>' : '')
            + '<span class="mono" style="min-width:110px">' + esc(tr.instrument || '') + ' ' + esc(tr.direction || '') + '</span>'
            + '<span class="mono">' + (Number.isFinite(tr.r_multiple) ? (tr.r_multiple + 'R') : '') + '</span>'
            + '<span class="mono" style="flex:1">' + (Number.isFinite(tr.pnl) ? ('€ ' + tr.pnl.toFixed(2)) : '') + '</span>'
            + '<span style="color:var(--sa-tx-dim);font-size:12px">' + esc((tr.occurred_at || '').slice(0,10)) + '</span>'
            + '<button class="sa-btn sa-btn-danger" data-del-tr="' + esc(tr.id) + '"><i class="ti ti-trash"></i></button>'
            + '</div>'
          ).join(''))
      + '</div>';
    p.querySelectorAll('[data-del-tr]').forEach((b) => b.addEventListener('click', async () => {
      if (!confirm('Trade verwijderen?')) return;
      try {
        await api('/api/secret-area-trade?id=' + encodeURIComponent(b.dataset.delTr), { method: 'DELETE' });
        await loadTrades(); renderPane(); toast('Verwijderd', 'success');
      } catch (e) { toast('Fout: ' + e.message, 'error'); }
    }));
  }

  // Upload helpers.
  async function uploadFile(file, kind, refId) {
    const buf = await file.arrayBuffer();
    const b64 = btoa(String.fromCharCode.apply(null, new Uint8Array(buf)));
    return await api('/api/secret-area-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body:   JSON.stringify({
        kind, ref_id: refId,
        filename:     file.name,
        content_type: file.type || 'image/png',
        data_base64:  b64,
      }),
    });
  }
  async function uploadTv(url, kind, refId) {
    return await api('/api/secret-area-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body:   JSON.stringify({ kind, ref_id: refId, tradingview_url: url }),
    });
  }

  // ── PIN gate ─────────────────────────────────────────────────────────
  function showPinForm() {
    ROOT.innerHTML =
      '<div class="sa-pincard">'
      + '<h2>Voer je PIN in</h2>'
      + '<p>Toegang tot deze pagina is met een PIN beveiligd. PIN wordt nergens opgeslagen of doorgegeven aan derden.</p>'
      + '<input id="saPin" type="password" inputmode="numeric" autocomplete="off" class="sa-input" placeholder="PIN"/>'
      + '<div style="margin-top:12px;display:flex;gap:10px"><button id="saUnlock" type="button" class="sa-btn"><i class="ti ti-lock-open"></i>Ontgrendelen</button></div>'
      + '<div id="saErr" class="sa-err" role="alert" aria-live="polite"></div>'
      + '</div>';
    const pinEl = document.getElementById('saPin');
    const btn   = document.getElementById('saUnlock');
    const errEl = document.getElementById('saErr');
    async function submit() {
      const pin = String(pinEl.value || '').trim();
      if (!pin) { errEl.textContent = 'PIN is leeg.'; return; }
      btn.disabled = true; errEl.textContent = '';
      try {
        const r = await apiFetch()('/api/secret-area', {
          method: 'POST', headers: { 'Content-Type':'application/json' },
          body:   JSON.stringify({ pin }),
        });
        let d = null; try { d = await r.json(); } catch (_) {}
        if (r.ok && d && d.ok === true) {
          // Unlock: laad data + toon werkplek. State alleen in memory.
          // Home is de default landing (state.tab = 'home').
          await Promise.all([loadWorkspace(), loadTrades(), loadConditions()]);
          renderWorkspace();
          return;
        }
        if (r.status === 403) { showDenied('Geen toegang tot deze pagina.'); return; }
        errEl.textContent = 'Onjuiste PIN.';
      } catch (_) { errEl.textContent = 'Verbinding mislukt.'; }
      finally { btn.disabled = false; pinEl.value = ''; try { pinEl.focus(); } catch (_) {} }
    }
    btn.addEventListener('click', submit);
    pinEl.addEventListener('keydown', (ev) => { if (ev.key === 'Enter') { ev.preventDefault(); submit(); } });
    try { pinEl.focus(); } catch (_) {}
  }

  async function init() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch (_) {}
    if (window.AuthShared && typeof window.AuthShared.requireAuth === 'function') {
      const profile = await window.AuthShared.requireAuth();
      if (!profile) return;
    }
    try {
      if (!apiFetch()) { showDenied(); return; }
      const r = await apiFetch()('/api/secret-area');
      const d = await r.json().catch(() => ({}));
      if (r.ok && d && d.allowed === true) { showPinForm(); return; }
      showDenied();
    } catch (_) { showDenied(); }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
</body>
</html>
