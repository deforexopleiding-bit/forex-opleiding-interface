    const cs = getComputedStyle(document.documentElement);
    const up   = (cs.getPropertyValue('--color-success') || '#25c79b').trim() || '#25c79b';
    const down = (cs.getPropertyValue('--color-danger')  || '#dc2626').trim() || '#dc2626';
    const grid = (cs.getPropertyValue('--sa-line') || '#e5e7eb').trim() || '#e5e7eb';
    const text = (cs.getPropertyValue('--sa-tx')   || '#1f2937').trim() || '#1f2937';

    const chart = window.LightweightCharts.createChart(chartEl, {
      layout: { background: { type: 'solid', color: settings.colors.background }, textColor: text, fontSize: 11 },
      grid:   {
        vertLines: { visible: settings.grid.vert, color: settings.grid.vertColor },
        horzLines: { visible: settings.grid.horz, color: settings.grid.horzColor },
      },
      timeScale: {
        timeVisible: true, secondsVisible: false, borderColor: grid,
        tickMarkFormatter: (t, type) => _saFmtTick(t, type, settings),
      },
      localization: { timeFormatter: (t) => _saFmtFull(t, settings) },
      rightPriceScale: { borderColor: grid },
      // Crosshair-mode uit de settings (magneet-toggle). UIT = vrij (mode 0);
      // AAN = MagnetOHLC (klemt aan dichtstbijzijnde OHLC incl. wick, v4.1+)
      // met terugval op Magnet (mode 1) als die enum niet bestaat. Labels op
      // beide assen zichtbaar zodat de waarde-uitlezing altijd meebeweegt.
      crosshair: {
        mode: _crosshairMode(),
        vertLine: { visible: true, labelVisible: true, color: settings.colors.crosshair, style: 3 },
        horzLine: { visible: true, labelVisible: true, color: settings.colors.crosshair, style: 3 },
      },
      width: chartEl.clientWidth,
      height: chartHeight,
    });

    // Resize-observer zodat de chart mee-ademt met het paneel (tab-switch,
    // window-resize, watchlist-kolom, én fullscreen open/sluit). Volgt zowel de
    // breedte als de hoogte van het chart-element (in fullscreen groeit die mee).
    const ro = new ResizeObserver(() => {
      try {
        const w = chartEl.clientWidth;
        const h = chartEl.clientHeight || chartHeight;
        chart.applyOptions({ width: w, height: h });
      } catch (_) {}
    });
    ro.observe(chartEl);

    // NB: outer scope heeft al een `state`-const (globale app-state); daarom
    // heet de component-scoped state hier `cx` om schaduwing te vermijden.
    //
    // cx.candles: geordende Map<epochSec, candle>. We houden alles wat we ooit
    // hebben opgehaald in memory zodat lazy-load naar links een simpele
    // prepend-merge is en de series in één setData-call geüpdatet wordt.
    // cx.oldestSec: kleinste time van de gehaalde set — startpunt voor 'before'.
    // cx.loadingOlder / cx.exhausted: gate tegen overlappende + zinloze fetches.
    // cx.hist / cx.live: aparte AbortControllers zodat een lazy-load nooit een
    // live-tick aborteert en andersom.
    // cx.seriesType: huidige stijl van de gemounte serie; bij wissel herbouwen.
    const cx = {
      chart, series: null, ro,
      hist: null, live: null,
      timer: null,
      pair: cfg.instrument,
      tf  : cfg.granularity,
      candles: new Map(),
      sortedTimes: [], // opgebouwd door _applySeries — voor snelle "prev candle" lookup
      oldestSec: null,
      loadingOlder: false,
      exhausted: false,
      generation: 0, // bump bij pair/tf-wissel zodat stale responses genegeerd worden
      precision: _oandaPrecisionFor(cfg.instrument),
      seriesType: settings.style,
    };
    container._oanda = cx;
    _oandaActive.add(container);

    // Serie-fabriek: bouwt de juiste serie voor de gekozen stijl (candles/
    // lijn/area) MET behoud van priceFormat (precisie per instrument) én de
    // prijs-label/priceLine-opties. Wordt gebruikt bij init én bij stijl-wissel.
    function makeSeries() {
      const common = {
        lastValueVisible: true,
        priceLineVisible: true,
        priceLineWidth  : 1,
        priceLineStyle  : 2,
        priceFormat     : _oandaPriceFormatFor(cx.pair),
      };
      const c = settings.colors;
      if (settings.style === 'line') {
        return cx.chart.addLineSeries(Object.assign({}, common, { color: c.bodyUp, lineWidth: 2 }));
      }
      if (settings.style === 'area') {
        return cx.chart.addAreaSeries(Object.assign({}, common, {
          lineColor: c.bodyUp, topColor: _saRgba(c.bodyUp, 0.30), bottomColor: _saRgba(c.bodyUp, 0.02), lineWidth: 2,
        }));
      }
      return cx.chart.addCandlestickSeries(Object.assign({}, common, {
        upColor: c.bodyUp, downColor: c.bodyDown,
        borderVisible: true, borderUpColor: c.borderUp, borderDownColor: c.borderDown,
        wickUpColor: c.wickUp, wickDownColor: c.wickDown,
      }));
    }

    // Één candle → serie-datapunt in de vorm die de huidige stijl vereist.
    // Bij 'colorByPrevClose' krijgt een candlestick per-punt kleuren o.b.v. de
    // vorige close i.p.v. eigen open/close.
    function _toSeriesPoint(cndl, prevClose) {
      if (settings.style === 'line' || settings.style === 'area') {
        return { time: cndl.time, value: cndl.close };
      }
      const pt = { time: cndl.time, open: cndl.open, high: cndl.high, low: cndl.low, close: cndl.close };
      if (settings.colorByPrevClose && Number.isFinite(prevClose)) {
        const c = settings.colors;
        const isUp = cndl.close >= prevClose;
        pt.color       = isUp ? c.bodyUp   : c.bodyDown;
        pt.borderColor = isUp ? c.borderUp : c.borderDown;
        pt.wickColor   = isUp ? c.wickUp   : c.wickDown;
      }
      return pt;
    }

    cx.series = makeSeries();

    // Crosshair-mode uit de magneet-toggle. UIT → Normal (vrij bewegen).
    // AAN → MagnetOHLC (klemt aan het dichtstbijzijnde OHLC-niveau van de
    // candle onder de cursor, INCLUSIEF de wick high/low — v4.1+), met
    // terugval op Magnet (close/body) als die enum in deze build ontbreekt.
    function _crosshairMode() {
      const CM = (window.LightweightCharts && window.LightweightCharts.CrosshairMode) || {};
      // Effectief magneet = toggle OF Shift ingedrukt.
      if (!settings.magnet && !shiftHeld) return (CM.Normal != null ? CM.Normal : 0);
      if (CM.MagnetOHLC != null) return CM.MagnetOHLC;
      if (CM.Magnet != null) return CM.Magnet;
      return 1;
    }

    function setLive(status) {
      if (!liveDot || !liveTxt) return;
      if (status === 'busy')  { liveDot.style.background = 'var(--sa-amber)'; liveTxt.textContent = 'laden…'; }
      if (status === 'live')  { liveDot.style.background = up;                 liveTxt.textContent = 'live'; }
      if (status === 'error') { liveDot.style.background = down;               liveTxt.textContent = 'fout'; }
      if (status === 'idle')  { liveDot.style.background = 'var(--sa-tx-dim)'; liveTxt.textContent = 'idle'; }
      if (status === 'older') { liveDot.style.background = 'var(--sa-azure, var(--sa-amber))'; liveTxt.textContent = 'ouder…'; }
    }
    function showErr(msg) {
      if (!errEl) return;
      if (!msg) { errEl.style.display = 'none'; errEl.textContent = ''; return; }
      errEl.style.display = ''; errEl.textContent = msg;
    }

    function _applySeries() {
      // Rebuild sorted array uit Map. Cheap voor 1500..15000 candles; O(n log n)
      // op sort. Lightweight Charts vereist strict-ascending unieke tijden.
      const arr = Array.from(cx.candles.values()).sort((a, b) => a.time - b.time);
      // Map naar de vorm die de huidige stijl vereist (candles vs line/area) en
      // decoreer per-punt bij colorByPrevClose. prevClose = close van de candle
      // direct ervoor.
      const data = arr.map((c, i) => _toSeriesPoint(c, i > 0 ? arr[i - 1].close : null));
      try { cx.series.setData(data); } catch (_) {}
      cx.oldestSec = arr.length ? arr[0].time : null;
      cx.sortedTimes = arr.map((c) => c.time);
      // Default OHLC-balk = laatste candle (geen hover-context).
      _updateOhlc(null);
    }

    // OHLC-balk syncer. Ontvangt (optioneel) een epoch-seconds als hover-tijd;
    // zonder tijd of buiten data-range fallback naar de laatste candle.
    // Vorige-candle voor delta = candle met time direct kleiner dan target.
    function _updateOhlc(hoverTime) {
      if (!ohlcOEl) return;
      if (!cx.candles.size) {
        ohlcOEl.textContent = '—'; ohlcHEl.textContent = '—';
        ohlcLEl.textContent = '—'; ohlcCEl.textContent = '—';
        if (ohlcDelta) { ohlcDelta.textContent = '—'; ohlcDelta.style.color = 'var(--sa-tx-mid)'; }
        return;
      }
      let target = null;
      if (Number.isFinite(hoverTime) && cx.candles.has(hoverTime)) {
        target = cx.candles.get(hoverTime);
      } else {
        // Laatste candle uit sortedTimes.
        const lastT = cx.sortedTimes[cx.sortedTimes.length - 1];
        target = cx.candles.get(lastT);
      }
      if (!target) return;
      const p = cx.precision;
      ohlcOEl.textContent = _oandaFormatPrice(target.open,  p);
      ohlcHEl.textContent = _oandaFormatPrice(target.high,  p);
      ohlcLEl.textContent = _oandaFormatPrice(target.low,   p);
      ohlcCEl.textContent = _oandaFormatPrice(target.close, p);
      // Vorige candle voor delta.
      const idx = cx.sortedTimes.indexOf(target.time);
      const prev = idx > 0 ? cx.candles.get(cx.sortedTimes[idx - 1]) : null;
      if (prev && Number.isFinite(prev.close) && Number.isFinite(target.close)) {
        const diff = target.close - prev.close;
        const pct  = prev.close !== 0 ? (diff / prev.close) * 100 : 0;
        const sign = diff > 0 ? '+' : (diff < 0 ? '−' : '');
        const absDiff = Math.abs(diff);
        const pctStr  = (pct >= 0 ? '+' : '−') + Math.abs(pct).toFixed(2) + '%';
        ohlcDelta.textContent = sign + _oandaFormatPrice(absDiff, p) + '  (' + pctStr + ')';
        ohlcDelta.style.color = diff > 0 ? up : (diff < 0 ? down : 'var(--sa-tx-mid)');
        ohlcDelta.style.fontWeight = '600';
      } else {
        ohlcDelta.textContent = '—';
        ohlcDelta.style.color = 'var(--sa-tx-mid)';
        ohlcDelta.style.fontWeight = '400';
      }
    }

    // Crosshair-subscribe: bij hover over een candle → OHLC-balk syncen met
    // die candle. Bij leave (geen time) → laatste candle. Draait binnen de
    // browser-eventloop; goedkoop, geen fetches.
    try {
      cx.chart.subscribeCrosshairMove((param) => {
        if (!param || param.time == null) { _updateOhlc(null); return; }
        // param.time is voor intraday-series een UNIX-seconds getal;
        // in v4 kan dat ook een BusinessDay-object zijn — daar filteren we op.
        const t = typeof param.time === 'number' ? param.time : null;
        _updateOhlc(t);
      });
    } catch (_) { /* v4 API-guard; fail-soft */ }

    async function fullReload() {
      showErr(null); setLive('busy');
      // Bump generation eerst zodat parallel-in-flight requests hun mapping
      // niet meer in de nieuwe series pushen.
      const gen = ++cx.generation;
      cx.candles.clear();
      cx.oldestSec = null;
      cx.exhausted = false;
      cx.loadingOlder = false;
      try {
        if (cx.hist) cx.hist.abort();
        cx.hist = new AbortController();
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, OANDA_INITIAL_COUNT, cx.hist.signal);
        if (gen !== cx.generation) return; // superseded
        const mapped = raw.map(_oandaMapCandle).filter(Boolean);
        for (const c of mapped) cx.candles.set(c.time, c);
        _applySeries();
        try { cx.chart.timeScale().fitContent(); } catch (_) {}
        setLive('live');
      } catch (e) {
        if (e?.name === 'AbortError') return;
        showErr('Candles laden mislukt: ' + (e?.message || 'onbekend'));
        setLive('error');
      }
    }

    async function loadOlder() {
      if (cx.loadingOlder || cx.exhausted) return;
      if (cx.oldestSec == null) return;
      cx.loadingOlder = true;
      const gen = cx.generation;
      const prevStatus = liveTxt?.textContent || '';
      setLive('older');
      try {
        if (cx.hist) cx.hist.abort();
        cx.hist = new AbortController();
        // 'before' = tijd van de OUDSTE candle die we al hebben. OANDA geeft
        // candles die eindigen op/vóór dit punt terug (v20 'to'). De oudste
        // die we al hebben duiken opnieuw op → dedup Map vangt dat af.
        // includeIncomplete=0 voor historische fetches: geen lopende candle nodig.
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, OANDA_OLDER_COUNT, cx.hist.signal, {
          beforeSec: cx.oldestSec,
          includeIncomplete: false,
        });
        if (gen !== cx.generation) return;
        const mapped = raw.map(_oandaMapCandle).filter(Boolean);
        // Tel hoeveel écht nieuw zijn (vóór de huidige oudste).
        let fresh = 0;
        for (const c of mapped) {
          if (!cx.candles.has(c.time)) {
            cx.candles.set(c.time, c);
            if (c.time < cx.oldestSec) fresh++;
          }
        }
        if (fresh === 0) {
          // OANDA gaf niks ouder terug → history is (praktisch) uitgeput.
          cx.exhausted = true;
        } else {
          _applySeries();
        }
        // Herstel status naar 'live' (of 'idle' als we niks meer terug gaan halen).
        setLive(cx.exhausted ? 'idle' : 'live');
      } catch (e) {
        if (e?.name === 'AbortError') return;
        showErr('Oudere candles laden mislukt: ' + (e?.message || 'onbekend'));
        setLive('error');
      } finally {
        cx.loadingOlder = false;
        // suppress-lint: prevStatus is momenteel ongebruikt maar dokumenteert intent.
        void prevStatus;
      }
    }

    // Countdown tot de huidige candle sluit. Lift mee op de bestaande 1s-tick-
    // timer (geen extra data-fetch): puur reken-werk op de laatste candle-tijd
    // + granularity-duur. Verborgen als de toggle uit staat of er nog geen data is.
    function _updateCountdown() {
      if (!countdownEl) return;
      if (!settings.countdown) { countdownEl.style.display = 'none'; return; }
      const lastT = cx.sortedTimes.length ? cx.sortedTimes[cx.sortedTimes.length - 1] : null;
      const dur = SA_TF_DURATION_SEC[cx.tf];
      if (!Number.isFinite(lastT) || !dur) { countdownEl.style.display = 'none'; return; }
      const rem = (lastT + dur) - (Date.now() / 1000);
      countdownEl.style.display = '';
      countdownEl.textContent = 'sluit in ' + _saFmtCountdown(rem);
    }

    async function liveTick() {
      // Countdown eerst en synchroon updaten zodat hij elke seconde loopt,
      // onafhankelijk van de fetch hieronder (en zonder extra fetch).
      _updateCountdown();
      // Alleen de laatste 2 candles ophalen (goedkoop) en de open-candle updaten.
      // Aparte AbortController zodat een lazy-load hem niet aborteert.
      const gen = cx.generation;
      try {
        if (cx.live) cx.live.abort();
        cx.live = new AbortController();
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, 2, cx.live.signal);
        if (gen !== cx.generation) return; // pair/tf tussentijds gewijzigd
        const mapped = raw.map(_oandaMapCandle).filter(Boolean).sort((a,b) => a.time - b.time);
        let touched = false;
        for (const c of mapped) {
          const isNewTime = !cx.candles.has(c.time);
          cx.candles.set(c.time, c);
          if (isNewTime) {
            // Nieuwe kaars — sortedTimes moet 'em ook krijgen zodat OHLC-balk
            // hem herkent. Append aan het einde (mapped is strict-oplopend).
            cx.sortedTimes.push(c.time);
          }
          // prevClose voor colorByPrevClose = close van de candle direct vóór c.
          const idx = cx.sortedTimes.indexOf(c.time);
          const prevClose = idx > 0 ? (cx.candles.get(cx.sortedTimes[idx - 1])?.close ?? null) : null;
          try { cx.series.update(_toSeriesPoint(c, prevClose)); touched = true; } catch (_) { /* time-ordering guard, negeer */ }
        }
        // OHLC-balk syncen met de nieuwe laatste candle als geen hover actief is.
        // subscribeCrosshairMove blijft dominant zodra de user hovert.
        if (touched) _updateOhlc(null);
        if (!cx.loadingOlder) setLive('live');
      } catch (e) {
        if (e?.name === 'AbortError') return;
        // Live-fout niet spammen — één regel is genoeg.
        if (!cx.loadingOlder) setLive('error');
      }
    }

    function startLive() {
      if (cx.timer) clearInterval(cx.timer);
      cx.timer = setInterval(liveTick, OANDA_REFRESH_MS);
    }

    // Lazy-load trigger: als de gebruiker naar de linkerrand (oudste candle)
    // scrollt en de zichtbare logische range binnen OANDA_EDGE_TRIGGER van 0
    // komt, laad een oudere batch bij. Live-refresh triggert dit NIET (die
    // stuurt geen visible-range event).
    try {
      cx.chart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
        if (!range) return;
        if (cx.loadingOlder || cx.exhausted) return;
        if (Number(range.from) <= OANDA_EDGE_TRIGGER) loadOlder();
      });
    } catch (_) { /* v4 API-guard; fail-soft */ }

    // Centrale paar-wissel: gebruikt door de dropdown én de watchlist rechts.
    // Houdt precisie, dropdown-waarde en watchlist-highlight in sync. Prijs-
    // precisie is instrument-specifiek (JPY → 3, XAU → 2, FX → 5); we applyen
    // 'm vóór de nieuwe data zodat as + live-prijs-label direct kloppen.
    function switchPair(pair) {
      const p = String(pair || '').toUpperCase();
      if (!OANDA_INSTRUMENTS.includes(p)) return;
      cx.pair = p;
      cx.precision = _oandaPrecisionFor(p);
      try { cx.series.applyOptions({ priceFormat: _oandaPriceFormatFor(p) }); } catch (_) {}
      const sel = container.querySelector('.oanda-pair');
      if (sel && sel.value !== p) sel.value = p;
      container.querySelectorAll('.oanda-wl-row').forEach((r) => r.classList.toggle('active', r.dataset.pair === p));
      // Tekeningen zijn instrument-specifiek (prijs-niveaus) → wissen bij
      // paar-wissel. Bij tf-wissel blijven ze staan: ankers zijn time/price en
      // mappen gewoon door op de nieuwe timeframe.
      if (cx.drawClear) cx.drawClear();
      fullReload().then(startLive);
    }

    // ── Watchlist live prijzen + dag-verandering% ─────────────────────────
    // Eén multi-price call voor alle zichtbare instrumenten op een rustig
    // interval (NIET 26 losse calls). Fout → subtiele header-hint + streepjes,
    // geen crash. Interval-cleanup in _oandaCleanup.
    async function _refreshWatchlistPrices() {
      const rows = container.querySelectorAll('.oanda-wl-row');
      if (!rows.length) return;
      const instruments = Array.from(rows).map((r) => r.dataset.pair).filter(Boolean);
      try {
        const d = await api('/api/secret-area-oanda?action=prices&instruments=' + encodeURIComponent(instruments.join(',')));
        for (const p of (Array.isArray(d.prices) ? d.prices : [])) {
          const pxEl = container.querySelector('[data-wl-price="' + p.instrument + '"]');
          const chEl = container.querySelector('[data-wl-change="' + p.instrument + '"]');
          if (pxEl) pxEl.textContent = Number.isFinite(p.price) ? Number(p.price).toFixed(_oandaPrecisionFor(p.instrument)) : '—';
          if (chEl) {
            if (Number.isFinite(p.changePct)) {
              chEl.textContent = (p.changePct >= 0 ? '+' : '') + p.changePct.toFixed(2) + '%';
              chEl.style.color = (p.changePct >= 0) ? 'var(--color-success, #16a34a)' : 'var(--color-danger, #dc2626)';
            } else { chEl.textContent = '—'; chEl.style.color = 'var(--sa-tx-mid)'; }
          }
        }
        const hd = container.querySelector('.oanda-wl-hd'); if (hd) hd.textContent = 'Paren';
      } catch (e) {
        const hd = container.querySelector('.oanda-wl-hd'); if (hd) hd.textContent = 'Paren · offline';
      }
    }
    function _startWatchlistPrices() {
      if (cfg.compact) return; // watchlist bestaat alleen op de volledige cockpit
      if (cx.wlTimer) clearInterval(cx.wlTimer);
      _refreshWatchlistPrices();
      cx.wlTimer = setInterval(_refreshWatchlistPrices, 4000);
    }

    // Wire pair (dropdown) + watchlist + tf.
    container.querySelector('.oanda-pair')?.addEventListener('change', (e) => switchPair(e.target.value));
    container.querySelectorAll('.oanda-wl-row').forEach((r) => r.addEventListener('click', () => switchPair(r.dataset.pair)));
    _startWatchlistPrices();
    container.querySelectorAll('.oanda-tf-btn').forEach((b) => b.addEventListener('click', () => {
      const tf = b.dataset.tf;
      if (!OANDA_TIMEFRAMES.includes(tf)) return;
      cx.tf = tf;
      container.querySelectorAll('.oanda-tf-btn').forEach((x) => x.classList.toggle('active', x.dataset.tf === tf));
      fullReload().then(startLive);
    }));

    // Fullscreen: cockpit maximaliseren als overlay (boven sidebar/menu), met
    // knop-toggle + Esc. De chart herschaalt via de ResizeObserver plus een
    // expliciete applyOptions na de layout-flip.
    const cockpitEl = container.querySelector('.oanda-cockpit');
    const fsBtn = container.querySelector('.oanda-fs-btn');
    function _resizeChartNow() {
      try { chart.applyOptions({ width: chartEl.clientWidth, height: chartEl.clientHeight || chartHeight }); } catch (_) {}
    }
    function setFullscreen(on) {
      if (!cockpitEl) return;
      cockpitEl.classList.toggle('oanda-fs', on);
      if (fsBtn) {
        fsBtn.innerHTML = on ? '<i class="ti ti-minimize"></i>' : '<i class="ti ti-maximize"></i>';
        fsBtn.title = on ? 'Sluit volledig scherm (Esc)' : 'Volledig scherm';
      }
      // Na de layout-flip herschalen (twee frames voor zekerheid).
      requestAnimationFrame(() => { _resizeChartNow(); requestAnimationFrame(_resizeChartNow); });
    }
    cx.escHandler = (e) => {
      if (e.key === 'Escape' && cockpitEl && cockpitEl.classList.contains('oanda-fs')) setFullscreen(false);
    };
    document.addEventListener('keydown', cx.escHandler);
    if (fsBtn) fsBtn.addEventListener('click', () => setFullscreen(!(cockpitEl && cockpitEl.classList.contains('oanda-fs'))));

    // Shift ingedrukt = tijdelijk magneet aan (crosshair + anker-snap). Loslaten
    // → terug naar de toggle-stand. We preventDefaulten NIET zodat andere
    // Shift-gebaren van de chart/OS blijven werken.
    function _applyShiftMagnet(on) {
      if (shiftHeld === on) return;
      shiftHeld = on;
      try { chart.applyOptions({ crosshair: { mode: _crosshairMode() } }); } catch (_) {}
    }
    cx.shiftDownH = (e) => { if (e.key === 'Shift') _applyShiftMagnet(true); };
    cx.shiftUpH   = (e) => { if (e.key === 'Shift') _applyShiftMagnet(false); };
    // Bij window-blur zeker de shift-state resetten (keyup kan gemist worden).
    cx.shiftBlurH = () => _applyShiftMagnet(false);
    document.addEventListener('keydown', cx.shiftDownH);
    document.addEventListener('keyup', cx.shiftUpH);
    window.addEventListener('blur', cx.shiftBlurH);
    // Publieke helper zodat de teken-laag de effectieve magneet-stand kent.
    cx.magnetActive = () => (settings.magnet || shiftHeld);

    // Compact-only: link naar volledige Chart-tab (behoud gekozen paar/tf).
    container.querySelector('[data-open-chart-tab]')?.addEventListener('click', () => {
      window.__oandaChartTabDefaults = { instrument: cx.pair, granularity: cx.tf };
      const chartTabBtn = document.querySelector('.sa-tab[data-tab="chart"]');
      if (chartTabBtn) chartTabBtn.click();
    });

    // ── Instellingen toepassen / herbouwen ────────────────────────────────
    function rebuildSeries() {
      // Oude serie weg, nieuwe in de gekozen stijl; data opnieuw zetten. De
      // crosshair-subscribe hangt aan de chart (niet de serie) en blijft dus
      // werken; de OHLC-balk leest uit cx.candles en is stijl-onafhankelijk.
      try { cx.chart.removeSeries(cx.series); } catch (_) {}
      cx.series = makeSeries();
      cx.seriesType = settings.style;
      _applySeries();
    }

    function applySettings() {
      _saSaveChartSettings(settings);
      // Chart-niveau opties — live via applyOptions, geen data-reload.
      try {
        cx.chart.applyOptions({
          layout: { background: { type: 'solid', color: settings.colors.background } },
          grid: {
            vertLines: { visible: settings.grid.vert, color: settings.grid.vertColor },
            horzLines: { visible: settings.grid.horz, color: settings.grid.horzColor },
          },
          crosshair: {
            mode: _crosshairMode(),
            vertLine: { color: settings.colors.crosshair },
            horzLine: { color: settings.colors.crosshair },
          },
          timeScale: { tickMarkFormatter: (t, type) => _saFmtTick(t, type, settings) },
          localization: { timeFormatter: (t) => _saFmtFull(t, settings) },
        });
      } catch (_) {}
      // Serie: bij stijl-wissel herbouwen (behoud priceFormat/priceLine/lastValue);
      // anders kleuren toepassen. In beide gevallen data opnieuw zetten zodat
      // line/area-waarde én per-candle kleuren (colorByPrevClose) meteen kloppen.
      if (cx.seriesType !== settings.style) {
        rebuildSeries();
      } else {
        try {
          const c = settings.colors;
          if (settings.style === 'candles') {
            cx.series.applyOptions({
              upColor: c.bodyUp, downColor: c.bodyDown,
              borderVisible: true, borderUpColor: c.borderUp, borderDownColor: c.borderDown,
              wickUpColor: c.wickUp, wickDownColor: c.wickDown,
            });
          } else if (settings.style === 'line') {
            cx.series.applyOptions({ color: c.bodyUp });
          } else {
            cx.series.applyOptions({ lineColor: c.bodyUp, topColor: _saRgba(c.bodyUp, 0.30), bottomColor: _saRgba(c.bodyUp, 0.02) });
          }
        } catch (_) {}
        _applySeries();
      }
      _updateCountdown();
    }

    // Paneel-inputs vullen vanuit `settings` (init + na Reset).
    function syncPanelInputs() {
      if (!panelEl) return;
      panelEl.querySelectorAll('[data-set]').forEach((el) => {
        const path = el.getAttribute('data-set');
        const val = _saGetPath(settings, path);
        if (el.type === 'checkbox') el.checked = !!val;
        else el.value = (val == null ? '' : String(val));
      });
      // Hex-tekstvelden spiegelen dezelfde kleur-settings; fout-markering resetten.
      panelEl.querySelectorAll('[data-hex]').forEach((el) => {
        const path = el.getAttribute('data-hex');
        const val = _saGetPath(settings, path);
        el.value = (val == null ? '' : String(val));
        el.style.borderColor = 'var(--sa-line)';
      });
    }

    function wireSettingsPanel() {
      if (gearBtn && panelEl) {
        gearBtn.addEventListener('click', () => {
          const open = panelEl.style.display && panelEl.style.display !== 'none';
          panelEl.style.display = open ? 'none' : 'block';
        });
      }
      panelEl?.querySelector('.oanda-settings-close')?.addEventListener('click', () => {
        if (panelEl) panelEl.style.display = 'none';
      });
      panelEl?.querySelectorAll('[data-set]').forEach((el) => {
        el.addEventListener('change', () => {
          const path = el.getAttribute('data-set');
          const v = (el.type === 'checkbox') ? el.checked : el.value;
          _saSetPath(settings, path, v);
          applySettings();
        });
      });
      // Color picker → spiegel de gekozen waarde live naar het hex-veld (ook
      // tijdens slepen). De settings + chart updaten via de [data-set] 'change'
      // hierboven; dit is puur visuele sync van het tekstveld.
      panelEl?.querySelectorAll('[data-color]').forEach((el) => {
        el.addEventListener('input', () => {
          const path = el.getAttribute('data-color');
          const hexEl = panelEl.querySelector('[data-hex="' + path + '"]');
          if (hexEl) { hexEl.value = String(el.value || '').toLowerCase(); hexEl.style.borderColor = 'var(--sa-line)'; }
        });
      });
      // Hex-veld → valideer (#RGB / #RRGGBB). Geldig: normaliseer, zet de
      // picker + settings bij en pas live toe via applySettings (applyOptions,
      // geen data-reload). Ongeldig: subtiel als fout markeren, chart NIET
      // updaten tot 'ie geldig is. Geen crash bij rare invoer.
      panelEl?.querySelectorAll('[data-hex]').forEach((el) => {
        el.addEventListener('input', () => {
          const path = el.getAttribute('data-hex');
          const raw = String(el.value || '').trim();
          if (!SA_HEX_RE.test(raw)) { el.style.borderColor = 'var(--color-danger)'; return; }
          el.style.borderColor = 'var(--sa-line)';
          const hex = _saToHex(raw, raw.toLowerCase()); // #rgb → #rrggbb, lowercase
          _saSetPath(settings, path, hex);
          const colorEl = panelEl.querySelector('[data-color="' + path + '"]');
          if (colorEl) colorEl.value = hex;   // programmatic set → geen change-event → geen dubbele apply
          applySettings();
        });
      });
      panelEl?.querySelector('[data-settings-reset]')?.addEventListener('click', () => {
        settings = _saDefaultChartSettings();
        syncPanelInputs();
        applySettings();
      });
    }

    // Paneel klaarzetten (createChart heeft de opties al toegepast; hier alleen
    // de inputs vullen + events koppelen).
    syncPanelInputs();
    wireSettingsPanel();

    // Publieke helper voor de Backtest-pane: laad een venster rond een
    // (mogelijk oud) tijdstip en zoom erheen. Merge in de bestaande Map zodat
    // live-tick/lazy-load blijven werken; de tekeningen zijn een losse overlay.
    async function focusAround(tsSec, padBars, forceTf) {
      if (!Number.isFinite(tsSec)) return;
      const pad = Number.isFinite(padBars) ? padBars : 60;
      // Forceer een granularity (bv. M15 voor een backtest-kandidaat) zodat de
      // sequentie op de juiste timeframe getoond wordt. Verse start op het venster.
      if (forceTf && OANDA_TIMEFRAMES.includes(forceTf) && cx.tf !== forceTf) {
        cx.tf = forceTf;
        container.querySelectorAll('.oanda-tf-btn').forEach((x) => x.classList.toggle('active', x.dataset.tf === forceTf));
        cx.candles.clear(); cx.sortedTimes = []; cx.oldestSec = null; cx.exhausted = false;
        cx.generation++; // negeer stale in-flight fetches van de oude tf
      }
      const durSec = SA_TF_DURATION_SEC[cx.tf] || 900;
      const gen = cx.generation;
      try {
        if (cx.hist) cx.hist.abort();
        cx.hist = new AbortController();
        // Venster dat eindigt net ná de ts (before = ts + pad bars) zodat het
        // kandidaat-moment ruim in beeld valt.
        const beforeSec = tsSec + pad * durSec;
        const raw = await _oandaFetchCandles(cx.pair, cx.tf, Math.max(300, pad * 6), cx.hist.signal, {
          beforeSec, includeIncomplete: false,
        });
        if (gen !== cx.generation) return;
        const mapped = raw.map(_oandaMapCandle).filter(Boolean);
        for (const c of mapped) cx.candles.set(c.time, c);
        _applySeries();
        try {
          cx.chart.timeScale().setVisibleRange({ from: tsSec - pad * durSec, to: tsSec + pad * durSec });
        } catch (_) {}
      } catch (e) {
        if (e?.name === 'AbortError') return;
      }
    }
    cx.focusAround = focusAround;

    // ── Teken-laag (canvas-overlay boven de chart) ────────────────────────
    // Generieke "drawings"-lijst i.p.v. fib-only: elk item heeft een `type`
    // ('fib' | 'hline') met eigen draw/hitTest/drag-gedrag, en deelt de
    // projectie-, herteken- en cleanup-helpers. Zo zijn volgende tools
    // (trendlijn, rechthoek, tekst, positie) eenvoudig toe te voegen.
    //
    // Lightweight Charts heeft geen native drawing-objects; we tekenen op een
    // eigen canvas (inset:0) over de chart. Ankers worden bewaard in
    // data-coördinaten ({time,price} voor fib-ankers, {price} voor de h-lijn)
    // en elke frame terug-geprojecteerd via timeScale.timeToCoordinate +
    // series.priceToCoordinate → beweegt exact mee met scroll/zoom/resize/
    // fullscreen. In-memory per sessie (persistente opslag bewust uitgesteld).
    // Klik-invoer via een capture-listener op de chart-wrap zodat chart-pannen
    // alleen wordt geblokkeerd bij tekenen/slepen.
    function _setupDrawings() {
      const canvas = container.querySelector('.oanda-fib-canvas');
      const wrapEl = container.querySelector('.oanda-chart-wrap');
      const fibBtn = container.querySelector('.oanda-fib-btn');
      const hlineBtn = container.querySelector('.oanda-hline-btn');
      const clearBtn = container.querySelector('.oanda-fib-clear');
      if (!canvas || !wrapEl) return; // compact: geen tekentool
      const ctx2d = canvas.getContext('2d');
      cx.draw = {
        canvas, ctx: ctx2d, wrap: wrapEl,
        items: [], seq: 1,
        tool: null,        // null | 'fib' | 'hline'
        pending: null,     // fib punt 1 tijdens tekenen
        dragging: null,    // { id, anchor }
        selectedId: null, raf: null,
      };
      const D = cx.draw;
      const ANCHOR_R = 6, HLINE_HIT = 5, HLINE_COLOR = '#eab308';
      const LINE_TOL = 7; // klik-raakvlak rond dunne lijnen (px) → makkelijk selecteren
      // Lijndikte in CSS-pixels. De canvas-context is via _syncSize met
      // setTransform(dpr) geschaald, dus 1 = ~1 device-onafhankelijke px (geen
      // dubbele dikte op high-DPI). Geselecteerd → iets dikker zodat ook een
      // 0.5px-lijn zichtbaar oplicht.
      const _lineW = (w, sel) => Math.max(0.3, (w || 1)) + (sel ? 0.75 : 0);
      // Afstand punt→lijnsegment (voor het aanklikken van schuine/trend-lijnen).
      function _distToSeg(px, py, ax, ay, bx, by) {
        const dx = bx - ax, dy = by - ay;
        const len2 = dx * dx + dy * dy;
        let t = len2 ? ((px - ax) * dx + (py - ay) * dy) / len2 : 0;
        t = Math.max(0, Math.min(1, t));
        const cx0 = ax + t * dx, cy0 = ay + t * dy;
        return Math.hypot(px - cx0, py - cy0);
      }
      // Laatst gekozen fib-config (localStorage) als default voor nieuwe fibs.
      let fibDefaultCfg = _fibLoadDefaultCfg();
      let hlineDefaultCfg = _hlineLoadDefaultCfg();
      let trendDefaultCfg = _trendLoadDefaultCfg();
      let rectDefaultCfg = _rectLoadDefaultCfg();
      let textDefaultCfg = _textLoadDefaultCfg();
      const panelEl = container.querySelector('.oanda-fib-panel');
      const cfgBtn = container.querySelector('.oanda-fib-cfg');
      const trendBtn = container.querySelector('.oanda-trend-btn');
      const rectBtn = container.querySelector('.oanda-rect-btn');
      const textBtn = container.querySelector('.oanda-text-btn');

      const _toX = (t) => { try { return cx.chart.timeScale().timeToCoordinate(t); } catch (_) { return null; } };
      const _toY = (p) => { try { return cx.series.priceToCoordinate(p); } catch (_) { return null; } };
      const _fromX = (x) => { try { return cx.chart.timeScale().coordinateToTime(x); } catch (_) { return null; } };
      const _fromY = (y) => { try { return cx.series.coordinateToPrice(y); } catch (_) { return null; } };
      // ── Ankers via LOGICAL coordinates ─────────────────────────────────
      // Een anker = { price, refTime, barOffset }: refTime is een ECHTE candle-
      // tijd (stabiel bij lazy-load links / append rechts) en barOffset het aantal
      // bars ernaast (0 = op de candle; >0 = in de lege ruimte VOORBIJ de laatste
      // candle). Zo kan de gebruiker vrij naar rechts plaatsen/slepen en blijft
      // het anker stabiel bij scroll/zoom. Legacy {time,price}-ankers werken ook.
      function _barSpacing() {
        try {
          const ts = cx.chart.timeScale();
          const c0 = ts.logicalToCoordinate(0), c1 = ts.logicalToCoordinate(1);
          if (c0 != null && c1 != null && c1 !== c0) return c1 - c0;
        } catch (_) {}
        return 6;
      }
      // Logical-index van een candle-tijd (binary search op de oplopende reeks).
      function _logicalOfTime(t) {
        const a = cx.sortedTimes;
        if (!a.length) return null;
        if (t <= a[0]) return 0;
        if (t >= a[a.length - 1]) return a.length - 1;
        let lo = 0, hi = a.length - 1;
        while (lo <= hi) { const mid = (lo + hi) >> 1; if (a[mid] === t) return mid; if (a[mid] < t) lo = mid + 1; else hi = mid - 1; }
        return Math.max(0, Math.min(a.length - 1, lo));
      }
      // Anker → x-coördinaat (herprojecteert elke frame → volgt scroll/zoom).
      function _anchorX(a) {
        if (!a) return null;
        const refTime = a.refTime != null ? a.refTime : a.time;   // legacy fallback
        const barOffset = a.barOffset || 0;
        if (refTime == null) return null;
        const baseX = _toX(refTime);
        if (baseX != null) return baseX + barOffset * _barSpacing();
        // refTime buiten beeld → via logical zodat de lijn niet verdwijnt.
        const li = _logicalOfTime(refTime);
        if (li == null) return null;
        try { const c = cx.chart.timeScale().logicalToCoordinate(li + barOffset); return (c == null ? null : c); } catch (_) { return null; }
      }
      // x-coördinaat → anker. coordinateToLogical projecteert OOK in de lege
      // ruimte rechts van de laatste candle → vrij trekken voorbij de historie.
      function _xToAnchor(x, price) {
        const ts = cx.chart.timeScale();
        let logical = null;
        try { logical = ts.coordinateToLogical(x); } catch (_) {}
        const last = cx.sortedTimes.length - 1;
        if (logical == null || last < 0) {
          return { price, refTime: last >= 0 ? cx.sortedTimes[last] : null, barOffset: 0 };
        }
        let refIdx = Math.round(logical);
        if (refIdx < 0) refIdx = 0; else if (refIdx > last) refIdx = last;
        return { price, refTime: cx.sortedTimes[refIdx], barOffset: logical - refIdx };
      }
      // Snap-prijs: bij effectieve magneet (toggle OF Shift) klemt de prijs aan
      // het dichtstbijzijnde OHLC-niveau (incl. wick) van de candle onder de cursor.
      function _snapPrice(x, y) {
        const raw = _fromY(y);
        if (raw == null || !(cx.magnetActive && cx.magnetActive())) return raw;
        const t = _fromX(x); // candle-tijd onder de cursor (null in lege ruimte)
        const c = t != null ? cx.candles.get(t) : null;
        if (!c) return raw; // lege ruimte → geen snap
        let best = raw, bestD = Infinity;
        for (const p of [c.open, c.high, c.low, c.close]) {
          const d = Math.abs(p - raw); if (d < bestD) { bestD = d; best = p; }
        }
        return best;
      }
      // Prijs op fractie f. reverse wisselt de 1.0- en 0-kant om.
      const _fibPriceAt = (fib, f) => {
        const rev = !!(fib.cfg && fib.cfg.reverse);
        const one  = rev ? fib.p2.price : fib.p1.price;   // 1.0-kant (swing)
        const zero = rev ? fib.p1.price : fib.p2.price;   // 0-kant (impuls)
        return zero + f * (one - zero);
      };
      // Elke fib heeft een eigen cfg; ontbreekt 'ie (oude sessie), maak 'm aan.
      const _fibCfg = (fib) => (fib.cfg || (fib.cfg = _fibCloneCfg(fibDefaultCfg)));
      // Idem voor een hline (bestaande hlines zonder cfg krijgen veilige defaults).
      const _hlineCfg = (hl) => (hl.cfg || (hl.cfg = _hlineCloneCfg(hlineDefaultCfg)));
      const _trendCfg = (t) => (t.cfg || (t.cfg = _trendCloneCfg(trendDefaultCfg)));
      const _rectCfg = (r) => (r.cfg || (r.cfg = _rectCloneCfg(rectDefaultCfg)));
      const _textCfg = (t) => (t.cfg || (t.cfg = _textCloneCfg(textDefaultCfg)));

      function _syncSize() {
        // Meet de WRAP (echte chart-container), niet het canvas: een absolute
        // <canvas> is een replaced element en stretcht NIET vanzelf via inset:0,
        // waardoor de meting eerder 8×8 gaf. De canvas krijgt nu width/height
        // 100% (CSS) én de backing-store hieronder op wrap-grootte × dpr.
        const w = wrapEl.clientWidth, h = wrapEl.clientHeight;
        const dpr = window.devicePixelRatio || 1;
        // Min-guard: bij een collapsed/nog-niet-gelayoute container (bv. <50px)
        // niet committen maar na de layout opnieuw meten. Voorkomt dat de canvas
        // op een minuscule maat blijft staan.
        if (w < 50 || h < 50) {
          requestAnimationFrame(() => { _syncSize(); _draw(); });
          return { w: canvas._w || 0, h: canvas._h || 0 };
        }
        if (canvas._w !== w || canvas._h !== h || canvas._dpr !== dpr) {
          canvas.width = Math.max(1, Math.round(w * dpr));
          canvas.height = Math.max(1, Math.round(h * dpr));
          ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
          canvas._w = w; canvas._h = h; canvas._dpr = dpr;
        }
        return { w, h };
      }
      function _handle(x, y, selected) {
        ctx2d.beginPath();
        ctx2d.arc(x, y, selected ? ANCHOR_R + 2 : ANCHOR_R, 0, Math.PI * 2);
        ctx2d.fillStyle = '#ffffff'; ctx2d.fill();
        ctx2d.lineWidth = 2; ctx2d.strokeStyle = selected ? '#2563eb' : '#374151'; ctx2d.stroke();
      }

      // ── Per-type teken-functies ──
      function _drawFib(fib, w) {
        const sel = fib.id === D.selectedId;
        const prec = cx.precision;
        const cfg = _fibCfg(fib);
        const dash = cfg.lineStyle === 'dashed' ? [5, 4] : cfg.lineStyle === 'dotted' ? [2, 3] : [];
        const baseLw = cfg.width || 1;
        const colorFor = (lv) => cfg.useOneColor ? (cfg.oneColor || '#2563eb') : lv.color;
        const fontPx = cfg.fontSize || 10;
        // Ankers naar x-coördinaten (herprojecteert elke frame → volgt scroll/zoom).
        const x1 = _anchorX(fib.p1), x2 = _anchorX(fib.p2);
        // Segment TUSSEN de twee punten (TradingView-stijl, standaard KORT). Als
        // een anker buiten beeld is gescrolld (x==null) vallen we terug op de
        // canvas-rand zodat het zichtbare deel van de leg toch getekend wordt.
        const lo = (x1 != null && x2 != null) ? Math.min(x1, x2) : 0;
        const hi = (x1 != null && x2 != null) ? Math.max(x1, x2) : w;
        const ext = cfg.extend || 'none';
        const lineLeft  = (ext === 'left'  || ext === 'both') ? 0 : lo;   // 'links' → tot linkerrand
        const lineRight = (ext === 'right' || ext === 'both') ? w : hi;   // 'rechts' → tot rechterrand

        // Zichtbare niveaus (met y + kleur) — nodig voor background + lijnen.
        const vis = [];
        for (const lv of cfg.levels) {
          if (!lv.on) continue;
          const price = _fibPriceAt(fib, lv.f);
          const y = _toY(price);
          if (y == null) continue;
          vis.push({ lv, price, y, color: colorFor(lv) });
        }

        // 1) Achtergrond-vlakken tussen opeenvolgende zichtbare niveaus.
        if (cfg.background && vis.length >= 2) {
          const sorted = vis.slice().sort((a, b) => a.y - b.y);
          const alpha = Math.max(0, Math.min(1, (cfg.bgOpacity != null ? cfg.bgOpacity : 20) / 100));
          for (let i = 0; i < sorted.length - 1; i++) {
            ctx2d.save();
            ctx2d.globalAlpha = alpha; ctx2d.fillStyle = sorted[i].color;
            ctx2d.fillRect(lineLeft, sorted[i].y, (lineRight - lineLeft), (sorted[i + 1].y - sorted[i].y));
            ctx2d.restore();
          }
        }

        // 2) Niveau-lijnen + labels.
        for (const v of vis) {
          ctx2d.save();
          ctx2d.strokeStyle = v.color; ctx2d.lineWidth = _lineW(baseLw, sel);
          ctx2d.setLineDash(dash);
          ctx2d.beginPath(); ctx2d.moveTo(lineLeft, v.y); ctx2d.lineTo(lineRight, v.y); ctx2d.stroke();
          ctx2d.restore();
          // Label: percentage en/of prijs (instrument-precisie), verticaal
          // boven/midden/onder de lijn.
          const parts = [];
          if (cfg.showPct !== false) parts.push(_fibLabel(v.lv.f));
          if (cfg.showPrice) parts.push(v.price.toFixed(prec));
          const txt = parts.join('  ');
          if (txt) {
            ctx2d.fillStyle = v.color; ctx2d.font = fontPx + 'px ui-monospace, monospace';
            ctx2d.textBaseline = (cfg.labelVPos === 'below') ? 'top' : (cfg.labelVPos === 'middle') ? 'middle' : 'alphabetic';
            const ly = (cfg.labelVPos === 'below') ? v.y + 2 : (cfg.labelVPos === 'middle') ? v.y : v.y - 2;
            if (cfg.labelSide === 'left') { ctx2d.textAlign = 'left'; ctx2d.fillText(txt, Math.min(w - 2, lineLeft + 3), ly); }
            else { ctx2d.textAlign = 'right'; ctx2d.fillText(txt, Math.max(2, lineRight - 3), ly); ctx2d.textAlign = 'left'; }
            ctx2d.textBaseline = 'alphabetic';
          }
        }

        const y1 = _toY(fib.p1.price), y2 = _toY(fib.p2.price);
        // 3) Trend-lijn (diagonaal punt 1 → punt 2), los van de niveaus.
        if (cfg.trendLine && x1 != null && x2 != null && y1 != null && y2 != null) {
          ctx2d.save();
          ctx2d.strokeStyle = cfg.trendColor || '#888888'; ctx2d.lineWidth = 1.5;
          ctx2d.setLineDash(cfg.trendStyle === 'dashed' ? [5, 4] : []);
          ctx2d.beginPath(); ctx2d.moveTo(x1, y1); ctx2d.lineTo(x2, y2); ctx2d.stroke();
          ctx2d.restore();
        }

        // 4) Faint verbindingslijn + verplaatsbare grepen (drag-affordance).
        if (x1 != null && x2 != null && y1 != null && y2 != null) {
          ctx2d.save();
          ctx2d.strokeStyle = 'rgba(120,120,120,.7)'; ctx2d.lineWidth = 1; ctx2d.setLineDash([2, 2]);
          ctx2d.beginPath(); ctx2d.moveTo(x1, y1); ctx2d.lineTo(x2, y2); ctx2d.stroke();
          ctx2d.restore();
          _handle(x1, y1, sel); _handle(x2, y2, sel);
        }
      }
      function _drawHline(hl, w) {
        const y = _toY(hl.price);
        if (y == null) return;
        const sel = hl.id === D.selectedId;
        const cfg = _hlineCfg(hl);
        const color = cfg.color || HLINE_COLOR;
        const lw = _lineW(cfg.width, sel);
        const dash = cfg.style === 'dashed' ? [6, 4] : cfg.style === 'dotted' ? [2, 3] : [];
        // Extend bepaalt hoe ver de lijn loopt t.o.v. het plaats-anker (x). 'both'
        // (default) = volle breedte (backward-compat). Zonder anker → volle breedte.
        const ext = cfg.extend || 'both';
        const ax = _anchorX(hl);
        let x0 = 0, x1 = w;
        if (ax != null) {
          if (ext === 'right') { x0 = ax; x1 = w; }
          else if (ext === 'left') { x0 = 0; x1 = ax; }
          else if (ext === 'none') { x0 = ax - 45; x1 = ax + 45; } // kort segment rond het anker
        }

          + '<input type="color" data-rc-fillcolor value="' + (cfg.fillColor || '#2563eb') + '" style="width:28px;height:20px;padding:0;border:1px solid var(--sa-line);border-radius:4px;background:none;cursor:pointer">'
          + '<input type="text" data-rc-fillhex value="' + (cfg.fillColor || '#2563eb') + '" spellcheck="false" maxlength="7" style="width:66px;padding:2px 4px;font-family:ui-monospace,monospace;font-size:11px;border:1px solid var(--sa-line);border-radius:4px;background:var(--sa-panel);color:var(--sa-tx)">'
          + '</span>');
        html += row('Transparantie', '<input type="range" min="0" max="100" step="5" data-rc-opacity value="' + (cfg.fillOpacity != null ? cfg.fillOpacity : 15) + '" style="width:120px">');
        html += '<div style="margin-top:10px"><button type="button" class="oanda-rect-reset sa-btn sa-btn-ghost" style="width:100%;justify-content:center;padding:5px;font-size:12px"><i class="ti ti-rotate"></i>Reset naar standaard</button></div>';
        panelEl.innerHTML = html;

        panelEl.querySelector('.oanda-fib-panel-close')?.addEventListener('click', () => { panelEl.style.display = 'none'; });
        panelEl.querySelector('[data-rc-color]')?.addEventListener('input', (e) => {
          cfg.color = e.target.value;
          const hx = panelEl.querySelector('[data-rc-hex]'); if (hx) { hx.value = e.target.value; hx.style.borderColor = 'var(--sa-line)'; }
          _rectApplied(r);
        });
        panelEl.querySelector('[data-rc-hex]')?.addEventListener('input', (e) => {
          const raw = String(e.target.value || '').trim();
          if (!SA_HEX_RE.test(raw)) { e.target.style.borderColor = 'var(--color-danger)'; return; }
          e.target.style.borderColor = 'var(--sa-line)';
          const hex = _saToHex(raw, raw.toLowerCase()); cfg.color = hex;
          const cp = panelEl.querySelector('[data-rc-color]'); if (cp) cp.value = hex;
          _rectApplied(r);
        });
        panelEl.querySelector('[data-rc-width]')?.addEventListener('change', (e) => { cfg.width = Number(e.target.value); _rectApplied(r); });
        panelEl.querySelector('[data-rc-style]')?.addEventListener('change', (e) => { cfg.style = e.target.value; _rectApplied(r); });
        panelEl.querySelector('[data-rc-fill]')?.addEventListener('change', (e) => { cfg.fill = e.target.checked; _rectApplied(r); });
        panelEl.querySelector('[data-rc-fillcolor]')?.addEventListener('input', (e) => {
          cfg.fillColor = e.target.value;
          const hx = panelEl.querySelector('[data-rc-fillhex]'); if (hx) { hx.value = e.target.value; hx.style.borderColor = 'var(--sa-line)'; }
          _rectApplied(r);
        });
        panelEl.querySelector('[data-rc-fillhex]')?.addEventListener('input', (e) => {
          const raw = String(e.target.value || '').trim();
          if (!SA_HEX_RE.test(raw)) { e.target.style.borderColor = 'var(--color-danger)'; return; }
          e.target.style.borderColor = 'var(--sa-line)';
          const hex = _saToHex(raw, raw.toLowerCase()); cfg.fillColor = hex;
          const cp = panelEl.querySelector('[data-rc-fillcolor]'); if (cp) cp.value = hex;
          _rectApplied(r);
        });
        panelEl.querySelector('[data-rc-opacity]')?.addEventListener('input', (e) => { cfg.fillOpacity = Number(e.target.value); _rectApplied(r); });
        panelEl.querySelector('.oanda-rect-reset')?.addEventListener('click', () => { r.cfg = _rectDefaultCfg(); _rectApplied(r); _renderRectPanel(); });
      }

      // ── Tekst/label-instellingen-paneel (per text; zelfde stijl) ─────────
      // Alleen de LOOK (kleur/grootte/achtergrond) zit in cfg en wordt als
      // default bewaard; de inhoud (t.text) is per-drawing, buiten de cfg.
      function _textApplied(t) {
        _textSaveDefaultCfg(t.cfg);
        textDefaultCfg = _textCloneCfg(t.cfg);
        _draw(); _startLoop();
      }
      function _renderTextPanel() {
        if (!panelEl) return;
        const closeBtn = '<button type="button" class="oanda-fib-panel-close" title="Sluiten" style="border:none;background:none;cursor:pointer;color:var(--sa-tx-mid);font-size:16px;line-height:1">×</button>';
        const head = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px"><b style="font-size:12.5px">Tekst-instellingen</b>' + closeBtn + '</div>';
        const t = D.items.find((it) => it.id === D.selectedId && it.type === 'text');
        if (!t) {
          panelEl.innerHTML = head + '<div style="margin-top:8px;color:var(--sa-tx-mid)">Selecteer eerst een tekst-label.</div>';
          panelEl.querySelector('.oanda-fib-panel-close')?.addEventListener('click', () => { panelEl.style.display = 'none'; });
          return;
        }
        const cfg = _textCfg(t);
        const hdr = (tt) => '<div style="font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--sa-tx-mid);font-weight:700;margin:10px 0 4px">' + tt + '</div>';
        const row = (label, inner) => '<label style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin:4px 0"><span>' + label + '</span>' + inner + '</label>';
        let html = head + hdr('Inhoud');
        html += '<input type="text" data-tx-text value="' + esc(t.text || '') + '" spellcheck="false" style="width:100%;box-sizing:border-box;padding:4px 6px;font-size:12px;border:1px solid var(--sa-line);border-radius:4px;background:var(--sa-panel);color:var(--sa-tx)">';
        html += hdr('Weergave');
        html += row('Kleur',
          '<span style="display:inline-flex;gap:6px;align-items:center">'
          + '<input type="color" data-tx-color value="' + (cfg.color || '#2563eb') + '" style="width:28px;height:20px;padding:0;border:1px solid var(--sa-line);border-radius:4px;background:none;cursor:pointer">'
          + '<input type="text" data-tx-hex value="' + (cfg.color || '#2563eb') + '" spellcheck="false" maxlength="7" style="width:66px;padding:2px 4px;font-family:ui-monospace,monospace;font-size:11px;border:1px solid var(--sa-line);border-radius:4px;background:var(--sa-panel);color:var(--sa-tx)">'
          + '</span>');
        html += row('Lettergrootte', '<select data-tx-size class="sa-input" style="padding:2px 5px;font-size:12px">' + TEXT_SIZES.map((sz) => '<option value="' + sz + '"' + ((cfg.fontSize || 12) === sz ? ' selected' : '') + '>' + sz + '</option>').join('') + '</select>');
        html += hdr('Achtergrond');
        html += row('Achtergrond tonen', '<input type="checkbox" data-tx-bg' + (cfg.bg ? ' checked' : '') + ' style="cursor:pointer">');
        html += row('Kleur',
          '<span style="display:inline-flex;gap:6px;align-items:center">'
          + '<input type="color" data-tx-bgcolor value="' + (cfg.bgColor || '#ffffff') + '" style="width:28px;height:20px;padding:0;border:1px solid var(--sa-line);border-radius:4px;background:none;cursor:pointer">'
          + '<input type="text" data-tx-bghex value="' + (cfg.bgColor || '#ffffff') + '" spellcheck="false" maxlength="7" style="width:66px;padding:2px 4px;font-family:ui-monospace,monospace;font-size:11px;border:1px solid var(--sa-line);border-radius:4px;background:var(--sa-panel);color:var(--sa-tx)">'
          + '</span>');
        html += row('Transparantie', '<input type="range" min="0" max="100" step="5" data-tx-opacity value="' + (cfg.bgOpacity != null ? cfg.bgOpacity : 80) + '" style="width:120px">');
        html += '<div style="margin-top:10px"><button type="button" class="oanda-text-reset sa-btn sa-btn-ghost" style="width:100%;justify-content:center;padding:5px;font-size:12px"><i class="ti ti-rotate"></i>Reset naar standaard</button></div>';
        panelEl.innerHTML = html;

        panelEl.querySelector('.oanda-fib-panel-close')?.addEventListener('click', () => { panelEl.style.display = 'none'; });
        // Inhoud aanpassen (typo-fix) — per-drawing, niet in de default-opslag.
        panelEl.querySelector('[data-tx-text]')?.addEventListener('input', (e) => { t.text = e.target.value; _draw(); _startLoop(); });
        panelEl.querySelector('[data-tx-color]')?.addEventListener('input', (e) => {
          cfg.color = e.target.value;
          const hx = panelEl.querySelector('[data-tx-hex]'); if (hx) { hx.value = e.target.value; hx.style.borderColor = 'var(--sa-line)'; }
          _textApplied(t);
        });
        panelEl.querySelector('[data-tx-hex]')?.addEventListener('input', (e) => {
          const raw = String(e.target.value || '').trim();
          if (!SA_HEX_RE.test(raw)) { e.target.style.borderColor = 'var(--color-danger)'; return; }
          e.target.style.borderColor = 'var(--sa-line)';
          const hex = _saToHex(raw, raw.toLowerCase()); cfg.color = hex;
          const cp = panelEl.querySelector('[data-tx-color]'); if (cp) cp.value = hex;
          _textApplied(t);
        });
        panelEl.querySelector('[data-tx-size]')?.addEventListener('change', (e) => { cfg.fontSize = Number(e.target.value); _textApplied(t); });
        panelEl.querySelector('[data-tx-bg]')?.addEventListener('change', (e) => { cfg.bg = e.target.checked; _textApplied(t); });
        panelEl.querySelector('[data-tx-bgcolor]')?.addEventListener('input', (e) => {
          cfg.bgColor = e.target.value;
          const hx = panelEl.querySelector('[data-tx-bghex]'); if (hx) { hx.value = e.target.value; hx.style.borderColor = 'var(--sa-line)'; }
          _textApplied(t);
        });
        panelEl.querySelector('[data-tx-bghex]')?.addEventListener('input', (e) => {
          const raw = String(e.target.value || '').trim();
          if (!SA_HEX_RE.test(raw)) { e.target.style.borderColor = 'var(--color-danger)'; return; }
          e.target.style.borderColor = 'var(--sa-line)';
          const hex = _saToHex(raw, raw.toLowerCase()); cfg.bgColor = hex;
          const cp = panelEl.querySelector('[data-tx-bgcolor]'); if (cp) cp.value = hex;
          _textApplied(t);
        });
        panelEl.querySelector('[data-tx-opacity]')?.addEventListener('input', (e) => { cfg.bgOpacity = Number(e.target.value); _textApplied(t); });
        panelEl.querySelector('.oanda-text-reset')?.addEventListener('click', () => { t.cfg = _textDefaultCfg(); _textApplied(t); _renderTextPanel(); });
      }

      // Dispatcher: het ⚙-paneel toont de settings van het TYPE van de
      // geselecteerde drawing (fib → fib-settings, hline → hline-settings,
      // trend → trend-settings, rect → rect-settings, text → text-settings).
      function _renderDrawPanel() {
        if (!panelEl) return;
        const it = D.items.find((d) => d.id === D.selectedId);
        if (it && it.type === 'hline') { _renderHlinePanel(); return; }
        if (it && it.type === 'trend') { _renderTrendPanel(); return; }
        if (it && it.type === 'rect') { _renderRectPanel(); return; }
        if (it && it.type === 'text') { _renderTextPanel(); return; }
        _renderFibPanel(); // fib of geen-selectie (toont de fib-hint)
      }

      cx.fibPanelRefresh = () => { if (_fibPanelOpen()) _renderDrawPanel(); };
      if (cfgBtn) cfgBtn.addEventListener('click', () => {
        if (_fibPanelOpen()) { panelEl.style.display = 'none'; return; }
        panelEl.style.display = 'block'; _renderDrawPanel();
      });

      // Canvas op de juiste grootte houden: eigen ResizeObserver op de WRAP
      // (dekt window-resize, watchlist-kolom, tab-switch én fullscreen open/
      // sluit). Los van de chart-ResizeObserver; herteken direct.
      try {
        D._ro = new ResizeObserver(() => { _syncSize(); _draw(); });
        D._ro.observe(wrapEl);
      } catch (_) {}
      // Na de eerste layout/chart-mount nog één keer meten (voorkomt de 8×8 bij
      // een nog-niet-gelayoute container op het setup-moment).
      requestAnimationFrame(() => { _syncSize(); _draw(); });
    }
    _setupDrawings();

    // Kick off.
    fullReload().then(startLive);
  }

  // Chart-tab: volledige cockpit + info-tekst.
  function renderChartTab(p) {
    const hint = window.__oandaChartTabDefaults || null;
    p.innerHTML =
      '<div class="sa-card" style="padding:10px 12px">'
      +   '<div id="oandaChartFull"></div>'
      + '</div>'
      + renderBackfillCard();
    const el = document.getElementById('oandaChartFull');
    if (el) {
      renderOandaChart(el, {
        instrument : hint?.instrument  || 'EUR_USD',
        granularity: hint?.granularity || 'H4',
        compact    : false,
      });
    }
    mountBackfill(p);
    // Reset de hint zodat een volgend bezoek de default oppakt.
    window.__oandaChartTabDefaults = null;
  }

  // ── Backtest-pane (FMES kandidaatdetectie + uittekenen) ───────────────
  // Regelgebaseerde scan draait server-side (api/secret-area-backtest). Hier:
  // scan-controls, klikbare kandidaatlijst en het uittekenen van de
  // gedetecteerde elementen als overlay (priceLines + markers) op de bestaande
  // OANDA chart-cockpit. Geen AI in deze laag.
  const btState = {
    from: '2025-01-01', to: '', candidates: [], total: 0, capped: false, selectedId: null,
    startBalance: 10000, riskPct: 1, run: null,
  };

  // Tekenkleuren per element (los van de instelbare candle-kleuren).
  const BT_COLORS = { sweep: '#f59e0b', mss: '#7c3aed', fib: '#9ca3af', entry: '#2563eb', tp: '#059669', sl: '#dc2626', long: '#16a34a', short: '#dc2626' };

  function renderBacktestTab(p) {
    p.innerHTML =
      '<div class="sa-card">'
      +   '<h2><i class="ti ti-crosshair"></i> Backtest — FMES kandidaten (EUR_USD)</h2>'
      +   '<p style="color:var(--sa-tx-mid);font-size:12.5px;margin-bottom:12px">Regelgebaseerde detectie (geen AI) van de volgorde <b>sweep → displacement → MSS → 0.71-tap</b> met H4-bias mee. Klik een kandidaat om alle elementen op de chart uit te tekenen en visueel te controleren.</p>'
      +   '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px">'
      +     '<label style="font-size:11.5px;color:var(--sa-tx-mid)">Instrument<br><input class="sa-input" value="EUR_USD" disabled style="min-width:110px;padding:6px 8px;margin-top:3px"></label>'
      +     '<label style="font-size:11.5px;color:var(--sa-tx-mid)">Vanaf<br><input class="sa-input bt-from" type="date" style="padding:6px 8px;margin-top:3px"></label>'
      +     '<label style="font-size:11.5px;color:var(--sa-tx-mid)">Tot (leeg = nu)<br><input class="sa-input bt-to" type="date" style="padding:6px 8px;margin-top:3px"></label>'
      +     '<label style="font-size:11.5px;color:var(--sa-tx-mid)">Startbedrag (€)<br><input class="sa-input bt-balance" type="number" min="1" step="100" style="width:110px;padding:6px 8px;margin-top:3px"></label>'
      +     '<label style="font-size:11.5px;color:var(--sa-tx-mid)">Risk %<br><input class="sa-input bt-risk" type="number" min="0.1" max="100" step="0.1" style="width:80px;padding:6px 8px;margin-top:3px"></label>'
      +     '<button type="button" class="sa-btn sa-btn-ghost bt-scan"><i class="ti ti-search"></i>Scan kandidaten</button>'
      +     '<button type="button" class="sa-btn bt-run"><i class="ti ti-player-play"></i>Run backtest</button>'
      +     '<span class="bt-status" style="font-size:12px;color:var(--sa-tx-mid)"></span>'
      +   '</div>'
      +   '<p style="font-size:11px;color:var(--sa-tx-mid);background:var(--color-warning-soft,rgba(245,158,11,.08));border:1px solid var(--color-warning,rgba(245,158,11,.35));border-radius:8px;padding:7px 10px;margin-bottom:12px">'
      +     '<i class="ti ti-alert-triangle"></i> Simulatie op regelgebaseerde detectie — betrouwbaar zodra de detectie gekalibreerd is. Geen garantie voor live resultaat.'
      +   '</p>'
      +   '<div class="bt-dash"></div>'
      +   '<div class="bt-results"></div>'
      + '</div>'
      + '<div class="sa-card" style="margin-top:16px">'
      +   '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +     '<h2 style="margin:0"><i class="ti ti-chart-candle"></i> Chart + tekening</h2>'
      +     '<button type="button" class="sa-btn sa-btn-ghost bt-clear" style="padding:4px 10px;font-size:12px"><i class="ti ti-eraser"></i>Wis tekeningen</button>'
      +   '</div>'
      +   '<div class="bt-chart"></div>'
      + '</div>';

    const fromEl   = p.querySelector('.bt-from');
    const toEl     = p.querySelector('.bt-to');
    const balEl    = p.querySelector('.bt-balance');
    const riskEl   = p.querySelector('.bt-risk');
    const scanBtn  = p.querySelector('.bt-scan');
    const runBtn   = p.querySelector('.bt-run');
    const statusEl = p.querySelector('.bt-status');
    const dashEl   = p.querySelector('.bt-dash');
    const resultsEl= p.querySelector('.bt-results');
    const chartEl  = p.querySelector('.bt-chart');
    const clearBtn = p.querySelector('.bt-clear');

    if (fromEl) { fromEl.value = btState.from; fromEl.addEventListener('change', () => { btState.from = fromEl.value; }); }
    if (toEl)   { toEl.value   = btState.to;   toEl.addEventListener('change', () => { btState.to = toEl.value; }); }
    if (balEl)  { balEl.value  = btState.startBalance; balEl.addEventListener('change', () => { btState.startBalance = Number(balEl.value) || 10000; }); }
    if (riskEl) { riskEl.value = btState.riskPct;      riskEl.addEventListener('change', () => { btState.riskPct = Number(riskEl.value) || 1; }); }

    // Chart-cockpit mounten op EUR_USD M15 (blijft live + lazy-load + settings).
    if (chartEl) renderOandaChart(chartEl, { instrument: 'EUR_USD', granularity: 'M15' });
    if (clearBtn) clearBtn.addEventListener('click', () => _btClearDrawings(chartEl));

    if (scanBtn) scanBtn.addEventListener('click', async () => {
      scanBtn.disabled = true;
      statusEl.textContent = 'Scannen…';
      resultsEl.innerHTML = '';
      try {
        const body = { action: 'scan_candidates', instrument: 'EUR_USD' };
        if (btState.from) body.from = btState.from;
        if (btState.to)   body.to = btState.to;
        const d = await api('/api/secret-area-backtest', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        btState.candidates = d.candidates || [];
        btState.total = d.count || 0;
        btState.capped = !!d.capped;
        const m15n = d.period?.m15_candles ?? 0;
        statusEl.textContent = btState.total + ' kandidaten in ' + m15n + ' M15-candles'
          + (btState.capped ? (' — eerste ' + (d.returned || btState.candidates.length) + ' getoond') : '');
        _btRenderResults(resultsEl, chartEl);
      } catch (e) {
        statusEl.textContent = '';
        resultsEl.innerHTML = '<div class="sa-err">Scan mislukt: ' + esc(e?.message || 'onbekend') + '</div>';
      } finally {
        scanBtn.disabled = false;
      }
    });

    if (runBtn) runBtn.addEventListener('click', async () => {
      runBtn.disabled = true; scanBtn.disabled = true;
      statusEl.textContent = 'Backtest draait…';
      dashEl.innerHTML = ''; resultsEl.innerHTML = '';
      try {
        const body = { action: 'backtest_run', instrument: 'EUR_USD', startBalance: btState.startBalance, riskPct: btState.riskPct };
        if (btState.from) body.from = btState.from;
        if (btState.to)   body.to = btState.to;
        const d = await api('/api/secret-area-backtest', {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
        });
        btState.run = d;
        const m15n = d.period?.m15_candles ?? 0;
        statusEl.textContent = d.aantalTrades + ' trades in ' + m15n + ' M15-candles'
          + (d.tradesTotal > (d.trades ? d.trades.length : 0) ? (' — eerste ' + d.trades.length + ' getoond') : '');
        _btRenderRun(dashEl, resultsEl, chartEl);
      } catch (e) {
        statusEl.textContent = '';
        dashEl.innerHTML = '<div class="sa-err">Backtest mislukt: ' + esc(e?.message || 'onbekend') + '</div>';
      } finally {
        runBtn.disabled = false; scanBtn.disabled = false;
      }
    });

    // Bewaar-staat terugtonen na tab-switch: run heeft voorrang op scan.
    if (btState.run) _btRenderRun(dashEl, resultsEl, chartEl);
    else if (btState.candidates.length) _btRenderResults(resultsEl, chartEl);
    else resultsEl.innerHTML = '<p style="color:var(--sa-tx-mid);font-size:12.5px">Nog niet gescand.</p>';
  }

  // Resultaten-dashboard + trade-lijst voor een backtest_run.
  function _btRenderRun(dashEl, resultsEl, chartEl) {
    const r = btState.run;
    if (!r) return;
    if (dashEl) {
      const posC = 'var(--color-success-text,#16a34a)', negC = 'var(--color-danger-text,#dc2626)';
      const card = (label, value, color) =>
        '<div style="flex:1;min-width:120px;background:var(--surface-card);border:1px solid var(--border);border-radius:10px;padding:10px 12px">'
        + '<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--sa-tx-mid);font-weight:700">' + label + '</div>'
        + '<div class="disp" style="font-size:18px;font-weight:700;margin-top:3px' + (color ? (';color:' + color) : '') + '">' + value + '</div>'
        + '</div>';
      const eur = (v) => '€' + Number(v).toLocaleString('nl-NL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      const retColor = r.totaalRendementPct >= 0 ? posC : negC;
      dashEl.innerHTML =
        '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px">'
        + card('Eindsaldo', eur(r.endBalance), retColor)
        + card('Rendement', (r.totaalRendementPct >= 0 ? '+' : '') + r.totaalRendementPct + '%', retColor)
        + card('Winrate', r.winrate + '%')
        + card('Trades', r.aantalTrades + ' <span style="font-size:11px;color:var(--sa-tx-mid)">(' + r.wins + 'W/' + r.losses + 'L/' + r.be + 'BE/' + r.nofill + 'NF)</span>')
        + card('Gem. RR', r.avgRR + 'R')
        + card('Max drawdown', r.maxDrawdownPct + '%', negC)
        + '</div>';
    }
    if (!resultsEl) return;
    const trades = r.trades || [];
    if (!trades.length) { resultsEl.innerHTML = '<p style="color:var(--sa-tx-mid);font-size:12.5px">Geen trades.</p>'; return; }
    let html = '<div style="overflow:auto"><table class="mono" style="width:100%;border-collapse:collapse;font-size:11.5px">'
      + '<thead><tr style="text-align:left;color:var(--sa-tx-mid)">'
      + '<th style="padding:4px 8px 4px 0">Datum (UTC)</th><th style="padding:4px 8px">Richting</th>'
      + '<th style="padding:4px 8px;text-align:right">Entry</th><th style="padding:4px 8px;text-align:right">SL</th>'
      + '<th style="padding:4px 8px;text-align:right">TP</th><th style="padding:4px 8px;text-align:right">Exit</th>'
      + '<th style="padding:4px 8px;text-align:right">R</th><th style="padding:4px 8px;text-align:right">P&L</th>'
      + '<th style="padding:4px 8px;text-align:right">Saldo</th><th style="padding:4px 8px">Uitkomst</th></tr></thead><tbody>';
    trades.forEach((t, idx) => {
      const dir = t.direction === 'long'
        ? '<span style="color:' + BT_COLORS.long + ';font-weight:600">long</span>'
        : '<span style="color:' + BT_COLORS.short + ';font-weight:600">short</span>';
      const dt = String(t.ts || '').replace('T', ' ').slice(0, 16);
      const oc = t.outcome === 'WIN' ? BT_COLORS.long : (t.outcome === 'LOSS' ? BT_COLORS.sl : 'var(--sa-tx-mid)');
      const pnlColor = (t.pnl > 0) ? BT_COLORS.long : (t.pnl < 0 ? BT_COLORS.sl : 'var(--sa-tx-mid)');
      html += '<tr class="bt-trade" data-idx="' + idx + '" style="border-top:1px solid var(--border);cursor:pointer">'
        + '<td style="padding:4px 8px 4px 0">' + esc(dt) + '</td>'
        + '<td style="padding:4px 8px">' + dir + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(t.entry ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(t.sl ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(t.tp ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(t.exit ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(t.r_multiple == null ? '—' : (t.r_multiple + 'R')) + '</td>'
        + '<td style="padding:4px 8px;text-align:right;color:' + pnlColor + '">' + esc(t.pnl == null ? '—' : String(t.pnl)) + '</td>'
        + '<td style="padding:4px 8px;text-align:right">' + esc(String(t.balance ?? '—')) + '</td>'
        + '<td style="padding:4px 8px;font-weight:600;color:' + oc + '">' + esc(t.outcome || '—') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
    resultsEl.innerHTML = html;
    resultsEl.querySelectorAll('.bt-trade').forEach((tr) => {
      tr.addEventListener('click', () => {
        const idx = Number(tr.dataset.idx);
        const trade = (btState.run?.trades || [])[idx];
        if (!trade) return;
        resultsEl.querySelectorAll('.bt-trade').forEach((x) => x.style.background = '');
        tr.style.background = 'var(--color-info-soft, rgba(37,99,235,.08))';
        _btDrawTrade(chartEl, trade);
      });
