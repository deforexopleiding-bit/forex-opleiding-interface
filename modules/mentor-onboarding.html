<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Onboarding — Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    body { background: var(--bg); color: var(--text); }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1280px; }
    @media (max-width: 880px) { .app { margin-left: 0; padding: 14px; } }
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-header p  { font-size: 13px; color: var(--text-dim); }
    .empty-state { padding:24px; border:1px dashed var(--border); border-radius:10px; text-align:center; color:var(--text-faint); font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .badge       { display:inline-block; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:700; line-height:1.4; white-space:nowrap; }
    .badge-green { background:rgba(34,197,94,0.16); color:#15803d; }
    .badge-amber { background:rgba(245,158,11,0.18); color:#92400e; }
    .badge-red   { background:rgba(220,38,38,0.16); color:#7f1d1d; }
    .badge-blue  { background:rgba(59,130,246,0.16); color:#1e3a8a; }
    .badge-grey  { background:rgba(100,116,139,0.18); color:#475569; }
    .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
    .filter-chip { padding:5px 12px; border:1px solid var(--border); border-radius:999px; background:var(--bg-elev); color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
    .filter-chip.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    /* Tabel */
    .mo-table-wrap { border:1px solid var(--border); border-radius:10px; overflow:auto; background:var(--bg-elev); }
    table.mo-table { width:100%; border-collapse: collapse; font-size: 12.5px; }
    .mo-table thead th { padding: 10px 12px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color: var(--text-dim); background:var(--bg); border-bottom:1px solid var(--border); white-space: nowrap; font-weight:700; }
    .mo-table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .mo-table tbody tr { cursor: pointer; }
    .mo-table tbody tr:hover td { background:var(--bg); }
    .mo-name { font-weight:600; color:var(--text); }
    .mo-sub  { font-size:11.5px; color:var(--text-faint); }
    .ico-ok   { color:#15803d; }
    .ico-bad  { color:#b91c1c; }
    .ico-mute { color:var(--text-faint); }
    /* Modal */
    .mo-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; display:none; align-items:flex-start; justify-content:center; padding:32px 16px; overflow-y:auto; }
    .mo-modal-overlay.open { display:flex; }
    .mo-modal { width:100%; max-width:780px; background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 32px rgba(0,0,0,0.35); }
    .mo-modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); }
    .mo-modal-title { font-size:16px; font-weight:700; color:var(--text); }
    .mo-modal-body { padding:16px 18px 20px; }
    .mo-section { margin-bottom:14px; padding:12px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); }
    .mo-section-h { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; font-weight:700; margin-bottom:8px; }
    .mo-dl { display:grid; grid-template-columns:140px 1fr; gap:6px 12px; font-size:13px; }
    .mo-dl dt { color:var(--text-dim); }
    .mo-dl dd { color:var(--text); }
    .mo-btn { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font:inherit; font-size:12.5px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg-elev); color:var(--text); }
    .mo-btn:hover:not(:disabled) { background:var(--bg); }
    .mo-btn:disabled { cursor:not-allowed; opacity:0.55; }
    .mo-btn-active { background:var(--text); color:var(--bg); border-color:var(--text); }
    .mo-status-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .mo-clear-btn { padding:5px 9px; font-size:11px; }
    .mo-progress-bar { width:100%; height:8px; background:var(--bg-elev); border-radius:999px; overflow:hidden; border:1px solid var(--border); }
    .mo-progress-fill { height:100%; background:#0d9488; }
    .mo-tooltip { position:relative; cursor:help; }
    .mo-textarea { width:100%; padding:7px 9px; border:1px solid var(--border); border-radius:7px; background:var(--bg-elev); color:var(--text); font:inherit; font-size:12.5px; resize:vertical; }
    /* Tabs in detail-popup (spiegel manager-popup PR #531) */
    .mo-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin:-4px -2px 14px; padding:0 2px; flex-wrap:wrap; }
    .mo-tab { appearance:none; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text-dim); cursor:pointer; font:inherit; font-size:13px; font-weight:600; padding:9px 12px; line-height:1; }
    .mo-tab.active { color:var(--text); border-bottom-color: var(--brand-deep, #093d54); }
    .mo-tab:hover:not(.active) { color:var(--text); }
    .mo-pane[hidden] { display:none; }
    .mo-input-date { padding:6px 8px; border:1px solid var(--border); border-radius:7px; background:var(--bg-elev); color:var(--text); font:inherit; font-size:12.5px; }
    /* Vragenlijst antwoorden-lijst */
    .mo-qa { display:grid; gap:10px; }
    .mo-qa-item { padding:8px 0; border-top:1px dashed var(--border); }
    .mo-qa-item:first-child { border-top:none; padding-top:0; }
    .mo-qa-q { font-size:12px; font-weight:700; color:var(--text); margin-bottom:2px; }
    .mo-qa-a { font-size:13px; color:var(--text); white-space:pre-wrap; word-break:break-word; }
    .mo-qa-a.empty { color:var(--text-faint); }
    /* Page-level tabs (Studenten / Inbox) — zelfde patroon als detail-tabs */
    .mo-page-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin:0 0 18px; }
    .mo-page-tab { appearance:none; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text-dim); cursor:pointer; font:inherit; font-size:14px; font-weight:600; padding:10px 16px; line-height:1; display:inline-flex; align-items:center; gap:6px; }
    .mo-page-tab.active { color:var(--text); border-bottom-color: var(--brand-deep, #093d54); }
    .mo-page-tab:hover:not(.active) { color:var(--text); }
    .mo-page-pane[hidden] { display:none; }
    .mo-tab-badge { display:inline-block; min-width:18px; padding:1px 6px; border-radius:999px; background:#dc2626; color:#fff; font-size:11px; font-weight:700; text-align:center; }
    .mo-tab-badge[hidden] { display:none; }
    /* Onboarding-inbox (oi-*) — port van de admin-inbox uit
       modules/shared/onboarding-overzicht.js + modules/onboarding-hub.html.
       Sinds PR #534 zijn alle inbox-endpoints gedeeld, dus identiek qua
       gedrag voor mentor + admin. */
    .oi-shell { display:grid; grid-template-columns:340px 1fr; gap:0; border:1px solid var(--border); border-radius:10px; overflow:hidden; height:calc(100vh - 260px); min-height:540px; background:var(--bg-elev); }
    .oi-list-pane { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; background:var(--bg); min-width:0; }
    .oi-list-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; gap:8px; flex-shrink:0; }
    .oi-list-body { flex:1; overflow-y:auto; padding:6px; min-height:0; }
    .oi-thread-pane { display:flex; flex-direction:column; overflow:hidden; min-width:0; background:var(--bg); }
    .oi-thread-header { padding:12px 16px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .oi-thread-messages { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:8px; background:var(--bg-elev); min-height:0; }
    .oi-thread-footer { border-top:1px solid var(--border); padding:10px 12px; flex-shrink:0; background:var(--bg); }
    .oi-thread-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:24px; text-align:center; color:var(--text-faint); }
    .oi-conv-row { padding:9px 10px; cursor:pointer; border-radius:8px; display:flex; gap:10px; align-items:center; margin-bottom:2px; border:1px solid transparent; transition:background-color .12s, border-color .12s; }
    .oi-conv-row:hover { background:var(--bg-elev); }
    .oi-conv-row.active { background:rgba(9,61,84,0.10); border-color:rgba(9,61,84,0.18); }
    .oi-conv-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg-elev); display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:var(--text-dim); flex-shrink:0; }
    .oi-conv-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:1px; }
    .oi-conv-toprow { display:flex; align-items:center; gap:6px; }
    .oi-conv-name { font-size:13.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
    .oi-conv-time { font-size:10.5px; color:var(--text-faint); flex-shrink:0; }
    .oi-conv-preview { font-size:12px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .oi-conv-meta { display:flex; align-items:center; gap:6px; margin-top:1px; }
    .oi-conv-handoff { background:rgba(220,38,38,0.15); color:#b91c1c; border-radius:10px; padding:2px 8px; font-size:10.5px; font-weight:700; letter-spacing:.04em; }
    .oi-24h-dot { display:inline-block; width:9px; height:9px; border-radius:50%; flex-shrink:0; margin-left:4px; }
    .oi-24h-dot.open { background:#059669; box-shadow:0 0 0 2px rgba(5,150,105,0.18); }
    .oi-24h-dot.closed { background:#dc2626; box-shadow:0 0 0 2px rgba(220,38,38,0.18); }
    .oi-ctx-strip { display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--bg-elev); border-bottom:1px solid var(--border); font-size:12.5px; color:var(--text-dim); flex-wrap:wrap; flex-shrink:0; }
    .oi-ctx-label { font-weight:700; color:var(--text-faint); text-transform:uppercase; font-size:10.5px; letter-spacing:.04em; }
    .oi-sim-card { border:1px solid #d97706; border-radius:10px; background:rgba(217,119,6,0.05); padding:12px; margin:6px 14px 0 14px; }
    .oi-sim-card.needs-human { border-color:#dc2626; background:rgba(220,38,38,0.06); }
    .oi-sim-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .oi-sim-head .ti { color:#d97706; }
    .oi-sim-card.needs-human .oi-sim-head .ti { color:#dc2626; }
    .oi-sim-title { font-weight:700; font-size:12.5px; color:#d97706; }
    .oi-sim-card.needs-human .oi-sim-title { color:#dc2626; }
    .oi-sim-meta { font-size:11px; color:var(--text-dim); margin-left:auto; }
    .oi-sim-quote { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:8px 10px; font-size:13px; color:var(--text); white-space:pre-wrap; line-height:1.45; }
    .oi-sim-actions { display:flex; gap:8px; margin-top:10px; align-items:center; flex-wrap:wrap; }
    .oi-sim-actions .btn-dismiss { background:transparent; border:1px solid var(--border); color:var(--text-faint); padding:5px 10px; border-radius:7px; font-size:11.5px; cursor:pointer; font-family:inherit; margin-left:auto; }
    .oi-sim-actions .btn-dismiss:hover { color:var(--text-dim); }
    .oi-tab-badge { background:rgba(220,38,38,0.15); color:#b91c1c; border-radius:10px; padding:1px 8px; font-size:10.5px; font-weight:700; margin-left:6px; display:none; }
    .oi-skel-row { height:48px; background:linear-gradient(90deg, var(--bg-elev) 0%, var(--bg) 50%, var(--bg-elev) 100%); border-radius:8px; margin-bottom:4px; opacity:.5; }
    .oi-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:9999; display:none; align-items:flex-start; justify-content:center; padding:60px 16px; overflow-y:auto; }
    .oi-modal-overlay.show { display:flex; }
    .oi-modal-card { background:var(--bg); border:1px solid var(--border); border-radius:12px; width:100%; max-width:560px; padding:16px 18px; box-shadow:0 12px 40px rgba(0,0,0,0.25); }
    .oi-modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .oi-modal-title { font-size:14.5px; font-weight:700; color:var(--text); }
    .oi-modal-search { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:var(--bg-elev); font-size:13px; color:var(--text); font-family:inherit; margin-bottom:8px; }
    .oi-modal-list { max-height:360px; overflow-y:auto; display:flex; flex-direction:column; gap:4px; }
    .oi-modal-item { padding:9px 10px; border:1px solid var(--border); border-radius:8px; cursor:pointer; background:var(--bg-elev); transition:background-color .12s, border-color .12s; }
    .oi-modal-item:hover { background:var(--bg); border-color:var(--text-faint); }
    .oi-modal-item .iname { font-size:13px; font-weight:600; color:var(--text); }
    .oi-modal-item .imeta { font-size:11.5px; color:var(--text-dim); margin-top:2px; }
    .refresh-btn { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border:1px solid var(--border); border-radius:7px; background:var(--bg-elev); color:var(--text); font:inherit; font-size:12.5px; cursor:pointer; }
    .refresh-btn:disabled { opacity:.55; cursor:not-allowed; }
    .empty-state { padding:24px; border:1px dashed var(--border); border-radius:10px; text-align:center; color:var(--text-faint); font-size:13px; }
    .mo-toast { position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(20px); background:#222; color:#fff; padding:10px 18px; border-radius:8px; font-size:13.5px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .2s, transform .2s; z-index:10000; box-shadow:0 6px 24px rgba(0,0,0,0.35); }
    .mo-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .mo-toast.success { background:#059669; }
    .mo-toast.error   { background:#b91c1c; }
    @media (max-width:880px) {
      .oi-shell { grid-template-columns:1fr; height:auto; min-height:0; }
      .oi-list-pane { border-right:none; }
      .oi-shell.thread-open .oi-list-pane { display:none; }
      .oi-shell:not(.thread-open) .oi-thread-pane { display:none; }
    }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-header">
    <div>
      <h1>Onboarding</h1>
      <p>Jouw toegewezen instroom-studenten — klik op een rij voor de volledige detail-popup.</p>
    </div>
    <div style="position:relative">
      <button id="msNotifBtn" type="button" title="Meldingen"
        style="position:relative;background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:inherit">
        <i class="ti ti-bell"></i>
        <span id="msNotifCount" style="display:none;background:#dc2626;color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;font-weight:700;line-height:1.4">0</span>
      </button>
      <div id="msNotifPanel" hidden
        style="position:absolute;right:0;top:calc(100% + 6px);width:380px;max-height:520px;overflow-y:auto;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);z-index:50">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:13px">Meldingen</div>
          <button id="msNotifMarkAll" type="button" style="background:transparent;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit">Alles gelezen</button>
        </div>
        <div id="msNotifList" style="padding:4px 0">
          <div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Laden…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="mo-page-tabs" role="tablist">
    <button type="button" class="mo-page-tab active" data-mo-page-tab="students" role="tab"><i class="ti ti-users"></i> Studenten</button>
    <button type="button" class="mo-page-tab" data-mo-page-tab="inbox" id="moInboxTabBtn" role="tab" hidden><i class="ti ti-mail"></i> Inbox <span class="oi-tab-badge" id="oiInboxManualBadge">0</span></button>
  </div>

  <div class="mo-page-pane" data-mo-page-pane="students">
    <div class="filter-row" id="moFilterRow">
      <button type="button" class="filter-chip active" data-mo-filt="all">Alles</button>
      <button type="button" class="filter-chip" data-mo-filt="problems">Te behandelen</button>
      <button type="button" class="filter-chip" data-mo-filt="wil_niet">Wil niet</button>
      <button type="button" class="filter-chip" data-mo-filt="no_show">No-show</button>
      <button type="button" class="filter-chip" data-mo-filt="geen_gehoor">Geen gehoor</button>
      <button type="button" class="filter-chip" data-mo-filt="wil_later">Wil later</button>
      <button type="button" class="filter-chip" data-mo-filt="call_ingepland">Call ingepland</button>
      <button type="button" class="filter-chip" data-mo-filt="gestart">Gestart</button>
      <span id="moCountInfo" style="margin-left:auto;font-size:12.5px;color:var(--text-faint)"></span>
    </div>

    <div id="moTableWrap"><div class="empty-state"><i class="ti ti-clock"></i>Laden…</div></div>
  </div>

  <div class="mo-page-pane" data-mo-page-pane="inbox" hidden>
    <!-- Onboarding-inbox shell — 1:1 port uit modules/shared/onboarding-overzicht.js.
         Endpoints zijn sinds PR #534 gedeeld; mentor + admin zien hetzelfde. -->
    <div class="oi-shell" id="oiInboxShell">
      <aside id="oiInboxListPane" class="oi-list-pane">
        <div class="oi-list-header">
          <div style="font-size:12.5px;font-weight:600;color:var(--text)">Gesprekken</div>
          <button type="button" class="refresh-btn" id="oiInboxRefresh" title="Vernieuwen" style="padding:4px 8px;font-size:12px"><i class="ti ti-refresh"></i></button>
        </div>
        <div id="oiListSourceBar" style="display:flex;padding:6px 10px 0;gap:4px">
          <div role="tablist" style="display:inline-flex;width:100%;background:var(--bg-elev,#f1f5f9);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px">
            <button type="button" id="oiSrcBtnWa" data-oi-src="wa" style="flex:1;border:none;background:var(--bg,#fff);color:var(--text);padding:6px 10px;font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06)"><i class="ti ti-brand-whatsapp"></i> Gesprekken</button>
            <button type="button" id="oiSrcBtnEmail" data-oi-src="email" style="flex:1;border:none;background:transparent;color:var(--text-dim);padding:6px 10px;font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer;position:relative"><i class="ti ti-mail"></i> E-mail<span id="oiListEmailBadge" style="display:none;margin-left:6px;min-width:17px;height:17px;line-height:17px;padding:0 5px;border-radius:9px;background:#dc2626;color:#fff;font-size:10px;font-weight:700;text-align:center;vertical-align:middle">0</span></button>
          </div>
        </div>
        <div id="oiInboxList" class="oi-list-body"><div class="oi-skel-row"></div><div class="oi-skel-row"></div></div>
      </aside>
      <section id="oiThreadPane" class="oi-thread-pane">
        <div id="oiThreadEmpty" class="oi-thread-empty">
          <i class="ti ti-message-circle" style="font-size:36px;color:var(--text-faint)"></i>
          <div style="font-size:13.5px;font-weight:600;color:var(--text)">Selecteer een gesprek</div>
          <div style="font-size:12px;color:var(--text-faint);max-width:320px">Kies een conversatie links om de berichten te zien en met Mila te beantwoorden.</div>
        </div>
        <div id="oiThreadContent" style="display:none;flex:1;min-height:0;flex-direction:column">
          <div class="oi-thread-header">
            <button type="button" id="oiThreadBack" title="Terug naar lijst" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;color:var(--text-dim)"><i class="ti ti-arrow-left"></i></button>
            <div style="flex:1;min-width:0">
              <div id="oiThreadName" style="font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
              <div id="oiThreadPhone" style="font-size:11.5px;color:var(--text-faint)">—</div>
            </div>
            <span id="oiThreadWindowBadge" style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em">—</span>

              <button type="button" class="refresh-btn" id="oiTemplateBtn" title="Verstuur een goedgekeurde Meta-template" style="padding:6px 10px"><i class="ti ti-template"></i></button>

              <button type="button" class="refresh-btn" id="oiSendBtn" style="background:var(--brand-deep,#093d54);color:#fff" title="Versturen"><i class="ti ti-send"></i> Versturen</button>

            <div id="oiThreadHint" style="font-size:11.5px;color:var(--text-faint);margin-top:4px"></div>

      </section>
    </div>
  </div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  // ── Helpers ────────────────────────────────────────────────────────────
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const fmtDateNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return iso; }
  };
  const fmtDateTimeNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  };
  function _shortDateTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }
  function setError(elId, msg) {
    const el = document.getElementById(elId);
    if (el) el.innerHTML =
      `<div class="empty-state" style="border-color:#fecaca;color:#b91c1c"><i class="ti ti-alert-triangle"></i>${esc(msg)}</div>`;
  }

  // ── State ──────────────────────────────────────────────────────────────
  const _nextCallByStudent = new Map();
  const _noshowByStudent   = new Map();
  const _completedByMember = new Map();
  const _byId              = new Map(); // onboarding_id → student-record
  let   _filter            = 'all';
  let   _notifications     = [];
  const _unreadByOnb       = new Map();
  let   _openId            = null;      // onboarding_id van open popup

  // Onboarding-inbox state — 1-op-1 port uit modules/shared/onboarding-overzicht.js.
  // Sinds PR #534 zijn alle inbox-endpoints gedeeld voor onboarding.inbox.view;
  // mentor + admin zien hetzelfde, dus geen eigen scoping-laag hier.
  // We voegen één eigen vlag (_oiInboxLoaded) toe voor de lazy first-load bij
  // page-tab-klik (uniek aan deze pagina; in de hub is dat een aparte ob-tab).
  const _oiState = {
    convId:              null,
    conv:                null,
    canSendText:         false,
    suggestion:          null,
    editingSuggestionId: null,
    mode:                'wa',   // 'wa' | 'email'
    emailLoaded:         false,
    emailItems:          [],
    emailWarning:        null,
    emailCustomerEmail:  '',
    listSource:          'wa',   // 'wa' | 'email' (lijst-bron toggle)
    emailSenders:        [],
    emailSendersLoaded:  false,
  };
  const _oiTplState = { items: [], filter: '', loaded: false, sendingFor: null };
  let _oiInboxLoaded = false;     // lazy-load gate

  // ── 1-op-1 maps (auto-statussen: gestart / call_ingepland / no_show) ──
  async function loadOneOnOneMaps() {
    _nextCallByStudent.clear();
    _noshowByStudent.clear();
    _completedByMember.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-1on1-sessions');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || '1on1 fetch failed');
      const nowMs = Date.now();
      const planned = Array.isArray(d.planned) ? d.planned : [];
      for (const p of planned) {
        const mu = p.member_user;
        if (!mu) continue;
        const t = new Date(p.starts_at).getTime();
        if (!Number.isFinite(t) || t < nowMs) continue;
        const prev = _nextCallByStudent.get(mu);
        if (!prev || t < new Date(prev).getTime()) _nextCallByStudent.set(mu, p.starts_at);
      }
      const completed = Array.isArray(d.completed) ? d.completed : [];
      for (const c of completed) {
        const mu = c.member_user;
        if (!mu) continue;
        const t = new Date(c.starts_at).getTime();
        if (!Number.isFinite(t)) continue;
        const prev = _completedByMember.get(mu);
        if (!prev || t < new Date(prev).getTime()) _completedByMember.set(mu, c.starts_at);
      }
      const nsBy = (d && typeof d.noshow_by_student === 'object' && d.noshow_by_student) ? d.noshow_by_student : {};
      for (const [mu, iso] of Object.entries(nsBy)) {
        if (mu && iso) _noshowByStudent.set(String(mu), String(iso));
      }
    } catch (e) { console.warn('[mentor-onboarding] 1on1:', e?.message || e); }
  }

  // ── Intake-statusmodel ────────────────────────────────────────────────
  const _INTAKE_MANUAL = ['nog_te_benaderen','geen_gehoor','wil_later','wil_niet'];
  const _INTAKE_META = {
    gestart:           { label: 'Gestart',            cls: 'badge-green', auto: true  },
    wil_niet:          { label: 'Wil niet starten',   cls: 'badge-red',   auto: false },
    no_show:           { label: 'No-show',            cls: 'badge-red',   auto: true  },
    geen_gehoor:       { label: 'Geen gehoor',        cls: 'badge-amber', auto: false },
    wil_later:         { label: 'Wil later starten',  cls: 'badge-amber', auto: false },
    call_ingepland:    { label: 'Call ingepland',     cls: 'badge-blue',  auto: true  },
    nog_te_benaderen:  { label: 'Nog te benaderen',   cls: 'badge-grey',  auto: false },
  };
  const _RANK = {
    wil_niet: 0, no_show: 1, geen_gehoor: 2, wil_later: 3,
    nog_te_benaderen: 4, call_ingepland: 5, gestart: 9,
  };
  function _intakeState(s) {
    const bu = s.bubble_user_id ? String(s.bubble_user_id) : null;
    if (bu && _completedByMember.has(bu))      return 'gestart';
    const ms = s.mentor_intake_status || null;
    if (ms === 'wil_niet')                     return 'wil_niet';
    if (bu && _noshowByStudent.has(bu))        return 'no_show';
    if (ms === 'geen_gehoor')                  return 'geen_gehoor';
    if (ms === 'wil_later')                    return 'wil_later';
    if (bu && _nextCallByStudent.has(bu))      return 'call_ingepland';
    return 'nog_te_benaderen';
  }
  function _intakePillHtml(key) {
    const m = _INTAKE_META[key] || _INTAKE_META.nog_te_benaderen;
    return `<span class="badge ${m.cls}">${esc(m.label)}</span>`;
  }

  // ── Cell helpers ──────────────────────────────────────────────────────
  function _trajectCell(s) {
    const lbl = s.traject_label || '—';
    const parts = [];
    if (s.traject_calls != null) parts.push(s.traject_calls + ' 1-op-1');
    if (s.traject_duur_maanden != null) parts.push(s.traject_duur_maanden + ' mnd');
    const sub = parts.length ? ('<div class="mo-sub">' + esc(parts.join(' · ')) + '</div>') : '';
    return '<div>' + esc(lbl) + '</div>' + sub;
  }
  function _paidCell(paid) {
    return paid
      ? '<i class="ti ti-check ico-ok" title="Betaald"></i>'
      : '<i class="ti ti-x ico-bad" title="Nog niet betaald"></i>';
  }
  function _bubbleCell(s) {
    if (s.bubble_provisioned) {
      return '<i class="ti ti-circle-check-filled ico-ok" title="Bubble-account aangemaakt' + (s.bubble_provisioned_at ? ' op ' + esc(fmtDateNL(s.bubble_provisioned_at)) : '') + '"></i>';
    }
    if (s.bubble_provision_error) {
      return '<i class="ti ti-alert-triangle-filled ico-bad" title="Bubble-aanmaak mislukt: ' + esc(String(s.bubble_provision_error).slice(0, 120)) + '"></i>';
    }
    return '<i class="ti ti-circle-dashed ico-mute" title="Bubble nog niet aangemaakt"></i>';
  }
  function _bedenktijdCell(bt) {
    if (!bt || bt.status === 'onbekend') return '<span class="ico-mute">—</span>';
    const dt = bt.vervalt_op ? esc(fmtDateNL(bt.vervalt_op)) : '—';
    if (bt.status === 'vervallen') {
      // groen vinkje = vervallen (klant kan niet meer terug)
      return '<i class="ti ti-check ico-ok" title="Vervallen (' + esc(bt.reason || '') + ')"></i> <span style="font-size:11.5px;color:var(--text-dim)">' + dt + '</span>';
    }
    // rood kruisje = nog NIET vervallen (klant kan nog terugkomen)
    return '<i class="ti ti-x ico-bad" title="Nog niet vervallen"></i> <span style="font-size:11.5px;color:var(--text-dim)">' + dt + '</span>';
  }
  function _wizardCell(s) {
    // Voltooid → toon expliciet "Afgerond" i.p.v. de laatst-bezochte stap.
    // current_step blijft op de laatste pagina hangen (geen reset bij
    // afronding), dus zonder deze guard kreeg je "6 van 7" op een
    // succesvol afgeronde onboarding.
    if (s.completed_at || s.status === 'afgerond') {
      return '<span style="color:#16a34a;font-weight:600">Afgerond</span>';
    }
    const tot = s.total_steps || null;
    const cs  = s.current_step || null;
    if (!tot && !cs) return '<span class="ico-mute">—</span>';
    if (!tot) return esc(cs || '—');
    // current_step is een string-label van de huidige pagina; vertaal naar 1-based index als mogelijk.
    const idx = (s.current_step_index != null && Number.isFinite(s.current_step_index)) ? Number(s.current_step_index) : null;
    if (idx != null) return idx + '/' + tot;
    return cs ? (esc(cs) + ' <span class="mo-sub">van ' + tot + '</span>') : ('— van ' + tot);
  }
  // Formatteert availability.days. Backend levert per dag een object
  // { label, dayparts:[…] } i.p.v. een string — av.days.join(', ') gaf
  // daarom "[object Object]". Output bv: "Maandag (Ochtend, Avond), Donderdag (Avond)".
  function _fmtAvailDays(days) {
    return (Array.isArray(days) ? days : [])
      .map(function (d) {
        if (!d || typeof d !== 'object') return '';
        var lbl = d.label || d.value || '';
        var dp  = Array.isArray(d.dayparts) && d.dayparts.length ? ' (' + d.dayparts.join(', ') + ')' : '';
        return lbl + dp;
      })
      .filter(Boolean)
      .join(', ');
  }
  function _availSummary(av) {
    if (!av || typeof av !== 'object') return '';
    const parts = [];
    if (Array.isArray(av.days) && av.days.length) parts.push('Dagen: ' + _fmtAvailDays(av.days));
    if (Array.isArray(av.blocks) && av.blocks.length) parts.push('Dagdelen: ' + av.blocks.join(', '));
    return parts.join(' · ');
  }
  function _availCell(av) {
    const summary = _availSummary(av);
    if (!summary) return '<span class="ico-mute">—</span>';
    return '<i class="ti ti-calendar ico-mute mo-tooltip" title="' + esc(summary) + '"></i>';
  }
  function _unreadDotHtml(onbId) {
    if (!onbId) return '';
    const n = _unreadByOnb.get(onbId) || 0;
    if (n <= 0) return '';
    return ' <span class="badge" style="background:#dc2626;color:#fff;padding:1px 7px;border-radius:999px;font-size:10.5px" title="Ongelezen update van management">●</span>';
  }

  // ── Filter / sort / render tabel ──────────────────────────────────────
  function _applyFilter(list) {
    if (_filter === 'all') return list;
    if (_filter === 'problems') {
      const PROB = new Set(['wil_niet','no_show','geen_gehoor','wil_later']);
      return list.filter((s) => PROB.has(_intakeState(s)));
    }
    return list.filter((s) => _intakeState(s) === _filter);
  }

  function _renderTable(students) {
    const wrap = document.getElementById('moTableWrap');
    if (!wrap) return;
    const list = Array.isArray(students) ? students : [];
    _byId.clear();
    for (const s of list) {
      if (s && s.onboarding_id) _byId.set(String(s.onboarding_id), s);
    }
    const filtered = _applyFilter(list);
    const info = document.getElementById('moCountInfo');
    if (info) info.textContent = filtered.length + ' / ' + list.length + ' studenten';
    if (filtered.length === 0) {
      wrap.innerHTML = list.length === 0
        ? `<div class="empty-state"><i class="ti ti-user-question"></i>Je hebt nog geen toegewezen studenten.</div>`
        : `<div class="empty-state"><i class="ti ti-filter-off"></i>Geen studenten in deze filter.</div>`;
      return;
    }
    // Sort: startdatum asc; zonder start_date onderaan.
    const sorted = filtered.slice().sort((a, b) => {
      const ad = a.start_date ? String(a.start_date) : '';
      const bd = b.start_date ? String(b.start_date) : '';
      if (ad && !bd) return -1;
      if (!ad && bd) return 1;
      if (ad !== bd) return ad < bd ? -1 : 1;
      return String(a.customer_name || '').localeCompare(String(b.customer_name || ''));
    });
    const body = sorted.map((s) => {
      const onbId  = esc(String(s.onboarding_id || ''));
      const intake = _intakeState(s);
      return `
        <tr data-mo-id="${onbId}">
          <td><div class="mo-name">${esc(s.customer_name || '—')}${_unreadDotHtml(s.onboarding_id)}</div></td>
          <td>${_intakePillHtml(intake)}</td>
          <td>${_trajectCell(s)}</td>
          <td>${s.start_date ? esc(fmtDateNL(s.start_date)) : '<span class="ico-mute">—</span>'}</td>
          <td>${_paidCell(!!s.paid)}</td>
          <td>${_bubbleCell(s)}</td>
          <td>${_bedenktijdCell(s.bedenktijd || null)}</td>
          <td>${_wizardCell(s)}</td>
          <td>${_availCell(s.availability)}</td>
          <td style="text-align:right;color:var(--text-faint)"><i class="ti ti-chevron-right"></i></td>
        </tr>`;
    }).join('');
    wrap.innerHTML = `
      <div class="mo-table-wrap">
        <table class="mo-table">
          <thead>
            <tr>
              <th>Klant</th>
              <th>Status</th>
              <th>Traject</th>
              <th>Start</th>
              <th>Betaald</th>
              <th>Bubble</th>
              <th>Bedenktijd</th>
              <th>Wizard</th>
              <th>Beschikb.</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
      </div>`;
    wrap.querySelectorAll('tr[data-mo-id]').forEach((tr) => {
      tr.addEventListener('click', () => openModal(tr.getAttribute('data-mo-id')));
    });
  }

  // ── Tijdlijn ──────────────────────────────────────────────────────────
  function _buildTimeline(s) {
    const events = [];
    if (s.created_at) events.push({ at: s.created_at, label: 'Toegewezen aan jou' });
    const bu = s.bubble_user_id ? String(s.bubble_user_id) : null;
    if (bu) {
      const planned = _nextCallByStudent.get(bu);
      if (planned) events.push({ at: planned, label: 'Call ingepland' });
      const started = _completedByMember.get(bu);
      if (started) events.push({ at: started, label: 'Eerste call gestart' });
      const ns = _noshowByStudent.get(bu);
      if (ns) events.push({ at: ns, label: 'No-show' });
    }
    for (const u of (Array.isArray(s.updates) ? s.updates : [])) {
      if (u.kind === 'status' && u.status && _INTAKE_META[u.status]) {
        events.push({ at: u.created_at, label: 'Status: ' + _INTAKE_META[u.status].label, note: u.note || '' });
      } else if (u.kind === 'status' && !u.status) {
        events.push({ at: u.created_at, label: 'Status gewist', note: u.note || '' });
      } else if (u.kind === 'note' && u.note) {
        events.push({ at: u.created_at, label: 'Notitie', note: u.note });
      }
    }
    events.sort((a, b) => String(a.at || '').localeCompare(String(b.at || '')));
    if (events.length === 0) return '<div style="color:var(--text-faint);font-size:12.5px">Geen activiteit.</div>';
    return events.map((e) => {
      const when = e.at ? esc(fmtDateTimeNL(e.at)) : '—';
      const note = e.note ? `<div style="margin-top:2px;color:var(--text-dim);font-size:12px;white-space:pre-wrap">${esc(e.note)}</div>` : '';
      return `
        <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;padding:6px 0;border-top:1px solid var(--border)">
          <div style="font-size:11.5px;color:var(--text-faint)">${when}</div>
          <div><div style="font-size:12.5px;color:var(--text)">${esc(e.label)}</div>${note}</div>
        </div>`;
    }).join('');
  }

  // ── Modal ─────────────────────────────────────────────────────────────
  function openModal(onbId) {
    const s = _byId.get(String(onbId));
    if (!s) return;
    _openId = String(onbId);
    const overlay = document.getElementById('moModalOverlay');
    const title   = document.getElementById('moModalTitle');
    const pill    = document.getElementById('moModalStatusPill');
    const body    = document.getElementById('moModalBody');
    if (title) title.textContent = s.customer_name || 'Student';
    if (pill)  pill.innerHTML = _intakePillHtml(_intakeState(s));
    if (body)  body.innerHTML = _renderModalBody(s);
    if (overlay) overlay.classList.add('open');
    _wireModalHandlers(s);
  }
  function closeModal() {
    _openId = null;
    const overlay = document.getElementById('moModalOverlay');
    if (overlay) overlay.classList.remove('open');
  }
  function _refreshModal() {
    if (!_openId) return;
    const s = _byId.get(_openId);
    if (!s) return;
    const body = document.getElementById('moModalBody');
    const pill = document.getElementById('moModalStatusPill');
    if (pill)  pill.innerHTML = _intakePillHtml(_intakeState(s));
    if (body)  body.innerHTML = _renderModalBody(s);
    _wireModalHandlers(s);
  }

  // Vragenlijst-antwoorden uit server-resolved `answers_view` (label+value
  // per blok). Backend skipt al lege antwoorden / layout-blokken; hier
  // doen we alleen de presentatie.
  function _renderAnswersList(s) {
    const av = Array.isArray(s.answers_view) ? s.answers_view : [];
    if (av.length === 0) {
      return '<div style="font-size:13px;color:var(--text-faint)">Nog geen antwoorden ingevuld.</div>';
    }
    const items = av.map((it) => {
      const val = it && it.value != null ? String(it.value).trim() : '';
      const cls = val ? 'mo-qa-a' : 'mo-qa-a empty';
      const dis = val ? esc(val) : '—';
      return '<div class="mo-qa-item">'
        + '<div class="mo-qa-q">' + esc(it.label || it.key || '—') + '</div>'
        + '<div class="' + cls + '">' + dis + '</div>'
        + '</div>';
    }).join('');
    return '<div class="mo-qa">' + items + '</div>';
  }

  function _renderModalBody(s) {
    const intake = _intakeState(s);
    const manualSet = String(s.mentor_intake_status || '');
    // Contact
    const tel = s.customer_phone
      ? '<a href="tel:' + esc(s.customer_phone) + '">' + esc(s.customer_phone) + '</a>'
      : '<span class="ico-mute">—</span>';
    const em = s.customer_email
      ? '<a href="mailto:' + esc(s.customer_email) + '">' + esc(s.customer_email) + '</a>'
      : '<span class="ico-mute">—</span>';

    // Bubble-account
    let bubbleLine = '';
    if (s.bubble_provisioned) {
      bubbleLine = '<i class="ti ti-circle-check-filled ico-ok"></i> Aangemaakt'
        + (s.bubble_provisioned_at ? ' op ' + esc(fmtDateNL(s.bubble_provisioned_at)) : '');
    } else if (s.bubble_provision_error) {
      bubbleLine = '<i class="ti ti-alert-triangle-filled ico-bad"></i> Mislukt — '
        + '<span style="color:var(--text-dim);font-size:12px">' + esc(String(s.bubble_provision_error).slice(0, 200)) + '</span>';
    } else {
      bubbleLine = '<i class="ti ti-circle-dashed ico-mute"></i> Nog niet aangemaakt';
    }
    const credsLine = s.credentials_email_sent_at
      ? 'Inloggegevens-mail verzonden op ' + esc(fmtDateNL(s.credentials_email_sent_at))
      : 'Inloggegevens-mail nog niet verzonden';
    // Resend-credentials: knop tijdelijk verborgen — Bubble-side
    // reset_student_password-workflow nog niet betrouwbaar; we laten 'm
    // bewust uit de UI tot dat opgelost is. Endpoint
    // /api/onboarding-credentials-reset + ownership-gate blijven
    // ongewijzigd zodat de knop later 1-op-1 terug kan. Wire-handler
    // (_resetCredentials) staat hieronder nog wel, maar zonder render-
    // target doet de querySelector een no-op.
    const credsHelp = '';

    // Instroom-blok
    const trajectLabel = s.traject_label ? esc(s.traject_label) : '—';
    const looptijd = (s.traject_duur_maanden != null)
      ? (s.traject_duur_maanden + ' mnd' + (s.traject_calls != null ? ' · ' + s.traject_calls + ' 1-op-1' : ''))
      : (s.traject_calls != null ? s.traject_calls + ' 1-op-1' : '—');
    const bt = s.bedenktijd || null;
    const btLine = bt && bt.status !== 'onbekend'
      ? ((bt.status === 'vervallen'
            ? '<i class="ti ti-check ico-ok"></i> Vervallen'
            : '<i class="ti ti-x ico-bad"></i> Nog niet vervallen')
          + (bt.vervalt_op ? ' · ' + esc(fmtDateNL(bt.vervalt_op)) : ''))
      : '<span class="ico-mute">—</span>';

    // Wizard
    const tot = s.total_steps || null;
    const cs  = s.current_step || null;
    const pct = (tot && s.current_step_index != null)
      ? Math.min(100, Math.round((Number(s.current_step_index) / tot) * 100))
      : 0;
    const wizText = tot
      ? ('Stap ' + (s.current_step_index != null ? s.current_step_index : '?') + ' van ' + tot + (cs ? ' (' + esc(cs) + ')' : ''))
      : (cs ? esc(cs) : 'Onbekend');

    // Vragenlijst-indicator (x van n ingevuld). 'n' is het aantal
    // antwoordbare blokken (server-side al gefilterd in answers_view) plus
    // de blokken die nog leeg zijn (best-effort: backend skipt lege, dus
    // n = filled hier — we tonen alleen "x ingevuld" als we de totalen
    // niet weten).
    const av = Array.isArray(s.answers_view) ? s.answers_view : [];
    const ansFilled = av.length;
    const qLine = ansFilled > 0
      ? ansFilled + ' antwoorden ingevuld'
      : 'Nog geen antwoorden';

    // Beschikbaarheid (volledig)
    const avl = s.availability || null;
    const avLine = avl
      ? ((Array.isArray(avl.days)   && avl.days.length   ? '<div><strong>Dagen:</strong> ' + esc(_fmtAvailDays(avl.days)) + '</div>' : '')
       + (Array.isArray(avl.blocks) && avl.blocks.length ? '<div><strong>Dagdelen:</strong> ' + esc(avl.blocks.join(', ')) + '</div>' : '')
       || '<span class="ico-mute">—</span>')
      : '<span class="ico-mute">—</span>';

    // Status-block (4 status-knoppen + × wissen + auto-status-hint)
    const manualBtns = _INTAKE_MANUAL.map((k) => {
      const m = _INTAKE_META[k];
      const isCurrent = (manualSet === k);
      const cls = isCurrent ? 'mo-btn mo-btn-active' : 'mo-btn';
      return `<button type="button" class="${cls}" data-mo-set="${esc(k)}">${esc(m.label)}</button>`;
    }).join(' ');
    const clearBtn = manualSet
      ? `<button type="button" class="mo-btn mo-clear-btn" data-mo-clear="1" title="Zet terug naar automatisch"><i class="ti ti-x"></i> Wissen</button>`
      : '';
    const isAuto = (intake !== manualSet) && _INTAKE_META[intake] && _INTAKE_META[intake].auto;
    const autoNote = isAuto
      ? `<div style="font-size:11.5px;color:var(--text-faint);margin-top:6px">Auto-status "<strong>${esc(_INTAKE_META[intake].label)}</strong>" — afgeleid uit de 1-op-1 sessies. Kies hierboven een handmatige status om dat te overschrijven.</div>`
      : '';

    // Startdatum-veld (input + Opslaan-knop → mentor-future-student-update
    // met body.start_date). Default-waarde: huidige start_date in YYYY-MM-DD.
    const sdVal = s.start_date ? esc(String(s.start_date).slice(0, 10)) : '';

    // ── 4 tabs (spiegel manager-popup PR #531) ───────────────────────────
    const overviewPane = `
      <div class="mo-section">
        <div class="mo-section-h">Contact</div>
        <dl class="mo-dl">
          <dt>Telefoon</dt><dd>${tel}</dd>
          <dt>E-mail</dt><dd>${em}</dd>
        </dl>
      </div>

      <div class="mo-section">
        <div class="mo-section-h">Instroom</div>
        <dl class="mo-dl">
          <dt>Traject</dt><dd>${trajectLabel}</dd>
          <dt>Looptijd</dt><dd>${esc(looptijd)}</dd>
          <dt>Startdatum</dt><dd>${s.start_date ? esc(fmtDateNL(s.start_date)) : '<span class="ico-mute">— niet ingesteld</span>'}</dd>
          <dt>Betaald</dt><dd>${s.paid ? '<i class="ti ti-check ico-ok"></i> Ja' : '<i class="ti ti-x ico-bad"></i> Nog niet'}</dd>
          <dt>Bedenktijd</dt><dd>${btLine}</dd>
        </dl>
      </div>

      <div class="mo-section">
        <div class="mo-section-h">Status zetten</div>
        <div class="mo-status-btns">${manualBtns} ${clearBtn}</div>
        ${autoNote}
        <div style="margin-top:12px">
          <div style="font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Notitie</div>
          <textarea id="moNote" rows="2" placeholder="Voeg een notitie toe…" class="mo-textarea"></textarea>
          <div style="margin-top:6px;display:flex;justify-content:flex-end">
            <button type="button" class="mo-btn" data-mo-save-note><i class="ti ti-message-circle"></i> Opslaan</button>
          </div>
        </div>
      </div>

      <div class="mo-section">
        <div class="mo-section-h">Startdatum wijzigen</div>
        <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">Pas de startdatum aan voor jouw toegewezen student. De manager krijgt een melding.</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="date" id="moStartDate" class="mo-input-date" value="${sdVal}" />
          <button type="button" class="mo-btn" data-mo-save-startdate><i class="ti ti-calendar"></i> Opslaan</button>
        </div>
      </div>
    `;

    const accountPane = `
      <div class="mo-section">
        <div class="mo-section-h">Bubble-account</div>
        <div style="font-size:13px;margin-bottom:8px">${bubbleLine}</div>
        <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:8px">${credsLine}</div>
        ${credsHelp}
      </div>

      <div class="mo-section">
        <div class="mo-section-h">Wizard-voortgang</div>
        <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:6px">${wizText}</div>
        <div class="mo-progress-bar"><div class="mo-progress-fill" style="width:${pct}%"></div></div>
      </div>
    `;

    const formPane = `
      <div class="mo-section">
        <div class="mo-section-h">Vragenlijst</div>
        <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:10px">${esc(qLine)}</div>
        ${_renderAnswersList(s)}
      </div>

      <div class="mo-section">
        <div class="mo-section-h">Beschikbaarheid</div>
        <div style="font-size:13px;display:grid;gap:2px">${avLine}</div>
      </div>
    `;

    const timelinePane = `
      <div class="mo-section">
        <div class="mo-section-h">Tijdlijn</div>
        ${_buildTimeline(s)}
      </div>
    `;

    return `
      <div class="mo-tabs" role="tablist">
        <button type="button" class="mo-tab active" data-mo-tab="overview"  role="tab">Overzicht</button>
        <button type="button" class="mo-tab"        data-mo-tab="account"   role="tab">Account &amp; Bubble</button>
        <button type="button" class="mo-tab"        data-mo-tab="form"      role="tab">Vragenlijst</button>
        <button type="button" class="mo-tab"        data-mo-tab="timeline"  role="tab">Tijdlijn</button>
      </div>
      <div class="mo-pane" data-mo-pane="overview">${overviewPane}</div>
      <div class="mo-pane" data-mo-pane="account"  hidden>${accountPane}</div>
      <div class="mo-pane" data-mo-pane="form"     hidden>${formPane}</div>
      <div class="mo-pane" data-mo-pane="timeline" hidden>${timelinePane}</div>
    `;
  }

  function _wireModalHandlers(s) {
    // Tab-switch (Overzicht / Account & Bubble / Vragenlijst / Tijdlijn)
    document.querySelectorAll('.mo-tab[data-mo-tab]').forEach((tab) => {
      tab.addEventListener('click', () => {
        const key = tab.getAttribute('data-mo-tab');
        document.querySelectorAll('.mo-tab[data-mo-tab]').forEach((b) => {
          b.classList.toggle('active', b === tab);
        });
        document.querySelectorAll('.mo-pane[data-mo-pane]').forEach((p) => {
          p.hidden = (p.getAttribute('data-mo-pane') !== key);
        });
      });
    });

    document.querySelectorAll('[data-mo-set]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const st = btn.getAttribute('data-mo-set');
        await _submit({ status: st });
      });
    });
    const clearBtn = document.querySelector('[data-mo-clear]');
    if (clearBtn) {
      clearBtn.addEventListener('click', async () => {
        await _submit({ status: null });
      });
    }
    const saveNote = document.querySelector('[data-mo-save-note]');
    if (saveNote) {
      saveNote.addEventListener('click', async () => {
        const ta = document.getElementById('moNote');
        const note = String(ta?.value || '').trim();
        if (!note) return;
        await _submit({ note });
        if (ta) ta.value = '';
      });
    }
    const saveSd = document.querySelector('[data-mo-save-startdate]');
    if (saveSd) {
      saveSd.addEventListener('click', async () => {
        const inp = document.getElementById('moStartDate');
        const raw = String(inp?.value || '').trim();
        if (!raw) { alert('Vul een startdatum in.'); return; }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) { alert('Ongeldige datum (YYYY-MM-DD).'); return; }
        await _submit({ start_date: raw });
      });
    }
    const credsBtn = document.querySelector('[data-mo-creds-reset]');
    if (credsBtn) {
      credsBtn.addEventListener('click', async () => {
        if (!_openId) return;
        const email = (s && s.customer_email) ? s.customer_email : '';
        const ok = confirm(
          'Nieuw wachtwoord genereren en mailen naar ' + (email || 'de student') + '?'
        );
        if (!ok) return;
        await _resetCredentials();
      });
    }
  }

  async function _resetCredentials() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function' || !_openId) return;
    const btn    = document.querySelector('[data-mo-creds-reset]');
    const status = document.querySelector('[data-mo-creds-status]');
    if (btn) btn.disabled = true;
    if (status) { status.style.color = 'var(--text-dim)'; status.textContent = 'Bezig…'; }
    try {
      const r = await apiFetch('/api/onboarding-credentials-reset', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ onboarding_id: _openId }),
      });
      let d = null; try { d = await r.json(); } catch {}
      if (r.status === 401) {
        if (status) { status.style.color = '#b91c1c'; status.textContent = '✗ Niet (meer) ingelogd.'; }
        if (btn) btn.disabled = false;
        return;
      }
      if (r.status === 403) {
        if (status) { status.style.color = '#b91c1c'; status.textContent = '✗ Geen toegang tot deze student.'; }
        if (btn) btn.disabled = false;
        return;
      }
      if (!r.ok) {
        const msg = (d?.error || ('HTTP ' + r.status));
        if (status) { status.style.color = '#b91c1c'; status.textContent = '✗ ' + msg; }
        try { toast('Inloggegevens versturen mislukt: ' + msg, 'error'); } catch {}
        if (btn) btn.disabled = false;
        return;
      }
      if (d && d.ok === true && d.sent === true) {
        if (status) { status.style.color = '#15803d'; status.textContent = '✓ Mail verstuurd'; }
        try { toast('Inloggegevens opnieuw verstuurd', 'success'); } catch {}
        // Cache bijwerken zodat de modal de nieuwe stamp toont na refresh.
        const cached = _byId.get(_openId);
        if (cached && d.email_sent_at) cached.credentials_email_sent_at = d.email_sent_at;
        _refreshModal();
        return;
      }
      const errMsg = (d?.error || 'Onbekende fout');
      if (status) { status.style.color = '#b91c1c'; status.textContent = '✗ ' + errMsg; }
      try { toast('Inloggegevens versturen mislukt: ' + errMsg, 'error'); } catch {}
      if (btn) btn.disabled = false;
    } catch (e) {
      console.error('[mentor-onboarding] creds-reset:', e?.message || e);
      if (status) { status.style.color = '#b91c1c'; status.textContent = '✗ ' + (e?.message || e); }
      if (btn) btn.disabled = false;
    }
  }

  async function _submit(payload) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function' || !_openId) return;
    try {
      const r = await apiFetch('/api/mentor-future-student-update', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ onboarding_id: _openId, ...payload }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      const cached = _byId.get(_openId);
      if (cached) {
        // status:'foo' / status:null / undef (notitie-only)
        if (Object.prototype.hasOwnProperty.call(payload, 'status')) {
          cached.mentor_intake_status = payload.status;
        }
        if (Object.prototype.hasOwnProperty.call(payload, 'start_date') && d.start_date) {
          cached.start_date = d.start_date;
        }
        // 2 mogelijke log-rijen: d.update (status/note) en d.start_date_update.
        const newRows = [];
        if (d.update) newRows.push(d.update);
        if (d.start_date_update) newRows.push(d.start_date_update);
        if (newRows.length > 0) {
          cached.updates = Array.isArray(cached.updates) ? cached.updates.slice() : [];
          for (const u of newRows) {
            cached.updates.push({
              kind:       u.kind || null,
              status:     u.status || null,
              note:       u.note || null,
              created_at: u.created_at || null,
              created_by: u.created_by || null,
            });
          }
        }
      }
      _refreshModal();
      _renderTable(Array.from(_byId.values())); // lijst-pill + startdatum volgen mee
    } catch (e) {
      console.error('[mentor-onboarding] submit:', e?.message || e);
      alert('Opslaan mislukt: ' + (e?.message || e));
    }
  }

  // ── Loader ────────────────────────────────────────────────────────────
  async function loadStudents() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') { setError('moTableWrap', 'apiFetch niet beschikbaar.'); return; }
    try { if (window._authSharedReady) await window._authSharedReady; } catch {}
    const wrap = document.getElementById('moTableWrap');
    if (wrap) wrap.innerHTML = `<div style="color:var(--text-faint);font-size:12.5px;padding:14px;text-align:center">Studenten laden…</div>`;
    try {
      const [r] = await Promise.all([
        apiFetch('/api/mentor-future-students-self'),
        loadOneOnOneMaps(),
      ]);
      let d = null;
      try { d = await r.json(); } catch {}
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _renderTable(Array.isArray(d?.students) ? d.students : []);
    } catch (e) {
      console.error('[mentor-onboarding] load:', e?.message || e);
      setError('moTableWrap', 'Studenten ophalen mislukt: ' + (e?.message || e));
    }
  }

  // ── Meldingen ─────────────────────────────────────────────────────────
  function _wireNotificationsPanel() {
    const btn   = document.getElementById('msNotifBtn');
    const panel = document.getElementById('msNotifPanel');
    const all   = document.getElementById('msNotifMarkAll');
    if (btn && panel) {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        panel.hidden = !panel.hidden;
      });
      document.addEventListener('click', (ev) => {
        if (panel.hidden) return;
        if (ev.target === btn || btn.contains(ev.target) || panel.contains(ev.target)) return;
        panel.hidden = true;
      });
    }
    if (all) all.addEventListener('click', () => _markAllRead());
  }
  async function loadNotifications() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-notifications-list');
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _notifications = Array.isArray(d?.notifications) ? d.notifications : [];
      _unreadByOnb.clear();
      for (const n of _notifications) {
        if (n.read_at != null) continue;
        if (n.kind !== 'admin_note') continue;
        if (n.onboarding_id) {
          _unreadByOnb.set(n.onboarding_id, (_unreadByOnb.get(n.onboarding_id) || 0) + 1);
        }
      }
      _renderNotifications(Number(d?.unread_count) || 0);
      // Rerender tabel zodat per-rij dot meeschakelt.
      try { _renderTable(Array.from(_byId.values())); } catch {}
    } catch (e) {
      console.warn('[mentor-onboarding] notifications:', e?.message || e);
    }
  }
  function _renderNotifications(unreadCount) {
    const cntEl = document.getElementById('msNotifCount');
    const list  = document.getElementById('msNotifList');
    if (cntEl) {
      if (unreadCount > 0) { cntEl.textContent = String(unreadCount); cntEl.style.display = ''; }
      else                 { cntEl.style.display = 'none'; }
    }
    if (!list) return;
    if (_notifications.length === 0) {
      list.innerHTML = '<div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Geen meldingen.</div>';
      return;
    }
    list.innerHTML = _notifications.map((n) => {
      const unread = (n.read_at == null);
      const bg = unread ? 'background:rgba(13,148,136,0.06)' : '';
      const ago = n.created_at ? esc(_shortDateTime(n.created_at)) : '';
      const stud = n.onboarding_customer_name ? '<div style="font-size:11.5px;color:var(--text-faint)">' + esc(n.onboarding_customer_name) + '</div>' : '';
      const body = n.body ? '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;white-space:pre-wrap">' + esc(n.body) + '</div>' : '';
      const readBtn = unread
        ? '<button type="button" data-mark-read="' + esc(n.id) + '" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:inherit">Gelezen</button>'
        : '';
      return '<div style="padding:10px 12px;border-bottom:1px solid var(--border);' + bg + '">'
        + '<div style="display:flex;align-items:start;justify-content:space-between;gap:8px">'
        +   '<div style="flex:1;min-width:0">'
        +     '<div style="font-size:12.5px;font-weight:600;color:var(--text)">' + esc(n.title || n.kind) + '</div>'
        +     stud
        +     body
        +     '<div style="font-size:11px;color:var(--text-faint);margin-top:4px">' + ago + '</div>'
        +   '</div>'
        +   readBtn
        + '</div>'
      + '</div>';
    }).join('');
    list.querySelectorAll('[data-mark-read]').forEach((btn) => {
      btn.addEventListener('click', () => _markRead(btn.getAttribute('data-mark-read')));
    });
  }
  async function _markRead(id) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (!id || typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-notification-mark-read', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      await loadNotifications();
    } catch (e) {
      console.warn('[mentor-onboarding] mark-read:', e?.message || e);
    }
  }
  async function _markAllRead() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    const ids = (_notifications || []).filter((n) => n.read_at == null).map((n) => n.id);
    if (ids.length === 0) return;
    try {
      const r = await apiFetch('/api/mentor-notification-mark-read', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      await loadNotifications();
    } catch (e) {
      console.warn('[mentor-onboarding] mark-all-read:', e?.message || e);
    }
  }

  // ── Onboarding-inbox (page-tab "Inbox") ───────────────────────────────
  // 1-op-1 port uit modules/shared/onboarding-overzicht.js (admin-inbox).
  // Sinds PR #534 zijn alle inbox-endpoints gedeeld voor onboarding.inbox.view;
  // mentor + admin krijgen dezelfde data + actie-mogelijkheden. Geen eigen
  // scoping-laag.
  //
  // toast()-helper specifiek voor deze pagina (overzicht.js gebruikt z'n
  // eigen #toast-element; wij hebben #moInboxToast).
  function toast(msg, kind) {
    const el = document.getElementById('moInboxToast');
    if (!el) return;
    el.textContent = String(msg == null ? '' : msg);
    el.className = 'mo-toast show ' + (kind || '');
    setTimeout(() => el.classList.remove('show'), 2400);
  }

  // Mila-permissie-gate. Fail-open: als RBAC.canSync nog niet geladen is
  // tijdens de eerste calls, laten we de aanroep door — de server-side
  // RBAC blokkeert alsnog en geeft 403. Zo voorkomen we dat een race in
  // de RBAC-laad de Mila-flow stil uitschakelt voor wel-bevoegde users.
  function _canUseMila() {
    try {
      const fn = window.RBAC && window.RBAC.canSync;
      if (typeof fn !== 'function') return true;
      return !!fn('onboarding.mila.use');
    } catch (_e) { return true; }
  }

  function _oiAvatarInitial(s) {
    const txt = String(s || '?').trim();
    const m = txt.match(/[A-Za-z0-9]/);
    return (m ? m[0] : '?').toUpperCase();
  }

  // Update "Handmatig overnemen"-tab-badge. Bron: items met unread_count > 0
  // (proxy voor "wacht op handmatige reactie" — gespiegeld aan events).
  function _oiUpdateInboxManualBadge(items) {
    const badge = document.getElementById('oiInboxManualBadge');
    if (!badge) return;
    if (!Array.isArray(items)) { badge.style.display = 'none'; return; }
    let n = 0;
    for (const it of items) {
      if (Number(it && it.unread_count) > 0) n++;
    }
    if (n > 0) { badge.textContent = String(n); badge.style.display = ''; }
    else       { badge.style.display = 'none'; }
  }

  async function _oiRefreshInboxManualBadge() {
    try {
      const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=onboarding&limit=100');
      if (!r.ok) return;
      const j = await r.json().catch(() => ({}));
      if (!j || j.configured === false) {
        const badge = document.getElementById('oiInboxManualBadge');
        if (badge) badge.style.display = 'none';
        return;
      }
      _oiUpdateInboxManualBadge(Array.isArray(j.items) ? j.items : []);
    } catch (_e) { /* stille no-op */ }
  }

  function _oiShowThreadView() {
    const shell = document.getElementById('oiInboxShell');
    const empty = document.getElementById('oiThreadEmpty');
    const cont  = document.getElementById('oiThreadContent');
    if (shell) shell.classList.add('thread-open');
    if (empty) empty.style.display = 'none';
    if (cont)  cont.style.display  = 'flex';
  }
  function _oiShowListView() {
    const shell = document.getElementById('oiInboxShell');
    const empty = document.getElementById('oiThreadEmpty');
    const cont  = document.getElementById('oiThreadContent');
    if (shell) shell.classList.remove('thread-open');
    if (empty) empty.style.display = '';
    if (cont)  cont.style.display  = 'none';
    _oiState.convId = null;
    _oiState.conv = null;
    _oiState.suggestion = null;
    _oiState.editingSuggestionId = null;
    document.querySelectorAll('#oiInboxList .oi-conv-row.active').forEach((el) => el.classList.remove('active'));
  }

  async function loadOnboardingInbox() {
    const list = document.getElementById('oiInboxList');
    if (!list) return;
    list.innerHTML = '<div class="oi-skel-row"></div><div class="oi-skel-row"></div>';
    try {
      const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=onboarding&limit=100');
      if (!r.ok) {
        const j = await r.json().catch(() => ({}));
        list.innerHTML = '<div class="empty-state" style="color:#b91c1c;font-size:13px;padding:16px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div>';
        return;
      }
      const j = await r.json();
      if (!j.configured) {
        list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
          + '<i class="ti ti-plug-connected-x" style="font-size:24px;color:var(--text-faint)"></i>'
          + '<div style="font-size:14px;font-weight:600;margin-top:6px">Onboarding-lijn nog niet geconfigureerd</div>'
          + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">' + esc(j.warning || 'Vraag een admin om whatsapp_module_config met module=onboarding op is_active=true te zetten.') + '</div>'
          + '</div>';
        return;
      }
      const items = Array.isArray(j.items) ? j.items : [];
      _oiUpdateInboxManualBadge(items);
      if (items.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
          + '<i class="ti ti-inbox" style="font-size:24px;color:var(--text-faint)"></i>'
          + '<div style="font-size:14px;font-weight:600;margin-top:6px">Nog geen onboarding-conversaties</div>'
          + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Inbound op de onboarding-WhatsApp-lijn verschijnt hier.</div>'
          + '</div>';
        return;
      }
      const activeId = _oiState.convId || null;
      list.innerHTML = items.map((it) => {
        const preview    = (it.last_message_preview || '').slice(0, 80);
        const nameLabel  = it.customer_name || it.display_name || it.phone_number || '(geen naam)';
        const subtitle   = it.customer_name && it.display_name && it.display_name !== it.customer_name
          ? it.display_name : (it.phone_number || '');
        const timeShort  = it.last_message_at ? esc(fmtDateNL(it.last_message_at)) : '';
        const isActive   = activeId && it.id === activeId ? ' active' : '';
        const dotCls     = it.can_send_text ? 'open' : 'closed';
        const dotTitle   = it.can_send_text ? '24h-venster open — vrij bericht toegestaan' : '24h-venster verlopen — alleen template';
        const handoff = Number(it.unread_count) > 0
          ? '<span class="oi-conv-handoff" title="Wacht op handmatig of Mila-antwoord">Handmatig overnemen</span>'
          : '';
        return ''
          + '<div class="oi-conv-row' + isActive + '" data-conv-id="' + esc(it.id) + '"'
          + ' data-phone="' + esc(it.phone_number || '') + '"'
          + ' data-display="' + esc(it.display_name || '') + '"'
          + ' data-customer="' + esc(it.customer_name || '') + '">'
          +   '<div class="oi-conv-avatar">' + esc(_oiAvatarInitial(nameLabel)) + '</div>'
          +   '<div class="oi-conv-body">'
          +     '<div class="oi-conv-toprow">'
          +       '<div class="oi-conv-name">' + esc(nameLabel) + '</div>'
          +       '<div class="oi-conv-time">' + timeShort + '</div>'
          +       '<span class="oi-24h-dot ' + dotCls + '" title="' + esc(dotTitle) + '"></span>'
          +     '</div>'
          +     '<div class="oi-conv-preview">' + esc(preview || subtitle || '—') + '</div>'
          +     (handoff ? '<div class="oi-conv-meta">' + handoff + '</div>' : '')
          +   '</div>'
          + '</div>';
      }).join('');
      list.querySelectorAll('.oi-conv-row[data-conv-id]').forEach((row) => {
        row.addEventListener('click', () => openOnboardingConv({
          id:          row.dataset.convId,
          phone:       row.dataset.phone || '',
          displayName: row.dataset.display || '',
          customer:    row.dataset.customer || '',
        }));
      });
    } catch (e) {
      list.innerHTML = '<div class="empty-state" style="color:#b91c1c;font-size:13px;padding:16px">Fout: ' + esc(e?.message || e) + '</div>';
    }
  }

  async function openOnboardingConv({ id, phone, displayName, customer }) {
    if (!id) return;
    _oiState.convId = id;
    _oiState.suggestion = null;
    _oiState.editingSuggestionId = null;
    _oiShowThreadView();
    document.querySelectorAll('#oiInboxList .oi-conv-row.active').forEach((el) => el.classList.remove('active'));
    const newRow = document.querySelector('#oiInboxList .oi-conv-row[data-conv-id="' + id.replace(/"/g, '') + '"]');
    if (newRow) newRow.classList.add('active');

    document.getElementById('oiThreadName').textContent  = customer || displayName || phone || 'Onbekend';
    document.getElementById('oiThreadPhone').textContent = phone || '—';
    const badge = document.getElementById('oiThreadWindowBadge');
    badge.textContent = '…';
    badge.style.background = 'var(--bg-elev)';
    badge.style.color = 'var(--text-dim)';
    document.getElementById('oiThreadMessages').innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Laden…</div>';
    document.getElementById('oiSuggestionPanel').innerHTML = '';
    document.getElementById('oiComposeTextarea').value = '';
    document.getElementById('oiThreadHint').textContent = '';

    try {
      const params = new URLSearchParams({ conversation_id: id, limit: '200', mark_as_read: 'true' });
      const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        document.getElementById('oiThreadMessages').innerHTML =
          '<div style="color:#b91c1c;font-size:12px;padding:14px">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</div>';
        return;
      }
      _oiState.conv = d.conversation || null;
      _oiState.canSendText = !!(d.conversation && d.conversation.can_send_text);
      _renderOiThread(d.items || []);
      _applyOiComposeState();
      _oiResetMode();
      _loadOiCustomerStrip(id);
      loadOnboardingInbox();
      // Mila-suggesties alleen ophalen als de user de perm heeft —
      // anders krijgt 'ie de "Geen rechten (onboarding.mila.use)"-melding
      // bij elke conv-open. _canUseMila() valt fail-open bij ontbrekend
      // RBAC.canSync zodat we niet sturen in de RBAC-load-race.
      if (_canUseMila()) _loadLatestMilaSuggestion(id);
    } catch (e) {
      document.getElementById('oiThreadMessages').innerHTML =
        '<div style="color:#b91c1c;font-size:12px;padding:14px">Fout: ' + esc(e?.message || e) + '</div>';
    }
  }

  function _renderOiThread(items) {
    const wrap = document.getElementById('oiThreadMessages');
    if (!wrap) return;
    if (!items || items.length === 0) {
      wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Nog geen berichten in deze conversatie.</div>';
    } else {
      wrap.innerHTML = items.map((m) => {
        const inbound = m.direction === 'in';
        const align   = inbound ? 'flex-start' : 'flex-end';
        const bg      = inbound ? 'var(--bg-elev)' : '#093d54';
        const color   = inbound ? 'var(--text)' : '#ffffff';
        const time    = m.created_at ? fmtDateTimeNL(m.created_at) : '';
        const body    = String(m.body || (m.template_name ? '[template:' + m.template_name + ']' : '[media]'));
        return '<div style="display:flex;justify-content:' + align + '">'
          + '<div style="max-width:70%;background:' + bg + ';color:' + color + ';padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4">'
          + '<div style="white-space:pre-wrap;word-wrap:break-word">' + esc(body) + '</div>'
          + '<div style="font-size:10px;opacity:0.65;margin-top:3px;text-align:right">' + esc(time) + '</div>'
          + '</div></div>';
      }).join('');
    }
    wrap.scrollTop = wrap.scrollHeight;
    const badge = document.getElementById('oiThreadWindowBadge');
    if (_oiState.canSendText) {
      badge.textContent = '24h open';
      badge.style.background = 'rgba(5,150,105,0.15)';
      badge.style.color = '#059669';
      badge.title = '24h-venster nog open — vrije tekst toegestaan';
    } else {
      badge.textContent = '24h verlopen';
      badge.style.background = 'rgba(245,158,11,0.18)';
      badge.style.color = '#b45309';
      badge.title = 'Servicewindow verlopen — alleen templates';
    }
  }

  function _applyOiComposeState() {
    const ta = document.getElementById('oiComposeTextarea');
    const sendBtn = document.getElementById('oiSendBtn');
    const hint = document.getElementById('oiThreadHint');
    if (_oiState.canSendText) {
      if (ta) { ta.disabled = false; ta.placeholder = 'Typ een vrij bericht…'; }
      if (sendBtn) { sendBtn.disabled = false; sendBtn.title = 'Versturen'; }
      if (hint) hint.textContent = '';
    } else {
      if (ta) { ta.disabled = true; ta.placeholder = '24h-venster verlopen — alleen templates'; }
      if (sendBtn) { sendBtn.disabled = true; sendBtn.title = '24h-venster verlopen'; }
      if (hint) hint.textContent = '24h-venster verlopen sinds laatste inbound — vrije tekst niet meer toegestaan.';
    }
  }

  // ── E-mail-modus (read-only) — toggle binnen één conversatie ─────────
  function _oiResetMode() {
    _oiState.mode               = 'wa';
    _oiState.emailLoaded        = false;
    _oiState.emailItems         = [];
    _oiState.emailWarning       = null;
    _oiState.emailCustomerEmail = '';
    const wa    = document.getElementById('oiModeBtnWa');
    const em    = document.getElementById('oiModeBtnEmail');
    const reply = document.getElementById('oiEmailReplyBtn');
    const emailThread = document.getElementById('oiEmailThread');
    const waThread    = document.getElementById('oiThreadMessages');
    const sugg        = document.getElementById('oiSuggestionPanel');
    const footer      = document.getElementById('oiThreadFooter');
    const hasCustomer = !!(_oiState.conv && _oiState.conv.customer_id);
    if (em) {
      em.disabled = !hasCustomer;
      em.title    = hasCustomer ? '' : 'Klant niet gekoppeld';
      em.style.color = 'var(--text-dim)';
      em.style.background = 'transparent';
      em.style.boxShadow = 'none';
      em.setAttribute('aria-selected', 'false');
    }
    if (wa) {
      wa.style.color = 'var(--text)';
      wa.style.background = 'var(--bg,#fff)';
      wa.style.boxShadow = '0 1px 2px rgba(0,0,0,.06)';
      wa.setAttribute('aria-selected', 'true');
    }
    if (emailThread) emailThread.style.display = 'none';
    if (waThread)    waThread.style.display    = '';
    if (sugg)        sugg.style.display        = '';
    if (footer)      footer.style.display      = '';
    if (reply)       reply.style.display       = 'none';
    const unreadBtn = document.getElementById('oiEmailUnreadBtn');
    if (unreadBtn) unreadBtn.style.display = 'none';
    _oiCurrentEmailItems = [];
    const modeBar     = document.getElementById('oiThreadModeBar');
    const windowBadge = document.getElementById('oiThreadWindowBadge');
    const ctxStrip    = document.getElementById('oiCustomerStrip');
    if (modeBar)     modeBar.style.display     = '';
    if (windowBadge) windowBadge.style.display = '';
    if (ctxStrip)    ctxStrip.style.display    = '';
  }

  function _switchOiMode(next) {
    if (next !== 'wa' && next !== 'email') return;
    if (next === 'email' && !(_oiState.conv && _oiState.conv.customer_id)) return;
    if (_oiState.mode === next) return;
    _oiState.mode = next;
    const wa    = document.getElementById('oiModeBtnWa');
    const em    = document.getElementById('oiModeBtnEmail');
    const reply = document.getElementById('oiEmailReplyBtn');
    const emailThread = document.getElementById('oiEmailThread');
    const waThread    = document.getElementById('oiThreadMessages');
    const sugg        = document.getElementById('oiSuggestionPanel');
    const footer      = document.getElementById('oiThreadFooter');
    const setActive = (btn, active) => {
      if (!btn) return;
      btn.style.color      = active ? 'var(--text)' : 'var(--text-dim)';
      btn.style.background = active ? 'var(--bg,#fff)' : 'transparent';
      btn.style.boxShadow  = active ? '0 1px 2px rgba(0,0,0,.06)' : 'none';
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
    };
    setActive(wa, next === 'wa');
    setActive(em, next === 'email');
    if (next === 'wa') {
      if (emailThread) emailThread.style.display = 'none';
      if (waThread)    waThread.style.display    = '';
      if (sugg)        sugg.style.display        = '';
      if (footer)      footer.style.display      = '';
      if (reply)       reply.style.display       = 'none';
      const unreadBtn = document.getElementById('oiEmailUnreadBtn');
      if (unreadBtn) unreadBtn.style.display = 'none';
    } else {
      if (waThread)    waThread.style.display    = 'none';
      if (sugg)        sugg.style.display        = 'none';
      if (footer)      footer.style.display      = 'none';
      if (emailThread) emailThread.style.display = 'block';
      const canReplyLink = !!(window.RBAC && window.RBAC.canSync && window.RBAC.canSync('onboarding.inbox.reply_link'));
      if (reply) reply.style.display = canReplyLink ? '' : 'none';
      _loadOiEmailThread();
    }
  }

  async function _loadOiEmailThread() {
    const wrap = document.getElementById('oiEmailThread');
    if (!wrap) return;
    if (_oiState.emailLoaded) {
      _renderOiEmailThread();
      return;
    }
    wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">E-mails laden…</div>';
    const customerId = _oiState.conv?.customer_id;
    if (!customerId) {
      wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Klant niet gekoppeld — geen e-mails op te halen.</div>';
      return;
    }
    try {
      const r = await window.AgentShared.apiFetch(
        '/api/inbox-emails-list?customer_id=' + encodeURIComponent(customerId) + '&module=onboarding'
      );
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        wrap.innerHTML = '<div style="color:#b91c1c;font-size:12px;padding:14px">Fout: ' + esc(d?.error || ('HTTP ' + r.status)) + '</div>';
