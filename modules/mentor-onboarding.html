<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Onboarding — Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    body { background: var(--bg); color: var(--text); }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1280px; }
    @media (max-width: 880px) { .app { margin-left: 0; padding: 14px; } }
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:24px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-header p  { font-size: 13px; color: var(--text-dim); }
    .empty-state { padding:24px; border:1px dashed var(--border); border-radius:10px; text-align:center; color:var(--text-faint); font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .badge       { display:inline-block; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:700; line-height:1.4; white-space:nowrap; }
    .badge-green { background:rgba(34,197,94,0.16); color:#15803d; }
    .badge-amber { background:rgba(245,158,11,0.18); color:#92400e; }
    .badge-red   { background:rgba(220,38,38,0.16); color:#7f1d1d; }
    .badge-blue  { background:rgba(59,130,246,0.16); color:#1e3a8a; }
    .badge-grey  { background:rgba(100,116,139,0.18); color:#475569; }
    .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
    .filter-chip { padding:5px 12px; border:1px solid var(--border); border-radius:999px; background:var(--bg-elev); color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
    .filter-chip.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    /* Tabel */
    .mo-table-wrap { border:1px solid var(--border); border-radius:10px; overflow:auto; background:var(--bg-elev); }
    table.mo-table { width:100%; border-collapse: collapse; font-size: 12.5px; }
    .mo-table thead th { padding: 10px 12px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color: var(--text-dim); background:var(--bg); border-bottom:1px solid var(--border); white-space: nowrap; font-weight:700; }
    .mo-table tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .mo-table tbody tr { cursor: pointer; }
    .mo-table tbody tr:hover td { background:var(--bg); }
    .mo-name { font-weight:600; color:var(--text); }
    .mo-sub  { font-size:11.5px; color:var(--text-faint); }
    .ico-ok   { color:#15803d; }
    .ico-bad  { color:#b91c1c; }
    .ico-mute { color:var(--text-faint); }
    /* Modal */
    .mo-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1000; display:none; align-items:flex-start; justify-content:center; padding:32px 16px; overflow-y:auto; }
    .mo-modal-overlay.open { display:flex; }
    .mo-modal { width:100%; max-width:780px; background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; box-shadow:0 12px 32px rgba(0,0,0,0.35); }
    .mo-modal-head { display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 18px; border-bottom:1px solid var(--border); }
    .mo-modal-title { font-size:16px; font-weight:700; color:var(--text); }
    .mo-modal-body { padding:16px 18px 20px; }
    .mo-section { margin-bottom:14px; padding:12px 14px; border:1px solid var(--border); border-radius:10px; background:var(--bg); }
    .mo-section-h { font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.05em; font-weight:700; margin-bottom:8px; }
    .mo-dl { display:grid; grid-template-columns:140px 1fr; gap:6px 12px; font-size:13px; }
    .mo-dl dt { color:var(--text-dim); }
    .mo-dl dd { color:var(--text); }
    .mo-btn { display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:7px; font:inherit; font-size:12.5px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--bg-elev); color:var(--text); }
    .mo-btn:hover:not(:disabled) { background:var(--bg); }
    .mo-btn:disabled { cursor:not-allowed; opacity:0.55; }
    .mo-btn-active { background:var(--text); color:var(--bg); border-color:var(--text); }
    .mo-status-btns { display:flex; gap:6px; flex-wrap:wrap; }
    .mo-clear-btn { padding:5px 9px; font-size:11px; }
    .mo-progress-bar { width:100%; height:8px; background:var(--bg-elev); border-radius:999px; overflow:hidden; border:1px solid var(--border); }
    .mo-progress-fill { height:100%; background:#0d9488; }
    .mo-tooltip { position:relative; cursor:help; }
    .mo-textarea { width:100%; padding:7px 9px; border:1px solid var(--border); border-radius:7px; background:var(--bg-elev); color:var(--text); font:inherit; font-size:12.5px; resize:vertical; }
    /* Tabs in detail-popup (spiegel manager-popup PR #531) */
    .mo-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin:-4px -2px 14px; padding:0 2px; flex-wrap:wrap; }
    .mo-tab { appearance:none; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text-dim); cursor:pointer; font:inherit; font-size:13px; font-weight:600; padding:9px 12px; line-height:1; }
    .mo-tab.active { color:var(--text); border-bottom-color: var(--brand-deep, #093d54); }
    .mo-tab:hover:not(.active) { color:var(--text); }
    .mo-pane[hidden] { display:none; }
    .mo-input-date { padding:6px 8px; border:1px solid var(--border); border-radius:7px; background:var(--bg-elev); color:var(--text); font:inherit; font-size:12.5px; }
    /* Vragenlijst antwoorden-lijst */
    .mo-qa { display:grid; gap:10px; }
    .mo-qa-item { padding:8px 0; border-top:1px dashed var(--border); }
    .mo-qa-item:first-child { border-top:none; padding-top:0; }
    .mo-qa-q { font-size:12px; font-weight:700; color:var(--text); margin-bottom:2px; }
    .mo-qa-a { font-size:13px; color:var(--text); white-space:pre-wrap; word-break:break-word; }
    .mo-qa-a.empty { color:var(--text-faint); }
    /* Page-level tabs (Studenten / Inbox) — zelfde patroon als detail-tabs */
    .mo-page-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin:0 0 18px; }
    .mo-page-tab { appearance:none; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text-dim); cursor:pointer; font:inherit; font-size:14px; font-weight:600; padding:10px 16px; line-height:1; display:inline-flex; align-items:center; gap:6px; }
    .mo-page-tab.active { color:var(--text); border-bottom-color: var(--brand-deep, #093d54); }
    .mo-page-tab:hover:not(.active) { color:var(--text); }
    .mo-page-pane[hidden] { display:none; }
    .mo-tab-badge { display:inline-block; min-width:18px; padding:1px 6px; border-radius:999px; background:#dc2626; color:#fff; font-size:11px; font-weight:700; text-align:center; }
    .mo-tab-badge[hidden] { display:none; }
    /* Mentor-inbox shell (2-paneel) */
    .mi-shell { display:grid; grid-template-columns: 320px 1fr; gap:14px; height: 640px; max-height: calc(100vh - 220px); border:1px solid var(--border); border-radius:10px; background:var(--bg-elev); overflow:hidden; }
    @media (max-width: 880px) { .mi-shell { grid-template-columns: 1fr; height: auto; } }
    .mi-list-pane { border-right:1px solid var(--border); display:flex; flex-direction:column; min-height:0; }
    .mi-list-head { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border-bottom:1px solid var(--border); gap:8px; }
    .mi-list-head h3 { margin:0; font-size:13.5px; font-weight:700; color:var(--text); }
    .mi-refresh { background:transparent; border:1px solid var(--border); border-radius:6px; padding:4px 8px; font-size:12px; cursor:pointer; color:var(--text-dim); font-family:inherit; }
    .mi-list-body { flex:1; min-height:0; overflow-y:auto; padding:4px 0; }
    .mi-conv-row { display:grid; grid-template-columns: 36px 1fr; gap:10px; padding:9px 12px; cursor:pointer; border-left:3px solid transparent; }
    .mi-conv-row:hover { background:var(--bg); }
    .mi-conv-row.active { background:var(--bg); border-left-color: var(--brand-deep, #093d54); }
    .mi-conv-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; color:var(--text-dim); }
    .mi-conv-top { display:flex; align-items:center; gap:6px; justify-content:space-between; }
    .mi-conv-name { font-size:13px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
    .mi-conv-time { font-size:10.5px; color:var(--text-faint); white-space:nowrap; }
    .mi-conv-preview { font-size:11.5px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
    .mi-24h-dot { width:7px; height:7px; border-radius:50%; display:inline-block; vertical-align:middle; margin-left:4px; }
    .mi-24h-dot.open { background:#059669; }
    .mi-24h-dot.closed { background:#f59e0b; }
    .mi-conv-unread { display:inline-block; padding:0 6px; border-radius:999px; background:#dc2626; color:#fff; font-size:10px; font-weight:700; margin-left:4px; }
    .mi-thread-pane { display:flex; flex-direction:column; min-height:0; }
    .mi-thread-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; color:var(--text-faint); font-size:13px; gap:8px; padding:40px; text-align:center; }
    .mi-thread-head { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); }
    .mi-thread-name { font-size:14px; font-weight:700; color:var(--text); }
    .mi-thread-phone { font-size:11.5px; color:var(--text-faint); }
    .mi-thread-window { font-size:10.5px; font-weight:700; padding:3px 8px; border-radius:10px; text-transform:uppercase; letter-spacing:.04em; margin-left:auto; }
    .mi-thread-messages { flex:1; min-height:0; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:6px; background:var(--bg); }
    .mi-msg-row { display:flex; }
    .mi-msg-bubble { max-width:70%; padding:7px 11px; border-radius:10px; font-size:13px; line-height:1.4; }
    .mi-msg-row.in  { justify-content:flex-start; }
    .mi-msg-row.in  .mi-msg-bubble { background:var(--bg-elev); color:var(--text); }
    .mi-msg-row.out { justify-content:flex-end; }
    .mi-msg-row.out .mi-msg-bubble { background:#093d54; color:#fff; }
    .mi-msg-time { font-size:10px; opacity:.65; margin-top:3px; text-align:right; }
    .mi-footer { border-top:1px solid var(--border); padding:10px 14px; background:var(--bg-elev); }
    .mi-toolbar { display:flex; gap:6px; margin-bottom:6px; }
    .mi-toolbar-btn { background:transparent; border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:12px; cursor:pointer; color:var(--text-dim); font-family:inherit; display:inline-flex; align-items:center; gap:4px; }
    .mi-toolbar-btn:hover:not(:disabled) { background:var(--bg); color:var(--text); }
    .mi-toolbar-btn:disabled { opacity:.55; cursor:not-allowed; }
    .mi-compose-row { display:flex; gap:8px; align-items:flex-end; }
    .mi-textarea { flex:1; padding:7px 9px; border:1px solid var(--border); border-radius:7px; background:var(--bg); color:var(--text); font:inherit; font-size:13px; resize:vertical; min-height:36px; max-height:120px; }
    .mi-textarea:disabled { background:var(--bg-elev); color:var(--text-faint); cursor:not-allowed; }
    .mi-send-btn { background:var(--brand-deep, #093d54); color:#fff; border:none; border-radius:7px; padding:8px 14px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; }
    .mi-send-btn:disabled { opacity:.55; cursor:not-allowed; }
    .mi-hint { font-size:11px; color:var(--text-faint); margin-top:4px; }
    /* Template-picker overlay */
    .mi-tpl-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:1100; display:none; align-items:flex-start; justify-content:center; padding:32px 16px; overflow-y:auto; }
    .mi-tpl-overlay.open { display:flex; }
    .mi-tpl-panel { width:100%; max-width:640px; background:var(--bg-elev); border:1px solid var(--border); border-radius:10px; max-height:80vh; display:flex; flex-direction:column; }
    .mi-tpl-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); }
    .mi-tpl-list { padding:8px; overflow-y:auto; flex:1; }
    .mi-tpl-item { padding:10px 12px; border:1px solid var(--border); border-radius:8px; margin-bottom:6px; cursor:pointer; background:var(--bg); }
    .mi-tpl-item:hover { background:var(--bg-elev); border-color: var(--brand-deep, #093d54); }
    .mi-tpl-name { font-weight:600; font-size:13px; color:var(--text); }
    .mi-tpl-body { font-size:12px; color:var(--text-dim); margin-top:3px; white-space:pre-wrap; }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-header">
    <div>
      <h1>Onboarding</h1>
      <p>Jouw toegewezen instroom-studenten — klik op een rij voor de volledige detail-popup.</p>
    </div>
    <div style="position:relative">
      <button id="msNotifBtn" type="button" title="Meldingen"
        style="position:relative;background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:inherit">
        <i class="ti ti-bell"></i>
        <span id="msNotifCount" style="display:none;background:#dc2626;color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;font-weight:700;line-height:1.4">0</span>
      </button>
      <div id="msNotifPanel" hidden
        style="position:absolute;right:0;top:calc(100% + 6px);width:380px;max-height:520px;overflow-y:auto;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);z-index:50">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:13px">Meldingen</div>
          <button id="msNotifMarkAll" type="button" style="background:transparent;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit">Alles gelezen</button>
        </div>
        <div id="msNotifList" style="padding:4px 0">
          <div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Laden…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="mo-page-tabs" role="tablist">
    <button type="button" class="mo-page-tab active" data-mo-page-tab="students" role="tab"><i class="ti ti-users"></i> Studenten</button>
    <button type="button" class="mo-page-tab" data-mo-page-tab="inbox" id="moInboxTabBtn" role="tab" hidden><i class="ti ti-mail"></i> Inbox <span class="mo-tab-badge" id="moInboxBadge" hidden>0</span></button>
  </div>

  <div class="mo-page-pane" data-mo-page-pane="students">
    <div class="filter-row" id="moFilterRow">
      <button type="button" class="filter-chip active" data-mo-filt="all">Alles</button>
      <button type="button" class="filter-chip" data-mo-filt="problems">Te behandelen</button>
      <button type="button" class="filter-chip" data-mo-filt="wil_niet">Wil niet</button>
      <button type="button" class="filter-chip" data-mo-filt="no_show">No-show</button>
      <button type="button" class="filter-chip" data-mo-filt="geen_gehoor">Geen gehoor</button>
      <button type="button" class="filter-chip" data-mo-filt="wil_later">Wil later</button>
      <button type="button" class="filter-chip" data-mo-filt="call_ingepland">Call ingepland</button>
      <button type="button" class="filter-chip" data-mo-filt="gestart">Gestart</button>
      <span id="moCountInfo" style="margin-left:auto;font-size:12.5px;color:var(--text-faint)"></span>
    </div>

    <div id="moTableWrap"><div class="empty-state"><i class="ti ti-clock"></i>Laden…</div></div>
  </div>

  <div class="mo-page-pane" data-mo-page-pane="inbox" hidden>
    <div class="mi-shell">
      <aside class="mi-list-pane">
        <div class="mi-list-head">
          <h3>Gesprekken</h3>
          <button type="button" class="mi-refresh" data-mi-refresh title="Vernieuwen"><i class="ti ti-refresh"></i></button>
        </div>
        <div id="miConvList" class="mi-list-body"><div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Laden…</div></div>
      </aside>
      <section class="mi-thread-pane">
        <div id="miThreadEmpty" class="mi-thread-empty">
          <i class="ti ti-message-circle" style="font-size:32px;opacity:.5"></i>
          <div>Kies een gesprek links om de berichten te zien.</div>
        </div>
        <div id="miThreadContent" hidden style="display:flex;flex-direction:column;flex:1;min-height:0">
          <div class="mi-thread-head">
            <div style="flex:1;min-width:0">
              <div id="miThreadName" class="mi-thread-name">—</div>
              <div id="miThreadPhone" class="mi-thread-phone">—</div>
            </div>
            <span id="miThreadWindow" class="mi-thread-window">—</span>
          </div>
          <div id="miThreadMessages" class="mi-thread-messages"></div>
          <div class="mi-footer">
            <div class="mi-toolbar">
              <button type="button" class="mi-toolbar-btn" data-mi-templates><i class="ti ti-template"></i> Template</button>
            </div>
            <div class="mi-compose-row">
              <textarea id="miReplyText" class="mi-textarea" rows="1" placeholder="Typ een bericht…"></textarea>
              <button type="button" class="mi-send-btn" data-mi-send><i class="ti ti-send"></i> Versturen</button>
            </div>
            <div id="miThreadHint" class="mi-hint"></div>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<!-- Template-picker overlay -->
<div id="miTplOverlay" class="mi-tpl-overlay">
  <div class="mi-tpl-panel">
    <div class="mi-tpl-head">
      <strong>Kies een template</strong>
      <button type="button" id="miTplClose" aria-label="Sluiten" style="background:transparent;border:none;font-size:20px;color:var(--text-dim);cursor:pointer;line-height:1">&times;</button>
    </div>
    <div id="miTplList" class="mi-tpl-list">Laden…</div>
  </div>
</div>

<!-- Detail-popup -->
<div id="moModalOverlay" class="mo-modal-overlay">
  <div class="mo-modal" role="dialog" aria-modal="true" aria-labelledby="moModalTitle">
    <div class="mo-modal-head">
      <div style="display:flex;align-items:center;gap:10px;min-width:0">
        <div id="moModalTitle" class="mo-modal-title">Student</div>
        <span id="moModalStatusPill"></span>
      </div>
      <button type="button" id="moModalClose" aria-label="Sluiten"
        style="background:transparent;border:none;font-size:20px;color:var(--text-dim);cursor:pointer;line-height:1">&times;</button>
    </div>
    <div class="mo-modal-body" id="moModalBody"></div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  // ── Helpers ────────────────────────────────────────────────────────────
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const fmtDateNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return iso; }
  };
  const fmtDateTimeNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  };
  function _shortDateTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }
  function setError(elId, msg) {
    const el = document.getElementById(elId);
    if (el) el.innerHTML =
      `<div class="empty-state" style="border-color:#fecaca;color:#b91c1c"><i class="ti ti-alert-triangle"></i>${esc(msg)}</div>`;
  }

  // ── State ──────────────────────────────────────────────────────────────
  const _nextCallByStudent = new Map();
  const _noshowByStudent   = new Map();
  const _completedByMember = new Map();
  const _byId              = new Map(); // onboarding_id → student-record
  let   _filter            = 'all';
  let   _notifications     = [];
  const _unreadByOnb       = new Map();
  let   _openId            = null;      // onboarding_id van open popup

  // Inbox-state (mentor-gescopet via /api/inbox-conversations-list?module=onboarding).
  // Server-side scoping (seesOwn -> getMentorCustomerIds) doet de filtering;
  // we vertrouwen het endpoint en doen hier geen eigen klant-check.
  const _miState = {
    convs:        [],
    convId:       null,
    canSendText:  false,
    conv:         null,
    inboxLoaded:  false,
    badgeTimer:   null,
  };

  // ── 1-op-1 maps (auto-statussen: gestart / call_ingepland / no_show) ──
  async function loadOneOnOneMaps() {
    _nextCallByStudent.clear();
    _noshowByStudent.clear();
    _completedByMember.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-1on1-sessions');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || '1on1 fetch failed');
      const nowMs = Date.now();
      const planned = Array.isArray(d.planned) ? d.planned : [];
      for (const p of planned) {
        const mu = p.member_user;
        if (!mu) continue;
        const t = new Date(p.starts_at).getTime();
        if (!Number.isFinite(t) || t < nowMs) continue;
        const prev = _nextCallByStudent.get(mu);
        if (!prev || t < new Date(prev).getTime()) _nextCallByStudent.set(mu, p.starts_at);
      }
      const completed = Array.isArray(d.completed) ? d.completed : [];
      for (const c of completed) {
        const mu = c.member_user;
        if (!mu) continue;
        const t = new Date(c.starts_at).getTime();
        if (!Number.isFinite(t)) continue;
        const prev = _completedByMember.get(mu);
        if (!prev || t < new Date(prev).getTime()) _completedByMember.set(mu, c.starts_at);
      }
      const nsBy = (d && typeof d.noshow_by_student === 'object' && d.noshow_by_student) ? d.noshow_by_student : {};
      for (const [mu, iso] of Object.entries(nsBy)) {
        if (mu && iso) _noshowByStudent.set(String(mu), String(iso));
      }
    } catch (e) { console.warn('[mentor-onboarding] 1on1:', e?.message || e); }
  }

  // ── Intake-statusmodel ────────────────────────────────────────────────
  const _INTAKE_MANUAL = ['nog_te_benaderen','geen_gehoor','wil_later','wil_niet'];
  const _INTAKE_META = {
    gestart:           { label: 'Gestart',            cls: 'badge-green', auto: true  },
    wil_niet:          { label: 'Wil niet starten',   cls: 'badge-red',   auto: false },
    no_show:           { label: 'No-show',            cls: 'badge-red',   auto: true  },
    geen_gehoor:       { label: 'Geen gehoor',        cls: 'badge-amber', auto: false },
    wil_later:         { label: 'Wil later starten',  cls: 'badge-amber', auto: false },
    call_ingepland:    { label: 'Call ingepland',     cls: 'badge-blue',  auto: true  },
    nog_te_benaderen:  { label: 'Nog te benaderen',   cls: 'badge-grey',  auto: false },
  };
  const _RANK = {
    wil_niet: 0, no_show: 1, geen_gehoor: 2, wil_later: 3,
    nog_te_benaderen: 4, call_ingepland: 5, gestart: 9,
  };
  function _intakeState(s) {
    const bu = s.bubble_user_id ? String(s.bubble_user_id) : null;
    if (bu && _completedByMember.has(bu))      return 'gestart';
    const ms = s.mentor_intake_status || null;
    if (ms === 'wil_niet')                     return 'wil_niet';
    if (bu && _noshowByStudent.has(bu))        return 'no_show';
    if (ms === 'geen_gehoor')                  return 'geen_gehoor';
    if (ms === 'wil_later')                    return 'wil_later';
    if (bu && _nextCallByStudent.has(bu))      return 'call_ingepland';
    return 'nog_te_benaderen';
  }
  function _intakePillHtml(key) {
    const m = _INTAKE_META[key] || _INTAKE_META.nog_te_benaderen;
    return `<span class="badge ${m.cls}">${esc(m.label)}</span>`;
  }

  // ── Cell helpers ──────────────────────────────────────────────────────
  function _trajectCell(s) {
    const lbl = s.traject_label || '—';
    const parts = [];
    if (s.traject_calls != null) parts.push(s.traject_calls + ' 1-op-1');
    if (s.traject_duur_maanden != null) parts.push(s.traject_duur_maanden + ' mnd');
    const sub = parts.length ? ('<div class="mo-sub">' + esc(parts.join(' · ')) + '</div>') : '';
    return '<div>' + esc(lbl) + '</div>' + sub;
  }
  function _paidCell(paid) {
    return paid
      ? '<i class="ti ti-check ico-ok" title="Betaald"></i>'
      : '<i class="ti ti-x ico-bad" title="Nog niet betaald"></i>';
  }
  function _bubbleCell(s) {
    if (s.bubble_provisioned) {
      return '<i class="ti ti-circle-check-filled ico-ok" title="Bubble-account aangemaakt' + (s.bubble_provisioned_at ? ' op ' + esc(fmtDateNL(s.bubble_provisioned_at)) : '') + '"></i>';
    }
    if (s.bubble_provision_error) {
      return '<i class="ti ti-alert-triangle-filled ico-bad" title="Bubble-aanmaak mislukt: ' + esc(String(s.bubble_provision_error).slice(0, 120)) + '"></i>';
    }
    return '<i class="ti ti-circle-dashed ico-mute" title="Bubble nog niet aangemaakt"></i>';
  }
  function _bedenktijdCell(bt) {
    if (!bt || bt.status === 'onbekend') return '<span class="ico-mute">—</span>';
    const dt = bt.vervalt_op ? esc(fmtDateNL(bt.vervalt_op)) : '—';
    if (bt.status === 'vervallen') {
      // groen vinkje = vervallen (klant kan niet meer terug)
      return '<i class="ti ti-check ico-ok" title="Vervallen (' + esc(bt.reason || '') + ')"></i> <span style="font-size:11.5px;color:var(--text-dim)">' + dt + '</span>';
    }
    // rood kruisje = nog NIET vervallen (klant kan nog terugkomen)
    return '<i class="ti ti-x ico-bad" title="Nog niet vervallen"></i> <span style="font-size:11.5px;color:var(--text-dim)">' + dt + '</span>';
  }
  function _wizardCell(s) {
    const tot = s.total_steps || null;
    const cs  = s.current_step || null;
    if (!tot && !cs) return '<span class="ico-mute">—</span>';
    if (!tot) return esc(cs || '—');
    // current_step is een string-label van de huidige pagina; vertaal naar 1-based index als mogelijk.
    const idx = (s.current_step_index != null && Number.isFinite(s.current_step_index)) ? Number(s.current_step_index) : null;
    if (idx != null) return idx + '/' + tot;
    return cs ? (esc(cs) + ' <span class="mo-sub">van ' + tot + '</span>') : ('— van ' + tot);
  }
  function _availSummary(av) {
    if (!av || typeof av !== 'object') return '';
    const parts = [];
    if (Array.isArray(av.days) && av.days.length) parts.push('Dagen: ' + av.days.join(', '));
    if (Array.isArray(av.blocks) && av.blocks.length) parts.push('Dagdelen: ' + av.blocks.join(', '));
    return parts.join(' · ');
  }
  function _availCell(av) {
    const summary = _availSummary(av);
    if (!summary) return '<span class="ico-mute">—</span>';
    return '<i class="ti ti-calendar ico-mute mo-tooltip" title="' + esc(summary) + '"></i>';
  }
  function _unreadDotHtml(onbId) {
    if (!onbId) return '';
    const n = _unreadByOnb.get(onbId) || 0;
    if (n <= 0) return '';
    return ' <span class="badge" style="background:#dc2626;color:#fff;padding:1px 7px;border-radius:999px;font-size:10.5px" title="Ongelezen update van management">●</span>';
  }

  // ── Filter / sort / render tabel ──────────────────────────────────────
  function _applyFilter(list) {
    if (_filter === 'all') return list;
    if (_filter === 'problems') {
      const PROB = new Set(['wil_niet','no_show','geen_gehoor','wil_later']);
      return list.filter((s) => PROB.has(_intakeState(s)));
    }
    return list.filter((s) => _intakeState(s) === _filter);
  }

  function _renderTable(students) {
    const wrap = document.getElementById('moTableWrap');
    if (!wrap) return;
    const list = Array.isArray(students) ? students : [];
    _byId.clear();
    for (const s of list) {
      if (s && s.onboarding_id) _byId.set(String(s.onboarding_id), s);
    }
    const filtered = _applyFilter(list);
    const info = document.getElementById('moCountInfo');
    if (info) info.textContent = filtered.length + ' / ' + list.length + ' studenten';
    if (filtered.length === 0) {
      wrap.innerHTML = list.length === 0
        ? `<div class="empty-state"><i class="ti ti-user-question"></i>Je hebt nog geen toegewezen studenten.</div>`
        : `<div class="empty-state"><i class="ti ti-filter-off"></i>Geen studenten in deze filter.</div>`;
      return;
    }
    // Sort: startdatum asc; zonder start_date onderaan.
    const sorted = filtered.slice().sort((a, b) => {
      const ad = a.start_date ? String(a.start_date) : '';
      const bd = b.start_date ? String(b.start_date) : '';
      if (ad && !bd) return -1;
      if (!ad && bd) return 1;
      if (ad !== bd) return ad < bd ? -1 : 1;
      return String(a.customer_name || '').localeCompare(String(b.customer_name || ''));
    });
    const body = sorted.map((s) => {
      const onbId  = esc(String(s.onboarding_id || ''));
      const intake = _intakeState(s);
      return `
        <tr data-mo-id="${onbId}">
          <td><div class="mo-name">${esc(s.customer_name || '—')}${_unreadDotHtml(s.onboarding_id)}</div></td>
          <td>${_intakePillHtml(intake)}</td>
          <td>${_trajectCell(s)}</td>
          <td>${s.start_date ? esc(fmtDateNL(s.start_date)) : '<span class="ico-mute">—</span>'}</td>
          <td>${_paidCell(!!s.paid)}</td>
          <td>${_bubbleCell(s)}</td>
          <td>${_bedenktijdCell(s.bedenktijd || null)}</td>
          <td>${_wizardCell(s)}</td>
          <td>${_availCell(s.availability)}</td>
          <td style="text-align:right;color:var(--text-faint)"><i class="ti ti-chevron-right"></i></td>
        </tr>`;
    }).join('');
    wrap.innerHTML = `
      <div class="mo-table-wrap">
        <table class="mo-table">
          <thead>
            <tr>
              <th>Klant</th>
              <th>Status</th>
              <th>Traject</th>
              <th>Start</th>
              <th>Betaald</th>
              <th>Bubble</th>
              <th>Bedenktijd</th>
              <th>Wizard</th>
              <th>Beschikb.</th>
              <th></th>
            </tr>
          </thead>
          <tbody>${body}</tbody>
        </table>
      </div>`;
    wrap.querySelectorAll('tr[data-mo-id]').forEach((tr) => {
      tr.addEventListener('click', () => openModal(tr.getAttribute('data-mo-id')));
    });
  }

  // ── Tijdlijn ──────────────────────────────────────────────────────────
  function _buildTimeline(s) {
    const events = [];
    if (s.created_at) events.push({ at: s.created_at, label: 'Toegewezen aan jou' });
    const bu = s.bubble_user_id ? String(s.bubble_user_id) : null;
    if (bu) {
      const planned = _nextCallByStudent.get(bu);
      if (planned) events.push({ at: planned, label: 'Call ingepland' });
      const started = _completedByMember.get(bu);
      if (started) events.push({ at: started, label: 'Eerste call gestart' });
      const ns = _noshowByStudent.get(bu);
      if (ns) events.push({ at: ns, label: 'No-show' });
    }
    for (const u of (Array.isArray(s.updates) ? s.updates : [])) {
      if (u.kind === 'status' && u.status && _INTAKE_META[u.status]) {
        events.push({ at: u.created_at, label: 'Status: ' + _INTAKE_META[u.status].label, note: u.note || '' });
      } else if (u.kind === 'status' && !u.status) {
        events.push({ at: u.created_at, label: 'Status gewist', note: u.note || '' });
      } else if (u.kind === 'note' && u.note) {
        events.push({ at: u.created_at, label: 'Notitie', note: u.note });
      }
    }
    events.sort((a, b) => String(a.at || '').localeCompare(String(b.at || '')));
    if (events.length === 0) return '<div style="color:var(--text-faint);font-size:12.5px">Geen activiteit.</div>';
    return events.map((e) => {
      const when = e.at ? esc(fmtDateTimeNL(e.at)) : '—';
      const note = e.note ? `<div style="margin-top:2px;color:var(--text-dim);font-size:12px;white-space:pre-wrap">${esc(e.note)}</div>` : '';
      return `
        <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;padding:6px 0;border-top:1px solid var(--border)">
          <div style="font-size:11.5px;color:var(--text-faint)">${when}</div>
          <div><div style="font-size:12.5px;color:var(--text)">${esc(e.label)}</div>${note}</div>
        </div>`;
    }).join('');
  }

  // ── Modal ─────────────────────────────────────────────────────────────
  function openModal(onbId) {
    const s = _byId.get(String(onbId));
    if (!s) return;
    _openId = String(onbId);
    const overlay = document.getElementById('moModalOverlay');
    const title   = document.getElementById('moModalTitle');
    const pill    = document.getElementById('moModalStatusPill');
    const body    = document.getElementById('moModalBody');
    if (title) title.textContent = s.customer_name || 'Student';
    if (pill)  pill.innerHTML = _intakePillHtml(_intakeState(s));
    if (body)  body.innerHTML = _renderModalBody(s);
    if (overlay) overlay.classList.add('open');
    _wireModalHandlers(s);
  }
  function closeModal() {
    _openId = null;
    const overlay = document.getElementById('moModalOverlay');
    if (overlay) overlay.classList.remove('open');
  }
  function _refreshModal() {
    if (!_openId) return;
    const s = _byId.get(_openId);
    if (!s) return;
    const body = document.getElementById('moModalBody');
    const pill = document.getElementById('moModalStatusPill');
    if (pill)  pill.innerHTML = _intakePillHtml(_intakeState(s));
    if (body)  body.innerHTML = _renderModalBody(s);
    _wireModalHandlers(s);
  }

  // Vragenlijst-antwoorden uit server-resolved `answers_view` (label+value
  // per blok). Backend skipt al lege antwoorden / layout-blokken; hier
  // doen we alleen de presentatie.
  function _renderAnswersList(s) {
    const av = Array.isArray(s.answers_view) ? s.answers_view : [];
    if (av.length === 0) {
      return '<div style="font-size:13px;color:var(--text-faint)">Nog geen antwoorden ingevuld.</div>';
    }
    const items = av.map((it) => {
      const val = it && it.value != null ? String(it.value).trim() : '';
      const cls = val ? 'mo-qa-a' : 'mo-qa-a empty';
      const dis = val ? esc(val) : '—';
      return '<div class="mo-qa-item">'
        + '<div class="mo-qa-q">' + esc(it.label || it.key || '—') + '</div>'
        + '<div class="' + cls + '">' + dis + '</div>'
        + '</div>';
    }).join('');
    return '<div class="mo-qa">' + items + '</div>';
  }

  function _wireModalHandlers(s) {
    // Tab-switch (Overzicht / Account & Bubble / Vragenlijst / Tijdlijn)
    document.querySelectorAll('.mo-tab[data-mo-tab]').forEach((tab) => {
      tab.addEventListener('click', () => {
        const key = tab.getAttribute('data-mo-tab');
        document.querySelectorAll('.mo-tab[data-mo-tab]').forEach((b) => {
          b.classList.toggle('active', b === tab);
        });
        document.querySelectorAll('.mo-pane[data-mo-pane]').forEach((p) => {
          p.hidden = (p.getAttribute('data-mo-pane') !== key);
        });
      });
    });

    document.querySelectorAll('[data-mo-set]').forEach((btn) => {
      btn.addEventListener('click', async () => {
        const st = btn.getAttribute('data-mo-set');
        await _submit({ status: st });
      });
    });
    const clearBtn = document.querySelector('[data-mo-clear]');
    if (clearBtn) {
      clearBtn.addEventListener('click', async () => {
        await _submit({ status: null });
      });
    }
    const saveNote = document.querySelector('[data-mo-save-note]');
    if (saveNote) {
      saveNote.addEventListener('click', async () => {
        const ta = document.getElementById('moNote');
        const note = String(ta?.value || '').trim();
        if (!note) return;
        await _submit({ note });
        if (ta) ta.value = '';
      });
    }
    const saveSd = document.querySelector('[data-mo-save-startdate]');
    if (saveSd) {
      saveSd.addEventListener('click', async () => {
        const inp = document.getElementById('moStartDate');
        const raw = String(inp?.value || '').trim();
        if (!raw) { alert('Vul een startdatum in.'); return; }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(raw)) { alert('Ongeldige datum (YYYY-MM-DD).'); return; }
        await _submit({ start_date: raw });
      });
    }
  }

  async function _submit(payload) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function' || !_openId) return;
    try {
      const r = await apiFetch('/api/mentor-future-student-update', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ onboarding_id: _openId, ...payload }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      const cached = _byId.get(_openId);
      if (cached) {
        // status:'foo' / status:null / undef (notitie-only)
        if (Object.prototype.hasOwnProperty.call(payload, 'status')) {
          cached.mentor_intake_status = payload.status;
        }
        if (Object.prototype.hasOwnProperty.call(payload, 'start_date') && d.start_date) {
          cached.start_date = d.start_date;
        }
        // 2 mogelijke log-rijen: d.update (status/note) en d.start_date_update.
        const newRows = [];
        if (d.update) newRows.push(d.update);
        if (d.start_date_update) newRows.push(d.start_date_update);
        if (newRows.length > 0) {
          cached.updates = Array.isArray(cached.updates) ? cached.updates.slice() : [];
          for (const u of newRows) {
            cached.updates.push({
              kind:       u.kind || null,
              status:     u.status || null,
              note:       u.note || null,
              created_at: u.created_at || null,
              created_by: u.created_by || null,
            });
          }
        }
      }
      _refreshModal();
      _renderTable(Array.from(_byId.values())); // lijst-pill + startdatum volgen mee
    } catch (e) {
      console.error('[mentor-onboarding] submit:', e?.message || e);
      alert('Opslaan mislukt: ' + (e?.message || e));
    }
  }

  // ── Loader ────────────────────────────────────────────────────────────
  async function loadStudents() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') { setError('moTableWrap', 'apiFetch niet beschikbaar.'); return; }
    try { if (window._authSharedReady) await window._authSharedReady; } catch {}
    const wrap = document.getElementById('moTableWrap');
    if (wrap) wrap.innerHTML = `<div style="color:var(--text-faint);font-size:12.5px;padding:14px;text-align:center">Studenten laden…</div>`;
    try {
      const [r] = await Promise.all([
        apiFetch('/api/mentor-future-students-self'),
        loadOneOnOneMaps(),
      ]);
      let d = null;
      try { d = await r.json(); } catch {}
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _renderTable(Array.isArray(d?.students) ? d.students : []);
    } catch (e) {
      console.error('[mentor-onboarding] load:', e?.message || e);
      setError('moTableWrap', 'Studenten ophalen mislukt: ' + (e?.message || e));
    }
  }

  // ── Meldingen ─────────────────────────────────────────────────────────
  function _wireNotificationsPanel() {
    const btn   = document.getElementById('msNotifBtn');
    const panel = document.getElementById('msNotifPanel');
    const all   = document.getElementById('msNotifMarkAll');
    if (btn && panel) {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        panel.hidden = !panel.hidden;
      });
      document.addEventListener('click', (ev) => {
        if (panel.hidden) return;
        if (ev.target === btn || btn.contains(ev.target) || panel.contains(ev.target)) return;
        panel.hidden = true;
      });
    }
    if (all) all.addEventListener('click', () => _markAllRead());
  }
  async function loadNotifications() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-notifications-list');
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _notifications = Array.isArray(d?.notifications) ? d.notifications : [];
      _unreadByOnb.clear();
      for (const n of _notifications) {
        if (n.read_at != null) continue;
        if (n.kind !== 'admin_note') continue;
        if (n.onboarding_id) {
          _unreadByOnb.set(n.onboarding_id, (_unreadByOnb.get(n.onboarding_id) || 0) + 1);
        }
      }
      _renderNotifications(Number(d?.unread_count) || 0);
      // Rerender tabel zodat per-rij dot meeschakelt.
      try { _renderTable(Array.from(_byId.values())); } catch {}
    } catch (e) {
      console.warn('[mentor-onboarding] notifications:', e?.message || e);
    }
  }
  function _renderNotifications(unreadCount) {
    const cntEl = document.getElementById('msNotifCount');
    const list  = document.getElementById('msNotifList');
    if (cntEl) {
      if (unreadCount > 0) { cntEl.textContent = String(unreadCount); cntEl.style.display = ''; }
      else                 { cntEl.style.display = 'none'; }
    }
    if (!list) return;
    if (_notifications.length === 0) {
      list.innerHTML = '<div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Geen meldingen.</div>';
      return;
    }
    list.innerHTML = _notifications.map((n) => {
      const unread = (n.read_at == null);
      const bg = unread ? 'background:rgba(13,148,136,0.06)' : '';
      const ago = n.created_at ? esc(_shortDateTime(n.created_at)) : '';
      const stud = n.onboarding_customer_name ? '<div style="font-size:11.5px;color:var(--text-faint)">' + esc(n.onboarding_customer_name) + '</div>' : '';
      const body = n.body ? '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;white-space:pre-wrap">' + esc(n.body) + '</div>' : '';
      const readBtn = unread
        ? '<button type="button" data-mark-read="' + esc(n.id) + '" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:inherit">Gelezen</button>'
        : '';
      return '<div style="padding:10px 12px;border-bottom:1px solid var(--border);' + bg + '">'
        + '<div style="display:flex;align-items:start;justify-content:space-between;gap:8px">'
        +   '<div style="flex:1;min-width:0">'
        +     '<div style="font-size:12.5px;font-weight:600;color:var(--text)">' + esc(n.title || n.kind) + '</div>'
        +     stud
        +     body
        +     '<div style="font-size:11px;color:var(--text-faint);margin-top:4px">' + ago + '</div>'
        +   '</div>'
        +   readBtn
        + '</div>'
      + '</div>';
    }).join('');
    list.querySelectorAll('[data-mark-read]').forEach((btn) => {
      btn.addEventListener('click', () => _markRead(btn.getAttribute('data-mark-read')));
    });
  }
  async function _markRead(id) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (!id || typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-notification-mark-read', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      await loadNotifications();
    } catch (e) {
      console.warn('[mentor-onboarding] mark-read:', e?.message || e);
    }
  }
  async function _markAllRead() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    const ids = (_notifications || []).filter((n) => n.read_at == null).map((n) => n.id);
    if (ids.length === 0) return;
    try {
      const r = await apiFetch('/api/mentor-notification-mark-read', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      await loadNotifications();
    } catch (e) {
      console.warn('[mentor-onboarding] mark-all-read:', e?.message || e);
    }
  }

  // ── Mentor-inbox (page-tab "Inbox") ───────────────────────────────────
  // Server-side mentor-scoping: /api/inbox-conversations-list?module=onboarding
  // gebruikt getMentorCustomerIds (seesOwn). Wij vertrouwen het endpoint —
  // geen eigen klant-filtering hier.
  function _miAvatar(name) {
    const m = String(name || '?').trim().match(/[A-Za-z0-9]/);
    return (m ? m[0] : '?').toUpperCase();
  }
  function _miSetBadge(n) {
    const btn   = document.getElementById('moInboxTabBtn');
    const badge = document.getElementById('moInboxBadge');
    if (!badge || !btn) return;
    if (n > 0) { badge.textContent = String(n); badge.hidden = false; }
    else       { badge.hidden = true; }
  }

  async function _miLoadConversations(opts) {
    opts = opts || {};
    const list = document.getElementById('miConvList');
    if (!list) return;
    if (!opts.silent) {
      list.innerHTML = '<div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Laden…</div>';
    }
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/inbox-conversations-list?module=onboarding&limit=100');
      const j = await r.json().catch(() => ({}));
      if (!r.ok) {
        list.innerHTML = '<div style="padding:14px;color:#b91c1c;font-size:12.5px">Fout: ' + esc(j?.error || ('HTTP ' + r.status)) + '</div>';
        return;
      }
      if (j.configured === false) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12.5px">'
          + '<i class="ti ti-plug-connected-x" style="font-size:24px;display:block;margin-bottom:6px"></i>'
          + 'Onboarding-lijn nog niet geconfigureerd.'
          + '</div>';
        _miSetBadge(0);
        return;
      }
      const items = Array.isArray(j.items) ? j.items : [];
      _miState.convs = items;
      // Badge = aantal conversaties met ongelezen inbound (zelfde proxy
      // als de manager-inbox).
      let n = 0;
      for (const it of items) if (Number(it && it.unread_count) > 0) n++;
      _miSetBadge(n);
      if (items.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-faint);font-size:12.5px">'
          + '<i class="ti ti-inbox" style="font-size:24px;display:block;margin-bottom:6px"></i>'
          + 'Nog geen gesprekken met jouw studenten.'
          + '</div>';
        return;
      }
      const activeId = _miState.convId || null;
      list.innerHTML = items.map((it) => {
        const name      = it.customer_name || it.display_name || it.phone_number || '(geen naam)';
        const preview   = (it.last_message_preview || '').slice(0, 60);
        const time      = it.last_message_at ? fmtDateNL(it.last_message_at) : '';
        const isActive  = activeId && it.id === activeId ? ' active' : '';
        const dotCls    = it.can_send_text ? 'open' : 'closed';
        const dotTitle  = it.can_send_text ? '24h-venster open' : '24h-venster verlopen — alleen template';
        const unread    = Number(it.unread_count) > 0 ? '<span class="mi-conv-unread" title="Ongelezen">' + esc(String(it.unread_count)) + '</span>' : '';
        return '<div class="mi-conv-row' + isActive + '" data-mi-conv-id="' + esc(it.id) + '"'
          + ' data-mi-name="' + esc(name) + '"'
          + ' data-mi-phone="' + esc(it.phone_number || '') + '">'
          +   '<div class="mi-conv-avatar">' + esc(_miAvatar(name)) + '</div>'
          +   '<div>'
          +     '<div class="mi-conv-top">'
          +       '<span class="mi-conv-name">' + esc(name) + '</span>'
          +       '<span class="mi-conv-time">' + esc(time) + '</span>'
          +     '</div>'
          +     '<div class="mi-conv-preview">' + esc(preview || it.phone_number || '—')
          +       '<span class="mi-24h-dot ' + dotCls + '" title="' + esc(dotTitle) + '"></span>'
          +       unread
          +     '</div>'
          +   '</div>'
          + '</div>';
      }).join('');
      list.querySelectorAll('.mi-conv-row[data-mi-conv-id]').forEach((row) => {
        row.addEventListener('click', () => {
          _miSelectConv({
            id:    row.getAttribute('data-mi-conv-id'),
            name:  row.getAttribute('data-mi-name')  || '',
            phone: row.getAttribute('data-mi-phone') || '',
          });
        });
      });
    } catch (e) {
      list.innerHTML = '<div style="padding:14px;color:#b91c1c;font-size:12.5px">Fout: ' + esc(e?.message || e) + '</div>';
    }
  }

  async function _miSelectConv({ id, name, phone }) {
    if (!id) return;
    _miState.convId      = id;
    _miState.conv        = null;
    _miState.canSendText = false;
    const empty = document.getElementById('miThreadEmpty');
    const cont  = document.getElementById('miThreadContent');
    if (empty) empty.style.display = 'none';
    if (cont)  { cont.hidden = false; cont.style.display = 'flex'; }
    document.querySelectorAll('#miConvList .mi-conv-row.active').forEach((el) => el.classList.remove('active'));
    const newRow = document.querySelector('#miConvList .mi-conv-row[data-mi-conv-id="' + id.replace(/"/g, '\\"') + '"]');
    if (newRow) newRow.classList.add('active');

    const nameEl  = document.getElementById('miThreadName');
    const phoneEl = document.getElementById('miThreadPhone');
    if (nameEl)  nameEl.textContent  = name  || phone || 'Onbekend';
    if (phoneEl) phoneEl.textContent = phone || '—';
    const wbadge = document.getElementById('miThreadWindow');
    if (wbadge) { wbadge.textContent = '…'; wbadge.style.background = 'var(--bg-elev)'; wbadge.style.color = 'var(--text-dim)'; }
    const wrap = document.getElementById('miThreadMessages');
    if (wrap) wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12.5px;text-align:center;padding:20px">Laden…</div>';
    const ta   = document.getElementById('miReplyText');
    const hint = document.getElementById('miThreadHint');
    if (ta)   ta.value = '';
    if (hint) hint.textContent = '';

    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const params = new URLSearchParams({ conversation_id: id, limit: '200', mark_as_read: 'true' });
      const r = await apiFetch('/api/inbox-messages-list?' + params.toString());
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        if (wrap) wrap.innerHTML = '<div style="color:#b91c1c;font-size:12.5px;padding:14px">Fout: ' + esc(d?.error || ('HTTP ' + r.status)) + '</div>';
        return;
      }
      _miState.conv        = d.conversation || null;
      _miState.canSendText = !!(d.conversation && d.conversation.can_send_text);
      _miRenderThread(d.items || []);
      _miApplyComposeState();
      _miLoadConversations({ silent: true }); // badge + active-state refresh
    } catch (e) {
      if (wrap) wrap.innerHTML = '<div style="color:#b91c1c;font-size:12.5px;padding:14px">Fout: ' + esc(e?.message || e) + '</div>';
    }
  }

  function _miRenderThread(items) {
    const wrap = document.getElementById('miThreadMessages');
    if (!wrap) return;
    if (!items || items.length === 0) {
      wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12.5px;text-align:center;padding:20px">Nog geen berichten in deze conversatie.</div>';
    } else {
      wrap.innerHTML = items.map((m) => {
        const inbound = (m.direction === 'in');
        const time    = m.created_at ? fmtDateTimeNL(m.created_at) : '';
        const body    = String(m.body || (m.template_name ? '[template:' + m.template_name + ']' : '[media]'));
        return '<div class="mi-msg-row ' + (inbound ? 'in' : 'out') + '">'
          + '<div class="mi-msg-bubble">'
          +   '<div style="white-space:pre-wrap;word-wrap:break-word">' + esc(body) + '</div>'
          +   '<div class="mi-msg-time">' + esc(time) + '</div>'
          + '</div></div>';
      }).join('');
    }
    wrap.scrollTop = wrap.scrollHeight;
    const badge = document.getElementById('miThreadWindow');
    if (!badge) return;
    if (_miState.canSendText) {
      badge.textContent = '24h open';
      badge.style.background = 'rgba(5,150,105,0.15)';
      badge.style.color = '#059669';
      badge.title = 'Servicewindow open — vrije tekst toegestaan';
    } else {
      badge.textContent = '24h verlopen';
      badge.style.background = 'rgba(245,158,11,0.18)';
      badge.style.color = '#b45309';
      badge.title = 'Servicewindow verlopen — alleen templates';
    }
  }

  function _miApplyComposeState() {
    const ta      = document.getElementById('miReplyText');
    const sendBtn = document.querySelector('[data-mi-send]');
    const hint    = document.getElementById('miThreadHint');
    if (_miState.canSendText) {
      if (ta)      { ta.disabled = false; ta.placeholder = 'Typ een bericht…'; }
      if (sendBtn) sendBtn.disabled = false;
      if (hint)    hint.textContent = '';
    } else {
      if (ta)      { ta.disabled = true; ta.placeholder = '24h-venster verlopen — alleen templates'; }
      if (sendBtn) sendBtn.disabled = true;
      if (hint)    hint.textContent = '24h-venster verlopen sinds laatste inbound — gebruik een template.';
    }
  }

  async function _miSendText() {
    if (!_miState.convId || !_miState.canSendText) return;
    const ta = document.getElementById('miReplyText');
    const body = String(ta?.value || '').trim();
    if (!body) return;
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    const sendBtn = document.querySelector('[data-mi-send]');
    if (sendBtn) sendBtn.disabled = true;
    try {
      const r = await apiFetch('/api/inbox-send', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ conversation_id: _miState.convId, body }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      if (ta) ta.value = '';
      await _miSelectConv({
        id:    _miState.convId,
        name:  document.getElementById('miThreadName')?.textContent || '',
        phone: document.getElementById('miThreadPhone')?.textContent || '',
      });
    } catch (e) {
      alert('Versturen mislukt: ' + (e?.message || e));
    } finally {
      if (sendBtn) sendBtn.disabled = !_miState.canSendText;
    }
  }

  async function _miOpenTemplates() {
    if (!_miState.convId) return;
    const overlay = document.getElementById('miTplOverlay');
    const listEl  = document.getElementById('miTplList');
    if (!overlay || !listEl) return;
    overlay.classList.add('open');
    listEl.innerHTML = '<div style="color:var(--text-faint);font-size:12.5px;padding:14px;text-align:center">Templates laden…</div>';
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/inbox-template-list?conversation_id=' + encodeURIComponent(_miState.convId));
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        listEl.innerHTML = '<div style="color:#b91c1c;font-size:12.5px;padding:14px">Fout: ' + esc(d?.error || ('HTTP ' + r.status)) + '</div>';
        return;
      }
      const items = Array.isArray(d?.items) ? d.items : (Array.isArray(d?.templates) ? d.templates : []);
      if (items.length === 0) {
        listEl.innerHTML = '<div style="color:var(--text-faint);font-size:12.5px;padding:14px;text-align:center">Geen templates beschikbaar.</div>';
        return;
      }
      listEl.innerHTML = items.map((t, i) => {
        const name = t.display_name || t.name || ('template-' + i);
        const preview = (t.body_preview || t.body || '').slice(0, 240);
        return '<div class="mi-tpl-item" data-mi-tpl-name="' + esc(t.name || name) + '">'
          + '<div class="mi-tpl-name">' + esc(name) + '</div>'
          + (preview ? '<div class="mi-tpl-body">' + esc(preview) + '</div>' : '')
          + '</div>';
      }).join('');
      listEl.querySelectorAll('.mi-tpl-item[data-mi-tpl-name]').forEach((el) => {
        el.addEventListener('click', () => _miSendTemplate(el.getAttribute('data-mi-tpl-name')));
      });
    } catch (e) {
      listEl.innerHTML = '<div style="color:#b91c1c;font-size:12.5px;padding:14px">Fout: ' + esc(e?.message || e) + '</div>';
    }
  }

  async function _miSendTemplate(templateName) {
    if (!_miState.convId || !templateName) return;
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/inbox-send-template', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ conversation_id: _miState.convId, template_name: templateName }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _miCloseTemplates();
      await _miSelectConv({
        id:    _miState.convId,
        name:  document.getElementById('miThreadName')?.textContent || '',
        phone: document.getElementById('miThreadPhone')?.textContent || '',
      });
    } catch (e) {
      alert('Template versturen mislukt: ' + (e?.message || e));
    }
  }
  function _miCloseTemplates() {
    const overlay = document.getElementById('miTplOverlay');
    if (overlay) overlay.classList.remove('open');
  }

  function _miWireInboxOnce() {
    const refresh = document.querySelector('[data-mi-refresh]');
    if (refresh) refresh.addEventListener('click', () => _miLoadConversations());
    const sendBtn = document.querySelector('[data-mi-send]');
    if (sendBtn) sendBtn.addEventListener('click', () => _miSendText());
    const tplBtn = document.querySelector('[data-mi-templates]');
    if (tplBtn) tplBtn.addEventListener('click', () => _miOpenTemplates());
    const tplClose = document.getElementById('miTplClose');
    if (tplClose) tplClose.addEventListener('click', () => _miCloseTemplates());
    const overlay = document.getElementById('miTplOverlay');
    if (overlay) overlay.addEventListener('click', (ev) => { if (ev.target === overlay) _miCloseTemplates(); });
    const ta = document.getElementById('miReplyText');
    if (ta) ta.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' && !ev.shiftKey) { ev.preventDefault(); _miSendText(); }
    });
  }

  function _switchPageTab(key) {
    document.querySelectorAll('.mo-page-tab[data-mo-page-tab]').forEach((b) => {
      b.classList.toggle('active', b.getAttribute('data-mo-page-tab') === key);
    });
    document.querySelectorAll('.mo-page-pane[data-mo-page-pane]').forEach((p) => {
      p.hidden = (p.getAttribute('data-mo-page-pane') !== key);
    });
    if (key === 'inbox' && !_miState.inboxLoaded) {
      _miState.inboxLoaded = true;
      _miLoadConversations();
    }
  }

  // ── Init ──────────────────────────────────────────────────────────────
  async function init() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch {}
    if (window.AuthShared && typeof window.AuthShared.requireAuth === 'function') {
      const profile = await window.AuthShared.requireAuth();
      if (!profile) return;
    }
    try {
      if (window.RBAC?.ensurePermissionsLoaded) {
        await window.RBAC.ensurePermissionsLoaded();
        if (!window.RBAC.canSync || !window.RBAC.canSync('mentor.module.access')) {
          const app = document.querySelector('.app');
          if (app) app.innerHTML =
            '<div style="max-width:480px;margin:48px auto;text-align:center;padding:32px;border:1px solid var(--border);border-radius:14px;background:var(--bg-elev)">'
            + '<h2 style="margin:0 0 10px;font-size:18px;color:var(--text)">Geen toegang tot Onboarding</h2>'
            + '<p style="margin:0;color:var(--text-dim);font-size:14px">Je account heeft hier momenteel geen rechten voor. Neem contact op met een beheerder.</p>'
            + '</div>';
          return;
        }
      }
    } catch (e) { /* fail-open */ }

    // Filter-chips
    document.querySelectorAll('#moFilterRow [data-mo-filt]').forEach((btn) => {
      btn.addEventListener('click', () => {
        _filter = btn.getAttribute('data-mo-filt') || 'all';
        document.querySelectorAll('#moFilterRow [data-mo-filt]').forEach((b) => {
          b.classList.toggle('active', b === btn);
        });
        _renderTable(Array.from(_byId.values()));
      });
    });

    // Modal close
    const closeBtn = document.getElementById('moModalClose');
    if (closeBtn) closeBtn.addEventListener('click', closeModal);
    const overlay = document.getElementById('moModalOverlay');
    if (overlay) overlay.addEventListener('click', (ev) => {
      if (ev.target === overlay) closeModal();
    });
    document.addEventListener('keydown', (ev) => {
      if (ev.key === 'Escape' && overlay && overlay.classList.contains('open')) closeModal();
    });

    _wireNotificationsPanel();
    loadNotifications();
    loadStudents();

    // Page-tab-switch (Studenten / Inbox). Inbox-tab is gated op
    // onboarding.inbox.view — bij ontbreken (mentor zonder die perm)
    // blijft de knop hidden en wordt er niets geladen. Server-side gate'n
    // de endpoints sowieso (defense in depth).
    document.querySelectorAll('.mo-page-tab[data-mo-page-tab]').forEach((b) => {
      b.addEventListener('click', () => _switchPageTab(b.getAttribute('data-mo-page-tab') || 'students'));
    });
    try {
      const canInbox = !!(window.RBAC?.canSync?.('onboarding.inbox.view'));
      const tabBtn = document.getElementById('moInboxTabBtn');
      if (tabBtn) tabBtn.hidden = !canInbox;
      if (canInbox) {
        _miWireInboxOnce();
        // 60s badge-poll (alleen ongelezen-counter; lijst zelf wordt
        // pas geladen bij eerste tab-klik). Spiegelt manager-inbox.
        const tickBadge = () => _miLoadConversations({ silent: true }).catch(() => {});
        tickBadge();
        if (!_miState.badgeTimer) {
          _miState.badgeTimer = setInterval(tickBadge, 60000);
          window.addEventListener('beforeunload', () => {
            if (_miState.badgeTimer) { clearInterval(_miState.badgeTimer); _miState.badgeTimer = null; }
          });
        }
      }
    } catch (e) { console.warn('[mentor-onboarding] inbox-tab gate:', e?.message || e); }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
