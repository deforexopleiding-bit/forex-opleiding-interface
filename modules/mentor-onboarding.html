<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Onboarding — Mentor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    body { background: var(--bg); color: var(--text); }
    .app { max-width: 1200px; margin: 24px auto 60px; padding: 0 24px; }
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:28px; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-header p  { font-size: 13px; color: var(--text-dim); }
    .empty-state { padding:24px; border:1px dashed var(--border); border-radius:10px; text-align:center; color:var(--text-faint); font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px; }
    .student-card { border:1px solid var(--border); border-radius:10px; background:var(--bg-elev); margin-bottom:10px; overflow:hidden; }
    .student-head { display:grid; align-items:center; gap:12px; padding:12px 14px; }
    .student-name { font-weight:700; color:var(--text); font-size:14px; }
    .student-meta { font-size:12.5px; color:var(--text-dim); }
    .student-stat { font-size:12.5px; }
    .badge       { display:inline-block; padding:2px 9px; border-radius:999px; font-size:11px; font-weight:700; }
    .badge-green { background:rgba(34,197,94,0.16); color:#15803d; }
    .badge-amber { background:rgba(245,158,11,0.18); color:#92400e; }
    .badge-red   { background:rgba(220,38,38,0.16); color:#7f1d1d; }
    .badge-blue  { background:rgba(59,130,246,0.16); color:#1e3a8a; }
    .badge-grey  { background:rgba(100,116,139,0.18); color:#475569; }
    .btn { background:var(--bg-elev); border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--text); font:inherit; font-size:12.5px; }
    .filter-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; align-items:center; }
    .filter-chip { padding:5px 12px; border:1px solid var(--border); border-radius:999px; background:var(--bg-elev); color:var(--text-dim); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
    .filter-chip.active { background:var(--text); color:var(--bg); border-color:var(--text); }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-header">
    <div>
      <h1>Onboarding</h1>
      <p>Jouw toegewezen instroom-studenten — zet je intake-status, plaats notities, volg de tijdlijn.</p>
    </div>
    <div style="position:relative">
      <button id="msNotifBtn" type="button" title="Meldingen"
        style="position:relative;background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 12px;cursor:pointer;color:var(--text);display:inline-flex;align-items:center;gap:6px;font-family:inherit">
        <i class="ti ti-bell"></i>
        <span id="msNotifCount" style="display:none;background:#dc2626;color:#fff;border-radius:999px;padding:1px 7px;font-size:11px;font-weight:700;line-height:1.4">0</span>
      </button>
      <div id="msNotifPanel" hidden
        style="position:absolute;right:0;top:calc(100% + 6px);width:380px;max-height:520px;overflow-y:auto;background:var(--bg-elev);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.18);z-index:50">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--border)">
          <div style="font-weight:600;font-size:13px">Meldingen</div>
          <button id="msNotifMarkAll" type="button" style="background:transparent;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:inherit">Alles gelezen</button>
        </div>
        <div id="msNotifList" style="padding:4px 0">
          <div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Laden…</div>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-row" id="moFilterRow">
    <button type="button" class="filter-chip active" data-mo-filt="all">Alles</button>
    <button type="button" class="filter-chip" data-mo-filt="problems">Te behandelen</button>
    <button type="button" class="filter-chip" data-mo-filt="wil_niet">Wil niet</button>
    <button type="button" class="filter-chip" data-mo-filt="no_show">No-show</button>
    <button type="button" class="filter-chip" data-mo-filt="geen_gehoor">Geen gehoor</button>
    <button type="button" class="filter-chip" data-mo-filt="wil_later">Wil later</button>
    <button type="button" class="filter-chip" data-mo-filt="call_ingepland">Call ingepland</button>
    <button type="button" class="filter-chip" data-mo-filt="gestart">Gestart</button>
    <span id="moCountInfo" style="margin-left:auto;font-size:12.5px;color:var(--text-faint)"></span>
  </div>

  <div id="futureStudentsWrap"><div class="empty-state"><i class="ti ti-clock"></i>Laden…</div></div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  // ── Helpers ────────────────────────────────────────────────────────────
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const fmtDateNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return iso; }
  };
  const fmtDateTimeNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  };
  function _shortDateTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }
  function setError(elId, msg) {
    const el = document.getElementById(elId);
    if (el) el.innerHTML =
      `<div class="empty-state" style="border-color:#fecaca;color:#b91c1c"><i class="ti ti-alert-triangle"></i>${esc(msg)}</div>`;
  }

  // ── State ──────────────────────────────────────────────────────────────
  // SELF-scoped: alle data komt van /api/mentor-future-students-self + de
  // mentor-eigen 1-op-1 maps. Geen no-mentor-pad, geen manager-acties.
  const _nextCallByStudent = new Map();
  const _noshowByStudent   = new Map();
  const _completedByMember = new Map();
  const _futureById        = new Map();
  const _futureOpenId      = { id: null };
  let   _filter            = 'all';

  // Notifications (mentor self-only)
  let   _notifications        = [];
  const _unreadByOnb          = new Map();
  // _unreadByBubbleUser blijft hier ongebruikt (mijn-studenten leeft op
  // mentor-students.html). We declareren 'm niet om verwarring te vermijden.

  // ── 1-op-1 maps (auto-statussen: gestart / call_ingepland / no_show) ──
  async function loadOneOnOneMaps() {
    _nextCallByStudent.clear();
    _noshowByStudent.clear();
    _completedByMember.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-1on1-sessions');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || '1on1 fetch failed');
      const nowMs = Date.now();
      const planned = Array.isArray(d.planned) ? d.planned : [];
      for (const p of planned) {
        const mu = p.member_user;
        if (!mu) continue;
        const t = new Date(p.starts_at).getTime();
        if (!Number.isFinite(t) || t < nowMs) continue;
        const prev = _nextCallByStudent.get(mu);
        if (!prev || t < new Date(prev).getTime()) _nextCallByStudent.set(mu, p.starts_at);
      }
      const completed = Array.isArray(d.completed) ? d.completed : [];
      for (const c of completed) {
        const mu = c.member_user;
        if (!mu) continue;
        const t = new Date(c.starts_at).getTime();
        if (!Number.isFinite(t)) continue;
        const prev = _completedByMember.get(mu);
        if (!prev || t < new Date(prev).getTime()) _completedByMember.set(mu, c.starts_at);
      }
      const nsBy = (d && typeof d.noshow_by_student === 'object' && d.noshow_by_student) ? d.noshow_by_student : {};
      for (const [mu, iso] of Object.entries(nsBy)) {
        if (mu && iso) _noshowByStudent.set(String(mu), String(iso));
      }
    } catch (e) { console.warn('[mentor-onboarding] 1on1:', e?.message || e); }
  }

  // ── Paid badge — gated on soon (≤14 dagen) ─────────────────────────────
  function _futurePaidBadge(paid, soon) {
    if (paid) {
      return '<span class="badge badge-green" title="Betaling is binnen.">💶 Betaald</span>';
    }
    if (soon) {
      return '<span class="badge badge-amber" title="Plan gerust; controleer de betaling vóór de call plaatsvindt.">⏳ Nog niet betaald · plan de eerste call alvast (check betaling vóór de call)</span>';
    }
    return '<span class="badge badge-amber" title="Betaling staat nog open.">⏳ Nog niet betaald</span>';
  }
  function _daysUntilStart(start) {
    if (!start) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const sd = new Date(start); sd.setHours(0,0,0,0);
    const diff = Math.round((sd - today) / (24 * 60 * 60 * 1000));
    return Number.isFinite(diff) ? diff : null;
  }
  function _futureStartBadge(days) {
    let when;
    if (days === 0)      when = 'vandaag';
    else if (days === 1) when = 'morgen';
    else                 when = 'over ' + days + ' dag' + (days === 1 ? '' : 'en');
    return '<span class="badge badge-amber" style="font-size:11.5px"'
      + ' title="Start ' + when + ' — plan alvast de eerste call (check betaling vóór de call).">'
      + '📞 Plan de eerste call — start ' + when + ' · neem contact op</span>';
  }

  // ── Intake-statusmodel (mirror van Fase 1 — identieke prioriteit) ─────
  // Mentor heeft altijd een toegewezen onboarding (self-scoped) → geen
  // 'nog_geen_mentor'-key hier. Default-sort is problemen-bovenaan.
  const _INTAKE_MANUAL = ['nog_te_benaderen','geen_gehoor','wil_later','wil_niet'];
  const _INTAKE_META = {
    gestart:           { label: 'Gestart',            cls: 'badge-green', auto: true  },
    wil_niet:          { label: 'Wil niet starten',   cls: 'badge-red',   auto: false },
    no_show:           { label: 'No-show',            cls: 'badge-red',   auto: true  },
    geen_gehoor:       { label: 'Geen gehoor',        cls: 'badge-amber', auto: false },
    wil_later:         { label: 'Wil later starten',  cls: 'badge-amber', auto: false },
    call_ingepland:    { label: 'Call ingepland',     cls: 'badge-blue',  auto: true  },
    nog_te_benaderen:  { label: 'Nog te benaderen',   cls: 'badge-grey',  auto: false },
  };
  // Server-rank mirror — problemen-bovenaan default.
  const _RANK = {
    wil_niet: 0, no_show: 1, geen_gehoor: 2, wil_later: 3,
    nog_te_benaderen: 4, call_ingepland: 5, gestart: 9,
  };
  function _futureIntakeState(s) {
    const bu = s.bubble_user_id ? String(s.bubble_user_id) : null;
    if (bu && _completedByMember.has(bu))      return 'gestart';
    const ms = s.mentor_intake_status || null;
    if (ms === 'wil_niet')                     return 'wil_niet';
    if (bu && _noshowByStudent.has(bu))        return 'no_show';
    if (ms === 'geen_gehoor')                  return 'geen_gehoor';
    if (ms === 'wil_later')                    return 'wil_later';
    if (bu && _nextCallByStudent.has(bu))      return 'call_ingepland';
    return 'nog_te_benaderen';
  }
  function _intakePillHtml(key) {
    const m = _INTAKE_META[key] || _INTAKE_META.nog_te_benaderen;
    return `<span class="badge ${m.cls}">${esc(m.label)}</span>`;
  }

  // ── Tijdlijn (stored updates + synth events + assigned) ───────────────
  function _buildFutureTimeline(s) {
    const events = [];
    if (s.created_at) {
      events.push({ at: s.created_at, kind: 'assigned', label: 'Toegewezen aan jou' });
    }
    const bu = s.bubble_user_id ? String(s.bubble_user_id) : null;
    if (bu) {
      const planned = _nextCallByStudent.get(bu);
      if (planned) events.push({ at: planned, kind: 'call_scheduled', label: 'Call ingepland' });
      const started = _completedByMember.get(bu);
      if (started) events.push({ at: started, kind: 'call_started', label: 'Eerste call gestart' });
      const ns = _noshowByStudent.get(bu);
      if (ns) events.push({ at: ns, kind: 'no_show', label: 'No-show' });
    }
    for (const u of (Array.isArray(s.updates) ? s.updates : [])) {
      if (u.kind === 'status' && u.status && _INTAKE_META[u.status]) {
        events.push({ at: u.created_at, kind: 'status', label: 'Status: ' + _INTAKE_META[u.status].label, note: u.note || '' });
      } else if (u.kind === 'note' && u.note) {
        events.push({ at: u.created_at, kind: 'note', label: 'Notitie', note: u.note });
      }
    }
    events.sort((a, b) => String(a.at || '').localeCompare(String(b.at || '')));
    if (events.length === 0) return '<div style="color:var(--text-faint);font-size:12.5px">Geen activiteit.</div>';
    return events.map((e) => {
      const when = e.at ? esc(fmtDateTimeNL(e.at)) : '—';
      const note = e.note ? `<div style="margin-top:2px;color:var(--text-dim);font-size:12px;white-space:pre-wrap">${esc(e.note)}</div>` : '';
      return `
        <div style="display:grid;grid-template-columns:130px 1fr;gap:8px;padding:6px 0;border-top:1px solid var(--border)">
          <div style="font-size:11.5px;color:var(--text-faint)">${when}</div>
          <div><div style="font-size:12.5px;color:var(--text)">${esc(e.label)}</div>${note}</div>
        </div>`;
    }).join('');
  }

  // ── Card-body (status-selector + planned call + notitie + tijdlijn) ───
  function _renderFutureCardBody(s) {
    const key = _futureIntakeState(s);
    const bu  = s.bubble_user_id ? String(s.bubble_user_id) : null;
    const plannedIso = bu ? _nextCallByStudent.get(bu) : null;
    const plannedLine = plannedIso
      ? `<div style="font-size:12.5px;color:var(--text)">${esc(fmtDateTimeNL(plannedIso))}</div>`
      : `<div style="font-size:12.5px;color:var(--text-faint)">— nog niets ingepland</div>`;
    const manualBtns = _INTAKE_MANUAL.map((k) => {
      const m = _INTAKE_META[k];
      const isCurrent = (key === k);
      const style = isCurrent
        ? 'background:var(--text);color:var(--bg);border-color:var(--text)'
        : '';
      return `<button type="button" class="btn"
        data-fut-set-status="${esc(k)}"
        style="padding:5px 9px;font-size:12px;${style}">${esc(m.label)}</button>`;
    }).join(' ');
    const isAuto = !!(_INTAKE_META[key] && _INTAKE_META[key].auto);
    const autoNote = isAuto
      ? `<div style="font-size:11.5px;color:var(--text-faint);margin-top:4px">Huidige status "<strong>${esc(_INTAKE_META[key].label)}</strong>" is automatisch afgeleid uit de 1-op-1 sessies — kies hierboven een handmatige status om dat over te schrijven.</div>`
      : '';
    const noteId = 'futNote-' + esc(String(s.onboarding_id));
    return `
      <div style="padding:12px;border-top:1px solid var(--border);display:grid;gap:12px">
        <div>
          <div style="font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Status</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">${manualBtns}</div>
          ${autoNote}
        </div>
        <div>
          <div style="font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Geplande call</div>
          ${plannedLine}
        </div>
        <div>
          <div style="font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Notitie</div>
          <textarea id="${noteId}" rows="2" placeholder="Voeg een notitie toe…"
            style="width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font:inherit;font-size:12.5px;resize:vertical"></textarea>
          <div style="margin-top:6px;display:flex;justify-content:flex-end">
            <button type="button" class="btn" data-fut-save-note style="padding:5px 11px;font-size:12px">Opslaan</button>
          </div>
        </div>
        <div>
          <div style="font-size:11.5px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Tijdlijn</div>
          <div data-fut-timeline>${_buildFutureTimeline(s)}</div>
        </div>
      </div>`;
  }

  // ── Filter + sort + render ────────────────────────────────────────────
  function _applyFilter(list) {
    if (_filter === 'all') return list;
    if (_filter === 'problems') {
      const PROB = new Set(['wil_niet','no_show','geen_gehoor','wil_later']);
      return list.filter((s) => PROB.has(_futureIntakeState(s)));
    }
    return list.filter((s) => _futureIntakeState(s) === _filter);
  }

  function _renderFutureStudents(students) {
    const wrap = document.getElementById('futureStudentsWrap');
    if (!wrap) return;
    const list = Array.isArray(students) ? students : [];
    _futureById.clear();
    for (const s of list) {
      if (s && s.onboarding_id) _futureById.set(String(s.onboarding_id), s);
    }
    const filtered = _applyFilter(list);
    const info = document.getElementById('moCountInfo');
    if (info) info.textContent = filtered.length + ' / ' + list.length + ' studenten';
    if (filtered.length === 0) {
      wrap.innerHTML = list.length === 0
        ? `<div class="empty-state"><i class="ti ti-user-question"></i>Je hebt nog geen toekomstige studenten toegewezen gekregen.</div>`
        : `<div class="empty-state"><i class="ti ti-filter-off"></i>Geen studenten in deze filter.</div>`;
      return;
    }
    // Default-sort: problemen-bovenaan (intake_rank asc); tie-break op
    // start_date asc en daarna naam.
    const sorted = filtered.slice().sort((a, b) => {
      const ra = _RANK[_futureIntakeState(a)] ?? 99;
      const rb = _RANK[_futureIntakeState(b)] ?? 99;
      if (ra !== rb) return ra - rb;
      const ad = a.start_date ? String(a.start_date) : '9999-99-99';
      const bd = b.start_date ? String(b.start_date) : '9999-99-99';
      if (ad !== bd) return ad < bd ? -1 : 1;
      return String(a.customer_name || '').localeCompare(String(b.customer_name || ''));
    });
    wrap.innerHTML = sorted.map((s) => _futureCardHtml(s)).join('');
    _wireFutureCards(wrap);
  }

  function _futureCardHtml(s) {
    const days = _daysUntilStart(s.start_date);
    const soon = (days != null && days >= 0 && days <= 14);
    const cardStyle = soon
      ? 'border:1px solid rgba(245,158,11,0.45);background:linear-gradient(180deg, rgba(245,158,11,0.07), rgba(245,158,11,0.02))'
      : '';
    const startBadge = soon ? _futureStartBadge(days) : '';
    const intakeKey  = _futureIntakeState(s);
    const isOpen     = (_futureOpenId.id === String(s.onboarding_id));
    const startLine  = s.start_date
      ? `<div class="student-meta" style="margin-top:4px"><strong style="color:var(--text-dim)">Startdatum:</strong> ${esc(fmtDateNL(s.start_date))}${days != null && days >= 0 ? ' · over ' + days + ' dag' + (days === 1 ? '' : 'en') : ''}</div>`
      : `<div class="student-meta" style="margin-top:4px"><strong style="color:var(--text-dim)">Startdatum:</strong> <span style="color:var(--text-faint)">— niet ingesteld</span></div>`;
    const body = isOpen ? _renderFutureCardBody(s) : '';
    const chevron = isOpen ? 'ti-chevron-up' : 'ti-chevron-down';
    return `
      <div class="student-card" data-fut-card="${esc(String(s.onboarding_id))}" style="${cardStyle}">
        <div class="student-head" data-fut-toggle="${esc(String(s.onboarding_id))}" style="grid-template-columns:1fr auto;cursor:pointer">
          <div>
            <div class="student-name">${esc(s.customer_name || '—')}${_unreadAdminBadgeForOnb(String(s.onboarding_id || ''))}</div>
            <div class="student-meta">${esc(s.traject_label || '—')}</div>
            ${startLine}
          </div>
          <div class="student-stat" style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;align-items:center">
            ${startBadge}
            ${_futurePaidBadge(!!s.paid, soon)}
            ${_intakePillHtml(intakeKey)}
            <i class="ti ${chevron}" style="color:var(--text-faint);font-size:16px"></i>
          </div>
        </div>
        ${body}
      </div>`;
  }

  function _wireFutureCards(wrap) {
    wrap.querySelectorAll('[data-fut-toggle]').forEach((el) => {
      el.addEventListener('click', (ev) => {
        if (ev.target.closest('[data-fut-set-status],[data-fut-save-note],textarea,button')) return;
        const id = el.getAttribute('data-fut-toggle');
        _futureOpenId.id = (_futureOpenId.id === id) ? null : id;
        _rerenderFutureList();
      });
    });
    wrap.querySelectorAll('[data-fut-set-status]').forEach((btn) => {
      btn.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        const cardEl = btn.closest('[data-fut-card]');
        if (!cardEl) return;
        const id  = cardEl.getAttribute('data-fut-card');
        const st  = btn.getAttribute('data-fut-set-status');
        await _futureSubmit(id, { status: st });
      });
    });
    wrap.querySelectorAll('[data-fut-save-note]').forEach((btn) => {
      btn.addEventListener('click', async (ev) => {
        ev.stopPropagation();
        const cardEl = btn.closest('[data-fut-card]');
        if (!cardEl) return;
        const id = cardEl.getAttribute('data-fut-card');
        const ta = cardEl.querySelector('textarea[id^="futNote-"]');
        const note = String(ta?.value || '').trim();
        if (!note) { _futureFlash(cardEl, 'Notitie is leeg.', true); return; }
        await _futureSubmit(id, { note });
        if (ta) ta.value = '';
      });
    });
  }

  function _rerenderFutureList() {
    const list = Array.from(_futureById.values());
    _renderFutureStudents(list);
  }

  function _futureFlash(cardEl, msg, isError) {
    const color = isError ? '#b91c1c' : 'var(--text-dim)';
    const box = document.createElement('div');
    box.style.cssText = `padding:6px 12px;font-size:12px;color:${color}`;
    box.textContent = msg;
    cardEl.appendChild(box);
    setTimeout(() => { try { box.remove(); } catch {} }, 2500);
  }

  async function _futureSubmit(onboardingId, payload) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    const cardEl = document.querySelector(`[data-fut-card="${onboardingId}"]`);
    try {
      const r = await apiFetch('/api/mentor-future-student-update', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ onboarding_id: onboardingId, ...payload }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      const cached = _futureById.get(String(onboardingId));
      if (cached) {
        if (payload.status) cached.mentor_intake_status = payload.status;
        const u = d.update || null;
        if (u) {
          cached.updates = Array.isArray(cached.updates) ? cached.updates.slice() : [];
          cached.updates.push({
            kind:       u.kind || null,
            status:     u.status || null,
            note:       u.note || null,
            created_at: u.created_at || null,
            created_by: u.created_by || null,
          });
        }
      }
      _rerenderFutureList();
      if (cardEl) _futureFlash(document.querySelector(`[data-fut-card="${onboardingId}"]`) || cardEl, 'Opgeslagen.', false);
    } catch (e) {
      console.error('[mentor-onboarding] submit:', e?.message || e);
      if (cardEl) _futureFlash(cardEl, 'Opslaan mislukt: ' + (e?.message || e), true);
    }
  }

  // ── Loader ─────────────────────────────────────────────────────────────
  async function loadFutureStudents() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') { setError('futureStudentsWrap', 'apiFetch niet beschikbaar.'); return; }
    try { if (window._authSharedReady) await window._authSharedReady; } catch {}
    const wrap = document.getElementById('futureStudentsWrap');
    if (wrap) wrap.innerHTML = `<div style="color:var(--text-faint);font-size:12.5px;padding:14px;text-align:center">Studenten laden…</div>`;
    try {
      const [r] = await Promise.all([
        apiFetch('/api/mentor-future-students-self'),
        loadOneOnOneMaps(),
      ]);
      let d = null;
      try { d = await r.json(); } catch {}
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _renderFutureStudents(Array.isArray(d?.students) ? d.students : []);
    } catch (e) {
      console.error('[mentor-onboarding] future:', e?.message || e);
      setError('futureStudentsWrap', 'Studenten ophalen mislukt: ' + (e?.message || e));
    }
  }

  // ── Meldingen (mentor self-only) ──────────────────────────────────────
  function _unreadAdminBadgeForOnb(onbId) {
    if (!onbId) return '';
    const n = _unreadByOnb.get(onbId) || 0;
    if (n <= 0) return '';
    return ' <span class="badge" style="background:#dc2626;color:#fff;padding:1px 7px;border-radius:999px;font-size:10.5px;font-weight:700" title="Ongelezen update van management">●</span>';
  }
  function _wireNotificationsPanel() {
    const btn   = document.getElementById('msNotifBtn');
    const panel = document.getElementById('msNotifPanel');
    const all   = document.getElementById('msNotifMarkAll');
    if (btn && panel) {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        panel.hidden = !panel.hidden;
      });
      document.addEventListener('click', (ev) => {
        if (panel.hidden) return;
        if (ev.target === btn || btn.contains(ev.target) || panel.contains(ev.target)) return;
        panel.hidden = true;
      });
    }
    if (all) all.addEventListener('click', () => _markAllRead());
  }
  async function loadNotifications() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-notifications-list');
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      _notifications = Array.isArray(d?.notifications) ? d.notifications : [];
      _unreadByOnb.clear();
      for (const n of _notifications) {
        if (n.read_at != null) continue;
        if (n.kind !== 'admin_note') continue;
        if (n.onboarding_id) {
          _unreadByOnb.set(n.onboarding_id, (_unreadByOnb.get(n.onboarding_id) || 0) + 1);
        }
      }
      _renderNotifications(Number(d?.unread_count) || 0);
      try { _rerenderFutureList(); } catch {}
    } catch (e) {
      console.warn('[mentor-onboarding] notifications:', e?.message || e);
    }
  }
  function _renderNotifications(unreadCount) {
    const cntEl = document.getElementById('msNotifCount');
    const list  = document.getElementById('msNotifList');
    if (cntEl) {
      if (unreadCount > 0) { cntEl.textContent = String(unreadCount); cntEl.style.display = ''; }
      else                 { cntEl.style.display = 'none'; }
    }
    if (!list) return;
    if (_notifications.length === 0) {
      list.innerHTML = '<div style="padding:14px;color:var(--text-faint);font-size:12.5px;text-align:center">Geen meldingen.</div>';
      return;
    }
    list.innerHTML = _notifications.map((n) => {
      const unread = (n.read_at == null);
      const bg = unread ? 'background:rgba(13,148,136,0.06)' : '';
      const ago = n.created_at ? esc(_shortDateTime(n.created_at)) : '';
      const stud = n.onboarding_customer_name ? '<div style="font-size:11.5px;color:var(--text-faint)">' + esc(n.onboarding_customer_name) + '</div>' : '';
      const body = n.body ? '<div style="font-size:12px;color:var(--text-dim);margin-top:2px;white-space:pre-wrap">' + esc(n.body) + '</div>' : '';
      const readBtn = unread
        ? '<button type="button" data-mark-read="' + esc(n.id) + '" style="background:transparent;border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:inherit">Gelezen</button>'
        : '';
      return '<div style="padding:10px 12px;border-bottom:1px solid var(--border);' + bg + '">'
        + '<div style="display:flex;align-items:start;justify-content:space-between;gap:8px">'
        +   '<div style="flex:1;min-width:0">'
        +     '<div style="font-size:12.5px;font-weight:600;color:var(--text)">' + esc(n.title || n.kind) + '</div>'
        +     stud
        +     body
        +     '<div style="font-size:11px;color:var(--text-faint);margin-top:4px">' + ago + '</div>'
        +   '</div>'
        +   readBtn
        + '</div>'
      + '</div>';
    }).join('');
    list.querySelectorAll('[data-mark-read]').forEach((btn) => {
      btn.addEventListener('click', () => _markRead(btn.getAttribute('data-mark-read')));
    });
  }
  async function _markRead(id) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (!id || typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-notification-mark-read', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      await loadNotifications();
    } catch (e) {
      console.warn('[mentor-onboarding] mark-read:', e?.message || e);
    }
  }
  async function _markAllRead() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    const ids = (_notifications || []).filter((n) => n.read_at == null).map((n) => n.id);
    if (ids.length === 0) return;
    try {
      const r = await apiFetch('/api/mentor-notification-mark-read', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids }),
      });
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      await loadNotifications();
    } catch (e) {
      console.warn('[mentor-onboarding] mark-all-read:', e?.message || e);
    }
  }

  // ── Init ───────────────────────────────────────────────────────────────
  async function init() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch {}
    if (window.AuthShared && typeof window.AuthShared.requireAuth === 'function') {
      const profile = await window.AuthShared.requireAuth();
      if (!profile) return;
    }
    // Page-gate (defense-in-depth, geen redirect — voorkomt loop).
    try {
      if (window.RBAC?.ensurePermissionsLoaded) {
        await window.RBAC.ensurePermissionsLoaded();
        if (!window.RBAC.canSync || !window.RBAC.canSync('mentor.module.access')) {
          const app = document.querySelector('.app');
          if (app) app.innerHTML =
            '<div style="max-width:480px;margin:48px auto;text-align:center;padding:32px;border:1px solid var(--border);border-radius:14px;background:var(--bg-elev)">'
            + '<h2 style="margin:0 0 10px;font-size:18px;color:var(--text)">Geen toegang tot Onboarding</h2>'
            + '<p style="margin:0;color:var(--text-dim);font-size:14px">Je account heeft hier momenteel geen rechten voor. Neem contact op met een beheerder.</p>'
            + '</div>';
          return;
        }
      }
    } catch (e) { /* fail-open */ }

    // Filter-chips wiring
    document.querySelectorAll('#moFilterRow [data-mo-filt]').forEach((btn) => {
      btn.addEventListener('click', () => {
        _filter = btn.getAttribute('data-mo-filt') || 'all';
        document.querySelectorAll('#moFilterRow [data-mo-filt]').forEach((b) => {
          b.classList.toggle('active', b === btn);
        });
        _rerenderFutureList();
      });
    });

    _wireNotificationsPanel();
    loadNotifications();
    loadFutureStudents();
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
