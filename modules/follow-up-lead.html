<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Detail — Agency Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/agent-shared.css">
  <script src="shared/supabase-client.js"></script>
  <script src="shared/agent-shared.js"></script>
  <script src="shared/theme-shared.js"></script>
  <style>
    .main-content { margin-left: var(--sidebar-w, 220px); min-height: 100vh; padding: 28px 28px 64px; max-width: 1200px; position: relative; z-index: 1; }
    .ld-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-size: 14px;
      text-decoration: none;
      margin-bottom: 20px;
      transition: color 0.15s;
    }
    .ld-back:hover { color: var(--text-primary); }
    .ld-lead-header {
      margin-bottom: 28px;
    }
    .ld-lead-name {
      font-size: 26px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 8px;
    }
    .ld-lead-meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .ld-lead-meta a {
      color: inherit;
      text-decoration: none;
    }
    .ld-lead-meta a:hover { color: var(--text-primary); }
    .ld-status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ld-status-scheduled { background: var(--color-info); color: var(--text-inverse); }
    .ld-status-in_progress { background: var(--color-warning); color: var(--text-inverse); }
    .ld-status-completed { background: var(--color-success); color: var(--text-inverse); }
    .ld-status-no_show { background: var(--color-danger); color: var(--text-inverse); }
    .ld-status-cancelled { background: var(--color-neutral); color: var(--text-inverse); }
    .ld-tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 28px;
    }
    .ld-tab {
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .ld-tab:hover { color: var(--text-primary); }
    .ld-tab.active {
      color: var(--text-primary);
      border-bottom-color: var(--brand-primary);
    }
    .ld-tab-content { display: none; }
    .ld-tab-content.active { display: block; }
    .wa-day-header { text-align:center; font-size:12px; color:var(--text-secondary); margin:16px 0 8px; text-transform:uppercase; letter-spacing:0.5px; }
    .wa-msg-row { display:flex; flex-direction:column; margin-bottom:10px; }
    .wa-msg-row-inbound { align-items:flex-start; }
    .wa-msg-row-outbound { align-items:flex-end; }
    .wa-msg { max-width:75%; padding:8px 12px; border-radius:12px; font-size:14px; line-height:1.4; word-wrap:break-word; }
    .wa-msg-inbound { background:var(--surface-2); color:var(--text-primary); border-bottom-left-radius:4px; }
    .wa-msg-outbound { background:var(--brand-primary); color:var(--text-inverse); border-bottom-right-radius:4px; }
    .wa-msg-meta { font-size:11px; color:var(--text-secondary); margin-top:2px; padding:0 4px; }
    .wa-channel-badge { display:inline-block; padding:1px 6px; border-radius:3px; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; margin-left:6px; background:var(--surface-card-hover); color:var(--text-secondary); }
    .ld-card {
      background: var(--surface-2);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .ld-card-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .ld-row {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 8px 16px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .ld-row-label {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .ld-row-value {
      color: var(--text-primary);
      word-break: break-word;
    }
    .ld-history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 14px;
    }
    .ld-history-item:last-child { border-bottom: none; }
    .ld-history-date { color: var(--text-secondary); font-size: 13px; }
    .ld-history-link {
      color: var(--color-info-text);
      text-decoration: none;
      font-size: 13px;
    }
    .ld-history-link:hover { text-decoration: underline; }
    .ld-empty {
      padding: 32px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }
    .ld-loading {
      padding: 48px;
      text-align: center;
      color: var(--text-secondary);
    }
    .ld-error {
      padding: 24px;
      background: var(--color-danger-soft);
      border: 1px solid var(--color-danger);
      border-radius: 8px;
      color: var(--color-danger-text);
      font-size: 14px;
    }
    .ld-bezwaar-tag {
      display: inline-block;
      padding: 3px 9px;
      background: var(--surface-card-hover);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-secondary);
      margin: 2px 4px 2px 0;
    }
    .ld-warmte-bar {
      height: 6px;
      background: var(--surface-2);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .ld-warmte-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-info) 0%, var(--color-success) 100%);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .ld-placeholder {
      padding: 40px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      border: 1px dashed var(--border-subtle);
      border-radius: 8px;
    }
  </style>
</head>

  <script>
    const ALLOWED_ROLES = ['sales', 'manager', 'admin', 'super_admin'];
    let whatsappLoaded = false;

    const OUTCOME_LABELS = {
      klant_geworden: 'Klant geworden',
      geen_klant: 'Geen klant',
      no_show: 'No-show',
    };

    const VOLGENDE_ACTIE_LABELS = {
      bellen: 'Bellen',
      email: 'E-mail sturen',
      event: 'Event uitnodigen',
      sluiten: 'Dossier sluiten',
      niet_meer_opvolgen: 'Niet meer opvolgen',
    };

    const BEZWAAR_LABELS = {
      te_duur: 'Te duur',
      partner_overleg: 'Partner overleg',
      angst_voor_verliezen: 'Angst voor verliezen',
      geen_tijd: 'Geen tijd',
      wil_nadenken: 'Wil nadenken',
      al_bij_iemand_anders: 'Al bij iemand anders',
      geen_vertrouwen: 'Geen vertrouwen',
      slechte_ervaringen: 'Slechte ervaringen',
      niet_relevant: 'Niet relevant',
      technisch_te_complex: 'Technisch te complex',
      overig: 'Overig',
    };

    function statusClass(s) {
      const map = { scheduled: 'scheduled', in_progress: 'in_progress', completed: 'completed', no_show: 'no_show', cancelled: 'cancelled' };
      return 'ld-status ld-status-' + (map[s] || 'scheduled');
    }

    function statusLabel(s) {
      const map = { scheduled: 'Gepland', in_progress: 'Bezig', completed: 'Afgerond', no_show: 'No-show', cancelled: 'Geannuleerd' };
      return map[s] || s;
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function fmtDateShort(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    }

    function renderCallsTab(appt, history) {
      const historyHtml = history.length === 0
        ? '<div class="ld-empty">Geen eerdere calls gevonden.</div>'
        : history.map(h => `
            <div class="ld-history-item">
              <div>
                <span class="${statusClass(h.status)}">${statusLabel(h.status)}</span>
                <span class="ld-history-date" style="margin-left:10px;">${fmtDate(h.scheduled_at)}</span>
                ${h.duration_minutes ? `<span class="ld-history-date"> · ${h.duration_minutes} min</span>` : ''}
              </div>
              <a class="ld-history-link" href="follow-up-lead.html?id=${h.id}">Bekijk →</a>
            </div>`).join('');

      return `
        <div class="ld-card">
          <div class="ld-card-title">Deze call</div>
          <div class="ld-row"><span class="ld-row-label">Datum & tijd</span><span class="ld-row-value">${fmtDate(appt.scheduled_at)}</span></div>
          <div class="ld-row"><span class="ld-row-label">Duur</span><span class="ld-row-value">${appt.duration_minutes ? appt.duration_minutes + ' min' : '—'}</span></div>
          <div class="ld-row"><span class="ld-row-label">Status</span><span class="ld-row-value"><span class="${statusClass(appt.status)}">${statusLabel(appt.status)}</span></span></div>
          ${appt.snelle_notitie ? `<div class="ld-row"><span class="ld-row-label">Snelle notitie</span><span class="ld-row-value">${appt.snelle_notitie}</span></div>` : ''}
          ${appt.zoom_meeting_id ? `<div class="ld-row"><span class="ld-row-label">Zoom meeting</span><span class="ld-row-value" style="font-family:monospace;font-size:12px;">${appt.zoom_meeting_id}</span></div>` : ''}
        </div>
        ${appt.requires_screenshot ? `
        <div class="ld-card" style="border-color: ${appt.screenshot_url ? 'rgba(34,197,94,0.3)' : 'rgba(234,179,8,0.3)'};">
          <div class="ld-card-title" style="color: ${appt.screenshot_url ? '#86efac' : '#fde047'};">📸 Screenshot verificatie</div>
          ${appt.screenshot_url ? `
            <div style="font-size: 13px; color: #86efac;">✓ Screenshot ingediend</div>
          ` : `
            <div style="font-size: 13px; color: var(--text-secondary); margin-bottom: 10px;">Steekproef: upload een screenshot van je verzonden voicememo of de afgeronde call.</div>
            <input type="file" id="screenshot-file-input" accept="image/png,image/jpeg,image/webp,image/heic,image/heif" style="display:none;">
            <button id="screenshot-upload-btn" class="fu-voicememo-button">Screenshot uploaden</button>
            <div id="screenshot-result" style="margin-top:10px;font-size:13px;"></div>
          `}
        </div>
        ` : ''}
        <div class="ld-card">
          <div class="ld-card-title">Eerdere calls (${history.length})</div>
          ${historyHtml}
        </div>`;
    }

    function renderOutcomeTab(outcome) {
      if (!outcome) {
        return '<div class="ld-empty">Nog geen outcome ingevuld voor deze call.</div>';
      }
      const warmteHtml = outcome.warmte_score
        ? `<div class="ld-warmte-bar"><div class="ld-warmte-fill" style="width:${outcome.warmte_score * 10}%"></div></div><div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">${outcome.warmte_score}/10</div>`
        : '—';
      const bezwarenHtml = (outcome.bezwaren && outcome.bezwaren.length)
        ? outcome.bezwaren.map(b => `<span class="ld-bezwaar-tag">${BEZWAAR_LABELS[b] || b}</span>`).join('')
        : '<span style="color:var(--text-secondary);font-size:13px;">Geen bezwaren genoteerd</span>';

      return `
        <div class="ld-card">
          <div class="ld-card-title">Outcome</div>
          <div class="ld-row"><span class="ld-row-label">Resultaat</span><span class="ld-row-value">${OUTCOME_LABELS[outcome.outcome] || outcome.outcome}</span></div>
          <div class="ld-row"><span class="ld-row-label">Ingevuld op</span><span class="ld-row-value">${fmtDate(outcome.ingevuld_at)}</span></div>
          ${outcome.volgende_actie ? `<div class="ld-row"><span class="ld-row-label">Volgende actie</span><span class="ld-row-value">${VOLGENDE_ACTIE_LABELS[outcome.volgende_actie] || outcome.volgende_actie}</span></div>` : ''}
          ${outcome.terugkom_datum ? `<div class="ld-row"><span class="ld-row-label">Terugkomen op</span><span class="ld-row-value">${fmtDateShort(outcome.terugkom_datum)}</span></div>` : ''}
          <div class="ld-row"><span class="ld-row-label">Warmte score</span><span class="ld-row-value">${warmteHtml}</span></div>
          <div class="ld-row"><span class="ld-row-label">Bezwaren</span><span class="ld-row-value">${bezwarenHtml}</span></div>
          ${outcome.notitie ? `<div class="ld-row"><span class="ld-row-label">Notitie</span><span class="ld-row-value" style="white-space:pre-wrap;">${outcome.notitie}</span></div>` : ''}
        </div>`;
    }

    function renderLeadDetail(appt, outcome, history) {
      const root = document.getElementById('ld-root');

      root.innerHTML = `
        <div class="ld-lead-header">
          <h1 class="ld-lead-name">${appt.lead_name || 'Onbekende lead'}</h1>
          <div class="ld-lead-meta">
            ${appt.lead_email ? `<span>✉ <a href="mailto:${appt.lead_email}">${appt.lead_email}</a></span>` : ''}
            ${appt.lead_phone ? `<span>📞 <a href="tel:${appt.lead_phone}">${appt.lead_phone}</a></span>` : ''}
            <span class="${statusClass(appt.status)}">${statusLabel(appt.status)}</span>
          </div>
        </div>

        <div class="ld-tabs">
          <button class="ld-tab active" data-tab="calls">Calls</button>
          <button class="ld-tab" data-tab="whatsapp">WhatsApp</button>
          <button class="ld-tab" data-tab="outcome">Outcome</button>
          <button class="ld-tab" data-tab="notities">Notities</button>
        </div>

        <div id="tab-calls" class="ld-tab-content active">${renderCallsTab(appt, history)}</div>
        <div id="tab-outcome" class="ld-tab-content">${renderOutcomeTab(outcome)}</div>
        <div id="tab-whatsapp" class="ld-tab-content">
          <div id="whatsapp-messages-container"><div class="ld-loading">Berichten laden…</div></div>
        </div>
        <div id="tab-notities" class="ld-tab-content">
          <div class="ld-placeholder">Notities — binnenkort beschikbaar.</div>
        </div>`;

      root.querySelectorAll('.ld-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          root.querySelectorAll('.ld-tab').forEach(t => t.classList.remove('active'));
          root.querySelectorAll('.ld-tab-content').forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          root.querySelector('#tab-' + btn.dataset.tab).classList.add('active');

          if (btn.dataset.tab === 'whatsapp' && !whatsappLoaded) {
            loadWhatsAppMessages(appt.lead_ghl_contact_id);
          }
        });
      });

      const fileInput = root.querySelector('#screenshot-file-input');
      const uploadBtn = root.querySelector('#screenshot-upload-btn');
      const resultEl = root.querySelector('#screenshot-result');

      if (uploadBtn && fileInput) {
        uploadBtn.addEventListener('click', () => fileInput.click());
        let uploadInProgress = false;
        fileInput.addEventListener('change', async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          if (uploadInProgress) {
            console.log('[follow-up] upload already in progress, skipping duplicate');
            return;
          }
          uploadInProgress = true;

          uploadBtn.disabled = true;
          uploadBtn.textContent = 'Uploaden…';
          resultEl.textContent = '';

          try {
            const { data: { user } } = await window.supabase.auth.getUser();
            if (!user) throw new Error('Niet ingelogd');

            const ext = (file.name.split('.').pop() || 'png').toLowerCase();
            const path = `${user.id}/${appt.id}/${Date.now()}.${ext}`;

            const { error: uploadErr } = await window.supabase.storage
              .from('follow-up-screenshots')
              .upload(path, file, { contentType: file.type, upsert: false });

            if (uploadErr) throw new Error('Upload mislukt: ' + uploadErr.message);

            uploadBtn.textContent = 'Beoordelen…';

            const token = await window.AuthShared.getAccessToken();
            const reviewRes = await fetch('/api/follow-up-screenshot-review', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify({ appointment_id: appt.id, storage_path: path }),
            });

            if (!reviewRes.ok) {
              const err = await reviewRes.json().catch(() => ({}));
              throw new Error(err.error || `HTTP ${reviewRes.status}`);
            }

            const reviewData = await reviewRes.json();
            const colors = { ok: '#86efac', suspicious: '#fde047', missing: '#fca5a5' };
            const labels = { ok: '✓ Goedgekeurd', suspicious: '⚠ Verdacht — admin review', missing: '✗ Ongeldig' };
            resultEl.innerHTML = `
              <div style="color:${colors[reviewData.result] || '#fff'};">${labels[reviewData.result] || reviewData.result}</div>
              <div style="color:var(--text-secondary);margin-top:4px;font-size:12px;">${reviewData.reasoning || ''}</div>`;
            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Geüpload';
            uploadBtn.style.opacity = '0.5';
            uploadBtn.style.cursor = 'default';
            fileInput.value = '';
          } catch (err) {
            resultEl.textContent = 'Fout: ' + err.message;
            resultEl.style.color = '#fca5a5';
            uploadBtn.disabled = false;
            uploadBtn.textContent = 'Opnieuw proberen';
            uploadInProgress = false;
          }
        });
      }
    }

    async function loadWhatsAppMessages(contactId) {
      if (!contactId) {
        document.getElementById('whatsapp-messages-container').innerHTML = '<div class="ld-empty">Geen contact-ID beschikbaar.</div>';
        return;
      }
      whatsappLoaded = true;
      const container = document.getElementById('whatsapp-messages-container');
      if (!container) return;

      try {
        const token = await window.AuthShared.getAccessToken();
        const res = await fetch(`/api/follow-up-messages?contact_id=${encodeURIComponent(contactId)}`, {
          headers: { Authorization: 'Bearer ' + token },
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `HTTP ${res.status}`);
        }
        const responseData = await res.json();
        renderWhatsApp(container, responseData.messages || []);
      } catch (err) {
        container.innerHTML = `<div class="ld-empty" style="color:#fca5a5;">Fout: ${err.message}</div>`;
        whatsappLoaded = false;
      }
    }

    function renderWhatsApp(container, messages) {
      if (messages.length === 0) {
        container.innerHTML = '<div class="ld-empty">Nog geen berichten in conversatie.</div>';
        return;
      }

      const sorted = [...messages].sort((a, b) => new Date(a.sent_at) - new Date(b.sent_at));
      let html = '<div style="display:flex;flex-direction:column;padding:8px 0;">';
      let lastDate = null;

      for (const msg of sorted) {
        const dt = new Date(msg.sent_at);
        const dateKey = dt.toDateString();

        if (dateKey !== lastDate) {
          html += `<div class="wa-day-header">${dt.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' })}</div>`;
          lastDate = dateKey;
        }

        const timeStr = dt.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
        const bodyText = (msg.body || '(geen tekst)').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

        html += `
          <div class="wa-msg-row wa-msg-row-${msg.direction}">
            <div class="wa-msg wa-msg-${msg.direction}">${bodyText}</div>
            <div class="wa-msg-meta">${timeStr}<span class="wa-channel-badge">${msg.channel}</span></div>
          </div>`;
      }

      html += '</div>';
      container.innerHTML = html;
    }

    async function init() {
      await window._authSharedReady;
      const profile = await window.AuthShared.requireAuth(ALLOWED_ROLES);
      window.AgentShared?.renderUserSection(profile);

      const params = new URLSearchParams(location.search);
      const id = params.get('id');
      if (!id) {
        document.getElementById('ld-root').innerHTML = '<div class="ld-error">Geen appointment ID opgegeven in de URL.</div>';
        return;
      }

      const token = await window.AuthShared.getAccessToken();
      const res = await fetch(`/api/follow-up-appointment-detail?id=${encodeURIComponent(id)}`, {
        headers: { Authorization: 'Bearer ' + token },
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        document.getElementById('ld-root').innerHTML = `<div class="ld-error">Fout: ${err.error || res.statusText}</div>`;
        return;
      }

      const { appointment, outcome, lead_history } = await res.json();
      document.title = (appointment.lead_name || 'Lead') + ' — Agency Command Center';
      renderLeadDetail(appointment, outcome, lead_history);
    }

    init();
  </script>
</body>
</html>
