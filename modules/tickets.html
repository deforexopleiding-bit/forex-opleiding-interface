<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tickets · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/modules/shared/agent-shared.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    /* Page-header */
    .page-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:18px; }
    .page-titlewrap { flex:1; }
    .page-title { font-size:22px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:10px; }
    .page-sub { font-size:12px; color:var(--text-faint); margin-top:3px; }
    .btn-primary { background:var(--brand-primary); color:#fff; border:none; padding:8px 14px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; display:inline-flex; align-items:center; gap:6px; }
    .btn-primary:hover { background:var(--brand-primary-hover); }
    .btn-secondary { background:transparent; color:var(--text-dim); border:1px solid var(--border); padding:8px 14px; border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }
    .btn-secondary:hover { background:var(--bg-elev-2); color:var(--text); }

    /* Tabs */
    .tabs-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:14px; }
    .tab-btn { padding:10px 16px; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text-faint); font-size:13px; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; transition:color .15s, border-color .15s; }
    .tab-btn:hover:not(.active) { color:var(--text); }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom-color:var(--brand-primary); }
    .tab-count { background:var(--bg); color:var(--text-faint); padding:1px 7px; border-radius:10px; font-size:11px; font-weight:600; min-width:18px; text-align:center; }
    .tab-btn.active .tab-count { background:var(--brand-primary); color:#fff; }

    /* Filter-row */
    .filter-row { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:16px; }
    .chip-group { display:flex; gap:6px; }
    .chip { padding:5px 11px; background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; font-size:12px; cursor:pointer; color:var(--text-dim); font-family:inherit; transition:all .15s; }
    .chip:hover { background:var(--bg-elev-2); color:var(--text); }
    .chip.active { background:var(--brand-primary-soft); border-color:var(--brand-primary); color:var(--brand-primary); font-weight:500; }
    .module-select { padding:6px 10px; background:var(--bg); border:1px solid var(--border); border-radius:8px; color:var(--text); font-size:12px; font-family:inherit; min-width:140px; }
    .module-select:focus { outline:none; border-color:var(--brand-primary); }

    /* Ticket-cards */
    .ticket-list { display:flex; flex-direction:column; gap:10px; }
    .ticket-card {
      background:var(--bg-elev); border:1px solid var(--border); border-radius:10px;
      padding:14px 16px; cursor:pointer; transition:border-color .15s, transform .15s;
      text-decoration:none; color:inherit; display:block;
    }
    .ticket-card:hover { border-color:var(--border-strong); transform:translateY(-1px); }
    .ticket-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:6px; }
    .ticket-title { font-size:14px; font-weight:600; line-height:1.3; flex:1; }
    .ticket-badges { display:flex; gap:6px; flex-shrink:0; }
    .ticket-meta { font-size:11px; color:var(--text-faint); display:flex; flex-wrap:wrap; gap:12px; }
    .ticket-meta-item { display:inline-flex; align-items:center; gap:4px; }

    /* Badges (theme-aware) */
    .badge { font-size:10px; font-weight:600; padding:2px 7px; border-radius:6px; text-transform:uppercase; letter-spacing:.3px; }
    .badge-type-bug      { background:var(--color-danger-soft); color:var(--color-danger-text); }
    .badge-type-feature  { background:var(--color-info-soft); color:var(--color-info-text); }
    .badge-type-question { background:var(--color-success-soft); color:var(--color-success-text); }
    .badge-priority-laag   { background:var(--color-neutral-soft); color:var(--color-neutral-text); }
    .badge-priority-middel { background:var(--color-warning-soft); color:var(--color-warning-text); }
    .badge-priority-hoog   { background:var(--color-danger-soft); color:var(--color-danger-text); }

    /* Lege state */
    .empty-state { padding:40px 20px; text-align:center; color:var(--text-faint); font-size:13px; }
    .empty-state .empty-icon { font-size:32px; margin-bottom:10px; opacity:.6; }

    /* Loading */
    .loading-state { padding:40px 20px; text-align:center; color:var(--text-faint); font-size:13px; }

    /* Forbidden */
    .forbidden-card { background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; padding:32px 28px; max-width:480px; margin:40px auto; text-align:center; }
    .forbidden-card h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
    .forbidden-card p { font-size:13px; color:var(--text-dim); margin-bottom:16px; }
    .forbidden-card a { color:var(--brand-secondary-light); text-decoration:none; font-size:13px; font-weight:500; }
    .forbidden-card a:hover { text-decoration:underline; }

    /* Modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); padding:20px; }
    .modal-overlay.hidden { display:none!important; }
    .modal-card { background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; width:100%; max-width:560px; max-height:calc(100vh - 40px); display:flex; flex-direction:column; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
    .modal-title { font-size:15px; font-weight:600; }
    .modal-close { background:transparent; border:none; color:var(--text-faint); font-size:18px; cursor:pointer; padding:4px; line-height:1; }
    .modal-close:hover { color:var(--text); }
    .modal-body { padding:20px; overflow-y:auto; }
    .modal-footer { display:flex; justify-content:flex-end; gap:8px; padding:14px 20px; border-top:1px solid var(--border); }
    .modal-banner { padding:10px 12px; margin-bottom:12px; background:#EF444415; border:1px solid #EF4444; border-radius:8px; color:#EF4444; font-size:13px; display:none; }
    .modal-banner.visible { display:block; }

    /* Form-fields */
    .form-field { display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
    .form-field label { font-size:12px; font-weight:500; color:var(--text-faint); }
    .form-field label .req { color:#EF4444; }
    .form-field input, .form-field textarea, .form-field select {
      padding:8px 10px; background:var(--bg); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-size:13px; font-family:inherit;
    }
    .form-field input:focus, .form-field textarea:focus, .form-field select:focus { outline:none; border-color:var(--brand-primary); }
    .form-field textarea { resize:vertical; min-height:80px; }
    .form-field.has-error input, .form-field.has-error textarea, .form-field.has-error select { border-color:#EF4444; }
    .field-error { font-size:11px; color:#EF4444; margin-top:2px; min-height:14px; }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>

<div class="main">
  <div class="main-inner" id="page-content">
    <!-- Wordt door init() gevuld na auth + RBAC check -->
  </div>
</div>

<!-- Create-modal -->
<div class="modal-overlay hidden" id="ticketCreateModal" role="dialog" aria-modal="true" aria-labelledby="ticketCreateTitle">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title" id="ticketCreateTitle">Nieuw ticket</div>
      <button class="modal-close" type="button" onclick="closeCreateModal()" aria-label="Sluiten">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="modal-banner" id="ticketCreateBanner"></div>
      <form id="ticketCreateForm" onsubmit="event.preventDefault(); submitCreate();">
        <div class="form-field">
          <label for="tcf-title">Titel <span class="req">*</span></label>
          <input type="text" name="title" id="tcf-title" maxlength="200" autocomplete="off"/>
          <div class="field-error" id="tcf-err-title"></div>
        </div>
        <div class="form-field">
          <label for="tcf-description">Beschrijving</label>
          <textarea name="description" id="tcf-description" rows="4" placeholder="Stappen om te reproduceren, verwacht gedrag, etc."></textarea>
          <div class="field-error" id="tcf-err-description"></div>
        </div>
        <div class="form-hint" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);margin:-4px 0 12px;padding:8px 10px;background:var(--bg-elev-2);border-radius:6px;border:1px solid var(--border)">
          <i class="ti ti-info-circle" style="font-size:14px;color:var(--accent-cyan)"></i>
          <span>Nadat je de ticket hebt aangemaakt krijg je de mogelijkheid om afbeeldingen en/of video's toe te voegen.</span>
        </div>
        <div class="form-row-2">
          <div class="form-field">
            <label for="tcf-type">Type <span class="req">*</span></label>
            <select name="type" id="tcf-type">
              <option value="bug">Bug</option>
              <option value="feature">Feature</option>
              <option value="question">Vraag</option>
            </select>
            <div class="field-error" id="tcf-err-type"></div>
          </div>
          <div class="form-field">
            <label for="tcf-priority">Prioriteit</label>
            <select name="priority" id="tcf-priority">
              <option value="laag">Laag</option>
              <option value="middel" selected>Middel</option>
              <option value="hoog">Hoog</option>
            </select>
            <div class="field-error" id="tcf-err-priority"></div>
          </div>
        </div>
        <div class="form-field">
          <label for="tcf-module">Module</label>
          <select name="module" id="tcf-module">
            <option value="">— Geen / niet gekoppeld —</option>
            <option value="AI Agents">AI Agents</option>
            <option value="Admin">Admin</option>
            <option value="Agent center">Agent center</option>
            <option value="Alle studenten">Alle studenten</option>
            <option value="Appointment setting">Appointment setting</option>
            <option value="Control Center">Control Center</option>
            <option value="Dashboard">Dashboard</option>
            <option value="E-mail">E-mail</option>
            <option value="Events">Events</option>
            <option value="Finance">Finance</option>
            <option value="Follow-up">Follow-up</option>
            <option value="Kennisbank">Kennisbank</option>
            <option value="Klanten">Klanten</option>
            <option value="Mentoren beheer">Mentoren beheer</option>
            <option value="Onboarding">Onboarding</option>
            <option value="Sales">Sales</option>
            <option value="Studenten">Studenten</option>
            <option value="Takenbeheer">Takenbeheer</option>
            <option value="Tickets">Tickets</option>
            <option value="Vergaderruimte">Vergaderruimte</option>
            <option value="Anders">Anders</option>
          </select>
          <div class="field-error" id="tcf-err-module"></div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" type="button" onclick="closeCreateModal()">Annuleren</button>
      <button class="btn-primary" type="button" id="ticketCreateSubmit" onclick="submitCreate()">Opslaan</button>
    </div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>

<script>
// ── Module-state ─────────────────────────────────────────────────────────────
const STATUS_LABELS = {
  open: 'Open', in_progress: 'In behandeling', resolved: 'Opgelost', closed: 'Gesloten',
};
const TYPE_LABELS = { bug: 'Bug', feature: 'Feature', question: 'Vraag' };
const VALID_TYPES = ['bug', 'feature', 'question'];
const VALID_STATUSES = ['open', 'in_progress', 'resolved', 'closed'];
const KNOWN_MODULES = ['AI Agents','Admin','Agent center','Alle studenten','Appointment setting','Control Center','Dashboard','E-mail','Events','Finance','Follow-up','Kennisbank','Klanten','Mentoren beheer','Onboarding','Sales','Studenten','Takenbeheer','Tickets','Vergaderruimte','Anders'];

const state = {
  status: 'open',     // actieve tab
  type: null,         // null = alle types
  module: null,       // null = alle modules
  tickets: [],
  counts: { open: 0, in_progress: 0, resolved: 0, closed: 0 },
};

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ── Render ───────────────────────────────────────────────────────────────────

function renderForbidden() {
  document.getElementById('page-content').innerHTML = `
    <div class="forbidden-card">
      <h2>Geen toegang</h2>
      <p>Je hebt geen rechten om de Tickets-module te bekijken.</p>
      <a href="/index.html">← Terug naar dashboard</a>
    </div>
  `;
}

function renderPage() {
  document.getElementById('page-content').innerHTML = `
    <div class="page-header">
      <div class="page-titlewrap">
        <div class="page-title"><i class="ti ti-ticket"></i> Tickets</div>
        <div class="page-sub">Bugs, vragen en feature-verzoeken</div>
      </div>
      <button class="btn-primary" type="button" onclick="openCreateModal()">
        <i class="ti ti-plus"></i> Nieuw ticket
      </button>
    </div>

    <div class="tabs-bar" id="ticketsTabsBar"></div>

    <div class="filter-row">
      <div class="chip-group" id="typeChips"></div>
      <select class="module-select" id="moduleSelect" onchange="onModuleChange(this.value)">
        <option value="">Alle modules</option>
        ${KNOWN_MODULES.map((m) => `<option value="${esc(m)}">${esc(m)}</option>`).join('')}
      </select>
    </div>

    <div id="ticketsList" class="ticket-list">
      <div class="loading-state">Laden…</div>
    </div>
  `;
  renderTabs();
  renderTypeChips();
  document.getElementById('moduleSelect').value = state.module || '';
}

function renderTabs() {
  const bar = document.getElementById('ticketsTabsBar');
  if (!bar) return;
  bar.innerHTML = VALID_STATUSES.map((s) => `
    <button class="tab-btn ${state.status === s ? 'active' : ''}" type="button" data-status="${s}" onclick="onTabClick('${s}')">
      ${esc(STATUS_LABELS[s])} <span class="tab-count">${state.counts[s] ?? 0}</span>
    </button>
  `).join('');
}

function renderTypeChips() {
  const wrap = document.getElementById('typeChips');
  if (!wrap) return;
  const chips = [{ value: null, label: 'Alle' }, ...VALID_TYPES.map((t) => ({ value: t, label: TYPE_LABELS[t] }))];
  wrap.innerHTML = chips.map((c) => `
    <button class="chip ${state.type === c.value ? 'active' : ''}" type="button" onclick="onTypeChange(${c.value === null ? 'null' : `'${c.value}'`})">
      ${esc(c.label)}
    </button>
  `).join('');
}

function renderList() {
  const list = document.getElementById('ticketsList');
  if (!list) return;
  if (state.tickets.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><i class="ti ti-mood-empty"></i></div>
        Geen tickets in deze status.
      </div>
    `;
    return;
  }
  list.innerHTML = state.tickets.map((t) => {
    const relCreated = window.AgentShared?.relTime?.(t.created_at) || '';
    const assignee = t.assigned_to_name ? esc(t.assigned_to_name) : '<em>Niet toegewezen</em>';
    const creator  = t.created_by_name  ? esc(t.created_by_name)  : 'Onbekend';
    return `
      <a class="ticket-card" href="/modules/tickets-detail.html?id=${encodeURIComponent(t.id)}">
        <div class="ticket-card-top">
          <div class="ticket-title">${esc(t.title)}</div>
          <div class="ticket-badges">
            <span class="badge badge-type-${t.type}">${esc(TYPE_LABELS[t.type] || t.type)}</span>
            <span class="badge badge-priority-${t.priority}">${esc(t.priority)}</span>
          </div>
        </div>
        <div class="ticket-meta">
          ${t.module ? `<span class="ticket-meta-item"><i class="ti ti-stack-2"></i> ${esc(t.module)}</span>` : ''}
          <span class="ticket-meta-item"><i class="ti ti-user"></i> ${assignee}</span>
          <span class="ticket-meta-item"><i class="ti ti-clock"></i> ${esc(relCreated)} door ${creator}</span>
        </div>
      </a>
    `;
  }).join('');
}

// ── Filter-events ────────────────────────────────────────────────────────────

function onTabClick(s) {
  if (!VALID_STATUSES.includes(s)) return;
  state.status = s;
  syncUrl();
  renderTabs();
  loadTickets();
}

function onTypeChange(value) {
  state.type = value;
  syncUrl();
  renderTypeChips();
  loadTickets();
}

function onModuleChange(value) {
  state.module = value || null;
  syncUrl();
  loadTickets();
}

function syncUrl() {
  const params = new URLSearchParams();
  if (state.status !== 'open')  params.set('status', state.status);
  if (state.type)                params.set('type', state.type);
  if (state.module)              params.set('module', state.module);
  const qs = params.toString();
  const newUrl = qs ? `?${qs}` : window.location.pathname;
  history.replaceState(null, '', newUrl);
}

function readUrlState() {
  const params = new URLSearchParams(window.location.search);
  const s = params.get('status');
  const t = params.get('type');
  const m = params.get('module');
  if (s && VALID_STATUSES.includes(s)) state.status = s;
  if (t && VALID_TYPES.includes(t))    state.type = t;
  if (m)                                state.module = m;
}

// ── Fetch ────────────────────────────────────────────────────────────────────

async function loadTickets() {
  const listEl = document.getElementById('ticketsList');
  if (listEl) listEl.innerHTML = '<div class="loading-state">Laden…</div>';
  try {
    const params = new URLSearchParams();
    params.set('status', state.status);
    if (state.type)   params.set('type', state.type);
    if (state.module) params.set('module', state.module);
    const res = await window.AgentShared.apiFetch(`/api/tickets?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    state.tickets = data.tickets || [];
    state.counts  = data.counts  || { open:0, in_progress:0, resolved:0, closed:0 };
    renderTabs();
    renderList();
  } catch (err) {
    console.error('[tickets] load error:', err);
    if (listEl) listEl.innerHTML = `<div class="empty-state">Kon tickets niet laden: ${esc(err.message || 'fout')}</div>`;
    window.AgentShared?.showToast?.('Tickets laden mislukt', 'error');
  }
}

// ── Create-modal ─────────────────────────────────────────────────────────────

function openCreateModal() {
  clearCreateErrors();
  document.getElementById('tcf-title').value = '';
  document.getElementById('tcf-description').value = '';
  document.getElementById('tcf-type').value = 'bug';
  document.getElementById('tcf-priority').value = 'middel';
  document.getElementById('tcf-module').value = state.module || '';
  document.getElementById('ticketCreateBanner').classList.remove('visible');
  document.getElementById('ticketCreateBanner').textContent = '';
  const btn = document.getElementById('ticketCreateSubmit');
  btn.disabled = false; btn.textContent = 'Opslaan';
  document.getElementById('ticketCreateModal').classList.remove('hidden');
  setTimeout(() => document.getElementById('tcf-title').focus(), 50);
}

function closeCreateModal() {
  document.getElementById('ticketCreateModal').classList.add('hidden');
}

function clearCreateErrors() {
  for (const f of ['title','description','type','priority','module']) {
    const input = document.querySelector(`#ticketCreateForm [name="${f}"]`);
    if (input) input.closest('.form-field').classList.remove('has-error');
    const err = document.getElementById(`tcf-err-${f}`);
    if (err) err.textContent = '';
  }
}

function setFieldError(field, msg) {
  const input = document.querySelector(`#ticketCreateForm [name="${field}"]`);
  if (input) input.closest('.form-field').classList.add('has-error');
  const err = document.getElementById(`tcf-err-${field}`);
  if (err) err.textContent = msg;
}

async function submitCreate() {
  clearCreateErrors();
  const banner = document.getElementById('ticketCreateBanner');
  banner.classList.remove('visible'); banner.textContent = '';

  const title       = document.getElementById('tcf-title').value.trim();
  const description = document.getElementById('tcf-description').value.trim();
  const type        = document.getElementById('tcf-type').value;
  const priority    = document.getElementById('tcf-priority').value;
  const moduleVal   = document.getElementById('tcf-module').value;

  if (title.length < 3) {
    setFieldError('title', 'Titel is verplicht (minimaal 3 tekens)');
    return;
  }
  if (!VALID_TYPES.includes(type)) {
    setFieldError('type', 'Kies een geldig type');
    return;
  }

  const btn = document.getElementById('ticketCreateSubmit');
  btn.disabled = true; btn.textContent = 'Opslaan…';

  try {
    const res = await window.AgentShared.apiFetch('/api/tickets', {
      method: 'POST',
      body: JSON.stringify({
        title, description: description || undefined,
        type, priority,
        module: moduleVal || undefined,
      }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      banner.textContent = err.error || `Aanmaken mislukt (HTTP ${res.status})`;
      banner.classList.add('visible');
      btn.disabled = false; btn.textContent = 'Opslaan';
      return;
    }
    // Direct doorsturen naar detail-pagina: user wil meteen attachments toevoegen.
    // Toast wordt op detail-pagina getoond via sessionStorage-flag.
    const data = await res.json().catch(() => ({}));
    const newId = data?.ticket?.id;
    closeCreateModal();
    if (newId) {
      try { sessionStorage.setItem('ticketCreatedFlash', '1'); } catch (e) { /* private mode → toast skip */ }
      window.location.href = '/modules/tickets-detail.html?id=' + encodeURIComponent(newId);
      return;
    }
    // Fallback als response geen id bevat (zou niet moeten): blijf op lijst.
    window.AgentShared?.showToast?.('Ticket aangemaakt', 'success');
    await loadTickets();
  } catch (err) {
    banner.textContent = 'Netwerkfout: ' + (err.message || 'onbekend');
    banner.classList.add('visible');
    btn.disabled = false; btn.textContent = 'Opslaan';
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  await window._authSharedReady;
  const profile = await window.AuthShared.requireAuth();
  if (!profile) return;
  if (window.AgentShared) await window.AgentShared.renderUserSection(profile);

  await window.RBAC.ensurePermissionsLoaded();
  if (!window.RBAC.canSync('tickets.module.access')) {
    renderForbidden();
    return;
  }

  readUrlState();
  renderPage();
  await loadTickets();
}

init();
</script>
<script src="/modules/shared/quick-task-button.js" data-module="Tickets" defer></script>
