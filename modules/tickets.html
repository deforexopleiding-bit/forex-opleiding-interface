<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tickets · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/modules/shared/agent-shared.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    /* Page-header conform klanten/follow-up patroon */
    .page-header { display:flex; align-items:flex-start; gap:16px; margin-bottom:18px; }
    .page-titlewrap { flex:1; }
    .page-title { font-size:22px; font-weight:700; letter-spacing:-.3px; display:flex; align-items:center; gap:10px; }
    .page-sub { font-size:12px; color:var(--text-faint); margin-top:3px; }

    /* Placeholder-kaart — gentle illustration + uitleg */
    .placeholder-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 28px;
      max-width: 560px;
      margin: 24px auto 0;
      text-align: center;
    }
    .placeholder-icon {
      width: 64px; height: 64px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: var(--brand-primary-soft);
      color: var(--brand-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }
    .placeholder-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .placeholder-body { font-size: 13px; color: var(--text-dim); line-height: 1.6; max-width: 420px; margin: 0 auto; }
    .placeholder-hint { font-size: 11px; color: var(--text-faint); margin-top: 16px; font-style: italic; }

    /* Forbidden-state */
    .forbidden-card {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      max-width: 480px;
      margin: 40px auto;
      text-align: center;
    }
    .forbidden-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .forbidden-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .forbidden-card a { color: var(--brand-secondary-light); text-decoration: none; font-size: 13px; font-weight: 500; }
    .forbidden-card a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>

<div class="main">
  <div class="main-inner" id="page-content">
    <!-- Wordt door init() gevuld na auth + RBAC check -->
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>

<script>
function renderForbidden() {
  document.getElementById('page-content').innerHTML = `
    <div class="forbidden-card">
      <h2>Geen toegang</h2>
      <p>Je hebt geen rechten om de Tickets-module te bekijken.</p>
      <a href="/index.html">← Terug naar dashboard</a>
    </div>
  `;
}

function renderPlaceholder() {
  document.getElementById('page-content').innerHTML = `
    <div class="page-header">
      <div class="page-titlewrap">
        <div class="page-title"><i class="ti ti-ticket"></i> Tickets</div>
        <div class="page-sub">Bugs, vragen en feature-verzoeken</div>
      </div>
    </div>

    <div class="placeholder-card">
      <div class="placeholder-icon"><i class="ti ti-ticket"></i></div>
      <div class="placeholder-title">Module komt eraan</div>
      <p class="placeholder-body">
        Hier kunnen straks bugs, vragen en feature-verzoeken worden ingediend
        en gevolgd — inclusief comments, screenshots en video-links.
      </p>
      <p class="placeholder-hint">Fase 2 voegt de lijst-, filter- en aanmaak-functionaliteit toe.</p>
    </div>
  `;
}

async function init() {
  await window._authSharedReady;
  const profile = await window.AuthShared.requireAuth();
  if (!profile) return;
  if (window.AgentShared) await window.AgentShared.renderUserSection(profile);

  await window.RBAC.ensurePermissionsLoaded();
  if (!window.RBAC.canSync('tickets.module.access')) {
    renderForbidden();
    return;
  }

  renderPlaceholder();
}

init();
</script>

</body>
</html>
