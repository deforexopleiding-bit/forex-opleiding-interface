              ${(window.RBAC?.canSync?.('events.event.delete') && ev.status !== 'archived') ? `
                <span class="ev-kebab-wrap">
                  <button class="sr-ibtn ev-kebab-toggle" data-id="${esc(ev.id)}" type="button" title="Acties"><i class="ti ti-dots"></i></button>
                  <div class="ev-kebab-menu" id="ev-kebab-${esc(ev.id)}">
                    <button class="ev-kebab-item" data-action="archive" data-id="${esc(ev.id)}" data-title="${esc(ev.title || '')}" type="button"><i class="ti ti-archive"></i> Archiveren</button>
                  </div>
                </span>
              ` : ''}
              <a class="sr-ibtn" href="${esc(href)}" title="Open detail"><i class="ti ti-arrow-right"></i></a>
            </td>
          </tr>
        `;
      }).join('')}</tbody>
    </table></div>
  `;

  // Klik-op-rij → detail
  wrap.querySelectorAll('tr[data-href]').forEach((tr) => {
    tr.addEventListener('click', (e) => {
      // Niet hijacken als gebruiker een link of knop in de rij raakt
      if (e.target.closest('a, button')) return;
      window.location.href = tr.dataset.href;
    });
  });

  // Duplicate-knop per rij
  wrap.querySelectorAll('.ev-dup-btn').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      duplicateEvent(btn.dataset.id);
    });
  });

  // Kebab-toggle per rij — fixed-positioning (zelfde patroon als PR #245).
  wrap.querySelectorAll('.ev-kebab-toggle').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id   = btn.dataset.id;
      const menu = document.getElementById('ev-kebab-' + id);
      if (!menu) return;
      // Sluit andere menu's
      document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => { if (m !== menu) m.classList.remove('show'); });
      const willShow = !menu.classList.contains('show');
      if (willShow) {
        // Eerst .show toevoegen zodat offsetWidth/offsetHeight meetbaar zijn.
        menu.classList.add('show');
        const r = btn.getBoundingClientRect();
        let left = r.right - menu.offsetWidth;
        if (left < 8) left = 8;
        let top = r.bottom + 4;
        if (top + menu.offsetHeight > window.innerHeight - 8) {
          top = r.top - menu.offsetHeight - 4;
        }
        menu.style.left = left + 'px';
        menu.style.top  = top  + 'px';
      } else {
        menu.classList.remove('show');
      }
    });
  });

  // Outside-click sluit alle menu's (one-shot na elke render — zelfde patroon
  // als events-detail.html).
  document.addEventListener('click', () => {
    document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
  }, { once: true });

  // Item-clicks per kebab
  wrap.querySelectorAll('.ev-kebab-item').forEach((item) => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = item.dataset.action;
      const id     = item.dataset.id;
      const title  = item.dataset.title || '';
      document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
      if (action === 'archive') return archiveEvent(id, title);
    });
  });
}

// Eenmalig: sluit fixed-positioned kebabs bij scroll (capture-phase voor
// scroll binnen de tabel-wrapper) of resize.
if (!window._evOverviewKebabGlobalWired) {
  const closeAll = () => {
    document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
  };
  window.addEventListener('scroll', closeAll, { capture: true, passive: true });
  window.addEventListener('resize', closeAll);
  window._evOverviewKebabGlobalWired = true;
}

async function archiveEvent(eventId, title) {
  if (!eventId) return;
  const t = title ? ` "${title}"` : '';
  if (!confirm(`Event${t} archiveren? Het wordt onzichtbaar voor klanten (Webflow unpublish) en uit de standaard-overzichten gefilterd. Aangemelde deelnemers + alle data blijven bewaard.`)) return;
  try {
    const res = await window.AgentShared.apiFetch('/api/events-update?id=' + encodeURIComponent(eventId), {
      method: 'PATCH',
      body  : JSON.stringify({ status: 'archived' }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || ('HTTP ' + res.status));
    window.AgentShared?.showToast?.('Event gearchiveerd', 'success');
    // Re-render zodat de rij weg is uit de huidige filter (tenzij 'Alle' actief).
    _evApplyStatusFilterView();
  } catch (e) {
    window.AgentShared?.showToast?.('Archiveren mislukt: ' + (e?.message || 'onbekende fout'), 'error');
  }
}

async function duplicateEvent(sourceEventId) {
  if (!sourceEventId) return;
  if (!confirm('Kopieer dit event als nieuw concept? Datum wordt 7 dagen verschoven; je kunt \'m daarna aanpassen.')) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/events-duplicate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_event_id: sourceEventId }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.event_id) throw new Error(j?.error || ('HTTP ' + r.status));
    window.AgentShared?.showToast?.('Concept aangemaakt — open om te bewerken', 'success');
    window.location.href = '/modules/events-detail.html?id=' + encodeURIComponent(j.event_id);
  } catch (e) {
    window.AgentShared?.showToast?.('Kopiëren mislukt: ' + (e?.message || e), 'error');
  }
}

async function loadNiveauOptions() {

    const data = await res.json();
    state.niveauOptions = data.options || [];

  }
}

async function loadEvents() {
  state.loading = true;
  renderList();
  try {
    const params = new URLSearchParams();
    if (state.status) params.set('status', state.status);
    if (state.niveau) params.set('niveau', state.niveau);
    if (state.search) params.set('q', state.search);
    params.set('limit', '100');
    const res = await window.AgentShared.apiFetch('/api/events-list?' + params.toString());
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    state.items = data.items || [];
  } catch (e) {
    console.error('[events] load error:', e);
    window.AgentShared?.showToast?.('Events laden mislukt: ' + e.message, 'error');
    state.items = [];
  } finally {
    state.loading = false;
    renderList();
  }
}

function debounce(fn, ms) {
  let t = null;
  return function (...args) {
    if (t) clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ── Fase 1: events-inbox (read-only) ─────────────────────────────────────────
// Hergebruikt /api/inbox-conversations-list met ?module=events. Filtert
// daar op de events-phone_number_id uit whatsapp_module_config. Geen
// reply-functionaliteit in deze fase; volledige thread-view + send
// volgt zodra Simone er is (Fase 2).
async function loadEventsInbox() {
  const list = document.getElementById('eventsInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=events&limit=100');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div></div>';
      return;
    }
    const j = await r.json();
    if (!j.configured) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-plug-connected-x"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Events-lijn nog niet geconfigureerd</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">' + esc(j.warning || 'Maak een rij aan in whatsapp_module_config met module=\'events\' en is_active=true.') + '</div>'
        + '</div>';
      return;
    }
    const items = Array.isArray(j.items) ? j.items : [];
    // Rode badge bij de Inbox-tab: aantal gesprekken dat een handmatig
    // antwoord nodig heeft = items met unread_count > 0. Zodra Simone of een
    // mens antwoordt, daalt deze waarde vanzelf bij de volgende refresh.
    _evUpdateInboxManualBadge(items);
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-inbox"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Nog geen events-conversaties</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Inbound op de events-WhatsApp-lijn verschijnt hier.</div>'
        + '</div>';
      return;
    }
    // STAP 6a: card-rijen i.p.v. tabel — past in de smalle linker-pane van de
    // twee-paneel-shell. Active-state op _evState.convId (huidige geopend).
    const activeId = _evState.convId || null;
    list.innerHTML = items.map((it) => {
      const preview     = (it.last_message_preview || '').slice(0, 80);
      const initialLbl  = (it.customer_name || it.display_name || it.phone_number || '?').trim();
      const initial     = (initialLbl.match(/[A-Za-z0-9]/) || ['?'])[0].toUpperCase();
      const nameLabel   = it.customer_name || it.display_name || it.phone_number || '(geen naam)';
      const subtitle    = it.customer_name && it.display_name && it.display_name !== it.customer_name
        ? it.display_name
        : (it.phone_number || '');
      const unreadHtml  = it.unread_count > 0
        ? `<span class="evx-conv-unread">${esc(String(it.unread_count))}</span>`
        : '';
      const timeShort   = it.last_message_at ? esc(fmtDate(it.last_message_at)) : '';
      const isActive    = activeId && it.id === activeId ? ' active' : '';
      // STAP 6b — 24u-dot: groen wanneer can_send_text uit
      // /api/inbox-conversations-list true, rood wanneer venster verlopen.
      // Geen extra berekening — endpoint heeft het al gedaan.
      const dotCls   = it.can_send_text ? 'open' : 'closed';
      const dotTitle = it.can_send_text ? '24h-venster open — vrij bericht toegestaan' : '24h-venster verlopen — alleen template';
      // Persistente aanmelding-koppeling: klein ticket-icoontje vóór de naam
      // zodat operator in één oogopslag ziet welke gesprekken een attendee
      // hebben (parallel aan de customer-koppeling die uit nameLabel blijkt).
      const attIcon = it.attendee_id
        ? `<i class="ti ti-ticket" title="Gekoppeld aan aanmelding${it.attendee_event_title ? ' · ' + it.attendee_event_title : ''}" style="color:#0a2f63;font-size:13px;margin-right:4px;flex-shrink:0"></i>`
        : '';
      return `
        <div class="evx-conv-row${isActive}" data-conv-id="${esc(it.id)}"
             data-phone="${esc(it.phone_number || '')}"
             data-display="${esc(it.display_name || '')}"
             data-customer="${esc(it.customer_name || '')}">
          <div class="evx-conv-avatar">${esc(initial)}</div>
          <div class="evx-conv-body">
            <div class="evx-conv-toprow">
              <div class="evx-conv-name">${attIcon}${esc(nameLabel)}</div>
              <div class="evx-conv-time">${timeShort}</div>
              <span class="evx-24h-dot ${dotCls}" title="${esc(dotTitle)}"></span>
            </div>
            <div class="evx-conv-preview">${esc(preview || subtitle || '—')}</div>
            ${unreadHtml ? `<div class="evx-conv-meta">${unreadHtml}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    // Rij-click → open conv (her-render markeert de nieuwe actieve rij).
    list.querySelectorAll('.evx-conv-row[data-conv-id]').forEach((row) => {
      row.addEventListener('click', () => openEventsConv({
        id:          row.dataset.convId,
        phone:       row.dataset.phone || '',
        displayName: row.dataset.display || '',
        customer:    row.dataset.customer || '',
      }));
    });
  } catch (e) {
    list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div></div>';
  }
}

// Rode badge bij de Events Inbox-tab. Telt het aantal events-conversaties
// dat een handmatig antwoord nodig heeft (unread_count > 0). Bron =
// /api/inbox-conversations-list?module=events. Zodra Simone of een mens
// antwoordt, daalt 'ie vanzelf bij de volgende refresh.
function _evUpdateInboxManualBadge(items) {
  const badge = document.getElementById('evInboxManualBadge');
  if (!badge) return;
  if (!Array.isArray(items)) { badge.style.display = 'none'; return; }
  let n = 0;
  for (const it of items) {
    if (Number(it && it.unread_count) > 0) n++;
  }
  if (n > 0) { badge.textContent = String(n); badge.style.display = ''; }
  else       { badge.style.display = 'none'; }
}

// Lichte refresh van alleen de badge — gebruikt voor de init-fetch + periodiek
// poll-interval zodat een operator op een andere tab de teller ziet stijgen.
async function _evRefreshInboxManualBadge() {
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=events&limit=100');
    if (!r.ok) return;
    const j = await r.json().catch(() => ({}));
    if (!j || j.configured === false) {
      const badge = document.getElementById('evInboxManualBadge');
      if (badge) badge.style.display = 'none';
      return;
    }
    _evUpdateInboxManualBadge(Array.isArray(j.items) ? j.items : []);
  } catch (_e) {
    // Stille no-op — badge mag nooit de hele Events-module breken.
  }
}

// Eénmalige periodieke refresh-installatie (idempotent). 60s — voldoende
// snel om binnen 1 minuut te zien dat er een nieuw gesprek wacht, traag
// genoeg om server niet te overspoelen.
function _evInstallInboxManualBadgeInterval() {
  if (window._evInboxManualBadgeTimer) return;
  window._evInboxManualBadgeTimer = setInterval(_evRefreshInboxManualBadge, 60000);
  window.addEventListener('beforeunload', () => {
    if (window._evInboxManualBadgeTimer) {
      clearInterval(window._evInboxManualBadgeTimer);
      window._evInboxManualBadgeTimer = null;
    }
  });
}

// ── Fase 2 stap 2c: events thread + Simone interactie ────────────────────────
const _evState = {

  suggestion: null, editingSuggestionId: null,
  // Mode-toggle WhatsApp | E-mail (mirror van #485's _oi*-pattern).
  mode: 'wa',           // 'wa' | 'email'
  emailLoaded: false,   // één-shot cache per geopende conv
  emailItems: [],
  emailWarning: null,

  // Lijst-source toggle (Fase 2 Optie B). 'wa' = WhatsApp-conversaties,

  listSource: 'wa',

};

// STAP 6a: persistent twee-paneel — beide panes staan altijd in de DOM.
// _evShowThreadView toont de content-area + verbergt het empty-state.
// _evShowListView verbergt de content-area + toont empty-state (deselect).
// Op smal scherm wisselt CSS via .thread-open op de shell tussen lijst en thread.
function _evShowThreadView() {
  const shell   = document.getElementById('evInboxShell');
  const empty   = document.getElementById('evThreadEmpty');
  const content = document.getElementById('evThreadContent');
  if (shell)   shell.classList.add('thread-open');
  if (empty)   empty.style.display = 'none';
  if (content) content.style.display = 'flex';
}
function _evShowListView() {
  const shell   = document.getElementById('evInboxShell');
  const empty   = document.getElementById('evThreadEmpty');
  const content = document.getElementById('evThreadContent');
  if (shell)   shell.classList.remove('thread-open');
  if (empty)   empty.style.display = '';
  if (content) content.style.display = 'none';
  const strip = document.getElementById('evCustomerStrip');
  if (strip) strip.style.display = 'none';
  _evState.convId = null;
  _evState.conv = null;
  _evState.suggestion = null;
  _evState.editingSuggestionId = null;
  // De-mark actieve rij in de lijst (her-renderen niet nodig — class wegnemen
  // is sneller en behoudt scroll-positie).
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  // Realtime: alleen het berichten-kanaal opruimen; convCh + backstop blijven
  // zolang de inbox-tab open is (lijst-updates moeten doorlopen).
  _evTeardownThreadChannel();
}

// ── Events-inbox realtime ────────────────────────────────────────────────────
// Live updates via Supabase-realtime, met handmatige refresh als fallback.
//   _evRealtime.msgCh    : kanaal voor whatsapp_messages-inserts in open thread
//   _evRealtime.convCh   : kanaal voor whatsapp_conversations (lijst)
//   _evRealtime.backstop : 30s setInterval die loadEventsInbox() draait
//                          (+ _evRefreshOpenThread() als een thread open is)
// Alles defensief: zonder window.supabase wordt het stille no-op en blijft de
// refresh-knop werken.
const _evRealtime = { msgCh: null, convCh: null, backstop: null };

function _evMakeDebouncer(ms) {
  let t = null;
  return (fn) => {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; try { fn(); } catch (e) { console.warn('[ev-realtime]', e?.message || e); } }, ms);
  };
}
const _evDebounceThread = _evMakeDebouncer(300);
const _evDebounceList   = _evMakeDebouncer(300);

// Hergebruikbare "messages opnieuw ophalen voor open thread"-helper.
// Zelfde call als de eerste load in openEventsConv (mark_as_read=true blijft
// goed: realtime-update markeert ook nieuwe inbound-berichten als gelezen).
async function _evRefreshOpenThread() {
  const convId = _evState.convId;
  if (!convId) return;
  try {
    const params = new URLSearchParams({ conversation_id: convId, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) return; // stil — backstop probeert opnieuw, of gebruiker drukt refresh
    // convId kan tijdens fetch veranderd zijn (race met _evShowListView).
    if (_evState.convId !== convId) return;
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
  } catch (e) {
    console.warn('[_evRefreshOpenThread]', e?.message || e);
  }
}

async function _evSubscribeMessages(convId) {
  await window._authSharedReady;
  if (!window.supabase || !convId) return;
  // Idempotent: bestaande msgCh eerst opruimen (zelfde of andere conv).
  if (_evRealtime.msgCh) {
    try { window.supabase.removeChannel(_evRealtime.msgCh); } catch {}
    _evRealtime.msgCh = null;
  }
  try {
    _evRealtime.msgCh = window.supabase
      .channel('ev-inbox-msg-' + convId)
      .on('postgres_changes', {
        event : 'INSERT',
        schema: 'public',
        table : 'whatsapp_messages',
        filter: 'conversation_id=eq.' + convId,
      }, () => _evDebounceThread(_evRefreshOpenThread))
      .subscribe();
  } catch (e) {
    console.warn('[_evSubscribeMessages]', e?.message || e);
    _evRealtime.msgCh = null;
  }
}

async function _evSubscribeConversations() {
  await window._authSharedReady;
  if (!window.supabase) return;
  if (_evRealtime.convCh) {
    try { window.supabase.removeChannel(_evRealtime.convCh); } catch {}
    _evRealtime.convCh = null;
  }
  try {
    // Geen module-filter in het kanaal — loadEventsInbox() filtert server-side
    // al op module=events. Eenvoudiger dan een kolom-filter en consistent als
    // er ooit andere modules op dezelfde tabel komen.
    _evRealtime.convCh = window.supabase
      .channel('ev-inbox-convs')
      .on('postgres_changes', {
        event : '*',
        schema: 'public',
        table : 'whatsapp_conversations',
      }, () => _evDebounceList(loadEventsInbox))
      .subscribe();
  } catch (e) {
    console.warn('[_evSubscribeConversations]', e?.message || e);
    _evRealtime.convCh = null;
  }
}

function _evStartBackstop() {
  if (_evRealtime.backstop) return;
  _evRealtime.backstop = setInterval(() => {
    try {
      loadEventsInbox();
      if (_evState.convId) _evRefreshOpenThread();
    } catch (e) {
      console.warn('[ev-backstop]', e?.message || e);
    }
  }, 30000);
}

function _evTeardownThreadChannel() {
  if (_evRealtime.msgCh) {
    try { window.supabase && window.supabase.removeChannel(_evRealtime.msgCh); } catch {}
    _evRealtime.msgCh = null;
  }
}

function _evTeardownRealtime() {
  _evTeardownThreadChannel();
  if (_evRealtime.convCh) {
    try { window.supabase && window.supabase.removeChannel(_evRealtime.convCh); } catch {}
    _evRealtime.convCh = null;
  }
  if (_evRealtime.backstop) {
    clearInterval(_evRealtime.backstop);
    _evRealtime.backstop = null;
  }
}

async function openEventsConv({ id, phone, displayName, customer }) {
  if (!id) return;
  _evState.convId = id;
  _evShowThreadView();
  // STAP 6a: markeer direct de actieve rij in de lijst (geen wacht op
  // loadEventsInbox onderaan — voelt sneller bij wisselen tussen conversaties).
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  const newRow = document.querySelector('#eventsInboxList .evx-conv-row[data-conv-id="' + id.replace(/"/g, '') + '"]');
  if (newRow) newRow.classList.add('active');

  // Pre-fill header met data uit list-rij voor snappy switch
  document.getElementById('evThreadName').textContent  = customer || displayName || phone || 'Onbekend';
  document.getElementById('evThreadPhone').textContent = phone || '—';
  const badge = document.getElementById('evThreadWindowBadge');
  badge.textContent = '…';
  badge.style.background = 'var(--bg-elev-2)';
  badge.style.color = 'var(--text-dim)';
  document.getElementById('evThreadMessages').innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Laden…</div>';
  document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
  document.getElementById('evComposeTextarea').value = '';
  document.getElementById('evThreadHint').textContent = '';

  // Messages laden (eerste pass — daarna stuurt _evRefreshOpenThread updates).
  try {
    const params = new URLSearchParams({ conversation_id: id, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      document.getElementById('evThreadMessages').innerHTML =
        '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
    // STAP 6d: klant-context-strip + event-context (read-only afgeleid).
    _renderEvCustomerStrip(_evState.conv);
    _renderEvAttendeeStrip(_evState.conv);
    // Reset mode-toggle per geopende conv.
    _evResetMode();
    // Refresh list-tab badges (unread reset)
    loadEventsInbox();
    // Laatste PROPOSED suggestie tonen
    loadLatestEventsSuggestion(id);
  } catch (e) {
    document.getElementById('evThreadMessages').innerHTML =
      '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(e.message) + '</div>';
  }

  // Realtime subscriben op INSERTs in deze conversatie. Stille no-op zonder
  // window.supabase; backstop-poll + handmatige refresh blijven werken.
  _evSubscribeMessages(id);
}

function _renderEvThread(items, conv) {
  const wrap = document.getElementById('evThreadMessages');
  if (!wrap) return;
  if (!items || items.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Nog geen berichten in deze conversatie.</div>';
  } else {
    wrap.innerHTML = items.map((m) => {
      const inbound = m.direction === 'in';
      const align = inbound ? 'flex-start' : 'flex-end';
      const bg    = inbound ? 'var(--bg-elev-2)' : '#093d54';
      const color = inbound ? 'var(--text)' : '#ffffff';
      const time  = m.created_at ? fmtDate(m.created_at) : '';
      const body  = String(m.body || (m.template_name ? '[template:' + m.template_name + ']' : '[media]'));
      return '<div style="display:flex;justify-content:' + align + '">'
        + '<div style="max-width:70%;background:' + bg + ';color:' + color + ';padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4">'
        + '<div style="white-space:pre-wrap;word-wrap:break-word">' + esc(body) + '</div>'
        + '<div style="font-size:10px;opacity:0.65;margin-top:3px;text-align:right">' + esc(time) + '</div>'
        + '</div></div>';
    }).join('');
  }
  // Auto-scroll naar onderkant
  wrap.scrollTop = wrap.scrollHeight;

  // Window-badge
  const badge = document.getElementById('evThreadWindowBadge');
  if (_evState.canSendText) {
    badge.textContent = '24h open';
    badge.style.background = 'rgba(5,150,105,0.15)';
    badge.style.color = '#059669';
    badge.title = '24h-servicewindow nog open — vrije tekst toegestaan';
  } else {
    badge.textContent = '24h verlopen';
    badge.style.background = 'rgba(245,158,11,0.18)';
    badge.style.color = '#b45309';
    badge.title = 'Servicewindow verlopen — alleen templates';
  }
}

function _applyEvComposeState() {
  const ta = document.getElementById('evComposeTextarea');
  const sendBtn = document.getElementById('evComposeSendBtn');
  const hint = document.getElementById('evThreadHint');
  if (_evState.canSendText) {
    if (ta) { ta.disabled = false; ta.placeholder = 'Typ een vrij bericht…'; }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.title = 'Versturen'; }
    if (hint) hint.textContent = '';
  } else {
    if (ta) { ta.disabled = true; ta.placeholder = '24h-window verlopen — alleen templates (later)'; }
    if (sendBtn) { sendBtn.disabled = true; sendBtn.title = '24h-window verlopen'; }
    if (hint) hint.textContent = '24h-window verlopen sinds laatste inbound — vrije tekst niet meer toegestaan.';
  }
}

// ── Mode-toggle WhatsApp | E-mail (read-only e-mail-thread) ────────────────
// Mirror van #485's _oi*-pattern op de evx-shell. WhatsApp-pad ongemoeid.
// ── Lijst-source toggle (Optie B): WhatsApp | E-mail-afzenders ─────────────
// Mirror van het _oi*-pattern in modules/shared/onboarding-overzicht.js.
// Knop-actief-stijl is consistent met de per-gesprek mode-toggle (Bg + shadow).
function _evSetSrcBtnActive(btn, active) {
  if (!btn) return;
  btn.style.background = active ? 'var(--bg,#fff)' : 'transparent';
  btn.style.color      = active ? 'var(--text)'   : 'var(--text-dim)';
  btn.style.boxShadow  = active ? '0 1px 2px rgba(0,0,0,.06)' : 'none';
}

function _evUpdateListEmailBadge(n) {
  const badge = document.getElementById('evListEmailBadge');
  if (!badge) return;
  if (Number(n) > 0) {
    badge.textContent  = String(n);
    badge.style.display = '';
  } else {
    badge.style.display = 'none';
  }
}

function _evSwitchListSource(next) {
  if (next !== 'wa' && next !== 'email') return;
  if (next === _evState.listSource) return;
  _evState.listSource = next;
  _evSetSrcBtnActive(document.getElementById('evSrcBtnWa'),    next === 'wa');
  _evSetSrcBtnActive(document.getElementById('evSrcBtnEmail'), next === 'email');
  if (next === 'wa') {
    loadEventsInbox();
  } else {
    _loadEvEmailSenders();
  }
}

async function _loadEvEmailSenders() {
  const list = document.getElementById('eventsInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-email-senders-list?module=events');
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(d?.error || ('HTTP ' + r.status)) + '</div></div>';
      return;
    }
    const items = Array.isArray(d.items) ? d.items : [];
    _evState.emailSenders        = items;
    _evState.emailSendersLoaded  = true;
    _evUpdateListEmailBadge(d.unread_total || 0);
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-mail-off"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Nog geen e-mails op events@</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">' + esc(d.warning || 'Nieuwe inbound mails verschijnen hier.') + '</div>'
        + '</div>';
      return;
    }
    list.innerHTML = items.map((it) => {
      const nameLabel  = it.name || it.email || '(onbekend)';
      const initial    = (String(nameLabel).match(/[A-Za-z0-9]/) || ['?'])[0].toUpperCase();
      const preview    = (it.last_subject || '').slice(0, 80);
      const timeShort  = it.last_date ? esc(fmtDate(it.last_date)) : '';
      const unread     = Number(it.unread_count) || 0;
      const unreadHtml = unread > 0 ? `<span class="evx-conv-unread">${esc(String(unread))}</span>` : '';
      const safeEmail  = esc(it.email || '');
      const attendeeAttr = it.attendee_id ? ` data-attendee-id="${esc(it.attendee_id)}"` : '';
      const attendeeAttrName = it.attendee_name ? ` data-attendee-name="${esc(it.attendee_name)}"` : '';
      const attIcon = it.attendee_id
        ? `<i class="ti ti-ticket" title="Gekoppeld aan aanmelding" style="color:#0a2f63;font-size:13px;margin-right:4px;flex-shrink:0"></i>`
        : '';
      return `
        <div class="evx-conv-row" data-ev-email-row="1" data-email="${safeEmail}"${attendeeAttr}${attendeeAttrName} data-name="${esc(nameLabel)}">
          <div class="evx-conv-avatar">${esc(initial)}</div>
          <div class="evx-conv-body">
            <div class="evx-conv-toprow">
              <div class="evx-conv-name">${attIcon}${esc(nameLabel)}</div>
              <div class="evx-conv-time">${timeShort}</div>
            </div>
            <div class="evx-conv-preview">${esc(preview || it.email || '—')}</div>
            ${unreadHtml ? `<div class="evx-conv-meta">${unreadHtml}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.evx-conv-row[data-ev-email-row="1"]').forEach((row) => {
      row.addEventListener('click', () => _openEvEmailSender({
        email:         row.dataset.email || '',
        attendee_id:   row.dataset.attendeeId || null,
        attendee_name: row.dataset.attendeeName || '',
        name:          row.dataset.name || '',
      }));
    });
  } catch (e) {
    list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e?.message || e) + '</div></div>';
  }
}

// Lichte achtergrond-fetch voor het badge-getal; gebruikt hetzelfde endpoint
// maar negeert de items-lijst. Niet aan de 60s-timer gehangen — eenmalige
// fetch ná initial load + bij refresh-klik.
async function _loadEvEmailSendersBadgeOnly() {
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-email-senders-list?module=events');
    if (!r.ok) return;
    const d = await r.json().catch(() => ({}));
    _evUpdateListEmailBadge(d.unread_total || 0);
  } catch (_e) { /* stille no-op */ }
}

async function _openEvEmailSender(sender) {
  if (!sender || !sender.email) return;
  // Pseudo-conv voor mail-only afzender. Geen WhatsApp-conv-id; we openen alleen
  // de thread-pane en vullen _evState.conv zo dat _loadEvEmailThread werkt.
  _evState.convId            = null;
  _evState.conv              = {
    attendee_id:  sender.attendee_id || null,
    customer_id:  null,
    email:        sender.email,
    display_name: sender.attendee_name || sender.name || sender.email,
  };
  _evState.canSendText        = false;
  _evState.suggestion         = null;
  _evState.editingSuggestionId = null;
  _evState.emailLoaded        = false;
  _evState.emailItems         = [];
  _evState.emailWarning       = null;
  _evState.emailCustomerEmail = sender.email;
  _evState.mode               = 'email';

  _evShowThreadView();
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  const safeEmail = String(sender.email).replace(/"/g, '');
  const newRow = document.querySelector('#eventsInboxList .evx-conv-row[data-email="' + safeEmail + '"]');
  if (newRow) newRow.classList.add('active');

  const nameEl  = document.getElementById('evThreadName');
  const phoneEl = document.getElementById('evThreadPhone');
  if (nameEl)  nameEl.textContent  = _evState.conv.display_name || sender.email;
  if (phoneEl) phoneEl.textContent = sender.email;

  // WhatsApp-only UI verbergen — mode-bar slaat nergens op voor een mail-only
  // afzender; suggestiepaneel + footer + WA-thread + strips ook.
  for (const id of ['evThreadModeBar', 'evThreadMessages', 'evSimoneSuggestionPanel',
                    'evThreadFooter', 'evCustomerStrip', 'evAttendeeStrip',
                    'evThreadWindowBadge']) {
    const el = document.getElementById(id);
    if (el) el.style.display = 'none';
  }
  const emailThread = document.getElementById('evEmailThread');
  if (emailThread) {
    emailThread.style.display = 'block';
    emailThread.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">E-mails laden…</div>';
  }
  // Reply-knop gated op events.inbox.reply_link (zoals in de bestaande
  // per-conv mode-toggle).
  const reply = document.getElementById('evEmailReplyBtn');
  const canReplyLink = !!(window.RBAC && window.RBAC.canSync && window.RBAC.canSync('events.inbox.reply_link'));
  if (reply) reply.style.display = canReplyLink ? '' : 'none';

  _loadEvEmailThread();
}

function _evResetMode() {
  _evState.mode               = 'wa';
  _evState.emailLoaded        = false;
  _evState.emailItems         = [];
  _evState.emailWarning       = null;
  _evState.emailCustomerEmail = '';
  const wa    = document.getElementById('evModeBtnWa');
  const em    = document.getElementById('evModeBtnEmail');
  const reply = document.getElementById('evEmailReplyBtn');
  const emailThread = document.getElementById('evEmailThread');
  const waThread    = document.getElementById('evThreadMessages');
  const sugg        = document.getElementById('evSimoneSuggestionPanel');
  const footer      = document.getElementById('evThreadFooter');
  const hasContact = !!(_evState.conv && (_evState.conv.attendee_id || _evState.conv.customer_id));
  if (em) {
    em.disabled = !hasContact;
    em.title    = hasContact ? '' : 'Geen aanmelding/klant gekoppeld';
    em.style.color = 'var(--text-dim)';
    em.style.background = 'transparent';
    em.style.boxShadow = 'none';
    em.setAttribute('aria-selected', 'false');
  }
  if (wa) {
    wa.style.color = 'var(--text)';
    wa.style.background = 'var(--bg,#fff)';
    wa.style.boxShadow = '0 1px 2px rgba(0,0,0,.06)';
    wa.setAttribute('aria-selected', 'true');
  }
  if (emailThread) emailThread.style.display = 'none';
  if (waThread)    waThread.style.display    = '';
  if (sugg)        sugg.style.display        = '';
  if (footer)      footer.style.display      = '';
  if (reply)       reply.style.display       = 'none';
  // Bij open vanuit een e-mail-afzenderview (#evListSourceBar='email') zijn de
  // WhatsApp-only elementen verborgen. Bij heropen van een WA-conv zetten we
  // ze actief terug aan zodat de gesprek-flow weer compleet is.
  const modeBar     = document.getElementById('evThreadModeBar');
  const windowBadge = document.getElementById('evThreadWindowBadge');
  if (modeBar)     modeBar.style.display     = 'flex';
  if (windowBadge) windowBadge.style.display = '';
}

function _evSwitchMode(next) {
  if (next !== 'wa' && next !== 'email') return;
  if (next === 'email' && !(_evState.conv && (_evState.conv.attendee_id || _evState.conv.customer_id))) return;
  if (_evState.mode === next) return;
  _evState.mode = next;
  const wa    = document.getElementById('evModeBtnWa');
  const em    = document.getElementById('evModeBtnEmail');
  const reply = document.getElementById('evEmailReplyBtn');
  const emailThread = document.getElementById('evEmailThread');
  const waThread    = document.getElementById('evThreadMessages');
  const sugg        = document.getElementById('evSimoneSuggestionPanel');
  const footer      = document.getElementById('evThreadFooter');
  const setActive = (btn, active) => {
    if (!btn) return;
    btn.style.color      = active ? 'var(--text)' : 'var(--text-dim)';
    btn.style.background = active ? 'var(--bg,#fff)' : 'transparent';
    btn.style.boxShadow  = active ? '0 1px 2px rgba(0,0,0,.06)' : 'none';
    btn.setAttribute('aria-selected', active ? 'true' : 'false');
  };
  setActive(wa, next === 'wa');
  setActive(em, next === 'email');
  if (next === 'wa') {
    if (emailThread) emailThread.style.display = 'none';
    if (waThread)    waThread.style.display    = '';
    if (sugg)        sugg.style.display        = '';
    if (footer)      footer.style.display      = '';
    if (reply)       reply.style.display       = 'none';
  } else {
    if (waThread)    waThread.style.display    = 'none';
    if (sugg)        sugg.style.display        = 'none';
    if (footer)      footer.style.display      = 'none';
    if (emailThread) emailThread.style.display = 'block';
    const canReplyLink = !!(window.RBAC && window.RBAC.canSync && window.RBAC.canSync('events.inbox.reply_link'));
    if (reply) reply.style.display = canReplyLink ? '' : 'none';
    _loadEvEmailThread();
  }
}

async function _loadEvEmailThread() {
  const wrap = document.getElementById('evEmailThread');
  if (!wrap) return;
  if (_evState.emailLoaded) {
    _renderEvEmailThread();
    return;
  }
  wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">E-mails laden…</div>';
  // Attendee-first; fallback op customer_id; daarna op email (PR #504 ondersteunt
  // het email-pad op de events-tak voor mail-only afzenders).
  const attendeeId = _evState.conv?.attendee_id || null;
  const customerId = _evState.conv?.customer_id || null;
  const emailKey   = _evState.conv?.email || null;
  let qs = null;
  if (attendeeId)        qs = 'attendee_id=' + encodeURIComponent(attendeeId);
  else if (customerId)   qs = 'customer_id=' + encodeURIComponent(customerId);
  else if (emailKey)     qs = 'email='       + encodeURIComponent(emailKey);
  if (!qs) {
    wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Geen aanmelding/klant/e-mailadres beschikbaar.</div>';
    return;
  }
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-emails-list?' + qs + '&module=events');
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      wrap.innerHTML = '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(d?.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    _evState.emailLoaded        = true;
    _evState.emailItems         = Array.isArray(d.items) ? d.items : [];
    _evState.emailWarning       = d.warning || null;
    _evState.emailCustomerEmail = d.customer_email || '';
    _renderEvEmailThread();
  } catch (e) {
    wrap.innerHTML = '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(e?.message || e) + '</div>';
  }
}

function _renderEvEmailThread() {
  const wrap = document.getElementById('evEmailThread');
  if (!wrap) return;
  const items   = _evState.emailItems || [];
  const warning = _evState.emailWarning;
  // Reageren-knop wire (idempotent).
  const reply = document.getElementById('evEmailReplyBtn');
  if (reply) {
    reply.onclick = () => {
      const to = _evState.emailCustomerEmail || '';
      if (!to) return;
      const url = '/modules/email.html?reply_to=' + encodeURIComponent(to) +
                  '&mailbox=' + encodeURIComponent('events@deforexopleiding.nl');
      window.open(url, '_blank');
    };
  }
  if (items.length === 0) {
    let html = '<div style="color:var(--text-faint);font-size:12.5px;text-align:center;padding:24px">Nog geen e-mails voor deze aanmelding/klant.</div>';
    if (warning) {
      html += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:4px 14px 12px">' + esc(warning) + '</div>';
    }
    wrap.innerHTML = html;
    return;
  }
  // Spiegelt _renderEvThread (events-stijl): inbound=links+bg-elev-2,
  // outbound=rechts+#093d54/wit. Tijd via fmtDate (events-conventie).
  const bubbleHtml = items.map((m) => {
    const inbound = m.direction === 'inbound';
    const align   = inbound ? 'flex-start' : 'flex-end';
    const bg      = inbound ? 'var(--bg-elev-2)' : '#093d54';
    const color   = inbound ? 'var(--text)' : '#ffffff';
    const time    = m.date ? fmtDate(m.date) : '';
    const subj    = m.subject || '(geen onderwerp)';
    const preview = m.preview || '';
    return '<div style="display:flex;justify-content:' + align + ';margin-bottom:8px">'
      + '<div style="max-width:78%;background:' + bg + ';color:' + color + ';padding:8px 11px;border-radius:10px;font-size:13px;line-height:1.4">'
      +   '<div style="font-weight:700;font-size:12.5px;margin-bottom:3px">' + esc(subj) + '</div>'
      +   (preview ? '<div style="white-space:pre-wrap;word-wrap:break-word;font-size:12.5px">' + esc(preview) + '</div>' : '')
      +   '<div style="font-size:10px;opacity:0.65;margin-top:3px;text-align:right">' + esc(time) + '</div>'
      + '</div></div>';
  }).join('');
  let html = bubbleHtml;
  if (warning) {
    html += '<div style="color:var(--text-dim);font-size:11px;text-align:center;padding:6px 14px 0">' + esc(warning) + '</div>';
  }
  wrap.innerHTML = html;
  wrap.scrollTop = wrap.scrollHeight;
}

async function loadLatestEventsSuggestion(convId) {
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-suggestions-recent?' +
      new URLSearchParams({ module: 'events', conversation_id: convId, max_age_minutes: '60' }).toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      _renderEvSuggestionPanel(null, d.error || ('HTTP ' + r.status));
      return;
    }
    _evState.suggestion = d.suggestion || null;
    _renderEvSuggestionPanel(_evState.suggestion, null);

    _renderEvSuggestionPanel(null, e.message);
  }

function _renderEvSuggestionPanel(sugg, errMsg) {
  const wrap = document.getElementById('evSimoneSuggestionPanel');
  if (!wrap) return;
  if (errMsg) {
    wrap.innerHTML = '<div style="color:#b45309;font-size:12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 10px;margin:6px 14px 0 14px">Suggestie laden mislukt: ' + esc(errMsg) + '</div>';
    return;
  }
  if (!sugg) { wrap.innerHTML = ''; return; }
  // STAP 6d Simone-polish: Gebruiken / Aanpassen / Afwijzen.
  // "Gebruiken" = stuur suggested_reply as-is + mark USED_AS_IS.
  // "Aanpassen" = kopieer naar de composer ter bewerking; USED_EDITED komt
  // pas na verzenden via sendComposeText (zie _evState.editingSuggestionId).
  const auto = sugg.auto_triggered ? '<span style="background:#7c3aed;color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.04em">AUTO</span>' : '';
  const conf = (typeof sugg.confidence === 'number') ? (Math.round(sugg.confidence * 100) + '%') : '—';
  wrap.innerHTML =
    '<div class="evx-sim-card">'
    + '<div class="evx-sim-head">'
    +   '<i class="ti ti-sparkles"></i>'
    +   '<span class="evx-sim-title">Simone-suggestie</span>'
    +   auto
    +   '<span class="evx-sim-meta">intent: ' + esc(sugg.detected_intent || '?') + ' · ' + conf + '</span>'
    + '</div>'
    + '<div class="evx-sim-quote">' + esc(sugg.suggested_reply || '') + '</div>'
    + (sugg.reasoning ? '<div style="font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic">Reasoning: ' + esc(sugg.reasoning) + '</div>' : '')
    + '<div class="evx-sim-actions">'
    +   '<button class="btn-primary" id="evSimUseBtn" type="button" title="Verstuur de suggestie ongewijzigd"><i class="ti ti-check"></i> Gebruiken</button>'
    +   '<button class="sr-btn" id="evSimEditBtn" type="button" style="background:transparent;border:1px solid #7c3aed;color:#7c3aed;padding:6px 11px;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:inherit" title="Kopieer naar het tekstveld om aan te passen"><i class="ti ti-edit"></i> Aanpassen</button>'
    +   '<button class="btn-dismiss" id="evSimDismissBtn" type="button" title="Negeer deze suggestie">Negeren</button>'
    + '</div>'
    + '</div>';
  const useBtn     = document.getElementById('evSimUseBtn');
  const editBtn    = document.getElementById('evSimEditBtn');
  const dismissBtn = document.getElementById('evSimDismissBtn');
  if (useBtn)     useBtn.addEventListener('click', () => useSimoneAsIs(sugg));
  if (editBtn)    editBtn.addEventListener('click', () => editSimoneInComposer(sugg));
  if (dismissBtn) dismissBtn.addEventListener('click', () => dismissSuggestion(sugg));
}

// STAP 6d — Gebruiken: stuur as-is via /api/inbox-send + mark USED_AS_IS.
async function useSimoneAsIs(sugg) {
  const convId = _evState.convId;
  if (!convId || !sugg) return;
  if (!_evState.canSendText) {
    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');
    return;
  }
  const text = String(sugg.suggested_reply || '').trim();
  if (!text) { window.AgentShared.showToast('Suggestie is leeg', 'error'); return; }
  const btn = document.getElementById('evSimUseBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: text }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ suggestion_id: sugg.id, status: 'USED_AS_IS', final_sent_text: text }),
    }).catch(() => {});
    window.AgentShared.showToast('Suggestie verstuurd', 'success');
    _evState.suggestion = null;
    _evState.editingSuggestionId = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

// STAP 6d — Aanpassen: kopieer naar composer; USED_EDITED komt pas bij sendComposeText.
function editSimoneInComposer(sugg) {
  if (!sugg) return;
  const ta = document.getElementById('evComposeTextarea');
  if (ta) {
    ta.value = String(sugg.suggested_reply || '');
    ta.focus();
    try { ta.setSelectionRange(ta.value.length, ta.value.length); } catch {}
  }
  _evState.editingSuggestionId = sugg.id;
  window.AgentShared.showToast('Suggestie in tekstveld geladen — pas aan en verstuur', 'success');
}

async function askSimone() {
  const convId = _evState.convId;

  const btn = document.getElementById('evAskSimoneBtn');
  if (btn) { btn.disabled = true; btn.textContent = '…Simone denkt na'; }

async function sendSuggestion(sugg) {
  const convId = _evState.convId;
  if (!convId || !sugg) return;
  if (!_evState.canSendText) {
    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');
    return;
  }
  const ta = document.getElementById('evSuggText');
  const finalText = ta ? String(ta.value || '').trim() : (sugg.suggested_reply || '').trim();
  if (!finalText) { window.AgentShared.showToast('Bericht is leeg', 'error'); return; }
  const wasEdited = (finalText !== String(sugg.suggested_reply || '').trim());
  const btn = document.getElementById('evSuggSendBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: finalText }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    // Mark outcome (fail-soft: send-success is leidend)
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        suggestion_id:   sugg.id,
        status:          wasEdited ? 'USED_EDITED' : 'USED_AS_IS',
        final_sent_text: finalText,
      }),
    }).catch(() => {});
    window.AgentShared.showToast(wasEdited ? 'Aangepast bericht verstuurd' : 'Suggestie verstuurd', 'success');
    _evState.suggestion = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
    // Thread refreshen
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

  }

// ──────────────────────────────────────────────────────────────────────────────
// STAP 6c — Template-picker (zoek + verstuur via /api/inbox-send-template).
// ──────────────────────────────────────────────────────────────────────────────
const _evTplState = {
  items: [],
  filter: '',
  activeTpl: null,
  selectedVars: {},
  // FEATURE event-aware templates: kandidaat-aanwezigen voor de actieve
  // conversation (via customer_id + phone-fallback) + huidige selectie.
  // Wordt lazy gevuld door _evResolveAttendeeCandidatesForConv() pas
  // wanneer een template attendee.* / event.* gebruikt.
  attendeeCandidates: [],
  attendeeCandidatesLoaded: false,
  selectedAttendeeId: null,
};

// Scan een template's meta_param_mapping body voor attendee.* / event.* vars.
// Returnt true zodra ten minste 1 mapping-waarde met die prefix begint.
function _evTplNeedsEventContext(tpl) {
  if (!tpl) return false;
  const mapping = tpl.meta_param_mapping && tpl.meta_param_mapping.body;
  if (!mapping || typeof mapping !== 'object') return false;
  for (const v of Object.values(mapping)) {
    if (typeof v !== 'string') continue;
    if (v.startsWith('attendee.') || v.startsWith('event.')) return true;
  }
  return false;
}

// Helper voor de UI: heeft de actieve template een attendee.keuze_link nodig?
// Wordt gebruikt om aanwezigen zonder choice_token niet te laten kiezen.
function _evTplNeedsChoiceLink(tpl) {
  if (!tpl) return false;
  const mapping = tpl.meta_param_mapping && tpl.meta_param_mapping.body;
  if (!mapping || typeof mapping !== 'object') return false;
  for (const v of Object.values(mapping)) {
    if (v === 'attendee.keuze_link') return true;
  }
  return false;
}

// Resolve kandidaat-aanwezigen voor de open conversation. Client-side
// Supabase met dezelfde RLS als loadEventContextForCustomer. Returnt een
// array van { attendee_id, attendee_name, attendee_email, attendee_phone,
// has_choice_token, event_id, event_title, event_starts_at, event_status }.
//
// Match-strategie:
//   1. event_attendees.customer_id = conv.customer_id (als gekoppeld)
//   2. event_attendees.phone = conv.phone_number  (fallback)
// Resultaten worden gededupliceerd op attendee_id en gesorteerd: events
// met starts_at in de toekomst eerst (oplopend); daarna events in het
// verleden (aflopend). Aanwezigen zonder gekoppeld event komen onderaan.
async function _evResolveAttendeeCandidatesForConv(conv) {
  if (!conv) return [];
  const customerId = conv.customer_id || null;
  const phone      = conv.phone_number || conv.phone || null;
  if (!customerId && !phone) return [];

  // Server-side resolutie via /api/events-attendee-candidates. Het oude pad
  // (window.supabase op event_attendees) gaf structureel een leeg array
  // terug omdat RLS aan staat zonder SELECT-policy voor 'authenticated'
  // (zie docs/sql-migrations/2026-06-11-events-f1-foundation.sql:253-256).
  // Endpoint gebruikt supabaseAdmin en bewaakt RBAC additief.
  try {
    const r = await window.AgentShared.apiFetch('/api/events-attendee-candidates', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({
        customer_id: customerId || null,
        phone      : phone      || null,
      }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      console.warn('[attendee-candidates]', j.error || ('HTTP ' + r.status));
      return [];
    }
    const j = await r.json();
    return Array.isArray(j.candidates) ? j.candidates : [];
  } catch (e) {
    console.warn('[attendee-candidates exception]', e?.message || e);
    return [];
  }
}

// FEATURE 0-kandidaten inline-actie: helpers voor "voeg toe als aanwezige".
// Cache de gepubliceerde events-lijst per template-picker-open zodat 'we 'm
// niet bij elke re-render opnieuw fetchen.
window._evTplPubEventsCache = window._evTplPubEventsCache || null;

async function _evLoadPublishedEventsForAdd() {
  if (window._evTplPubEventsCache) return window._evTplPubEventsCache;
  try {
    const r = await window.AgentShared.apiFetch('/api/events-list?status=published&limit=200');
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      console.warn('[tpl-add-events] events-list:', d.error || ('HTTP ' + r.status));
      window._evTplPubEventsCache = [];
      return window._evTplPubEventsCache;
    }
    const now = Date.now();
    const items = Array.isArray(d.items) ? d.items : [];
    // Filter toekomstige events (starts_at >= now) — selectie van past-events
    // zou raar zijn voor een net-aangemaakte aanwezige.
    const future = items.filter((ev) => {
      if (!ev.starts_at) return false;
      const t = new Date(ev.starts_at).getTime();
      return Number.isFinite(t) && t >= now;
    });
    future.sort((a, b) => new Date(a.starts_at).getTime() - new Date(b.starts_at).getTime());
    window._evTplPubEventsCache = future;
    return window._evTplPubEventsCache;
  } catch (e) {
    console.warn('[tpl-add-events exception]', e?.message || e);
    window._evTplPubEventsCache = [];
    return window._evTplPubEventsCache;
  }
}

// Klantgegevens (first/last/email) ophalen voor de POST. Inbox-conversation
// heeft alleen customer_id + customer_name (samengevoegd) — voor een nette
// rij willen we ze apart in event_attendees. Client-side Supabase zelfde
// RLS-pad als bestaande loadEventContextForCustomer.
async function _evLoadCustomerNawForAdd(customerId) {
  if (!customerId) return null;
  try {
    await window._authSharedReady;
    if (!window.supabase) return null;
    const { data, error } = await window.supabase
      .from('customers')
      .select('first_name, last_name, email')
      .eq('id', customerId)
      .maybeSingle();
    if (error) {
      console.warn('[tpl-add customer]', error.message);
      return null;
    }
    return data || null;
  } catch (e) {
    console.warn('[tpl-add customer exception]', e?.message || e);
    return null;
  }
}

// POST naar /api/events-attendee-add met de samengestelde payload. Geen
// auto-invite (de operator stuurt zometeen zelf de template).
async function _evAddAttendeeFromInbox(eventId) {
  if (!eventId) return { ok: false, error: 'Geen event geselecteerd' };
  const conv = _evState.conv || {};
  const naw  = conv.customer_id ? await _evLoadCustomerNawForAdd(conv.customer_id) : null;

  // Bepaal first_name/last_name. Met gekoppelde klant → naw uit customers.
  // Zonder klant: val terug op de gespreksnaam (display_name = Meta WhatsApp
  // profile name, of customer_name uit een eerdere koppeling). Split op de
  // eerste spatie zodat de aanwezige niet naamloos in de DB belandt.
  let firstName = null;
  let lastName  = null;
  if (naw) {
    firstName = naw.first_name || null;
    lastName  = naw.last_name  || null;
  } else {
    const convName = (conv.display_name || conv.customer_name || '').trim();
    if (convName) {
      const sp = convName.indexOf(' ');
      if (sp === -1) {
        firstName = convName;
      } else {
        firstName = convName.slice(0, sp).trim() || null;
        lastName  = convName.slice(sp + 1).trim() || null;
      }
    }
  }

  const payload = {
    event_id    : eventId,
    first_name  : firstName,
    last_name   : lastName,
    email       : naw && naw.email ? naw.email : null,
    phone       : conv.phone_number || null,
    customer_id : conv.customer_id || null,
    send_invite : false,
  };
  try {
    const r = await window.AgentShared.apiFetch('/api/events-attendee-add', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      // 409 EMAIL_EXISTS / PHONE_EXISTS / SEATS_FULL / archived; 403 no perm.
      const msg = d.code === 'EMAIL_EXISTS' ? 'Deze klant is al aangemeld voor dit event.'
        : d.code === 'PHONE_EXISTS'         ? 'Dit nummer staat al op dit event.'
        : d.code === 'SEATS_FULL'           ? 'Dit event is vol; kies een ander event.'
        : (d.error || ('HTTP ' + r.status));
      return { ok: false, error: msg, status: r.status, code: d.code || null };
    }
    return { ok: true, attendee: d.attendee || null };
  } catch (e) {
    return { ok: false, error: e?.message || 'onbekende fout' };
  }
}

function _evFmtAttendeeOption(c) {
  const dateStr = c.event_starts_at
    ? new Date(c.event_starts_at).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' })
    : '';
  const ev = c.event_title ? (c.event_title + (dateStr ? ' · ' + dateStr : '')) : '(geen event)';
  return c.attendee_name + ' — ' + ev;
}

function openTemplatePicker() {
  const convId = _evState.convId;
  if (!convId) return;
  document.getElementById('evTplModalTitle').textContent = 'Kies een template';
  const modal = document.getElementById('evTemplatePickerModal');
  const body  = document.getElementById('evTplBody');
  body.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:14px;text-align:center">Laden…</div>';
  modal.classList.add('show');
  _evTplState.filter = '';
  _evTplState.activeTpl = null;
  _evTplState.selectedVars = {};
  // Reset event-aware-state: nieuwe open = nieuwe kandidaten-resolve.
  _evTplState.attendeeCandidates = [];
  _evTplState.attendeeCandidatesLoaded = false;
  _evTplState.selectedAttendeeId = null;
  // Vergeet ook de events-lijst-cache: capacity / nieuwe events kunnen tussen
  // template-picker-opens veranderen.
  window._evTplPubEventsCache = null;
  loadTemplates(convId);
}

function closeTemplatePicker() {
  document.getElementById('evTemplatePickerModal').classList.remove('show');
}

async function loadTemplates(convId) {
  const body = document.getElementById('evTplBody');
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-template-list?conversation_id=' + encodeURIComponent(convId));
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      body.innerHTML = '<div style="color:#dc2626;font-size:12.5px;padding:14px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    _evTplState.items = Array.isArray(j.items) ? j.items : [];
    _renderTplListView();
  } catch (e) {
    body.innerHTML = '<div style="color:#dc2626;font-size:12.5px;padding:14px">Fout: ' + esc(e.message) + '</div>';
  }
}

function _renderTplListView() {
  const body = document.getElementById('evTplBody');
  const filter = (_evTplState.filter || '').toLowerCase().trim();
  const filtered = _evTplState.items.filter((t) => !filter || (t.name || '').toLowerCase().includes(filter));
  const rowsHtml = filtered.length > 0
    ? filtered.map((t) => `
        <div class="evx-modal-item" data-tpl-name="${esc(t.name)}">
          <div class="iname">${esc(t.name)}</div>
          <div class="imeta">${esc(t.language || '')}${t.category ? ' · ' + esc(t.category) : ''}</div>
        </div>
      `).join('')
    : '<div style="color:var(--text-faint);font-size:12px;padding:10px;text-align:center">Geen templates gevonden.</div>';
  body.innerHTML = `
    <input id="evTplSearch" class="evx-modal-search" type="search" placeholder="Zoek op template-naam…" autocomplete="off" value="${esc(_evTplState.filter)}" />
    <div class="evx-modal-list">${rowsHtml}</div>
  `;
  // Wire search (client-side filter; behoudt focus + caret).
  const inp = document.getElementById('evTplSearch');
  if (inp) {
    inp.focus();
    inp.addEventListener('input', (e) => {
      _evTplState.filter = e.target.value || '';
      _renderTplListView();
    });
  }
  body.querySelectorAll('.evx-modal-item[data-tpl-name]').forEach((row) => {
    row.addEventListener('click', () => {
      const name = row.dataset.tplName;
      const tpl  = _evTplState.items.find((t) => t.name === name);
      if (tpl) onTemplatePicked(tpl);
    });
  });
}

// Detecteer named-mapping vs positionele template + render volgende stap.
//   - Named: meta_param_mapping.body bestaat en is non-leeg -> server resolved.
//     We sturen direct (geen UI-vraag).
//   - Positioneel: {{1}}, {{2}}, … in body_text. Vraag de operator om
//     de waarden in te vullen.
async function onTemplatePicked(tpl) {
  _evTplState.activeTpl = tpl;
  const mapping = tpl.meta_param_mapping || null;
  const namedBody = mapping && mapping.body && typeof mapping.body === 'object' && Object.keys(mapping.body).length > 0;
  if (namedBody) {
    // FEATURE event-aware templates: als de mapping attendee.*/event.* heeft,
    // resolve kandidaat-aanwezigen voor deze conv. 0 → blokkeer; 1 → auto-pick;
    // N → selector in confirm-view.
    if (_evTplNeedsEventContext(tpl)) {
      _renderTplLoadingView('Aanwezigen zoeken…');
      try {
        if (!_evTplState.attendeeCandidatesLoaded) {
          _evTplState.attendeeCandidates = await _evResolveAttendeeCandidatesForConv(_evState.conv);
          _evTplState.attendeeCandidatesLoaded = true;
        }
        const cands = _evTplState.attendeeCandidates || [];
        // Bij attendee.keuze_link → filter kandidaten zonder choice_token
        // voor de auto-pick. Met choice_token tonen we ze wél in de selector
        // maar disabled (zodat de operator ziet dat 't kan, maar niet voor
        // deze template).
        if (cands.length === 0) {
          _evTplState.selectedAttendeeId = null;
          _renderTplConfirmView(tpl, 'Geen aanwezige gevonden voor deze klant/telefoon. Koppel een klant of voeg deze persoon als aanwezige toe.');
          return;
        }
        if (cands.length === 1) {
          _evTplState.selectedAttendeeId = cands[0].attendee_id;
          _renderTplConfirmView(tpl, null);
          return;
        }
        // Meerdere: kies de eerste future-event als default (sort heeft die boven).
        _evTplState.selectedAttendeeId = cands[0].attendee_id;
        _renderTplConfirmView(tpl, null);
        return;
      } catch (e) {
        _renderTplConfirmView(tpl, 'Aanwezigen ophalen mislukt: ' + (e?.message || 'onbekende fout'));
        return;
      }
    }
    // Named mapping zonder event-vars → ongewijzigd server-resolved gedrag.
    _renderTplConfirmView(tpl, null);
    return;
  }
  // Positioneel: detecteer {{N}}-placeholders in body_text.
  const bodyText = tpl.body_text || '';
  const matches = bodyText.match(/\{\{\s*(\d+)\s*\}\}/g) || [];
  const indices = Array.from(new Set(matches.map((m) => (m.match(/\d+/) || [])[0]).filter(Boolean))).sort((a, b) => Number(a) - Number(b));
  if (indices.length === 0) {
    _renderTplConfirmView(tpl, null);
    return;
  }
  _renderTplPositionalForm(tpl, indices);
}

function _renderTplLoadingView(text) {
  const body = document.getElementById('evTplBody');
  if (!body) return;
  body.innerHTML = '<div style="color:var(--text-faint);font-size:12px;padding:14px;text-align:center">' + esc(text || 'Laden…') + '</div>';
}

function _renderTplPositionalForm(tpl, indices) {
  const body = document.getElementById('evTplBody');
  document.getElementById('evTplModalTitle').textContent = 'Variabelen invullen — ' + (tpl.name || '');
  body.innerHTML = `
    <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:8px">Vul de placeholders in:</div>
    <div style="background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12.5px;color:var(--text);white-space:pre-wrap;margin-bottom:10px">${esc(tpl.body_text || '')}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${indices.map((i) => `
        <label style="display:flex;flex-direction:column;gap:3px">
          <span style="font-size:11.5px;color:var(--text-faint);font-weight:600">{{${esc(i)}}}</span>
          <input type="text" class="evx-tpl-var" data-idx="${esc(i)}" style="padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit" />
        </label>
      `).join('')}
    </div>
    <div class="evx-modal-footer">
      <button class="sr-btn" id="evTplBackBtn" type="button" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer">Terug</button>
      <button class="btn-primary" id="evTplSendBtn" type="button"><i class="ti ti-send"></i> Versturen</button>
    </div>
  `;
  document.getElementById('evTplBackBtn').addEventListener('click', () => _renderTplListView());
  document.getElementById('evTplSendBtn').addEventListener('click', () => {
    const vars = {};
    body.querySelectorAll('.evx-tpl-var').forEach((inp) => {
      vars[String(inp.dataset.idx)] = String(inp.value || '');
    });
    sendTemplate(tpl, vars);
  });
}

function _renderTplConfirmView(tpl, hint) {
  const body = document.getElementById('evTplBody');
  document.getElementById('evTplModalTitle').textContent = 'Verzenden — ' + (tpl.name || '');

  // FEATURE event-aware: bouw optionele event-context UI als de template
  // attendee/event-vars gebruikt en we kandidaten hebben opgehaald.
  const needsEventCtx   = _evTplNeedsEventContext(tpl);
  const needsChoiceLink = _evTplNeedsChoiceLink(tpl);
  const cands           = needsEventCtx ? (_evTplState.attendeeCandidates || []) : [];
  const selected        = needsEventCtx
    ? cands.find((c) => c.attendee_id === _evTplState.selectedAttendeeId) || null
    : null;
  const blocked         = needsEventCtx && (
    cands.length === 0
    || !selected
    || (needsChoiceLink && !selected.has_choice_token)
  );

  let eventCtxHtml = '';
  if (needsEventCtx) {
    if (cands.length === 0) {
      // 0-kandidaten: ALLEEN als users events.attendee.create heeft, toon een
      // inline "Voeg toe als aanwezige op een event"-blokje. Anders: nette tekst
      // met verwijzing naar event-detail. Geen knop renderen die niet werkt.
      const canCreateAttendee = window.RBAC?.canSync?.('events.attendee.create') === true;
      if (canCreateAttendee) {
        eventCtxHtml = `
          <div style="background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#b91c1c;border-radius:8px;padding:10px;font-size:12.5px;margin-bottom:6px">
            <strong>Geen aanwezige gekoppeld.</strong> Deze template gebruikt aanwezige- of event-variabelen. Voeg deze persoon hieronder direct toe als aanwezige op een event.
          </div>
          <div id="evTplAddAttendeeBox" style="background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:10px">
            <div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">Voeg toe als aanwezige op een event</div>
            <div style="display:flex;gap:8px;align-items:stretch;flex-wrap:wrap">
              <select id="evTplAddEventSel" style="flex:1;min-width:220px;padding:7px 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px">
                <option value="">Events laden…</option>
              </select>
              <button class="btn-primary" id="evTplAddBtn" type="button" disabled style="white-space:nowrap"><i class="ti ti-user-plus"></i> Toevoegen + selecteren</button>
            </div>
            <div id="evTplAddMsg" style="font-size:11.5px;color:var(--text-faint);margin-top:6px"></div>
          </div>
        `;
      } else {
        eventCtxHtml = `
          <div style="background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#b91c1c;border-radius:8px;padding:10px;font-size:12.5px;margin-bottom:10px">
            <strong>Geen aanwezige gekoppeld.</strong> Deze template gebruikt aanwezige- of event-variabelen, maar deze persoon staat (nog) niet als aanwezige op een event. Voeg 'm toe via de aanwezigen-tab op het betreffende event-detail, of vraag een collega met de juiste rechten.
          </div>
        `;
      }
    } else if (cands.length === 1) {
      const c = cands[0];
      const optTxt = _evFmtAttendeeOption(c);
      const missingLink = needsChoiceLink && !c.has_choice_token;
      eventCtxHtml = `
        <div style="background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12.5px;margin-bottom:10px">
          <div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Voor</div>
          <div>${esc(optTxt)}</div>
          ${missingLink ? '<div style="margin-top:6px;color:#b91c1c;font-size:11.5px"><i class="ti ti-alert-triangle"></i> Deze aanwezige heeft geen keuze-link; verstuur niet mogelijk.</div>' : ''}
        </div>
      `;
    } else {
      const options = cands.map((c) => {
        const dis  = needsChoiceLink && !c.has_choice_token ? ' disabled' : '';
        const txt  = _evFmtAttendeeOption(c) + (dis ? ' — (geen keuze-link)' : '');
        const sel  = c.attendee_id === _evTplState.selectedAttendeeId ? ' selected' : '';
        return `<option value="${esc(c.attendee_id)}"${sel}${dis}>${esc(txt)}</option>`;
      }).join('');
      eventCtxHtml = `
        <label style="display:block;font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Aanwezige</label>
        <select id="evTplAttendeeSel" style="width:100%;padding:7px 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;margin-bottom:10px">
          ${options}
        </select>
      `;
    }
  }

  body.innerHTML = `
    <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:8px">Preview (server vult variabelen automatisch in vanuit klant/factuur/bedrijf/datum${needsEventCtx ? '/aanwezige/event' : ''}):</div>
    <div style="background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12.5px;color:var(--text);white-space:pre-wrap;margin-bottom:10px">${esc(tpl.body_text || '')}</div>
    ${eventCtxHtml}
    ${hint ? `<div style="font-size:11.5px;color:var(--text-faint);margin-bottom:8px">${esc(hint)}</div>` : ''}
    <div class="evx-modal-footer">
      <button class="sr-btn" id="evTplBackBtn" type="button" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer">Terug</button>
      <button class="btn-primary" id="evTplSendBtn" type="button"${blocked ? ' disabled style="opacity:.5;cursor:not-allowed"' : ''}><i class="ti ti-send"></i> Versturen</button>
    </div>
  `;
  document.getElementById('evTplBackBtn').addEventListener('click', () => _renderTplListView());
  const sel = document.getElementById('evTplAttendeeSel');
  if (sel) {
    sel.addEventListener('change', (e) => {
      _evTplState.selectedAttendeeId = e.target.value || null;
      // Re-render zodat de send-knop opnieuw evalueert (choice-token-disable).
      _renderTplConfirmView(tpl, hint);
    });
  }
  // 0-kandidaten + canCreateAttendee: hydrateer event-dropdown en wire button.
  const addBox = document.getElementById('evTplAddAttendeeBox');
  if (addBox) {
    const evSel  = document.getElementById('evTplAddEventSel');
    const addBtn = document.getElementById('evTplAddBtn');
    const msg    = document.getElementById('evTplAddMsg');
    _evLoadPublishedEventsForAdd().then((events) => {
      if (!evSel) return;
      if (!events || events.length === 0) {
        evSel.innerHTML = '<option value="">Geen toekomstige events gevonden</option>';
        if (addBtn) addBtn.disabled = true;
        return;
      }
      const opts = events.map((ev) => {
        const dateStr = ev.starts_at
          ? new Date(ev.starts_at).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' })
          : '';
        const cap = (typeof ev.attendee_count_active === 'number' && typeof ev.capacity === 'number')
          ? ` (${ev.attendee_count_active}/${ev.capacity})`
          : '';
        const label = (ev.title || '(zonder titel)') + (dateStr ? ' · ' + dateStr : '') + cap;
        return '<option value="' + esc(ev.id) + '">' + esc(label) + '</option>';
      });
      evSel.innerHTML = '<option value="">— kies event —</option>' + opts.join('');
      if (addBtn) addBtn.disabled = true;
      evSel.addEventListener('change', (e) => {
        if (addBtn) addBtn.disabled = !e.target.value;
      });
    });
    if (addBtn) {
      addBtn.addEventListener('click', async () => {
        if (addBtn.disabled) return;
        const eventId = evSel && evSel.value || '';
        if (!eventId) return;
        addBtn.disabled = true;
        addBtn.innerHTML = '<i class="ti ti-loader-2"></i> Toevoegen…';
        if (msg) { msg.style.color = 'var(--text-faint)'; msg.textContent = ''; }
        const result = await _evAddAttendeeFromInbox(eventId);
        if (!result.ok) {
          if (msg) {
            msg.style.color = '#b91c1c';
            msg.textContent = 'Toevoegen mislukt: ' + (result.error || 'onbekende fout');
          }
          addBtn.disabled = false;
          addBtn.innerHTML = '<i class="ti ti-user-plus"></i> Toevoegen + selecteren';
          return;
        }
        // Succes: bouw het kandidaat-object DIRECT uit de POST-response
        // (geen client-side re-resolve via window.supabase nodig — dat pad
        // is afhankelijk van een SELECT-policy op event_attendees voor de
        // 'authenticated' rol die er momenteel niet is; alle nieuwe
        // policies van de F1-foundation laten anon/authenticated 'niets
        // lezen/muteren' en het API-pad bypassed RLS via service_role).
        // Hierdoor schuift de UI altijd door naar "Voor: …" + enabled
        // Versturen, ongeacht of RLS later wel/niet wordt opengezet.
        const att = result.attendee || {};
        const selectedEvent = (window._evTplPubEventsCache || []).find((e) => e.id === eventId) || null;
        const fullName = [att.first_name, att.last_name].filter(Boolean).join(' ').trim()
          || att.email || att.phone || '—';
        const newCand = {
          attendee_id      : att.id,
          attendee_name    : fullName,
          attendee_email   : att.email || '',
          attendee_phone   : att.phone || '',
          has_choice_token : !!att.choice_token,
          event_id         : att.event_id || (selectedEvent && selectedEvent.id) || eventId,
          event_title      : selectedEvent ? (selectedEvent.title || '') : '',
          event_starts_at  : selectedEvent ? selectedEvent.starts_at : null,
          event_status     : selectedEvent ? (selectedEvent.status || '') : '',
        };
        _evTplState.attendeeCandidates = [newCand];
        _evTplState.attendeeCandidatesLoaded = true;
        _evTplState.selectedAttendeeId = newCand.attendee_id;
        _renderTplConfirmView(tpl, null);
      });
    }
  }
  document.getElementById('evTplSendBtn').addEventListener('click', () => {
    if (blocked) return;

async function sendTemplate(tpl, variables) {
  const convId = _evState.convId;

  const sendBtn = document.getElementById('evTplSendBtn');
  if (sendBtn) { sendBtn.disabled = true; sendBtn.innerHTML = '…Versturen'; }
  try {
    // FEATURE event-aware: stuur context_event_attendee_id mee als de
    // template attendee.* / event.* gebruikt en we een selectie hebben.
    // Templates zonder event-vars sturen 'm niet mee (achterwaarts compat).
    const sendBody = {
      conversation_id: convId,
      template_name  : tpl.name,
      language       : tpl.language || 'nl',
      variables      : variables || {},
    };
    if (_evTplNeedsEventContext(tpl) && _evTplState.selectedAttendeeId) {
      sendBody.context_event_attendee_id = _evTplState.selectedAttendeeId;

    const r = await window.AgentShared.apiFetch('/api/inbox-send-template', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sendBody),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      window.AgentShared.showToast(j.error || ('HTTP ' + r.status), 'error');
      if (sendBtn) { sendBtn.disabled = false; sendBtn.innerHTML = '<i class="ti ti-send"></i> Versturen'; }

    window.AgentShared.showToast(e.message, 'error');
    if (sendBtn) { sendBtn.disabled = false; sendBtn.innerHTML = '<i class="ti ti-send"></i> Versturen'; }
  }
}
