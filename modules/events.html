let _aqItems       = [];
let _aqEditingId   = null;

function aqBanner(kind, text, autoMs) {
  const el = document.getElementById('assessmentQuestionsBanner');
  if (!el) return;
  const bg = kind === 'success' ? 'rgba(5,150,105,.10)' : 'rgba(220,38,38,.10)';
  const fg = kind === 'success' ? '#059669' : '#b91c1c';
  el.style.background = bg; el.style.color = fg; el.style.border = '1px solid ' + fg + '40';
  el.textContent = text;
  el.style.display = '';
  if (autoMs) setTimeout(() => { el.style.display = 'none'; }, autoMs);
}

async function loadAssessmentQuestions() {
  const wrap = document.getElementById('assessmentQuestionsList');
  if (!wrap) return;
  wrap.innerHTML = '<div style="font-size:12.5px;color:var(--text-faint)">Laden…</div>';
  try {
    // FEATURE C: filter op de geselecteerde vragenlijst (of fall-back op actief
    // server-side als _qqState nog niet geïnitialiseerd is).
    const qid = (window._qqState && window._qqState.selectedId) || null;
    const url = '/api/admin-assessment-questions-list'
      + (qid ? '?questionnaire_id=' + encodeURIComponent(qid) : '');
    const r = await window.AgentShared.apiFetch(url);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      wrap.innerHTML = '<div style="color:#b91c1c;font-size:13px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    const j = await r.json();
    _aqItems = Array.isArray(j.questions) ? j.questions : [];
    renderAssessmentQuestionsList();
  } catch (e) {
    wrap.innerHTML = '<div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div>';
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// FEATURE C (PR-Cfrontend) — multi-questionnaire UI
// State + helpers voor de "Vragenlijst"-sectie: selector + Nieuwe/Hernoemen/
// Actief zetten + sub-tabs "Vragen" / "Puntensysteem". Endpoints uit PR-Cbackend:
//   - /api/assessment-questionnaires-list      (GET)
//   - /api/assessment-questionnaires-create    (POST {slug, name})
//   - /api/assessment-questionnaires-update    (PATCH ?id= {name | drempels})
//   - /api/assessment-questionnaires-activate  (POST {id})
// Geen RBAC-/endpoint-wijziging — alles op admin.joost_config.
// ──────────────────────────────────────────────────────────────────────────────
window._qqState = window._qqState || {
  loaded: false,
  items: [],
  selectedId: null,
  activeSubTab: 'questions',
};

function qqShowBanner(host, type, msg) {
  const el = document.getElementById(host);
  if (!el) return;
  const palette = type === 'error'
    ? 'background:rgba(220,38,38,.12);color:#b91c1c;border:1px solid rgba(220,38,38,.3)'
    : 'background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3)';
  el.style.cssText = 'display:block;margin:0 0 10px;padding:10px 14px;border-radius:8px;font-size:13px;' + palette;
  el.textContent = msg;
}

function qqHideBanner(host) {
  const el = document.getElementById(host);
  if (el) el.style.display = 'none';
}

function qqGetSelected() {
  if (!window._qqState.selectedId) return null;
  return window._qqState.items.find((it) => it.id === window._qqState.selectedId) || null;
}

async function qqLoadList() {
  const sel = document.getElementById('qqSelector');
  if (!sel) return;
  sel.innerHTML = '<option value="">Laden…</option>';
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-list');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      sel.innerHTML = '<option value="">Fout</option>';
      qqShowBanner('assessmentQuestionsBanner', 'error', 'Vragenlijsten laden mislukt: ' + (j.error || ('HTTP ' + r.status)));
      return;
    }
    const j = await r.json();
    window._qqState.items = Array.isArray(j.items) ? j.items : [];
    window._qqState.loaded = true;

    // Selectie bepalen: behoud huidige als die nog bestaat, anders pak actief,
    // anders eerste item.
    let target = null;
    if (window._qqState.selectedId) {
      target = window._qqState.items.find((it) => it.id === window._qqState.selectedId) || null;
    }
    if (!target) target = window._qqState.items.find((it) => it.is_active) || null;
    if (!target && window._qqState.items.length > 0) target = window._qqState.items[0];
    window._qqState.selectedId = target ? target.id : null;

    qqRenderSelector();
    // Laad afgeleide content voor de geselecteerde vragenlijst.
    loadAssessmentQuestions();
    qqLoadThresholds();
  } catch (e) {
    sel.innerHTML = '<option value="">Fout</option>';
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Vragenlijsten laden mislukt: ' + e.message);
  }
}

function qqRenderSelector() {
  const sel = document.getElementById('qqSelector');
  const badge = document.getElementById('qqActiveBadge');
  const actBtn = document.getElementById('qqActivateBtn');
  if (!sel) return;
  if (window._qqState.items.length === 0) {
    sel.innerHTML = '<option value="">(geen vragenlijsten)</option>';
    if (badge) badge.style.display = 'none';
    if (actBtn) actBtn.disabled = true;
    return;
  }
  sel.innerHTML = window._qqState.items.map((it) => ''
    + '<option value="' + esc(it.id) + '"' + (it.id === window._qqState.selectedId ? ' selected' : '') + '>'
    +   esc(it.name) + ' (' + esc(it.slug) + ')'
    +   (it.is_active ? ' — actief' : '')
    + '</option>'
  ).join('');
  const selected = qqGetSelected();
  if (badge) badge.style.display = (selected && selected.is_active) ? 'inline-flex' : 'none';
  if (actBtn) actBtn.disabled = !!(selected && selected.is_active);
}

function qqOnSelectorChange() {
  const sel = document.getElementById('qqSelector');
  if (!sel) return;
  window._qqState.selectedId = sel.value || null;
  qqRenderSelector();
  qqHideBanner('assessmentQuestionsBanner');
  qqHideBanner('qqScoringBanner');
  loadAssessmentQuestions();
  qqLoadThresholds();
}

async function qqNewQuestionnaire() {
  qqHideBanner('assessmentQuestionsBanner');
  const name = (prompt('Naam van de nieuwe vragenlijst (bv. "Forex 2026 — variant A")') || '').trim();
  if (!name) return;
  const slugDefault = name.toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64) || 'vragenlijst';
  const slug = (prompt('Slug (lowercase a-z0-9_-)', slugDefault) || '').trim();
  if (!slug) return;
  if (!/^[a-z0-9_-]{1,64}$/.test(slug)) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Slug ongeldig: alleen lowercase a-z0-9_- en max 64 chars.');
    return;
  }
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-create', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slug, name }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('assessmentQuestionsBanner', 'error', j.error || ('HTTP ' + r.status));
      return;
    }
    qqShowBanner('assessmentQuestionsBanner', 'success', 'Vragenlijst "' + name + '" aangemaakt. Voeg vragen toe en zet hem actief wanneer klaar.');
    window._qqState.selectedId = j.item?.id || null;
    await qqLoadList();
  } catch (e) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Aanmaken mislukt: ' + e.message);
  }
}

async function qqRenameQuestionnaire() {
  qqHideBanner('assessmentQuestionsBanner');
  const cur = qqGetSelected();
  if (!cur) return;
  const next = (prompt('Nieuwe naam voor "' + cur.name + '":', cur.name) || '').trim();
  if (!next || next === cur.name) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-update?id=' + encodeURIComponent(cur.id), {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: next }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('assessmentQuestionsBanner', 'error', j.error || ('HTTP ' + r.status));
      return;
    }
    qqShowBanner('assessmentQuestionsBanner', 'success', 'Hernoemd naar "' + next + '".');
    await qqLoadList();
  } catch (e) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Hernoemen mislukt: ' + e.message);
  }
}

async function qqActivateQuestionnaire() {
  qqHideBanner('assessmentQuestionsBanner');
  const cur = qqGetSelected();
  if (!cur) return;
  if (cur.is_active) return;
  if (!confirm('"' + cur.name + '" als actieve vragenlijst zetten? De publieke flow gaat dan deze set serveren.')) return;
  const btn = document.getElementById('qqActivateBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-activate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: cur.id }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('assessmentQuestionsBanner', 'error', j.error || ('HTTP ' + r.status));
      if (btn) btn.disabled = false;
      return;
    }
    qqShowBanner('assessmentQuestionsBanner', 'success', '"' + cur.name + '" is nu actief.');
    await qqLoadList();
  } catch (e) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Activeren mislukt: ' + e.message);
    if (btn) btn.disabled = false;
  }
}

function qqSelectSubTab(name) {
  if (name !== 'questions' && name !== 'scoring') return;
  window._qqState.activeSubTab = name;
  document.querySelectorAll('#qqSubTabs .qq-subtab').forEach((b) => {
    b.classList.toggle('active', b.dataset.qqsub === name);
  });
  document.querySelectorAll('.qq-subpane[data-qqsubpane]').forEach((p) => {
    p.classList.toggle('active', p.dataset.qqsubpane === name);
  });
}

function qqLoadThresholds() {
  qqHideBanner('qqScoringBanner');
  const cur = qqGetSelected();
  const inG = document.getElementById('qqGevorderd');
  const inM = document.getElementById('qqMotivatie');
  const inL = document.getElementById('qqLowMid');
  if (!inG || !inM || !inL) return;
  if (!cur) {
    inG.value = ''; inM.value = ''; inL.value = '';
    qqRenderBands();
    return;
  }
  inG.value = Number.isFinite(cur.gevorderd_threshold) ? cur.gevorderd_threshold : '';
  inM.value = Number.isFinite(cur.motivatie_floor)     ? cur.motivatie_floor     : '';
  inL.value = Number.isFinite(cur.low_mid_threshold)   ? cur.low_mid_threshold   : '';
  qqRenderBands();
}

function qqRenderBands() {
  const host = document.getElementById('qqBandPreview');
  if (!host) return;
  const g = Number(document.getElementById('qqGevorderd')?.value);
  const m = Number(document.getElementById('qqMotivatie')?.value);
  const l = Number(document.getElementById('qqLowMid')?.value);
  if (!Number.isFinite(g) || !Number.isFinite(m) || !Number.isFinite(l)) {
    host.innerHTML = '<div style="font-size:12px;color:var(--text-faint)">Vul alle drie de drempels in om de bands te zien.</div>';
    return;
  }
  // Sanity-warnings (niet-blokkerend, want server accepteert elke waarde >= 0).
  const warns = [];
  if (l >= g) warns.push('Low-mid (' + l + ') ligt op of boven Gevorderd (' + g + ') — de mid-band is leeg.');
  if (m < 0 || m > 10) warns.push('Motivatie-floor (' + m + ') hoort tussen 0 en 10 te liggen.');
  host.innerHTML = ''
    + '<div class="qq-band-row">'
    +   '<div class="qq-band-lbl">basis-low</div>'
    +   '<div class="qq-band-desc">skill-score &lt; <strong>' + l + '</strong> &nbsp;→&nbsp; routing <code>basis</code> · copy-tier <em>low</em></div>'
    +   '<span class="qq-band-tag low">low</span>'
    + '</div>'
    + '<div class="qq-band-row">'
    +   '<div class="qq-band-lbl">basis-mid</div>'
    +   '<div class="qq-band-desc">skill-score in [<strong>' + l + '</strong> .. ' + Math.max(g - 1, l) + '] &nbsp;<em>of</em>&nbsp; skill ≥ ' + g + ' maar motivatie &lt; ' + m + ' / uitspraak=gratis_info &nbsp;→&nbsp; routing <code>basis</code> · copy-tier <em>mid</em></div>'
    +   '<span class="qq-band-tag mid">mid</span>'
    + '</div>'
    + '<div class="qq-band-row">'
    +   '<div class="qq-band-lbl">gevorderd</div>'
    +   '<div class="qq-band-desc">skill-score ≥ <strong>' + g + '</strong> &nbsp;&amp;&nbsp; motivatie ≥ <strong>' + m + '</strong> &nbsp;&amp;&nbsp; uitspraak ≠ gratis_info &nbsp;→&nbsp; routing <code>gevorderd</code> · copy-tier <em>high</em></div>'
    +   '<span class="qq-band-tag high">high</span>'
    + '</div>'
    + (warns.length ? '<div style="margin-top:8px;font-size:11.5px;color:#b45309">⚠ ' + warns.map(esc).join(' &nbsp;·&nbsp; ') + '</div>' : '');
}

async function qqSaveThresholds() {
  qqHideBanner('qqScoringBanner');
  const cur = qqGetSelected();
  if (!cur) {
    qqShowBanner('qqScoringBanner', 'error', 'Geen vragenlijst geselecteerd.');
    return;
  }
  const g = Number(document.getElementById('qqGevorderd').value);
  const m = Number(document.getElementById('qqMotivatie').value);
  const l = Number(document.getElementById('qqLowMid').value);
  for (const [label, v] of [['Gevorderd-drempel', g], ['Motivatie-floor', m], ['Low-mid-drempel', l]]) {
    if (!Number.isInteger(v) || v < 0) {
      qqShowBanner('qqScoringBanner', 'error', label + ' moet een integer >= 0 zijn.');
      return;
    }
  }
  const btn = document.getElementById('qqSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Opslaan…'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-update?id=' + encodeURIComponent(cur.id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gevorderd_threshold: g,
        motivatie_floor    : m,
        low_mid_threshold  : l,
      }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('qqScoringBanner', 'error', j.error || ('HTTP ' + r.status));
      return;
    }
    // Update lokale state met de geretourneerde rij.
    const idx = window._qqState.items.findIndex((it) => it.id === cur.id);
    if (idx >= 0 && j.item) window._qqState.items[idx] = { ...window._qqState.items[idx], ...j.item };
    qqShowBanner('qqScoringBanner', 'success', 'Drempels opgeslagen. Nieuwe submissies gebruiken vanaf nu deze waarden.');
  } catch (e) {
    qqShowBanner('qqScoringBanner', 'error', 'Opslaan mislukt: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> Opslaan'; }
  }
}

// Wire de sub-tab-strip (idempotent — _wired vlag voorkomt dubbele handlers).
function _qqWireSubTabs() {
  if (_qqWireSubTabs._wired) return;
  const tabs = document.querySelectorAll('#qqSubTabs .qq-subtab');
  if (!tabs.length) return;
  tabs.forEach((btn) => {
    btn.addEventListener('click', () => qqSelectSubTab(btn.dataset.qqsub));
  });
  _qqWireSubTabs._wired = true;
}

function renderAssessmentQuestionsList() {
  const wrap = document.getElementById('assessmentQuestionsList');
  if (!wrap) return;
  if (_aqItems.length === 0) {
    wrap.innerHTML = '<div style="font-size:12.5px;color:var(--text-faint);padding:14px">Nog geen vragen — klik op + Nieuwe vraag.</div>';
    return;
  }
  const groups = {};
  const sectionOrder = [];
  for (const q of _aqItems) {
    const s = q.section || '(geen sectie)';
    if (!groups[s]) { groups[s] = []; sectionOrder.push(s); }
    groups[s].push(q);
  }
  wrap.innerHTML = sectionOrder.map(sec => {
    const items = groups[sec];
    return ''
      + '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">'
      +   '<div style="padding:10px 14px;background:rgba(0,0,0,.04);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim)">' + esc(sec) + ' (' + items.length + ')</div>'
      +   items.map((q, idx) => renderAssessmentQuestionRow(q, idx, items.length)).join('')
      + '</div>';
  }).join('');
}

function renderAssessmentQuestionRow(q, idxInSection, totalInSection) {
  const dimStyle = q.active ? '' : 'opacity:0.55';
  const badges = []
    .concat(q.is_routing ? ['<span style="font-size:10px;font-weight:600;background:rgba(99,102,241,.15);color:#6366f1;padding:2px 6px;border-radius:999px">routing</span>'] : [])
    .concat(q.required ? ['<span style="font-size:10px;font-weight:600;background:rgba(220,38,38,.12);color:#dc2626;padding:2px 6px;border-radius:999px">verplicht</span>'] : [])
    .concat(!q.active ? ['<span style="font-size:10px;font-weight:600;background:rgba(107,114,128,.15);color:#6b7280;padding:2px 6px;border-radius:999px">inactive</span>'] : [])
    .join(' ');
  const reorderUp   = idxInSection > 0 ? '<button class="btn btn-sm" type="button" onclick="reorderAssessmentQuestion(\'' + esc(q.id) + '\', -1)" title="Omhoog"><i class="ti ti-chevron-up"></i></button>' : '<span style="display:inline-block;width:30px"></span>';
  const reorderDown = idxInSection < totalInSection - 1 ? '<button class="btn btn-sm" type="button" onclick="reorderAssessmentQuestion(\'' + esc(q.id) + '\', +1)" title="Omlaag"><i class="ti ti-chevron-down"></i></button>' : '<span style="display:inline-block;width:30px"></span>';
  const toggleLabel = q.active ? 'Deactiveer' : 'Activeer';
  return ''
    + '<div style="display:grid;grid-template-columns:80px 1fr auto auto;gap:10px;align-items:center;padding:10px 14px;border-top:1px solid var(--border);' + dimStyle + '">'
    +   '<div style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--text-faint)">#' + esc(q.order_index) + '</div>'
    +   '<div>'
    +     '<div style="font-size:13.5px;font-weight:600">' + esc(q.label) + '</div>'
    +     '<div style="font-size:11.5px;color:var(--text-faint);margin-top:2px">'
    +       '<code style="font-family:ui-monospace,Menlo,Consolas,monospace">' + esc(q.key) + '</code>'
    +       ' · ' + esc(q.type)
    +       (q.type === 'open_text' && q.min_words ? ' · min ' + esc(q.min_words) + ' woorden' : '')
    +       (Array.isArray(q.options) ? ' · ' + q.options.length + ' opties' : '')
    +       ' ' + badges
    +     '</div>'
    +   '</div>'
    +   '<div style="display:flex;gap:4px">' + reorderUp + reorderDown + '</div>'
    +   '<div style="display:flex;gap:4px">'
    +     '<button class="btn btn-sm" type="button" onclick="openAssessmentQuestionEdit(\'' + esc(q.id) + '\')"><i class="ti ti-edit"></i></button>'
    +     '<button class="btn btn-sm" type="button" onclick="toggleAssessmentQuestionActive(\'' + esc(q.id) + '\')" title="' + toggleLabel + '"><i class="ti ti-' + (q.active ? 'eye-off' : 'eye') + '"></i></button>'
    +   '</div>'
    + '</div>';
}

let _aqOptionRows  = [];
let _aqScaleWeights = {};

function _aqSlugify(input) {
  if (input == null) return 'vraag';
  const s = String(input)
    .toLowerCase()
    .normalize('NFKD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '')
    .slice(0, 64);
  return s.length ? s : 'vraag';
}

function _aqUnlockKey() {
  const keyEl  = document.getElementById('aqKey');
  const badge  = document.getElementById('aqKeyAutoBadge');
  const btn    = document.getElementById('aqKeyEditBtn');
  if (!keyEl) return;
  keyEl.removeAttribute('readonly');
  keyEl.style.background = '';
  keyEl.style.color = '';
  keyEl.focus();
  keyEl.select();
  if (badge) badge.style.display = 'none';
  if (btn)   btn.style.display = 'none';
  keyEl.dataset.aqAuto = '0';
}

function _aqSyncKeyFromLabel() {
  const labelEl = document.getElementById('aqLabel');
  const keyEl   = document.getElementById('aqKey');
  if (!labelEl || !keyEl) return;
  if (keyEl.dataset.aqAuto !== '1') return;
  keyEl.value = _aqSlugify(labelEl.value);
}

function _aqAddOptionRow(value, label, points, isOriginal) {
  _aqOptionRows.push({
    value     : value || '',
    label     : label || '',
    points    : (typeof points === 'number' && Number.isFinite(points)) ? points : 0,
    isOriginal: !!isOriginal,
  });
  _aqRenderOptionRows();
  const rows = document.querySelectorAll('#aqOptionsRows .aq-opt-row');
  const last = rows[rows.length - 1];
  const inp = last && last.querySelector('.aq-opt-label');
  if (inp) inp.focus();
}

function _aqRemoveOptionRow(idx) {
  if (idx < 0 || idx >= _aqOptionRows.length) return;
  _aqOptionRows.splice(idx, 1);
  _aqRenderOptionRows();
  _aqRenderPreview();
}

function _aqRenderOptionRows() {
  const host = document.getElementById('aqOptionsRows');
  if (!host) return;
  const isRouting = document.getElementById('aqIsRouting')?.checked;
  if (_aqOptionRows.length === 0) {
    host.innerHTML = '<div style="font-size:12px;color:var(--text-faint);padding:6px 0">Nog geen opties — klik op "Optie toevoegen".</div>';
    return;
  }
  host.innerHTML = _aqOptionRows.map((row, idx) => {
    const lockTitle = row.isOriginal
      ? 'Bestaande optie — de interne sleutel (value) blijft ongewijzigd bij hernoemen.'
      : 'Nieuwe optie — de interne sleutel wordt afgeleid uit het label.';
    const valHint = row.value
      ? `<span style="font-size:10.5px;color:var(--text-faint);margin-left:6px" title="${row.isOriginal ? 'Bewaard' : 'Wordt opgeslagen'}">${row.isOriginal ? '🔒 ' : '↳ '}${row.value}</span>`
      : '';
    const pointsField = isRouting
      ? `<input type="number" class="form-input aq-opt-points" data-idx="${idx}" step="1" value="${Number.isFinite(row.points) ? row.points : 0}" title="Punten" style="width:80px" />`
      : '';
    return `
      <div class="aq-opt-row" data-idx="${idx}" style="display:flex;gap:6px;align-items:center" title="${lockTitle}">
        <input type="text" class="form-input aq-opt-label" data-idx="${idx}" value="${(row.label || '').replace(/"/g, '&quot;')}" maxlength="200" placeholder="Optie-tekst" style="flex:1" />
        ${pointsField}
        <button type="button" class="btn btn-sm" data-idx="${idx}" onclick="_aqRemoveOptionRow(${idx})" title="Verwijderen"><i class="ti ti-x"></i></button>
        ${valHint ? `<div style="min-width:90px">${valHint}</div>` : '<div style="min-width:90px"></div>'}
      </div>
    `;
  }).join('');
  host.querySelectorAll('.aq-opt-label').forEach((el) => {
    el.addEventListener('input', () => {
      const idx = Number(el.dataset.idx);
      if (!_aqOptionRows[idx]) return;
      _aqOptionRows[idx].label = el.value;
      if (!_aqOptionRows[idx].isOriginal) {
        _aqOptionRows[idx].value = _aqSlugify(el.value);
        const hint = el.closest('.aq-opt-row').querySelector('span');
        if (hint) hint.textContent = '↳ ' + (_aqOptionRows[idx].value || '');
      }
      _aqRenderPreview();
    });
  });
  host.querySelectorAll('.aq-opt-points').forEach((el) => {
    el.addEventListener('input', () => {
      const idx = Number(el.dataset.idx);
      if (!_aqOptionRows[idx]) return;
      const n = Number(el.value);
      _aqOptionRows[idx].points = Number.isFinite(n) ? n : 0;
    });
  });
}

function _aqRenderScaleWeights() {
  const host = document.getElementById('aqScaleWeightsRows');
  if (!host) return;
  const type = document.getElementById('aqType').value;
  const max  = type === 'scale_1_10' ? 10 : (type === 'scale_1_5' ? 5 : 0);
  if (max === 0) { host.innerHTML = ''; return; }
  host.innerHTML = '';
  for (let i = 1; i <= max; i++) {
    const key = String(i);
    if (!(key in _aqScaleWeights)) _aqScaleWeights[key] = i - 1;
    const val = _aqScaleWeights[key];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg)';
    wrap.innerHTML = `
      <span style="font-size:12px;font-weight:600;color:var(--text-dim);min-width:18px;text-align:center">${i}</span>
      <input type="number" class="form-input aq-scale-w" data-step="${key}" step="1" value="${val}" style="width:64px" />
    `;
    host.appendChild(wrap);
  }
  host.querySelectorAll('.aq-scale-w').forEach((el) => {
    el.addEventListener('input', () => {
      const step = el.dataset.step;
      const n = Number(el.value);
      _aqScaleWeights[step] = Number.isFinite(n) ? n : 0;
    });
  });
}

function _aqRenderPreview() {
  const wrap = document.getElementById('aqPreviewWrap');
  const toggle = document.getElementById('aqPreviewToggle');
  if (!wrap || !toggle) return;
  if (!toggle.checked) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const escHtml = (s) => (s == null ? '' : String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;'));

  const type    = document.getElementById('aqType').value;
  const label   = document.getElementById('aqLabel').value.trim() || '(geen vraag-label)';
  const help    = document.getElementById('aqHelpText').value.trim();
  const req     = !!document.getElementById('aqRequired').checked;
  const required = req ? '<span style="color:#dc2626;font-weight:700;margin-left:4px">*</span>' : '';

  let inputHtml = '';
  if (type === 'text' || type === 'email') {
    const ph = type === 'email' ? 'naam@voorbeeld.nl' : '';
    inputHtml = `<input type="${escHtml(type)}" class="form-input" disabled placeholder="${escHtml(ph)}" />`;
  } else if (type === 'radio') {
    if (_aqOptionRows.length === 0) {
      inputHtml = '<div style="font-size:12px;color:var(--text-faint)">Voeg opties toe om de preview te zien.</div>';
    } else {
      inputHtml = '<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">' +
        _aqOptionRows.map((o, i) => `
          <label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;cursor:not-allowed;background:var(--bg)">
            <input type="radio" name="aq-preview" disabled />
            <span>${escHtml(o.label || '(zonder label)')}</span>
          </label>
        `).join('') +
      '</div>';
    }
  } else if (type === 'scale_1_5' || type === 'scale_1_10') {
    const max = type === 'scale_1_10' ? 10 : 5;
    let chips = '';
    for (let i = 1; i <= max; i++) {
      chips += `<label style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:1px solid var(--border);border-radius:99px;cursor:not-allowed;background:var(--bg);font-size:12px;font-weight:600">
        <span>${i}</span>
        <input type="radio" name="aq-preview-scale" disabled style="margin:0" />
      </label>`;
    }
    inputHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">' + chips + '</div>';
  } else if (type === 'open_text') {
    const mw = document.getElementById('aqMinWords').value;
    const note = (mw && Number(mw) > 0) ? `<div style="font-size:11px;color:var(--text-faint);margin-top:4px">Minimaal ${escHtml(mw)} woorden.</div>` : '';
    inputHtml = `<textarea class="form-input" disabled rows="4" placeholder="Antwoord van de deelnemer…"></textarea>${note}`;
  }

  wrap.innerHTML = `
    <div style="font-size:13.5px;font-weight:700;margin-bottom:4px">${escHtml(label)}${required}</div>
    ${help ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(help)}</div>` : ''}
    ${inputHtml}
  `;
}

function openAssessmentQuestionEdit(id) {
  _aqEditingId = id || null;
  const tpl = id ? (_aqItems.find(x => x.id === id) || null) : null;
  document.getElementById('assessmentQuestionModalTitle').textContent = tpl ? 'Vraag bewerken' : 'Nieuwe vraag';
  document.getElementById('assessmentQuestionEditError').style.display = 'none';

  const keyEl   = document.getElementById('aqKey');
  const keyBtn  = document.getElementById('aqKeyEditBtn');
  const keyBadge = document.getElementById('aqKeyAutoBadge');
  keyEl.value = tpl ? tpl.key : '';
  if (tpl) {
    keyEl.setAttribute('readonly', 'readonly');
    keyEl.disabled = true;
    keyEl.style.background = 'var(--bg-elev-2,#f8f8f8)';
    keyEl.style.color = 'var(--text-dim)';
    keyEl.dataset.aqAuto = '0';
    if (keyBtn)   keyBtn.style.display = 'none';
    if (keyBadge) { keyBadge.textContent = '(vast)'; keyBadge.style.display = ''; }
  } else {
    keyEl.disabled = false;
    keyEl.setAttribute('readonly', 'readonly');
    keyEl.style.background = 'var(--bg-elev-2,#f8f8f8)';
    keyEl.style.color = 'var(--text-dim)';
    keyEl.dataset.aqAuto = '1';
    if (keyBtn)   keyBtn.style.display = '';
    if (keyBadge) { keyBadge.textContent = '(automatisch)'; keyBadge.style.display = ''; }
  }

  document.getElementById('aqSection').value     = tpl ? (tpl.section || '') : '';
  document.getElementById('aqType').value        = tpl ? tpl.type : 'text';
  document.getElementById('aqOrderIndex').value  = tpl ? tpl.order_index : 0;
  document.getElementById('aqLabel').value       = tpl ? tpl.label : '';
  document.getElementById('aqHelpText').value    = tpl && tpl.help_text ? tpl.help_text : '';
  document.getElementById('aqRequired').checked  = tpl ? !!tpl.required : true;
  document.getElementById('aqActive').checked    = tpl ? !!tpl.active   : true;
  document.getElementById('aqIsRouting').checked = tpl ? !!tpl.is_routing : false;
  document.getElementById('aqMinWords').value    = tpl && tpl.min_words != null ? tpl.min_words : '';

  _aqOptionRows = [];
  if (tpl && Array.isArray(tpl.options) && tpl.type === 'radio') {
    const rw = (tpl.routing_weights && typeof tpl.routing_weights === 'object' && !Array.isArray(tpl.routing_weights))
      ? tpl.routing_weights : {};
    for (const o of tpl.options) {
      if (!o || typeof o.value !== 'string' || typeof o.label !== 'string') continue;
      const pts = (typeof rw[o.value] === 'number' && Number.isFinite(rw[o.value])) ? rw[o.value] : 0;
      _aqOptionRows.push({ value: o.value, label: o.label, points: pts, isOriginal: true });
    }
  }

  _aqScaleWeights = {};
  if (tpl && (tpl.type === 'scale_1_5' || tpl.type === 'scale_1_10')) {
    const rw = (tpl.routing_weights && typeof tpl.routing_weights === 'object' && !Array.isArray(tpl.routing_weights))
      ? tpl.routing_weights : {};
    const max = tpl.type === 'scale_1_10' ? 10 : 5;
    for (let i = 1; i <= max; i++) {
      const k = String(i);
      _aqScaleWeights[k] = (typeof rw[k] === 'number' && Number.isFinite(rw[k])) ? rw[k] : (i - 1);
    }
  }

  const pt = document.getElementById('aqPreviewToggle');
  if (pt) pt.checked = false;
  const pw = document.getElementById('aqPreviewWrap');
  if (pw) pw.style.display = 'none';

  if (!openAssessmentQuestionEdit._wired) {
    document.getElementById('aqType').addEventListener('change', _aqUpdateConditionalGroups);
    document.getElementById('aqIsRouting').addEventListener('change', () => {
      _aqRenderOptionRows();
      _aqUpdateConditionalGroups();
    });
    document.getElementById('aqLabel').addEventListener('input', () => {
      _aqSyncKeyFromLabel();
      _aqRenderPreview();
    });
    document.getElementById('aqHelpText').addEventListener('input', _aqRenderPreview);
    document.getElementById('aqRequired').addEventListener('change', _aqRenderPreview);
    document.getElementById('aqMinWords').addEventListener('input', _aqRenderPreview);
    openAssessmentQuestionEdit._wired = true;
  }

  _aqUpdateConditionalGroups();
  if (!tpl) _aqSyncKeyFromLabel();
  _aqRenderPreview();

  document.getElementById('assessmentQuestionEditModal').classList.remove('hidden');
}

function _aqUpdateConditionalGroups() {
  const type = document.getElementById('aqType').value;
  const isRouting = document.getElementById('aqIsRouting').checked;
  const isRadio = type === 'radio';
  const isScale = type === 'scale_1_5' || type === 'scale_1_10';
  const isOpen  = type === 'open_text';

  document.getElementById('aqMinWordsGroup').style.display     = isOpen  ? '' : 'none';
  document.getElementById('aqOptionsGroup').style.display      = isRadio ? '' : 'none';
  document.getElementById('aqScaleWeightsGroup').style.display = (isScale && isRouting) ? '' : 'none';

  const isRoutingWrap = document.getElementById('aqIsRoutingWrap');
  if (isRoutingWrap) {
    isRoutingWrap.style.display = (isRadio || isScale) ? 'inline-flex' : 'none';
  }
  const ph = document.getElementById('aqEmailPrefillHint');
  if (ph) ph.style.display = (type === 'email') ? '' : 'none';

  if (isRadio) _aqRenderOptionRows();
  if (isScale && isRouting) _aqRenderScaleWeights();

  _aqRenderPreview();
}

function _aqShowError(msg) {
  const el = document.getElementById('assessmentQuestionEditError');
  if (!el) return;
  el.textContent = msg;
  el.style.display = '';
}

async function saveAssessmentQuestion() {
  const errEl = document.getElementById('assessmentQuestionEditError');
  if (errEl) errEl.style.display = 'none';

  const type      = document.getElementById('aqType').value;
  const isRouting = document.getElementById('aqIsRouting').checked;

  const payload = {
    section     : (document.getElementById('aqSection').value || '').trim(),
    type        : type,
    order_index : Number(document.getElementById('aqOrderIndex').value || 0),
    label       : (document.getElementById('aqLabel').value || '').trim(),
    help_text   : (document.getElementById('aqHelpText').value || '').trim() || null,
    required    : !!document.getElementById('aqRequired').checked,
    active      : !!document.getElementById('aqActive').checked,
    is_routing  : isRouting,
  };

  if (!payload.section) { _aqShowError('Section is verplicht'); return; }
  if (!payload.label)   { _aqShowError('Label is verplicht'); return; }

  if (type === 'open_text') {
    const mwRaw = (document.getElementById('aqMinWords').value || '').trim();
    payload.min_words = mwRaw === '' ? null : Number(mwRaw);
    if (mwRaw !== '' && (!Number.isInteger(payload.min_words) || payload.min_words < 0)) {
      _aqShowError('Min. woorden moet een integer >= 0 zijn'); return;
    }
  } else {
    payload.min_words = null;
  }

  if (type === 'radio') {
    if (_aqOptionRows.length === 0) { _aqShowError('Voeg ten minste 1 antwoordoptie toe'); return; }
    const outOpts = [];
    const outWeights = isRouting ? {} : null;
    const seenValues = new Set();
    for (let i = 0; i < _aqOptionRows.length; i++) {
      const row = _aqOptionRows[i];
      const labelText = (row.label || '').trim();
      if (!labelText) { _aqShowError('Optie ' + (i + 1) + ' mist een label'); return; }
      let val = row.value;
      if (!row.isOriginal) {
        const base = _aqSlugify(labelText);
        val = base;
        let n = 2;
        while (seenValues.has(val)) {
          val = base + '_' + n;
          n++;
          if (n > 50) break;
        }
      }
      if (!val || !/^[a-z0-9_-]{1,64}$/.test(val)) {
        _aqShowError('Optie ' + (i + 1) + ' heeft een ongeldige interne sleutel (' + (val || 'leeg') + ')'); return;
      }
      if (seenValues.has(val)) { _aqShowError('Optie ' + (i + 1) + ': dubbele interne sleutel ' + val); return; }
      seenValues.add(val);
      outOpts.push({ value: val, label: labelText });
      if (outWeights) {
        const pts = (typeof row.points === 'number' && Number.isFinite(row.points)) ? row.points : 0;
        outWeights[val] = pts;
      }
    }
    payload.options = outOpts;
    payload.routing_weights = outWeights;
  } else if (type === 'scale_1_5' || type === 'scale_1_10') {
    payload.options = null;
    if (isRouting) {
      const max = type === 'scale_1_10' ? 10 : 5;
      const out = {};
      for (let i = 1; i <= max; i++) {
        const k = String(i);
        const v = _aqScaleWeights[k];
        if (typeof v !== 'number' || !Number.isFinite(v)) {
          _aqShowError('Punten voor stap ' + i + ' moet een getal zijn'); return;
        }
        out[k] = v;
      }
      payload.routing_weights = out;
    } else {
      payload.routing_weights = null;
    }
  } else {
    payload.options = null;
    payload.routing_weights = null;
  }

  const btn = document.getElementById('aqSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Opslaan…'; }
  try {
    let r;
    if (_aqEditingId) {
      r = await window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(_aqEditingId), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
    } else {
      const keyEl = document.getElementById('aqKey');
      let keyVal  = (keyEl.value || '').trim();
      if (!keyVal && (keyEl.dataset.aqAuto === '1')) {
        keyVal = _aqSlugify(document.getElementById('aqLabel').value);
        keyEl.value = keyVal;
      }
      if (!/^[a-z0-9_-]{1,64}$/.test(keyVal)) {
        _aqShowError('Sleutel ongeldig: alleen kleine letters, cijfers, _ of -. Klik op "Sleutel aanpassen" en pas hem aan.');
        if (btn) { btn.disabled = false; btn.textContent = 'Opslaan'; }
        return;
      }
      payload.key = keyVal;
      // FEATURE C: nieuwe vraag landt op de geselecteerde vragenlijst (anders
      // server-side default = actief). Voor consistentie geven we 'm altijd
      // expliciet mee als er een selectie is.
      const selQid = (window._qqState && window._qqState.selectedId) || null;
      if (selQid) payload.questionnaire_id = selQid;
      r = await window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
    }
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      _aqShowError(j.error || ('HTTP ' + r.status));
      return;
    }
    document.getElementById('assessmentQuestionEditModal').classList.add('hidden');
    aqBanner('success', _aqEditingId ? 'Vraag bijgewerkt.' : 'Vraag aangemaakt.', 4000);
    _aqEditingId = null;
    loadAssessmentQuestions();
  } catch (e) {
    _aqShowError('Fout: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Opslaan'; }
  }
}

async function reorderAssessmentQuestion(id, delta) {
  const q = _aqItems.find(x => x.id === id);
  if (!q) return;
  const section = q.section;
  const peers = _aqItems.filter(x => x.section === section).sort((a, b) => a.order_index - b.order_index);
  const idx = peers.findIndex(x => x.id === id);
  const otherIdx = idx + delta;
  if (otherIdx < 0 || otherIdx >= peers.length) return;
  const other = peers[otherIdx];
  const a = q.order_index, b = other.order_index;
  const newA = (a === b) ? (delta < 0 ? a - 1 : a + 1) : b;
  const newB = (a === b) ? a : a;
  try {
    const [r1, r2] = await Promise.all([
      window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(q.id), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order_index: newA }),
      }),
      window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(other.id), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order_index: newB }),
      }),
    ]);
    if (!r1.ok || !r2.ok) { aqBanner('error', 'Reorder mislukt', 5000); return; }
    loadAssessmentQuestions();
  } catch (e) {
    aqBanner('error', 'Fout: ' + e.message, 6000);
  }
}

async function uploadNiveauPhoto(slug, file, slot) {
  const status = slot.querySelector('.ev-niv-status');
  const okTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp'];
  if (!okTypes.includes((file.type || '').toLowerCase())) { if (status) status.textContent = 'Alleen JPG, PNG of WEBP.'; return; }
  if (file.size > 3 * 1024 * 1024) { if (status) status.textContent = 'Bestand te groot (max 3 MB).'; return; }
  if (status) status.textContent = 'Uploaden…';
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = () => reject(new Error('lees-fout'));
      fr.readAsDataURL(file);
    });
    const base64 = String(dataUrl).split(',')[1] || '';
    const up = await window.AgentShared.apiFetch('/api/event-image-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: file.name, content_type: (file.type || '').toLowerCase(), data_base64: base64 }),
    });
    const uj = await up.json().catch(() => ({}));
    if (!up.ok || !uj.ok) throw new Error(uj.error || ('upload HTTP ' + up.status));
    const sv = await window.AgentShared.apiFetch('/api/events-niveau-default-image-save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, default_image_url: uj.url }),
    });
    const sj = await sv.json().catch(() => ({}));
    if (!sv.ok || !sj.ok) throw new Error(sj.error || ('opslaan HTTP ' + sv.status));
    const prev = slot.querySelector('.ev-niv-preview');
    if (prev) prev.innerHTML = `<img src="${esc(uj.url)}" alt="" style="max-width:140px;border-radius:6px;display:block" />`;
    if (status) status.textContent = 'Opgeslagen.';
  } catch (e) {
    console.error('[niveau-photo]', e);
    if (status) status.textContent = 'Mislukt: ' + (e?.message || 'onbekend');
  }
}

      e.stopPropagation();
      const id   = btn.dataset.id;

      if (!menu) return;
      // Sluit andere menu's
      document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => { if (m !== menu) m.classList.remove('show'); });
      const willShow = !menu.classList.contains('show');
      if (willShow) {
        // Eerst .show toevoegen zodat offsetWidth/offsetHeight meetbaar zijn.
        menu.classList.add('show');
        const r = btn.getBoundingClientRect();
        let left = r.right - menu.offsetWidth;
        if (left < 8) left = 8;
        let top = r.bottom + 4;
        if (top + menu.offsetHeight > window.innerHeight - 8) {
          top = r.top - menu.offsetHeight - 4;
        }
        menu.style.left = left + 'px';
        menu.style.top  = top  + 'px';
      } else {
        menu.classList.remove('show');
      }
    });
  });

  // als events-detail.html).
  document.addEventListener('click', () => {

      const action = item.dataset.action;

      document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
      if (action === 'archive') return archiveEvent(id, title);
    });
  });
}

async function archiveEvent(eventId, title) {
  if (!eventId) return;
  const t = title ? ` "${title}"` : '';
  if (!confirm(`Event${t} archiveren? Het wordt onzichtbaar voor klanten (Webflow unpublish) en uit de standaard-overzichten gefilterd. Aangemelde deelnemers + alle data blijven bewaard.`)) return;
  try {
    const res = await window.AgentShared.apiFetch('/api/events-update?id=' + encodeURIComponent(eventId), {
      method: 'PATCH',
      body  : JSON.stringify({ status: 'archived' }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || ('HTTP ' + res.status));
    window.AgentShared?.showToast?.('Event gearchiveerd', 'success');
    // Re-render zodat de rij weg is uit de huidige filter (tenzij 'Alle' actief).
    _evApplyStatusFilterView();
  } catch (e) {
    window.AgentShared?.showToast?.('Archiveren mislukt: ' + (e?.message || 'onbekende fout'), 'error');
  }
}

async function duplicateEvent(sourceEventId) {
  if (!sourceEventId) return;
  if (!confirm('Kopieer dit event als nieuw concept? Datum wordt 7 dagen verschoven; je kunt \'m daarna aanpassen.')) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/events-duplicate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_event_id: sourceEventId }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.event_id) throw new Error(j?.error || ('HTTP ' + r.status));
    window.AgentShared?.showToast?.('Concept aangemaakt — open om te bewerken', 'success');
    window.location.href = '/modules/events-detail.html?id=' + encodeURIComponent(j.event_id);
  } catch (e) {
    window.AgentShared?.showToast?.('Kopiëren mislukt: ' + (e?.message || e), 'error');
  }
}

    if (!res.ok) {

      throw new Error(err.error || `HTTP ${res.status}`);

function debounce(fn, ms) {
  let t = null;
  return function (...args) {
    if (t) clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// daar op de events-phone_number_id uit whatsapp_module_config. Geen
// reply-functionaliteit in deze fase; volledige thread-view + send
// volgt zodra Simone er is (Fase 2).
async function loadEventsInbox() {
  const list = document.getElementById('eventsInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=events&limit=100');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div></div>';
      return;
    }
    const j = await r.json();
    if (!j.configured) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-plug-connected-x"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Events-lijn nog niet geconfigureerd</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">' + esc(j.warning || 'Maak een rij aan in whatsapp_module_config met module=\'events\' en is_active=true.') + '</div>'
        + '</div>';
      return;
    }
    const items = Array.isArray(j.items) ? j.items : [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-inbox"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Nog geen events-conversaties</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Inbound op de events-WhatsApp-lijn verschijnt hier.</div>'
        + '</div>';
      return;
    }
    // STAP 6a: card-rijen i.p.v. tabel — past in de smalle linker-pane van de
    // twee-paneel-shell. Active-state op _evState.convId (huidige geopend).
    const activeId = _evState.convId || null;
    list.innerHTML = items.map((it) => {
      const preview     = (it.last_message_preview || '').slice(0, 80);
      const initialLbl  = (it.customer_name || it.display_name || it.phone_number || '?').trim();
      const initial     = (initialLbl.match(/[A-Za-z0-9]/) || ['?'])[0].toUpperCase();
      const nameLabel   = it.customer_name || it.display_name || it.phone_number || '(geen naam)';
      const subtitle    = it.customer_name && it.display_name && it.display_name !== it.customer_name
        ? it.display_name
        : (it.phone_number || '');
      const unreadHtml  = it.unread_count > 0
        ? `<span class="evx-conv-unread">${esc(String(it.unread_count))}</span>`
        : '';
      const timeShort   = it.last_message_at ? esc(fmtDate(it.last_message_at)) : '';
      const isActive    = activeId && it.id === activeId ? ' active' : '';
      // STAP 6b — 24u-dot: groen wanneer can_send_text uit
      // /api/inbox-conversations-list true, rood wanneer venster verlopen.
      // Geen extra berekening — endpoint heeft het al gedaan.
      const dotCls   = it.can_send_text ? 'open' : 'closed';
      const dotTitle = it.can_send_text ? '24h-venster open — vrij bericht toegestaan' : '24h-venster verlopen — alleen template';
      return `
        <div class="evx-conv-row${isActive}" data-conv-id="${esc(it.id)}"
             data-phone="${esc(it.phone_number || '')}"
             data-display="${esc(it.display_name || '')}"
             data-customer="${esc(it.customer_name || '')}">
          <div class="evx-conv-avatar">${esc(initial)}</div>
          <div class="evx-conv-body">
            <div class="evx-conv-toprow">
              <div class="evx-conv-name">${esc(nameLabel)}</div>
              <div class="evx-conv-time">${timeShort}</div>
              <span class="evx-24h-dot ${dotCls}" title="${esc(dotTitle)}"></span>
            </div>
            <div class="evx-conv-preview">${esc(preview || subtitle || '—')}</div>
            ${unreadHtml ? `<div class="evx-conv-meta">${unreadHtml}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    // Rij-click → open conv (her-render markeert de nieuwe actieve rij).
    list.querySelectorAll('.evx-conv-row[data-conv-id]').forEach((row) => {
      row.addEventListener('click', () => openEventsConv({
        id:          row.dataset.convId,
        phone:       row.dataset.phone || '',
        displayName: row.dataset.display || '',
        customer:    row.dataset.customer || '',
      }));
    });
  } catch (e) {
    list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div></div>';
  }
}

// ── Fase 2 stap 2c: events thread + Simone interactie ────────────────────────
const _evState = { convId: null, conv: null, canSendText: false, suggestion: null, editingSuggestionId: null };

// STAP 6a: persistent twee-paneel — beide panes staan altijd in de DOM.
// _evShowThreadView toont de content-area + verbergt het empty-state.
// _evShowListView verbergt de content-area + toont empty-state (deselect).
// Op smal scherm wisselt CSS via .thread-open op de shell tussen lijst en thread.
function _evShowThreadView() {
  const shell   = document.getElementById('evInboxShell');
  const empty   = document.getElementById('evThreadEmpty');
  const content = document.getElementById('evThreadContent');
  if (shell)   shell.classList.add('thread-open');
  if (empty)   empty.style.display = 'none';
  if (content) content.style.display = 'flex';
}
function _evShowListView() {
  const shell   = document.getElementById('evInboxShell');
  const empty   = document.getElementById('evThreadEmpty');
  const content = document.getElementById('evThreadContent');
  if (shell)   shell.classList.remove('thread-open');
  if (empty)   empty.style.display = '';
  if (content) content.style.display = 'none';
  const strip = document.getElementById('evCustomerStrip');
  if (strip) strip.style.display = 'none';
  _evState.convId = null;
  _evState.conv = null;
  _evState.suggestion = null;
  _evState.editingSuggestionId = null;
  // De-mark actieve rij in de lijst (her-renderen niet nodig — class wegnemen
  // is sneller en behoudt scroll-positie).
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  // Realtime: alleen het berichten-kanaal opruimen; convCh + backstop blijven
  // zolang de inbox-tab open is (lijst-updates moeten doorlopen).
  _evTeardownThreadChannel();
}

// ── Events-inbox realtime ────────────────────────────────────────────────────
// Live updates via Supabase-realtime, met handmatige refresh als fallback.
//   _evRealtime.msgCh    : kanaal voor whatsapp_messages-inserts in open thread
//   _evRealtime.convCh   : kanaal voor whatsapp_conversations (lijst)
//   _evRealtime.backstop : 30s setInterval die loadEventsInbox() draait
//                          (+ _evRefreshOpenThread() als een thread open is)
// Alles defensief: zonder window.supabase wordt het stille no-op en blijft de
// refresh-knop werken.
const _evRealtime = { msgCh: null, convCh: null, backstop: null };

function _evMakeDebouncer(ms) {
  let t = null;
  return (fn) => {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; try { fn(); } catch (e) { console.warn('[ev-realtime]', e?.message || e); } }, ms);
  };
}
const _evDebounceThread = _evMakeDebouncer(300);
const _evDebounceList   = _evMakeDebouncer(300);

// Hergebruikbare "messages opnieuw ophalen voor open thread"-helper.
// Zelfde call als de eerste load in openEventsConv (mark_as_read=true blijft
// goed: realtime-update markeert ook nieuwe inbound-berichten als gelezen).
async function _evRefreshOpenThread() {
  const convId = _evState.convId;
  if (!convId) return;
  try {
    const params = new URLSearchParams({ conversation_id: convId, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) return; // stil — backstop probeert opnieuw, of gebruiker drukt refresh
    // convId kan tijdens fetch veranderd zijn (race met _evShowListView).
    if (_evState.convId !== convId) return;
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
  } catch (e) {
    console.warn('[_evRefreshOpenThread]', e?.message || e);
  }
}

async function _evSubscribeMessages(convId) {
  await window._authSharedReady;
  if (!window.supabase || !convId) return;
  // Idempotent: bestaande msgCh eerst opruimen (zelfde of andere conv).
  if (_evRealtime.msgCh) {
    try { window.supabase.removeChannel(_evRealtime.msgCh); } catch {}
    _evRealtime.msgCh = null;
  }
  try {
    _evRealtime.msgCh = window.supabase
      .channel('ev-inbox-msg-' + convId)
      .on('postgres_changes', {
        event : 'INSERT',
        schema: 'public',
        table : 'whatsapp_messages',
        filter: 'conversation_id=eq.' + convId,
      }, () => _evDebounceThread(_evRefreshOpenThread))
      .subscribe();
  } catch (e) {
    console.warn('[_evSubscribeMessages]', e?.message || e);
    _evRealtime.msgCh = null;
  }
}

async function _evSubscribeConversations() {
  await window._authSharedReady;
  if (!window.supabase) return;
  if (_evRealtime.convCh) {
    try { window.supabase.removeChannel(_evRealtime.convCh); } catch {}
    _evRealtime.convCh = null;
  }
  try {
    // Geen module-filter in het kanaal — loadEventsInbox() filtert server-side
    // al op module=events. Eenvoudiger dan een kolom-filter en consistent als
    // er ooit andere modules op dezelfde tabel komen.
    _evRealtime.convCh = window.supabase
      .channel('ev-inbox-convs')
      .on('postgres_changes', {
        event : '*',
        schema: 'public',
        table : 'whatsapp_conversations',
      }, () => _evDebounceList(loadEventsInbox))
      .subscribe();
  } catch (e) {
    console.warn('[_evSubscribeConversations]', e?.message || e);
    _evRealtime.convCh = null;
  }
}

function _evStartBackstop() {
  if (_evRealtime.backstop) return;
  _evRealtime.backstop = setInterval(() => {
    try {
      loadEventsInbox();
      if (_evState.convId) _evRefreshOpenThread();
    } catch (e) {
      console.warn('[ev-backstop]', e?.message || e);
    }
  }, 30000);
}

function _evTeardownThreadChannel() {
  if (_evRealtime.msgCh) {
    try { window.supabase && window.supabase.removeChannel(_evRealtime.msgCh); } catch {}
    _evRealtime.msgCh = null;
  }
}

function _evTeardownRealtime() {
  _evTeardownThreadChannel();
  if (_evRealtime.convCh) {
    try { window.supabase && window.supabase.removeChannel(_evRealtime.convCh); } catch {}
    _evRealtime.convCh = null;
  }
  if (_evRealtime.backstop) {
    clearInterval(_evRealtime.backstop);
    _evRealtime.backstop = null;
  }
}

async function openEventsConv({ id, phone, displayName, customer }) {
  if (!id) return;
  _evState.convId = id;
  _evShowThreadView();
  // STAP 6a: markeer direct de actieve rij in de lijst (geen wacht op
  // loadEventsInbox onderaan — voelt sneller bij wisselen tussen conversaties).
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  const newRow = document.querySelector('#eventsInboxList .evx-conv-row[data-conv-id="' + id.replace(/"/g, '') + '"]');
  if (newRow) newRow.classList.add('active');

  // Pre-fill header met data uit list-rij voor snappy switch
  document.getElementById('evThreadName').textContent  = customer || displayName || phone || 'Onbekend';
  document.getElementById('evThreadPhone').textContent = phone || '—';
  const badge = document.getElementById('evThreadWindowBadge');
  badge.textContent = '…';
  badge.style.background = 'var(--bg-elev-2)';
  badge.style.color = 'var(--text-dim)';
  document.getElementById('evThreadMessages').innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Laden…</div>';
  document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
  document.getElementById('evComposeTextarea').value = '';
  document.getElementById('evThreadHint').textContent = '';

  // Messages laden (eerste pass — daarna stuurt _evRefreshOpenThread updates).
  try {
    const params = new URLSearchParams({ conversation_id: id, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      document.getElementById('evThreadMessages').innerHTML =
        '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
    // STAP 6d: klant-context-strip + event-context (read-only afgeleid).
    _renderEvCustomerStrip(_evState.conv);
    // Refresh list-tab badges (unread reset)
    loadEventsInbox();
    // Laatste PROPOSED suggestie tonen
    loadLatestEventsSuggestion(id);
  } catch (e) {
    document.getElementById('evThreadMessages').innerHTML =
      '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(e.message) + '</div>';
  }

  // Realtime subscriben op INSERTs in deze conversatie. Stille no-op zonder
  // window.supabase; backstop-poll + handmatige refresh blijven werken.
  _evSubscribeMessages(id);
}

function _renderEvThread(items, conv) {
  const wrap = document.getElementById('evThreadMessages');
  if (!wrap) return;
  if (!items || items.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Nog geen berichten in deze conversatie.</div>';
  } else {
    wrap.innerHTML = items.map((m) => {
      const inbound = m.direction === 'in';
      const align = inbound ? 'flex-start' : 'flex-end';
      const bg    = inbound ? 'var(--bg-elev-2)' : '#093d54';
      const color = inbound ? 'var(--text)' : '#ffffff';
      const time  = m.created_at ? fmtDate(m.created_at) : '';
      const body  = String(m.body || (m.template_name ? '[template:' + m.template_name + ']' : '[media]'));
      return '<div style="display:flex;justify-content:' + align + '">'
        + '<div style="max-width:70%;background:' + bg + ';color:' + color + ';padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4">'
        + '<div style="white-space:pre-wrap;word-wrap:break-word">' + esc(body) + '</div>'
        + '<div style="font-size:10px;opacity:0.65;margin-top:3px;text-align:right">' + esc(time) + '</div>'
        + '</div></div>';
    }).join('');
  }
  // Auto-scroll naar onderkant
  wrap.scrollTop = wrap.scrollHeight;

  // Window-badge
  const badge = document.getElementById('evThreadWindowBadge');
  if (_evState.canSendText) {
    badge.textContent = '24h open';
    badge.style.background = 'rgba(5,150,105,0.15)';
    badge.style.color = '#059669';
    badge.title = '24h-servicewindow nog open — vrije tekst toegestaan';
  } else {
    badge.textContent = '24h verlopen';
    badge.style.background = 'rgba(245,158,11,0.18)';
    badge.style.color = '#b45309';
    badge.title = 'Servicewindow verlopen — alleen templates';
  }
}

function _applyEvComposeState() {
  const ta = document.getElementById('evComposeTextarea');
  const sendBtn = document.getElementById('evComposeSendBtn');
  const hint = document.getElementById('evThreadHint');
  if (_evState.canSendText) {
    if (ta) { ta.disabled = false; ta.placeholder = 'Typ een vrij bericht…'; }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.title = 'Versturen'; }
    if (hint) hint.textContent = '';
  } else {
    if (ta) { ta.disabled = true; ta.placeholder = '24h-window verlopen — alleen templates (later)'; }
    if (sendBtn) { sendBtn.disabled = true; sendBtn.title = '24h-window verlopen'; }
    if (hint) hint.textContent = '24h-window verlopen sinds laatste inbound — vrije tekst niet meer toegestaan.';
  }
}

function _renderEvSuggestionPanel(sugg, errMsg) {
  const wrap = document.getElementById('evSimoneSuggestionPanel');
  if (!wrap) return;
  if (errMsg) {
    wrap.innerHTML = '<div style="color:#b45309;font-size:12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 10px;margin:6px 14px 0 14px">Suggestie laden mislukt: ' + esc(errMsg) + '</div>';
    return;
  }
  if (!sugg) { wrap.innerHTML = ''; return; }
  // STAP 6d Simone-polish: Gebruiken / Aanpassen / Afwijzen.
  // "Gebruiken" = stuur suggested_reply as-is + mark USED_AS_IS.
  // "Aanpassen" = kopieer naar de composer ter bewerking; USED_EDITED komt
  // pas na verzenden via sendComposeText (zie _evState.editingSuggestionId).
  const auto = sugg.auto_triggered ? '<span style="background:#7c3aed;color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.04em">AUTO</span>' : '';
  const conf = (typeof sugg.confidence === 'number') ? (Math.round(sugg.confidence * 100) + '%') : '—';
  wrap.innerHTML =
    '<div class="evx-sim-card">'
    + '<div class="evx-sim-head">'
    +   '<i class="ti ti-sparkles"></i>'
    +   '<span class="evx-sim-title">Simone-suggestie</span>'
    +   auto
    +   '<span class="evx-sim-meta">intent: ' + esc(sugg.detected_intent || '?') + ' · ' + conf + '</span>'
    + '</div>'
    + '<div class="evx-sim-quote">' + esc(sugg.suggested_reply || '') + '</div>'
    + (sugg.reasoning ? '<div style="font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic">Reasoning: ' + esc(sugg.reasoning) + '</div>' : '')
    + '<div class="evx-sim-actions">'
    +   '<button class="btn-primary" id="evSimUseBtn" type="button" title="Verstuur de suggestie ongewijzigd"><i class="ti ti-check"></i> Gebruiken</button>'
    +   '<button class="sr-btn" id="evSimEditBtn" type="button" style="background:transparent;border:1px solid #7c3aed;color:#7c3aed;padding:6px 11px;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:inherit" title="Kopieer naar het tekstveld om aan te passen"><i class="ti ti-edit"></i> Aanpassen</button>'
    +   '<button class="btn-dismiss" id="evSimDismissBtn" type="button" title="Negeer deze suggestie">Negeren</button>'
    + '</div>'
    + '</div>';
  const useBtn     = document.getElementById('evSimUseBtn');
  const editBtn    = document.getElementById('evSimEditBtn');
  const dismissBtn = document.getElementById('evSimDismissBtn');
  if (useBtn)     useBtn.addEventListener('click', () => useSimoneAsIs(sugg));
  if (editBtn)    editBtn.addEventListener('click', () => editSimoneInComposer(sugg));
  if (dismissBtn) dismissBtn.addEventListener('click', () => dismissSuggestion(sugg));
}

// STAP 6d — Gebruiken: stuur as-is via /api/inbox-send + mark USED_AS_IS.
async function useSimoneAsIs(sugg) {
  const convId = _evState.convId;
  if (!convId || !sugg) return;
  if (!_evState.canSendText) {
    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');
    return;
  }
  const text = String(sugg.suggested_reply || '').trim();
  if (!text) { window.AgentShared.showToast('Suggestie is leeg', 'error'); return; }
  const btn = document.getElementById('evSimUseBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: text }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ suggestion_id: sugg.id, status: 'USED_AS_IS', final_sent_text: text }),
    }).catch(() => {});
    window.AgentShared.showToast('Suggestie verstuurd', 'success');
    _evState.suggestion = null;
    _evState.editingSuggestionId = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

// STAP 6d — Aanpassen: kopieer naar composer; USED_EDITED komt pas bij sendComposeText.
function editSimoneInComposer(sugg) {
  if (!sugg) return;
  const ta = document.getElementById('evComposeTextarea');
  if (ta) {
    ta.value = String(sugg.suggested_reply || '');
    ta.focus();
    try { ta.setSelectionRange(ta.value.length, ta.value.length); } catch {}
  }
  _evState.editingSuggestionId = sugg.id;
  window.AgentShared.showToast('Suggestie in tekstveld geladen — pas aan en verstuur', 'success');
}

async function sendSuggestion(sugg) {

    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');

  if (!finalText) { window.AgentShared.showToast('Bericht is leeg', 'error'); return; }
  const wasEdited = (finalText !== String(sugg.suggested_reply || '').trim());
  const btn = document.getElementById('evSuggSendBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: finalText }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    // Mark outcome (fail-soft: send-success is leidend)
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
