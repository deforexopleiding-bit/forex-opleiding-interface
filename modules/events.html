  tabBtns.forEach(b => b.addEventListener('click', () => {
    const which = b.getAttribute('data-evtab');
    tabBtns.forEach(x => x.classList.toggle('active', x === b));
    hideAll();
    if (which === 'overzicht') {
      paneOverview.style.display = '';
      _evTeardownRealtime();
      // Re-render zodat de huidige status-filter (incl. 'afgerond') correct
      // de juiste sub-lijst toont (events-grid vs. afgerond-grid).
      _evApplyStatusFilterView();
    } else if (which === 'inbox') {
      paneInbox.style.display = '';
      loadEventsInbox();
      // Fire-and-forget: vul het e-mailers-badge naast de schakelaar zonder de
      // WhatsApp-lijst te blokkeren. Knop zelf is RBAC-gegate hieronder.
      const canEvEmail = !!(window.RBAC && window.RBAC.canSync && window.RBAC.canSync('events.inbox.view'));
      const srcBar = document.getElementById('evListSourceBar');
      const srcEmBtn = document.getElementById('evSrcBtnEmail');
      if (srcEmBtn) srcEmBtn.style.display = canEvEmail ? '' : 'none';
      if (srcBar)   srcBar.style.display   = canEvEmail ? 'flex' : 'none';
      if (canEvEmail) _loadEvEmailSendersBadgeOnly();
      // Realtime: lijst-kanaal + 30s backstop-poll. Berichten-kanaal volgt
      // pas wanneer een specifieke conversatie open gaat (openEventsConv).
      _evSubscribeConversations();
      _evStartBackstop();
    } else if (which === 'signup-inbox') {
      if (paneSignupInbox) paneSignupInbox.style.display = '';
      loadSignupInbox();
      _evTeardownRealtime();
    } else if (which === 'mentor-grootboek') {
      if (paneMentorBoek) paneMentorBoek.style.display = '';
      _evTeardownRealtime();
      mgLoadOverview();
    }
  }));

  // PR-A — Deeplink: events.html#mentor-grootboek opent de tab direct.
  (function _evMentorGrootboekHashOnLoad() {
    const h = (window.location.hash || '').toLowerCase();
    if (h !== '#mentor-grootboek') return;
    const btn = document.querySelector('.ev-tab[data-evtab="mentor-grootboek"]');
    if (btn) btn.click();
  })();

  // ⚙ Instellingen — eigen pane, géén top-tab. Active-state op de tabs
  // wordt afgezet zodat zichtbaar is dat we niet in een tabblad zitten.
  // STAP 7: _renderEvSettings is async (RBAC-check). Geen await; render-
  // initialisatie loopt zelf (sub-tab-keuze + lazy load).
  const settingsBtn = document.getElementById('evSettingsBtn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', () => {
      tabBtns.forEach(x => x.classList.remove('active'));
      hideAll();
      if (paneSettings) paneSettings.style.display = '';
      _renderEvSettings();
      _evTeardownRealtime();
    });
  }
  // STAP 7 — Deeplink-handling: bij #settings-assessment of #settings-simone
  // direct het Instellingen-paneel openen op de juiste sub-tab.
  (function _evSettingsHashOnLoad() {
    const h = (window.location.hash || '').toLowerCase();
    if (h !== '#settings-assessment' && h !== '#settings-simone') return;
    if (settingsBtn) settingsBtn.click();
  })();

  const inboxRefresh = document.getElementById('evInboxRefresh');
  if (inboxRefresh) inboxRefresh.addEventListener('click', () => {
    if (_evState.listSource === 'email') {
      _loadEvEmailSenders();
    } else {
      loadEventsInbox();
      _loadEvEmailSendersBadgeOnly();
    }
  });
  // Lijst-source toggle: WhatsApp | E-mail (Optie B).
  const evSrcWa = document.getElementById('evSrcBtnWa');
  if (evSrcWa) evSrcWa.addEventListener('click', () => _evSwitchListSource('wa'));
  const evSrcEm = document.getElementById('evSrcBtnEmail');
  if (evSrcEm) evSrcEm.addEventListener('click', () => _evSwitchListSource('email'));

  // Mode-toggle WhatsApp | E-mail. Klik op disabled-knop wordt door de
  // browser geblokkeerd; _evSwitchMode heeft daarnaast nog een fail-safe
  // op _evState.conv.attendee_id || .customer_id.
  const evWaBtn = document.getElementById('evModeBtnWa');
  if (evWaBtn) evWaBtn.addEventListener('click', () => _evSwitchMode('wa'));
  const evEmBtn = document.getElementById('evModeBtnEmail');
  if (evEmBtn) evEmBtn.addEventListener('click', () => _evSwitchMode('email'));

  // STAP 6c — Template-picker wiring
  const tplBtn = document.getElementById('evComposeTemplateBtn');
  if (tplBtn) tplBtn.addEventListener('click', () => openTemplatePicker());
  const tplClose = document.getElementById('evTplCloseBtn');
  if (tplClose) tplClose.addEventListener('click', () => closeTemplatePicker());
  // Buiten-modal-click sluit het picker-paneel.
  const tplOverlay = document.getElementById('evTemplatePickerModal');
  if (tplOverlay) tplOverlay.addEventListener('click', (e) => { if (e.target === tplOverlay) closeTemplatePicker(); });

  // STAP 6d — Klant-koppel modal wiring
  const custClose  = document.getElementById('evCustLinkCloseBtn');
  if (custClose)  custClose.addEventListener('click', () => closeCustomerLinkModal());
  const custCancel = document.getElementById('evCustLinkCancelBtn');
  if (custCancel) custCancel.addEventListener('click', () => closeCustomerLinkModal());
  const custOverlay = document.getElementById('evCustomerLinkModal');
  if (custOverlay) custOverlay.addEventListener('click', (e) => { if (e.target === custOverlay) closeCustomerLinkModal(); });
  const custInput = document.getElementById('evCustSearchInput');
  if (custInput) custInput.addEventListener('input', _evCustSearchOnInput);

  // Aanmelding-koppel modal wiring (spiegel van klant-modal hierboven)
  const attClose  = document.getElementById('evAttLinkCloseBtn');
  if (attClose)  attClose.addEventListener('click', () => closeAttendeeLinkModal());
  const attCancel = document.getElementById('evAttLinkCancelBtn');
  if (attCancel) attCancel.addEventListener('click', () => closeAttendeeLinkModal());
  const attOverlay = document.getElementById('evAttendeeLinkModal');
  if (attOverlay) attOverlay.addEventListener('click', (e) => { if (e.target === attOverlay) closeAttendeeLinkModal(); });
  const attInput = document.getElementById('evAttSearchInput');
  if (attInput) attInput.addEventListener('input', _evAttSearchOnInput);

  // Inschrijvingen-inbox wiring
  const siRefresh = document.getElementById('evSignupInboxRefresh');
  if (siRefresh) siRefresh.addEventListener('click', () => loadSignupInbox());
  const siFilters = document.querySelectorAll('#evSignupInboxFilters .sr-seg');
  siFilters.forEach((seg) => {
    seg.addEventListener('click', () => {
      siFilters.forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      _siState.filter = seg.dataset.sistatus || 'todo';
      loadSignupInbox();
    });
  });
  const siCancel  = document.getElementById('evSignupResolveCancel');
  const siCancel2 = document.getElementById('evSignupResolveCancel2');
  const siSubmit  = document.getElementById('evSignupResolveSubmit');
  if (siCancel)  siCancel.addEventListener('click', () => closeSignupResolveModal());
  if (siCancel2) siCancel2.addEventListener('click', () => closeSignupResolveModal());
  if (siSubmit)  siSubmit.addEventListener('click', () => submitSignupResolve());

  const npBtn = document.getElementById('evNiveauPhotosBtn');
  if (npBtn) npBtn.addEventListener('click', openNiveauPhotoModal);
  const npClose = document.getElementById('evNiveauPhotoClose');
  if (npClose) npClose.addEventListener('click', () => {
    const m = document.getElementById('evNiveauPhotoModal'); if (m) m.style.display = 'none';
  });

  // Fase 2 stap 2c — thread-view wiring
  const backBtn = document.getElementById('evThreadBack');
  if (backBtn) backBtn.addEventListener('click', () => _evShowListView());
  const askBtn = document.getElementById('evAskSimoneBtn');
  if (askBtn) askBtn.addEventListener('click', () => askSimone());
  const composeSendBtn = document.getElementById('evComposeSendBtn');
  if (composeSendBtn) composeSendBtn.addEventListener('click', () => sendComposeText());
  // Disable Simone-knop als user geen events.simone.use heeft (RBAC client-gate;
  // server doet de echte check). super_admin krijgt 'm via permission-RPC.
  if (askBtn && window.RBAC && typeof window.RBAC.can === 'function') {
    window.RBAC.can('events.simone.use').then((ok) => {
      if (!ok) { askBtn.disabled = true; askBtn.title = 'Geen rechten (events.simone.use)'; askBtn.style.opacity = 0.4; }
    }).catch(() => {});
  }

  // Wire filters
  document.getElementById('evSearch').addEventListener('input', debounce((e) => {
    state.search = e.target.value.trim();
    loadEvents();
  }, 300));
  document.getElementById('evNiveau').addEventListener('change', (e) => {
    state.niveau = e.target.value || null;
    loadEvents();
  });
  document.getElementById('evRefresh').addEventListener('click', () => loadEvents());
  document.querySelectorAll('#evSegments .sr-seg').forEach((seg) => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#evSegments .sr-seg').forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      state.status = seg.dataset.status || null;
      _evApplyStatusFilterView();
    });
  });
}

// Beslist welke sub-lijst zichtbaar is in Overzicht en triggert de juiste loader.
//   status === 'afgerond' -> /api/events-completed-list via loadAfgerondEvents()
//   andere statussen      -> /api/events-list via loadEvents()
// "Afgerond" is hierdoor een filter binnen Overzicht i.p.v. een aparte top-tab.
function _evApplyStatusFilterView() {
  const eventsListEl   = document.getElementById('eventsList');
  const afgerondListEl = document.getElementById('eventsAfgerondList');
  if (state.status === 'afgerond') {
    if (eventsListEl)   eventsListEl.style.display = 'none';
    if (afgerondListEl) afgerondListEl.style.display = '';
    loadAfgerondEvents();
  } else {
    if (eventsListEl)   eventsListEl.style.display = '';
    if (afgerondListEl) afgerondListEl.style.display = 'none';
    loadEvents();
  }
}

// STAP 7 — Instellingen-paneel: sub-tab-strip met Vragenlijst / Simone-config /
// Automations / Niveau-foto's. Vragenlijst en Simone zijn fysiek verhuisd uit
// admin.html; Automations is een link naar /modules/events-automations.html en
// Niveau-foto's opent een bestaande lokale modal.
//
// Lazy load: openen van sub-tab triggert loadAssessmentQuestions() resp.
// loadSimoneConfig() — alleen de eerste keer (loaded-vlag voorkomt herhaling).
// RBAC-gating: Vragenlijst zichtbaar bij admin.joost_config; Simone bij
// admin.simone_config. Andere sub-tabs blijven altijd zichtbaar.
const _evSettingsState = { activeSub: null, assessmentLoaded: false, simoneLoaded: false };

async function _renderEvSettings() {
  const tabs = document.querySelectorAll('#evSettingsSubTabs .evs-sub-tab');
  if (!tabs.length) return;
  // RBAC-checks (best-effort; bij falen vallen we terug op "verbergen").
  let canAssessment = false, canSimone = false;
  try {
    if (window.RBAC && typeof window.RBAC.can === 'function') {
      canAssessment = await window.RBAC.can('admin.joost_config');
      canSimone     = await window.RBAC.can('admin.simone_config');
    }
  } catch (e) { /* stil — niet-blokkerend */ }
  tabs.forEach((btn) => {
    const sub = btn.dataset.evsub;
    if (sub === 'assessment') btn.style.display = canAssessment ? '' : 'none';
    else if (sub === 'simone') btn.style.display = canSimone ? '' : 'none';
    else btn.style.display = '';
  });
  // Standaard sub-tab kiezen: deeplink heeft prioriteit, anders eerste
  // beschikbare. Idempotent — re-render bij tab-switch.
  let target = _evSettingsState.activeSub;
  if (!target) {
    const h = (window.location.hash || '').toLowerCase();
    if (h === '#settings-assessment' && canAssessment) target = 'assessment';
    else if (h === '#settings-simone' && canSimone)    target = 'simone';
    else if (canAssessment)                            target = 'assessment';
    else if (canSimone)                                target = 'simone';
    else                                               target = 'automations';
  }
  _evSelectSettingsSubTab(target);
  // Eénmalig wire — voorkomt duplicate handlers bij ⚙-tab her-open.
  if (!_renderEvSettings._wired) {
    tabs.forEach((btn) => {
      btn.addEventListener('click', () => _evSelectSettingsSubTab(btn.dataset.evsub));
    });
    _renderEvSettings._wired = true;
  }
}

function _evSelectSettingsSubTab(name) {
  _evSettingsState.activeSub = name;
  document.querySelectorAll('#evSettingsSubTabs .evs-sub-tab').forEach((b) => {
    b.classList.toggle('active', b.dataset.evsub === name);
  });
  document.querySelectorAll('.evs-sub-section[data-evsubsec]').forEach((s) => {
    s.classList.toggle('active', s.dataset.evsubsec === name);
  });
  // Automations-iframe lazy-load: src wordt pas gezet bij de eerste opening
  // van de subtab zodat de standalone-pagina niet onnodig in elke
  // events.html-load wordt geladen.
  if (name === 'automations') {
    const fr = document.getElementById('evAutomationsFrame');
    if (fr && !fr.src && fr.dataset.src) fr.src = fr.dataset.src;
  }
  // Signup-deadline lazy-load: GET huidige instelling bij eerste opening,
  // wire save-handler éénmalig.
  if (name === 'signup-deadline') {
    _ensureAutoCloseWired();
    _loadAutoCloseSetting();
  }
  // Lazy load triggers
  if (name === 'assessment' && !_evSettingsState.assessmentLoaded) {
    _evSettingsState.assessmentLoaded = true;
    try {
      _qqWireSubTabs();
      // FEATURE C: qqLoadList haalt vragenlijsten op én triggert daarna
      // loadAssessmentQuestions() + qqLoadThresholds() met de juiste
      // selectie. Backward-compat: bij ontbrekende endpoint valt de
      // banner terug op een error en de vragen-lijst blijft "Laden…".
      qqLoadList();
    } catch (e) { console.error('[settings/assessment]', e); }
  }
  if (name === 'simone' && !_evSettingsState.simoneLoaded) {
    _evSettingsState.simoneLoaded = true;
    try { loadSimoneConfig(); } catch (e) { console.error('[settings/simone]', e); }
  }
}

// ── Signup-deadline (auto-close hours-before) ────────────────────────────────
// Lazy-loaded bij eerste opening van de Signup-deadline sub-tab. Houdt
// status-element gescheiden van toast zodat de operator naast het input-veld
// direct feedback ziet.
function _ensureAutoCloseWired() {
  if (_ensureAutoCloseWired._wired) return;
  _ensureAutoCloseWired._wired = true;
  const btn = document.getElementById('autoCloseSaveBtn');
  if (btn) btn.addEventListener('click', _saveAutoCloseSetting);
}
async function _loadAutoCloseSetting() {
  const input  = document.getElementById('autoCloseHoursInput');
  const status = document.getElementById('autoCloseStatus');
  const meta   = document.getElementById('autoCloseMeta');
  if (!input) return;
  if (status) { status.textContent = 'Laden…'; status.style.color = ''; }
  try {
    const r = await window.AgentShared.apiFetch('/api/events-settings-auto-close-get');
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
    const hours = Number.isFinite(Number(j.hours)) ? Number(j.hours) : 24;
    input.value = String(hours);
    if (status) status.textContent = '';
    if (meta) {
      const parts = [];
      if (j.updated_at) {
        try {
          const d = new Date(j.updated_at);
          if (!Number.isNaN(d.getTime())) {
            parts.push('Laatst opgeslagen: ' + d.toLocaleString('nl-NL', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }));
          }
        } catch {}
      }
      meta.textContent = parts.join(' · ');
    }
  } catch (e) {
    console.error('[settings/signup-deadline] load', e);
    if (status) {
      status.textContent = 'Laden mislukt: ' + (e?.message || 'onbekend');
      status.style.color = '#b91c1c';
    }
  }
}
async function _saveAutoCloseSetting() {
  const input  = document.getElementById('autoCloseHoursInput');
  const btn    = document.getElementById('autoCloseSaveBtn');
  const status = document.getElementById('autoCloseStatus');
  const meta   = document.getElementById('autoCloseMeta');
  if (!input) return;
  const hoursNum = parseInt(input.value, 10);
  if (!Number.isFinite(hoursNum) || hoursNum < 0 || hoursNum > 720) {
    if (status) { status.textContent = 'Vul een geheel getal tussen 0 en 720 in.'; status.style.color = '#b91c1c'; }
    return;
  }
  if (btn) btn.disabled = true;
  if (status) { status.textContent = 'Opslaan…'; status.style.color = ''; }
  try {
    const r = await window.AgentShared.apiFetch('/api/events-settings-auto-close-update', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ hours: hoursNum }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || ('HTTP ' + r.status));
    if (status) {
      status.textContent = 'Opgeslagen ✓';
      status.style.color = '#15803d';
      setTimeout(() => { if (status.textContent === 'Opgeslagen ✓') status.textContent = ''; }, 2400);
    }
    if (meta && j.updated_at) {
      try {
        const d = new Date(j.updated_at);
        if (!Number.isNaN(d.getTime())) {
          meta.textContent = 'Laatst opgeslagen: ' + d.toLocaleString('nl-NL', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
        }
      } catch {}
    }
  } catch (e) {
    console.error('[settings/signup-deadline] save', e);
    if (status) { status.textContent = 'Opslaan mislukt: ' + (e?.message || 'onbekend'); status.style.color = '#b91c1c'; }
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// PR-A — VERHUISDE MENTOR-GROOTBOEK (uit modules/mentor-grootboek.html)
// Endpoint /api/mentor-ledger-overview + RBAC mentor.ledger.view ongewijzigd.
// Helpers met mg-prefix om botsing met events.html-elders te voorkomen.
// Hergebruikt esc()/eur()/fmtDate() + window.RBAC.canSync() die al in
// events.html beschikbaar zijn.
// ──────────────────────────────────────────────────────────────────────────────
const MG_STATUS_LABELS = {
  pending: 'Pending',
  wachten_op_betaling: 'Wachten op betaling',
  vrijgegeven: 'Vrijgegeven',
  geannuleerd: 'Geannuleerd',
  uitbetaald: 'Uitbetaald',
};

let _mgLoaded = false;

async function mgLoadOverview() {
  const host = document.getElementById('ev-pane-mentor-grootboek');
  if (!host) return;
  // RBAC-gate (defense-in-depth; sidebar-gating verdween in PR-A).
  await window._authSharedReady;
  try { await window.RBAC.ensurePermissionsLoaded?.(); } catch {}
  if (!window.RBAC?.canSync?.('mentor.ledger.view')) {
    host.innerHTML = `
      <div class="forbidden-card">
        <h2>Geen toegang</h2>
        <p>Je hebt geen rechten om het mentor-grootboek te bekijken.</p>
      </div>`;
    return;
  }
  host.innerHTML = '<div class="empty-state">Laden…</div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/mentor-ledger-overview');
    const j = await r.json();
    if (!r.ok) throw new Error(j?.error || 'Laden mislukt');
    mgRender(j);
    _mgLoaded = true;
  } catch (e) {
    host.innerHTML = `<div class="empty-state">Laden mislukt: ${esc(e?.message || e)}</div>`;
  }
}

function mgStatusPill(key) {
  return `<span class="mg-status-pill mg-status-${esc(key)}">${esc(MG_STATUS_LABELS[key] || key)}</span>`;
}

function mgStatusBreakdown(perStatus) {
  const cells = Object.keys(MG_STATUS_LABELS).map((k) => {
    const v = Number(perStatus?.[k] || 0);
    if (Math.abs(v) < 0.005) return '';
    return `<div style="display:inline-flex;align-items:center;gap:5px;margin-right:8px">${mgStatusPill(k)} <span style="font-variant-numeric:tabular-nums">${eur(v)}</span></div>`;
  }).filter(Boolean).join('');
  return cells || '<span style="color:var(--text-faint)">—</span>';
}

function mgRender(data) {
  const host = document.getElementById('ev-pane-mentor-grootboek');
  if (!host) return;
  const scope = data.scope || 'all';
  const t = data.totals || {};
  const nettoCls = (t.netto || 0) >= 0 ? 'netto-pos' : 'netto-neg';

  const byEventRows = (data.byEvent || []).map((e) => `
    <tr>
      <td>${esc(e.event_title || '(zonder titel)')}</td>
      <td>${esc(fmtDate(e.starts_at))}</td>
      <td class="num">${eur(e.omzet)}</td>
      <td class="num">${eur(e.bonuspot)}</td>
      <td class="num">${eur(e.uitgaven)}</td>
      <td class="num" style="font-weight:600;color:${(e.netto||0) >= 0 ? '#059669' : '#b91c1c'}">${eur(e.netto)}</td>
      <td>${mgStatusBreakdown(e.per_status)}</td>
    </tr>
  `).join('');

  const byMentorRows = (data.byMentor || []).map((m) => `
    <tr>
      <td>${esc(m.mentor_name || m.mentor_email || '(onbekend)')}</td>
      <td style="color:var(--text-faint);font-size:12px">${esc(m.mentor_email || '')}</td>
      <td class="num" style="font-weight:600;color:${(m.saldo||0) >= 0 ? '#059669' : '#b91c1c'}">${eur(m.saldo)}</td>
      <td class="num">${m.meegenomen_min_saldo > 0 ? eur(m.meegenomen_min_saldo) : '—'}</td>
      <td>${mgStatusBreakdown(m.per_status)}</td>
    </tr>
  `).join('');

  host.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap">
      <div>
        <div style="font-size:15px;font-weight:700">Mentor-grootboek <span class="mg-scope-badge ${scope === 'self' ? 'self' : ''}">${scope === 'self' ? 'eigen rijen' : 'alles'}</span></div>
        <div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Bonussen, uitgaven en uitbetalingen per event en per mentor.</div>
      </div>
      <button class="sr-iconbtn" id="mgRefresh" title="Vernieuwen"><i class="ti ti-refresh"></i></button>
    </div>

    <div class="kpi-strip">
      <div class="kpi"><div class="lbl">Omzet (basis)</div><div class="val">${eur(t.omzet)}</div></div>
      <div class="kpi"><div class="lbl">Bonuspot</div><div class="val">${eur(t.bonuspot)}</div></div>
      <div class="kpi"><div class="lbl">Uitgaven</div><div class="val">${eur(t.uitgaven)}</div></div>
      <div class="kpi ${nettoCls}"><div class="lbl">Netto</div><div class="val">${eur(t.netto)}</div></div>
    </div>

    <h3 class="sec">Per event</h3>
    ${(data.byEvent || []).length === 0
      ? '<div class="empty-state">Nog geen ledger-entries op events.</div>'
      : `<table class="lt">
          <thead><tr>
            <th>Event</th><th>Datum</th>
            <th style="text-align:right">Omzet</th>
            <th style="text-align:right">Bonus</th>
            <th style="text-align:right">Uitgaven</th>
            <th style="text-align:right">Netto</th>
            <th>Per status</th>
          </tr></thead>
          <tbody>${byEventRows}</tbody>
        </table>`}

    <h3 class="sec">Per mentor</h3>
    ${(data.byMentor || []).length === 0
      ? '<div class="empty-state">Nog geen mentoren met ledger-entries.</div>'
      : `<table class="lt">
          <thead><tr>
            <th>Mentor</th><th>E-mail</th>
            <th style="text-align:right">Saldo</th>
            <th style="text-align:right">Mee te nemen</th>
            <th>Per status</th>
          </tr></thead>
          <tbody>${byMentorRows}</tbody>
        </table>`}
  `;
  const ref = document.getElementById('mgRefresh');
  if (ref) ref.addEventListener('click', () => mgLoadOverview());
}

// ──────────────────────────────────────────────────────────────────────────────
// STAP 7 — VERHUISDE ASSESSMENT-VRAGEN-EDITOR (uit modules/admin.html)
// Forward-only invariant: edits beïnvloeden GEEN bestaande assessment_responses.
// Endpoints, payloads en RBAC blijven exact gelijk aan admin's implementatie.
// ──────────────────────────────────────────────────────────────────────────────

let _aqItems       = [];
let _aqEditingId   = null;

function aqBanner(kind, text, autoMs) {
  const el = document.getElementById('assessmentQuestionsBanner');
  if (!el) return;
  const bg = kind === 'success' ? 'rgba(5,150,105,.10)' : 'rgba(220,38,38,.10)';
  const fg = kind === 'success' ? '#059669' : '#b91c1c';
  el.style.background = bg; el.style.color = fg; el.style.border = '1px solid ' + fg + '40';
  el.textContent = text;
  el.style.display = '';
  if (autoMs) setTimeout(() => { el.style.display = 'none'; }, autoMs);
}

async function loadAssessmentQuestions() {
  const wrap = document.getElementById('assessmentQuestionsList');
  if (!wrap) return;
  wrap.innerHTML = '<div style="font-size:12.5px;color:var(--text-faint)">Laden…</div>';
  try {
    // FEATURE C: filter op de geselecteerde vragenlijst (of fall-back op actief
    // server-side als _qqState nog niet geïnitialiseerd is).
    const qid = (window._qqState && window._qqState.selectedId) || null;
    const url = '/api/admin-assessment-questions-list'
      + (qid ? '?questionnaire_id=' + encodeURIComponent(qid) : '');
    const r = await window.AgentShared.apiFetch(url);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      wrap.innerHTML = '<div style="color:#b91c1c;font-size:13px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    const j = await r.json();
    _aqItems = Array.isArray(j.questions) ? j.questions : [];
    renderAssessmentQuestionsList();
  } catch (e) {
    wrap.innerHTML = '<div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div>';
  }
}

// ──────────────────────────────────────────────────────────────────────────────
// FEATURE C (PR-Cfrontend) — multi-questionnaire UI
// State + helpers voor de "Vragenlijst"-sectie: selector + Nieuwe/Hernoemen/
// Actief zetten + sub-tabs "Vragen" / "Puntensysteem". Endpoints uit PR-Cbackend:
//   - /api/assessment-questionnaires-list      (GET)
//   - /api/assessment-questionnaires-create    (POST {slug, name})
//   - /api/assessment-questionnaires-update    (PATCH ?id= {name | drempels})
//   - /api/assessment-questionnaires-activate  (POST {id})
// Geen RBAC-/endpoint-wijziging — alles op admin.joost_config.
// ──────────────────────────────────────────────────────────────────────────────
window._qqState = window._qqState || {
  loaded: false,
  items: [],
  selectedId: null,
  activeSubTab: 'questions',
};

function qqShowBanner(host, type, msg) {
  const el = document.getElementById(host);
  if (!el) return;
  const palette = type === 'error'
    ? 'background:rgba(220,38,38,.12);color:#b91c1c;border:1px solid rgba(220,38,38,.3)'
    : 'background:rgba(16,185,129,.12);color:#059669;border:1px solid rgba(16,185,129,.3)';
  el.style.cssText = 'display:block;margin:0 0 10px;padding:10px 14px;border-radius:8px;font-size:13px;' + palette;
  el.textContent = msg;
}

function qqHideBanner(host) {
  const el = document.getElementById(host);
  if (el) el.style.display = 'none';
}

function qqGetSelected() {
  if (!window._qqState.selectedId) return null;
  return window._qqState.items.find((it) => it.id === window._qqState.selectedId) || null;
}

async function qqLoadList() {
  const sel = document.getElementById('qqSelector');
  if (!sel) return;
  sel.innerHTML = '<option value="">Laden…</option>';
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-list');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      sel.innerHTML = '<option value="">Fout</option>';
      qqShowBanner('assessmentQuestionsBanner', 'error', 'Vragenlijsten laden mislukt: ' + (j.error || ('HTTP ' + r.status)));
      return;
    }
    const j = await r.json();
    window._qqState.items = Array.isArray(j.items) ? j.items : [];
    window._qqState.loaded = true;

    // Selectie bepalen: behoud huidige als die nog bestaat, anders pak actief,
    // anders eerste item.
    let target = null;
    if (window._qqState.selectedId) {
      target = window._qqState.items.find((it) => it.id === window._qqState.selectedId) || null;
    }
    if (!target) target = window._qqState.items.find((it) => it.is_active) || null;
    if (!target && window._qqState.items.length > 0) target = window._qqState.items[0];
    window._qqState.selectedId = target ? target.id : null;

    qqRenderSelector();
    // Laad afgeleide content voor de geselecteerde vragenlijst.
    loadAssessmentQuestions();
    qqLoadThresholds();
  } catch (e) {
    sel.innerHTML = '<option value="">Fout</option>';
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Vragenlijsten laden mislukt: ' + e.message);
  }
}

function qqRenderSelector() {
  const sel = document.getElementById('qqSelector');
  const badge = document.getElementById('qqActiveBadge');
  const actBtn = document.getElementById('qqActivateBtn');
  if (!sel) return;
  if (window._qqState.items.length === 0) {
    sel.innerHTML = '<option value="">(geen vragenlijsten)</option>';
    if (badge) badge.style.display = 'none';
    if (actBtn) actBtn.disabled = true;
    return;
  }
  sel.innerHTML = window._qqState.items.map((it) => ''
    + '<option value="' + esc(it.id) + '"' + (it.id === window._qqState.selectedId ? ' selected' : '') + '>'
    +   esc(it.name) + ' (' + esc(it.slug) + ')'
    +   (it.is_active ? ' — actief' : '')
    + '</option>'
  ).join('');
  const selected = qqGetSelected();
  if (badge) badge.style.display = (selected && selected.is_active) ? 'inline-flex' : 'none';
  if (actBtn) actBtn.disabled = !!(selected && selected.is_active);
}

function qqOnSelectorChange() {
  const sel = document.getElementById('qqSelector');
  if (!sel) return;
  window._qqState.selectedId = sel.value || null;
  qqRenderSelector();
  qqHideBanner('assessmentQuestionsBanner');
  qqHideBanner('qqScoringBanner');
  loadAssessmentQuestions();
  qqLoadThresholds();
}

async function qqNewQuestionnaire() {
  qqHideBanner('assessmentQuestionsBanner');
  const name = (prompt('Naam van de nieuwe vragenlijst (bv. "Forex 2026 — variant A")') || '').trim();
  if (!name) return;
  const slugDefault = name.toLowerCase().normalize('NFKD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64) || 'vragenlijst';
  const slug = (prompt('Slug (lowercase a-z0-9_-)', slugDefault) || '').trim();
  if (!slug) return;
  if (!/^[a-z0-9_-]{1,64}$/.test(slug)) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Slug ongeldig: alleen lowercase a-z0-9_- en max 64 chars.');
    return;
  }
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-create', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ slug, name }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('assessmentQuestionsBanner', 'error', j.error || ('HTTP ' + r.status));
      return;
    }
    qqShowBanner('assessmentQuestionsBanner', 'success', 'Vragenlijst "' + name + '" aangemaakt. Voeg vragen toe en zet hem actief wanneer klaar.');
    window._qqState.selectedId = j.item?.id || null;
    await qqLoadList();
  } catch (e) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Aanmaken mislukt: ' + e.message);
  }
}

async function qqRenameQuestionnaire() {
  qqHideBanner('assessmentQuestionsBanner');
  const cur = qqGetSelected();
  if (!cur) return;
  const next = (prompt('Nieuwe naam voor "' + cur.name + '":', cur.name) || '').trim();
  if (!next || next === cur.name) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-update?id=' + encodeURIComponent(cur.id), {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: next }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('assessmentQuestionsBanner', 'error', j.error || ('HTTP ' + r.status));
      return;
    }
    qqShowBanner('assessmentQuestionsBanner', 'success', 'Hernoemd naar "' + next + '".');
    await qqLoadList();
  } catch (e) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Hernoemen mislukt: ' + e.message);
  }
}

async function qqActivateQuestionnaire() {
  qqHideBanner('assessmentQuestionsBanner');
  const cur = qqGetSelected();
  if (!cur) return;
  if (cur.is_active) return;
  if (!confirm('"' + cur.name + '" als actieve vragenlijst zetten? De publieke flow gaat dan deze set serveren.')) return;
  const btn = document.getElementById('qqActivateBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-activate', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: cur.id }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('assessmentQuestionsBanner', 'error', j.error || ('HTTP ' + r.status));
      if (btn) btn.disabled = false;
      return;
    }
    qqShowBanner('assessmentQuestionsBanner', 'success', '"' + cur.name + '" is nu actief.');
    await qqLoadList();
  } catch (e) {
    qqShowBanner('assessmentQuestionsBanner', 'error', 'Activeren mislukt: ' + e.message);
    if (btn) btn.disabled = false;
  }
}

function qqSelectSubTab(name) {
  if (name !== 'questions' && name !== 'scoring') return;
  window._qqState.activeSubTab = name;
  document.querySelectorAll('#qqSubTabs .qq-subtab').forEach((b) => {
    b.classList.toggle('active', b.dataset.qqsub === name);
  });
  document.querySelectorAll('.qq-subpane[data-qqsubpane]').forEach((p) => {
    p.classList.toggle('active', p.dataset.qqsubpane === name);
  });
}

function qqLoadThresholds() {
  qqHideBanner('qqScoringBanner');
  const cur = qqGetSelected();
  const inG = document.getElementById('qqGevorderd');
  const inM = document.getElementById('qqMotivatie');
  const inL = document.getElementById('qqLowMid');
  if (!inG || !inM || !inL) return;
  if (!cur) {
    inG.value = ''; inM.value = ''; inL.value = '';
    qqRenderBands();
    return;
  }
  inG.value = Number.isFinite(cur.gevorderd_threshold) ? cur.gevorderd_threshold : '';
  inM.value = Number.isFinite(cur.motivatie_floor)     ? cur.motivatie_floor     : '';
  inL.value = Number.isFinite(cur.low_mid_threshold)   ? cur.low_mid_threshold   : '';
  qqRenderBands();
}

function qqRenderBands() {
  const host = document.getElementById('qqBandPreview');
  if (!host) return;
  const g = Number(document.getElementById('qqGevorderd')?.value);
  const m = Number(document.getElementById('qqMotivatie')?.value);
  const l = Number(document.getElementById('qqLowMid')?.value);
  if (!Number.isFinite(g) || !Number.isFinite(m) || !Number.isFinite(l)) {
    host.innerHTML = '<div style="font-size:12px;color:var(--text-faint)">Vul alle drie de drempels in om de bands te zien.</div>';
    return;
  }
  // Sanity-warnings (niet-blokkerend, want server accepteert elke waarde >= 0).
  const warns = [];
  if (l >= g) warns.push('Low-mid (' + l + ') ligt op of boven Gevorderd (' + g + ') — de mid-band is leeg.');
  if (m < 0 || m > 10) warns.push('Motivatie-floor (' + m + ') hoort tussen 0 en 10 te liggen.');
  host.innerHTML = ''
    + '<div class="qq-band-row">'
    +   '<div class="qq-band-lbl">basis-low</div>'
    +   '<div class="qq-band-desc">skill-score &lt; <strong>' + l + '</strong> &nbsp;→&nbsp; routing <code>basis</code> · copy-tier <em>low</em></div>'
    +   '<span class="qq-band-tag low">low</span>'
    + '</div>'
    + '<div class="qq-band-row">'
    +   '<div class="qq-band-lbl">basis-mid</div>'
    +   '<div class="qq-band-desc">skill-score in [<strong>' + l + '</strong> .. ' + Math.max(g - 1, l) + '] &nbsp;<em>of</em>&nbsp; skill ≥ ' + g + ' maar motivatie &lt; ' + m + ' / uitspraak=gratis_info &nbsp;→&nbsp; routing <code>basis</code> · copy-tier <em>mid</em></div>'
    +   '<span class="qq-band-tag mid">mid</span>'
    + '</div>'
    + '<div class="qq-band-row">'
    +   '<div class="qq-band-lbl">gevorderd</div>'
    +   '<div class="qq-band-desc">skill-score ≥ <strong>' + g + '</strong> &nbsp;&amp;&nbsp; motivatie ≥ <strong>' + m + '</strong> &nbsp;&amp;&nbsp; uitspraak ≠ gratis_info &nbsp;→&nbsp; routing <code>gevorderd</code> · copy-tier <em>high</em></div>'
    +   '<span class="qq-band-tag high">high</span>'
    + '</div>'
    + (warns.length ? '<div style="margin-top:8px;font-size:11.5px;color:#b45309">⚠ ' + warns.map(esc).join(' &nbsp;·&nbsp; ') + '</div>' : '');
}

async function qqSaveThresholds() {
  qqHideBanner('qqScoringBanner');
  const cur = qqGetSelected();
  if (!cur) {
    qqShowBanner('qqScoringBanner', 'error', 'Geen vragenlijst geselecteerd.');
    return;
  }
  const g = Number(document.getElementById('qqGevorderd').value);
  const m = Number(document.getElementById('qqMotivatie').value);
  const l = Number(document.getElementById('qqLowMid').value);
  for (const [label, v] of [['Gevorderd-drempel', g], ['Motivatie-floor', m], ['Low-mid-drempel', l]]) {
    if (!Number.isInteger(v) || v < 0) {
      qqShowBanner('qqScoringBanner', 'error', label + ' moet een integer >= 0 zijn.');
      return;
    }
  }
  const btn = document.getElementById('qqSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Opslaan…'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/assessment-questionnaires-update?id=' + encodeURIComponent(cur.id), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        gevorderd_threshold: g,
        motivatie_floor    : m,
        low_mid_threshold  : l,
      }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      qqShowBanner('qqScoringBanner', 'error', j.error || ('HTTP ' + r.status));
      return;
    }
    // Update lokale state met de geretourneerde rij.
    const idx = window._qqState.items.findIndex((it) => it.id === cur.id);
    if (idx >= 0 && j.item) window._qqState.items[idx] = { ...window._qqState.items[idx], ...j.item };
    qqShowBanner('qqScoringBanner', 'success', 'Drempels opgeslagen. Nieuwe submissies gebruiken vanaf nu deze waarden.');
  } catch (e) {
    qqShowBanner('qqScoringBanner', 'error', 'Opslaan mislukt: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-device-floppy"></i> Opslaan'; }
  }
}

// Wire de sub-tab-strip (idempotent — _wired vlag voorkomt dubbele handlers).
function _qqWireSubTabs() {
  if (_qqWireSubTabs._wired) return;
  const tabs = document.querySelectorAll('#qqSubTabs .qq-subtab');
  if (!tabs.length) return;
  tabs.forEach((btn) => {
    btn.addEventListener('click', () => qqSelectSubTab(btn.dataset.qqsub));
  });
  _qqWireSubTabs._wired = true;
}

function renderAssessmentQuestionsList() {
  const wrap = document.getElementById('assessmentQuestionsList');
  if (!wrap) return;
  if (_aqItems.length === 0) {
    wrap.innerHTML = '<div style="font-size:12.5px;color:var(--text-faint);padding:14px">Nog geen vragen — klik op + Nieuwe vraag.</div>';
    return;
  }
  const groups = {};
  const sectionOrder = [];
  for (const q of _aqItems) {
    const s = q.section || '(geen sectie)';
    if (!groups[s]) { groups[s] = []; sectionOrder.push(s); }
    groups[s].push(q);
  }
  wrap.innerHTML = sectionOrder.map(sec => {
    const items = groups[sec];
    return ''
      + '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">'
      +   '<div style="padding:10px 14px;background:rgba(0,0,0,.04);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--text-dim)">' + esc(sec) + ' (' + items.length + ')</div>'
      +   items.map((q, idx) => renderAssessmentQuestionRow(q, idx, items.length)).join('')
      + '</div>';
  }).join('');
}

function renderAssessmentQuestionRow(q, idxInSection, totalInSection) {
  const dimStyle = q.active ? '' : 'opacity:0.55';
  const badges = []
    .concat(q.is_routing ? ['<span style="font-size:10px;font-weight:600;background:rgba(99,102,241,.15);color:#6366f1;padding:2px 6px;border-radius:999px">routing</span>'] : [])
    .concat(q.required ? ['<span style="font-size:10px;font-weight:600;background:rgba(220,38,38,.12);color:#dc2626;padding:2px 6px;border-radius:999px">verplicht</span>'] : [])
    .concat(!q.active ? ['<span style="font-size:10px;font-weight:600;background:rgba(107,114,128,.15);color:#6b7280;padding:2px 6px;border-radius:999px">inactive</span>'] : [])
    .join(' ');
  const reorderUp   = idxInSection > 0 ? '<button class="btn btn-sm" type="button" onclick="reorderAssessmentQuestion(\'' + esc(q.id) + '\', -1)" title="Omhoog"><i class="ti ti-chevron-up"></i></button>' : '<span style="display:inline-block;width:30px"></span>';
  const reorderDown = idxInSection < totalInSection - 1 ? '<button class="btn btn-sm" type="button" onclick="reorderAssessmentQuestion(\'' + esc(q.id) + '\', +1)" title="Omlaag"><i class="ti ti-chevron-down"></i></button>' : '<span style="display:inline-block;width:30px"></span>';
  const toggleLabel = q.active ? 'Deactiveer' : 'Activeer';
  return ''
    + '<div style="display:grid;grid-template-columns:80px 1fr auto auto;gap:10px;align-items:center;padding:10px 14px;border-top:1px solid var(--border);' + dimStyle + '">'
    +   '<div style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;color:var(--text-faint)">#' + esc(q.order_index) + '</div>'
    +   '<div>'
    +     '<div style="font-size:13.5px;font-weight:600">' + esc(q.label) + '</div>'
    +     '<div style="font-size:11.5px;color:var(--text-faint);margin-top:2px">'
    +       '<code style="font-family:ui-monospace,Menlo,Consolas,monospace">' + esc(q.key) + '</code>'
    +       ' · ' + esc(q.type)
    +       (q.type === 'open_text' && q.min_words ? ' · min ' + esc(q.min_words) + ' woorden' : '')
    +       (Array.isArray(q.options) ? ' · ' + q.options.length + ' opties' : '')
    +       ' ' + badges
    +     '</div>'
    +   '</div>'
    +   '<div style="display:flex;gap:4px">' + reorderUp + reorderDown + '</div>'
    +   '<div style="display:flex;gap:4px">'
    +     '<button class="btn btn-sm" type="button" onclick="openAssessmentQuestionEdit(\'' + esc(q.id) + '\')"><i class="ti ti-edit"></i></button>'
    +     '<button class="btn btn-sm" type="button" onclick="toggleAssessmentQuestionActive(\'' + esc(q.id) + '\')" title="' + toggleLabel + '"><i class="ti ti-' + (q.active ? 'eye-off' : 'eye') + '"></i></button>'
    +   '</div>'
    + '</div>';
}

let _aqOptionRows  = [];
let _aqScaleWeights = {};

function _aqSlugify(input) {
  if (input == null) return 'vraag';
  const s = String(input)
    .toLowerCase()
    .normalize('NFKD')
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9]+/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_+|_+$/g, '')
    .slice(0, 64);
  return s.length ? s : 'vraag';
}

function _aqUnlockKey() {
  const keyEl  = document.getElementById('aqKey');
  const badge  = document.getElementById('aqKeyAutoBadge');
  const btn    = document.getElementById('aqKeyEditBtn');
  if (!keyEl) return;
  keyEl.removeAttribute('readonly');
  keyEl.style.background = '';
  keyEl.style.color = '';
  keyEl.focus();
  keyEl.select();
  if (badge) badge.style.display = 'none';
  if (btn)   btn.style.display = 'none';
  keyEl.dataset.aqAuto = '0';
}

function _aqSyncKeyFromLabel() {
  const labelEl = document.getElementById('aqLabel');
  const keyEl   = document.getElementById('aqKey');
  if (!labelEl || !keyEl) return;
  if (keyEl.dataset.aqAuto !== '1') return;
  keyEl.value = _aqSlugify(labelEl.value);
}

function _aqAddOptionRow(value, label, points, isOriginal) {
  _aqOptionRows.push({
    value     : value || '',
    label     : label || '',
    points    : (typeof points === 'number' && Number.isFinite(points)) ? points : 0,
    isOriginal: !!isOriginal,
  });
  _aqRenderOptionRows();
  const rows = document.querySelectorAll('#aqOptionsRows .aq-opt-row');
  const last = rows[rows.length - 1];
  const inp = last && last.querySelector('.aq-opt-label');
  if (inp) inp.focus();
}

function _aqRemoveOptionRow(idx) {
  if (idx < 0 || idx >= _aqOptionRows.length) return;
  _aqOptionRows.splice(idx, 1);
  _aqRenderOptionRows();
  _aqRenderPreview();
}

function _aqRenderOptionRows() {
  const host = document.getElementById('aqOptionsRows');
  if (!host) return;
  const isRouting = document.getElementById('aqIsRouting')?.checked;
  if (_aqOptionRows.length === 0) {
    host.innerHTML = '<div style="font-size:12px;color:var(--text-faint);padding:6px 0">Nog geen opties — klik op "Optie toevoegen".</div>';
    return;
  }
  host.innerHTML = _aqOptionRows.map((row, idx) => {
    const lockTitle = row.isOriginal
      ? 'Bestaande optie — de interne sleutel (value) blijft ongewijzigd bij hernoemen.'
      : 'Nieuwe optie — de interne sleutel wordt afgeleid uit het label.';
    const valHint = row.value
      ? `<span style="font-size:10.5px;color:var(--text-faint);margin-left:6px" title="${row.isOriginal ? 'Bewaard' : 'Wordt opgeslagen'}">${row.isOriginal ? '🔒 ' : '↳ '}${row.value}</span>`
      : '';
    const pointsField = isRouting
      ? `<input type="number" class="form-input aq-opt-points" data-idx="${idx}" step="1" value="${Number.isFinite(row.points) ? row.points : 0}" title="Punten" style="width:80px" />`
      : '';
    return `
      <div class="aq-opt-row" data-idx="${idx}" style="display:flex;gap:6px;align-items:center" title="${lockTitle}">
        <input type="text" class="form-input aq-opt-label" data-idx="${idx}" value="${(row.label || '').replace(/"/g, '&quot;')}" maxlength="200" placeholder="Optie-tekst" style="flex:1" />
        ${pointsField}
        <button type="button" class="btn btn-sm" data-idx="${idx}" onclick="_aqRemoveOptionRow(${idx})" title="Verwijderen"><i class="ti ti-x"></i></button>
        ${valHint ? `<div style="min-width:90px">${valHint}</div>` : '<div style="min-width:90px"></div>'}
      </div>
    `;
  }).join('');
  host.querySelectorAll('.aq-opt-label').forEach((el) => {
    el.addEventListener('input', () => {
      const idx = Number(el.dataset.idx);
      if (!_aqOptionRows[idx]) return;
      _aqOptionRows[idx].label = el.value;
      if (!_aqOptionRows[idx].isOriginal) {
        _aqOptionRows[idx].value = _aqSlugify(el.value);
        const hint = el.closest('.aq-opt-row').querySelector('span');
        if (hint) hint.textContent = '↳ ' + (_aqOptionRows[idx].value || '');
      }
      _aqRenderPreview();
    });
  });
  host.querySelectorAll('.aq-opt-points').forEach((el) => {
    el.addEventListener('input', () => {
      const idx = Number(el.dataset.idx);
      if (!_aqOptionRows[idx]) return;
      const n = Number(el.value);
      _aqOptionRows[idx].points = Number.isFinite(n) ? n : 0;
    });
  });
}

function _aqRenderScaleWeights() {
  const host = document.getElementById('aqScaleWeightsRows');
  if (!host) return;
  const type = document.getElementById('aqType').value;
  const max  = type === 'scale_1_10' ? 10 : (type === 'scale_1_5' ? 5 : 0);
  if (max === 0) { host.innerHTML = ''; return; }
  host.innerHTML = '';
  for (let i = 1; i <= max; i++) {
    const key = String(i);
    if (!(key in _aqScaleWeights)) _aqScaleWeights[key] = i - 1;
    const val = _aqScaleWeights[key];
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--bg)';
    wrap.innerHTML = `
      <span style="font-size:12px;font-weight:600;color:var(--text-dim);min-width:18px;text-align:center">${i}</span>
      <input type="number" class="form-input aq-scale-w" data-step="${key}" step="1" value="${val}" style="width:64px" />
    `;
    host.appendChild(wrap);
  }
  host.querySelectorAll('.aq-scale-w').forEach((el) => {
    el.addEventListener('input', () => {
      const step = el.dataset.step;
      const n = Number(el.value);
      _aqScaleWeights[step] = Number.isFinite(n) ? n : 0;
    });
  });
}

function _aqRenderPreview() {
  const wrap = document.getElementById('aqPreviewWrap');
  const toggle = document.getElementById('aqPreviewToggle');
  if (!wrap || !toggle) return;
  if (!toggle.checked) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';

  const escHtml = (s) => (s == null ? '' : String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;'));

  const type    = document.getElementById('aqType').value;
  const label   = document.getElementById('aqLabel').value.trim() || '(geen vraag-label)';
  const help    = document.getElementById('aqHelpText').value.trim();
  const req     = !!document.getElementById('aqRequired').checked;
  const required = req ? '<span style="color:#dc2626;font-weight:700;margin-left:4px">*</span>' : '';

  let inputHtml = '';
  if (type === 'text' || type === 'email' || type === 'tel') {
    const ph = type === 'email' ? 'naam@voorbeeld.nl' : (type === 'tel' ? '+316...' : '');
    inputHtml = `<input type="${escHtml(type)}" class="form-input" disabled placeholder="${escHtml(ph)}" />`;
  } else if (type === 'radio') {
    if (_aqOptionRows.length === 0) {
      inputHtml = '<div style="font-size:12px;color:var(--text-faint)">Voeg opties toe om de preview te zien.</div>';
    } else {
      inputHtml = '<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">' +
        _aqOptionRows.map((o, i) => `
          <label style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;cursor:not-allowed;background:var(--bg)">
            <input type="radio" name="aq-preview" disabled />
            <span>${escHtml(o.label || '(zonder label)')}</span>
          </label>
        `).join('') +
      '</div>';
    }
  } else if (type === 'scale_1_5' || type === 'scale_1_10') {
    const max = type === 'scale_1_10' ? 10 : 5;
    let chips = '';
    for (let i = 1; i <= max; i++) {
      chips += `<label style="display:inline-flex;flex-direction:column;align-items:center;gap:2px;padding:6px 10px;border:1px solid var(--border);border-radius:99px;cursor:not-allowed;background:var(--bg);font-size:12px;font-weight:600">
        <span>${i}</span>
        <input type="radio" name="aq-preview-scale" disabled style="margin:0" />
      </label>`;
    }
    inputHtml = '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px">' + chips + '</div>';
  } else if (type === 'open_text') {
    const mw = document.getElementById('aqMinWords').value;
    const note = (mw && Number(mw) > 0) ? `<div style="font-size:11px;color:var(--text-faint);margin-top:4px">Minimaal ${escHtml(mw)} woorden.</div>` : '';
    inputHtml = `<textarea class="form-input" disabled rows="4" placeholder="Antwoord van de deelnemer…"></textarea>${note}`;
  }

  wrap.innerHTML = `
    <div style="font-size:13.5px;font-weight:700;margin-bottom:4px">${escHtml(label)}${required}</div>
    ${help ? `<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">${escHtml(help)}</div>` : ''}
    ${inputHtml}
  `;
}

function openAssessmentQuestionEdit(id) {
  _aqEditingId = id || null;
  const tpl = id ? (_aqItems.find(x => x.id === id) || null) : null;
  document.getElementById('assessmentQuestionModalTitle').textContent = tpl ? 'Vraag bewerken' : 'Nieuwe vraag';
  document.getElementById('assessmentQuestionEditError').style.display = 'none';

  const keyEl   = document.getElementById('aqKey');
  const keyBtn  = document.getElementById('aqKeyEditBtn');
  const keyBadge = document.getElementById('aqKeyAutoBadge');
  keyEl.value = tpl ? tpl.key : '';
  if (tpl) {
    keyEl.setAttribute('readonly', 'readonly');
    keyEl.disabled = true;
    keyEl.style.background = 'var(--bg-elev-2,#f8f8f8)';
    keyEl.style.color = 'var(--text-dim)';
    keyEl.dataset.aqAuto = '0';
    if (keyBtn)   keyBtn.style.display = 'none';
    if (keyBadge) { keyBadge.textContent = '(vast)'; keyBadge.style.display = ''; }
  } else {
    keyEl.disabled = false;
    keyEl.setAttribute('readonly', 'readonly');
    keyEl.style.background = 'var(--bg-elev-2,#f8f8f8)';
    keyEl.style.color = 'var(--text-dim)';
    keyEl.dataset.aqAuto = '1';
    if (keyBtn)   keyBtn.style.display = '';
    if (keyBadge) { keyBadge.textContent = '(automatisch)'; keyBadge.style.display = ''; }
  }

  document.getElementById('aqSection').value     = tpl ? (tpl.section || '') : '';
  document.getElementById('aqType').value        = tpl ? tpl.type : 'text';
  document.getElementById('aqOrderIndex').value  = tpl ? tpl.order_index : 0;
  document.getElementById('aqLabel').value       = tpl ? tpl.label : '';
  document.getElementById('aqHelpText').value    = tpl && tpl.help_text ? tpl.help_text : '';
  document.getElementById('aqRequired').checked  = tpl ? !!tpl.required : true;
  document.getElementById('aqActive').checked    = tpl ? !!tpl.active   : true;
  document.getElementById('aqIsRouting').checked = tpl ? !!tpl.is_routing : false;
  document.getElementById('aqMinWords').value    = tpl && tpl.min_words != null ? tpl.min_words : '';

  _aqOptionRows = [];
  if (tpl && Array.isArray(tpl.options) && tpl.type === 'radio') {
    const rw = (tpl.routing_weights && typeof tpl.routing_weights === 'object' && !Array.isArray(tpl.routing_weights))
      ? tpl.routing_weights : {};
    for (const o of tpl.options) {
      if (!o || typeof o.value !== 'string' || typeof o.label !== 'string') continue;
      const pts = (typeof rw[o.value] === 'number' && Number.isFinite(rw[o.value])) ? rw[o.value] : 0;
      _aqOptionRows.push({ value: o.value, label: o.label, points: pts, isOriginal: true });
    }
  }

  _aqScaleWeights = {};
  if (tpl && (tpl.type === 'scale_1_5' || tpl.type === 'scale_1_10')) {
    const rw = (tpl.routing_weights && typeof tpl.routing_weights === 'object' && !Array.isArray(tpl.routing_weights))
      ? tpl.routing_weights : {};
    const max = tpl.type === 'scale_1_10' ? 10 : 5;
    for (let i = 1; i <= max; i++) {
      const k = String(i);
      _aqScaleWeights[k] = (typeof rw[k] === 'number' && Number.isFinite(rw[k])) ? rw[k] : (i - 1);
    }
  }

  const pt = document.getElementById('aqPreviewToggle');
  if (pt) pt.checked = false;
  const pw = document.getElementById('aqPreviewWrap');
  if (pw) pw.style.display = 'none';

  if (!openAssessmentQuestionEdit._wired) {
    document.getElementById('aqType').addEventListener('change', _aqUpdateConditionalGroups);
    document.getElementById('aqIsRouting').addEventListener('change', () => {
      _aqRenderOptionRows();
      _aqUpdateConditionalGroups();
    });
    document.getElementById('aqLabel').addEventListener('input', () => {
      _aqSyncKeyFromLabel();
      _aqRenderPreview();
    });
    document.getElementById('aqHelpText').addEventListener('input', _aqRenderPreview);
    document.getElementById('aqRequired').addEventListener('change', _aqRenderPreview);
    document.getElementById('aqMinWords').addEventListener('input', _aqRenderPreview);
    openAssessmentQuestionEdit._wired = true;
  }

  _aqUpdateConditionalGroups();
  if (!tpl) _aqSyncKeyFromLabel();
  _aqRenderPreview();

  document.getElementById('assessmentQuestionEditModal').classList.remove('hidden');
}

function _aqUpdateConditionalGroups() {
  const type = document.getElementById('aqType').value;
  const isRouting = document.getElementById('aqIsRouting').checked;
  const isRadio = type === 'radio';
  const isScale = type === 'scale_1_5' || type === 'scale_1_10';
  const isOpen  = type === 'open_text';

  document.getElementById('aqMinWordsGroup').style.display     = isOpen  ? '' : 'none';
  document.getElementById('aqOptionsGroup').style.display      = isRadio ? '' : 'none';
  document.getElementById('aqScaleWeightsGroup').style.display = (isScale && isRouting) ? '' : 'none';

  const isRoutingWrap = document.getElementById('aqIsRoutingWrap');
  if (isRoutingWrap) {
    isRoutingWrap.style.display = (isRadio || isScale) ? 'inline-flex' : 'none';
  }
  const ph = document.getElementById('aqEmailPrefillHint');
  if (ph) ph.style.display = (type === 'email' || type === 'tel') ? '' : 'none';

  if (isRadio) _aqRenderOptionRows();
  if (isScale && isRouting) _aqRenderScaleWeights();

  _aqRenderPreview();
}

function _aqShowError(msg) {
  const el = document.getElementById('assessmentQuestionEditError');

  el.style.display = '';
}

async function saveAssessmentQuestion() {
  const errEl = document.getElementById('assessmentQuestionEditError');
  if (errEl) errEl.style.display = 'none';

  const type      = document.getElementById('aqType').value;
  const isRouting = document.getElementById('aqIsRouting').checked;

  const payload = {
    section     : (document.getElementById('aqSection').value || '').trim(),
    type        : type,
    order_index : Number(document.getElementById('aqOrderIndex').value || 0),
    label       : (document.getElementById('aqLabel').value || '').trim(),
    help_text   : (document.getElementById('aqHelpText').value || '').trim() || null,
    required    : !!document.getElementById('aqRequired').checked,
    active      : !!document.getElementById('aqActive').checked,
    is_routing  : isRouting,
  };

  if (!payload.section) { _aqShowError('Section is verplicht'); return; }
  if (!payload.label)   { _aqShowError('Label is verplicht'); return; }

  if (type === 'open_text') {
    const mwRaw = (document.getElementById('aqMinWords').value || '').trim();
    payload.min_words = mwRaw === '' ? null : Number(mwRaw);
    if (mwRaw !== '' && (!Number.isInteger(payload.min_words) || payload.min_words < 0)) {
      _aqShowError('Min. woorden moet een integer >= 0 zijn'); return;
    }
  } else {
    payload.min_words = null;
  }

  if (type === 'radio') {
    if (_aqOptionRows.length === 0) { _aqShowError('Voeg ten minste 1 antwoordoptie toe'); return; }
    const outOpts = [];
    const outWeights = isRouting ? {} : null;
    const seenValues = new Set();
    for (let i = 0; i < _aqOptionRows.length; i++) {
      const row = _aqOptionRows[i];
      const labelText = (row.label || '').trim();
      if (!labelText) { _aqShowError('Optie ' + (i + 1) + ' mist een label'); return; }
      let val = row.value;
      if (!row.isOriginal) {
        const base = _aqSlugify(labelText);
        val = base;
        let n = 2;
        while (seenValues.has(val)) {
          val = base + '_' + n;
          n++;
          if (n > 50) break;
        }
      }
      if (!val || !/^[a-z0-9_-]{1,64}$/.test(val)) {
        _aqShowError('Optie ' + (i + 1) + ' heeft een ongeldige interne sleutel (' + (val || 'leeg') + ')'); return;
      }
      if (seenValues.has(val)) { _aqShowError('Optie ' + (i + 1) + ': dubbele interne sleutel ' + val); return; }
      seenValues.add(val);
      outOpts.push({ value: val, label: labelText });
      if (outWeights) {
        const pts = (typeof row.points === 'number' && Number.isFinite(row.points)) ? row.points : 0;
        outWeights[val] = pts;
      }
    }
    payload.options = outOpts;
    payload.routing_weights = outWeights;
  } else if (type === 'scale_1_5' || type === 'scale_1_10') {
    payload.options = null;
    if (isRouting) {
      const max = type === 'scale_1_10' ? 10 : 5;
      const out = {};
      for (let i = 1; i <= max; i++) {
        const k = String(i);
        const v = _aqScaleWeights[k];
        if (typeof v !== 'number' || !Number.isFinite(v)) {
          _aqShowError('Punten voor stap ' + i + ' moet een getal zijn'); return;
        }
        out[k] = v;
      }
      payload.routing_weights = out;
    } else {
      payload.routing_weights = null;
    }
  } else {
    payload.options = null;
    payload.routing_weights = null;
  }

  const btn = document.getElementById('aqSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Opslaan…'; }
  try {
    let r;
    if (_aqEditingId) {
      r = await window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(_aqEditingId), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
    } else {
      const keyEl = document.getElementById('aqKey');
      let keyVal  = (keyEl.value || '').trim();
      if (!keyVal && (keyEl.dataset.aqAuto === '1')) {
        keyVal = _aqSlugify(document.getElementById('aqLabel').value);
        keyEl.value = keyVal;
      }
      if (!/^[a-z0-9_-]{1,64}$/.test(keyVal)) {
        _aqShowError('Sleutel ongeldig: alleen kleine letters, cijfers, _ of -. Klik op "Sleutel aanpassen" en pas hem aan.');
        if (btn) { btn.disabled = false; btn.textContent = 'Opslaan'; }
        return;
      }
      payload.key = keyVal;
      // FEATURE C: nieuwe vraag landt op de geselecteerde vragenlijst (anders
      // server-side default = actief). Voor consistentie geven we 'm altijd
      // expliciet mee als er een selectie is.
      const selQid = (window._qqState && window._qqState.selectedId) || null;
      if (selQid) payload.questionnaire_id = selQid;
      r = await window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload),
      });
    }
    const j = await r.json().catch(() => ({}));
    if (!r.ok) {
      _aqShowError(j.error || ('HTTP ' + r.status));
      return;
    }
    document.getElementById('assessmentQuestionEditModal').classList.add('hidden');
    aqBanner('success', _aqEditingId ? 'Vraag bijgewerkt.' : 'Vraag aangemaakt.', 4000);
    _aqEditingId = null;
    loadAssessmentQuestions();
  } catch (e) {
    _aqShowError('Fout: ' + e.message);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Opslaan'; }
  }
}

async function toggleAssessmentQuestionActive(id) {
  const q = _aqItems.find(x => x.id === id);
  if (!q) return;
  const verb = q.active ? 'deactiveren' : 'activeren';
  if (!confirm('Vraag "' + q.label + '" ' + verb + '?\n\nForward-only: bestaande inzendingen blijven hun antwoorden behouden.')) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(id), {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ active: !q.active }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) { aqBanner('error', j.error || 'Update mislukt', 6000); return; }
    aqBanner('success', q.active ? 'Vraag gedeactiveerd.' : 'Vraag geactiveerd.', 4000);
    loadAssessmentQuestions();
  } catch (e) {
    aqBanner('error', 'Fout: ' + e.message, 6000);
  }
}

async function reorderAssessmentQuestion(id, delta) {
  const q = _aqItems.find(x => x.id === id);
  if (!q) return;
  const section = q.section;
  const peers = _aqItems.filter(x => x.section === section).sort((a, b) => a.order_index - b.order_index);
  const idx = peers.findIndex(x => x.id === id);
  const otherIdx = idx + delta;
  if (otherIdx < 0 || otherIdx >= peers.length) return;
  const other = peers[otherIdx];
  const a = q.order_index, b = other.order_index;
  const newA = (a === b) ? (delta < 0 ? a - 1 : a + 1) : b;
  const newB = (a === b) ? a : a;
  try {
    const [r1, r2] = await Promise.all([
      window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(q.id), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order_index: newA }),
      }),
      window.AgentShared.apiFetch('/api/admin-assessment-questions-upsert?id=' + encodeURIComponent(other.id), {
        method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ order_index: newB }),
      }),
    ]);
    if (!r1.ok || !r2.ok) { aqBanner('error', 'Reorder mislukt', 5000); return; }
    loadAssessmentQuestions();
  } catch (e) {
    aqBanner('error', 'Fout: ' + e.message, 6000);
  }
}

function _scShowBanner(text, kind) {

    ? { bg:'rgba(5,150,105,0.12)', col:'#059669', border:'rgba(5,150,105,0.3)' }
    : kind === 'error'
    ? { bg:'rgba(220,38,38,0.12)', col:'#b91c1c', border:'rgba(220,38,38,0.3)' }
    : { bg:'rgba(59,130,246,0.12)', col:'#1d4ed8', border:'rgba(59,130,246,0.3)' };

async function loadSimoneConfig() {
  const wrap = document.getElementById('simoneCfgForm');
  if (!wrap) return;

  // toont alleen nog de sandbox + verhuisd-banner; toch fetchen we kort
  // _simoneCfg op zodat de banner-helpers en sandbox (die niets uit
  // _simoneCfg leest) consistent blijven werken als de tab her-opent.
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-config-get?module=events');
    const d = await r.json().catch(() => ({}));
    if (r.ok) {
      _simoneCfg = d.config || {};
      _simoneCfgDirty = false;
    }
  } catch (_) {
    // Stil — sandbox heeft _simoneCfg niet nodig om te werken.
  }
  // Save-knop bestaat niet meer in dit paneel; null-safe degraderen.
  const saveBtn = document.getElementById('simoneCfgSaveBtn');
  if (saveBtn) saveBtn.disabled = true;
  renderSimoneConfigForm();
}

// Helper voor inline tooltips in de Simone-config form. Geeft een klein

  return '<span class="sc-tip" tabindex="0" role="tooltip" aria-label="' + safe + '" title="' + safe + '">'
       +   '<span class="sc-tip-bubble">' + safe + '</span>'
       + '</span>';
}

// ── Simone sandbox: fake klantvraag testen ──────────────────────────────────
async function runSimoneSandbox() {
  const ta  = document.getElementById('scSandboxInput');
  const out = document.getElementById('scSandboxOutput');
  const btn = document.getElementById('scSandboxRunBtn');
  const rst = document.getElementById('scSandboxResetBtn');
  if (!ta || !out) return;
  const text = (ta.value || '').trim();
  if (!text) {
    out.style.display = 'block';
    out.innerHTML = '<div style="padding:10px 12px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#b91c1c;border-radius:8px;font-size:12.5px">Typ eerst een voorbeeld-vraag.</div>';
    return;
  }
  if (btn) { btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader-2"></i> Bezig…'; }
  out.style.display = 'block';
  out.innerHTML = '<div style="padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12.5px">Simone denkt na…</div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/simone-sandbox-test', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message_text: text }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      out.innerHTML = '<div style="padding:10px 12px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#b91c1c;border-radius:8px;font-size:12.5px">' + esc(d?.error || ('HTTP ' + r.status)) + '</div>';
      if (rst) rst.style.display = '';
      return;
    }
    const sg = d.suggestion || {};
    const au = d.autonomy   || {};
    const confPct = (typeof sg.confidence === 'number') ? Math.round(sg.confidence * 100) + '%' : '—';
    const intentBadge = sg.detected_intent
      ? '<span style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:rgba(99,102,241,.15);color:#6366f1">' + esc(sg.detected_intent) + '</span>'
      : '<span style="color:var(--text-faint);font-size:12px">?</span>';
    const autoLine = au.allow_autonomous
      ? '<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.35);color:#059669;border-radius:8px;font-size:12.5px;font-weight:600"><i class="ti ti-check"></i> Zou autonoom verstuurd worden</div>'
      : '<div style="display:flex;align-items:center;gap:6px;padding:7px 10px;background:rgba(220,38,38,.10);border:1px solid rgba(220,38,38,.3);color:#b91c1c;border-radius:8px;font-size:12.5px;font-weight:600"><i class="ti ti-x"></i> Wordt geblokkeerd' + (au.blocked_reason ? ' (' + esc(au.blocked_reason) + ')' : '') + (au.stop_action ? ' — stop_action=' + esc(au.stop_action) : '') + '</div>';
    const logItems = Array.isArray(au.decision_log) && au.decision_log.length > 0
      ? '<ul style="margin:6px 0 0 18px;padding:0;font-size:11.5px;color:var(--text-dim)">' + au.decision_log.map((l) => '<li>' + esc(l) + '</li>').join('') + '</ul>'
      : '';
    out.innerHTML =
        '<div style="display:flex;flex-direction:column;gap:8px">'
      +   '<div style="display:flex;align-items:center;gap:10px;font-size:12.5px">'
      +     '<span style="color:var(--text-faint);font-weight:600">Intent:</span> ' + intentBadge
      +     '<span style="color:var(--text-faint);font-weight:600;margin-left:8px">Confidence:</span> <strong>' + esc(confPct) + '</strong>'
      +   '</div>'
      +   '<div>'
      +     '<div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px">Voorgesteld antwoord</div>'
      +     '<pre style="margin:0;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;line-height:1.5;white-space:pre-wrap;color:var(--text)">' + esc(sg.suggested_reply || '(leeg)') + '</pre>'
      +   '</div>'
      +   autoLine
      +   logItems
      +   (sg.reasoning ? '<div><div style="font-size:11px;font-weight:700;color:var(--text-faint);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;margin-top:6px">Reasoning</div><div style="font-size:11.5px;color:var(--text-dim);white-space:pre-wrap">' + esc(sg.reasoning) + '</div></div>' : '')
      + '</div>';
    if (rst) rst.style.display = '';
  } catch (e) {
    out.innerHTML = '<div style="padding:10px 12px;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#b91c1c;border-radius:8px;font-size:12.5px">Fout: ' + esc(e?.message || 'onbekend') + '</div>';
    if (rst) rst.style.display = '';
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-flask"></i> Test'; }
  }
}
window.runSimoneSandbox = runSimoneSandbox;

async function saveSimoneConfig() {
  // Config-form is verhuisd naar het Agent center (PR #423). Deze save-flow
  // wordt vanuit deze tab niet meer aangeroepen — alle DOM-reads zijn
  // null-safe gemaakt zodat ontbrekende sc*-elementen geen TypeError gooien.
  // Functie blijft dormant aanwezig zodat externe verwijzingen blijven
  // werken en de logica beschikbaar is voor evt. terugschakelen.
  if (!_simoneCfg) return;
  const formRoot = document.getElementById('simoneCfgForm');
  const scPersonaName = formRoot && document.getElementById('scPersonaName');
  if (!scPersonaName) {
    // Config-form is niet meer aanwezig (verhuisd-banner-modus). No-op met
    // duidelijke melding — geen JS-error, geen mutaties richting backend.
    _scShowBanner('Configuratie bewerken doe je in het Agent center.', 'info');
    return;
  }
  const btn = document.getElementById('simoneCfgSaveBtn');
  if (btn) btn.disabled = true;
  _scShowBanner('Opslaan…', 'info');
  try {
    const personaName = (document.getElementById('scPersonaName')?.value || '').trim();
    const personaTone = (document.getElementById('scPersonaTone')?.value || '').trim();
    const systemPrompt = document.getElementById('scSystemPrompt')?.value || '';
    const isEnabled  = !!document.getElementById('scIsEnabled')?.checked;
    const reactive   = !!document.getElementById('scReactiveEnabled')?.checked;
    const autonomous = !!document.getElementById('scAutonomousEnabled')?.checked;
    const model      = document.getElementById('scModel')?.value || 'claude-sonnet-4-6';
    const tempRaw    = Number(document.getElementById('scTemperature')?.value);
    const ctxRaw     = Number(document.getElementById('scContextCount')?.value);
    const temperature = Number.isFinite(tempRaw) ? Math.min(1, Math.max(0, tempRaw)) : 0.3;
    const context_message_count = Number.isInteger(ctxRaw) ? Math.min(50, Math.max(5, ctxRaw)) : 20;

    // Per-intent autonomy-cfg samenstellen uit de form.
    const intents = {};
    SC_INTENT_KEYS.forEach((k) => {
      const onEl = document.querySelector('.sc-intent-mode[data-key="' + k + '"]');
      const thEl = document.querySelector('.sc-intent-conf[data-key="' + k + '"]');
      const on = onEl && onEl.checked;
      const th = thEl ? Number(thEl.value) : NaN;
      intents[k] = {
        mode: on ? 'autonomous' : 'disabled',
        min_confidence: Number.isFinite(th) ? Math.min(1, Math.max(0, Math.round(th * 100) / 100)) : 0.85,
      };
    });
    intents.cancel_or_reschedule = { mode: 'disabled' };
    intents.escalation_needed    = { mode: 'disabled' };
    intents.other                = { mode: 'disabled' };

    // Communicatie-limieten.
    const ohDays = Array.from(document.querySelectorAll('.sc-oh-day'))
      .filter((el) => el.checked)
      .map((el) => Number(el.dataset.day))
      .filter((n) => Number.isInteger(n) && n >= 1 && n <= 7)
      .sort((a, b) => a - b);
    const communication_limits = {
      max_messages_per_conversation_per_day: Math.max(0, Math.min(50, Number(document.getElementById('scMaxPerDay')?.value) || 3)),
      max_messages_per_conversation_total:   Math.max(0, Math.min(500, Number(document.getElementById('scMaxTotal')?.value) || 20)),
      cooldown_after_outbound_minutes:       Math.max(0, Math.min(1440, Number(document.getElementById('scCooldown')?.value) || 30)),
      no_reply_pause_threshold:              Math.max(0, Math.min(20, Number(document.getElementById('scNoReplyTh')?.value) || 3)),
      no_reply_pause_duration_hours:         Math.max(1, Math.min(720, Number(document.getElementById('scNoReplyHrs')?.value) || 48)),
      office_hours_only:  !!document.getElementById('scOhOn')?.checked,
      office_hours_tz:    (document.getElementById('scOhTz')?.value || 'Europe/Amsterdam').trim(),
      office_hours_days:  ohDays.length > 0 ? ohDays : [1,2,3,4,5],
      office_hours_start: document.getElementById('scOhStart')?.value || '08:30',
      office_hours_end:   document.getElementById('scOhEnd')?.value   || '21:00',
    };

    // Persoonlijkheid.
    const personality = {
      tone:            personaTone || 'vriendelijk-professioneel',
      use_tutoyeer:    !!document.getElementById('scTutoyeer')?.checked,
      max_message_chars: Math.max(50, Math.min(4096, Number(document.getElementById('scMaxChars')?.value) || 480)),
      emoji_policy:    document.getElementById('scEmojiPolicy')?.value || 'sparingly',
    };

    // Full read-modify-write op feature_flags + autonomy_config: behoud
    // bestaande sleutels die de UI niet kent (forward-compat).
    const ffExisting = (_simoneCfg.feature_flags && typeof _simoneCfg.feature_flags === 'object')
      ? _simoneCfg.feature_flags : {};
    const feature_flags = {
      ...ffExisting,
      reactive_suggest_enabled: reactive,
      events_reactive_autonomy: autonomous,
    };
    const acExisting = (_simoneCfg.autonomy_config && typeof _simoneCfg.autonomy_config === 'object')
      ? _simoneCfg.autonomy_config : {};
    const autonomy_config = {
      ...acExisting,
      intents,
      communication_limits,
      personality,
    };

    if (!personaName) {
      _scShowBanner('Persona-naam mag niet leeg zijn', 'error');
      if (btn) btn.disabled = false;
      return;
    }
    const r = await window.AgentShared.apiFetch('/api/joost-config-upsert', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        module: 'events',
        persona_name: personaName,
        persona_tone: personaTone || 'vriendelijk-professioneel',
        system_prompt_template: systemPrompt,
        model,
        temperature,
        context_message_count,
        is_enabled: isEnabled,
        feature_flags,
        autonomy_config,
      }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      _scShowBanner(d.error || ('HTTP ' + r.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    _simoneCfg = d.config || _simoneCfg;
    _simoneCfgDirty = false;
    _scShowBanner('Opgeslagen', 'success');
    renderSimoneConfigForm();
  } catch (e) {
    _scShowBanner(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

async function uploadNiveauPhoto(slug, file, slot) {
  const status = slot.querySelector('.ev-niv-status');
  const okTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp'];
  if (!okTypes.includes((file.type || '').toLowerCase())) { if (status) status.textContent = 'Alleen JPG, PNG of WEBP.'; return; }
  if (file.size > 3 * 1024 * 1024) { if (status) status.textContent = 'Bestand te groot (max 3 MB).'; return; }
  if (status) status.textContent = 'Uploaden…';
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = () => reject(new Error('lees-fout'));
      fr.readAsDataURL(file);
    });
    const base64 = String(dataUrl).split(',')[1] || '';
    const up = await window.AgentShared.apiFetch('/api/event-image-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: file.name, content_type: (file.type || '').toLowerCase(), data_base64: base64 }),
    });
    const uj = await up.json().catch(() => ({}));
    if (!up.ok || !uj.ok) throw new Error(uj.error || ('upload HTTP ' + up.status));
    const sv = await window.AgentShared.apiFetch('/api/events-niveau-default-image-save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, default_image_url: uj.url }),
    });
    const sj = await sv.json().catch(() => ({}));
    if (!sv.ok || !sj.ok) throw new Error(sj.error || ('opslaan HTTP ' + sv.status));
    const prev = slot.querySelector('.ev-niv-preview');
    if (prev) prev.innerHTML = `<img src="${esc(uj.url)}" alt="" style="max-width:140px;border-radius:6px;display:block" />`;
    if (status) status.textContent = 'Opgeslagen.';
  } catch (e) {
    console.error('[niveau-photo]', e);
    if (status) status.textContent = 'Mislukt: ' + (e?.message || 'onbekend');
  }
}

function renderNiveauOptions() {
  const sel = document.getElementById('evNiveau');
