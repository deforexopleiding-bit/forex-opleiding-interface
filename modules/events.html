<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    /* Kebab-actiemenu op event-rij (overview) — fixed-positioned zodat het
       niet door tabel-overflow geklipt wordt. Zelfde patroon als de
       attendee-kebab in events-detail.html (PR #245). */
    .ev-kebab-wrap { position: relative; display: inline-block; }
    .ev-kebab-menu { position: fixed; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 4px; min-width: 180px; z-index: 400; display: none; }
    .ev-kebab-menu.show { display: block; }
    .ev-kebab-item { display: block; width: 100%; padding: 7px 10px; text-align: left; background: transparent; border: none; cursor: pointer; font-size: 12.5px; color: var(--text); border-radius: 4px; font-family: inherit; }
    .ev-kebab-item:hover { background: var(--bg-elev-2); }
    .ev-kebab-item.danger { color: #dc2626; }

    /* STAP 6a — twee-paneel inbox shell (links lijst, rechts thread+composer). */
    .evx-shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      height: calc(100vh - 260px);
      min-height: 540px;
      background: var(--bg-elev);
    }
    .evx-list-pane {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      min-width: 0;
    }
    .evx-list-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .evx-list-body { flex: 1; overflow-y: auto; padding: 6px; min-height: 0; }
    .evx-thread-pane { display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--bg); }
    .evx-thread-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .evx-thread-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-elev-1, var(--bg-elev)); min-height: 0; }
    .evx-thread-footer { border-top: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; background: var(--bg); }

    /* Conversation-rij in lijst-pane (vervangt de oude tabel). */
    .evx-conv-row {
      padding: 9px 10px;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 2px;
      border: 1px solid transparent;
      transition: background-color .12s, border-color .12s;
    }
    .evx-conv-row:hover { background: var(--bg-elev-2); }
    .evx-conv-row.active { background: rgba(9,61,84,0.10); border-color: rgba(9,61,84,0.18); }
    .evx-conv-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-elev-2);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: var(--text-dim);
      flex-shrink: 0;
    }
    .evx-conv-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .evx-conv-toprow { display: flex; align-items: center; gap: 6px; }
    .evx-conv-name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .evx-conv-time { font-size: 10.5px; color: var(--text-faint); flex-shrink: 0; }
    .evx-conv-preview { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .evx-conv-meta { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
    .evx-conv-unread { background: rgba(220,38,38,0.15); color: #b91c1c; border-radius: 10px; padding: 1px 7px; font-size: 10.5px; font-weight: 700; }

    /* Empty-state als nog geen gesprek geopend is. */
    .evx-thread-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 24px; text-align: center; color: var(--text-faint); }

    /* Responsive: smal scherm → één-paneel toggle via .thread-open op de shell. */
    @media (max-width: 880px) {
      .evx-shell { grid-template-columns: 1fr; height: auto; min-height: 0; }
      .evx-list-pane { border-right: none; }
      .evx-shell.thread-open .evx-list-pane { display: none; }
      .evx-shell:not(.thread-open) .evx-thread-pane { display: none; }
    }
    /* Op breed scherm: terug-knop is geen pane-switch nodig — hij deselecteert
       wel het actieve gesprek. Verberg ze als 'er is geen gesprek open'. */
    @media (min-width: 881px) {
      .evx-shell .evx-thread-pane #evThreadBack { display: none; }
    }

    /* STAP 6b — 24u-dot per lijst-rij. Groen = binnen venster, rood = verlopen.
       Bron: it.can_send_text uit /api/inbox-conversations-list. */
    .evx-24h-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 4px;
    }
    .evx-24h-dot.open   { background: #059669; box-shadow: 0 0 0 2px rgba(5,150,105,0.18); }
    .evx-24h-dot.closed { background: #dc2626; box-shadow: 0 0 0 2px rgba(220,38,38,0.18); }

    /* STAP 6c — template-picker modal. */
    .evx-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9999; display: none; align-items: flex-start; justify-content: center; padding: 60px 16px; overflow-y: auto; }
    .evx-modal-overlay.show { display: flex; }
    .evx-modal-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 560px; padding: 16px 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
    .evx-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .evx-modal-title { font-size: 14.5px; font-weight: 700; color: var(--text); }
    .evx-modal-search { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); font-size: 13px; color: var(--text); font-family: inherit; margin-bottom: 8px; }
    .evx-modal-list { max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .evx-modal-item { padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--bg-elev); transition: background-color .12s, border-color .12s; }
    .evx-modal-item:hover { background: var(--bg-elev-2); border-color: var(--text-faint); }
    .evx-modal-item .iname { font-size: 13px; font-weight: 600; color: var(--text); }
    .evx-modal-item .imeta { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
    .evx-modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    /* STAP 6d — klant-context-strip + Simone-polish. */
    .evx-ctx-strip { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg-elev-2); border-bottom: 1px solid var(--border); font-size: 12.5px; color: var(--text-dim); flex-wrap: wrap; flex-shrink: 0; }
    .evx-ctx-strip .evx-ctx-label { font-weight: 700; color: var(--text-faint); text-transform: uppercase; font-size: 10.5px; letter-spacing: .04em; }
    .evx-ctx-strip .evx-ctx-link-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 3px 9px; border-radius: 7px; font-size: 11.5px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
    .evx-ctx-strip .evx-ctx-link-btn:hover { background: var(--bg); color: var(--text); }
    .evx-ctx-strip .evx-ctx-event-link { color: var(--text); text-decoration: none; border-bottom: 1px dashed var(--text-faint); }
    .evx-ctx-strip .evx-ctx-event-link:hover { color: var(--text-dim); }

    /* Simone-polish: preview-box met Gebruiken / Aanpassen buttons. */
    .evx-sim-card { border: 1px solid #7c3aed; border-radius: 10px; background: rgba(124,58,237,0.05); padding: 12px; margin: 6px 14px 0 14px; }
    .evx-sim-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .evx-sim-head .ti { color: #7c3aed; }
    .evx-sim-title { font-weight: 700; font-size: 12.5px; color: #7c3aed; }
    .evx-sim-meta { font-size: 11px; color: var(--text-dim); margin-left: auto; }
    .evx-sim-quote { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.45; }
    .evx-sim-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
    .evx-sim-actions .btn-dismiss { background: transparent; border: 1px solid var(--border); color: var(--text-faint); padding: 5px 10px; border-radius: 7px; font-size: 11.5px; cursor: pointer; font-family: inherit; margin-left: auto; }
    .evx-sim-actions .btn-dismiss:hover { color: var(--text-dim); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1400px; }
    .page-head { display:flex; align-items:center; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
    .page-head h1 { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .page-head .sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .btn-primary { background: var(--brand-primary, #093d54); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary { background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-secondary:hover { background: var(--bg-elev-2); color: var(--text); }

    /* Fase 1 events-tabs */
    .ev-tabs { padding-bottom: 0; }
    .ev-tab { background: transparent; border: none; padding: 10px 14px; font-size: 13.5px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
    .ev-tab:hover { color: var(--text); }
    .ev-tab.active { color: var(--brand-primary, #093d54); border-bottom-color: var(--brand-primary, #093d54); }

    /* Capacity pill */
    .cap-pill { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:12px; font-size:11px; font-weight:600; background: var(--bg-elev-2); color: var(--text-dim); border:1px solid var(--border); }
    .cap-pill.full { background: rgba(220,38,38,0.15); color:#b91c1c; border-color: rgba(220,38,38,0.3); }
    .cap-pill.warn { background: rgba(245,158,11,0.15); color:#b45309; border-color: rgba(245,158,11,0.3); }
    .cap-pill.ok { background: rgba(5,150,105,0.12); color:#059669; border-color: rgba(5,150,105,0.25); }

    /* Status badges */
    .status-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .status-draft { background: rgba(148,163,184,0.2); color: var(--text-faint); }
    .status-published { background: rgba(5,150,105,0.15); color:#059669; }
    .status-cancelled { background: rgba(220,38,38,0.15); color:#b91c1c; }
    .status-archived { background: rgba(148,163,184,0.2); color: var(--text-faint); opacity:.7; }

    /* Signups-closed badge (Blok 1) */
    .signups-closed-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; background: rgba(245,158,11,0.18); color:#b45309; border:1px solid rgba(245,158,11,0.3); margin-left: 4px; cursor: help; }

    /* Sync badges (Webflow + GHL) */
    .sync-badges { display:inline-flex; gap:4px; flex-wrap:wrap; }
    .sync-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:8px; font-size:10px; font-weight:700; letter-spacing:.03em; cursor: help; }
    .sync-badge.sync-ok      { background: rgba(5,150,105,0.15); color:#059669; border:1px solid rgba(5,150,105,0.25); }
    .sync-badge.sync-fail    { background: rgba(220,38,38,0.15); color:#b91c1c; border:1px solid rgba(220,38,38,0.3); }
    .sync-badge.sync-skip    { background: rgba(245,158,11,0.15); color:#b45309; border:1px solid rgba(245,158,11,0.3); }
    .sync-badge.sync-unpub   { background: rgba(148,163,184,0.2); color: var(--text-faint); border:1px solid var(--border); }
    .sync-badge.sync-none    { background: var(--bg-elev-2); color: var(--text-faint); border:1px solid var(--border); }

    /* Skeleton */
    .skel-row { height: 44px; background: linear-gradient(90deg, var(--bg-elev) 0%, var(--bg-elev-2) 50%, var(--bg-elev) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 6px; margin-bottom: 6px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .empty-state { padding: 40px 20px; text-align: center; color: var(--text-faint); font-size: 13px; }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: .6; }

    .forbidden-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; max-width: 480px; margin: 40px auto; text-align: center; }
    .forbidden-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .forbidden-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .forbidden-card a { color: var(--brand-secondary-light, #688b9b); text-decoration: none; font-size: 13px; font-weight: 500; }
    .forbidden-card a:hover { text-decoration: underline; }

    @media (max-width: 880px) { .app { margin-left: 0; padding: 14px; } }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app" id="page-content">
  <!-- gevuld door init() -->
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>

<script>
// ── Module-state ─────────────────────────────────────────────────────────────
const VALID_STATUS = ['draft', 'published', 'cancelled', 'archived'];
const STATUS_LABELS = {
  draft: 'Concept',
  published: 'Gepubliceerd',
  cancelled: 'Geannuleerd',
  archived: 'Gearchiveerd',
};

const state = {
  // Filter-state. status=null betekent default ('draft,published' op de API).
  status: null,           // null | 'draft' | 'published' | 'cancelled' | 'archived'
  niveau: null,           // null | slug
  search: '',
  items: [],
  niveauOptions: [],
  loading: false,
};

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (!Number.isFinite(d.getTime())) return '—';
  return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function capPillClass(active, capacity) {
  if (!capacity || capacity <= 0) return 'cap-pill';
  const ratio = active / capacity;
  if (active >= capacity) return 'cap-pill full';
  if (ratio >= 0.8) return 'cap-pill warn';
  return 'cap-pill ok';
}

// ── Sync-badge mapping ───────────────────────────────────────────────────────
//
// Webflow status: success | failure | unpublished | null
// GHL status    : success | failure | skipped_graceful | null
//
// renderSyncBadge returnt 1 badge HTML met label + tooltip (last_synced_at).
function renderSyncBadge(target, status, lastSyncedAt) {
  const labelPrefix = target === 'webflow' ? 'WF' : 'GHL';
  let cls = 'sync-none';
  let label = '-';
  if (status === 'success') { cls = 'sync-ok';   label = `${labelPrefix} OK`; }
  else if (status === 'failure') { cls = 'sync-fail'; label = `${labelPrefix} FAIL`; }
  else if (status === 'skipped_graceful') { cls = 'sync-skip'; label = `${labelPrefix} SKIP`; }
  else if (status === 'unpublished') { cls = 'sync-unpub'; label = `${labelPrefix} UNPUB`; }

  const tooltipParts = [];
  tooltipParts.push(target === 'webflow' ? 'Webflow' : 'GoHighLevel');
  tooltipParts.push('status: ' + (status || 'nog niet gesynct'));
  if (lastSyncedAt) tooltipParts.push('laatst: ' + fmtDate(lastSyncedAt));
  const tooltip = tooltipParts.join(' | ');

  return `<span class="sync-badge ${cls}" title="${esc(tooltip)}">${esc(label)}</span>`;
}

function renderSyncCell(ev) {
  return `<span class="sync-badges">
    ${renderSyncBadge('webflow', ev.webflow_sync_status, ev.webflow_last_synced_at)}
    ${renderSyncBadge('ghl', ev.ghl_sync_status, ev.ghl_last_synced_at)}
  </span>`;
}

// ── Signups-closed badge (Blok 1) ────────────────────────────────────────────
//
// Toont een kleine pill "Aanmelding gesloten" achter de status-badge zodra
// `signups_closed=true`. Tooltip-tekst hangt af van `signups_closed_reason`:
//   - 'auto_time'     → Automatisch gesloten (T-1 dag)
//   - 'auto_full'     → Automatisch gesloten (vol)
//   - 'auto_deadline' → Automatisch gesloten (deadline)
//   - 'manual'        → Handmatig gesloten
//   - andere/leeg     → generieke tekst
//
// Bevat ook timestamp uit `signups_closed_at` als die meegegeven wordt.
const SIGNUPS_CLOSED_REASON_LABEL = {
  auto_time: 'Automatisch gesloten (T-1 dag)',
  auto_full: 'Automatisch gesloten (vol)',
  auto_deadline: 'Automatisch gesloten (deadline)',
  manual: 'Handmatig gesloten',
};

function renderSignupsClosedBadge(ev) {
  if (!ev || ev.signups_closed !== true) return '';
  const reason = ev.signups_closed_reason || '';
  const reasonLabel = SIGNUPS_CLOSED_REASON_LABEL[reason] || 'Aanmelding gesloten';
  const parts = [reasonLabel];
  if (ev.signups_closed_at) parts.push('sinds ' + fmtDate(ev.signups_closed_at));
  const tooltip = parts.join(' | ');
  return `<span class="signups-closed-badge" title="${esc(tooltip)}">Aanmelding gesloten</span>`;
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderForbidden() {
  document.getElementById('page-content').innerHTML = `
    <div class="forbidden-card">
      <h2>Geen toegang</h2>
      <p>Je hebt geen rechten om de Events-module te bekijken.</p>
      <a href="/index.html">&larr; Terug naar dashboard</a>
    </div>
  `;
}

function renderPage(canCreate, canViewInbox, canManageSignupInbox) {
  // Fase 1 events-inbox: tabbar boven de filter-strip. Inbox-tab alleen
  // zichtbaar bij events.inbox.view permissie. Default tab = 'overzicht'
  // zodat bestaand gedrag onveranderd is.
  const inboxTabBtn = canViewInbox
    ? '<button class="ev-tab" data-evtab="inbox"><i class="ti ti-inbox"></i> Inbox</button>'
    : '';
  // Inschrijvingen-inbox tab: alleen zichtbaar bij events.attendee.create
  // (zelfde gate als de onderliggende -list / -resolve endpoints).
  const signupInboxTabBtn = canManageSignupInbox
    ? '<button class="ev-tab" data-evtab="signup-inbox"><i class="ti ti-clipboard-list"></i> Inschrijvingen-inbox <span id="evSignupInboxBadge" style="display:none;background:rgba(245,158,11,0.18);color:#b45309;border-radius:10px;padding:1px 7px;font-size:10.5px;font-weight:700;margin-left:4px">0</span></button>'
    : '';
  document.getElementById('page-content').innerHTML = `
    <div class="page-head">
      <div>
        <h1>Events</h1>
        <div class="sub">Workshops, live trainingen en mentor-sessies.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
        ${canCreate ? '<a class="btn-primary" href="/modules/events-wizard.html"><i class="ti ti-plus"></i> Nieuw event</a>' : ''}
      </div>
    </div>

    <div class="ev-tabs" style="display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border);align-items:center">
      <button class="ev-tab active" data-evtab="overzicht"><i class="ti ti-list"></i> Overzicht</button>
      ${inboxTabBtn}
      ${signupInboxTabBtn}
      <button class="ev-tab" data-evtab="mentor-grootboek"><i class="ti ti-book"></i> Mentor-grootboek</button>
      <div style="flex:1"></div>

    <!-- STAP 6c — Template-picker modal. Stuurt via /api/inbox-send-template. -->
    <div id="evTemplatePickerModal" class="evx-modal-overlay">

        <div class="evx-modal-header">

      </div>
    </div>

    <!-- STAP 6d — Klant-koppel modal (search + kies). -->
    <div id="evCustomerLinkModal" class="evx-modal-overlay">
      <div class="evx-modal-card">
        <div class="evx-modal-header">
          <div class="evx-modal-title">Koppel een klant aan dit gesprek</div>
          <button class="sr-iconbtn" id="evCustLinkCloseBtn" type="button" title="Sluiten"><i class="ti ti-x"></i></button>
        </div>
        <input id="evCustSearchInput" class="evx-modal-search" type="search" placeholder="Zoek op naam, email of telefoon…" autocomplete="off" />
        <div class="evx-modal-list" id="evCustSearchResults">
          <div style="color:var(--text-faint);font-size:12px;padding:10px;text-align:center">Typ minimaal 2 tekens om te zoeken.</div>
        </div>
        <div class="evx-modal-footer">
          <button class="sr-btn" id="evCustLinkCancelBtn" type="button" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer">Annuleren</button>
        </div>

    <div id="evNiveauPhotoModal" class="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;padding:24px">
      <div class="modal-card" style="background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:480px;width:100%;padding:20px;max-height:88vh;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <div style="font-size:15px;font-weight:700">Niveau-standaardfoto's</div>
          <button class="sr-iconbtn" id="evNiveauPhotoClose" type="button" title="Sluiten"><i class="ti ti-x"></i></button>
        </div>
        <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:14px">Deze foto verschijnt in de keuzelijst als een event van dit niveau geen eigen foto heeft. JPG/PNG/WEBP, max 3 MB.</div>
        <div id="evNiveauPhotoSlots"></div>
      </div>
    </div>
  `;

  // Tab-switch wiring
  const tabBtns = document.querySelectorAll('.ev-tab');
  const paneOverview    = document.getElementById('ev-pane-overzicht');
  const paneInbox       = document.getElementById('ev-pane-inbox');
  const paneSignupInbox = document.getElementById('ev-pane-signup-inbox');
  const paneSettings    = document.getElementById('ev-pane-settings');
  function hideAll() {
    paneOverview.style.display = 'none';
    paneInbox.style.display = 'none';
    if (paneSignupInbox) paneSignupInbox.style.display = 'none';
    if (paneSettings) paneSettings.style.display = 'none';
  }
  tabBtns.forEach(b => b.addEventListener('click', () => {
    const which = b.getAttribute('data-evtab');
    // Mentor-grootboek opent (voorlopig) de bestaande standalone pagina —
    // geen pane-switch. Stap 7 brengt 'm definitief naar de hub.
    if (which === 'mentor-grootboek') {
      window.location.href = '/modules/mentor-grootboek.html';
      return;
    }
    tabBtns.forEach(x => x.classList.toggle('active', x === b));
    hideAll();
    if (which === 'overzicht') {
      paneOverview.style.display = '';
      _evTeardownRealtime();
      // Re-render zodat de huidige status-filter (incl. 'afgerond') correct
      // de juiste sub-lijst toont (events-grid vs. afgerond-grid).
      _evApplyStatusFilterView();
    } else if (which === 'inbox') {
      paneInbox.style.display = '';
      loadEventsInbox();
      // Realtime: lijst-kanaal + 30s backstop-poll. Berichten-kanaal volgt
      // pas wanneer een specifieke conversatie open gaat (openEventsConv).
      _evSubscribeConversations();
      _evStartBackstop();
    } else if (which === 'signup-inbox') {
      if (paneSignupInbox) paneSignupInbox.style.display = '';
      loadSignupInbox();
      _evTeardownRealtime();
    }
  }));

  // ⚙ Instellingen — eigen pane, géén top-tab. Active-state op de tabs
  // wordt afgezet zodat zichtbaar is dat we niet in een tabblad zitten.
  const settingsBtn = document.getElementById('evSettingsBtn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', () => {
      tabBtns.forEach(x => x.classList.remove('active'));
      hideAll();
      if (paneSettings) paneSettings.style.display = '';
      _renderEvSettings();
      _evTeardownRealtime();
    });
  }

  const inboxRefresh = document.getElementById('evInboxRefresh');
  if (inboxRefresh) inboxRefresh.addEventListener('click', () => loadEventsInbox());

  // STAP 6c — Template-picker wiring
  const tplBtn = document.getElementById('evComposeTemplateBtn');
  if (tplBtn) tplBtn.addEventListener('click', () => openTemplatePicker());
  const tplClose = document.getElementById('evTplCloseBtn');
  if (tplClose) tplClose.addEventListener('click', () => closeTemplatePicker());
  // Buiten-modal-click sluit het picker-paneel.
  const tplOverlay = document.getElementById('evTemplatePickerModal');
  if (tplOverlay) tplOverlay.addEventListener('click', (e) => { if (e.target === tplOverlay) closeTemplatePicker(); });

  // STAP 6d — Klant-koppel modal wiring
  const custClose  = document.getElementById('evCustLinkCloseBtn');
  if (custClose)  custClose.addEventListener('click', () => closeCustomerLinkModal());
  const custCancel = document.getElementById('evCustLinkCancelBtn');
  if (custCancel) custCancel.addEventListener('click', () => closeCustomerLinkModal());
  const custOverlay = document.getElementById('evCustomerLinkModal');
  if (custOverlay) custOverlay.addEventListener('click', (e) => { if (e.target === custOverlay) closeCustomerLinkModal(); });
  const custInput = document.getElementById('evCustSearchInput');
  if (custInput) custInput.addEventListener('input', _evCustSearchOnInput);

  // Inschrijvingen-inbox wiring
  const siRefresh = document.getElementById('evSignupInboxRefresh');
  if (siRefresh) siRefresh.addEventListener('click', () => loadSignupInbox());
  const siFilters = document.querySelectorAll('#evSignupInboxFilters .sr-seg');
  siFilters.forEach((seg) => {
    seg.addEventListener('click', () => {
      siFilters.forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      _siState.filter = seg.dataset.sistatus || 'todo';
      loadSignupInbox();
    });
  });
  const siCancel  = document.getElementById('evSignupResolveCancel');
  const siCancel2 = document.getElementById('evSignupResolveCancel2');
  const siSubmit  = document.getElementById('evSignupResolveSubmit');
  if (siCancel)  siCancel.addEventListener('click', () => closeSignupResolveModal());
  if (siCancel2) siCancel2.addEventListener('click', () => closeSignupResolveModal());
  if (siSubmit)  siSubmit.addEventListener('click', () => submitSignupResolve());

  const npBtn = document.getElementById('evNiveauPhotosBtn');
  if (npBtn) npBtn.addEventListener('click', openNiveauPhotoModal);
  const npClose = document.getElementById('evNiveauPhotoClose');
  if (npClose) npClose.addEventListener('click', () => {
    const m = document.getElementById('evNiveauPhotoModal'); if (m) m.style.display = 'none';
  });

  // Fase 2 stap 2c — thread-view wiring
  const backBtn = document.getElementById('evThreadBack');
  if (backBtn) backBtn.addEventListener('click', () => _evShowListView());
  const askBtn = document.getElementById('evAskSimoneBtn');
  if (askBtn) askBtn.addEventListener('click', () => askSimone());
  const composeSendBtn = document.getElementById('evComposeSendBtn');
  if (composeSendBtn) composeSendBtn.addEventListener('click', () => sendComposeText());
  // Disable Simone-knop als user geen events.simone.use heeft (RBAC client-gate;
  // server doet de echte check). super_admin krijgt 'm via permission-RPC.
  if (askBtn && window.RBAC && typeof window.RBAC.can === 'function') {
    window.RBAC.can('events.simone.use').then((ok) => {
      if (!ok) { askBtn.disabled = true; askBtn.title = 'Geen rechten (events.simone.use)'; askBtn.style.opacity = 0.4; }
    }).catch(() => {});
  }

  // Wire filters
  document.getElementById('evSearch').addEventListener('input', debounce((e) => {
    state.search = e.target.value.trim();
    loadEvents();
  }, 300));
  document.getElementById('evNiveau').addEventListener('change', (e) => {
    state.niveau = e.target.value || null;
    loadEvents();
  });
  document.getElementById('evRefresh').addEventListener('click', () => loadEvents());
  document.querySelectorAll('#evSegments .sr-seg').forEach((seg) => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#evSegments .sr-seg').forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      state.status = seg.dataset.status || null;
      _evApplyStatusFilterView();
    });
  });
}

// Beslist welke sub-lijst zichtbaar is in Overzicht en triggert de juiste loader.
//   status === 'afgerond' -> /api/events-completed-list via loadAfgerondEvents()
//   andere statussen      -> /api/events-list via loadEvents()
// "Afgerond" is hierdoor een filter binnen Overzicht i.p.v. een aparte top-tab.
function _evApplyStatusFilterView() {
  const eventsListEl   = document.getElementById('eventsList');
  const afgerondListEl = document.getElementById('eventsAfgerondList');
  if (state.status === 'afgerond') {
    if (eventsListEl)   eventsListEl.style.display = 'none';
    if (afgerondListEl) afgerondListEl.style.display = '';
    loadAfgerondEvents();
  } else {
    if (eventsListEl)   eventsListEl.style.display = '';
    if (afgerondListEl) afgerondListEl.style.display = 'none';
    loadEvents();
  }
}

// Render het Instellingen-paneel met kaarten die naar de bestaande schermen
// linken. STAP 1 is nav-shell — geen fysieke verhuizing van inhoud.
// STAP 7 brengt vragenlijst + Simone-config fysiek hier naartoe.
function _renderEvSettings() {
  const host = document.getElementById('evSettingsCards');
  if (!host) return;
  const cards = [
    {
      icon : 'ti-file-text',
      title: 'Vragenlijst-editor',
      desc : 'Beheer de assessment-vragen die deelnemers invullen.',
      href : '/modules/admin.html#assessment',
      ext  : false,
    },
    {
      icon : 'ti-robot',
      title: 'Simone-config',
      desc : 'AI-persona, prompts en kennisbank voor Simone (events).',
      href : '/modules/admin.html#simone-config',
      ext  : false,
    },
    {
      icon : 'ti-bolt',
      title: 'Automations',
      desc : 'Configureer automatische mail- en WhatsApp-flows rond events.',
      href : '/modules/events-automations.html',
      ext  : false,
    },
    {
      icon : 'ti-photo',
      title: 'Niveau-foto\'s',
      desc : 'Stel per niveau de overzichtsfoto in die wordt getoond.',
      href : '#niveau-photos',
      ext  : false,
      onClick: 'openNiveauPhotoModal',
    },
  ];
  host.innerHTML = cards.map((c) => `
    <a class="ev-settings-card" ${c.onClick ? `data-act="${c.onClick}"` : `href="${c.href}"`}
       style="display:block;text-decoration:none;color:inherit;border:1px solid var(--border);border-radius:10px;padding:14px;background:var(--bg-elev,transparent);cursor:pointer;transition:border-color .15s">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <div style="width:36px;height:36px;border-radius:8px;background:rgba(9,61,84,0.10);color:#0a2f63;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">
          <i class="ti ${c.icon}"></i>
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13.5px;font-weight:700;margin-bottom:2px">${c.title}</div>
          <div style="font-size:12px;color:var(--text-dim);line-height:1.4">${c.desc}</div>
        </div>
        <i class="ti ti-arrow-right" style="color:var(--text-faint);font-size:16px"></i>
      </div>
    </a>
  `).join('');
  // Niveau-foto's card opent een lokale modal in plaats van te navigeren.
  host.querySelectorAll('[data-act="openNiveauPhotoModal"]').forEach((el) => {
    el.addEventListener('click', (e) => { e.preventDefault(); openNiveauPhotoModal(); });
  });
}

async function openNiveauPhotoModal() {
  const modal = document.getElementById('evNiveauPhotoModal');
  const slots = document.getElementById('evNiveauPhotoSlots');
  if (!modal || !slots) return;
  slots.innerHTML = '<div style="color:var(--text-dim);font-size:13px">Laden…</div>';
  modal.style.display = 'flex';
  try {
    const r = await window.AgentShared.apiFetch('/api/events-niveau-options');
    const j = await r.json().catch(() => ({}));
    const opts = Array.isArray(j.options) ? j.options : [];
    const BRAND = { basis: 'Forex Kickstart Live', gevorderd: 'Trading Deep Dive' };
    slots.innerHTML = opts.map((o) => `
      <div class="ev-niv-slot" data-slug="${esc(o.slug)}" style="border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px">
        <div style="font-weight:600;margin-bottom:8px">${esc(BRAND[o.slug] || o.label || o.slug)}</div>
        <div class="ev-niv-preview" style="margin-bottom:8px">${o.default_image_url ? `<img src="${esc(o.default_image_url)}" alt="" style="max-width:140px;border-radius:6px;display:block" />` : '<span style="color:var(--text-dim);font-size:12px">Nog geen foto</span>'}</div>
        <input type="file" class="ev-niv-file" accept="image/png,image/jpeg,image/webp" />
        <div class="ev-niv-status" style="font-size:12px;color:var(--text-dim);margin-top:6px"></div>
      </div>`).join('');
    slots.querySelectorAll('.ev-niv-slot').forEach((slot) => {
      const fi = slot.querySelector('.ev-niv-file');
      if (fi) fi.addEventListener('change', (e) => {
        const file = e.target.files && e.target.files[0];
        if (file) uploadNiveauPhoto(slot.dataset.slug, file, slot);
      });
    });
  } catch (e) {
    slots.innerHTML = '<div style="color:#b91c1c;font-size:13px">Kon niveaus niet laden.</div>';
  }
}

async function uploadNiveauPhoto(slug, file, slot) {
  const status = slot.querySelector('.ev-niv-status');
  const okTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/webp'];
  if (!okTypes.includes((file.type || '').toLowerCase())) { if (status) status.textContent = 'Alleen JPG, PNG of WEBP.'; return; }
  if (file.size > 3 * 1024 * 1024) { if (status) status.textContent = 'Bestand te groot (max 3 MB).'; return; }
  if (status) status.textContent = 'Uploaden…';
  try {
    const dataUrl = await new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.onerror = () => reject(new Error('lees-fout'));
      fr.readAsDataURL(file);
    });
    const base64 = String(dataUrl).split(',')[1] || '';
    const up = await window.AgentShared.apiFetch('/api/event-image-upload', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ filename: file.name, content_type: (file.type || '').toLowerCase(), data_base64: base64 }),
    });
    const uj = await up.json().catch(() => ({}));
    if (!up.ok || !uj.ok) throw new Error(uj.error || ('upload HTTP ' + up.status));
    const sv = await window.AgentShared.apiFetch('/api/events-niveau-default-image-save', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, default_image_url: uj.url }),
    });
    const sj = await sv.json().catch(() => ({}));
    if (!sv.ok || !sj.ok) throw new Error(sj.error || ('opslaan HTTP ' + sv.status));
    const prev = slot.querySelector('.ev-niv-preview');
    if (prev) prev.innerHTML = `<img src="${esc(uj.url)}" alt="" style="max-width:140px;border-radius:6px;display:block" />`;
    if (status) status.textContent = 'Opgeslagen.';
  } catch (e) {
    console.error('[niveau-photo]', e);
    if (status) status.textContent = 'Mislukt: ' + (e?.message || 'onbekend');
  }
}

function renderList() {

  }

  const niveauLabelBySlug = {};
  state.niveauOptions.forEach((o) => { niveauLabelBySlug[o.slug] = o.label || o.slug; });

  wrap.innerHTML = `
    <div class="sr-tablewrap"><table class="sr-table">

        <th>Titel</th>
        <th>Datum</th>
        <th>Locatie</th>
        <th>Niveau</th>

        <th>Status</th>
        <th>Sync</th>
        <th></th>
      </tr></thead>
      <tbody>${state.items.map((ev) => {
        const niveauLbl = ev.niveau ? (niveauLabelBySlug[ev.niveau] || ev.niveau) : '—';
        const cap = ev.capacity || 0;
        const active = ev.attendee_count_active || 0;
        const capClass = capPillClass(active, cap);
        const href = `/modules/events-detail.html?id=${encodeURIComponent(ev.id)}`;
        return `
          <tr style="cursor:pointer" data-href="${esc(href)}">
            <td><a href="${esc(href)}" style="color:inherit;text-decoration:none;font-weight:600">${esc(ev.title || '—')}</a></td>
            <td>${esc(fmtDate(ev.starts_at))}</td>
            <td>${esc(ev.location || '—')}</td>
            <td>${esc(niveauLbl)}</td>
            <td class="center"><span class="${capClass}">${active}/${cap}</span></td>
            <td><span class="status-badge status-${ev.status}">${esc(STATUS_LABELS[ev.status] || ev.status)}</span>${renderSignupsClosedBadge(ev)}</td>
            <td>${renderSyncCell(ev)}</td>
            <td class="sr-actions">
              ${window.RBAC?.canSync?.('events.event.create') ? `<button class="sr-ibtn ev-dup-btn" data-id="${esc(ev.id)}" title="Kopieer event als concept" type="button"><i class="ti ti-copy"></i></button>` : ''}
              ${(window.RBAC?.canSync?.('events.event.delete') && ev.status !== 'archived') ? `
                <span class="ev-kebab-wrap">
                  <button class="sr-ibtn ev-kebab-toggle" data-id="${esc(ev.id)}" type="button" title="Acties"><i class="ti ti-dots"></i></button>
                  <div class="ev-kebab-menu" id="ev-kebab-${esc(ev.id)}">
                    <button class="ev-kebab-item" data-action="archive" data-id="${esc(ev.id)}" data-title="${esc(ev.title || '')}" type="button"><i class="ti ti-archive"></i> Archiveren</button>
                  </div>
                </span>
              ` : ''}
              <a class="sr-ibtn" href="${esc(href)}" title="Open detail"><i class="ti ti-arrow-right"></i></a>
            </td>
          </tr>
        `;
      }).join('')}</tbody>
    </table></div>
  `;

  // Klik-op-rij → detail
  wrap.querySelectorAll('tr[data-href]').forEach((tr) => {
    tr.addEventListener('click', (e) => {
      // Niet hijacken als gebruiker een link of knop in de rij raakt
      if (e.target.closest('a, button')) return;
      window.location.href = tr.dataset.href;
    });
  });

  // Duplicate-knop per rij
  wrap.querySelectorAll('.ev-dup-btn').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      duplicateEvent(btn.dataset.id);
    });
  });

  // Kebab-toggle per rij — fixed-positioning (zelfde patroon als PR #245).
  wrap.querySelectorAll('.ev-kebab-toggle').forEach((btn) => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id   = btn.dataset.id;
      const menu = document.getElementById('ev-kebab-' + id);
      if (!menu) return;
      // Sluit andere menu's
      document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => { if (m !== menu) m.classList.remove('show'); });
      const willShow = !menu.classList.contains('show');
      if (willShow) {
        // Eerst .show toevoegen zodat offsetWidth/offsetHeight meetbaar zijn.
        menu.classList.add('show');
        const r = btn.getBoundingClientRect();
        let left = r.right - menu.offsetWidth;
        if (left < 8) left = 8;
        let top = r.bottom + 4;
        if (top + menu.offsetHeight > window.innerHeight - 8) {
          top = r.top - menu.offsetHeight - 4;
        }
        menu.style.left = left + 'px';
        menu.style.top  = top  + 'px';
      } else {
        menu.classList.remove('show');
      }
    });
  });

  // Outside-click sluit alle menu's (one-shot na elke render — zelfde patroon
  // als events-detail.html).
  document.addEventListener('click', () => {
    document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
  }, { once: true });

  // Item-clicks per kebab
  wrap.querySelectorAll('.ev-kebab-item').forEach((item) => {
    item.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = item.dataset.action;
      const id     = item.dataset.id;
      const title  = item.dataset.title || '';
      document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
      if (action === 'archive') return archiveEvent(id, title);
    });
  });
}

// Eenmalig: sluit fixed-positioned kebabs bij scroll (capture-phase voor
// scroll binnen de tabel-wrapper) of resize.
if (!window._evOverviewKebabGlobalWired) {
  const closeAll = () => {
    document.querySelectorAll('.ev-kebab-menu.show').forEach((m) => m.classList.remove('show'));
  };
  window.addEventListener('scroll', closeAll, { capture: true, passive: true });
  window.addEventListener('resize', closeAll);
  window._evOverviewKebabGlobalWired = true;
}

async function archiveEvent(eventId, title) {
  if (!eventId) return;
  const t = title ? ` "${title}"` : '';
  if (!confirm(`Event${t} archiveren? Het wordt onzichtbaar voor klanten (Webflow unpublish) en uit de standaard-overzichten gefilterd. Aangemelde deelnemers + alle data blijven bewaard.`)) return;
  try {
    const res = await window.AgentShared.apiFetch('/api/events-update?id=' + encodeURIComponent(eventId), {
      method: 'PATCH',
      body  : JSON.stringify({ status: 'archived' }),
    });
    const j = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(j.error || ('HTTP ' + res.status));
    window.AgentShared?.showToast?.('Event gearchiveerd', 'success');
    // Re-render zodat de rij weg is uit de huidige filter (tenzij 'Alle' actief).
    _evApplyStatusFilterView();
  } catch (e) {
    window.AgentShared?.showToast?.('Archiveren mislukt: ' + (e?.message || 'onbekende fout'), 'error');
  }
}

async function duplicateEvent(sourceEventId) {
  if (!sourceEventId) return;
  if (!confirm('Kopieer dit event als nieuw concept? Datum wordt 7 dagen verschoven; je kunt \'m daarna aanpassen.')) return;
  try {
    const r = await window.AgentShared.apiFetch('/api/events-duplicate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_event_id: sourceEventId }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || !j.event_id) throw new Error(j?.error || ('HTTP ' + r.status));
    window.AgentShared?.showToast?.('Concept aangemaakt — open om te bewerken', 'success');
    window.location.href = '/modules/events-detail.html?id=' + encodeURIComponent(j.event_id);
  } catch (e) {
    window.AgentShared?.showToast?.('Kopiëren mislukt: ' + (e?.message || e), 'error');
  }
}

async function loadNiveauOptions() {
  try {
    const res = await window.AgentShared.apiFetch('/api/events-niveau-options');
    if (!res.ok) return;
    const data = await res.json();
    state.niveauOptions = data.options || [];
    renderNiveauOptions();
  } catch (e) {
    console.warn('[events] niveau-options laden mislukt:', e.message);
  }
}

async function loadEvents() {
  state.loading = true;
  renderList();
  try {
    const params = new URLSearchParams();
    if (state.status) params.set('status', state.status);
    if (state.niveau) params.set('niveau', state.niveau);
    if (state.search) params.set('q', state.search);
    params.set('limit', '100');
    const res = await window.AgentShared.apiFetch('/api/events-list?' + params.toString());
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    state.items = data.items || [];
  } catch (e) {
    console.error('[events] load error:', e);
    window.AgentShared?.showToast?.('Events laden mislukt: ' + e.message, 'error');
    state.items = [];
  } finally {
    state.loading = false;
    renderList();
  }
}

function debounce(fn, ms) {
  let t = null;
  return function (...args) {
    if (t) clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

  await window._authSharedReady;

// daar op de events-phone_number_id uit whatsapp_module_config. Geen
// reply-functionaliteit in deze fase; volledige thread-view + send
// volgt zodra Simone er is (Fase 2).
async function loadEventsInbox() {
  const list = document.getElementById('eventsInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=events&limit=100');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div></div>';
      return;
    }
    const j = await r.json();
    if (!j.configured) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-plug-connected-x"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Events-lijn nog niet geconfigureerd</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">' + esc(j.warning || 'Maak een rij aan in whatsapp_module_config met module=\'events\' en is_active=true.') + '</div>'
        + '</div>';
      return;
    }
    const items = Array.isArray(j.items) ? j.items : [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-inbox"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Nog geen events-conversaties</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Inbound op de events-WhatsApp-lijn verschijnt hier.</div>'
        + '</div>';
      return;
    }
    // STAP 6a: card-rijen i.p.v. tabel — past in de smalle linker-pane van de
    // twee-paneel-shell. Active-state op _evState.convId (huidige geopend).
    const activeId = _evState.convId || null;
    list.innerHTML = items.map((it) => {
      const preview     = (it.last_message_preview || '').slice(0, 80);
      const initialLbl  = (it.customer_name || it.display_name || it.phone_number || '?').trim();
      const initial     = (initialLbl.match(/[A-Za-z0-9]/) || ['?'])[0].toUpperCase();
      const nameLabel   = it.customer_name || it.display_name || it.phone_number || '(geen naam)';
      const subtitle    = it.customer_name && it.display_name && it.display_name !== it.customer_name
        ? it.display_name
        : (it.phone_number || '');
      const unreadHtml  = it.unread_count > 0
        ? `<span class="evx-conv-unread">${esc(String(it.unread_count))}</span>`
        : '';
      const timeShort   = it.last_message_at ? esc(fmtDate(it.last_message_at)) : '';
      const isActive    = activeId && it.id === activeId ? ' active' : '';
      // STAP 6b — 24u-dot: groen wanneer can_send_text uit
      // /api/inbox-conversations-list true, rood wanneer venster verlopen.
      // Geen extra berekening — endpoint heeft het al gedaan.
      const dotCls   = it.can_send_text ? 'open' : 'closed';
      const dotTitle = it.can_send_text ? '24h-venster open — vrij bericht toegestaan' : '24h-venster verlopen — alleen template';
      return `
        <div class="evx-conv-row${isActive}" data-conv-id="${esc(it.id)}"
             data-phone="${esc(it.phone_number || '')}"
             data-display="${esc(it.display_name || '')}"
             data-customer="${esc(it.customer_name || '')}">
          <div class="evx-conv-avatar">${esc(initial)}</div>
          <div class="evx-conv-body">
            <div class="evx-conv-toprow">
              <div class="evx-conv-name">${esc(nameLabel)}</div>
              <div class="evx-conv-time">${timeShort}</div>
              <span class="evx-24h-dot ${dotCls}" title="${esc(dotTitle)}"></span>
            </div>
            <div class="evx-conv-preview">${esc(preview || subtitle || '—')}</div>
            ${unreadHtml ? `<div class="evx-conv-meta">${unreadHtml}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
    // Rij-click → open conv (her-render markeert de nieuwe actieve rij).
    list.querySelectorAll('.evx-conv-row[data-conv-id]').forEach((row) => {
      row.addEventListener('click', () => openEventsConv({
        id:          row.dataset.convId,
        phone:       row.dataset.phone || '',
        displayName: row.dataset.display || '',
        customer:    row.dataset.customer || '',
      }));
    });
  } catch (e) {
    list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div></div>';
  }
}

// ── Fase 2 stap 2c: events thread + Simone interactie ────────────────────────
const _evState = { convId: null, conv: null, canSendText: false, suggestion: null, editingSuggestionId: null };

// STAP 6a: persistent twee-paneel — beide panes staan altijd in de DOM.
// _evShowThreadView toont de content-area + verbergt het empty-state.
// _evShowListView verbergt de content-area + toont empty-state (deselect).
// Op smal scherm wisselt CSS via .thread-open op de shell tussen lijst en thread.
function _evShowThreadView() {
  const shell   = document.getElementById('evInboxShell');
  const empty   = document.getElementById('evThreadEmpty');
  const content = document.getElementById('evThreadContent');
  if (shell)   shell.classList.add('thread-open');
  if (empty)   empty.style.display = 'none';
  if (content) content.style.display = 'flex';
}
function _evShowListView() {
  const shell   = document.getElementById('evInboxShell');
  const empty   = document.getElementById('evThreadEmpty');
  const content = document.getElementById('evThreadContent');
  if (shell)   shell.classList.remove('thread-open');
  if (empty)   empty.style.display = '';
  if (content) content.style.display = 'none';
  const strip = document.getElementById('evCustomerStrip');
  if (strip) strip.style.display = 'none';
  _evState.convId = null;
  _evState.conv = null;
  _evState.suggestion = null;
  _evState.editingSuggestionId = null;
  // De-mark actieve rij in de lijst (her-renderen niet nodig — class wegnemen
  // is sneller en behoudt scroll-positie).
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  // Realtime: alleen het berichten-kanaal opruimen; convCh + backstop blijven
  // zolang de inbox-tab open is (lijst-updates moeten doorlopen).
  _evTeardownThreadChannel();
}

// ── Events-inbox realtime ────────────────────────────────────────────────────
// Live updates via Supabase-realtime, met handmatige refresh als fallback.
//   _evRealtime.msgCh    : kanaal voor whatsapp_messages-inserts in open thread
//   _evRealtime.convCh   : kanaal voor whatsapp_conversations (lijst)
//   _evRealtime.backstop : 30s setInterval die loadEventsInbox() draait
//                          (+ _evRefreshOpenThread() als een thread open is)
// Alles defensief: zonder window.supabase wordt het stille no-op en blijft de
// refresh-knop werken.
const _evRealtime = { msgCh: null, convCh: null, backstop: null };

function _evMakeDebouncer(ms) {
  let t = null;
  return (fn) => {
    if (t) clearTimeout(t);
    t = setTimeout(() => { t = null; try { fn(); } catch (e) { console.warn('[ev-realtime]', e?.message || e); } }, ms);
  };
}
const _evDebounceThread = _evMakeDebouncer(300);
const _evDebounceList   = _evMakeDebouncer(300);

// Hergebruikbare "messages opnieuw ophalen voor open thread"-helper.
// Zelfde call als de eerste load in openEventsConv (mark_as_read=true blijft
// goed: realtime-update markeert ook nieuwe inbound-berichten als gelezen).
async function _evRefreshOpenThread() {
  const convId = _evState.convId;
  if (!convId) return;
  try {
    const params = new URLSearchParams({ conversation_id: convId, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) return; // stil — backstop probeert opnieuw, of gebruiker drukt refresh
    // convId kan tijdens fetch veranderd zijn (race met _evShowListView).
    if (_evState.convId !== convId) return;
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
  } catch (e) {
    console.warn('[_evRefreshOpenThread]', e?.message || e);
  }
}

async function _evSubscribeMessages(convId) {
  await window._authSharedReady;
  if (!window.supabase || !convId) return;
  // Idempotent: bestaande msgCh eerst opruimen (zelfde of andere conv).
  if (_evRealtime.msgCh) {
    try { window.supabase.removeChannel(_evRealtime.msgCh); } catch {}
    _evRealtime.msgCh = null;
  }
  try {
    _evRealtime.msgCh = window.supabase
      .channel('ev-inbox-msg-' + convId)
      .on('postgres_changes', {
        event : 'INSERT',
        schema: 'public',
        table : 'whatsapp_messages',
        filter: 'conversation_id=eq.' + convId,
      }, () => _evDebounceThread(_evRefreshOpenThread))
      .subscribe();
  } catch (e) {
    console.warn('[_evSubscribeMessages]', e?.message || e);
    _evRealtime.msgCh = null;
  }
}

async function _evSubscribeConversations() {
  await window._authSharedReady;
  if (!window.supabase) return;
  if (_evRealtime.convCh) {
    try { window.supabase.removeChannel(_evRealtime.convCh); } catch {}
    _evRealtime.convCh = null;
  }
  try {
    // Geen module-filter in het kanaal — loadEventsInbox() filtert server-side
    // al op module=events. Eenvoudiger dan een kolom-filter en consistent als
    // er ooit andere modules op dezelfde tabel komen.
    _evRealtime.convCh = window.supabase
      .channel('ev-inbox-convs')
      .on('postgres_changes', {
        event : '*',
        schema: 'public',
        table : 'whatsapp_conversations',
      }, () => _evDebounceList(loadEventsInbox))
      .subscribe();
  } catch (e) {
    console.warn('[_evSubscribeConversations]', e?.message || e);
    _evRealtime.convCh = null;
  }
}

function _evStartBackstop() {
  if (_evRealtime.backstop) return;
  _evRealtime.backstop = setInterval(() => {
    try {
      loadEventsInbox();
      if (_evState.convId) _evRefreshOpenThread();
    } catch (e) {
      console.warn('[ev-backstop]', e?.message || e);
    }
  }, 30000);
}

function _evTeardownThreadChannel() {
  if (_evRealtime.msgCh) {
    try { window.supabase && window.supabase.removeChannel(_evRealtime.msgCh); } catch {}
    _evRealtime.msgCh = null;
  }
}

function _evTeardownRealtime() {
  _evTeardownThreadChannel();
  if (_evRealtime.convCh) {
    try { window.supabase && window.supabase.removeChannel(_evRealtime.convCh); } catch {}
    _evRealtime.convCh = null;
  }
  if (_evRealtime.backstop) {
    clearInterval(_evRealtime.backstop);
    _evRealtime.backstop = null;
  }
}

async function openEventsConv({ id, phone, displayName, customer }) {
  if (!id) return;
  _evState.convId = id;
  _evShowThreadView();
  // STAP 6a: markeer direct de actieve rij in de lijst (geen wacht op
  // loadEventsInbox onderaan — voelt sneller bij wisselen tussen conversaties).
  document.querySelectorAll('#eventsInboxList .evx-conv-row.active').forEach((el) => el.classList.remove('active'));
  const newRow = document.querySelector('#eventsInboxList .evx-conv-row[data-conv-id="' + id.replace(/"/g, '') + '"]');
  if (newRow) newRow.classList.add('active');

  // Pre-fill header met data uit list-rij voor snappy switch
  document.getElementById('evThreadName').textContent  = customer || displayName || phone || 'Onbekend';
  document.getElementById('evThreadPhone').textContent = phone || '—';
  const badge = document.getElementById('evThreadWindowBadge');
  badge.textContent = '…';
  badge.style.background = 'var(--bg-elev-2)';
  badge.style.color = 'var(--text-dim)';
  document.getElementById('evThreadMessages').innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Laden…</div>';
  document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
  document.getElementById('evComposeTextarea').value = '';
  document.getElementById('evThreadHint').textContent = '';

  // Messages laden (eerste pass — daarna stuurt _evRefreshOpenThread updates).
  try {
    const params = new URLSearchParams({ conversation_id: id, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      document.getElementById('evThreadMessages').innerHTML =
        '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
    // STAP 6d: klant-context-strip + event-context (read-only afgeleid).
    _renderEvCustomerStrip(_evState.conv);
    // Refresh list-tab badges (unread reset)
    loadEventsInbox();
    // Laatste PROPOSED suggestie tonen
    loadLatestEventsSuggestion(id);
  } catch (e) {
    document.getElementById('evThreadMessages').innerHTML =
      '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(e.message) + '</div>';
  }

  // Realtime subscriben op INSERTs in deze conversatie. Stille no-op zonder
  // window.supabase; backstop-poll + handmatige refresh blijven werken.
  _evSubscribeMessages(id);
}

function _renderEvThread(items, conv) {
  const wrap = document.getElementById('evThreadMessages');
  if (!wrap) return;
  if (!items || items.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Nog geen berichten in deze conversatie.</div>';
  } else {
    wrap.innerHTML = items.map((m) => {
      const inbound = m.direction === 'in';
      const align = inbound ? 'flex-start' : 'flex-end';
      const bg    = inbound ? 'var(--bg-elev-2)' : '#093d54';
      const color = inbound ? 'var(--text)' : '#ffffff';
      const time  = m.created_at ? fmtDate(m.created_at) : '';
      const body  = String(m.body || (m.template_name ? '[template:' + m.template_name + ']' : '[media]'));
      return '<div style="display:flex;justify-content:' + align + '">'
        + '<div style="max-width:70%;background:' + bg + ';color:' + color + ';padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4">'
        + '<div style="white-space:pre-wrap;word-wrap:break-word">' + esc(body) + '</div>'
        + '<div style="font-size:10px;opacity:0.65;margin-top:3px;text-align:right">' + esc(time) + '</div>'
        + '</div></div>';
    }).join('');
  }
  // Auto-scroll naar onderkant
  wrap.scrollTop = wrap.scrollHeight;

  // Window-badge
  const badge = document.getElementById('evThreadWindowBadge');
  if (_evState.canSendText) {
    badge.textContent = '24h open';
    badge.style.background = 'rgba(5,150,105,0.15)';
    badge.style.color = '#059669';
    badge.title = '24h-servicewindow nog open — vrije tekst toegestaan';
  } else {
    badge.textContent = '24h verlopen';
    badge.style.background = 'rgba(245,158,11,0.18)';
    badge.style.color = '#b45309';
    badge.title = 'Servicewindow verlopen — alleen templates';
  }
}

function _applyEvComposeState() {
  const ta = document.getElementById('evComposeTextarea');
  const sendBtn = document.getElementById('evComposeSendBtn');
  const hint = document.getElementById('evThreadHint');
  if (_evState.canSendText) {
    if (ta) { ta.disabled = false; ta.placeholder = 'Typ een vrij bericht…'; }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.title = 'Versturen'; }
    if (hint) hint.textContent = '';
  } else {
    if (ta) { ta.disabled = true; ta.placeholder = '24h-window verlopen — alleen templates (later)'; }
    if (sendBtn) { sendBtn.disabled = true; sendBtn.title = '24h-window verlopen'; }
    if (hint) hint.textContent = '24h-window verlopen sinds laatste inbound — vrije tekst niet meer toegestaan.';
  }
}

async function loadLatestEventsSuggestion(convId) {
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-suggestions-recent?' +
      new URLSearchParams({ module: 'events', conversation_id: convId, max_age_minutes: '60' }).toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      _renderEvSuggestionPanel(null, d.error || ('HTTP ' + r.status));
      return;
    }
    _evState.suggestion = d.suggestion || null;
    _renderEvSuggestionPanel(_evState.suggestion, null);
  } catch (e) {
    _renderEvSuggestionPanel(null, e.message);
  }
}

function _renderEvSuggestionPanel(sugg, errMsg) {
  const wrap = document.getElementById('evSimoneSuggestionPanel');
  if (!wrap) return;
  if (errMsg) {
    wrap.innerHTML = '<div style="color:#b45309;font-size:12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 10px;margin:6px 14px 0 14px">Suggestie laden mislukt: ' + esc(errMsg) + '</div>';
    return;
  }
  if (!sugg) { wrap.innerHTML = ''; return; }
  // STAP 6d Simone-polish: Gebruiken / Aanpassen / Afwijzen.
  // "Gebruiken" = stuur suggested_reply as-is + mark USED_AS_IS.
  // "Aanpassen" = kopieer naar de composer ter bewerking; USED_EDITED komt
  // pas na verzenden via sendComposeText (zie _evState.editingSuggestionId).
  const auto = sugg.auto_triggered ? '<span style="background:#7c3aed;color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.04em">AUTO</span>' : '';
  const conf = (typeof sugg.confidence === 'number') ? (Math.round(sugg.confidence * 100) + '%') : '—';
  wrap.innerHTML =
    '<div class="evx-sim-card">'
    + '<div class="evx-sim-head">'
    +   '<i class="ti ti-sparkles"></i>'
    +   '<span class="evx-sim-title">Simone-suggestie</span>'
    +   auto
    +   '<span class="evx-sim-meta">intent: ' + esc(sugg.detected_intent || '?') + ' · ' + conf + '</span>'
    + '</div>'
    + '<div class="evx-sim-quote">' + esc(sugg.suggested_reply || '') + '</div>'
    + (sugg.reasoning ? '<div style="font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic">Reasoning: ' + esc(sugg.reasoning) + '</div>' : '')
    + '<div class="evx-sim-actions">'
    +   '<button class="btn-primary" id="evSimUseBtn" type="button" title="Verstuur de suggestie ongewijzigd"><i class="ti ti-check"></i> Gebruiken</button>'
    +   '<button class="sr-btn" id="evSimEditBtn" type="button" style="background:transparent;border:1px solid #7c3aed;color:#7c3aed;padding:6px 11px;border-radius:7px;font-size:12.5px;cursor:pointer;font-family:inherit" title="Kopieer naar het tekstveld om aan te passen"><i class="ti ti-edit"></i> Aanpassen</button>'
    +   '<button class="btn-dismiss" id="evSimDismissBtn" type="button" title="Negeer deze suggestie">Negeren</button>'
    + '</div>'
    + '</div>';
  const useBtn     = document.getElementById('evSimUseBtn');
  const editBtn    = document.getElementById('evSimEditBtn');
  const dismissBtn = document.getElementById('evSimDismissBtn');
  if (useBtn)     useBtn.addEventListener('click', () => useSimoneAsIs(sugg));
  if (editBtn)    editBtn.addEventListener('click', () => editSimoneInComposer(sugg));
  if (dismissBtn) dismissBtn.addEventListener('click', () => dismissSuggestion(sugg));
}

// STAP 6d — Gebruiken: stuur as-is via /api/inbox-send + mark USED_AS_IS.
async function useSimoneAsIs(sugg) {
  const convId = _evState.convId;
  if (!convId || !sugg) return;
  if (!_evState.canSendText) {
    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');
    return;
  }
  const text = String(sugg.suggested_reply || '').trim();
  if (!text) { window.AgentShared.showToast('Suggestie is leeg', 'error'); return; }
  const btn = document.getElementById('evSimUseBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: text }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ suggestion_id: sugg.id, status: 'USED_AS_IS', final_sent_text: text }),
    }).catch(() => {});
    window.AgentShared.showToast('Suggestie verstuurd', 'success');
    _evState.suggestion = null;
    _evState.editingSuggestionId = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

// STAP 6d — Aanpassen: kopieer naar composer; USED_EDITED komt pas bij sendComposeText.
function editSimoneInComposer(sugg) {
  if (!sugg) return;
  const ta = document.getElementById('evComposeTextarea');
  if (ta) {
    ta.value = String(sugg.suggested_reply || '');
    ta.focus();
    try { ta.setSelectionRange(ta.value.length, ta.value.length); } catch {}
  }
  _evState.editingSuggestionId = sugg.id;
  window.AgentShared.showToast('Suggestie in tekstveld geladen — pas aan en verstuur', 'success');
}

async function askSimone() {
  const convId = _evState.convId;
  if (!convId) return;
  const btn = document.getElementById('evAskSimoneBtn');
  if (btn) { btn.disabled = true; btn.textContent = '…Simone denkt na'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/simone-suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      window.AgentShared.showToast(d.error || ('HTTP ' + r.status), 'error');
      return;
    }
    // Force reload latest suggestion (krijgt de net-gemaakte rij terug)
    await loadLatestEventsSuggestion(convId);
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-sparkles"></i> Vraag Simone'; }
  }
}

async function sendSuggestion(sugg) {
  const convId = _evState.convId;
  if (!convId || !sugg) return;
  if (!_evState.canSendText) {
    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');
    return;
  }
  const ta = document.getElementById('evSuggText');
  const finalText = ta ? String(ta.value || '').trim() : (sugg.suggested_reply || '').trim();
  if (!finalText) { window.AgentShared.showToast('Bericht is leeg', 'error'); return; }
  const wasEdited = (finalText !== String(sugg.suggested_reply || '').trim());
  const btn = document.getElementById('evSuggSendBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: finalText }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    // Mark outcome (fail-soft: send-success is leidend)
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        suggestion_id:   sugg.id,
        status:          wasEdited ? 'USED_EDITED' : 'USED_AS_IS',
        final_sent_text: finalText,
      }),
    }).catch(() => {});
    window.AgentShared.showToast(wasEdited ? 'Aangepast bericht verstuurd' : 'Suggestie verstuurd', 'success');
    _evState.suggestion = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
    // Thread refreshen
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

function _renderTplListView() {

  `;

      if (tpl) onTemplatePicked(tpl);
    });

// Detecteer named-mapping vs positionele template + render volgende stap.
//   - Named: meta_param_mapping.body bestaat en is non-leeg -> server resolved.
//     We sturen direct (geen UI-vraag).
//   - Positioneel: {{1}}, {{2}}, … in body_text. Vraag de operator om
//     de waarden in te vullen.
function onTemplatePicked(tpl) {
  _evTplState.activeTpl = tpl;
  const mapping = tpl.meta_param_mapping || null;
  const namedBody = mapping && mapping.body && typeof mapping.body === 'object' && Object.keys(mapping.body).length > 0;
  if (namedBody) {
    // Named mapping → server resolves alles (klant.*, factuur.*, bedrijf.*,
    // datum.*, afdeling.* en event/attendee fallback ''). Geen UI-vraag.
    _renderTplConfirmView(tpl, null);
    return;
  }
  // Positioneel: detecteer {{N}}-placeholders in body_text.
  const bodyText = tpl.body_text || '';
  const matches = bodyText.match(/\{\{\s*(\d+)\s*\}\}/g) || [];
  const indices = Array.from(new Set(matches.map((m) => (m.match(/\d+/) || [])[0]).filter(Boolean))).sort((a, b) => Number(a) - Number(b));
  if (indices.length === 0) {
    _renderTplConfirmView(tpl, null);
    return;
  }
  _renderTplPositionalForm(tpl, indices);
}

function _renderTplPositionalForm(tpl, indices) {
  const body = document.getElementById('evTplBody');
  document.getElementById('evTplModalTitle').textContent = 'Variabelen invullen — ' + (tpl.name || '');
  body.innerHTML = `
    <div style="font-size:12.5px;color:var(--text-dim);margin-bottom:8px">Vul de placeholders in:</div>
    <div style="background:var(--bg-elev);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:12.5px;color:var(--text);white-space:pre-wrap;margin-bottom:10px">${esc(tpl.body_text || '')}</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${indices.map((i) => `
        <label style="display:flex;flex-direction:column;gap:3px">
          <span style="font-size:11.5px;color:var(--text-faint);font-weight:600">{{${esc(i)}}}</span>
          <input type="text" class="evx-tpl-var" data-idx="${esc(i)}" style="padding:6px 9px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit" />
        </label>
      `).join('')}
    </div>
    <div class="evx-modal-footer">
      <button class="sr-btn" id="evTplBackBtn" type="button" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer">Terug</button>
      <button class="btn-primary" id="evTplSendBtn" type="button"><i class="ti ti-send"></i> Versturen</button>
    </div>
  `;
  document.getElementById('evTplBackBtn').addEventListener('click', () => _renderTplListView());
  document.getElementById('evTplSendBtn').addEventListener('click', () => {
    const vars = {};
    body.querySelectorAll('.evx-tpl-var').forEach((inp) => {
      vars[String(inp.dataset.idx)] = String(inp.value || '');
    });
    sendTemplate(tpl, vars);
  });
}

function _renderTplConfirmView(tpl, hint) {
  const body = document.getElementById('evTplBody');

// Best-effort: bij fout (geen window.supabase, RLS-block, netwerk) gewoon
// niets tonen. Spec sluit nieuwe endpoints uit.
async function loadEventContextForCustomer(customerId) {
  const evLabel = document.getElementById('evCtxEventLabel');
  const evValue = document.getElementById('evCtxEventValue');
  if (!evLabel || !evValue) return;
  evLabel.style.display = 'none';
  evValue.innerHTML = '';
  try {
    await window._authSharedReady;
    if (!window.supabase || !customerId) return;
    const { data, error } = await window.supabase
      .from('event_attendees')
      .select('event_id, registered_at, events(id, title, starts_at, status)')
      .eq('customer_id', customerId)
      .order('registered_at', { ascending: false })
      .limit(5);
    if (error) { console.warn('[event-context]', error.message); return; }
    const rows = Array.isArray(data) ? data.filter((r) => r.events) : [];
    if (rows.length === 0) return;
    const first  = rows[0];
    const evRow  = first.events;
    const dateStr = evRow.starts_at ? new Date(evRow.starts_at).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' }) : '';
    const more   = rows.length > 1 ? ` <span style="color:var(--text-faint);font-size:11px">+${rows.length - 1} meer</span>` : '';
    evLabel.style.display = '';
    evValue.innerHTML = `
      <a class="evx-ctx-event-link" href="/modules/events-detail.html?id=${esc(evRow.id)}" title="Open event-detail">
        ${esc(evRow.title || '(geen titel)')}${dateStr ? ' · ' + esc(dateStr) : ''}
      </a>${more}
    `;
  } catch (e) {
    console.warn('[event-context exception]', e?.message || e);
  }
}
