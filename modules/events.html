function _renderEvCustomerStrip(conv) {
  const strip = document.getElementById('evCustomerStrip');
  if (!strip) return;
  if (!conv) { strip.style.display = 'none'; return; }
  strip.style.display = '';
  if (conv.customer_id) {
    const label = conv.customer_name || '(klant)';
    // Ontkoppel-knop is alleen zinvol bij een gekoppelde klant. Zelfde
    // RBAC-gate als koppelen (zie endpoint: finance.inbox.send OF
    // events.simone.use). canSync is synchroon zodat we 'm direct in de
    // template kunnen branchen — async laden zou een knop-flicker geven.
    const canUnlink = !!(window.RBAC?.canSync?.('finance.inbox.send')
                       || window.RBAC?.canSync?.('events.simone.use'));
    const unlinkBtnHtml = canUnlink
      ? '<button class="evx-ctx-link-btn" id="evCustUnlinkBtn" type="button" title="Ontkoppel klant van deze conversatie"><i class="ti ti-unlink"></i> Ontkoppel</button>'
      : '';
    strip.innerHTML = `
      <span class="evx-ctx-label"><i class="ti ti-user"></i> Klant</span>
      <span><strong>${esc(label)}</strong></span>
      <button class="evx-ctx-link-btn" id="evCustChangeBtn" type="button" title="Wijzig klant-koppeling"><i class="ti ti-refresh"></i> Wijzigen</button>
      ${unlinkBtnHtml}
      <span class="evx-ctx-label" id="evCtxEventLabel" style="margin-left:auto;display:none"><i class="ti ti-presentation"></i> Event</span>
      <span id="evCtxEventValue"></span>
    `;
    const changeBtn = document.getElementById('evCustChangeBtn');
    if (changeBtn) changeBtn.addEventListener('click', () => openCustomerLinkModal());
    const unlinkBtn = document.getElementById('evCustUnlinkBtn');
    if (unlinkBtn) unlinkBtn.addEventListener('click', () => _renderEvCustomerStripUnlinkConfirm(conv));
    // Event-context (read-only afgeleid via supabase client-side query).
    loadEventContextForCustomer(conv.customer_id);
  } else {
    strip.innerHTML = `
      <span class="evx-ctx-label"><i class="ti ti-user-off"></i> Geen koppeling</span>
      <span style="color:var(--text-faint)">Dit nummer is nog niet aan een klant gekoppeld.</span>

    `;

    if (linkBtn) linkBtn.addEventListener('click', () => openCustomerLinkModal());
  }
}

// In-app confirm voor ontkoppelen — vervangt tijdelijk de strip-inhoud zodat
// we GEEN window.confirm hoeven te gebruiken (gaf eerder een Chrome-freeze in
// deze module). Annuleer → re-render normale strip; Ontkoppelen → call endpoint,
// op succes update _evState.conv en re-render naar de niet-gekoppelde branch.
function _renderEvCustomerStripUnlinkConfirm(conv) {

// Event-context via client-side supabase RLS-query op event_attendees.
// Best-effort: bij fout (geen window.supabase, RLS-block, netwerk) gewoon
// niets tonen. Spec sluit nieuwe endpoints uit.
async function loadEventContextForCustomer(customerId) {
  const evLabel = document.getElementById('evCtxEventLabel');
  const evValue = document.getElementById('evCtxEventValue');
  if (!evLabel || !evValue) return;
  evLabel.style.display = 'none';
  evValue.innerHTML = '';
  if (!customerId) return;
  // Bonus: zelfde root-cause als _evResolveAttendeeCandidatesForConv —
  // window.supabase op event_attendees was structureel leeg door RLS.
  // Hergebruik /api/events-attendee-candidates (server-side, supabaseAdmin)
  // zodat de event-context-strip eindelijk vult. Best-effort: bij fout
  // gewoon niets tonen.
  try {
    const r = await window.AgentShared.apiFetch('/api/events-attendee-candidates', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ customer_id: customerId }),
    });
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      console.warn('[event-context]', j.error || ('HTTP ' + r.status));
      return;
    }
    const j = await r.json();
    const rows = (Array.isArray(j.candidates) ? j.candidates : [])
      .filter((c) => c.event_id);
    if (rows.length === 0) return;
    // Voorkeur voor het eerste toekomstige (server sorteert future-asc → past-desc),
    // anders pak gewoon de eerste.
    const first   = rows[0];
    const dateStr = first.event_starts_at
      ? new Date(first.event_starts_at).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' })
      : '';
    const more    = rows.length > 1
      ? ` <span style="color:var(--text-faint);font-size:11px">+${rows.length - 1} meer</span>`
      : '';
    evLabel.style.display = '';
    evValue.innerHTML = `
      <a class="evx-ctx-event-link" href="/modules/events-detail.html?id=${esc(first.event_id)}" title="Open event-detail">
        ${esc(first.event_title || '(geen titel)')}${dateStr ? ' · ' + esc(dateStr) : ''}
      </a>${more}
    `;
  } catch (e) {
    console.warn('[event-context exception]', e?.message || e);
  }
}

    return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });

const _siState = { filter: 'todo', counts: null, activeRow: null, eventsCache: null };

async function loadSignupInbox() {
  const list = document.getElementById('evSignupInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    // 'todo' = no_match + ambiguous: 2 calls + merge (server ondersteunt 1 status
    // per call). Voor de andere filters 1 directe call.
    let rows = [];
    let counts = null;
    if (_siState.filter === 'todo') {
      const [a, b] = await Promise.all([
        _siFetchList({ status: 'no_match',  limit: 200 }),
        _siFetchList({ status: 'ambiguous', limit: 200 }),
      ]);
      if (a.error || b.error) throw new Error(a.error || b.error);
      rows = [...(a.rows || []), ...(b.rows || [])]
        .sort((x, y) => String(y.received_at).localeCompare(String(x.received_at)));
      counts = a.counts || b.counts || null;
    } else if (_siState.filter === 'all') {
      const r = await _siFetchList({ limit: 200 });
      if (r.error) throw new Error(r.error);
      rows = r.rows || [];
      counts = r.counts || null;
    } else {
      const r = await _siFetchList({ status: _siState.filter, limit: 200 });
      if (r.error) throw new Error(r.error);
      rows = r.rows || [];
      counts = r.counts || null;
    }
    _siState.counts = counts;
    _siRenderCounts(counts);
    _siUpdateBadge(counts);
    _siRenderRows(rows);
  } catch (e) {
    list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div></div>';
  }
}

async function _siFetchList({ status, limit }) {
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  if (limit)  params.set('limit',  String(limit));
  const r = await window.AgentShared.apiFetch('/api/events-signup-inbox-list?' + params.toString());
  const d = await r.json().catch(() => ({}));
  if (!r.ok) return { error: d.error || ('HTTP ' + r.status) };
  return d;
}

function _siRenderCounts(counts) {
  if (!counts) return;
  const todoCount = (counts.no_match || 0) + (counts.ambiguous || 0);
  const setCnt = (key, val) => {
    document.querySelectorAll('#evSignupInboxFilters [data-cnt="' + key + '"]').forEach((s) => {
      s.textContent = '(' + (val || 0) + ')';
    });
  };
  setCnt('todo',            todoCount);
  setCnt('no_match',        counts.no_match);
  setCnt('ambiguous',       counts.ambiguous);
  setCnt('matched',         counts.matched);
  setCnt('invalid_payload', counts.invalid_payload);
  setCnt('all',             counts.total);
}

function _siUpdateBadge(counts) {
  const badge = document.getElementById('evSignupInboxBadge');
  if (!badge || !counts) return;
  const n = (counts.no_match || 0) + (counts.ambiguous || 0);
  if (n > 0) { badge.textContent = String(n); badge.style.display = ''; }
  else       { badge.style.display = 'none'; }
}

function _siStatusBadge(status) {
  const palette = {
    matched         : { bg: 'rgba(5,150,105,0.15)',  c: '#059669' },
    no_match        : { bg: 'rgba(220,38,38,0.15)',  c: '#b91c1c' },
    ambiguous       : { bg: 'rgba(245,158,11,0.18)', c: '#b45309' },
    invalid_payload : { bg: 'rgba(148,163,184,0.2)', c: 'var(--text-faint)' },
  };
  const p = palette[status] || palette.invalid_payload;
  return '<span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:' + p.bg + ';color:' + p.c + '">' + esc(status) + '</span>';
}

function _siRenderRows(rows) {
  const list = document.getElementById('evSignupInboxList');
  if (!list) return;
  if (!rows || rows.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
      + '<div class="empty-icon"><i class="ti ti-clipboard-check"></i></div>'
      + '<div style="font-size:14px;font-weight:600;margin-top:6px">Niets te reviewen</div>'
      + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Geen openstaande GHL-signups in deze filter.</div>'
      + '</div>';
    return;
  }
  list.innerHTML = '<div class="sr-tablewrap"><table class="sr-table">'
    + '<thead><tr><th>Naam</th><th>Email / Telefoon</th><th>Event-label</th><th>Status</th><th>Vragenlijst</th><th>Ingevuld op</th><th>Ontvangen</th></tr></thead>'
    + '<tbody>'
    + rows.map((r) => {
        const naam   = [r.first_name, r.last_name].filter(Boolean).join(' ').trim() || '—';
        const email  = r.email ? esc(r.email) : '<span style="color:var(--text-faint)">geen email</span>';
        const phone  = r.phone ? esc(r.phone) : '';
        const isMatched    = !!r.matched_event_id;
        // Event-label cel:
        //  - matched   → eventnaam vet + datum subtiel; raw label/kandidaten/→ weglaten.
        //  - niet-matched → rauwe event_date_label + "X kandidaten" (nodig om te koppelen).
        let labelCell;
        if (isMatched && r.matched_event) {
          labelCell = '<div style="font-weight:600">' + esc(r.matched_event.title || '?') + '</div>'
            + '<div style="font-size:11px;color:var(--text-dim);margin-top:2px">' + esc(fmtDate(r.matched_event.starts_at)) + '</div>';
        } else {
          const raw = r.event_date_label
            ? '<code style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px">' + esc(r.event_date_label) + '</code>'
            : '<span style="color:var(--text-faint);font-style:italic">geen label</span>';
          const cands = Array.isArray(r.match_candidate_ids) && r.match_candidate_ids.length > 0
            ? '<div style="font-size:11px;color:var(--text-faint);margin-top:3px">' + r.match_candidate_ids.length + ' kandidaten</div>'
            : '';
          labelCell = raw + cands;
        }
        const status = _siStatusBadge(r.match_status);
        // Vragenlijst-cel: één icon (geen dubbele glyph). Groen vinkje bij
        // ingevuld, rood kruis bij niet (ook voor niet-matched rijen).
        const qFilled = !!r.questionnaire_filled;
        const questionnaireCell = qFilled
          ? '<span title="Vragenlijst ingevuld" style="color:#059669;font-size:16px"><i class="ti ti-check"></i></span>'
          : '<span title="Geen vragenlijst" style="color:#dc2626;font-size:16px"><i class="ti ti-x"></i></span>';
        const filledAtCell = qFilled
          ? '<span style="font-size:11.5px;color:var(--text-dim)">' + esc(fmtDate(r.questionnaire_filled_at)) + '</span>'
          : '<span style="color:var(--text-faint);font-size:11.5px">—</span>';

        // Hele rij klikbaar — matched → Aanwezigen-tab, niet-matched →
        // resolve-modal. Eén handler per <tr> (zie onder de map()).
        return '<tr class="si-row-clickable" data-row-id="' + esc(r.id) + '" '
          + 'style="cursor:pointer" '
          + 'title="' + (isMatched ? 'Open Aanwezigen-tab van dit event' : 'Koppel aan event') + '">'
          + '<td>' + esc(naam) + '</td>'
          + '<td>' + email + (phone ? '<div style="font-size:11.5px;color:var(--text-dim);margin-top:2px">' + phone + '</div>' : '') + '</td>'
          + '<td>' + labelCell + '</td>'
          + '<td>' + status + '</td>'
          + '<td>' + questionnaireCell + '</td>'
          + '<td>' + filledAtCell + '</td>'
          + '<td style="font-size:11.5px;color:var(--text-dim)">' + esc(fmtDate(r.received_at)) + '</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table></div>';
  // Eén click-handler per <tr>: matched → navigeer, niet-matched → resolve-modal.
  list.querySelectorAll('tr.si-row-clickable').forEach((tr) => {
    tr.addEventListener('click', () => {
      const id = tr.dataset.rowId;
      const row = rows.find((r) => r.id === id);
      if (!row) return;
      if (row.matched_event_id) {
        window.location.href = '/modules/events-detail.html?id=' + encodeURIComponent(row.matched_event_id) + '&tab=attendees';
      } else {
        openSignupResolveModal(row);
      }
    });
  });
}

async function openSignupResolveModal(row) {
  _siState.activeRow = row;
  const modal = document.getElementById('evSignupResolveModal');
  if (!modal) return;
  document.getElementById('evSignupResolveNotes').value = '';
  document.getElementById('evSignupResolveError').style.display = 'none';
  const naam  = [row.first_name, row.last_name].filter(Boolean).join(' ').trim() || '—';
  const lines = [
    '<strong>' + esc(naam) + '</strong>' + (row.email ? ' &middot; ' + esc(row.email) : '') + (row.phone ? ' &middot; ' + esc(row.phone) : ''),
    '<div style="margin-top:4px">Label: <code style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px">' + esc(row.event_date_label || '—') + '</code></div>',
    '<div style="margin-top:4px">Status: ' + _siStatusBadge(row.match_status) + '</div>',
  ];
  document.getElementById('evSignupResolveContext').innerHTML = lines.join('');
  // Toon modal vóór events-load zodat skeleton zichtbaar is
  modal.style.display = 'flex';
  await _siLoadEventOptions();
}

function closeSignupResolveModal() {
  const modal = document.getElementById('evSignupResolveModal');
  if (modal) modal.style.display = 'none';
  _siState.activeRow = null;
}

async function _siLoadEventOptions() {
  const sel = document.getElementById('evSignupResolveEventPicker');
  if (!sel) return;
  // Cache events tijdens deze modul (events veranderen niet snel). Bij refresh:
  // _siState.eventsCache = null setten via [vernieuwen] knop later toevoegen.
  if (!_siState.eventsCache) {
    try {
      const r = await window.AgentShared.apiFetch('/api/events-list?status=published&limit=200');
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        sel.innerHTML = '<option value="">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</option>';
        return;
      }
      _siState.eventsCache = Array.isArray(d.items) ? d.items : [];
    } catch (e) {
      sel.innerHTML = '<option value="">Fout: ' + esc(e.message) + '</option>';
      return;
    }
  }
  const events = _siState.eventsCache;
  if (events.length === 0) {
    sel.innerHTML = '<option value="">Geen gepubliceerde events gevonden</option>';
    return;
  }
  // Sorteer chronologisch op starts_at ascending.
  const sorted = [...events].sort((a, b) => String(a.starts_at || '').localeCompare(String(b.starts_at || '')));
  sel.innerHTML = '<option value="">— Kies een event —</option>'
    + sorted.map((e) => {
        const closed = e.signups_closed ? ' (gesloten)' : '';
        const dt = fmtDate(e.starts_at);
        return '<option value="' + esc(e.id) + '">' + esc(dt) + ' &middot; ' + esc(e.title || '?') + closed + '</option>';
      }).join('');
}

async function submitSignupResolve() {
  if (!_siState.activeRow) return;
  const sel = document.getElementById('evSignupResolveEventPicker');
  const notesEl = document.getElementById('evSignupResolveNotes');
  const errEl   = document.getElementById('evSignupResolveError');
  const submitBtn = document.getElementById('evSignupResolveSubmit');
  errEl.style.display = 'none';
  const eventId = sel ? String(sel.value || '').trim() : '';
  if (!eventId) {
    errEl.textContent = 'Kies eerst een event.';
    errEl.style.display = '';
    return;
  }
  const notes = notesEl ? String(notesEl.value || '').trim() : '';
  if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<i class="ti ti-loader"></i> Bezig…'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/events-signup-inbox-resolve', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        inbox_id: _siState.activeRow.id,
        event_id: eventId,
        notes:    notes || undefined,
      }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      errEl.textContent = (d.error || ('HTTP ' + r.status)) + (d.code ? ' [' + d.code + ']' : '');
      errEl.style.display = '';
      if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="ti ti-check"></i> Koppel + maak deelnemer'; }
      return;
    }
    closeSignupResolveModal();
    const dedup = d.deduplicated ? ' (bestaande deelnemer hergebruikt)' : '';
    window.AgentShared.showToast('Gekoppeld + deelnemer aangemaakt' + dedup, 'success');
    loadSignupInbox();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
    if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="ti ti-check"></i> Koppel + maak deelnemer'; }
  }
}

init();
</script>
