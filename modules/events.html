<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    /* Kebab-actiemenu op event-rij (overview) — fixed-positioned zodat het
       niet door tabel-overflow geklipt wordt. Zelfde patroon als de
       attendee-kebab in events-detail.html (PR #245). */
    .ev-kebab-wrap { position: relative; display: inline-block; }
    .ev-kebab-menu { position: fixed; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); padding: 4px; min-width: 180px; z-index: 400; display: none; }
    .ev-kebab-menu.show { display: block; }
    .ev-kebab-item { display: block; width: 100%; padding: 7px 10px; text-align: left; background: transparent; border: none; cursor: pointer; font-size: 12.5px; color: var(--text); border-radius: 4px; font-family: inherit; }
    .ev-kebab-item:hover { background: var(--bg-elev-2); }
    .ev-kebab-item.danger { color: #dc2626; }

    /* STAP 6a — twee-paneel inbox shell (links lijst, rechts thread+composer). */
    .evx-shell {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      height: calc(100vh - 260px);
      min-height: 540px;
      background: var(--bg-elev);
    }
    .evx-list-pane {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      min-width: 0;
    }
    .evx-list-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-shrink: 0;
    }
    .evx-list-body { flex: 1; overflow-y: auto; padding: 6px; min-height: 0; }
    .evx-thread-pane { display: flex; flex-direction: column; overflow: hidden; min-width: 0; background: var(--bg); }
    .evx-thread-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .evx-thread-messages { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-elev-1, var(--bg-elev)); min-height: 0; }
    .evx-thread-footer { border-top: 1px solid var(--border); padding: 10px 12px; flex-shrink: 0; background: var(--bg); }

    /* Conversation-rij in lijst-pane (vervangt de oude tabel). */
    .evx-conv-row {
      padding: 9px 10px;
      cursor: pointer;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 2px;
      border: 1px solid transparent;
      transition: background-color .12s, border-color .12s;
    }
    .evx-conv-row:hover { background: var(--bg-elev-2); }
    .evx-conv-row.active { background: rgba(9,61,84,0.10); border-color: rgba(9,61,84,0.18); }
    .evx-conv-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--bg-elev-2);
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: var(--text-dim);
      flex-shrink: 0;
    }
    .evx-conv-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
    .evx-conv-toprow { display: flex; align-items: center; gap: 6px; }
    .evx-conv-name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
    .evx-conv-time { font-size: 10.5px; color: var(--text-faint); flex-shrink: 0; }
    .evx-conv-preview { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .evx-conv-meta { display: flex; align-items: center; gap: 6px; margin-top: 1px; }
    .evx-conv-unread { background: rgba(220,38,38,0.15); color: #b91c1c; border-radius: 10px; padding: 1px 7px; font-size: 10.5px; font-weight: 700; }

    /* Empty-state als nog geen gesprek geopend is. */
    .evx-thread-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 24px; text-align: center; color: var(--text-faint); }

    /* Responsive: smal scherm → één-paneel toggle via .thread-open op de shell. */
    @media (max-width: 880px) {
      .evx-shell { grid-template-columns: 1fr; height: auto; min-height: 0; }
      .evx-list-pane { border-right: none; }
      .evx-shell.thread-open .evx-list-pane { display: none; }
      .evx-shell:not(.thread-open) .evx-thread-pane { display: none; }
    }
    /* Op breed scherm: terug-knop is geen pane-switch nodig — hij deselecteert
       wel het actieve gesprek. Verberg ze als 'er is geen gesprek open'. */
    @media (min-width: 881px) {
      .evx-shell .evx-thread-pane #evThreadBack { display: none; }
    }

    /* STAP 6b — 24u-dot per lijst-rij. Groen = binnen venster, rood = verlopen.
       Bron: it.can_send_text uit /api/inbox-conversations-list. */
    .evx-24h-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 4px;
    }
    .evx-24h-dot.open   { background: #059669; box-shadow: 0 0 0 2px rgba(5,150,105,0.18); }
    .evx-24h-dot.closed { background: #dc2626; box-shadow: 0 0 0 2px rgba(220,38,38,0.18); }

    /* STAP 6c — template-picker modal. */
    .evx-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 9999; display: none; align-items: flex-start; justify-content: center; padding: 60px 16px; overflow-y: auto; }
    .evx-modal-overlay.show { display: flex; }
    .evx-modal-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 560px; padding: 16px 18px; box-shadow: 0 12px 40px rgba(0,0,0,0.25); }
    .evx-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .evx-modal-title { font-size: 14.5px; font-weight: 700; color: var(--text); }
    .evx-modal-search { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-elev); font-size: 13px; color: var(--text); font-family: inherit; margin-bottom: 8px; }
    .evx-modal-list { max-height: 360px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .evx-modal-item { padding: 9px 10px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--bg-elev); transition: background-color .12s, border-color .12s; }
    .evx-modal-item:hover { background: var(--bg-elev-2); border-color: var(--text-faint); }
    .evx-modal-item .iname { font-size: 13px; font-weight: 600; color: var(--text); }
    .evx-modal-item .imeta { font-size: 11.5px; color: var(--text-dim); margin-top: 2px; }
    .evx-modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

    /* STAP 6d — klant-context-strip + Simone-polish. */
    .evx-ctx-strip { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--bg-elev-2); border-bottom: 1px solid var(--border); font-size: 12.5px; color: var(--text-dim); flex-wrap: wrap; flex-shrink: 0; }
    .evx-ctx-strip .evx-ctx-label { font-weight: 700; color: var(--text-faint); text-transform: uppercase; font-size: 10.5px; letter-spacing: .04em; }
    .evx-ctx-strip .evx-ctx-link-btn { background: transparent; border: 1px solid var(--border); color: var(--text-dim); padding: 3px 9px; border-radius: 7px; font-size: 11.5px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; }
    .evx-ctx-strip .evx-ctx-link-btn:hover { background: var(--bg); color: var(--text); }
    .evx-ctx-strip .evx-ctx-event-link { color: var(--text); text-decoration: none; border-bottom: 1px dashed var(--text-faint); }
    .evx-ctx-strip .evx-ctx-event-link:hover { color: var(--text-dim); }

    /* Simone-polish: preview-box met Gebruiken / Aanpassen buttons. */
    .evx-sim-card { border: 1px solid #7c3aed; border-radius: 10px; background: rgba(124,58,237,0.05); padding: 12px; margin: 6px 14px 0 14px; }
    .evx-sim-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .evx-sim-head .ti { color: #7c3aed; }
    .evx-sim-title { font-weight: 700; font-size: 12.5px; color: #7c3aed; }
    .evx-sim-meta { font-size: 11px; color: var(--text-dim); margin-left: auto; }
    .evx-sim-quote { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 13px; color: var(--text); white-space: pre-wrap; line-height: 1.45; }
    .evx-sim-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
    .evx-sim-actions .btn-dismiss { background: transparent; border: 1px solid var(--border); color: var(--text-faint); padding: 5px 10px; border-radius: 7px; font-size: 11.5px; cursor: pointer; font-family: inherit; margin-left: auto; }
    .evx-sim-actions .btn-dismiss:hover { color: var(--text-dim); }

    /* STAP 7 — Verhuisde modal-CSS uit admin.html, geprefixed met aq- om
       botsing met bestaande events-modals (evSignupResolveModal /
       evNiveauPhotoModal) die ook class="modal-overlay" / class="modal-card"
       gebruiken te voorkomen. */
    .aq-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:500; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
    .aq-modal-overlay.hidden { display:none !important; }
    .aq-modal-card { background:var(--bg-elev); border:1px solid var(--border-strong, var(--border)); border-radius:14px; width:100%; max-width:440px; margin:20px; }
    .aq-modal-header { display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--border); }
    .aq-modal-title { font-size:15px; font-weight:600; }
    .aq-modal-close { background:transparent; border:none; color:var(--text-faint); font-size:16px; cursor:pointer; padding:4px; line-height:1; }
    .aq-modal-body { padding:20px; }
    .aq-modal-footer { display:flex; justify-content:flex-end; gap:8px; padding:14px 20px; border-top:1px solid var(--border); }

    /* STAP 7 — form-classes uit admin.html. Niet eerder gedefinieerd in
       events.html; geen botsing. */
    .form-group { margin-bottom:14px; }
    .form-label { display:block; font-size:12px; font-weight:600; color:var(--text-dim); margin-bottom:6px; }
    .form-input { width:100%; background:var(--bg-elev-2); border:1px solid var(--border-strong, var(--border)); border-radius:8px; padding:9px 12px; font-size:13px; color:var(--text); font-family:inherit; outline:none; transition:border-color .15s; }
    .form-input:focus { border-color:var(--brand-primary, #093d54); }
    .form-error { margin-top:10px; padding:8px 12px; background:rgba(220,38,38,.10); border:1px solid rgba(220,38,38,.30); border-radius:8px; font-size:12px; color:#b91c1c; }
    .form-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .form-help { font-size:11px; color:var(--text-faint); margin-top:4px; }

    /* STAP 7 — sub-tab-strip binnen #ev-pane-settings. */
    .evs-sub-tabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin-bottom:18px; flex-wrap:wrap; }
    .evs-sub-tab { background:transparent; border:none; padding:9px 14px; font-size:13px; font-weight:600; color:var(--text-faint); cursor:pointer; border-bottom:2px solid transparent; font-family:inherit; margin-bottom:-1px; display:inline-flex; align-items:center; gap:6px; }
    .evs-sub-tab:hover { color:var(--text); }
    .evs-sub-tab.active { color:var(--brand-primary, #093d54); border-bottom-color:var(--brand-primary, #093d54); }
    .evs-sub-section { display:none; }
    .evs-sub-section.active { display:block; }

    /* STAP 7 — section-card / section-header voor verhuisde Assessment +
       Simone-config secties (uit admin.html). */
    .aq-section-card { background:var(--bg-elev); border:1px solid var(--border); border-radius:10px; padding:18px 20px; }
    .aq-section-header { display:flex; align-items:flex-start; gap:14px; margin-bottom:8px; }

    /* FEATURE C (PR-Cfrontend) — interne sub-tab-strip binnen de Vragenlijst-
       sectie: "Vragen" + "Puntensysteem" per geselecteerde vragenlijst.
       Prefix qq- (questionnaire) om botsing met evs- / aq- te vermijden. */
    .qq-subtabs { display:flex; gap:4px; border-bottom:1px solid var(--border); margin:14px 0 16px; flex-wrap:wrap; }
    .qq-subtab { background:transparent; border:none; padding:7px 12px; font-size:12.5px; font-weight:600; color:var(--text-faint); cursor:pointer; border-bottom:2px solid transparent; font-family:inherit; margin-bottom:-1px; display:inline-flex; align-items:center; gap:5px; }
    .qq-subtab:hover { color:var(--text); }
    .qq-subtab.active { color:var(--brand-primary, #093d54); border-bottom-color:var(--brand-primary, #093d54); }
    .qq-subpane { display:none; }
    .qq-subpane.active { display:block; }
    .qq-active-badge { font-size:10px; font-weight:700; background:rgba(16,185,129,.15); color:#059669; padding:2px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.04em; }
    .qq-selector-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding:10px 12px; background:rgba(0,0,0,.03); border:1px solid var(--border); border-radius:8px; margin-bottom:14px; }
    .qq-selector-row select { padding:6px 8px; border:1px solid var(--border); border-radius:6px; background:var(--bg); color:var(--text); font-family:inherit; font-size:13px; min-width:240px; }
    .qq-band-row { display:grid; grid-template-columns:140px 1fr auto; gap:10px; align-items:center; padding:8px 10px; border:1px solid var(--border); border-radius:8px; background:rgba(0,0,0,.02); font-size:12.5px; }
    .qq-band-row + .qq-band-row { margin-top:6px; }
    .qq-band-lbl { font-weight:700; }
    .qq-band-desc { color:var(--text-dim); }
    .qq-band-tag { font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; text-transform:uppercase; letter-spacing:.04em; }
    .qq-band-tag.low  { background:rgba(220,38,38,.12); color:#b91c1c; }
    .qq-band-tag.mid  { background:rgba(245,158,11,.15); color:#b45309; }
    .qq-band-tag.high { background:rgba(16,185,129,.15); color:#059669; }

    /* PR-A — Mentor-grootboek pane (verhuisd uit modules/mentor-grootboek.html).
       Geprefixt waar de klasse generiek genoeg is dat events.html-elders 'm
       ook zou kunnen raken (status-pill, scope-badge). De rest (.kpi-strip,
       .kpi, table.lt, h3.sec) is mentor-grootboek-uniek. */
    .kpi-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
    .kpi { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .kpi .lbl { font-size: 11px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .kpi .val { font-size: 18px; font-weight: 700; color: var(--text); }
    .kpi.netto-pos .val { color: #059669; }
    .kpi.netto-neg .val { color: #b91c1c; }

    h3.sec { font-size: 12px; font-weight: 700; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; margin: 22px 0 10px; }

    table.lt { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    table.lt th { text-align: left; font-weight: 600; color: var(--text-faint); padding: 8px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; background: var(--bg-elev-2); border-bottom: 1px solid var(--border); }
    table.lt td { padding: 9px 12px; border-bottom: 1px solid var(--border); }
    table.lt tr:last-child td { border-bottom: none; }
    table.lt td.num { text-align: right; font-variant-numeric: tabular-nums; }

    /* Status-pill voor mentor-grootboek-ledger. Prefixt met 'mg-' om
       botsing met de overzicht-tabs status-badges (.status-published etc)
       te voorkomen. */
    .mg-status-pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .mg-status-pending             { background: rgba(148,163,184,0.22); color: #475569; }
    .mg-status-wachten_op_betaling { background: rgba(245,158,11,0.18); color: #b45309; }
    .mg-status-vrijgegeven         { background: rgba(5,150,105,0.18); color: #047857; }
    .mg-status-geannuleerd         { background: rgba(148,163,184,0.18); color: var(--text-faint); }
    .mg-status-uitbetaald          { background: rgba(20,115,214,0.18); color: #1160bd; }

    .mg-scope-badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 10px; background: var(--bg-elev-2); color: var(--text-dim); font-weight: 600; }
    .mg-scope-badge.self { background: rgba(20,115,214,0.18); color: #1160bd; }

    @media (max-width: 880px) {
      .kpi-strip { grid-template-columns: 1fr 1fr; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1400px; }
    .page-head { display:flex; align-items:center; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
    .page-head h1 { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .page-head .sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .btn-primary { background: var(--brand-primary, #093d54); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary { background: var(--bg-elev); color: var(--text-dim); border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-secondary:hover { background: var(--bg-elev-2); color: var(--text); }

    /* Fase 1 events-tabs */
    .ev-tabs { padding-bottom: 0; }
    .ev-tab { background: transparent; border: none; padding: 10px 14px; font-size: 13.5px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
    .ev-tab:hover { color: var(--text); }
    .ev-tab.active { color: var(--brand-primary, #093d54); border-bottom-color: var(--brand-primary, #093d54); }

    /* Capacity pill */
    .cap-pill { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:12px; font-size:11px; font-weight:600; background: var(--bg-elev-2); color: var(--text-dim); border:1px solid var(--border); }
    .cap-pill.full { background: rgba(220,38,38,0.15); color:#b91c1c; border-color: rgba(220,38,38,0.3); }
    .cap-pill.warn { background: rgba(245,158,11,0.15); color:#b45309; border-color: rgba(245,158,11,0.3); }
    .cap-pill.ok { background: rgba(5,150,105,0.12); color:#059669; border-color: rgba(5,150,105,0.25); }

    /* Status badges */
    .status-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .status-draft { background: rgba(148,163,184,0.2); color: var(--text-faint); }
    .status-published { background: rgba(5,150,105,0.15); color:#059669; }
    .status-cancelled { background: rgba(220,38,38,0.15); color:#b91c1c; }
    .status-archived { background: rgba(148,163,184,0.2); color: var(--text-faint); opacity:.7; }

    /* Signups-closed badge (Blok 1) */
    .signups-closed-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; background: rgba(245,158,11,0.18); color:#b45309; border:1px solid rgba(245,158,11,0.3); margin-left: 4px; cursor: help; }

    /* Sync badges (Webflow + GHL) */
    .sync-badges { display:inline-flex; gap:4px; flex-wrap:wrap; }
    .sync-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:8px; font-size:10px; font-weight:700; letter-spacing:.03em; cursor: help; }
    .sync-badge.sync-ok      { background: rgba(5,150,105,0.15); color:#059669; border:1px solid rgba(5,150,105,0.25); }
    .sync-badge.sync-fail    { background: rgba(220,38,38,0.15); color:#b91c1c; border:1px solid rgba(220,38,38,0.3); }

<script>
// ── Module-state ─────────────────────────────────────────────────────────────
const VALID_STATUS = ['draft', 'published', 'cancelled', 'archived'];
const STATUS_LABELS = {
  draft: 'Concept',
  published: 'Gepubliceerd',
  cancelled: 'Geannuleerd',
  archived: 'Gearchiveerd',
};

const state = {
  // Filter-state. status=null betekent default ('draft,published' op de API).
  status: null,           // null | 'draft' | 'published' | 'cancelled' | 'archived'
  niveau: null,           // null | slug
  search: '',
  items: [],
  niveauOptions: [],
  loading: false,
};

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (!Number.isFinite(d.getTime())) return '—';
  return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function capPillClass(active, capacity) {
  if (!capacity || capacity <= 0) return 'cap-pill';
  const ratio = active / capacity;
  if (active >= capacity) return 'cap-pill full';
  if (ratio >= 0.8) return 'cap-pill warn';
  return 'cap-pill ok';
}

// ── Sync-badge mapping ───────────────────────────────────────────────────────
//
// Webflow status: success | failure | unpublished | null
// GHL status    : success | failure | skipped_graceful | null
//
// renderSyncBadge returnt 1 badge HTML met label + tooltip (last_synced_at).
function renderSyncBadge(target, status, lastSyncedAt) {
  const labelPrefix = target === 'webflow' ? 'WF' : 'GHL';
  let cls = 'sync-none';
  let label = '-';
  if (status === 'success') { cls = 'sync-ok';   label = `${labelPrefix} OK`; }
  else if (status === 'failure') { cls = 'sync-fail'; label = `${labelPrefix} FAIL`; }
  else if (status === 'skipped_graceful') { cls = 'sync-skip'; label = `${labelPrefix} SKIP`; }
  else if (status === 'unpublished') { cls = 'sync-unpub'; label = `${labelPrefix} UNPUB`; }

  const tooltipParts = [];
  tooltipParts.push(target === 'webflow' ? 'Webflow' : 'GoHighLevel');
  tooltipParts.push('status: ' + (status || 'nog niet gesynct'));
  if (lastSyncedAt) tooltipParts.push('laatst: ' + fmtDate(lastSyncedAt));
  const tooltip = tooltipParts.join(' | ');

  return `<span class="sync-badge ${cls}" title="${esc(tooltip)}">${esc(label)}</span>`;
}

function renderSyncCell(ev) {
  return `<span class="sync-badges">
    ${renderSyncBadge('webflow', ev.webflow_sync_status, ev.webflow_last_synced_at)}
    ${renderSyncBadge('ghl', ev.ghl_sync_status, ev.ghl_last_synced_at)}
  </span>`;
}

// ── Signups-closed badge (Blok 1) ────────────────────────────────────────────
//
// Toont een kleine pill "Aanmelding gesloten" achter de status-badge zodra
// `signups_closed=true`. Tooltip-tekst hangt af van `signups_closed_reason`:
//   - 'auto_time'     → Automatisch gesloten (T-1 dag)
//   - 'auto_full'     → Automatisch gesloten (vol)
//   - 'auto_deadline' → Automatisch gesloten (deadline)
//   - 'manual'        → Handmatig gesloten
//   - andere/leeg     → generieke tekst
//
// Bevat ook timestamp uit `signups_closed_at` als die meegegeven wordt.
const SIGNUPS_CLOSED_REASON_LABEL = {
  auto_time: 'Automatisch gesloten (T-1 dag)',
  auto_full: 'Automatisch gesloten (vol)',
  auto_deadline: 'Automatisch gesloten (deadline)',
  manual: 'Handmatig gesloten',
};

function renderSignupsClosedBadge(ev) {
  if (!ev || ev.signups_closed !== true) return '';
  const reason = ev.signups_closed_reason || '';
  const reasonLabel = SIGNUPS_CLOSED_REASON_LABEL[reason] || 'Aanmelding gesloten';
  const parts = [reasonLabel];
  if (ev.signups_closed_at) parts.push('sinds ' + fmtDate(ev.signups_closed_at));
  const tooltip = parts.join(' | ');
  return `<span class="signups-closed-badge" title="${esc(tooltip)}">Aanmelding gesloten</span>`;
}

}

  // Tab-switch wiring
  const tabBtns = document.querySelectorAll('.ev-tab');
  const paneOverview     = document.getElementById('ev-pane-overzicht');
  const paneInbox        = document.getElementById('ev-pane-inbox');
  const paneSignupInbox  = document.getElementById('ev-pane-signup-inbox');
  const paneSettings     = document.getElementById('ev-pane-settings');
  const paneMentorBoek   = document.getElementById('ev-pane-mentor-grootboek');
  function hideAll() {
    paneOverview.style.display = 'none';
    paneInbox.style.display = 'none';
    if (paneSignupInbox) paneSignupInbox.style.display = 'none';
    if (paneSettings) paneSettings.style.display = 'none';
    if (paneMentorBoek) paneMentorBoek.style.display = 'none';
  }
  tabBtns.forEach(b => b.addEventListener('click', () => {
    const which = b.getAttribute('data-evtab');
    tabBtns.forEach(x => x.classList.toggle('active', x === b));
    hideAll();
    if (which === 'overzicht') {
      paneOverview.style.display = '';
      _evTeardownRealtime();
      // Re-render zodat de huidige status-filter (incl. 'afgerond') correct
      // de juiste sub-lijst toont (events-grid vs. afgerond-grid).
      _evApplyStatusFilterView();
    } else if (which === 'inbox') {
      paneInbox.style.display = '';
      loadEventsInbox();
      // Realtime: lijst-kanaal + 30s backstop-poll. Berichten-kanaal volgt
      // pas wanneer een specifieke conversatie open gaat (openEventsConv).
      _evSubscribeConversations();
      _evStartBackstop();
    } else if (which === 'signup-inbox') {
      if (paneSignupInbox) paneSignupInbox.style.display = '';
      loadSignupInbox();
      _evTeardownRealtime();
    } else if (which === 'mentor-grootboek') {
      if (paneMentorBoek) paneMentorBoek.style.display = '';
      _evTeardownRealtime();
      mgLoadOverview();
    }
  }));

  // PR-A — Deeplink: events.html#mentor-grootboek opent de tab direct.
  (function _evMentorGrootboekHashOnLoad() {
    const h = (window.location.hash || '').toLowerCase();
    if (h !== '#mentor-grootboek') return;
    const btn = document.querySelector('.ev-tab[data-evtab="mentor-grootboek"]');
    if (btn) btn.click();
  })();

  // ⚙ Instellingen — eigen pane, géén top-tab. Active-state op de tabs
  // wordt afgezet zodat zichtbaar is dat we niet in een tabblad zitten.
  // STAP 7: _renderEvSettings is async (RBAC-check). Geen await; render-
  // initialisatie loopt zelf (sub-tab-keuze + lazy load).
  const settingsBtn = document.getElementById('evSettingsBtn');
  if (settingsBtn) {
    settingsBtn.addEventListener('click', () => {
      tabBtns.forEach(x => x.classList.remove('active'));
      hideAll();
      if (paneSettings) paneSettings.style.display = '';
      _renderEvSettings();
      _evTeardownRealtime();
    });
  }
  // STAP 7 — Deeplink-handling: bij #settings-assessment of #settings-simone
  // direct het Instellingen-paneel openen op de juiste sub-tab.
  (function _evSettingsHashOnLoad() {
    const h = (window.location.hash || '').toLowerCase();
    if (h !== '#settings-assessment' && h !== '#settings-simone') return;
    if (settingsBtn) settingsBtn.click();
  })();

  const inboxRefresh = document.getElementById('evInboxRefresh');
  if (inboxRefresh) inboxRefresh.addEventListener('click', () => loadEventsInbox());

  // STAP 6c — Template-picker wiring
  const tplBtn = document.getElementById('evComposeTemplateBtn');
  if (tplBtn) tplBtn.addEventListener('click', () => openTemplatePicker());
  const tplClose = document.getElementById('evTplCloseBtn');
  if (tplClose) tplClose.addEventListener('click', () => closeTemplatePicker());
  // Buiten-modal-click sluit het picker-paneel.
  const tplOverlay = document.getElementById('evTemplatePickerModal');
  if (tplOverlay) tplOverlay.addEventListener('click', (e) => { if (e.target === tplOverlay) closeTemplatePicker(); });

  // STAP 6d — Klant-koppel modal wiring
  const custClose  = document.getElementById('evCustLinkCloseBtn');
  if (custClose)  custClose.addEventListener('click', () => closeCustomerLinkModal());
  const custCancel = document.getElementById('evCustLinkCancelBtn');
  if (custCancel) custCancel.addEventListener('click', () => closeCustomerLinkModal());
  const custOverlay = document.getElementById('evCustomerLinkModal');
  if (custOverlay) custOverlay.addEventListener('click', (e) => { if (e.target === custOverlay) closeCustomerLinkModal(); });
  const custInput = document.getElementById('evCustSearchInput');
  if (custInput) custInput.addEventListener('input', _evCustSearchOnInput);

  // Inschrijvingen-inbox wiring
  const siRefresh = document.getElementById('evSignupInboxRefresh');
  if (siRefresh) siRefresh.addEventListener('click', () => loadSignupInbox());
  const siFilters = document.querySelectorAll('#evSignupInboxFilters .sr-seg');
  siFilters.forEach((seg) => {
    seg.addEventListener('click', () => {
      siFilters.forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      _siState.filter = seg.dataset.sistatus || 'todo';
      loadSignupInbox();
    });
  });
  const siCancel  = document.getElementById('evSignupResolveCancel');
  const siCancel2 = document.getElementById('evSignupResolveCancel2');
  const siSubmit  = document.getElementById('evSignupResolveSubmit');
  if (siCancel)  siCancel.addEventListener('click', () => closeSignupResolveModal());
  if (siCancel2) siCancel2.addEventListener('click', () => closeSignupResolveModal());
  if (siSubmit)  siSubmit.addEventListener('click', () => submitSignupResolve());

  const npBtn = document.getElementById('evNiveauPhotosBtn');
  if (npBtn) npBtn.addEventListener('click', openNiveauPhotoModal);
  const npClose = document.getElementById('evNiveauPhotoClose');
  if (npClose) npClose.addEventListener('click', () => {
    const m = document.getElementById('evNiveauPhotoModal'); if (m) m.style.display = 'none';
  });

  // Fase 2 stap 2c — thread-view wiring
  const backBtn = document.getElementById('evThreadBack');
  if (backBtn) backBtn.addEventListener('click', () => _evShowListView());
  const askBtn = document.getElementById('evAskSimoneBtn');
  if (askBtn) askBtn.addEventListener('click', () => askSimone());
  const composeSendBtn = document.getElementById('evComposeSendBtn');
  if (composeSendBtn) composeSendBtn.addEventListener('click', () => sendComposeText());
  // Disable Simone-knop als user geen events.simone.use heeft (RBAC client-gate;
  // server doet de echte check). super_admin krijgt 'm via permission-RPC.
  if (askBtn && window.RBAC && typeof window.RBAC.can === 'function') {
    window.RBAC.can('events.simone.use').then((ok) => {
      if (!ok) { askBtn.disabled = true; askBtn.title = 'Geen rechten (events.simone.use)'; askBtn.style.opacity = 0.4; }
    }).catch(() => {});
  }

  // Wire filters
  document.getElementById('evSearch').addEventListener('input', debounce((e) => {
    state.search = e.target.value.trim();
    loadEvents();
  }, 300));
  document.getElementById('evNiveau').addEventListener('change', (e) => {
    state.niveau = e.target.value || null;
    loadEvents();
  });
  document.getElementById('evRefresh').addEventListener('click', () => loadEvents());
  document.querySelectorAll('#evSegments .sr-seg').forEach((seg) => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#evSegments .sr-seg').forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      state.status = seg.dataset.status || null;
      _evApplyStatusFilterView();
    });
  });
}

// Beslist welke sub-lijst zichtbaar is in Overzicht en triggert de juiste loader.
//   status === 'afgerond' -> /api/events-completed-list via loadAfgerondEvents()
//   andere statussen      -> /api/events-list via loadEvents()
// "Afgerond" is hierdoor een filter binnen Overzicht i.p.v. een aparte top-tab.
function _evApplyStatusFilterView() {
  const eventsListEl   = document.getElementById('eventsList');
  const afgerondListEl = document.getElementById('eventsAfgerondList');
  if (state.status === 'afgerond') {
    if (eventsListEl)   eventsListEl.style.display = 'none';
    if (afgerondListEl) afgerondListEl.style.display = '';
    loadAfgerondEvents();
  } else {
    if (eventsListEl)   eventsListEl.style.display = '';
    if (afgerondListEl) afgerondListEl.style.display = 'none';
    loadEvents();
  }
}

// STAP 7 — Instellingen-paneel: sub-tab-strip met Vragenlijst / Simone-config /
// Automations / Niveau-foto's. Vragenlijst en Simone zijn fysiek verhuisd uit
// admin.html; Automations is een link naar /modules/events-automations.html en
// Niveau-foto's opent een bestaande lokale modal.
//
// Lazy load: openen van sub-tab triggert loadAssessmentQuestions() resp.
// loadSimoneConfig() — alleen de eerste keer (loaded-vlag voorkomt herhaling).
// RBAC-gating: Vragenlijst zichtbaar bij admin.joost_config; Simone bij
// admin.simone_config. Andere sub-tabs blijven altijd zichtbaar.
const _evSettingsState = { activeSub: null, assessmentLoaded: false, simoneLoaded: false };

async function _renderEvSettings() {
  const tabs = document.querySelectorAll('#evSettingsSubTabs .evs-sub-tab');
  if (!tabs.length) return;
  // RBAC-checks (best-effort; bij falen vallen we terug op "verbergen").
  let canAssessment = false, canSimone = false;
  try {
    if (window.RBAC && typeof window.RBAC.can === 'function') {
      canAssessment = await window.RBAC.can('admin.joost_config');
      canSimone     = await window.RBAC.can('admin.simone_config');
    }
  } catch (e) { /* stil — niet-blokkerend */ }
  tabs.forEach((btn) => {
    const sub = btn.dataset.evsub;
    if (sub === 'assessment') btn.style.display = canAssessment ? '' : 'none';
    else if (sub === 'simone') btn.style.display = canSimone ? '' : 'none';
    else btn.style.display = '';
  });
  // Standaard sub-tab kiezen: deeplink heeft prioriteit, anders eerste
  // beschikbare. Idempotent — re-render bij tab-switch.
  let target = _evSettingsState.activeSub;
  if (!target) {
    const h = (window.location.hash || '').toLowerCase();
    if (h === '#settings-assessment' && canAssessment) target = 'assessment';
    else if (h === '#settings-simone' && canSimone)    target = 'simone';
    else if (canAssessment)                            target = 'assessment';
    else if (canSimone)                                target = 'simone';
    else                                               target = 'automations';
  }
  _evSelectSettingsSubTab(target);
  // Eénmalig wire — voorkomt duplicate handlers bij ⚙-tab her-open.
  if (!_renderEvSettings._wired) {
    tabs.forEach((btn) => {
      btn.addEventListener('click', () => _evSelectSettingsSubTab(btn.dataset.evsub));
    });
    _renderEvSettings._wired = true;
  }
}

function _evSelectSettingsSubTab(name) {
  _evSettingsState.activeSub = name;
  document.querySelectorAll('#evSettingsSubTabs .evs-sub-tab').forEach((b) => {
    b.classList.toggle('active', b.dataset.evsub === name);
  });
  document.querySelectorAll('.evs-sub-section[data-evsubsec]').forEach((s) => {
    s.classList.toggle('active', s.dataset.evsubsec === name);
  });
  // Lazy load triggers
  if (name === 'assessment' && !_evSettingsState.assessmentLoaded) {
    _evSettingsState.assessmentLoaded = true;
    try {
      _qqWireSubTabs();
      // FEATURE C: qqLoadList haalt vragenlijsten op én triggert daarna
      // loadAssessmentQuestions() + qqLoadThresholds() met de juiste
      // selectie. Backward-compat: bij ontbrekende endpoint valt de
      // banner terug op een error en de vragen-lijst blijft "Laden…".
      qqLoadList();
    } catch (e) { console.error('[settings/assessment]', e); }
  }
  if (name === 'simone' && !_evSettingsState.simoneLoaded) {
    _evSettingsState.simoneLoaded = true;
    try { loadSimoneConfig(); } catch (e) { console.error('[settings/simone]', e); }
  }
}

// PR-A — VERHUISDE MENTOR-GROOTBOEK (uit modules/mentor-grootboek.html)
// Endpoint /api/mentor-ledger-overview + RBAC mentor.ledger.view ongewijzigd.
// Helpers met mg-prefix om botsing met events.html-elders te voorkomen.
// Hergebruikt esc()/eur()/fmtDate() + window.RBAC.canSync() die al in
// events.html beschikbaar zijn.
// ──────────────────────────────────────────────────────────────────────────────
const MG_STATUS_LABELS = {
  pending: 'Pending',
  wachten_op_betaling: 'Wachten op betaling',
  vrijgegeven: 'Vrijgegeven',
  geannuleerd: 'Geannuleerd',
  uitbetaald: 'Uitbetaald',
};

let _mgLoaded = false;

async function mgLoadOverview() {
  const host = document.getElementById('ev-pane-mentor-grootboek');
  if (!host) return;
  // RBAC-gate (defense-in-depth; sidebar-gating verdween in PR-A).
  await window._authSharedReady;
  try { await window.RBAC.ensurePermissionsLoaded?.(); } catch {}
  if (!window.RBAC?.canSync?.('mentor.ledger.view')) {
    host.innerHTML = `
      <div class="forbidden-card">
        <h2>Geen toegang</h2>
        <p>Je hebt geen rechten om het mentor-grootboek te bekijken.</p>
      </div>`;
    return;
  }
  host.innerHTML = '<div class="empty-state">Laden…</div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/mentor-ledger-overview');
    const j = await r.json();
    if (!r.ok) throw new Error(j?.error || 'Laden mislukt');
    mgRender(j);
    _mgLoaded = true;
  } catch (e) {
    host.innerHTML = `<div class="empty-state">Laden mislukt: ${esc(e?.message || e)}</div>`;
  }
}

function mgStatusPill(key) {
  return `<span class="mg-status-pill mg-status-${esc(key)}">${esc(MG_STATUS_LABELS[key] || key)}</span>`;
}

function mgStatusBreakdown(perStatus) {
  const cells = Object.keys(MG_STATUS_LABELS).map((k) => {
    const v = Number(perStatus?.[k] || 0);
    if (Math.abs(v) < 0.005) return '';
    return `<div style="display:inline-flex;align-items:center;gap:5px;margin-right:8px">${mgStatusPill(k)} <span style="font-variant-numeric:tabular-nums">${eur(v)}</span></div>`;
  }).filter(Boolean).join('');
  return cells || '<span style="color:var(--text-faint)">—</span>';
}

function mgRender(data) {
  const host = document.getElementById('ev-pane-mentor-grootboek');
  if (!host) return;
  const scope = data.scope || 'all';
  const t = data.totals || {};
  const nettoCls = (t.netto || 0) >= 0 ? 'netto-pos' : 'netto-neg';

  const byEventRows = (data.byEvent || []).map((e) => `
    <tr>
      <td>${esc(e.event_title || '(zonder titel)')}</td>
      <td>${esc(fmtDate(e.starts_at))}</td>
      <td class="num">${eur(e.omzet)}</td>
      <td class="num">${eur(e.bonuspot)}</td>
      <td class="num">${eur(e.uitgaven)}</td>
      <td class="num" style="font-weight:600;color:${(e.netto||0) >= 0 ? '#059669' : '#b91c1c'}">${eur(e.netto)}</td>
      <td>${mgStatusBreakdown(e.per_status)}</td>
    </tr>
  `).join('');

  const byMentorRows = (data.byMentor || []).map((m) => `
    <tr>
      <td>${esc(m.mentor_name || m.mentor_email || '(onbekend)')}</td>
      <td style="color:var(--text-faint);font-size:12px">${esc(m.mentor_email || '')}</td>
      <td class="num" style="font-weight:600;color:${(m.saldo||0) >= 0 ? '#059669' : '#b91c1c'}">${eur(m.saldo)}</td>
      <td class="num">${m.meegenomen_min_saldo > 0 ? eur(m.meegenomen_min_saldo) : '—'}</td>
      <td>${mgStatusBreakdown(m.per_status)}</td>
    </tr>
  `).join('');

  host.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:14px;flex-wrap:wrap">
      <div>
        <div style="font-size:15px;font-weight:700">Mentor-grootboek <span class="mg-scope-badge ${scope === 'self' ? 'self' : ''}">${scope === 'self' ? 'eigen rijen' : 'alles'}</span></div>
        <div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Bonussen, uitgaven en uitbetalingen per event en per mentor.</div>
      </div>
      <button class="sr-iconbtn" id="mgRefresh" title="Vernieuwen"><i class="ti ti-refresh"></i></button>
    </div>

    <div class="kpi-strip">
      <div class="kpi"><div class="lbl">Omzet (basis)</div><div class="val">${eur(t.omzet)}</div></div>
      <div class="kpi"><div class="lbl">Bonuspot</div><div class="val">${eur(t.bonuspot)}</div></div>
      <div class="kpi"><div class="lbl">Uitgaven</div><div class="val">${eur(t.uitgaven)}</div></div>
      <div class="kpi ${nettoCls}"><div class="lbl">Netto</div><div class="val">${eur(t.netto)}</div></div>
    </div>

    <h3 class="sec">Per event</h3>
    ${(data.byEvent || []).length === 0
      ? '<div class="empty-state">Nog geen ledger-entries op events.</div>'
      : `<table class="lt">
          <thead><tr>
            <th>Event</th><th>Datum</th>
            <th style="text-align:right">Omzet</th>
            <th style="text-align:right">Bonus</th>
            <th style="text-align:right">Uitgaven</th>
            <th style="text-align:right">Netto</th>
            <th>Per status</th>
          </tr></thead>
          <tbody>${byEventRows}</tbody>
        </table>`}

    <h3 class="sec">Per mentor</h3>
    ${(data.byMentor || []).length === 0
      ? '<div class="empty-state">Nog geen mentoren met ledger-entries.</div>'
      : `<table class="lt">
          <thead><tr>
            <th>Mentor</th><th>E-mail</th>
            <th style="text-align:right">Saldo</th>
            <th style="text-align:right">Mee te nemen</th>
            <th>Per status</th>
          </tr></thead>
          <tbody>${byMentorRows}</tbody>
        </table>`}
  `;
  const ref = document.getElementById('mgRefresh');
  if (ref) ref.addEventListener('click', () => mgLoadOverview());
}
