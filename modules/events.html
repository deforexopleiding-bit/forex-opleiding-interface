<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1400px; }
    .page-head { display:flex; align-items:center; justify-content: space-between; padding-bottom: 14px; border-bottom: 1px solid var(--border); margin-bottom: 18px; gap: 16px; flex-wrap: wrap; }
    .page-head h1 { font-size: 22px; font-weight: 800; letter-spacing: -.3px; }
    .page-head .sub { font-size: 12.5px; color: var(--text-dim); margin-top: 2px; }
    .btn-primary { background: var(--brand-primary, #093d54); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* Fase 1 events-tabs */
    .ev-tabs { padding-bottom: 0; }
    .ev-tab { background: transparent; border: none; padding: 10px 14px; font-size: 13.5px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
    .ev-tab:hover { color: var(--text); }
    .ev-tab.active { color: var(--brand-primary, #093d54); border-bottom-color: var(--brand-primary, #093d54); }

    /* Capacity pill */
    .cap-pill { display:inline-flex; align-items:center; gap:4px; padding:2px 9px; border-radius:12px; font-size:11px; font-weight:600; background: var(--bg-elev-2); color: var(--text-dim); border:1px solid var(--border); }
    .cap-pill.full { background: rgba(220,38,38,0.15); color:#b91c1c; border-color: rgba(220,38,38,0.3); }
    .cap-pill.warn { background: rgba(245,158,11,0.15); color:#b45309; border-color: rgba(245,158,11,0.3); }
    .cap-pill.ok { background: rgba(5,150,105,0.12); color:#059669; border-color: rgba(5,150,105,0.25); }

    /* Status badges */
    .status-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; }
    .status-draft { background: rgba(148,163,184,0.2); color: var(--text-faint); }
    .status-published { background: rgba(5,150,105,0.15); color:#059669; }
    .status-cancelled { background: rgba(220,38,38,0.15); color:#b91c1c; }
    .status-archived { background: rgba(148,163,184,0.2); color: var(--text-faint); opacity:.7; }

    /* Signups-closed badge (Blok 1) */
    .signups-closed-badge { display:inline-block; padding:2px 9px; border-radius:10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; background: rgba(245,158,11,0.18); color:#b45309; border:1px solid rgba(245,158,11,0.3); margin-left: 4px; cursor: help; }

    /* Sync badges (Webflow + GHL) */
    .sync-badges { display:inline-flex; gap:4px; flex-wrap:wrap; }
    .sync-badge { display:inline-flex; align-items:center; gap:3px; padding:2px 7px; border-radius:8px; font-size:10px; font-weight:700; letter-spacing:.03em; cursor: help; }
    .sync-badge.sync-ok      { background: rgba(5,150,105,0.15); color:#059669; border:1px solid rgba(5,150,105,0.25); }
    .sync-badge.sync-fail    { background: rgba(220,38,38,0.15); color:#b91c1c; border:1px solid rgba(220,38,38,0.3); }
    .sync-badge.sync-skip    { background: rgba(245,158,11,0.15); color:#b45309; border:1px solid rgba(245,158,11,0.3); }
    .sync-badge.sync-unpub   { background: rgba(148,163,184,0.2); color: var(--text-faint); border:1px solid var(--border); }
    .sync-badge.sync-none    { background: var(--bg-elev-2); color: var(--text-faint); border:1px solid var(--border); }

    /* Skeleton */
    .skel-row { height: 44px; background: linear-gradient(90deg, var(--bg-elev) 0%, var(--bg-elev-2) 50%, var(--bg-elev) 100%); background-size: 200% 100%; animation: shimmer 1.4s linear infinite; border-radius: 6px; margin-bottom: 6px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .empty-state { padding: 40px 20px; text-align: center; color: var(--text-faint); font-size: 13px; }
    .empty-state .empty-icon { font-size: 32px; margin-bottom: 10px; opacity: .6; }

    .forbidden-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; padding: 32px 28px; max-width: 480px; margin: 40px auto; text-align: center; }
    .forbidden-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .forbidden-card p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; }
    .forbidden-card a { color: var(--brand-secondary-light, #688b9b); text-decoration: none; font-size: 13px; font-weight: 500; }
    .forbidden-card a:hover { text-decoration: underline; }

    @media (max-width: 880px) { .app { margin-left: 0; padding: 14px; } }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app" id="page-content">
  <!-- gevuld door init() -->
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>

<script>
// ── Module-state ─────────────────────────────────────────────────────────────
const VALID_STATUS = ['draft', 'published', 'cancelled', 'archived'];
const STATUS_LABELS = {
  draft: 'Concept',
  published: 'Gepubliceerd',
  cancelled: 'Geannuleerd',
  archived: 'Gearchiveerd',
};

const state = {
  // Filter-state. status=null betekent default ('draft,published' op de API).
  status: null,           // null | 'draft' | 'published' | 'cancelled' | 'archived'
  niveau: null,           // null | slug
  search: '',
  items: [],
  niveauOptions: [],
  loading: false,
};

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (!Number.isFinite(d.getTime())) return '—';
  return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function capPillClass(active, capacity) {
  if (!capacity || capacity <= 0) return 'cap-pill';
  const ratio = active / capacity;
  if (active >= capacity) return 'cap-pill full';
  if (ratio >= 0.8) return 'cap-pill warn';
  return 'cap-pill ok';
}

// ── Sync-badge mapping ───────────────────────────────────────────────────────
//
// Webflow status: success | failure | unpublished | null
// GHL status    : success | failure | skipped_graceful | null
//
// renderSyncBadge returnt 1 badge HTML met label + tooltip (last_synced_at).
function renderSyncBadge(target, status, lastSyncedAt) {
  const labelPrefix = target === 'webflow' ? 'WF' : 'GHL';
  let cls = 'sync-none';
  let label = '-';
  if (status === 'success') { cls = 'sync-ok';   label = `${labelPrefix} OK`; }
  else if (status === 'failure') { cls = 'sync-fail'; label = `${labelPrefix} FAIL`; }
  else if (status === 'skipped_graceful') { cls = 'sync-skip'; label = `${labelPrefix} SKIP`; }
  else if (status === 'unpublished') { cls = 'sync-unpub'; label = `${labelPrefix} UNPUB`; }

  const tooltipParts = [];
  tooltipParts.push(target === 'webflow' ? 'Webflow' : 'GoHighLevel');
  tooltipParts.push('status: ' + (status || 'nog niet gesynct'));
  if (lastSyncedAt) tooltipParts.push('laatst: ' + fmtDate(lastSyncedAt));
  const tooltip = tooltipParts.join(' | ');

  return `<span class="sync-badge ${cls}" title="${esc(tooltip)}">${esc(label)}</span>`;
}

function renderSyncCell(ev) {
  return `<span class="sync-badges">
    ${renderSyncBadge('webflow', ev.webflow_sync_status, ev.webflow_last_synced_at)}
    ${renderSyncBadge('ghl', ev.ghl_sync_status, ev.ghl_last_synced_at)}
  </span>`;
}

// ── Signups-closed badge (Blok 1) ────────────────────────────────────────────
//
// Toont een kleine pill "Aanmelding gesloten" achter de status-badge zodra
// `signups_closed=true`. Tooltip-tekst hangt af van `signups_closed_reason`:
//   - 'auto_time'     → Automatisch gesloten (T-1 dag)
//   - 'auto_full'     → Automatisch gesloten (vol)
//   - 'auto_deadline' → Automatisch gesloten (deadline)
//   - 'manual'        → Handmatig gesloten
//   - andere/leeg     → generieke tekst
//
// Bevat ook timestamp uit `signups_closed_at` als die meegegeven wordt.
const SIGNUPS_CLOSED_REASON_LABEL = {
  auto_time: 'Automatisch gesloten (T-1 dag)',
  auto_full: 'Automatisch gesloten (vol)',
  auto_deadline: 'Automatisch gesloten (deadline)',
  manual: 'Handmatig gesloten',
};

function renderSignupsClosedBadge(ev) {
  if (!ev || ev.signups_closed !== true) return '';
  const reason = ev.signups_closed_reason || '';
  const reasonLabel = SIGNUPS_CLOSED_REASON_LABEL[reason] || 'Aanmelding gesloten';
  const parts = [reasonLabel];
  if (ev.signups_closed_at) parts.push('sinds ' + fmtDate(ev.signups_closed_at));
  const tooltip = parts.join(' | ');
  return `<span class="signups-closed-badge" title="${esc(tooltip)}">Aanmelding gesloten</span>`;
}

// ── Render ───────────────────────────────────────────────────────────────────

function renderForbidden() {
  document.getElementById('page-content').innerHTML = `
    <div class="forbidden-card">
      <h2>Geen toegang</h2>
      <p>Je hebt geen rechten om de Events-module te bekijken.</p>
      <a href="/index.html">&larr; Terug naar dashboard</a>
    </div>
  `;
}

function renderPage(canCreate, canViewInbox, canManageSignupInbox) {
  // Fase 1 events-inbox: tabbar boven de filter-strip. Inbox-tab alleen
  // zichtbaar bij events.inbox.view permissie. Default tab = 'overzicht'
  // zodat bestaand gedrag onveranderd is.
  const inboxTabBtn = canViewInbox
    ? '<button class="ev-tab" data-evtab="inbox"><i class="ti ti-inbox"></i> Inbox</button>'
    : '';
  // Inschrijvingen-inbox tab: alleen zichtbaar bij events.attendee.create
  // (zelfde gate als de onderliggende -list / -resolve endpoints).
  const signupInboxTabBtn = canManageSignupInbox
    ? '<button class="ev-tab" data-evtab="signup-inbox"><i class="ti ti-clipboard-list"></i> Inschrijvingen-inbox <span id="evSignupInboxBadge" style="display:none;background:rgba(245,158,11,0.18);color:#b45309;border-radius:10px;padding:1px 7px;font-size:10.5px;font-weight:700;margin-left:4px">0</span></button>'
    : '';
  document.getElementById('page-content').innerHTML = `
    <div class="page-head">
      <div>
        <h1>Events</h1>
        <div class="sub">Workshops, live trainingen en mentor-sessies.</div>
      </div>
      ${canCreate ? '<a class="btn-primary" href="/modules/events-wizard.html"><i class="ti ti-plus"></i> Nieuw event</a>' : ''}
    </div>

    <div class="ev-tabs" style="display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--border)">
      <button class="ev-tab active" data-evtab="overzicht"><i class="ti ti-list"></i> Overzicht</button>
      ${inboxTabBtn}
      ${signupInboxTabBtn}
    </div>

    <div id="ev-pane-overzicht">
      <div class="sr-filterstrip" style="margin-bottom:14px">
        <div class="sr-search"><input id="evSearch" type="search" placeholder="Zoek titel of locatie…" /></div>
        <select class="sr-select" id="evNiveau">
          <option value="">Alle niveaus</option>
        </select>
        <button class="sr-iconbtn sr-spacer" id="evRefresh" title="Vernieuwen"><i class="ti ti-refresh"></i></button>
      </div>

      <div class="sr-segments" id="evSegments" style="margin-bottom:14px">
        <button class="sr-seg active" data-status="">Alle</button>
        <button class="sr-seg" data-status="draft">Concept</button>
        <button class="sr-seg" data-status="published">Gepubliceerd</button>
        <button class="sr-seg" data-status="cancelled">Geannuleerd</button>
        <button class="sr-seg" data-status="archived">Gearchiveerd</button>
      </div>

      <div id="eventsList">
        <div class="skel-row"></div>
        <div class="skel-row"></div>
        <div class="skel-row"></div>
      </div>
    </div>

    <div id="ev-pane-inbox" style="display:none">
      <div id="evInboxListPane">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:12.5px;color:var(--text-dim)">Inbound WhatsApp-conversaties op de events-lijn. Klik een rij om te openen en met Simone te beantwoorden.</div>
          <button class="sr-iconbtn" id="evInboxRefresh" title="Vernieuwen"><i class="ti ti-refresh"></i></button>
        </div>
        <div id="eventsInboxList">
          <div class="skel-row"></div>
          <div class="skel-row"></div>
        </div>
      </div>

      <!-- Thread-view (verborgen tot een conv geopend wordt) -->
      <div id="evThreadPane" style="display:none">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
          <button class="sr-iconbtn" id="evThreadBack" title="Terug naar lijst"><i class="ti ti-arrow-left"></i></button>
          <div style="flex:1;min-width:0">
            <div id="evThreadName" style="font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
            <div id="evThreadPhone" style="font-size:11.5px;color:var(--text-faint)">—</div>
          </div>
          <span id="evThreadWindowBadge" style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em">—</span>
        </div>

        <div id="evThreadMessages" style="height:42vh;min-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:10px;padding:12px;background:var(--bg-elev-1);display:flex;flex-direction:column;gap:8px">
          <div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Laden…</div>
        </div>

        <!-- Simone suggestion-paneel -->
        <div id="evSimoneSuggestionPanel" style="margin-top:14px"></div>

        <!-- Compose-rij -->
        <div style="margin-top:12px;display:flex;gap:8px;align-items:flex-start">
          <button class="btn-primary" id="evAskSimoneBtn" type="button" style="background:#7c3aed;white-space:nowrap" title="Vraag Simone om een suggestie">
            <i class="ti ti-sparkles"></i> Vraag Simone
          </button>
          <textarea id="evComposeTextarea" placeholder="Typ een vrij bericht…" style="flex:1;min-height:62px;max-height:140px;font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);resize:vertical"></textarea>
          <button class="btn-primary" id="evComposeSendBtn" type="button" title="Versturen">
            <i class="ti ti-send"></i> Versturen
          </button>
        </div>
        <div id="evThreadHint" style="font-size:11.5px;color:var(--text-faint);margin-top:4px"></div>
      </div>
    </div>

    <!-- Inschrijvingen-inbox (stap 1) — review-scherm voor event_signup_inbox -->
    <div id="ev-pane-signup-inbox" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap">
        <div style="font-size:12.5px;color:var(--text-dim);max-width:680px">
          GHL form-submissions die niet automatisch aan een event gekoppeld konden worden.
          Open een rij om handmatig het juiste event te kiezen — de deelnemer wordt dan
          alsnog aangemaakt + de zaalcapaciteit bijgewerkt.
        </div>
        <button class="sr-iconbtn" id="evSignupInboxRefresh" title="Vernieuwen"><i class="ti ti-refresh"></i></button>
      </div>
      <div class="sr-segments" id="evSignupInboxFilters" style="margin-bottom:12px;display:flex;gap:6px;flex-wrap:wrap">
        <button class="sr-seg active" data-sistatus="todo">Te reviewen <span data-cnt="todo" style="margin-left:4px;opacity:0.7"></span></button>
        <button class="sr-seg" data-sistatus="no_match">No match <span data-cnt="no_match" style="margin-left:4px;opacity:0.7"></span></button>
        <button class="sr-seg" data-sistatus="ambiguous">Ambiguous <span data-cnt="ambiguous" style="margin-left:4px;opacity:0.7"></span></button>
        <button class="sr-seg" data-sistatus="matched">Matched <span data-cnt="matched" style="margin-left:4px;opacity:0.7"></span></button>
        <button class="sr-seg" data-sistatus="invalid_payload">Invalid <span data-cnt="invalid_payload" style="margin-left:4px;opacity:0.7"></span></button>
        <button class="sr-seg" data-sistatus="all">Alle <span data-cnt="all" style="margin-left:4px;opacity:0.7"></span></button>
      </div>
      <div id="evSignupInboxList">
        <div class="skel-row"></div>
        <div class="skel-row"></div>
      </div>
    </div>

    <!-- Resolve-modal: event-picker per inbox-rij -->
    <div id="evSignupResolveModal" class="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;align-items:center;justify-content:center;padding:24px">
      <div class="modal-card" style="background:var(--bg);border:1px solid var(--border);border-radius:12px;max-width:560px;width:100%;padding:20px;max-height:88vh;overflow-y:auto">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <div style="font-size:15px;font-weight:700">Inschrijving koppelen aan event</div>
          <button class="sr-iconbtn" id="evSignupResolveCancel" type="button" title="Sluiten"><i class="ti ti-x"></i></button>
        </div>
        <div id="evSignupResolveContext" style="font-size:12.5px;color:var(--text-dim);background:var(--bg-elev-2);border-radius:8px;padding:10px 12px;margin-bottom:14px"></div>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Kies gepubliceerd event</label>
        <select id="evSignupResolveEventPicker" style="width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13.5px;margin-bottom:12px">
          <option value="">— Laden…</option>
        </select>
        <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px">Notitie (optioneel)</label>
        <textarea id="evSignupResolveNotes" placeholder="Korte notitie voor de audit-trail…" maxlength="1000" style="width:100%;min-height:62px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:13px;resize:vertical"></textarea>
        <div id="evSignupResolveError" style="display:none;margin-top:10px;padding:8px 10px;background:rgba(220,38,38,0.12);color:#b91c1c;border:1px solid rgba(220,38,38,0.3);border-radius:8px;font-size:12.5px"></div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
          <button class="sr-btn" id="evSignupResolveCancel2" type="button" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer">Annuleer</button>
          <button class="btn-primary" id="evSignupResolveSubmit" type="button"><i class="ti ti-check"></i> Koppel + maak deelnemer</button>
        </div>
      </div>
    </div>
  `;

  // Tab-switch wiring
  const tabBtns = document.querySelectorAll('.ev-tab');
  const paneOverview    = document.getElementById('ev-pane-overzicht');
  const paneInbox       = document.getElementById('ev-pane-inbox');
  const paneSignupInbox = document.getElementById('ev-pane-signup-inbox');
  tabBtns.forEach(b => b.addEventListener('click', () => {
    const which = b.getAttribute('data-evtab');
    tabBtns.forEach(x => x.classList.toggle('active', x === b));
    if (which === 'overzicht') {
      paneOverview.style.display = '';
      paneInbox.style.display = 'none';
      if (paneSignupInbox) paneSignupInbox.style.display = 'none';
    } else if (which === 'inbox') {
      paneOverview.style.display = 'none';
      paneInbox.style.display = '';
      if (paneSignupInbox) paneSignupInbox.style.display = 'none';
      loadEventsInbox();
    } else if (which === 'signup-inbox') {
      paneOverview.style.display = 'none';
      paneInbox.style.display = 'none';
      if (paneSignupInbox) paneSignupInbox.style.display = '';
      loadSignupInbox();
    }
  }));
  const inboxRefresh = document.getElementById('evInboxRefresh');
  if (inboxRefresh) inboxRefresh.addEventListener('click', () => loadEventsInbox());

  // Inschrijvingen-inbox wiring
  const siRefresh = document.getElementById('evSignupInboxRefresh');
  if (siRefresh) siRefresh.addEventListener('click', () => loadSignupInbox());
  const siFilters = document.querySelectorAll('#evSignupInboxFilters .sr-seg');
  siFilters.forEach((seg) => {
    seg.addEventListener('click', () => {
      siFilters.forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      _siState.filter = seg.dataset.sistatus || 'todo';
      loadSignupInbox();
    });
  });
  const siCancel  = document.getElementById('evSignupResolveCancel');
  const siCancel2 = document.getElementById('evSignupResolveCancel2');
  const siSubmit  = document.getElementById('evSignupResolveSubmit');
  if (siCancel)  siCancel.addEventListener('click', () => closeSignupResolveModal());
  if (siCancel2) siCancel2.addEventListener('click', () => closeSignupResolveModal());
  if (siSubmit)  siSubmit.addEventListener('click', () => submitSignupResolve());

  // Fase 2 stap 2c — thread-view wiring
  const backBtn = document.getElementById('evThreadBack');
  if (backBtn) backBtn.addEventListener('click', () => _evShowListView());
  const askBtn = document.getElementById('evAskSimoneBtn');
  if (askBtn) askBtn.addEventListener('click', () => askSimone());
  const composeSendBtn = document.getElementById('evComposeSendBtn');
  if (composeSendBtn) composeSendBtn.addEventListener('click', () => sendComposeText());
  // Disable Simone-knop als user geen events.simone.use heeft (RBAC client-gate;
  // server doet de echte check). super_admin krijgt 'm via permission-RPC.
  if (askBtn && window.RBAC && typeof window.RBAC.can === 'function') {
    window.RBAC.can('events.simone.use').then((ok) => {
      if (!ok) { askBtn.disabled = true; askBtn.title = 'Geen rechten (events.simone.use)'; askBtn.style.opacity = 0.4; }
    }).catch(() => {});
  }

  // Wire filters
  document.getElementById('evSearch').addEventListener('input', debounce((e) => {
    state.search = e.target.value.trim();
    loadEvents();
  }, 300));
  document.getElementById('evNiveau').addEventListener('change', (e) => {
    state.niveau = e.target.value || null;
    loadEvents();
  });
  document.getElementById('evRefresh').addEventListener('click', () => loadEvents());
  document.querySelectorAll('#evSegments .sr-seg').forEach((seg) => {
    seg.addEventListener('click', () => {
      document.querySelectorAll('#evSegments .sr-seg').forEach((s) => s.classList.remove('active'));
      seg.classList.add('active');
      state.status = seg.dataset.status || null;
      loadEvents();
    });
  });
}

function renderNiveauOptions() {

  sel.innerHTML = '<option value="">Alle niveaus</option>' +
    state.niveauOptions.map((o) => `<option value="${esc(o.slug)}">${esc(o.label || o.slug)}</option>`).join('');

}

      </tr></thead>

        const cap = ev.capacity || 0;
        const active = ev.attendee_count_active || 0;

            <td><span class="status-badge status-${ev.status}">${esc(STATUS_LABELS[ev.status] || ev.status)}</span>${renderSignupsClosedBadge(ev)}</td>
            <td>${renderSyncCell(ev)}</td>
            <td class="sr-actions"><a class="sr-ibtn" href="${esc(href)}" title="Open detail"><i class="ti ti-arrow-right"></i></a></td>

}

// ── Fetch ────────────────────────────────────────────────────────────────────

async function loadNiveauOptions() {
  try {
    const res = await window.AgentShared.apiFetch('/api/events-niveau-options');
    if (!res.ok) return;
    const data = await res.json();
    state.niveauOptions = data.options || [];
    renderNiveauOptions();
  } catch (e) {
    console.warn('[events] niveau-options laden mislukt:', e.message);
  }
}

async function loadEvents() {
  state.loading = true;
  renderList();
  try {
    const params = new URLSearchParams();
    if (state.status) params.set('status', state.status);
    if (state.niveau) params.set('niveau', state.niveau);
    if (state.search) params.set('q', state.search);
    params.set('limit', '100');
    const res = await window.AgentShared.apiFetch('/api/events-list?' + params.toString());
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    state.items = data.items || [];
  } catch (e) {
    console.error('[events] load error:', e);
    window.AgentShared?.showToast?.('Events laden mislukt: ' + e.message, 'error');
    state.items = [];
  } finally {
    state.loading = false;
    renderList();
  }
}

// ── Util ─────────────────────────────────────────────────────────────────────

function debounce(fn, ms) {
  let t = null;
  return function (...args) {
    if (t) clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ── Init ─────────────────────────────────────────────────────────────────────

async function init() {
  await window._authSharedReady;
  const profile = await window.AuthShared.requireAuth();
  if (!profile) return;
  if (window.AgentShared) await window.AgentShared.renderUserSection(profile);

  await window.RBAC.ensurePermissionsLoaded();
  if (!window.RBAC.canSync('events.module.access')) {
    renderForbidden();
    return;
  }

  const canCreate         = window.RBAC.canSync('events.event.create');
  const canViewInbox      = window.RBAC.canSync('events.inbox.view');
  const canManageSignupInbox = window.RBAC.canSync('events.attendee.create');
  renderPage(canCreate, canViewInbox, canManageSignupInbox);
  await Promise.all([loadNiveauOptions(), loadEvents()]);
}

// ── Fase 1: events-inbox (read-only) ─────────────────────────────────────────
// Hergebruikt /api/inbox-conversations-list met ?module=events. Filtert
// daar op de events-phone_number_id uit whatsapp_module_config. Geen
// reply-functionaliteit in deze fase; volledige thread-view + send
// volgt zodra Simone er is (Fase 2).
async function loadEventsInbox() {
  const list = document.getElementById('eventsInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-conversations-list?module=events&limit=100');
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(j.error || ('HTTP ' + r.status)) + '</div></div>';
      return;
    }
    const j = await r.json();
    if (!j.configured) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-plug-connected-x"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Events-lijn nog niet geconfigureerd</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">' + esc(j.warning || 'Maak een rij aan in whatsapp_module_config met module=\'events\' en is_active=true.') + '</div>'
        + '</div>';
      return;
    }
    const items = Array.isArray(j.items) ? j.items : [];
    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
        + '<div class="empty-icon"><i class="ti ti-inbox"></i></div>'
        + '<div style="font-size:14px;font-weight:600;margin-top:6px">Nog geen events-conversaties</div>'
        + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Inbound op de events-WhatsApp-lijn verschijnt hier.</div>'
        + '</div>';
      return;
    }
    list.innerHTML = '<div class="sr-tablewrap"><table class="sr-table">'
      + '<thead><tr><th>Telefoon</th><th>Naam</th><th>Klant</th><th>Laatste bericht</th><th style="text-align:right">Tijd</th><th style="text-align:right">Ongelezen</th></tr></thead>'
      + '<tbody>'
      + items.map(it => {
          const preview = (it.last_message_preview || '').slice(0, 80);
          const unread = it.unread_count > 0
            ? '<span style="background:rgba(220,38,38,0.15);color:#b91c1c;border-radius:10px;padding:2px 8px;font-size:11px;font-weight:600">' + it.unread_count + '</span>'
            : '<span style="color:var(--text-faint);font-size:11px">—</span>';
          // Fix over-escape: bij geen koppeling renderen we de <i>-tag direct
          // (geen esc() over HTML). Bij wel-koppeling esc()-en we de klantnaam.
          const klantCell = it.customer_name
            ? esc(it.customer_name)
            : '<i style="color:var(--text-faint)">geen koppeling</i>';
          return '<tr style="cursor:pointer" data-conv-id="' + esc(it.id) + '"'
            + ' data-phone="' + esc(it.phone_number || '') + '"'
            + ' data-display="' + esc(it.display_name || '') + '"'
            + ' data-customer="' + esc(it.customer_name || '') + '">'
            + '<td><code style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px">' + esc(it.phone_number) + '</code></td>'
            + '<td>' + esc(it.display_name || '—') + '</td>'
            + '<td>' + klantCell + '</td>'
            + '<td style="max-width:380px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + esc(preview) + '</td>'
            + '<td style="text-align:right;font-size:11.5px;color:var(--text-dim)">' + esc(fmtDate(it.last_message_at)) + '</td>'
            + '<td style="text-align:right">' + unread + '</td>'
            + '</tr>';
        }).join('')
      + '</tbody></table></div>';
    // Row-click → open conv-thread view
    list.querySelectorAll('tr[data-conv-id]').forEach((row) => {
      row.addEventListener('click', () => openEventsConv({
        id:          row.dataset.convId,
        phone:       row.dataset.phone || '',

// ── Fase 2 stap 2c: events thread + Simone interactie ────────────────────────
const _evState = { convId: null, conv: null, canSendText: false, suggestion: null };

function _evShowThreadView() {
  document.getElementById('evInboxListPane').style.display = 'none';
  document.getElementById('evThreadPane').style.display   = '';
}
function _evShowListView() {
  document.getElementById('evInboxListPane').style.display = '';
  document.getElementById('evThreadPane').style.display    = 'none';
  _evState.convId = null;
  _evState.conv = null;
  _evState.suggestion = null;
}

async function openEventsConv({ id, phone, displayName, customer }) {
  if (!id) return;
  _evState.convId = id;
  _evShowThreadView();

  // Pre-fill header met data uit list-rij voor snappy switch
  document.getElementById('evThreadName').textContent  = customer || displayName || phone || 'Onbekend';
  document.getElementById('evThreadPhone').textContent = phone || '—';
  const badge = document.getElementById('evThreadWindowBadge');
  badge.textContent = '…';
  badge.style.background = 'var(--bg-elev-2)';
  badge.style.color = 'var(--text-dim)';
  document.getElementById('evThreadMessages').innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Laden…</div>';
  document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
  document.getElementById('evComposeTextarea').value = '';
  document.getElementById('evThreadHint').textContent = '';

  // Messages laden
  try {
    const params = new URLSearchParams({ conversation_id: id, limit: '200', mark_as_read: 'true' });
    const r = await window.AgentShared.apiFetch('/api/inbox-messages-list?' + params.toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      document.getElementById('evThreadMessages').innerHTML =
        '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</div>';
      return;
    }
    _evState.conv = d.conversation || null;
    _evState.canSendText = !!(d.conversation && d.conversation.can_send_text);
    _renderEvThread(d.items || [], d.conversation || null);
    _applyEvComposeState();
    // Refresh list-tab badges (unread reset)
    loadEventsInbox();
    // Laatste PROPOSED suggestie tonen
    loadLatestEventsSuggestion(id);
  } catch (e) {
    document.getElementById('evThreadMessages').innerHTML =
      '<div style="color:#ef4444;font-size:12px;padding:14px">Fout: ' + esc(e.message) + '</div>';
  }
}

function _renderEvThread(items, conv) {
  const wrap = document.getElementById('evThreadMessages');
  if (!wrap) return;
  if (!items || items.length === 0) {
    wrap.innerHTML = '<div style="color:var(--text-faint);font-size:12px;text-align:center;padding:20px">Nog geen berichten in deze conversatie.</div>';
  } else {
    wrap.innerHTML = items.map((m) => {
      const inbound = m.direction === 'in';
      const align = inbound ? 'flex-start' : 'flex-end';
      const bg    = inbound ? 'var(--bg-elev-2)' : '#093d54';
      const color = inbound ? 'var(--text)' : '#ffffff';
      const time  = m.created_at ? fmtDate(m.created_at) : '';
      const body  = String(m.body || (m.template_name ? '[template:' + m.template_name + ']' : '[media]'));
      return '<div style="display:flex;justify-content:' + align + '">'
        + '<div style="max-width:70%;background:' + bg + ';color:' + color + ';padding:7px 11px;border-radius:10px;font-size:13px;line-height:1.4">'
        + '<div style="white-space:pre-wrap;word-wrap:break-word">' + esc(body) + '</div>'
        + '<div style="font-size:10px;opacity:0.65;margin-top:3px;text-align:right">' + esc(time) + '</div>'
        + '</div></div>';
    }).join('');
  }
  // Auto-scroll naar onderkant
  wrap.scrollTop = wrap.scrollHeight;

  // Window-badge
  const badge = document.getElementById('evThreadWindowBadge');
  if (_evState.canSendText) {
    badge.textContent = '24h open';
    badge.style.background = 'rgba(5,150,105,0.15)';
    badge.style.color = '#059669';
    badge.title = '24h-servicewindow nog open — vrije tekst toegestaan';
  } else {
    badge.textContent = '24h verlopen';
    badge.style.background = 'rgba(245,158,11,0.18)';
    badge.style.color = '#b45309';
    badge.title = 'Servicewindow verlopen — alleen templates';
  }
}

function _applyEvComposeState() {
  const ta = document.getElementById('evComposeTextarea');
  const sendBtn = document.getElementById('evComposeSendBtn');
  const hint = document.getElementById('evThreadHint');
  if (_evState.canSendText) {
    if (ta) { ta.disabled = false; ta.placeholder = 'Typ een vrij bericht…'; }
    if (sendBtn) { sendBtn.disabled = false; sendBtn.title = 'Versturen'; }
    if (hint) hint.textContent = '';
  } else {
    if (ta) { ta.disabled = true; ta.placeholder = '24h-window verlopen — alleen templates (later)'; }
    if (sendBtn) { sendBtn.disabled = true; sendBtn.title = '24h-window verlopen'; }
    if (hint) hint.textContent = '24h-window verlopen sinds laatste inbound — vrije tekst niet meer toegestaan.';
  }
}

async function loadLatestEventsSuggestion(convId) {
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-suggestions-recent?' +
      new URLSearchParams({ module: 'events', conversation_id: convId, max_age_minutes: '60' }).toString());
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      _renderEvSuggestionPanel(null, d.error || ('HTTP ' + r.status));
      return;
    }
    _evState.suggestion = d.suggestion || null;
    _renderEvSuggestionPanel(_evState.suggestion, null);
  } catch (e) {
    _renderEvSuggestionPanel(null, e.message);
  }
}

function _renderEvSuggestionPanel(sugg, errMsg) {
  const wrap = document.getElementById('evSimoneSuggestionPanel');
  if (!wrap) return;
  if (errMsg) {
    wrap.innerHTML = '<div style="color:#b45309;font-size:12px;background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:8px;padding:8px 10px">Suggestie laden mislukt: ' + esc(errMsg) + '</div>';
    return;
  }
  if (!sugg) { wrap.innerHTML = ''; return; }
  const auto = sugg.auto_triggered ? '<span style="background:#7c3aed;color:#fff;font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:8px;letter-spacing:.04em">AUTO</span>' : '';
  const conf = (typeof sugg.confidence === 'number') ? (Math.round(sugg.confidence * 100) + '%') : '—';
  wrap.innerHTML =
    '<div style="border:1px solid #7c3aed;border-radius:10px;background:rgba(124,58,237,0.05);padding:12px">'
    + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
    + '<i class="ti ti-sparkles" style="color:#7c3aed"></i>'
    + '<span style="font-weight:700;font-size:12.5px;color:#7c3aed">Simone-suggestie</span>'
    + auto
    + '<span style="font-size:11px;color:var(--text-dim);margin-left:auto">intent: ' + esc(sugg.detected_intent || '?') + ' · ' + conf + '</span>'
    + '</div>'
    + '<textarea id="evSuggText" style="width:100%;min-height:78px;font-family:inherit;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);resize:vertical">' + esc(sugg.suggested_reply || '') + '</textarea>'
    + (sugg.reasoning ? '<div style="font-size:11px;color:var(--text-dim);margin-top:6px;font-style:italic">Reasoning: ' + esc(sugg.reasoning) + '</div>' : '')
    + '<div style="display:flex;gap:8px;margin-top:10px">'
    + '<button class="btn-primary" id="evSuggSendBtn" type="button"><i class="ti ti-send"></i> Versturen</button>'
    + '<button class="sr-btn" id="evSuggDismissBtn" type="button" style="background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 12px;border-radius:8px;font-size:12.5px;cursor:pointer">Afwijzen</button>'
    + '</div>'
    + '</div>';
  // Wire actions
  const sendBtn = document.getElementById('evSuggSendBtn');
  const dismissBtn = document.getElementById('evSuggDismissBtn');
  if (sendBtn) sendBtn.addEventListener('click', () => sendSuggestion(sugg));
  if (dismissBtn) dismissBtn.addEventListener('click', () => dismissSuggestion(sugg));
}

async function askSimone() {
  const convId = _evState.convId;
  if (!convId) return;
  const btn = document.getElementById('evAskSimoneBtn');
  if (btn) { btn.disabled = true; btn.textContent = '…Simone denkt na'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/simone-suggest', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      window.AgentShared.showToast(d.error || ('HTTP ' + r.status), 'error');
      return;
    }
    // Force reload latest suggestion (krijgt de net-gemaakte rij terug)
    await loadLatestEventsSuggestion(convId);
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = '<i class="ti ti-sparkles"></i> Vraag Simone'; }
  }
}

async function sendSuggestion(sugg) {
  const convId = _evState.convId;
  if (!convId || !sugg) return;
  if (!_evState.canSendText) {
    window.AgentShared.showToast('24h-window verlopen — vrij bericht niet meer toegestaan', 'error');
    return;
  }
  const ta = document.getElementById('evSuggText');
  const finalText = ta ? String(ta.value || '').trim() : (sugg.suggested_reply || '').trim();
  if (!finalText) { window.AgentShared.showToast('Bericht is leeg', 'error'); return; }
  const wasEdited = (finalText !== String(sugg.suggested_reply || '').trim());
  const btn = document.getElementById('evSuggSendBtn');
  if (btn) btn.disabled = true;
  try {
    const sr = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: finalText }),
    });
    const sd = await sr.json().catch(() => ({}));
    if (!sr.ok) {
      window.AgentShared.showToast(sd.error || ('HTTP ' + sr.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    // Mark outcome (fail-soft: send-success is leidend)
    await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        suggestion_id:   sugg.id,
        status:          wasEdited ? 'USED_EDITED' : 'USED_AS_IS',
        final_sent_text: finalText,
      }),
    }).catch(() => {});
    window.AgentShared.showToast(wasEdited ? 'Aangepast bericht verstuurd' : 'Suggestie verstuurd', 'success');
    _evState.suggestion = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
    // Thread refreshen
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

async function dismissSuggestion(sugg) {
  if (!sugg) return;
  const btn = document.getElementById('evSuggDismissBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-mark-outcome', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ suggestion_id: sugg.id, status: 'DISMISSED' }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      window.AgentShared.showToast(d.error || ('HTTP ' + r.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    window.AgentShared.showToast('Suggestie afgewezen', 'success');
    _evState.suggestion = null;
    document.getElementById('evSimoneSuggestionPanel').innerHTML = '';
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

async function sendComposeText() {
  const convId = _evState.convId;
  if (!convId) return;
  const ta = document.getElementById('evComposeTextarea');
  const text = ta ? String(ta.value || '').trim() : '';
  if (!text) { window.AgentShared.showToast('Bericht is leeg', 'error'); return; }
  const btn = document.getElementById('evComposeSendBtn');
  if (btn) btn.disabled = true;
  try {
    const r = await window.AgentShared.apiFetch('/api/inbox-send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ conversation_id: convId, mode: 'text', body: text }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      window.AgentShared.showToast(d.error || ('HTTP ' + r.status), 'error');
      if (btn) btn.disabled = false;
      return;
    }
    window.AgentShared.showToast('Bericht verstuurd', 'success');
    if (ta) ta.value = '';
    // Reload thread
    openEventsConv({ id: convId, phone: _evState.conv?.phone_number || '', displayName: _evState.conv?.display_name || '', customer: _evState.conv?.customer_name || '' });
  } catch (e) {
    window.AgentShared.showToast(e.message, 'error');
    if (btn) btn.disabled = false;
  }
}

// ── Stap 1: Inschrijvingen-inbox (events.attendee.create) ───────────────────
const _siState = { filter: 'todo', counts: null, activeRow: null, eventsCache: null };

async function loadSignupInbox() {
  const list = document.getElementById('evSignupInboxList');
  if (!list) return;
  list.innerHTML = '<div class="skel-row"></div><div class="skel-row"></div>';
  try {
    // 'todo' = no_match + ambiguous: 2 calls + merge (server ondersteunt 1 status
    // per call). Voor de andere filters 1 directe call.
    let rows = [];
    let counts = null;
    if (_siState.filter === 'todo') {
      const [a, b] = await Promise.all([
        _siFetchList({ status: 'no_match',  limit: 200 }),
        _siFetchList({ status: 'ambiguous', limit: 200 }),
      ]);
      if (a.error || b.error) throw new Error(a.error || b.error);
      rows = [...(a.rows || []), ...(b.rows || [])]
        .sort((x, y) => String(y.received_at).localeCompare(String(x.received_at)));
      counts = a.counts || b.counts || null;
    } else if (_siState.filter === 'all') {
      const r = await _siFetchList({ limit: 200 });
      if (r.error) throw new Error(r.error);
      rows = r.rows || [];
      counts = r.counts || null;
    } else {
      const r = await _siFetchList({ status: _siState.filter, limit: 200 });
      if (r.error) throw new Error(r.error);
      rows = r.rows || [];
      counts = r.counts || null;
    }
    _siState.counts = counts;
    _siRenderCounts(counts);
    _siUpdateBadge(counts);
    _siRenderRows(rows);
  } catch (e) {
    list.innerHTML = '<div class="empty-state"><div style="color:#b91c1c;font-size:13px">Fout: ' + esc(e.message) + '</div></div>';
  }
}

async function _siFetchList({ status, limit }) {
  const params = new URLSearchParams();
  if (status) params.set('status', status);
  if (limit)  params.set('limit',  String(limit));
  const r = await window.AgentShared.apiFetch('/api/events-signup-inbox-list?' + params.toString());
  const d = await r.json().catch(() => ({}));
  if (!r.ok) return { error: d.error || ('HTTP ' + r.status) };
  return d;
}

function _siRenderCounts(counts) {
  if (!counts) return;
  const todoCount = (counts.no_match || 0) + (counts.ambiguous || 0);
  const setCnt = (key, val) => {
    document.querySelectorAll('#evSignupInboxFilters [data-cnt="' + key + '"]').forEach((s) => {
      s.textContent = '(' + (val || 0) + ')';
    });
  };
  setCnt('todo',            todoCount);
  setCnt('no_match',        counts.no_match);
  setCnt('ambiguous',       counts.ambiguous);
  setCnt('matched',         counts.matched);
  setCnt('invalid_payload', counts.invalid_payload);
  setCnt('all',             counts.total);
}

function _siUpdateBadge(counts) {
  const badge = document.getElementById('evSignupInboxBadge');
  if (!badge || !counts) return;
  const n = (counts.no_match || 0) + (counts.ambiguous || 0);
  if (n > 0) { badge.textContent = String(n); badge.style.display = ''; }
  else       { badge.style.display = 'none'; }
}

function _siStatusBadge(status) {
  const palette = {
    matched         : { bg: 'rgba(5,150,105,0.15)',  c: '#059669' },
    no_match        : { bg: 'rgba(220,38,38,0.15)',  c: '#b91c1c' },
    ambiguous       : { bg: 'rgba(245,158,11,0.18)', c: '#b45309' },
    invalid_payload : { bg: 'rgba(148,163,184,0.2)', c: 'var(--text-faint)' },
  };
  const p = palette[status] || palette.invalid_payload;
  return '<span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;background:' + p.bg + ';color:' + p.c + '">' + esc(status) + '</span>';
}

function _siRenderRows(rows) {
  const list = document.getElementById('evSignupInboxList');
  if (!list) return;
  if (!rows || rows.length === 0) {
    list.innerHTML = '<div class="empty-state" style="padding:24px;text-align:center">'
      + '<div class="empty-icon"><i class="ti ti-clipboard-check"></i></div>'
      + '<div style="font-size:14px;font-weight:600;margin-top:6px">Niets te reviewen</div>'
      + '<div style="font-size:12.5px;color:var(--text-dim);margin-top:4px">Geen openstaande GHL-signups in deze filter.</div>'
      + '</div>';
    return;
  }
  list.innerHTML = '<div class="sr-tablewrap"><table class="sr-table">'
    + '<thead><tr><th>Naam</th><th>Email / Telefoon</th><th>Event-label</th><th>Status</th><th>Ontvangen</th><th style="text-align:right">Actie</th></tr></thead>'
    + '<tbody>'
    + rows.map((r) => {
        const naam   = [r.first_name, r.last_name].filter(Boolean).join(' ').trim() || '—';
        const email  = r.email ? esc(r.email) : '<span style="color:var(--text-faint)">geen email</span>';
        const phone  = r.phone ? esc(r.phone) : '';
        const label  = r.event_date_label || '<span style="color:var(--text-faint)">geen label</span>';
        const status = _siStatusBadge(r.match_status);
        const cands  = Array.isArray(r.match_candidate_ids) && r.match_candidate_ids.length > 0
          ? '<div style="font-size:11px;color:var(--text-faint);margin-top:3px">' + r.match_candidate_ids.length + ' kandidaten</div>'
          : '';
        const matchedEvt = r.matched_event
          ? '<div style="font-size:11px;color:var(--text-faint);margin-top:3px">→ ' + esc(r.matched_event.title || '?') + '</div>'
          : '';
        const isActionable = r.match_status === 'no_match' || r.match_status === 'ambiguous' || r.match_status === 'invalid_payload';
        const actionCell = isActionable
          ? '<button class="sr-iconbtn" data-resolve-id="' + esc(r.id) + '" title="Koppel aan event"><i class="ti ti-link"></i> Koppel</button>'
          : '<span style="font-size:11px;color:var(--text-faint)">read-only</span>';
        return '<tr>'
          + '<td>' + esc(naam) + '</td>'
          + '<td>' + email + (phone ? '<div style="font-size:11.5px;color:var(--text-dim);margin-top:2px">' + phone + '</div>' : '') + '</td>'
          + '<td><code style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px">' + esc(label) + '</code>' + cands + matchedEvt + '</td>'
          + '<td>' + status + '</td>'
          + '<td style="font-size:11.5px;color:var(--text-dim)">' + esc(fmtDate(r.received_at)) + '</td>'
          + '<td style="text-align:right">' + actionCell + '</td>'
          + '</tr>';
      }).join('')
    + '</tbody></table></div>';
  list.querySelectorAll('button[data-resolve-id]').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.resolveId;
      const row = rows.find((r) => r.id === id);
      if (row) openSignupResolveModal(row);
    });
  });
}

async function openSignupResolveModal(row) {
  _siState.activeRow = row;
  const modal = document.getElementById('evSignupResolveModal');
  if (!modal) return;
  document.getElementById('evSignupResolveNotes').value = '';
  document.getElementById('evSignupResolveError').style.display = 'none';
  const naam  = [row.first_name, row.last_name].filter(Boolean).join(' ').trim() || '—';
  const lines = [
    '<strong>' + esc(naam) + '</strong>' + (row.email ? ' &middot; ' + esc(row.email) : '') + (row.phone ? ' &middot; ' + esc(row.phone) : ''),
    '<div style="margin-top:4px">Label: <code style="font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px">' + esc(row.event_date_label || '—') + '</code></div>',
    '<div style="margin-top:4px">Status: ' + _siStatusBadge(row.match_status) + '</div>',
  ];
  document.getElementById('evSignupResolveContext').innerHTML = lines.join('');
  // Toon modal vóór events-load zodat skeleton zichtbaar is
  modal.style.display = 'flex';
  await _siLoadEventOptions();
}

function closeSignupResolveModal() {
  const modal = document.getElementById('evSignupResolveModal');
  if (modal) modal.style.display = 'none';
  _siState.activeRow = null;
}

async function _siLoadEventOptions() {
  const sel = document.getElementById('evSignupResolveEventPicker');
  if (!sel) return;
  // Cache events tijdens deze modul (events veranderen niet snel). Bij refresh:
  // _siState.eventsCache = null setten via [vernieuwen] knop later toevoegen.
  if (!_siState.eventsCache) {
    try {
      const r = await window.AgentShared.apiFetch('/api/events-list?status=published&limit=200');
      const d = await r.json().catch(() => ({}));
      if (!r.ok) {
        sel.innerHTML = '<option value="">Fout: ' + esc(d.error || ('HTTP ' + r.status)) + '</option>';
        return;
      }
      _siState.eventsCache = Array.isArray(d.items) ? d.items : [];
    } catch (e) {
      sel.innerHTML = '<option value="">Fout: ' + esc(e.message) + '</option>';
      return;
    }
  }
  const events = _siState.eventsCache;
  if (events.length === 0) {
    sel.innerHTML = '<option value="">Geen gepubliceerde events gevonden</option>';
    return;
  }
  // Sorteer chronologisch op starts_at ascending.
  const sorted = [...events].sort((a, b) => String(a.starts_at || '').localeCompare(String(b.starts_at || '')));
  sel.innerHTML = '<option value="">— Kies een event —</option>'
    + sorted.map((e) => {
        const closed = e.signups_closed ? ' (gesloten)' : '';
        const dt = fmtDate(e.starts_at);
        return '<option value="' + esc(e.id) + '">' + esc(dt) + ' &middot; ' + esc(e.title || '?') + closed + '</option>';
      }).join('');
}

async function submitSignupResolve() {
  if (!_siState.activeRow) return;
  const sel = document.getElementById('evSignupResolveEventPicker');
  const notesEl = document.getElementById('evSignupResolveNotes');
  const errEl   = document.getElementById('evSignupResolveError');
  const submitBtn = document.getElementById('evSignupResolveSubmit');
  errEl.style.display = 'none';
  const eventId = sel ? String(sel.value || '').trim() : '';
  if (!eventId) {
    errEl.textContent = 'Kies eerst een event.';
    errEl.style.display = '';
    return;
  }
  const notes = notesEl ? String(notesEl.value || '').trim() : '';
  if (submitBtn) { submitBtn.disabled = true; submitBtn.innerHTML = '<i class="ti ti-loader"></i> Bezig…'; }
  try {
    const r = await window.AgentShared.apiFetch('/api/events-signup-inbox-resolve', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        inbox_id: _siState.activeRow.id,
        event_id: eventId,
        notes:    notes || undefined,
      }),
    });
    const d = await r.json().catch(() => ({}));
    if (!r.ok) {
      errEl.textContent = (d.error || ('HTTP ' + r.status)) + (d.code ? ' [' + d.code + ']' : '');
      errEl.style.display = '';
      if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="ti ti-check"></i> Koppel + maak deelnemer'; }
      return;
    }
    closeSignupResolveModal();
    const dedup = d.deduplicated ? ' (bestaande deelnemer hergebruikt)' : '';
    window.AgentShared.showToast('Gekoppeld + deelnemer aangemaakt' + dedup, 'success');
    loadSignupInbox();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = '';
    if (submitBtn) { submitBtn.disabled = false; submitBtn.innerHTML = '<i class="ti ti-check"></i> Koppel + maak deelnemer'; }
  }
}
