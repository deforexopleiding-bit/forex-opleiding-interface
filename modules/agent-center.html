<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent command center · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--surface-page);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .app { margin-left: var(--sidebar-w, 220px); padding: 24px 28px 60px; max-width: 1200px; }

    /* ─── Header met "command-core" animatie ──────────────────────────────── */
    .ac-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 22px;
      align-items: center;
      padding: 22px 24px;
      margin-bottom: 22px;
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .ac-header::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 60px 50%, var(--brand-primary-soft) 0%, transparent 55%);
      opacity: .6;
    }
    .ac-core {
      width: 84px;
      height: 84px;
      position: relative;
      flex-shrink: 0;
    }
    /* Fase 3 — reactieve core. CSS custom properties worden door JS gezet
       (acApplyCoreIntensity) op basis van team-activiteit. Defaults vallen
       terug op de Fase 1-waarden. */
    .ac-core {
      --core-orbit-dur: 18s;
      --core-ring-dur:  24s;
      --core-disc-dur:  3.6s;
      --core-disc-scale: 1.05;
      --core-disc-glow-soft:    var(--brand-primary-soft);
      --core-disc-glow-strong:  var(--brand-primary-soft-hover);
    }
    .ac-core .core-disc {
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-hover));
      box-shadow: 0 0 0 4px var(--core-disc-glow-soft);
      animation: ac-pulse var(--core-disc-dur) ease-in-out infinite;
    }
    .ac-core .core-orbit {
      position: absolute;
      inset: 0;
      border: 1.5px dashed var(--border-default);
      border-radius: 50%;
      animation: ac-spin var(--core-orbit-dur) linear infinite;
    }
    .ac-core .core-orbit::before,
    .ac-core .core-orbit::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand-primary);
      box-shadow: 0 0 8px var(--brand-primary-soft-hover);
    }
    .ac-core .core-orbit::before { top: -4px; left: calc(50% - 4px); }
    .ac-core .core-orbit::after  { bottom: -4px; left: calc(50% - 4px); background: var(--color-success); box-shadow: 0 0 8px var(--color-success-soft); }
    .ac-core .core-ring {
      position: absolute;
      inset: 8px;
      border: 1px solid var(--border-default);
      border-radius: 50%;
      animation: ac-spin var(--core-ring-dur) linear infinite reverse;
    }
    .ac-core .core-ring::before {
      content: '';
      position: absolute;
      top: -3px;
      left: calc(50% - 3px);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--brand-secondary-light, var(--brand-primary-hover));
    }
    @keyframes ac-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes ac-pulse {
      0%, 100% { transform: scale(1);   box-shadow: 0 0 0 4px var(--brand-primary-soft); }
      50%      { transform: scale(1.05); box-shadow: 0 0 0 10px var(--brand-primary-soft-hover); }
    }
    .ac-title-wrap { position: relative; z-index: 1; }
    .ac-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.3px;
      color: var(--text-primary);
    }
    .ac-sub {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .ac-status {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: var(--color-success-soft);
      border: 1px solid var(--color-success);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      color: var(--color-success-text);
    }
    .ac-status .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--color-success);
      box-shadow: 0 0 0 3px var(--color-success-soft);
      animation: ac-blink 1.6s ease-in-out infinite;
    }
    @keyframes ac-blink {
      0%, 100% { opacity: 1;   transform: scale(1); }
      50%      { opacity: .55; transform: scale(.8); }
    }

    /* ─── Fase 3 — command deck (team-overzicht) ──────────────────────────── */
    .ac-deck {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 16px 18px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }
    .ac-deck::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at right top, var(--brand-primary-soft) 0%, transparent 60%);
      opacity: .35;
    }
    .ac-deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      position: relative;
      z-index: 1;
    }
    .ac-tile {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      transition: transform .25s ease, box-shadow .25s ease;
    }
    .ac-tile .label {
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .ac-tile .value {
      font-size: 26px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -.5px;
      line-height: 1.1;
    }
    .ac-tile.skeleton .value { color: var(--text-tertiary); }
    .ac-tile.attention {
      border-color: var(--color-warning);
      background: linear-gradient(135deg, var(--color-warning-soft) 0%, var(--surface-card) 70%);
    }
    .ac-tile.attention .value { color: var(--color-warning-text); }
    .ac-tile.attention .label { color: var(--color-warning-text); }
    .ac-tile.attention .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-warning);
      box-shadow: 0 0 0 3px var(--color-warning-soft);
      animation: ac-warn-pulse 1.4s ease-in-out infinite;
    }

    .ac-attention-strip {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }
    .ac-attention-strip .strip-label {
      font-size: 11.5px;
      color: var(--color-warning-text);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .ac-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--color-warning-soft);
      border: 1px solid var(--color-warning);
      color: var(--color-warning-text);
      font-size: 12px;
      font-weight: 600;
    }
    .ac-chip strong { font-weight: 800; }
    .ac-chip-calm {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 99px;
      background: var(--color-success-soft);
      border: 1px solid var(--color-success);
      color: var(--color-success-text);
      font-size: 12px;
      font-weight: 600;
    }

    /* ─── Agent-grid ───────────────────────────────────────────────────────── */
    .ac-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }
    .ac-card {
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 18px;
      box-shadow: var(--shadow-sm);
      transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .ac-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--brand-primary);
    }
    .ac-card.active {
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px var(--brand-primary-soft);
    }
    .ac-card.read-only { cursor: default; }
    .ac-card.read-only:hover { transform: none; border-color: var(--border-subtle); }

    .ac-card-head { display: flex; gap: 12px; align-items: flex-start; }
    .ac-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--brand-primary), var(--brand-primary-hover));
      color: var(--text-inverse);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: .5px;
    }
    .ac-avatar.simone { background: linear-gradient(135deg, #6366f1, #818cf8); }
    .ac-avatar.mila   { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
    .ac-avatar.lisa   { background: linear-gradient(135deg, #10b981, #34d399); }

    .ac-card h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 2px;
    }
    .ac-card .role {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .ac-status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .ac-status-pill.online  { background: var(--color-success-soft); color: var(--color-success-text); }
    .ac-status-pill.offline { background: var(--color-neutral-soft); color: var(--color-neutral-text); }
    .ac-status-pill .pulse {
      width: 6px; height: 6px; border-radius: 50%;
      background: currentColor;
      animation: ac-blink 1.6s ease-in-out infinite;
    }
    .ac-status-pill.offline .pulse { animation: none; opacity: .5; }

    .ac-channel {
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ac-channel i { color: var(--text-tertiary); }
    .ac-channel .ch-on  { color: var(--color-success-text); }
    .ac-channel .ch-off { color: var(--color-neutral-text); }

    /* Fase 2 — live stats-rij op de kaarten. */
    .ac-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 10px;
      background: var(--surface-page);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      font-size: 11.5px;
      color: var(--text-secondary);
      flex-wrap: wrap;
      min-height: 36px;
      animation: ac-fade-in .25s ease;
    }
    .ac-stats.skeleton {
      color: var(--text-tertiary);
      background: repeating-linear-gradient(
        135deg,
        var(--surface-page) 0px,
        var(--surface-page) 10px,
        var(--surface-card-hover) 10px,
        var(--surface-card-hover) 20px
      );
      animation: ac-skeleton-pulse 1.8s ease-in-out infinite;
    }
    @keyframes ac-skeleton-pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: .55; }
    }
    .ac-stats .stat {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .ac-stats .stat .label {
      color: var(--text-tertiary);
      font-weight: 500;
      margin-left: 2px;
    }
    .ac-stats .stat.warn {
      color: var(--color-warning-text);
    }
    .ac-stats .stat.warn .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-warning);
      box-shadow: 0 0 0 3px var(--color-warning-soft);
      animation: ac-warn-pulse 1.4s ease-in-out infinite;
      margin-right: 2px;
    }
    @keyframes ac-warn-pulse {
      0%, 100% { transform: scale(1);  opacity: 1;   }
      50%      { transform: scale(.75); opacity: .55; }
    }
    .ac-stats .last-activity {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .ac-cta {
      margin-top: auto;
      font-size: 12px;
      color: var(--brand-primary);
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ac-cta .arrow { transition: transform .2s ease; }
    .ac-card:hover .ac-cta .arrow { transform: translateX(3px); }
    .ac-cta.placeholder { color: var(--text-tertiary); font-weight: 500; }

    /* ─── Editor-paneel ───────────────────────────────────────────────────── */
    .ac-editor {
      background: var(--surface-1);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      padding: 22px 24px;
      box-shadow: var(--shadow-sm);
      animation: ac-fade-in .28s ease;
      display: none;
    }
    .ac-editor.visible { display: block; }
    @keyframes ac-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ed-head { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border-subtle); }
    .ed-head h2 { font-size: 17px; font-weight: 700; color: var(--text-primary); }
    .ed-head .ed-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .ed-close {
      background: transparent;
      border: 1px solid var(--border-default);
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      display:inline-flex; align-items:center; gap:6px;
    }
    .ed-close:hover { background: var(--surface-card-hover); color: var(--text-primary); }

    .ed-section { margin-bottom: 18px; }
    .ed-section h3 { font-size: 11.5px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .ed-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .ed-field label { font-size: 12px; font-weight: 500; color: var(--text-secondary); }
    .ed-field label .req { color: var(--color-danger); }
    .ed-field input[type=text],
    .ed-field input[type=number],
    .ed-field select,
    .ed-field textarea {
      padding: 8px 10px;
      background: var(--surface-page);
      border: 1px solid var(--border-default);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
    }
    .ed-field textarea { resize: vertical; min-height: 80px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12.5px; }
    .ed-field input:focus, .ed-field textarea:focus, .ed-field select:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 3px var(--brand-primary-soft);
    }
    .ed-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .ed-help { font-size: 11.5px; color: var(--text-tertiary); margin-top: 3px; }

    .ed-toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 12px; background: var(--surface-page); border: 1px solid var(--border-subtle); border-radius: 10px; margin-bottom: 8px; }
    .ed-toggle .lbl { font-size: 12.5px; font-weight: 600; color: var(--text-primary); }
    .ed-toggle .lbl small { display:block; font-size: 11px; color: var(--text-tertiary); font-weight: 400; margin-top: 2px; }
    .toggle { position: relative; width: 36px; height: 20px; background: var(--surface-card-hover); border-radius: 99px; cursor: pointer; transition: background .15s; border: 1px solid var(--border-default); flex-shrink: 0; }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #fff; border-radius: 50%; transition: left .15s; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
    .toggle.on { background: var(--brand-primary); border-color: var(--brand-primary); }
    .toggle.on::after { left: 18px; }

    .ed-footer { display: flex; justify-content: space-between; gap: 10px; padding-top: 14px; border-top: 1px solid var(--border-subtle); margin-top: 8px; }
    .ed-footer .right { display: flex; gap: 8px; align-items: center; }
    .save-info { font-size: 11.5px; color: var(--text-tertiary); }
    .save-info.error { color: var(--color-danger-text); }
    .save-info.ok    { color: var(--color-success-text); }

    .btn-primary { background: var(--brand-primary); color: var(--text-inverse); border: none; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary:hover { background: var(--brand-primary-hover); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }
    .btn-secondary { background: var(--surface-1); color: var(--text-secondary); border: 1px solid var(--border-default); padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 6px; }
    .btn-secondary:hover { background: var(--surface-card-hover); color: var(--text-primary); }

    .forbidden-card { background: var(--surface-1); border: 1px solid var(--border-subtle); border-radius: 14px; padding: 32px 28px; max-width: 480px; margin: 40px auto; text-align: center; box-shadow: var(--shadow-sm); }
    .forbidden-card h2 { font-size: 16px; font-weight: 700; margin-bottom: 6px; color: var(--text-primary); }
    .forbidden-card p { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
    .forbidden-card a { color: var(--brand-primary); text-decoration: none; font-size: 13px; font-weight: 500; }
    .forbidden-card a:hover { text-decoration: underline; }

    .ac-loading { padding: 60px 20px; text-align: center; color: var(--text-tertiary); font-size: 13px; }

    /* ─── Lisa-editor specifieke onderdelen (Fase 1b) ─────────────────────── */
    .kw-chips { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px 8px; background: var(--surface-page); border: 1px solid var(--border-default); border-radius: 8px; min-height: 38px; align-items: center; }
    .kw-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; background: var(--brand-primary-soft); color: var(--brand-primary); border-radius: 99px; font-size: 12px; font-weight: 600; }
    .kw-chip .kw-x { cursor: pointer; opacity: .6; line-height: 1; font-weight: 800; }
    .kw-chip .kw-x:hover { opacity: 1; color: var(--color-danger); }
    .kw-input { flex: 1; min-width: 140px; background: transparent; border: none; outline: none; font-size: 12.5px; font-family: inherit; color: var(--text-primary); padding: 4px 2px; }

    .fu-list { display: grid; gap: 10px; }
    .fu-step {
      background: var(--surface-page);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .fu-step-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .fu-step-head strong { font-size: 12.5px; font-weight: 700; color: var(--text-primary); }
    .fu-step-del { background: transparent; border: 1px solid var(--border-default); color: var(--text-secondary); cursor: pointer; padding: 2px 9px; border-radius: 6px; font-size: 13px; font-family: inherit; line-height: 1; }
    .fu-step-del:hover { color: var(--color-danger); border-color: var(--color-danger); }
    .fu-phases { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .fu-phases label { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 2px 8px; border: 1px solid var(--border-subtle); border-radius: 99px; background: var(--surface-1); }
    .fu-phases label:has(input:checked) { background: var(--brand-primary-soft); border-color: var(--brand-primary); color: var(--brand-primary); }
    .fu-meta { display: flex; gap: 10px; align-items: center; margin-top: 4px; font-size: 11.5px; color: var(--text-tertiary); }
    .fu-meta .ai-flag { margin-left: auto; padding: 2px 8px; border-radius: 99px; background: var(--surface-card-hover); color: var(--text-secondary); font-weight: 600; }
    .fu-meta .ai-flag.on { background: var(--brand-primary-soft); color: var(--brand-primary); }

    .lisa-version-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface-page);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 14px;
    }
    .lisa-version-bar .badge {
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: .04em;
    }
    .lisa-version-bar .badge.draft  { background: var(--color-warning-soft); color: var(--color-warning-text); }
    .lisa-version-bar .badge.live   { background: var(--color-success-soft); color: var(--color-success-text); }
    .lisa-version-bar .ver-toggle {
      margin-left: auto;

      color: var(--text-secondary);
      padding: 4px 10px;

    }
    .lisa-version-bar .ver-toggle:hover { background: var(--surface-card-hover); color: var(--text-primary); }

    .lisa-history {

      background: var(--surface-page);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;
    }
    .lisa-history-row {
      display: grid;

      gap: 10px;
      align-items: center;

      border-bottom: 1px solid var(--border-subtle);
    }
    .lisa-history-row:last-child { border-bottom: none; }
    .lisa-history-row code { color: var(--text-primary); font-size: 11.5px; }
    .lisa-history-row .note { color: var(--text-tertiary); font-size: 11.5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lisa-history-row .badge { padding: 2px 7px; border-radius: 99px; font-size: 10px; font-weight: 700; text-align: center; }
    .lisa-history-row .badge.live  { background: var(--color-success-soft); color: var(--color-success-text); }
    .lisa-history-row .badge.draft { background: var(--color-warning-soft); color: var(--color-warning-text); }
    .lisa-history-row .badge.old   { background: var(--color-neutral-soft); color: var(--color-neutral-text); }
    .lisa-history-row .rb-btn {
      background: transparent;

    .perm-warn {
      padding: 10px 12px;
      background: var(--color-warning-soft);
      border: 1px solid var(--color-warning);

    /* ─── Joost sub-tabs (finance-only) ───────────────────────────────────── */
    .joost-subtabs {

    }
    .joost-subtab {

    }

    }

    /* Decision Log tabel */
    .joost-decisions-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
    .joost-decisions-table th { text-align: left; font-weight: 600; color: var(--text-tertiary); padding: 6px 8px; border-bottom: 1px solid var(--border-subtle); font-size: 11px; text-transform: uppercase; letter-spacing: .04em; }
    .joost-decisions-table td { padding: 7px 8px; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); vertical-align: top; }
    .joost-decisions-table tr.clickable { cursor: pointer; }
    .joost-decisions-table tr.clickable:hover td { background: var(--surface-card-hover); }
    .joost-decisions-table tr.detail td {
      background: var(--surface-page);
      padding: 0;
    }
    .joost-decisions-table .detail-pre {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11.5px;
      background: var(--surface-page);
      padding: 10px 12px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-secondary);
    }
    .joost-decisions-status { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .joost-decisions-status.allow   { background: var(--color-success-soft); color: var(--color-success-text); }
    .joost-decisions-status.block   { background: var(--color-danger-soft);  color: var(--color-danger-text); }
    .joost-decisions-status.other   { background: var(--color-neutral-soft); color: var(--color-neutral-text); }
    .joost-decisions-refresh {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 11.5px;
      color: var(--text-tertiary);
    }
    .joost-decisions-refresh .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--color-success);
      box-shadow: 0 0 0 3px var(--color-success-soft);
      animation: ac-blink 1.6s ease-in-out infinite;
    }

    /* ─── Lisa sub-tabs (Fase 1c) ─────────────────────────────────────────── */
    .lisa-subtabs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
      padding-bottom: 0;
    }
    .lisa-subtab {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;

      cursor: pointer;

    /* Fase-tabs (binnen sub=fases) */
    .lisa-fase-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .lisa-fase-tab {
      background: var(--surface-card-hover);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);

      padding: 6px 14px;

      font-weight: 600;
      font-family: inherit;
    }
    .lisa-fase-tab.active {

      border-color: var(--brand-primary);

    /* KB-cards (producten + FAQ) */
    .kb-card {
      position: relative;
      background: var(--surface-page);
      border: 1px solid var(--border-subtle);
      border-radius: 10px;

    .kb-card-del {

    .kb-empty {

      text-align: center;

      border-radius: 8px;
      font-size: 12.5px;

      font-family: inherit;

    .kb-section-head {

    /* Tag-filter chips */
    .kb-tf-chips {

    .kb-tf-chip {

      font-size: 12px;

    .kb-tf-chip:hover { opacity: .8; }

    .kb-tf-chip .tf-count {
      padding: 1px 7px;

      font-size: 10.5px;

    /* FAQ keyword input + chips */
    .faq-kw-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px 8px;
      background: var(--surface-1);
      border: 1px solid var(--border-default);

      flex: 1;
      min-width: 140px;
      background: transparent;
      border: none;

    @media (prefers-reduced-motion: reduce) {
      .ac-core .core-disc,
      .ac-core .core-orbit,
      .ac-core .core-ring,
      .ac-status .live-dot,
      .ac-status-pill .pulse,

        animation: none !important;
      }

    @media (max-width: 880px) {

      .ac-status { justify-self: center; }
      .ed-row-2 { grid-template-columns: 1fr; }

  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app" id="page-content">
  <div class="ac-loading"><i class="ti ti-loader-2"></i> Agents laden…</div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
// Module-specifieke labels per agent. Andere fields (persona_name, model, …)
// komen direct uit joost_config.
const MODULE_INFO = {
  finance:    { roleLabel: 'Finance — incasso & klantgesprek',  avatarClass: '',       channelLabel: 'WhatsApp finance' },
  events:     { roleLabel: 'Events — aanmelden & herinneringen', avatarClass: 'simone', channelLabel: 'WhatsApp events' },
  onboarding: { roleLabel: 'Onboarding — eerste contact & wizard', avatarClass: 'mila',  channelLabel: 'WhatsApp onboarding' },
};
const MODELS = ['claude-sonnet-4-6', 'claude-opus-4-7', 'claude-haiku-4-5'];

// Joost-only sub-tab strip (alleen finance). Algemeen blijft de bestaande
// editor; Autonomy en Decision Log porten finance-instellingen.js.
const JOOST_SUB_TABS = ['algemeen', 'autonomy', 'decisions'];
const JOOST_SUB_TAB_LABELS = {
  algemeen:  'Algemeen',
  autonomy:  'Autonomy',
  decisions: 'Decision Log',
};
// Vijf E2-feature-flags die de Autonomy-tab beheert. Read-modify-write op
// joost_config.feature_flags zodat ongerelateerde keys (reactive_suggest_enabled
// / auto_send_enabled / etc.) behouden blijven.
const JOOST_E2_FLAGS = [
  ['e2_decision_engine_logs',    'Decision-engine logs',     'Audit-log van elke autonomy-beslissing (aanbevolen aan).', true],
  ['e2_reactive_autonomy',       'Reactieve autonomy',       'Joost mag in real-time reageren op inbound berichten.',     false],
  ['e2_arrangement_negotiation', 'Arrangement-onderhandeling','Joost mag onderhandelen over splitsing / uitstel.',         false],
  ['e2_outbound_executor',       'Outbound executor',        'Joost mag autonoom outbound berichten versturen.',          false],
  ['e2_outbound_cron',           'Outbound cron',            'Tijdgebonden outbound-cron mag draaien.',                   false],
];
const JOOST_DECISIONS_REFRESH_MS = 30000;

const state = {
  agents: [],
  loadingHub: true,
  // Fase 2 — per-agent activity stats (read-only). Module-keyed voor trio,
  // 'lisa' sentinel voor Lisa. null = nog niet geladen of fout.
  activity: null,
  // Joost-only sub-tab state (finance). Andere modules tonen geen tabs.
  joostActiveSub: 'algemeen',
  joostAutonomySaving: false,
  joostDecisionsLoaded: false,
  joostDecisions: [],
  joostDecisionsTimer: null,  // setInterval handle — moet netjes worden opgeruimd
  joostDecisionsLastRefresh: null,
  activeModule: null,           // module-key van de open joost-editor (null = geen)
  editingCfg: null,             // huidige joost_config-shape (read-modify-write)
  editingDirty: false,
  saving: false,
  saveMsg: null,
  // Fase 1b — Lisa-editor state. Aparte velden om de joost-flow byte-identiek
  // te laten (Lisa-versionering werkt anders: save_draft + publish + rollback).
  activeIsLisa: false,
  lisaCfg: null,                // huidige (draft of actieve) lisa_config-shape
  lisaActiveVersion: null,      // versie die nu live is (kan != lisaCfg.version bij open draft)
  lisaDirty: false,
  lisaSaving: false,
  lisaHistoryOpen: false,
  lisaHistory: [],              // history-rijen wanneer panel geopend is
  // Fase 1c — sub-tab + fase-selectie + kb-meta cache.
  lisaActiveSub: 'persona',
  lisaActiveFase: 'intro',
  lisaKbTags: [],               // [{id, name, color}]
  lisaKbLinks: [],              // [{item_id, tag_id}]
  // Lisa settings (lisa_settings singleton, id=1, DIRECT live) — strikt
  // gescheiden van lisaCfg. Eigen state, eigen fetch, eigen save.
  lisaSettings: null,
  lisaSettingsLoaded: false,
  lisaSettingsDirty: false,
  lisaSettingsSaving: false,
};

const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function toastErr(msg) {
  try { window.AgentShared?.showToast?.(msg, 'error'); } catch { alert(msg); }
}
function toastOk(msg) {
  try { window.AgentShared?.showToast?.(msg, 'success'); } catch {}
}
function can(key) { return window.RBAC?.canSync?.(key) || false; }

// ── Fase 2 — stats helpers ──────────────────────────────────────────────────
function relTime(iso) {
  if (!iso) return '—';
  const t = new Date(iso).getTime();
  if (!Number.isFinite(t)) return '—';
  const diffSec = Math.round((Date.now() - t) / 1000);
  if (diffSec < 60)        return 'net actief';
  if (diffSec < 3600)      return Math.floor(diffSec / 60)   + ' min geleden';
  if (diffSec < 86400)     return Math.floor(diffSec / 3600) + ' u geleden';
  if (diffSec < 7 * 86400) return Math.floor(diffSec / 86400) + ' d geleden';
  return new Date(iso).toLocaleDateString('nl-NL', { day: '2-digit', month: 'short' });
}

// Bouw de stats-rij voor een agent. key='lisa' of moduleKey voor het trio.
// Geeft skeleton-placeholder terug tot state.activity is geladen.
function renderAgentStats(key) {
  if (!state.activity) {
    return `<div class="ac-stats skeleton"><span><i class="ti ti-loader-2"></i> Live stats laden…</span></div>`;
  }
  if (key === 'lisa') {
    const s = state.activity.lisa || {};
    const warn = (s.human_takeover || 0) > 0;
    return `
      <div class="ac-stats">
        <span class="stat"><strong>${esc(String(s.conversations_today || 0))}</strong><span class="label">gesprekken</span></span>
        <span class="stat"><strong>${esc(String(s.qualified || 0))}</strong><span class="label">gekwalificeerd</span></span>
        <span class="stat"><strong>${esc(String(s.call_booked || 0))}</strong><span class="label">call(s) geboekt</span></span>
        ${warn ? `<span class="stat warn"><span class="pulse-dot"></span><strong>${esc(String(s.human_takeover))}</strong><span class="label">mens actief</span></span>` : ''}
        <span class="last-activity">${esc(relTime(s.last_activity_at))}</span>
      </div>
    `;
  }
  const t = (state.activity.trio || []).find((r) => r.module === key);
  if (!t) {
    return `<div class="ac-stats"><span class="stat" style="color:var(--text-tertiary)"><i class="ti ti-x"></i> stats niet beschikbaar</span></div>`;
  }
  const warn = (t.handoffs || 0) > 0;
  return `
    <div class="ac-stats">
      <span class="stat"><strong>${esc(String(t.open_suggestions || 0))}</strong><span class="label">open</span></span>
      ${warn ? `<span class="stat warn"><span class="pulse-dot"></span><strong>${esc(String(t.handoffs))}</strong><span class="label">handoff</span></span>` : ''}
      <span class="stat"><strong>${esc(String(t.messages_today || 0))}</strong><span class="label">berichten vandaag</span></span>
      <span class="stat"><strong>${esc(String(t.active_conversations || 0))}</strong><span class="label">actief</span></span>
      <span class="last-activity">${esc(relTime(t.last_activity_at))}</span>
    </div>
  `;
}

// ── Fase 3 — team-totalen + aandacht-strip + reactieve core ────────────────
// UI-only: hergebruikt state.activity uit Fase 2 (geen extra fetch).

// Agent-naam ophalen uit hub-state (persona_name uit joost_config). Module-key
// fallback ("finance"/"events"/"onboarding") als de naam nog niet binnen is.
function agentName(moduleKey) {
  const a = (state.agents || []).find((x) => x.module === moduleKey);
  if (a?.persona_name) return a.persona_name;
  return ({ finance: 'Joost', events: 'Simone', onboarding: 'Mila' })[moduleKey] || moduleKey;
}

// Som over trio + lisa voor de 4 team-tegels. Volledig client-side; werkt
// onafhankelijk van of agents-activity team_totals al voorrekent.
function computeDeckTotals() {
  const a = state.activity;
  if (!a) return null;
  const trio = Array.isArray(a.trio) ? a.trio : [];
  const lisa = a.lisa || {};
  const trioOpen      = trio.reduce((acc, r) => acc + (r.open_suggestions     || 0), 0);
  const trioHandoff   = trio.reduce((acc, r) => acc + (r.handoffs             || 0), 0);
  const trioMsgs      = trio.reduce((acc, r) => acc + (r.messages_today       || 0), 0);
  const trioActive    = trio.reduce((acc, r) => acc + (r.active_conversations || 0), 0);
  return {
    open_suggestions:     trioOpen,                                  // open joost-suggesties
    attention:            trioHandoff + (lisa.human_takeover || 0),  // handoffs + lisa takeover
    conversations_today:  trioActive  + (lisa.conversations_today || 0),
    messages_today:       trioMsgs    + (lisa.messages_today || 0),
  };
}

// Lijst van agents met openstaande "aandacht"-werk (handoff of takeover).
function computeAttentionList() {
  const a = state.activity;
  if (!a) return [];
  const out = [];
  for (const r of (Array.isArray(a.trio) ? a.trio : [])) {
    if ((r.handoffs || 0) > 0) {
      out.push({ name: agentName(r.module), count: r.handoffs, kind: 'handoff' });
    }
  }
  if (a.lisa && (a.lisa.human_takeover || 0) > 0) {
    out.push({ name: agentName('lisa') === 'lisa' ? 'Lisa' : 'Lisa', count: a.lisa.human_takeover, kind: 'takeover' });
  }
  out.sort((x, y) => y.count - x.count);
  return out;
}

function renderDeck() {
  const t = computeDeckTotals();
  if (!t) {
    return `
      <div class="ac-deck" id="acDeck">
        <div class="ac-deck-grid">
          <div class="ac-tile skeleton"><span class="label"><i class="ti ti-bolt"></i> Open</span><span class="value">—</span></div>
          <div class="ac-tile skeleton"><span class="label"><i class="ti ti-alert-triangle"></i> Aandacht</span><span class="value">—</span></div>
          <div class="ac-tile skeleton"><span class="label"><i class="ti ti-messages"></i> Gesprekken</span><span class="value">—</span></div>
          <div class="ac-tile skeleton"><span class="label"><i class="ti ti-message-2"></i> Berichten</span><span class="value">—</span></div>
        </div>
      </div>`;
  }
  const att = computeAttentionList();
  const attentionWarn = t.attention > 0;
  const stripHtml = att.length > 0
    ? `
      <div class="ac-attention-strip">
        <span class="strip-label"><i class="ti ti-alert-triangle"></i> Aandacht nodig</span>
        ${att.map((a) => `<span class="ac-chip"><strong>${esc(a.name)}</strong> · ${esc(String(a.count))} ${esc(a.kind)}${a.count === 1 ? '' : 's'}</span>`).join('')}
      </div>`
    : `
      <div class="ac-attention-strip">
        <span class="ac-chip-calm"><i class="ti ti-circle-check"></i> Niets om aandacht aan te geven — alles loopt</span>
      </div>`;

  return `
    <div class="ac-deck" id="acDeck">
      <div class="ac-deck-grid">
        <div class="ac-tile">
          <span class="label"><i class="ti ti-bolt"></i> Open suggesties</span>
          <span class="value">${esc(String(t.open_suggestions))}</span>
        </div>
        <div class="ac-tile ${attentionWarn ? 'attention' : ''}">

        <div class="ac-tile">

          <span class="value">${esc(String(t.conversations_today))}</span>

}

// Reactieve core: zet CSS custom properties op .ac-core op basis van team-
// activiteit. Hoge totale activiteit → sneller draaien + sterker pulseren.
// Defensief: bij null/onbekend laat de defaults staan.
function acApplyCoreIntensity() {
  const core = document.querySelector('.ac-core');
  if (!core) return;
  const t = computeDeckTotals();
  if (!t) {
    core.style.removeProperty('--core-orbit-dur');
    core.style.removeProperty('--core-ring-dur');
    core.style.removeProperty('--core-disc-dur');
    core.style.removeProperty('--core-disc-glow-strong');
    return;
  }
  const totalActivity = t.conversations_today + t.messages_today;
  // Normaliseer 0..1 met asymptoot bij 50 (per dag); snelste regime boven 50.
  const activityScore  = Math.min(1, totalActivity / 50);
  const attentionScore = t.attention > 0 ? Math.min(1, 0.4 + t.attention * 0.15) : 0;
  // Combineer: aandacht heeft hogere prioriteit dan generiek volume.
  const score = Math.min(1, Math.max(activityScore * 0.6, attentionScore));
  // Mapping naar duraties. Snellere min-waarden bij hoge score.
  const orbit = 18 - score * 8;   // 18 → 10s
  const ring  = 24 - score * 10;  // 24 → 14s
  const disc  = 3.6 - score * 1.6; // 3.6 → 2.0s
  core.style.setProperty('--core-orbit-dur', orbit.toFixed(2) + 's');
  core.style.setProperty('--core-ring-dur',  ring.toFixed(2)  + 's');
  core.style.setProperty('--core-disc-dur',  disc.toFixed(2)  + 's');
  // Bij aandacht: glow oranje-getint; anders brand-primary.
  if (t.attention > 0) {
    core.style.setProperty('--core-disc-glow-strong', 'var(--color-warning-soft)');
  } else {
    core.style.setProperty('--core-disc-glow-strong', 'var(--brand-primary-soft-hover)');
  }
}

// Niet-blokkerend laden van /api/agents-activity. Faal → kaart blijft werken
// zonder stats (we vervangen de skeleton door een grijze 'niet beschikbaar').
async function loadAgentsActivity() {
  try {
    const r = await window.AgentShared.apiFetch('/api/agents-activity');
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data?.ok !== true) throw new Error(data?.error || ('HTTP ' + r.status));
    state.activity = data;
  } catch (e) {
    console.warn('[agent-center] activity:', e?.message || e);
    state.activity = { trio: [], lisa: null, team_totals: { open_suggestions: 0, handoffs: 0 } };
  }
  // Alleen de hub-grid opnieuw renderen — niet de hele pagina, zodat
  // editor-state (Joost of Lisa) behouden blijft.
  const grid = document.getElementById('acGrid');
  if (grid) grid.innerHTML = state.agents.map(renderAgentCard).join('');
  // Fase 3 — command deck + reactieve core verversen met dezelfde data.
  const deck = document.getElementById('acDeck');
  if (deck) {
    // renderDeck() retourneert een complete <div class="ac-deck">; pak de
    // body daarvan zodat we de bestaande wrapper-id behouden.
    const tmp = document.createElement('div');
    tmp.innerHTML = renderDeck();
    const fresh = tmp.firstElementChild;
    if (fresh) deck.innerHTML = fresh.innerHTML;
  }
  acApplyCoreIntensity();
}

async function onCardClick(ev) {
  // Lisa-kaart eerst (heeft data-lisa, geen data-module).
  const lisaCard = ev.target.closest('.ac-card[data-lisa]');
  if (lisaCard) return openLisaEditor();
  const card = ev.target.closest('.ac-card[data-module]');
  if (!card) return;
  const moduleKey = card.dataset.module;
  if (!moduleKey) return;
  await openEditor(moduleKey);
}

// ── Editor (Joost / Simone / Mila — module-aware joost_config) ──────────────
async function openEditor(moduleKey) {
  // Switch vanuit Lisa-editor: reset Lisa-state zodat de hub niet 2 actieve
  // editors tegelijk denkt te hebben.
  if (state.activeIsLisa && state.lisaDirty
      && !confirm('Niet-opgeslagen Lisa-wijzigingen weggooien?')) return;
  // Eventueel lopende Decision Log-poll (vorige joost-editor sessie) stoppen
  // vóór nieuwe editor opent.
  acStopJoostDecisionsTimer();
  state.joostActiveSub = 'algemeen';
  state.joostDecisionsLoaded = false;
  state.joostDecisions = [];
  state.activeIsLisa = false;
  state.lisaCfg = null;
  state.lisaDirty = false;
  state.activeModule = moduleKey;
  state.editingCfg = null;
  state.editingDirty = false;
  state.saveMsg = null;
  // Re-render kaarten zodat 'active'-rand zichtbaar wordt.
  document.getElementById('acGrid').innerHTML = state.agents.map(renderAgentCard).join('');
  const ed = document.getElementById('acEditor');
  ed.classList.add('visible');
  ed.innerHTML = `<div class="ac-loading"><i class="ti ti-loader-2"></i> Config laden voor module <code>${esc(moduleKey)}</code>…</div>`;

  try {
    const r = await window.AgentShared.apiFetch('/api/joost-config-get?module=' + encodeURIComponent(moduleKey));
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    state.editingCfg = data.config || null;
    if (!state.editingCfg) throw new Error('Geen config-shape ontvangen');
    renderEditor();
    // Soft scroll voor visuele context.
    try { ed.scrollIntoView({ behavior: 'smooth', block: 'start' }); } catch {}
  } catch (e) {
    ed.innerHTML = `<div class="ac-loading" style="color:var(--color-danger-text)">Laden mislukt: ${esc(e?.message || e)}</div>`;
  }
}

function closeEditor() {
  if (state.activeIsLisa) return closeLisaEditor();
  if (state.editingDirty && !confirm('Niet-opgeslagen wijzigingen weggooien?')) return;
  // Decision Log poll netjes stoppen vóór state-reset (Lesson 20:
  // badge/poll-cleanup; voorkomt lekkende intervals na sluiten).
  acStopJoostDecisionsTimer();
  state.joostActiveSub = 'algemeen';
  state.joostDecisionsLoaded = false;
  state.joostDecisions = [];
  state.activeModule = null;
  state.editingCfg = null;
  state.editingDirty = false;
  document.getElementById('acEditor').classList.remove('visible');
  document.getElementById('acEditor').innerHTML = '';
  document.getElementById('acGrid').innerHTML = state.agents.map(renderAgentCard).join('');
}
window.acCloseEditor = closeEditor;

function readForm() {
  const c = state.editingCfg;
  const kbRaw = document.getElementById('fKb').value;
  let kbParsed;
  try {
    kbParsed = JSON.parse(kbRaw);
  } catch (e) {
    return { err: 'Knowledge base bevat ongeldige JSON: ' + (e?.message || e) };
  }
  if (kbParsed == null || typeof kbParsed !== 'object' || Array.isArray(kbParsed)) {
    return { err: 'Knowledge base moet een JSON-object zijn (geen array/null/scalar).' };
  }

  const ffPrev = (c.feature_flags && typeof c.feature_flags === 'object') ? c.feature_flags : {};
  const acPrev = (c.autonomy_config && typeof c.autonomy_config === 'object') ? c.autonomy_config : {};

  // Read-modify-write merge zodat we onbekende keys van andere flags/configs
  // NIET overschrijven of weggooien (e2_*, _bus_, etc).
  const feature_flags = { ...ffPrev,
    reactive_suggest_enabled: document.getElementById('tReactive').classList.contains('on'),
    auto_send_enabled:        document.getElementById('tAutoSend').classList.contains('on'),
  };
  const handoff = Number(document.getElementById('fHandoff').value);
  const autoS   = Number(document.getElementById('fAutoSend').value);
  if (!Number.isFinite(handoff) || handoff < 0 || handoff > 1) {
    return { err: 'Handoff-drempel: getal tussen 0 en 1.' };
  }
  if (!Number.isFinite(autoS) || autoS < 0 || autoS > 1) {
    return { err: 'Auto-send drempel: getal tussen 0 en 1.' };
  }
  const autonomy_config = { ...acPrev,
    handoff_threshold:   Math.round(handoff * 100) / 100,
    auto_send_threshold: Math.round(autoS   * 100) / 100,
  };

  const temp = Number(document.getElementById('fTemp').value);
  if (!Number.isFinite(temp) || temp < 0 || temp > 1) {
    return { err: 'Temperature: getal tussen 0 en 1.' };
  }

  const name = (document.getElementById('fName').value || '').trim();
  if (!name) return { err: 'Naam is verplicht.' };
  if (name.length > 100) return { err: 'Naam: max 100 tekens.' };

  return {
    payload: {
      module:                 c.module,
      persona_name:           name,
      persona_tone:           (document.getElementById('fTone').value || '').trim(),
      system_prompt_template: document.getElementById('fPrompt').value,
      knowledge_base:         kbParsed,
      model:                  document.getElementById('fModel').value,
      temperature:            Math.round(temp * 100) / 100,
      is_enabled:             document.getElementById('tEnabled').classList.contains('on'),
      feature_flags,
      autonomy_config,
    },
  };
}

async function acSave() {
  if (state.saving) return;
  const info = document.getElementById('acSaveInfo');
  info.classList.remove('error', 'ok');
  const { err, payload } = readForm();
  if (err) {
    info.textContent = err;
    info.classList.add('error');
    return;
  }
  state.saving = true;
  const btn = document.getElementById('acSaveBtn');
  btn.disabled = true;
  info.textContent = 'Opslaan…';
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-config-upsert', {
      method: 'POST',
      body:   JSON.stringify(payload),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    state.editingCfg = data.config || state.editingCfg;
    state.editingDirty = false;
    info.textContent = 'Opgeslagen ' + new Date().toLocaleTimeString('nl-NL');
    info.classList.add('ok');
    toastOk('Config opgeslagen');
    // Refresh hub om actueel is_enabled / model in de kaart te tonen.
    await loadAgents();
    renderHub();
    // Heropen editor voor dezelfde module (state.activeModule wordt door
    // closeEditor binnen renderHub-restart niet gewist, alleen DOM verandert).
    state.activeModule = payload.module;
    renderEditor();
  } catch (e) {
    info.textContent = 'Opslaan mislukt: ' + (e?.message || e);
    info.classList.add('error');
    toastErr(info.textContent);
  } finally {
    state.saving = false;
    btn.disabled = false;
  }
}
window.acSave = acSave;

function acJoostSwitchSub(sub) {
  if (!JOOST_SUB_TABS.includes(sub)) return;
  const prev = state.joostActiveSub;
  state.joostActiveSub = sub;
  document.querySelectorAll('#joostSubtabs .joost-subtab').forEach((b) => {
    b.classList.toggle('active', b.dataset.joostSub === sub);
  });
  document.querySelectorAll('#acEditor [data-joost-sub]').forEach((el) => {
    // alleen sub-sections togglen (subtabs hebben ook data-joost-sub maar
    // ZIJN niet de sub-section — die check via classList).
    if (el.classList.contains('joost-sub-section')) {
      el.classList.toggle('active', el.dataset.joostSub === sub);
    }
  });
  // Decision Log: starten/stoppen van de 30s-poll bij wisselen.
  if (sub === 'decisions') {

  } else if (prev === 'decisions') {
    acStopJoostDecisionsTimer();

function setJoostAutoSaveInfo(msg, kind) {
  const el = document.getElementById('acJoostAutoSaveInfo');
  if (!el) return;
  el.classList.remove('error', 'ok');
  if (kind === 'error') el.classList.add('error');
  if (kind === 'ok')    el.classList.add('ok');

async function acJoostSaveAutonomy() {
  if (state.joostAutonomySaving) return;
  if (!state.editingCfg || state.editingCfg.module !== 'finance') return;
  setJoostAutoSaveInfo('', null);

  // Read-modify-write: behoud bestaande feature_flags (reactive_suggest_enabled,
  // auto_send_enabled, etc.) en overschrijf alleen de 5 E2-keys.
  const prevFlags = (state.editingCfg.feature_flags && typeof state.editingCfg.feature_flags === 'object')
    ? state.editingCfg.feature_flags : {};
  const merged = { ...prevFlags };
  for (const [key] of JOOST_E2_FLAGS) {
    const el = document.getElementById('jaut_' + key);
    if (el) merged[key] = el.classList.contains('on');
  }

  state.joostAutonomySaving = true;
  const btn = document.getElementById('acJoostAutoSaveBtn');
  if (btn) btn.disabled = true;
  setJoostAutoSaveInfo('Opslaan…');
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-config-upsert', {
      method: 'POST',
      body:   JSON.stringify({ module: 'finance', feature_flags: merged }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    // Update lokale state met de server-respons zodat een latere save van
    // het Algemeen-tab (persona/kb/etc.) de versgesavde flags niet overschrijft.
    if (data.config) state.editingCfg = data.config;
    setJoostAutoSaveInfo('Opgeslagen ' + new Date().toLocaleTimeString('nl-NL'), 'ok');
    toastOk('Autonomy-flags opgeslagen');
  } catch (e) {
    setJoostAutoSaveInfo('Opslaan mislukt: ' + (e?.message || e), 'error');
    toastErr('Opslaan mislukt: ' + (e?.message || e));
  } finally {
    state.joostAutonomySaving = false;
    if (btn) btn.disabled = false;
  }
}
window.acJoostSaveAutonomy = acJoostSaveAutonomy;

// ── Decision Log (read-only, 30s auto-refresh) ──
function renderJoostDecisionsShell() {
  return `
    <div class="ed-section">
      <h3>Decision Log</h3>
      <div class="joost-decisions-refresh">
        <span class="live-dot"></span>
        <span>Auto-refresh elke 30s.</span>
        <span id="acJoostDecisionsRefreshNote" style="margin-left:auto"></span>
      </div>
      <div id="acJoostDecisionsHost">
        <div class="ac-loading"><i class="ti ti-loader-2"></i> Beslissingen laden…</div>
      </div>
    </div>
  `;
}

function decisionStatusClass(dec) {
  const blocked = dec && (dec.blocked_reason || (typeof dec.status === 'string' && dec.status.startsWith('BLOCKED')));
  if (blocked) return 'block';
  const sent = dec && (dec.status === 'SENT_AUTONOMOUSLY' || dec.action === 'allow');
  if (sent) return 'allow';
  return 'other';
}
function decisionStatusLabel(dec) {
  if (!dec) return '—';
  if (dec.blocked_reason) return 'BLOCKED · ' + dec.blocked_reason;
  if (dec.status) return dec.status;
  if (dec.action) return dec.action;
  return '—';
}

function startJoostDecisions() {
  if (!state.editingCfg || state.editingCfg.module !== 'finance') return;
  // Eerste fetch + 30s-interval. Bestaande interval eerst opruimen (dubbele
  // start mag geen lekkende intervals geven).
  acStopJoostDecisionsTimer();
  loadJoostDecisions();
  state.joostDecisionsTimer = setInterval(loadJoostDecisions, JOOST_DECISIONS_REFRESH_MS);
}

function acStopJoostDecisionsTimer() {
  if (state.joostDecisionsTimer) {
    clearInterval(state.joostDecisionsTimer);
    state.joostDecisionsTimer = null;
  }
}
window.acStopJoostDecisionsTimer = acStopJoostDecisionsTimer;

// Final safety net — page unload moet ALTIJD het 30s-interval opruimen,
// ook als de gebruiker direct de tab sluit zonder editor expliciet te sluiten.
window.addEventListener('beforeunload', () => { acStopJoostDecisionsTimer(); });

async function loadJoostDecisions() {
  // Defensief: als editor inmiddels gesloten is, niet meer renderen.
  if (!state.editingCfg || state.editingCfg.module !== 'finance' || state.joostActiveSub !== 'decisions') {
    acStopJoostDecisionsTimer();
    return;
  }
  const host = document.getElementById('acJoostDecisionsHost');
  const note = document.getElementById('acJoostDecisionsRefreshNote');
  if (!host) { acStopJoostDecisionsTimer(); return; }
  try {
    const r = await window.AgentShared.apiFetch('/api/joost-autonomy-decisions-list?limit=50');
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    const rows = Array.isArray(data?.decisions) ? data.decisions
               : Array.isArray(data?.rows)      ? data.rows
               : Array.isArray(data)            ? data
               : [];
    state.joostDecisions = rows;
    state.joostDecisionsLoaded = true;
    state.joostDecisionsLastRefresh = new Date();
    renderJoostDecisions();
    if (note) {
      const d = state.joostDecisionsLastRefresh;
      const pad = (n) => String(n).padStart(2, '0');
      note.textContent = 'Laatste refresh ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
    }
  } catch (e) {
    if (!state.joostDecisionsLoaded) {
      host.innerHTML = `<div class="ac-loading" style="color:var(--color-danger-text)">Beslissingen laden mislukt: ${esc(e?.message || e)}</div>`;
    } else if (note) {
      note.textContent = 'Refresh-fout: ' + (e?.message || e);
    }
  }
}

function renderJoostDecisions() {
  const host = document.getElementById('acJoostDecisionsHost');
  if (!host) return;
  const rows = state.joostDecisions || [];
  if (rows.length === 0) {
    host.innerHTML = `<div class="ac-loading">Geen autonomy-beslissingen gevonden in audit_log.</div>`;
    return;
  }
  const tbody = rows.map((rr, i) => {
    const d = rr.decision || {};
    const statusCls = decisionStatusClass(d);
    const statusTxt = decisionStatusLabel(d);
    const created  = rr.created_at ? new Date(rr.created_at).toLocaleString('nl-NL') : '—';
    const convId   = rr.conversation_id ? String(rr.conversation_id).slice(0, 8) + '…' : '—';
    const intent   = d.intent || (d.detected_intent || '—');
    const conf     = (d.confidence != null) ? String(d.confidence) : '—';
    const reason   = d.reason || rr.reason_text || '—';
    const detailJson = esc(JSON.stringify(rr, null, 2));
    return `
      <tr class="clickable" data-row-idx="${i}">
        <td>${esc(created)}</td>
        <td><span class="joost-decisions-status ${statusCls}">${esc(statusTxt)}</span></td>
        <td><code>${esc(convId)}</code></td>
        <td>${esc(intent)}</td>
        <td>${esc(conf)}</td>
        <td>${esc(reason)}</td>
      </tr>
      <tr class="detail" id="jdRowDetail_${i}" style="display:none">
        <td colspan="6"><pre class="detail-pre">${detailJson}</pre></td>
      </tr>
    `;
  }).join('');
  host.innerHTML = `
    <div style="overflow-x:auto">
      <table class="joost-decisions-table">
        <thead><tr>
          <th>Tijd</th><th>Status</th><th>Conv</th><th>Intent</th><th>Conf</th><th>Reden</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
  `;
  host.querySelectorAll('tr.clickable[data-row-idx]').forEach((tr) => {
    tr.addEventListener('click', () => {
      const i = tr.getAttribute('data-row-idx');
      const det = document.getElementById('jdRowDetail_' + i);
      if (det) det.style.display = det.style.display === 'none' ? '' : 'none';
    });
  });
}

//  Lisa-editor (Fase 1b) — port van modules/lisa.html
//  Endpoint: /api/lisa-config  (GET ?which=latest, POST ?action=save_draft|publish|rollback|history)
// ─────────────────────────────────────────────────────────────────────────────

const LISA_EMOJI_OPTIONS = ['nooit', 'spaarzaam', 'normaal', 'veel'];
const LISA_FU_PHASES     = ['intro', 'doel', 'situatie', 'band', 'call'];
const LISA_PHASE_LABELS  = { intro: 'Intro', doel: 'Doel', situatie: 'Situatie', band: 'Band', call: 'Call' };
const LISA_FU_MAX_STEPS  = 5;
const LISA_DEFAULT_THRESHOLD = 200;
// Fase 1c — sub-tab keys. + (deze PR) settings als 6e sub-tab voor lisa_settings.
// STRIKT GESCHEIDEN van lisa_config draft/publish: andere tabel, ander endpoint
// (/api/lisa-settings), eigen save-knop, eigen state. DIRECT live bij save —
// geen versionering.
const LISA_SUB_TABS = ['persona', 'dosdonts', 'fases', 'kb', 'followup', 'settings'];
const LISA_SUB_TAB_LABELS = {
  persona:  'Persona',
  dosdonts: "Do's & Don'ts",
  fases:    'Fases',
  kb:       'Kennisbank',
  followup: 'Follow-up',
  settings: 'Instellingen',
};
const LISA_DELAY_MODES = ['fixed', 'random', 'per_phase'];

// Normaliseer een lisa_config-row naar een werkbare editor-shape.
// Zorgt dat arrays bestaan + default-waarden landen zodat de UI nooit op
// undefined struikelt. Backwards-compatible voor losse oudere shapes.
function normaliseLisaCfg(row) {
  const r = (row && typeof row === 'object') ? row : {};
  // Fase 1c — phases mappen van phase_<f> jsonb-rij naar cfg.phases[f].
  const phases = {};
  for (const f of LISA_FU_PHASES) {
    const p = (r['phase_' + f] && typeof r['phase_' + f] === 'object') ? r['phase_' + f] : {};
    phases[f] = {
      system:     String(p.system || ''),
      transition: String(p.transition || ''),
      examples:   Array.isArray(p.examples) ? p.examples.map(String) : [],
    };
  }
  return {
    id:                  r.id || null,
    version:             Number.isFinite(Number(r.version)) ? Number(r.version) : null,
    is_active:           r.is_active === true,
    persona_name:        String(r.persona_name || 'Lisa'),
    persona_age:         String(r.persona_age || ''),
    persona_background:  String(r.persona_background || ''),
    persona_tone:        String(r.persona_tone || ''),
    persona_writing_style: String(r.persona_writing_style || ''),
    emoji_usage:         LISA_EMOJI_OPTIONS.includes(r.emoji_usage) ? r.emoji_usage : 'spaarzaam',
    dos:                 Array.isArray(r.dos)   ? r.dos.map(String)   : [],
    donts:               Array.isArray(r.donts) ? r.donts.map(String) : [],
    // Fase 1c — fase-funnel (5 fases) + kennisbank.
    phases,
    kb_products:         Array.isArray(r.kb_products)
      ? r.kb_products.filter((p) => p && typeof p === 'object').map((p) => ({
          naam:         String(p.naam || ''),
          beschrijving: String(p.beschrijving || ''),
          prijs:        String(p.prijs || ''),
          doelgroep:    String(p.doelgroep || ''),
          duur:         String(p.duur || ''),
        }))
      : [],
    kb_faq:              Array.isArray(r.kb_faq)
      ? r.kb_faq.filter((q) => q && typeof q === 'object').map((q) => ({
          vraag:    String(q.vraag || ''),
          antwoord: String(q.antwoord || ''),
          keywords: Array.isArray(q.keywords)
            ? q.keywords.map((k) => String(k).trim().toLowerCase()).filter(Boolean) : [],
        }))
      : [],
    kb_pricing:          String(r.kb_pricing || ''),
    kb_usps:             String(r.kb_usps || ''),
    kb_tag_filter:       Array.isArray(r.kb_tag_filter)
      ? r.kb_tag_filter.map((t) => String(t).trim()).filter(Boolean) : [],
    kb_use_general_kb:   r.kb_use_general_kb !== false,
    followup_enabled:    r.followup_enabled === true,
    followup_ai_threshold_chars: Number.isFinite(Number(r.followup_ai_threshold_chars))
      ? Math.max(0, Math.min(2000, Number(r.followup_ai_threshold_chars)))
      : LISA_DEFAULT_THRESHOLD,
    stop_keywords:       Array.isArray(r.stop_keywords)
      ? r.stop_keywords.map((k) => String(k).trim().toLowerCase()).filter(Boolean) : [],
    followup_sequence:   Array.isArray(r.followup_sequence)
      ? r.followup_sequence.slice(0, LISA_FU_MAX_STEPS).map((s) => ({
          delay_hours: Math.max(1, Math.min(720, parseInt(s?.delay_hours, 10) || 24)),
          template:    String(s?.template || ''),
          use_ai:      s?.use_ai === true,
          phase_in:    Array.isArray(s?.phase_in) ? s.phase_in.filter((p) => LISA_FU_PHASES.includes(p)) : [],
        }))
      : [],
  };
}

// Kb-meta lazy-laden (best-effort, één keer per editor-sessie).
async function loadLisaKbMeta() {
  if (state.lisaKbTags.length > 0) return; // al geladen
  try {
    const [tg, lk] = await Promise.all([
      window.AgentShared.apiFetch('/api/kb-tags?action=list').then((r) => r.json()).catch(() => ({})),
      window.AgentShared.apiFetch('/api/kb-item-tags?action=all_with_tags').then((r) => r.json()).catch(() => ({})),
    ]);
    state.lisaKbTags  = Array.isArray(tg?.tags)  ? tg.tags  : [];
    state.lisaKbLinks = Array.isArray(lk?.links) ? lk.links : [];
  } catch (e) {
    console.warn('[agent-center] loadLisaKbMeta:', e?.message || e);
  }
}
function lisaKbTagByName(name) { return state.lisaKbTags.find((t) => t.name === name) || null; }
function lisaKbCountByTagId(tagId) { return state.lisaKbLinks.filter((l) => l.tag_id === tagId).length; }
function lisaKbAvailableCount() {
  const ids = new Set(state.lisaCfg.kb_tag_filter.map((n) => (lisaKbTagByName(n) || {}).id).filter(Boolean));
  if (!ids.size) return 0;
  const items = new Set();
  state.lisaKbLinks.forEach((l) => { if (ids.has(l.tag_id)) items.add(l.item_id); });
  return items.size;
}

  }

    state.lisaDirty = true;
  });
  // Generic dirty-tracking voor tekstvelden + AI-flag herrendering bij threshold.
  document.querySelectorAll('#acEditor input, #acEditor textarea, #acEditor select').forEach((el) => {
    el.addEventListener('input',  () => { state.lisaDirty = true; });
    el.addEventListener('change', () => { state.lisaDirty = true; });

    if (!state.lisaCfg.stop_keywords.includes(v)) {
      state.lisaCfg.stop_keywords.push(v);
      state.lisaDirty = true;
      rerenderLisaStopChips();

    inp.value = '';

      rerenderLisaStopChips();

function lisaFuWouldUseAi(s) {
  const tpl = String(s.template || '');
  const threshold = state.lisaCfg.followup_ai_threshold_chars || LISA_DEFAULT_THRESHOLD;
  return s.use_ai === true || tpl.length >= threshold;
}

function renderLisaFuStep(s, i) {
  const phasesHtml = LISA_FU_PHASES.map((p) => `
    <label>
      <input type="checkbox" data-fu-phase="${esc(p)}" data-idx="${i}" ${s.phase_in.includes(p) ? 'checked' : ''} />
      ${esc(LISA_PHASE_LABELS[p])}
    </label>`).join('');
  const ai = lisaFuWouldUseAi(s);
  return `
    <div class="fu-step" data-fu-step="${i}">
      <div class="fu-step-head">
        <strong>Stap ${i + 1}</strong>
        <button class="fu-step-del" type="button" data-fu-act="remove" data-idx="${i}" title="Verwijderen">×</button>
      </div>
      <div class="ed-field">
        <label>Wacht (uur na laatste Lisa-bericht) <span style="color:var(--text-tertiary);font-weight:400">— 1 t/m 720</span></label>
        <input type="number" min="1" max="720" value="${esc(String(s.delay_hours))}" data-fu-field="delay_hours" data-idx="${i}" style="max-width:140px" />
      </div>
      <div class="ed-field">
        <label>Template / instructie</label>
        <textarea rows="3" data-fu-field="template" data-idx="${i}">${esc(s.template)}</textarea>
        <div class="fu-meta">
          <span data-fu-chars="${i}">${(s.template || '').length} tekens</span>
          <span class="ai-flag ${ai ? 'on' : ''}" data-fu-aiflag="${i}">${ai ? '🤖 AI' : '📝 Letterlijk'}</span>
        </div>
      </div>
      <div class="ed-field">
        <label>Alleen bij deze fases <span style="color:var(--text-tertiary);font-weight:400">(leeg = altijd)</span></label>
        <div class="fu-phases">${phasesHtml}</div>
      </div>
      <label class="fu-meta" style="cursor:pointer">
        <input type="checkbox" data-fu-field="use_ai" data-idx="${i}" ${s.use_ai ? 'checked' : ''} />
        <span style="color:var(--text-tertiary);font-size:11.5px">AI-generatie forceren (auto-aan boven de drempel)</span>
      </label>
    </div>`;
}

function rerenderLisaFuList() {
  const host = document.getElementById('lf_fu_list');
  if (!host) return;
  host.innerHTML = state.lisaCfg.followup_sequence.map(renderLisaFuStep).join('');
  const addBtn = document.getElementById('lf_fu_add');
  if (addBtn) {
    const max = state.lisaCfg.followup_sequence.length >= LISA_FU_MAX_STEPS;
    addBtn.disabled = max;
    addBtn.innerHTML = max ? '<i class="ti ti-plus"></i> Max bereikt' : '<i class="ti ti-plus"></i> Stap toevoegen';
  }
}

function rerenderLisaStopChips() {
  const host = document.getElementById('lf_stop_chips');
  if (!host) return;
  const input = host.querySelector('#lf_stop_input');
  const inputVal = input ? input.value : '';
  host.innerHTML = state.lisaCfg.stop_keywords.map((k, i) => `<span class="kw-chip">${esc(k)}<span class="kw-x" data-stop-idx="${i}">&times;</span></span>`).join('')
    + `<input type="text" class="kw-input" id="lf_stop_input" placeholder="bv. afmelden" value="${esc(inputVal)}" />`;
  // Re-bind enter.
  document.getElementById('lf_stop_input').addEventListener('keydown', (ev) => {
    if (ev.key !== 'Enter') return;
    ev.preventDefault();
    const inp = ev.target;
    const v = inp.value.trim().toLowerCase();
    if (!v) return;
    if (!state.lisaCfg.stop_keywords.includes(v)) {
      state.lisaCfg.stop_keywords.push(v);
      state.lisaDirty = true;
      rerenderLisaStopChips();
    }
    inp.value = '';
  });
  // Focus terug.
  try { document.getElementById('lf_stop_input').focus(); } catch {}
}

function onLisaFuInput(ev) {
  const t = ev.target.closest('[data-fu-field][data-idx], [data-fu-phase][data-idx]');
  if (!t) return;
  const i = parseInt(t.dataset.idx, 10);
  const s = state.lisaCfg.followup_sequence[i];
  if (!s) return;
  state.lisaDirty = true;
  if (t.dataset.fuField === 'delay_hours') {
    const n = parseInt(t.value, 10) || 0;
    s.delay_hours = Math.max(1, Math.min(720, n));
  } else if (t.dataset.fuField === 'template') {
    s.template = t.value;
    // Live AI-flag + char-count update.
    const chars = document.querySelector(`[data-fu-chars="${i}"]`);
    const ai = document.querySelector(`[data-fu-aiflag="${i}"]`);
    if (chars) chars.textContent = String(t.value.length) + ' tekens';
    const wouldAi = lisaFuWouldUseAi(s);
    if (ai) {
      ai.textContent = wouldAi ? '🤖 AI' : '📝 Letterlijk';
      ai.classList.toggle('on', wouldAi);
    }
  } else if (t.dataset.fuField === 'use_ai') {
    s.use_ai = t.checked === true;
    const ai = document.querySelector(`[data-fu-aiflag="${i}"]`);
    const wouldAi = lisaFuWouldUseAi(s);
    if (ai) {
      ai.textContent = wouldAi ? '🤖 AI' : '📝 Letterlijk';
      ai.classList.toggle('on', wouldAi);
    }
  } else if (t.dataset.fuPhase) {
    const p = t.dataset.fuPhase;
    const idx = s.phase_in.indexOf(p);
    if (t.checked && idx < 0) s.phase_in.push(p);
    else if (!t.checked && idx >= 0) s.phase_in.splice(idx, 1);
  }
}

function onLisaFuClick(ev) {
  const btn = ev.target.closest('[data-fu-act="remove"][data-idx]');
  if (!btn) return;
  const i = parseInt(btn.dataset.idx, 10);
  if (!Number.isFinite(i)) return;
  if (!confirm('Stap ' + (i + 1) + ' verwijderen?')) return;
  state.lisaCfg.followup_sequence.splice(i, 1);
  state.lisaDirty = true;
  rerenderLisaFuList();
}

function acLisaAddFuStep() {
  if (state.lisaCfg.followup_sequence.length >= LISA_FU_MAX_STEPS) return;
  state.lisaCfg.followup_sequence.push({ delay_hours: 24, template: '', use_ai: false, phase_in: [] });
  state.lisaDirty = true;
  rerenderLisaFuList();
}
window.acLisaAddFuStep = acLisaAddFuStep;

// ─── Fase 1c — sub-tab switching ───────────────────────────────────────────
function acLisaSwitchSub(sub) {
  if (!LISA_SUB_TABS.includes(sub)) return;
  state.lisaActiveSub = sub;
  // Highlight juiste tab.
  document.querySelectorAll('#lf_subtabs .lisa-subtab').forEach((b) => {
    b.classList.toggle('active', b.dataset.sub === sub);
  });
  // Toon juiste section.
  document.querySelectorAll('#acEditor .lisa-sub-section').forEach((el) => {
    el.classList.toggle('active', el.dataset.lisaSub === sub);
  });
  // STRIKTE SCHEIDING: bij Instellingen-tab verbergen we de lisa_config
  // 'Publiceren'-section en draft/publish-knoppen, zodat settings nooit
  // per ongeluk via de config-save-flow loopt. Sluiten-knop blijft staan.
  document.querySelectorAll('#acEditor [data-lisa-config-only]').forEach((el) => {
    el.style.display = (sub === 'settings') ? 'none' : '';
  });
  // Lazy-load settings bij eerste keer dat tab geopend wordt.
  if (sub === 'settings' && !state.lisaSettingsLoaded) {
    loadLisaSettings();
  } else if (sub === 'settings') {
    renderLisaSettings();
  }
}
window.acLisaSwitchSub = acLisaSwitchSub;

// ─────────────────────────────────────────────────────────────────────────────
// LISA SETTINGS — lisa_settings (singleton, id=1, DIRECT live).
// STRIKT GESCHEIDEN van lisa_config:
//   - andere tabel    : lisa_settings (één rij) i.t.t. lisa_config (versioned).
//   - ander endpoint  : /api/lisa-settings (GET / POST-PATCH).
//   - eigen state     : state.lisaSettings + state.lisaSettings* flags.
//   - eigen save-knop : binnen Instellingen-tab; geen draft/publish-vorm.
//   - eigen permission: write achter lisa.config.publish (server autoritatief).
// readLisaForm / acLisaSaveDraft / acLisaPublish raken settings-velden NOOIT
// aan; settings-payload bevat NOOIT lisa_config-velden.
// ─────────────────────────────────────────────────────────────────────────────

const LISA_SETTINGS_FIELDS = [
  'live_mode_enabled',
  'office_hours_start', 'office_hours_end', 'office_hours_timezone',
  'ghl_webhook_active',
  'response_delay_mode',
  'response_delay_fixed_seconds',
  'response_delay_min_seconds',
  'response_delay_max_seconds',
  'response_delay_per_phase',
  'typing_indicator_enabled',
  'post_link_followup_enabled',
  'post_link_step1_hours', 'post_link_step2_hours', 'post_link_step3_hours',
];

function normaliseLisaSettings(s) {
  const r = (s && typeof s === 'object') ? s : {};
  const pp = (r.response_delay_per_phase && typeof r.response_delay_per_phase === 'object'
    && !Array.isArray(r.response_delay_per_phase)) ? r.response_delay_per_phase : {};
  return {
    // boolean flags
    live_mode_enabled:           r.live_mode_enabled === true,
    ghl_webhook_active:          r.ghl_webhook_active !== false, // default true
    typing_indicator_enabled:    r.typing_indicator_enabled !== false,
    post_link_followup_enabled:  r.post_link_followup_enabled !== false,
    // office hours
    office_hours_start:    String(r.office_hours_start || '07:00:00').slice(0, 8),
    office_hours_end:      String(r.office_hours_end   || '23:30:00').slice(0, 8),
    office_hours_timezone: String(r.office_hours_timezone || 'Europe/Amsterdam'),
    // delay
    response_delay_mode:           LISA_DELAY_MODES.includes(r.response_delay_mode) ? r.response_delay_mode : 'random',
    response_delay_fixed_seconds:  clampInt(r.response_delay_fixed_seconds, 0, 600, 45),
    response_delay_min_seconds:    clampInt(r.response_delay_min_seconds,   0, 600, 30),
    response_delay_max_seconds:    clampInt(r.response_delay_max_seconds,   0, 600, 90),
    response_delay_per_phase: {
      intro:    clampInt(pp.intro,    0, 600, 30),
      doel:     clampInt(pp.doel,     0, 600, 60),
      situatie: clampInt(pp.situatie, 0, 600, 75),
      band:     clampInt(pp.band,     0, 600, 60),
      call:     clampInt(pp.call,     0, 600, 45),
    },
    // post-link
    post_link_step1_hours: clampInt(r.post_link_step1_hours, 1, 168, 4),
    post_link_step2_hours: clampInt(r.post_link_step2_hours, 1, 168, 24),
    post_link_step3_hours: clampInt(r.post_link_step3_hours, 1, 168, 72),
    // read-only info (niet meegesturen bij save)
    ghl_webhook_last_received_at: r.ghl_webhook_last_received_at || null,
  };
}

function clampInt(v, min, max, def) {
  const n = parseInt(v, 10);
  if (!Number.isFinite(n)) return def;
  return Math.max(min, Math.min(max, n));
}

async function loadLisaSettings() {
  const host = document.getElementById('acLisaSettingsHost');
  if (host) host.innerHTML = `<div class="ac-loading"><i class="ti ti-loader-2"></i> Instellingen laden…</div>`;
  try {

    const data = await r.json().catch(() => ({}));

    state.lisaSettings = normaliseLisaSettings(data?.settings || null);

function readLisaSettingsForm() {
  // STRIKT: deze functie leest UITSLUITEND uit /ls_*/ DOM-velden en bouwt een
  // payload die ALLEEN LISA_SETTINGS_FIELDS-keys bevat. Geen overlap met
  // lisa_config velden mogelijk.
  const mode = document.getElementById('ls_delay_mode').value;
  if (!LISA_DELAY_MODES.includes(mode)) return { err: 'Ongeldige delay-modus.' };

  const fixed = clampInt(document.getElementById('ls_delay_fixed').value, 0, 600, 45);
  const min   = clampInt(document.getElementById('ls_delay_min').value,   0, 600, 30);
  const max   = clampInt(document.getElementById('ls_delay_max').value,   0, 600, 90);
  if (mode === 'random' && min > max) {
    return { err: 'Min seconden mag niet groter zijn dan max seconden.' };
  }

  const perPhase = {};
  for (const f of LISA_FU_PHASES) {
    const el = document.getElementById('ls_delay_phase_' + f);
    perPhase[f] = clampInt(el ? el.value : 45, 0, 600, 45);
  }

  const step1 = clampInt(document.getElementById('ls_postlink_step1').value, 1, 168, 4);
  const step2 = clampInt(document.getElementById('ls_postlink_step2').value, 1, 168, 24);
  const step3 = clampInt(document.getElementById('ls_postlink_step3').value, 1, 168, 72);

  const officeStart = (document.getElementById('ls_office_start').value || '').trim();
  const officeEnd   = (document.getElementById('ls_office_end').value   || '').trim();
  const officeTz    = (document.getElementById('ls_office_tz').value    || '').trim() || 'Europe/Amsterdam';
  if (!/^\d{2}:\d{2}(:\d{2})?$/.test(officeStart) || !/^\d{2}:\d{2}(:\d{2})?$/.test(officeEnd)) {
    return { err: 'Kantooruren: gebruik formaat HH:MM.' };
  }

  return {
    payload: {
      live_mode_enabled:           document.getElementById('ls_live_mode').classList.contains('on'),
      office_hours_start:          officeStart.length === 5 ? officeStart + ':00' : officeStart,
      office_hours_end:            officeEnd.length   === 5 ? officeEnd   + ':00' : officeEnd,
      office_hours_timezone:       officeTz,
      ghl_webhook_active:          document.getElementById('ls_ghl_active').classList.contains('on'),
      response_delay_mode:         mode,
      response_delay_fixed_seconds: fixed,
      response_delay_min_seconds:   min,
      response_delay_max_seconds:   max,
      response_delay_per_phase:     perPhase,
      typing_indicator_enabled:    document.getElementById('ls_typing').classList.contains('on'),
      post_link_followup_enabled:  document.getElementById('ls_postlink').classList.contains('on'),
      post_link_step1_hours:       step1,
      post_link_step2_hours:       step2,
      post_link_step3_hours:       step3,
    },
  };
}

function setLisaSettingsInfo(msg, kind) {
  const el = document.getElementById('acLisaSettingsInfo');
  if (!el) return;
  el.classList.remove('error', 'ok');
  if (kind === 'error') el.classList.add('error');
  if (kind === 'ok')    el.classList.add('ok');
  el.textContent = msg || '';
}

async function acLisaSettingsSave() {
  if (state.lisaSettingsSaving) return;
  setLisaSettingsInfo('', null);
  const { err, payload } = readLisaSettingsForm();
  if (err) { setLisaSettingsInfo(err, 'error'); return; }
  // Defensief: valideer dat NIETS uit lisa_config (incl. phase_*/kb_*) per
  // ongeluk in payload zit.
  for (const k of Object.keys(payload)) {
    if (!LISA_SETTINGS_FIELDS.includes(k)) {
      setLisaSettingsInfo('Onbekend veld in payload: ' + k, 'error');
      return;
    }
  }
  state.lisaSettingsSaving = true;
  const btn = document.getElementById('acLisaSettingsSaveBtn');
  if (btn) btn.disabled = true;
  setLisaSettingsInfo('Opslaan…');
  try {
    const r = await window.AgentShared.apiFetch('/api/lisa-settings', {
      method: 'POST',
      body:   JSON.stringify(payload),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    state.lisaSettings = normaliseLisaSettings(data?.settings || null);
    state.lisaSettingsDirty = false;
    setLisaSettingsInfo('Direct actief ' + new Date().toLocaleTimeString('nl-NL'), 'ok');
    toastOk('Instellingen DIRECT live');
    // Re-render zodat UI in sync is met canonieke server-respons (bv. office_hours-clamp).
    renderLisaSettings();
  } catch (e) {
    setLisaSettingsInfo('Opslaan mislukt: ' + (e?.message || e), 'error');
    toastErr('Opslaan mislukt: ' + (e?.message || e));
  } finally {
    state.lisaSettingsSaving = false;
    if (btn) btn.disabled = false;
  }
}
window.acLisaSettingsSave = acLisaSettingsSave;
