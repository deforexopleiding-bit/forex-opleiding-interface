function acLisaSwitchFase(faseKey) {
  if (!LISA_FU_PHASES.includes(faseKey)) return;
  // Commit huidige fase eerst (lees DOM-velden naar state).
  commitLisaFasePanel();
  state.lisaActiveFase = faseKey;
  document.querySelectorAll('#lf_fase_tabs .lisa-fase-tab').forEach((b) => {
    b.classList.toggle('active', b.dataset.fase === faseKey);
  });
  document.getElementById('lf_fase_panel').innerHTML = renderLisaFasePanel(faseKey);
  bindLisaFasePanel();
}
window.acLisaSwitchFase = acLisaSwitchFase;

function commitLisaFasePanel() {
  const f = state.lisaActiveFase;
  if (!f || !state.lisaCfg?.phases?.[f]) return;
  const sys = document.getElementById('lf_fase_system');
  const tr  = document.getElementById('lf_fase_transition');
  if (sys) state.lisaCfg.phases[f].system = sys.value;
  if (tr)  state.lisaCfg.phases[f].transition = tr.value;
  // Examples worden live bij elke input gesynchroniseerd; geen DOM-commit nodig.
}

function bindLisaFasePanel() {
  const panel = document.getElementById('lf_fase_panel');
  if (!panel) return;
  const f = state.lisaActiveFase;
  panel.addEventListener('input', (ev) => {
    if (!state.lisaCfg?.phases?.[f]) return;
    state.lisaDirty = true;
    const t = ev.target;
    if (t.id === 'lf_fase_system')     state.lisaCfg.phases[f].system = t.value;
    if (t.id === 'lf_fase_transition') state.lisaCfg.phases[f].transition = t.value;
    if (t.dataset.faseExIdx != null) {
      const i = parseInt(t.dataset.faseExIdx, 10);
      if (Number.isFinite(i)) state.lisaCfg.phases[f].examples[i] = t.value;
    }
  });
  panel.addEventListener('click', (ev) => {
    if (!state.lisaCfg?.phases?.[f]) return;
    const rm = ev.target.closest('[data-fase-ex-remove]');
    if (rm) {
      const i = parseInt(rm.dataset.faseExRemove, 10);
      if (Number.isFinite(i)) {
        state.lisaCfg.phases[f].examples.splice(i, 1);
        state.lisaDirty = true;
        document.getElementById('lf_fase_panel').innerHTML = renderLisaFasePanel(f);
        bindLisaFasePanel();
      }
      return;
    }
    if (ev.target.closest('#lf_fase_add_example')) {
      state.lisaCfg.phases[f].examples.push('');
      state.lisaDirty = true;
      document.getElementById('lf_fase_panel').innerHTML = renderLisaFasePanel(f);
      bindLisaFasePanel();
    }
  });
}

function bindLisaKbPanel() {
  const panel = document.querySelector('[data-lisa-sub="kb"]');
  if (!panel) return;

  // Producten + FAQ + tag-filter clicks.
  panel.addEventListener('click', (ev) => {
    // Producten add/remove.

      state.lisaCfg.kb_products.push({ naam: '', beschrijving: '', prijs: '', doelgroep: '', duur: '' });

    }
    const prodRm = ev.target.closest('[data-prod-remove]');
    if (prodRm) {
      const i = parseInt(prodRm.dataset.prodRemove, 10);
      if (Number.isFinite(i)) {
        if (!confirm('Product verwijderen?')) return;
        state.lisaCfg.kb_products.splice(i, 1);
        state.lisaDirty = true;
        rerenderLisaProducts();
      }
      return;
    }
    // FAQ add/remove.
    if (ev.target.closest('#lf_kb_add_faq')) {
      state.lisaCfg.kb_faq.push({ vraag: '', antwoord: '', keywords: [] });
      state.lisaDirty = true;
      rerenderLisaFaqs();
      return;
    }
    const faqRm = ev.target.closest('[data-faq-remove]');
    if (faqRm) {
      const i = parseInt(faqRm.dataset.faqRemove, 10);
      if (Number.isFinite(i)) {
        if (!confirm('FAQ verwijderen?')) return;
        state.lisaCfg.kb_faq.splice(i, 1);
        state.lisaDirty = true;
        rerenderLisaFaqs();
      }
      return;
    }
    // FAQ keyword chip-x.
    const kwRm = ev.target.closest('[data-faq-kw-remove]');
    if (kwRm) {
      const [iStr, kiStr] = (kwRm.dataset.faqKwRemove || '').split(':');
      const i  = parseInt(iStr,  10);
      const ki = parseInt(kiStr, 10);
      if (Number.isFinite(i) && Number.isFinite(ki)) {
        state.lisaCfg.kb_faq[i].keywords.splice(ki, 1);
        state.lisaDirty = true;
        rerenderLisaFaqs();
      }
      return;
    }
    // Tag-filter chip toggle.
    const tagChip = ev.target.closest('[data-tag-toggle]');
    if (tagChip) {
      const name = tagChip.dataset.tagToggle;
      const idx  = state.lisaCfg.kb_tag_filter.indexOf(name);
      if (idx >= 0) state.lisaCfg.kb_tag_filter.splice(idx, 1);
      else          state.lisaCfg.kb_tag_filter.push(name);
      state.lisaDirty = true;
      rerenderLisaTagFilterChips();
      return;
    }
  });

  // Producten + FAQ input dirty-track + state-sync.
  panel.addEventListener('input', (ev) => {
    const t = ev.target;
    // Product-field.
    const prodCard = t.closest('[data-prod-idx]');
    if (prodCard && t.dataset.prodField) {
      const i = parseInt(prodCard.dataset.prodIdx, 10);
      const p = state.lisaCfg.kb_products[i];
      if (p) {
        p[t.dataset.prodField] = t.value;
        state.lisaDirty = true;
      }
      return;
    }
    // FAQ-field.
    const faqCard = t.closest('[data-faq-idx]');
    if (faqCard && t.dataset.faqField) {
      const i = parseInt(faqCard.dataset.faqIdx, 10);
      const q = state.lisaCfg.kb_faq[i];
      if (q) {
        q[t.dataset.faqField] = t.value;
        state.lisaDirty = true;
      }
      return;
    }
    // Pricing / USPs.
    if (t.id === 'lf_kb_pricing') { state.lisaCfg.kb_pricing = t.value; state.lisaDirty = true; return; }
    if (t.id === 'lf_kb_usps')    { state.lisaCfg.kb_usps    = t.value; state.lisaDirty = true; return; }
  });

  // FAQ keyword Enter.
  panel.addEventListener('keydown', (ev) => {
    const inp = ev.target.closest('.faq-kw-input[data-faq-kw-input]');
    if (!inp) return;
    if (ev.key !== 'Enter') return;
    ev.preventDefault();
    const i = parseInt(inp.dataset.faqKwInput, 10);
    if (!Number.isFinite(i)) return;
    const v = inp.value.trim().toLowerCase();
    if (!v) return;
    if (!Array.isArray(state.lisaCfg.kb_faq[i].keywords)) state.lisaCfg.kb_faq[i].keywords = [];
    if (!state.lisaCfg.kb_faq[i].keywords.includes(v)) {
      state.lisaCfg.kb_faq[i].keywords.push(v);
      state.lisaDirty = true;
      rerenderLisaFaqs();
      // Re-focus na re-render.
      try { document.querySelector(`[data-faq-kw-input="${i}"]`)?.focus(); } catch {}
    }
    inp.value = '';
  });
}

function readLisaForm() {
  const c = state.lisaCfg;
  // Persona/dosdonts-velden zijn alleen aanwezig in DOM wanneer de bijbehorende
  // sub-tab in dit page-render geopend is geweest. De velden worden bij elke
  // sub-tab switch UIT/IN de DOM gehouden via display:none, dus elementen
  // BESTAAN doorgaans. Defensief: skip als element ontbreekt.
  const pn = document.getElementById('lf_persona_name');
  if (pn) c.persona_name = (pn.value || '').trim();
  const pa = document.getElementById('lf_persona_age');
  if (pa) c.persona_age = (pa.value || '').trim();
  const pb = document.getElementById('lf_persona_background');
  if (pb) c.persona_background = pb.value || '';
  const pt = document.getElementById('lf_persona_tone');
  if (pt) c.persona_tone = (pt.value || '').trim();
  const pw = document.getElementById('lf_persona_writing_style');
  if (pw) c.persona_writing_style = pw.value || '';
  const em = document.getElementById('lf_emoji_usage');
  if (em) c.emoji_usage = em.value;
  const ds = document.getElementById('lf_dos');
  if (ds) c.dos = (ds.value || '').split('\n').map((s) => s.trim()).filter(Boolean);
  const dn = document.getElementById('lf_donts');
  if (dn) c.donts = (dn.value || '').split('\n').map((s) => s.trim()).filter(Boolean);
  // KB extra info (pricing + usps zitten in DOM zodra Kennisbank-tab is bezocht).
  const kp = document.getElementById('lf_kb_pricing');
  if (kp) c.kb_pricing = kp.value || '';
  const ku = document.getElementById('lf_kb_usps');
  if (ku) c.kb_usps = ku.value || '';
  // Commit huidige Fase-panel (system + transition) naar state vóór save.
  commitLisaFasePanel();

  if (!c.persona_name) return { err: 'Persona-naam is verplicht.' };
  if (c.persona_name.length > 100) return { err: 'Persona-naam: max 100 tekens.' };
  if (!LISA_EMOJI_OPTIONS.includes(c.emoji_usage)) return { err: 'Emoji-gebruik: ongeldige waarde.' };
  const thr = c.followup_ai_threshold_chars;
  if (!Number.isInteger(thr) || thr < 0 || thr > 2000) return { err: 'AI-drempel: 0–2000.' };
  for (let i = 0; i < c.followup_sequence.length; i++) {
    const s = c.followup_sequence[i];
    if (!Number.isInteger(s.delay_hours) || s.delay_hours < 1 || s.delay_hours > 720) {
      return { err: 'Stap ' + (i + 1) + ': delay_hours 1–720 vereist.' };
    }
  }

  // Phase_<f> jsonb-objecten samenstellen vanuit cfg.phases.
  const phaseFields = {};
  for (const f of LISA_FU_PHASES) {
    const p = c.phases[f] || { system: '', transition: '', examples: [] };
    phaseFields['phase_' + f] = {
      system:     String(p.system || ''),
      transition: String(p.transition || ''),
      examples:   Array.isArray(p.examples) ? p.examples.map(String).filter((s) => s.length > 0) : [],
    };
  }

  return {
    payload: {
      persona_name:                c.persona_name,
      persona_age:                 c.persona_age,
      persona_background:          c.persona_background,
      persona_tone:                c.persona_tone,
      persona_writing_style:       c.persona_writing_style,
      emoji_usage:                 c.emoji_usage,
      dos:                         c.dos,
      donts:                       c.donts,
      // Fase 1c — phases + kennisbank meesturen (server EDIT_FIELDS accepteert).
      ...phaseFields,
      kb_products:                 c.kb_products.map((p) => ({
        naam:         String(p.naam || ''),
        beschrijving: String(p.beschrijving || ''),
        prijs:        String(p.prijs || ''),
        doelgroep:    String(p.doelgroep || ''),
        duur:         String(p.duur || ''),
      })),
      kb_faq:                      c.kb_faq.map((q) => ({
        vraag:    String(q.vraag || ''),
        antwoord: String(q.antwoord || ''),
        keywords: Array.isArray(q.keywords)
          ? q.keywords.map((k) => String(k).trim().toLowerCase()).filter(Boolean) : [],
      })),
      kb_pricing:                  c.kb_pricing,
      kb_usps:                     c.kb_usps,
      kb_tag_filter:               c.kb_tag_filter.slice(),
      kb_use_general_kb:           c.kb_use_general_kb === true,
      followup_enabled:            c.followup_enabled === true,
      followup_ai_threshold_chars: c.followup_ai_threshold_chars,
      stop_keywords:               c.stop_keywords,
      followup_sequence:           c.followup_sequence.map((s) => ({
        delay_hours: s.delay_hours,
        template:    s.template,
        use_ai:      s.use_ai === true,
        phase_in:    Array.isArray(s.phase_in) ? s.phase_in.slice() : [],
      })),
    },
  };
}

function setLisaSaveInfo(msg, kind) {
  const el = document.getElementById('acLisaSaveInfo');
  if (!el) return;
  el.classList.remove('error', 'ok');
  if (kind === 'error') el.classList.add('error');
  if (kind === 'ok')    el.classList.add('ok');
  el.textContent = msg || '';
}

async function acLisaSaveDraft() {
  if (state.lisaSaving) return;
  setLisaSaveInfo('', null);
  const { err, payload } = readLisaForm();
  if (err) { setLisaSaveInfo(err, 'error'); return; }
  state.lisaSaving = true;
  const btn = document.getElementById('acLisaDraftBtn');
  if (btn) btn.disabled = true;
  setLisaSaveInfo('Opslaan…');
  try {
    const r = await window.AgentShared.apiFetch('/api/lisa-config?action=save_draft', {
      method: 'POST',
      body:   JSON.stringify(payload),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data?.ok !== true) throw new Error(data?.error || ('HTTP ' + r.status));
    setLisaSaveInfo(data?.message || 'Concept opgeslagen', 'ok');
    state.lisaDirty = false;
    toastOk(data?.message || 'Concept opgeslagen');
    // Reload zodat de versie-badge actueel is.
    await reloadLisa();
  } catch (e) {
    setLisaSaveInfo('Opslaan mislukt: ' + (e?.message || e), 'error');
    toastErr('Opslaan mislukt: ' + (e?.message || e));
  } finally {
    state.lisaSaving = false;
    if (btn) btn.disabled = false;
  }
}
window.acLisaSaveDraft = acLisaSaveDraft;

async function acLisaPublish() {
  if (state.lisaSaving) return;
  setLisaSaveInfo('', null);
  const { err, payload } = readLisaForm();
  if (err) { setLisaSaveInfo(err, 'error'); return; }
  const notes = (document.getElementById('lf_pub_notes').value || '').trim();
  if (notes) payload.notes = notes;
  if (!confirm('Deze versie LIVE zetten? Vorige versie wordt automatisch gedeactiveerd.')) return;
  state.lisaSaving = true;
  const btn = document.getElementById('acLisaPubBtn');
  if (btn) btn.disabled = true;
  setLisaSaveInfo('Publiceren…');
  try {
    const r = await window.AgentShared.apiFetch('/api/lisa-config?action=publish', {
      method: 'POST',
      body:   JSON.stringify(payload),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data?.ok !== true) throw new Error(data?.error || ('HTTP ' + r.status));
    setLisaSaveInfo(data?.message || 'Live', 'ok');
    state.lisaDirty = false;
    toastOk(data?.message || 'Live');
    // Hub-rij refreshen (versie + active-status) + editor opnieuw laden.
    await loadAgents();
    await reloadLisa();
  } catch (e) {
    setLisaSaveInfo('Publiceren mislukt: ' + (e?.message || e), 'error');
    toastErr('Publiceren mislukt: ' + (e?.message || e));
  } finally {
    state.lisaSaving = false;
    if (btn) btn.disabled = false;
  }
}
window.acLisaPublish = acLisaPublish;

async function reloadLisa() {
  try {
    const r = await window.AgentShared.apiFetch('/api/lisa-config?which=latest');
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    state.lisaCfg = normaliseLisaCfg(data?.config || null);
    state.lisaActiveVersion = data?.active_version ?? null;
    renderLisaEditor();
  } catch (e) {
    // Geen renderEditor wijziging — UI blijft op huidige state.
    console.warn('[agent-center] reloadLisa', e?.message || e);
  }
}

async function acLisaToggleHistory() {
  state.lisaHistoryOpen = !state.lisaHistoryOpen;
  const host = document.getElementById('acLisaHistory');
  if (!host) return;
  host.style.display = state.lisaHistoryOpen ? '' : 'none';
  // Toggle-label op de versie-bar bijwerken zonder volledig her-render.
  const tog = document.querySelector('.lisa-version-bar .ver-toggle');
  if (tog) tog.innerHTML = `<i class="ti ti-history"></i> ${state.lisaHistoryOpen ? 'Verberg versies' : 'Alle versies'}`;
  if (state.lisaHistoryOpen) await loadAndRenderLisaHistory();
}
window.acLisaToggleHistory = acLisaToggleHistory;

async function loadAndRenderLisaHistory() {
  const host = document.getElementById('acLisaHistory');
  if (!host) return;
  host.innerHTML = `<div class="lisa-history"><div class="ac-loading" style="padding:20px 12px"><i class="ti ti-loader-2"></i> Versies laden…</div></div>`;
  try {
    const r = await window.AgentShared.apiFetch('/api/lisa-config?action=history');
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data?.error || ('HTTP ' + r.status));
    state.lisaHistory = Array.isArray(data?.versions) ? data.versions : [];
    renderLisaHistoryRows();
  } catch (e) {
    host.innerHTML = `<div class="lisa-history"><div class="ac-loading" style="color:var(--color-danger-text);padding:20px 12px">Laden mislukt: ${esc(e?.message || e)}</div></div>`;
  }
}

function renderLisaHistoryRows() {
  const host = document.getElementById('acLisaHistory');
  if (!host) return;
  const canPublish = can('lisa.config.publish');
  const rows = state.lisaHistory.map((v) => {
    const label = v.is_active ? 'live' : ((v.notes || '').toLowerCase() === 'draft' ? 'draft' : 'old');
    const labelTxt = v.is_active ? 'LIVE' : (label === 'draft' ? 'DRAFT' : '—');
    const created = v.created_at ? new Date(v.created_at).toLocaleString('nl-NL') : '—';
    const disabled = !canPublish || v.is_active;
    return `
      <div class="lisa-history-row">
        <code>v${esc(String(v.version))}</code>
        <span class="badge ${esc(label)}">${esc(labelTxt)}</span>
        <span class="note" title="${esc(v.notes || '')}">${esc(v.notes || '—')} · ${esc(created)}</span>
        <button class="rb-btn" type="button" data-rollback-id="${esc(v.id)}" ${disabled ? 'disabled' : ''} title="${disabled ? (v.is_active ? 'Al live' : 'lisa.config.publish vereist') : 'Terugzetten als nieuwe versie'}">
          <i class="ti ti-rotate-2"></i> Rollback
        </button>
      </div>`;
  }).join('');
  host.innerHTML = `<div class="lisa-history">${rows || '<div class="ac-loading" style="padding:20px 12px">Nog geen versies.</div>'}</div>`;
  host.addEventListener('click', onLisaHistoryClick, { once: true });
}

async function onLisaHistoryClick(ev) {
  const btn = ev.target.closest('[data-rollback-id]');
  if (!btn || btn.disabled) {
    // Re-bind voor volgende klik (we hebben once:true gebruikt).
    document.getElementById('acLisaHistory').addEventListener('click', onLisaHistoryClick, { once: true });
    return;
  }
  const versionId = btn.dataset.rollbackId;
  if (!versionId) return;
  if (!confirm('Deze versie terugzetten als nieuwe live versie? Er wordt een kopie aangemaakt.')) {
    document.getElementById('acLisaHistory').addEventListener('click', onLisaHistoryClick, { once: true });
    return;
  }
  btn.disabled = true;
  setLisaSaveInfo('Rollback…');
  try {
    const r = await window.AgentShared.apiFetch('/api/lisa-config?action=rollback', {
      method: 'POST',
      body:   JSON.stringify({ version_id: versionId }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok || data?.ok !== true) throw new Error(data?.error || ('HTTP ' + r.status));
    setLisaSaveInfo(data?.message || 'Teruggezet', 'ok');
    toastOk(data?.message || 'Teruggezet');
    state.lisaDirty = false;
    await loadAgents();
    await reloadLisa();
    if (state.lisaHistoryOpen) await loadAndRenderLisaHistory();
  } catch (e) {
    setLisaSaveInfo('Rollback mislukt: ' + (e?.message || e), 'error');
    toastErr('Rollback mislukt: ' + (e?.message || e));
    btn.disabled = false;
  }
}
</script>
