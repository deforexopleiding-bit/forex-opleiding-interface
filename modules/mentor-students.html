<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studenten · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/modules/shared/agent-shared.css" />
  <link rel="stylesheet" href="/styles/sales-redesign.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { margin-left: 220px; padding: 24px 28px 60px; max-width: 1280px; }
    .page-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; gap: 12px; flex-wrap: wrap; }
    .page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
    .page-header p { font-size: 13px; color: var(--text-dim); }
    @media (max-width: 880px) { .app { margin-left: 0; padding: 14px; } }

    .section { margin-bottom: 28px; }
    .section h2 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .section h2 i { color: var(--text-dim); }

    .data-table { width: 100%; border-collapse: collapse; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .data-table th, .data-table td { padding: 10px 12px; text-align: left; font-size: 13px; border-bottom: 1px solid var(--border); }
    .data-table th { background: rgba(0,0,0,0.02); font-weight: 600; color: var(--text-dim); font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.03em; }
    .data-table tr:last-child td { border-bottom: 0; }
    .data-table td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .data-table th.num { text-align: right; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap; }
    .badge-green  { background: rgba(34,197,94,0.13);  color: #15803d; }
    .badge-amber  { background: rgba(245,158,11,0.16); color: #b45309; }
    .badge-grey   { background: rgba(100,116,139,0.18); color: #475569; }
    .badge-blue   { background: rgba(20,115,214,0.16); color: #1160bd; }
    .badge-red    { background: rgba(220,38,38,0.13);  color: #b91c1c; }

    .empty-state { background: var(--bg-elev); border: 1px dashed var(--border); border-radius: 10px; padding: 24px 16px; text-align: center; font-size: 13px; color: var(--text-dim); }
    .empty-state i { font-size: 26px; display: block; margin-bottom: 6px; opacity: 0.6; }

    .skeleton { display: inline-block; width: 80px; height: 16px; background: linear-gradient(90deg, rgba(0,0,0,0.05), rgba(0,0,0,0.10), rgba(0,0,0,0.05)); border-radius: 4px; animation: sk 1.2s infinite; }
    @keyframes sk { 0% { background-position: 0% 0; } 100% { background-position: 200% 0; } }

    .tab-strip { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; flex-wrap: wrap; }
    .tab-btn { background: transparent; border: 0; padding: 10px 14px; font-size: 13.5px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--accent, #6366f1); }

    .student-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
    .student-head { display: grid; grid-template-columns: auto 1fr auto auto auto; gap: 12px; align-items: center; padding: 12px 14px; cursor: pointer; user-select: none; }
    .student-head:hover { background: rgba(99,102,241,0.04); }
    .student-card.open .student-head { border-bottom: 1px solid var(--border); }
    .student-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--accent-grad, linear-gradient(135deg, #093d54 0%, #688b9b 100%)); display: grid; place-items: center; font-size: 12px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .student-name { font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .student-meta { font-size: 11.5px; color: var(--text-faint); margin-top: 4px; display: inline-flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .student-meta i { font-size: 13px; opacity: 0.7; margin-right: 3px; }
    .student-meta .meta-overdue { color: #b91c1c; font-weight: 600; }
    .student-meta .meta-warning { color: #b45309; font-weight: 500; }
    .student-status-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 12px; font-size: 11.5px; font-weight: 600; white-space: nowrap; }
    .student-status-pill i { font-size: 13px; }
    .ss-pill-green { background: rgba(34,197,94,0.13); color: #15803d; }
    .ss-pill-amber { background: rgba(245,158,11,0.16); color: #b45309; }
    .ss-pill-red   { background: rgba(220,38,38,0.13); color: #b91c1c; }
    .student-flag { color: #b91c1c; font-size: 14px; }
    .assess-icon-btn { background: transparent; border: 0; cursor: pointer; padding: 4px; border-radius: 6px; color: #b45309; display: inline-flex; align-items: center; }
    .assess-icon-btn:hover { background: rgba(245,158,11,0.12); }
    .student-caret { color: var(--text-faint); transition: transform .15s; }
    .student-card.open .student-caret { transform: rotate(90deg); }
    .student-body { display: none; padding: 14px 16px 16px; background: var(--bg); }
    .student-card.open .student-body { display: block; }
    .student-stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .student-stat-cell { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
    .student-stat-cell .ssc-label { font-size: 11px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .03em; display: flex; align-items: center; gap: 5px; }
    .student-stat-cell .ssc-label i { font-size: 13px; }
    .student-stat-cell .ssc-value { font-size: 15px; font-weight: 700; margin-top: 4px; color: var(--text); font-variant-numeric: tabular-nums; }
    .student-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .stu-act-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; font-size: 12.5px; font-weight: 600; border: 1px solid var(--border); border-radius: 7px; background: var(--bg); color: var(--text); cursor: pointer; font-family: inherit; transition: background .15s, border-color .15s; }
    .stu-act-btn:hover { background: var(--bg-elev-2, rgba(0,0,0,0.04)); }
    .stu-act-btn.primary { background: #0a2f63; color: #fff; border-color: #0a2f63; }
    .stu-act-btn.primary:hover { background: #093d54; }
    .stu-act-btn .due-badge { font-size: 10.5px; padding: 1px 6px; border-radius: 8px; background: #fbbf24; color: #422006; font-weight: 700; }
    .stu-act-spacer { flex: 1; }
    .stu-act-link { font-size: 12px; color: var(--accent-violet, #6d28d9); text-decoration: none; font-weight: 600; }
    .stu-act-link:hover { text-decoration: underline; }
    .stu-assess-form { display: none; margin-top: 12px; padding: 12px 14px; background: rgba(10,47,99,0.04); border: 1px solid var(--border); border-radius: 8px; }
    .stu-assess-form.open { display: block; }
    .funded-status-msg { font-size: 11.5px; color: var(--text-faint); margin-left: 4px; }
    @media (max-width: 880px) {
      .student-head { grid-template-columns: auto 1fr auto auto; gap: 8px; }
      .student-meta { font-size: 11px; gap: 8px; }
    }

    .sort-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .sort-label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
    .sort-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; font-size: 12.5px; font-weight: 600; border: 1px solid var(--border); border-radius: 16px; background: var(--bg); color: var(--text-dim); cursor: pointer; font-family: inherit; transition: background .15s, color .15s, border-color .15s; }
    .sort-chip:hover { color: var(--text); }
    .sort-chip.active { background: #093d54; color: #fff; border-color: #093d54; }
    .sort-chip .sort-arrow { font-size: 10px; opacity: 0.85; }
    .search-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
    .search-bar input[type="search"] {
      flex: 1; max-width: 360px;
      padding: 8px 12px; font-size: 13.5px;
      border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg); color: var(--text);
      font-family: inherit;
    }
    .search-bar input[type="search"]:focus { outline: 2px solid rgba(99,102,241,0.35); border-color: var(--accent, #6366f1); }
    .warning-bar {
      background: rgba(245,158,11,0.10); border: 1px solid rgba(245,158,11,0.30);
      color: #b45309; padding: 8px 12px; border-radius: 8px;
      font-size: 12.5px; margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div id="sidebar-mount"></div>

<div class="app">
  <div class="page-header">
    <div>
      <h1>Studenten</h1>
      <p>Mijn actieve studenten en 1-op-1 sessies in één overzicht. (Instroom-pijplijn staat op <a href="/modules/mentor-onboarding.html">Onboarding</a>.)</p>
    </div>
  </div>

  <div id="msContent">
    <div class="tab-strip" role="tablist">
      <button class="tab-btn active" data-tab="studenten" type="button">Mijn studenten</button>
      <button class="tab-btn"        data-tab="1on1"      type="button">1-op-1 sessies</button>
    </div>

    <div id="tabStudenten" class="tab-panel">
      <div class="search-bar">
        <input type="search" id="msSearch" placeholder="Zoek op naam…" autocomplete="off" />
      </div>
      <div class="sort-bar" id="msSortBar">
        <span class="sort-label">Sorteer:</span>
        <button type="button" class="sort-chip active" data-sort-key="status">Status<span class="sort-arrow">↑</span></button>
        <button type="button" class="sort-chip"        data-sort-key="name">Naam</button>
        <button type="button" class="sort-chip"        data-sort-key="progress">Voortgang</button>
        <button type="button" class="sort-chip"        data-sort-key="noshows">No-shows</button>
        <button type="button" class="sort-chip"        data-sort-key="nextcall">Volgende call</button>
        <button type="button" class="sort-chip"        data-sort-key="overdue">Te late facturen</button>
      </div>
      <div id="studentsWrap"><div class="empty-state"><i class="ti ti-clock"></i>Laden…</div></div>
    </div>

    <div id="tab1on1" class="tab-panel" hidden>
      <div id="oneOnOneWarning"></div>
      <div id="oneOnOneRangeBar" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px">
        <div role="tablist" style="display:inline-flex;background:var(--bg-elev,#f1f5f9);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px">
          <button type="button" class="ms-range-btn" data-range="day"     style="border:none;background:transparent;color:var(--text-dim);padding:6px 12px;font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer">Dag</button>
          <button type="button" class="ms-range-btn" data-range="week"    style="border:none;background:transparent;color:var(--text-dim);padding:6px 12px;font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer">Week</button>
          <button type="button" class="ms-range-btn" data-range="month"   style="border:none;background:var(--bg,#fff);color:var(--text);padding:6px 12px;font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06)">Maand</button>
          <button type="button" class="ms-range-btn" data-range="custom"  style="border:none;background:transparent;color:var(--text-dim);padding:6px 12px;font-size:12.5px;font-weight:600;border-radius:6px;cursor:pointer">Aangepast</button>
        </div>
        <span id="msCustomRange" style="display:none;gap:6px;align-items:center;font-size:12.5px;color:var(--text-dim)">
          <span>Van</span>
          <input type="date" id="msCustomFrom" style="padding:5px 8px;font-size:12.5px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit" />
          <span>Tot</span>
          <input type="date" id="msCustomTo" style="padding:5px 8px;font-size:12.5px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-family:inherit" />
        </span>
      </div>
      <div class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
          <h2 style="margin:0"><i class="ti ti-calendar-plus"></i> Gepland</h2>
          <div style="display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--text-dim)">
            <span>Toon:</span>
            <div role="tablist" style="display:inline-flex;background:var(--bg-elev,#f1f5f9);border:1px solid var(--border);border-radius:7px;padding:2px;gap:2px">
              <button type="button" class="ms-limit-btn" data-target="planned" data-limit="25"  style="border:none;background:var(--bg,#fff);color:var(--text);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06)">25</button>
              <button type="button" class="ms-limit-btn" data-target="planned" data-limit="50"  style="border:none;background:transparent;color:var(--text-dim);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer">50</button>
              <button type="button" class="ms-limit-btn" data-target="planned" data-limit="100" style="border:none;background:transparent;color:var(--text-dim);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer">100</button>
              <button type="button" class="ms-limit-btn" data-target="planned" data-limit="500" style="border:none;background:transparent;color:var(--text-dim);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer">500</button>
            </div>
          </div>
        </div>
        <div id="plannedWrap"><div class="empty-state"><i class="ti ti-clock"></i>Laden…</div></div>
        <div id="plannedShown" style="margin-top:6px;font-size:11.5px;color:var(--text-faint)"></div>
      </div>
      <div class="section">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
          <h2 style="margin:0"><i class="ti ti-calendar-check"></i> Afgerond</h2>
          <div style="display:inline-flex;gap:6px;align-items:center;font-size:12px;color:var(--text-dim)">
            <span>Toon:</span>
            <div role="tablist" style="display:inline-flex;background:var(--bg-elev,#f1f5f9);border:1px solid var(--border);border-radius:7px;padding:2px;gap:2px">
              <button type="button" class="ms-limit-btn" data-target="completed" data-limit="25"  style="border:none;background:var(--bg,#fff);color:var(--text);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.06)">25</button>
              <button type="button" class="ms-limit-btn" data-target="completed" data-limit="50"  style="border:none;background:transparent;color:var(--text-dim);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer">50</button>
              <button type="button" class="ms-limit-btn" data-target="completed" data-limit="100" style="border:none;background:transparent;color:var(--text-dim);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer">100</button>
              <button type="button" class="ms-limit-btn" data-target="completed" data-limit="500" style="border:none;background:transparent;color:var(--text-dim);padding:4px 10px;font-size:11.5px;font-weight:600;border-radius:5px;cursor:pointer">500</button>
            </div>
          </div>
        </div>
        <div id="completedWrap"><div class="empty-state"><i class="ti ti-clock"></i>Laden…</div></div>
        <div id="completedShown" style="margin-top:6px;font-size:11.5px;color:var(--text-faint)"></div>
        <div id="completedTotals" style="margin-top:4px;font-size:12.5px;color:var(--text-dim)"></div>
      </div>
    </div>
  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
<script src="/modules/shared/theme-shared.js"></script>
<script src="/modules/shared/student-signals.js"></script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
<script>
(function () {
  'use strict';

  const fmtEUR = (n) => {
    const v = Number(n) || 0;
    return v.toLocaleString('nl-NL', { style: 'currency', currency: 'EUR', minimumFractionDigits: 2, maximumFractionDigits: 2 });
  };
  const fmtDateNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleDateString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric' });
    } catch { return iso; }
  };
  const fmtDateTimeNL = (iso) => {
    if (!iso) return '—';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  };
  const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

  function setError(elId, msg) {
    const el = document.getElementById(elId);
    if (el) el.innerHTML =
      `<div class="empty-state" style="border-color:#fecaca;color:#b91c1c"><i class="ti ti-alert-triangle"></i>${esc(msg)}</div>`;
  }

  // ── Tab-wiring ────────────────────────────────────────────────────────
  const _state = {
    studentsLoaded:    false,
    oneOnOneLoaded:    false,
    students:          [], // raw lijst voor client-side search
    // 1-op-1 tab — volledige fetch-resultaten bewaren zodat herfilteren
    // (range-toggle) zonder refetch werkt. session_number/_total komen al
    // ge-resolved van de server; client filtert puur op starts_at.
    oneOnOnePlanned:   [],
    oneOnOneCompleted: [],
    dateRange:         'month',  // 'day' | 'week' | 'month' | 'custom'
    customFrom:        '',       // 'YYYY-MM-DD'
    customTo:          '',       // 'YYYY-MM-DD'
    // Per-lijst weergave-limiet (puur visueel; periode-totaal blijft op
    // de volledige gefilterde set gebaseerd).
    plannedLimit:      25,
    completedLimit:    25,
    // Mijn studenten — sort-state. Default: status oplopend (urgent eerst).
    sort: { key: 'status', dir: 'asc' },
  };

  function activateTab(name) {
    document.querySelectorAll('#msContent .tab-btn').forEach((b) => {
      b.classList.toggle('active', b.dataset.tab === name);
    });
    document.getElementById('tabStudenten').hidden = (name !== 'studenten');
    document.getElementById('tab1on1').hidden      = (name !== '1on1');
    if (name === 'studenten' && !_state.studentsLoaded) loadStudents();
    if (name === '1on1'      && !_state.oneOnOneLoaded) load1on1Sessions();
  }

  // ── Mijn studenten ────────────────────────────────────────────────────
  // Subsystemen geporteerd uit mentor-dashboard.html (zelfde API's): overdue
  // facturen, assessments, funded-certs (Supabase Storage 'funded-certificates'),
  // student-signals (modal via window.StudentSignals). 1-op-1 toekomst- en
  // no-show-data uit /api/mentor-1on1-sessions.
  const _overdueByEmail   = new Map(); // lowercased email → aantal te-late facturen
  const _assessments      = new Map(); // bubble_student_id → assessment-rij
  const _fundedCerts      = new Map(); // bubble_student_id → cert-rij
  const _signalsByStudent = new Map(); // bubble_student_id → active signal
  const _nextCallByStudent = new Map(); // member_user → eerstvolgende starts_at (ISO)
  const _noshowByStudent   = new Map(); // member_user → laatste-no-show ISO
  const _completedByMember = new Map(); // member_user → vroegste-completed starts_at (ISO)
  const _stDetailCache    = new Map(); // bubble_student_id → mentor-student-detail payload
  const _openCardId       = { sid: null };
  // Toekomst-tab state: cache op onboarding_id en uitgeklapte kaart.
  // Per-student admin_note-badges: gevuld uit /api/notifications-list (PR6a).
  const _unreadByBubbleUser = new Map(); // onboarding_bubble_user_id → count

  const _FUNDED_MAX_BYTES = 10 * 1024 * 1024;
  const _FUNDED_ACCEPT    = '.pdf,.jpg,.jpeg,.png,application/pdf,image/jpeg,image/png';
  const _FUNDED_BUCKET    = 'funded-certificates';

  function _fmtFundedMonth(ymd) {
    if (!ymd) return '';
    const m = String(ymd).match(/^(\d{4})-(\d{2})/);
    if (!m) return esc(String(ymd));
    const months = ['', 'jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
    const idx = parseInt(m[2], 10);
    return `${months[idx] || m[2]} ${m[1]}`;
  }
  function _safeFilename(name) {
    return String(name || '').replace(/[^A-Za-z0-9._-]/g, '_').replace(/_+/g, '_').slice(0, 120) || 'cert';
  }

  function _avatarInitial(s) {
    const txt = String(s || '?').trim();
    return (txt.match(/[A-Za-z0-9]/) || ['?'])[0].toUpperCase();
  }

  function _shortDateTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      return d.toLocaleString('nl-NL', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    } catch { return iso; }
  }

  // Beoordelen-functionaliteit gaat pas live vanaf juli 2026. Vóór die datum
  // tonen we GEEN beoordeel-icoon en GEEN "nog X dagen"-badge.
  const ASSESS_ACTIVE_FROM = new Date(2026, 6, 1); // 1 juli 2026 (maand-index 6 = juli)

  // Beoordelen-venster: laatste 7 dagen van de huidige maand. Triggert het
  // amber clipboard-icoon én een "nog X dagen"-badge op de Beoordelen-knop.
  // Gegate op ASSESS_ACTIVE_FROM zodat we vóór juli 2026 niets activeren.
  function _assessWindowState() {
    const now = new Date();
    if (now.getTime() < ASSESS_ACTIVE_FROM.getTime()) {
      return { inWindow: false, daysLeft: 0 };
    }
    const last = new Date(now.getFullYear(), now.getMonth() + 1, 0); // laatste dag
    const daysLeft = Math.ceil((last.getTime() - now.getTime()) / (24 * 60 * 60 * 1000));
    return { inWindow: daysLeft <= 7 && daysLeft >= 0, daysLeft };
  }

  // ── Status per student ────────────────────────────────────────────────
  // Prioriteit: overdue (rood) > recent no-show (rood) > geen call (oranje) > in orde (groen).
  function _studentStatus(s) {
    const email = String(s.email || '').trim().toLowerCase();
    const overdueN = email ? (_overdueByEmail.get(email) || 0) : 0;
    if (overdueN > 0) {
      return { key: 'overdue', label: 'Betaalachterstand', cls: 'ss-pill-red', icon: 'ti-receipt' };
    }
    const sid = String(s.bubble_student_id || '');
    const lastNoshowIso = sid ? _noshowByStudent.get(sid) : null;
    if (lastNoshowIso) {
      const days = (Date.now() - new Date(lastNoshowIso).getTime()) / (24 * 60 * 60 * 1000);
      if (days >= 0 && days < 30) {
        return { key: 'noshow', label: 'No-show recent', cls: 'ss-pill-red', icon: 'ti-alert-triangle' };
      }
    }
    const nextIso = sid ? _nextCallByStudent.get(sid) : null;
    if (!nextIso) {
      return { key: 'nocall', label: 'Geen call ingepland', cls: 'ss-pill-amber', icon: 'ti-calendar-off' };
    }
    return { key: 'ok', label: 'In orde', cls: 'ss-pill-green', icon: 'ti-check' };
  }

  // ── Loaders (parallel) ────────────────────────────────────────────────
  async function loadOverdueMap() {
    _overdueByEmail.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-students-invoice-status');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || 'overdue fetch failed');
      const byEmail = (d && typeof d.byEmail === 'object' && d.byEmail) ? d.byEmail : {};
      for (const [email, count] of Object.entries(byEmail)) {
        const n = Number(count) || 0;
        if (n > 0) _overdueByEmail.set(String(email).toLowerCase(), n);
      }
    } catch (e) { console.warn('[mentor-students] overdue:', e?.message || e); }
  }

  async function loadAssessmentsMap() {
    _assessments.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-assessments-self');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || 'assessments fetch failed');
      for (const a of (d.assessments || [])) {
        if (a && a.student_id) _assessments.set(String(a.student_id), a);
      }
    } catch (e) { console.warn('[mentor-students] assessments:', e?.message || e); }
  }

  async function loadFundedCertsMap() {
    _fundedCerts.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-funded-certs-self');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || 'funded-certs fetch failed');
      for (const c of (d.certs || [])) {
        if (c && c.student_id) _fundedCerts.set(String(c.student_id), c);
      }
    } catch (e) { console.warn('[mentor-students] funded-certs:', e?.message || e); }
  }

  async function loadSignalsMap() {
    _signalsByStudent.clear();
    if (!window.StudentSignals) return;
    try {
      const m = await window.StudentSignals.fetchActiveSignals();
      for (const [k, v] of m.entries()) _signalsByStudent.set(String(k), v);
    } catch (e) { console.warn('[mentor-students] signals:', e?.message || e); }
  }

  async function loadOneOnOneMaps() {
    _nextCallByStudent.clear();
    _noshowByStudent.clear();
    _completedByMember.clear();
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/mentor-1on1-sessions');
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || '1on1 fetch failed');
      // Volgende call per student: vroegste toekomstige planned-sessie.
      const nowMs = Date.now();
      const planned = Array.isArray(d.planned) ? d.planned : [];
      for (const p of planned) {
        const mu = p.member_user;
        if (!mu) continue;
        const t = new Date(p.starts_at).getTime();
        if (!Number.isFinite(t) || t < nowMs) continue;
        const prev = _nextCallByStudent.get(mu);
        if (!prev || t < new Date(prev).getTime()) _nextCallByStudent.set(mu, p.starts_at);
      }
      // Afgeronde sessies per student: vroegste completed.starts_at (de eerste
      // call die heeft plaatsgevonden → "Gestart"-signaal voor de toekomst-tab).
      const completed = Array.isArray(d.completed) ? d.completed : [];
      for (const c of completed) {
        const mu = c.member_user;
        if (!mu) continue;
        const t = new Date(c.starts_at).getTime();
        if (!Number.isFinite(t)) continue;
        const prev = _completedByMember.get(mu);
        if (!prev || t < new Date(prev).getTime()) _completedByMember.set(mu, c.starts_at);
      }
      // No-shows by student.
      const nsBy = (d && typeof d.noshow_by_student === 'object' && d.noshow_by_student) ? d.noshow_by_student : {};
      for (const [mu, iso] of Object.entries(nsBy)) {
        if (mu && iso) _noshowByStudent.set(String(mu), String(iso));
      }
    } catch (e) { console.warn('[mentor-students] 1on1:', e?.message || e); }
  }

  // ── Render ────────────────────────────────────────────────────────────
  function renderStudents(payload) {
    const wrap = document.getElementById('studentsWrap');
    if (!wrap) return;
    if (!payload || payload.linked === false) {
      wrap.innerHTML = `
        <div class="empty-state">
          <i class="ti ti-link-off"></i>
          Je account is nog niet gekoppeld aan een bubble-mentor — vraag een admin om de koppeling te leggen via Admin > Integraties > Mentor↔Bubble.
        </div>`;
      return;
    }
    const list = Array.isArray(payload.students) ? payload.students : [];
    _state.students = list;
    _applyStudentFilter('');
  }

  // Sort-rank per status-key voor urgent-first volgorde (asc).
  const _STATUS_RANK = { overdue: 0, noshow: 1, nocall: 2, ok: 3 };

  function _compareStudents(a, b, key, dir) {
    const factor = dir === 'desc' ? -1 : 1;
    switch (key) {
      case 'status': {
        const ra = _STATUS_RANK[_studentStatus(a).key] ?? 9;
        const rb = _STATUS_RANK[_studentStatus(b).key] ?? 9;
        if (ra !== rb) return factor * (ra - rb);
        return String(a.name || '').localeCompare(String(b.name || ''), 'nl');
      }
      case 'name':
        return factor * String(a.name || '').localeCompare(String(b.name || ''), 'nl');
      case 'progress':
        return factor * ((Number(a.calls_1on1_done) || 0) - (Number(b.calls_1on1_done) || 0));
      case 'noshows':
        return factor * ((Number(a.no_shows) || 0) - (Number(b.no_shows) || 0));
      case 'nextcall': {
        // Studenten zónder geplande call: ALTIJD onderaan (ongeacht dir).
        const sa = String(a.bubble_student_id || '');
        const sb = String(b.bubble_student_id || '');
        const ta = _nextCallByStudent.get(sa);
        const tb = _nextCallByStudent.get(sb);
        if (ta && !tb) return -1;
        if (!ta && tb) return 1;
        if (!ta && !tb) return String(a.name || '').localeCompare(String(b.name || ''), 'nl');
        return factor * (new Date(ta).getTime() - new Date(tb).getTime());
      }
      case 'overdue': {
        const ea = String(a.email || '').toLowerCase();
        const eb = String(b.email || '').toLowerCase();
        const oa = ea ? (_overdueByEmail.get(ea) || 0) : 0;
        const ob = eb ? (_overdueByEmail.get(eb) || 0) : 0;
        return factor * (oa - ob);
      }
    }
    return 0;
  }

  function _renderSortChips() {
    document.querySelectorAll('#msSortBar .sort-chip').forEach((btn) => {
      const isActive = btn.dataset.sortKey === _state.sort.key;
      btn.classList.toggle('active', isActive);
      // Pijl alleen op actieve chip; anders verbergen.
      let arrow = btn.querySelector('.sort-arrow');
      if (isActive) {
        if (!arrow) {
          arrow = document.createElement('span');
          arrow.className = 'sort-arrow';
          btn.appendChild(arrow);
        }
        arrow.textContent = _state.sort.dir === 'desc' ? '↓' : '↑';
      } else if (arrow) {
        arrow.remove();
      }
    });
  }

  function _onSortChipClick(key) {
    if (_state.sort.key === key) {
      _state.sort.dir = _state.sort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      _state.sort.key = key;
      _state.sort.dir = 'asc';
    }
    _renderSortChips();
    _applyStudentFilter(document.getElementById('msSearch')?.value || '');
  }

  function _applyStudentFilter(q) {
    const wrap = document.getElementById('studentsWrap');
    if (!wrap) return;
    const needle = String(q || '').trim().toLowerCase();
    const list = (_state.students || []).filter((s) => {
      if (!needle) return true;
      return String(s.name || '').toLowerCase().includes(needle);
    });
    if (list.length === 0) {
      wrap.innerHTML = needle
        ? `<div class="empty-state"><i class="ti ti-search-off"></i>Geen studenten gevonden voor "${esc(needle)}".</div>`
        : `<div class="empty-state"><i class="ti ti-users-off"></i>Geen studenten gevonden onder jouw mentorschap.</div>`;
      return;
    }
    // Sort-state toepassen vóór render. Status-default is asc → urgent eerst.
    const { key, dir } = _state.sort;
    const sorted = list.slice().sort((a, b) => _compareStudents(a, b, key, dir));
    const aw = _assessWindowState();
    wrap.innerHTML = sorted.map((s) => _studentCardHtml(s, aw)).join('');
    _wireStudentRows(wrap);
  }

  function _studentCardHtml(s, aw) {
    const sid       = String(s.bubble_student_id || '');
    const sidAttr   = esc(sid);
    const name      = esc(s.name || s.email || '(geen naam)');
    const rawName   = String(s.name || s.email || '');
    const email     = String(s.email || '').toLowerCase();
    const program   = s.program ? `<span class="badge badge-blue">${esc(s.program)}</span>` : '';
    const callsTot  = Number(s.calls_1on1_total) || 0;
    const callsDone = Number(s.calls_1on1_done) || 0;
    const noShows   = Number(s.no_shows) || 0;
    const overdueN  = email ? (_overdueByEmail.get(email) || 0) : 0;
    const nextIso   = _nextCallByStudent.get(sid) || null;
    const status    = _studentStatus(s);
    const hasSignal = _signalsByStudent.has(sid);
    const flagHtml  = hasSignal ? '<i class="ti ti-flag-filled student-flag" title="Actief signaal"></i>' : '';
    const a         = _assessments.get(sid);
    const assessOpen = aw.inWindow && (!a || (a.status !== 'op_schema' && a.status !== 'aandacht' && a.status !== 'risico' && a.status !== 'niet_actief'));
    // Bovenstaande: amber clipboard ALLEEN als er nog geen assessment voor deze maand is.
    const needsAssess = aw.inWindow && !a;
    const assessIconHtml = needsAssess
      ? `<button type="button" class="assess-icon-btn" data-stu-assess="${sidAttr}" title="Beoordeling nodig (laatste 7 dagen)"><i class="ti ti-clipboard-list"></i></button>`
      : '';
    // Meta-regel iconen
    const callsLbl = callsTot ? `${callsDone}/${callsTot}` : `${callsDone}`;
    const nextLbl  = nextIso
      ? `<span><i class="ti ti-calendar"></i>${esc(_shortDateTime(nextIso))}</span>`
      : `<span class="meta-warning"><i class="ti ti-calendar-off"></i>geen call</span>`;
    const noshowLbl = `<span><i class="ti ti-alert-triangle"></i>${noShows} no-show${noShows === 1 ? '' : 's'}</span>`;
    const overdueLbl = overdueN > 0
      ? `<span class="meta-overdue"><i class="ti ti-receipt"></i>${overdueN} ${overdueN === 1 ? 'factuur' : 'facturen'} te laat</span>`
      : '';

    return `
      <div class="student-card" data-stu-card="${sidAttr}" data-stu-name="${esc(rawName)}" data-stu-email="${esc(s.email || '')}">
        <div class="student-head" data-stu-toggle="${sidAttr}">
          <div class="student-avatar">${esc(_avatarInitial(rawName))}</div>
          <div>
            <div class="student-name">${name} ${program} ${flagHtml}${_unreadAdminBadgeForBubble(sid)}</div>
            <div class="student-meta">
              <span><i class="ti ti-phone"></i>${callsLbl}</span>
              ${nextLbl}
              ${noshowLbl}
              ${overdueLbl}
            </div>
          </div>
          <span class="student-status-pill ${status.cls}"><i class="ti ${status.icon}"></i>${esc(status.label)}</span>
          ${assessIconHtml}
          <i class="ti ti-chevron-right student-caret"></i>
        </div>
        <div class="student-body" data-stu-body="${sidAttr}">
          ${_studentBodyHtml(s, aw)}
        </div>
      </div>`;
  }

    const sid       = String(s.bubble_student_id || '');
    const sidAttr   = esc(sid);
    const callsTot  = Number(s.calls_1on1_total) || 0;
    const callsDone = Number(s.calls_1on1_done) || 0;
    const noShows   = Number(s.no_shows) || 0;

    const overdueN  = email ? (_overdueByEmail.get(email) || 0) : 0;

    const cert      = _fundedCerts.get(sid) || null;
    const sig       = _signalsByStudent.get(sid) || null;
    const a         = _assessments.get(sid) || null;
    const assessDue = aw.inWindow && !a;

  function _wireStudentRows(wrap) {
    // Toggle uitklap (één tegelijk open).
    wrap.querySelectorAll('.student-head[data-stu-toggle]').forEach((head) => {
      head.addEventListener('click', (ev) => {
        // Skip toggle als de klik uit het amber assess-icoon of de body komt
        // (body krijgt eigen handlers en mag niet collapsen bij sub-clicks).
        if (ev.target.closest('.assess-icon-btn')) return;
        const sid = head.dataset.stuToggle;
        _toggleStudentCard(sid);
      });
    });
    // Amber clipboard in header → opent direct het assess-form van die kaart.
    wrap.querySelectorAll('[data-stu-assess]').forEach((btn) => {
      btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const sid = btn.dataset.stuAssess;
        _toggleStudentCard(sid, true);
        setTimeout(() => _openAssessForm(sid), 0);
      });
    });
    // Action-buttons in uitklap.
    wrap.querySelectorAll('.stu-act-btn, .stu-act-link').forEach((el) => {
      el.addEventListener('click', (ev) => {
        ev.stopPropagation();
        if (el.tagName === 'A') ev.preventDefault();
        const sid = el.dataset.stuId;
        const action = el.dataset.stuAction;
        if (action === 'assess')      _openAssessForm(sid);
        else if (action === 'cert')   _triggerFundedUpload(sid);
        else if (action === 'signal') _openSignalModal(sid);
        else if (action === 'detail') _loadStudentDetail(sid);
      });
    });
    // Funded file-inputs.
    wrap.querySelectorAll('input.stu-funded-file').forEach((input) => {
      input.addEventListener('change', async () => {
        const sid = input.dataset.stuId;
        const file = input.files && input.files[0];
        if (!file) return;
        const card = wrap.querySelector('.student-card[data-stu-card="' + sid.replace(/"/g, '') + '"]');
        const name = card?.dataset.stuName || '';
        await _uploadFundedCert(sid, name, file);
        input.value = '';
      });
    });
  }

  function _toggleStudentCard(sid, forceOpen) {
    const card = document.querySelector('.student-card[data-stu-card="' + sid.replace(/"/g, '') + '"]');
    if (!card) return;
    const willOpen = forceOpen ? true : !card.classList.contains('open');
    // Close anderen.
    document.querySelectorAll('.student-card.open').forEach((c) => c.classList.remove('open'));
    if (willOpen) {
      card.classList.add('open');
      _openCardId.sid = sid;
    } else {
      _openCardId.sid = null;
    }
  }

  // ── Assessment-form (inline) ──────────────────────────────────────────

            <option value="risico"     ${status==='risico'     ? 'selected':''}>Risico op uitval</option>
            <option value="niet_actief"${status==='niet_actief'? 'selected':''}>Student niet actief (geen beoordeling)</option>
          </select>
        </label>
        <label class="assess-score-wrap" style="display:${hideDetails?'none':'flex'};flex-direction:column;gap:4px;font-size:12px;color:var(--text-dim);font-weight:600">
          Cijfer (1–10)
          <input type="number" class="assess-score" min="1" max="10" step="1" value="${score===''?'':esc(String(score))}"
                 style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit"/>
        </label>
        <label class="assess-active-wrap" style="display:${hideDetails?'none':'flex'};flex-direction:column;gap:4px;font-size:12px;color:var(--text-dim);font-weight:600">
          Actief &amp; taken gedaan
          <select class="assess-active"
                  style="padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit">
            <option value="yes" ${activeYes ? 'selected' : ''}>Ja</option>
            <option value="no"  ${!activeYes ? 'selected' : ''}>Nee</option>
          </select>
        </label>
      </div>
      <label class="assess-note-wrap" style="display:${hideDetails?'none':'block'};margin-bottom:10px">

  async function _saveAssessment(sid, studentName, form) {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    const status = form.querySelector('.assess-status')?.value || '';
    const msg = form.querySelector('.assess-status-msg');

    const body = { student_id: sid, student_name: studentName || '', status };
    if (status !== 'niet_actief') {
      const scoreNum = Number(form.querySelector('.assess-score')?.value);
      if (!Number.isFinite(scoreNum) || !Number.isInteger(scoreNum) || scoreNum < 1 || scoreNum > 10) {
        if (msg) { msg.style.color = '#b91c1c'; msg.textContent = 'Cijfer moet 1–10 zijn.'; }
        return;
      }
      body.score = scoreNum;
      body.active_tasks_done = (form.querySelector('.assess-active')?.value === 'yes');
      const noteVal = form.querySelector('.assess-note')?.value || '';
      body.note = noteVal.trim() || null;
    }
    const btn = form.querySelector('.assess-save-btn');
    if (btn) btn.disabled = true;
    if (msg) { msg.style.color = 'var(--text-faint)'; msg.textContent = 'Opslaan…'; }
    try {
      const r = await apiFetch('/api/mentor-assessment-save', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify(body),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || 'opslaan faalde');
      _assessments.set(String(sid), d.assessment);
      if (msg) { msg.style.color = '#15803d'; msg.textContent = '✓ Opgeslagen.'; }
      // Re-render zodat status-pill + amber clipboard meekomen.
      setTimeout(() => { _applyStudentFilter(document.getElementById('msSearch')?.value || ''); _toggleStudentCard(sid, true); }, 600);
    } catch (e) {
      if (msg) { msg.style.color = '#b91c1c'; msg.textContent = 'Fout: ' + (e?.message || e); }
      if (btn) btn.disabled = false;
    }
  }

  function _setFundedStatusMsg(sid, html, tone) {
    const el = document.querySelector('[data-stu-funded-status="' + sid.replace(/"/g, '') + '"]');
    if (!el) return;
    el.style.color = tone === 'err' ? '#b91c1c' : tone === 'ok' ? '#15803d' : 'var(--text-faint)';
    el.innerHTML = html || '';

  async function _uploadFundedCert(studentId, studentName, file) {
    const allowed = ['application/pdf', 'image/jpeg', 'image/png'];
    const nameLower = (file.name || '').toLowerCase();
    const allowedExt = /\.(pdf|jpe?g|png)$/i.test(nameLower);
    if (file.type && !allowed.includes(file.type) && !allowedExt) {
      _setFundedStatusMsg(studentId, 'Type niet toegestaan — PDF/JPG/PNG.', 'err');
      return;
    }
    if (file.size > _FUNDED_MAX_BYTES) {
      _setFundedStatusMsg(studentId, 'Bestand > 10MB.', 'err');
      return;
    }
    _setFundedStatusMsg(studentId, 'Uploaden…', 'info');
    let uid = null;
    try {
      if (window._authSharedReady) await window._authSharedReady;
      const session = window.AuthShared && (await window.AuthShared.getSession());
      uid = session?.user?.id || null;
    } catch (e) { /* uid blijft null */ }
    if (!uid) { _setFundedStatusMsg(studentId, 'Sessie niet beschikbaar — log opnieuw in.', 'err'); return; }

    const safe = _safeFilename(file.name || 'cert');
    const filePath = `${uid}/${studentId}/${Date.now()}_${safe}`;
    try {
      if (!window.supabase || !window.supabase.storage) throw new Error('Supabase-client niet beschikbaar');
      const { error: upErr } = await window.supabase.storage
        .from(_FUNDED_BUCKET)
        .upload(filePath, file, { contentType: file.type || 'application/octet-stream', upsert: false });
      if (upErr) throw new Error(upErr.message || 'upload faalde');
    } catch (e) {
      console.error('[funded-upload] storage:', e?.message || e);
      _setFundedStatusMsg(studentId, 'Upload mislukt: ' + esc(e?.message || e), 'err');
      return;
    }
    try {
      const apiFetch = window.AgentShared?.apiFetch;
      if (typeof apiFetch !== 'function') throw new Error('apiFetch niet beschikbaar');
      const r = await apiFetch('/api/mentor-funded-cert-save', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ student_id: studentId, student_name: studentName || '', file_path: filePath, file_name: file.name || safe }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d?.error || 'save faalde');
      _fundedCerts.set(String(studentId), {
        student_id      : studentId,
        student_name    : studentName || null,
        funded_month    : d.funded_month,
        file_name       : file.name || safe,
        last_uploaded_at: new Date().toISOString(),
      });
      if (d.newly_claimed) {
        _setFundedStatusMsg(studentId, '€100-bonus geactiveerd.', 'ok');
      } else {
        _setFundedStatusMsg(studentId, 'Bestand bijgewerkt.', 'ok');
      }
      setTimeout(() => {
        _applyStudentFilter(document.getElementById('msSearch')?.value || '');
        _toggleStudentCard(studentId, true);
      }, 800);
    } catch (e) {
      console.error('[funded-upload] save:', e?.message || e);
      _setFundedStatusMsg(studentId, 'Opslaan mislukt: ' + esc(e?.message || e), 'err');
    }
  }

  // ── 1-op-1 date-range filter (frontend-only) ──────────────────────────
  // Returnt [fromMs, toMs] in lokale tijd; lege custom-velden = open eind.
  function _dateRangeBounds() {
    const now  = new Date();
    const y    = now.getFullYear();
    const mIdx = now.getMonth();
    const d    = now.getDate();
    const start = (yy, mm, dd) => new Date(yy, mm, dd, 0, 0, 0, 0).getTime();
    const end   = (yy, mm, dd) => new Date(yy, mm, dd, 23, 59, 59, 999).getTime();
    const range = _state.dateRange;
    if (range === 'day') {
      return [start(y, mIdx, d), end(y, mIdx, d)];
    }
    if (range === 'week') {
      // ISO-week: maandag = startdag.
      const day = now.getDay(); // 0=zo, 1=ma, …, 6=za
      const diffToMon = (day === 0 ? -6 : 1 - day);
      const mon = new Date(y, mIdx, d + diffToMon);
      const sun = new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + 6);
      return [
        start(mon.getFullYear(), mon.getMonth(), mon.getDate()),
        end(sun.getFullYear(),   sun.getMonth(),   sun.getDate()),
      ];
    }
    if (range === 'custom') {
      const m = String(_state.customFrom || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      const M = String(_state.customTo   || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
      const fromMs = m ? start(+m[1], +m[2] - 1, +m[3]) : -Infinity;
      const toMs   = M ? end(+M[1],   +M[2] - 1, +M[3]) :  Infinity;
      return [fromMs, toMs];
    }
    // default: month — 1e t/m laatste dag van de huidige maand.
    const lastDay = new Date(y, mIdx + 1, 0).getDate();
    return [start(y, mIdx, 1), end(y, mIdx, lastDay)];
  }

  function _applyDateRange() {
    const [fromMs, toMs] = _dateRangeBounds();
    const within = (s) => {
      const t = s && s.starts_at ? new Date(s.starts_at).getTime() : NaN;
      return Number.isFinite(t) && t >= fromMs && t <= toMs;
    };
    const planned   = (_state.oneOnOnePlanned   || []).filter(within);
    const completed = (_state.oneOnOneCompleted || []).filter(within);

    // Per-lijst weergave-limiet snijdt NA de date-range-filter; de tellingen
    // én het periode-totaal blijven op de volledige gefilterde set gebaseerd.
    const plannedSlice   = planned.slice(0,   _state.plannedLimit);
    const completedSlice = completed.slice(0, _state.completedLimit);
    _renderPlanned(plannedSlice);
    _renderCompleted(completedSlice);

    const plannedShown   = document.getElementById('plannedShown');
    const completedShown = document.getElementById('completedShown');
    if (plannedShown) {
      plannedShown.textContent = planned.length > 0
        ? ('Toont ' + plannedSlice.length + ' van ' + planned.length)
        : '';
    }
    if (completedShown) {
      completedShown.textContent = completed.length > 0
        ? ('Toont ' + completedSlice.length + ' van ' + completed.length)
        : '';
    }

    const totalEl = document.getElementById('completedTotals');
    if (totalEl) {
      const n   = completed.length;
      const sum = completed.reduce((acc, s) => acc + (Number(s.amount) || 0), 0);
      totalEl.textContent = n > 0
        ? (n + ' sessie' + (n === 1 ? '' : 's') + ' · ' + fmtEUR(sum))
        : '';
    }
  }

  function _setRangeBtnActive(btn, active) {
    if (!btn) return;
    btn.style.background = active ? 'var(--bg,#fff)' : 'transparent';
    btn.style.color      = active ? 'var(--text)'   : 'var(--text-dim)';
    btn.style.boxShadow  = active ? '0 1px 2px rgba(0,0,0,.06)' : 'none';
  }

  function _selectLimit(target, next) {
    const n = Number(next);
    if (!Number.isFinite(n) || n <= 0) return;
    if (target !== 'planned' && target !== 'completed') return;
    if (target === 'planned')   _state.plannedLimit   = n;
    if (target === 'completed') _state.completedLimit = n;
    document.querySelectorAll('#tab1on1 .ms-limit-btn[data-target="' + target + '"]').forEach((b) => {
      _setRangeBtnActive(b, Number(b.dataset.limit) === n);
    });
    _applyDateRange();
  }

  function _selectDateRange(next) {
    if (!['day', 'week', 'month', 'custom'].includes(next)) return;
    _state.dateRange = next;
    document.querySelectorAll('#oneOnOneRangeBar .ms-range-btn').forEach((b) => {
      _setRangeBtnActive(b, b.dataset.range === next);
    });
    const custom = document.getElementById('msCustomRange');
    if (custom) custom.style.display = (next === 'custom') ? 'inline-flex' : 'none';
    _applyDateRange();
  }

  async function init() {

    // Page-gate (defense-in-depth, GEEN redirect — vermijdt loop met

    try {
      if (window.RBAC?.ensurePermissionsLoaded) {
        await window.RBAC.ensurePermissionsLoaded();
        if (!window.RBAC.canSync || !window.RBAC.canSync('mentor.module.access')) {
          const app = document.getElementById('msContent');
          if (app) app.innerHTML =
            '<div style="max-width:480px;margin:48px auto;text-align:center;padding:32px;border:1px solid var(--border);border-radius:14px;background:var(--bg-elev)">'
            + '<h2 style="margin:0 0 10px;font-size:18px;color:var(--text)">Geen toegang tot Studenten</h2>'
            + '<p style="margin:0;color:var(--text-dim);font-size:14px">Je account heeft hier momenteel geen rechten voor. Neem contact op met een beheerder.</p>'
            + '</div>';
          return;
        }
      }
    } catch (e) { /* fail-open */ }

    // Tab-wiring.
    document.querySelectorAll('#msContent .tab-btn').forEach((b) => {
      b.addEventListener('click', () => activateTab(b.dataset.tab));
    });
    // Zoekbalk client-side filter.
    const search = document.getElementById('msSearch');
    if (search) search.addEventListener('input', () => _applyStudentFilter(search.value));
    // Mijn studenten — sort-bar wiring (chip-klik = key wisselen, herklik = dir flip).
    document.querySelectorAll('#msSortBar .sort-chip').forEach((btn) => {
      btn.addEventListener('click', () => _onSortChipClick(btn.dataset.sortKey));
    });

    // 1-op-1 date-range wiring (frontend-only).
    document.querySelectorAll('#oneOnOneRangeBar .ms-range-btn').forEach((b) => {
      b.addEventListener('click', () => _selectDateRange(b.dataset.range));
    });
    // Per-lijst weergave-limiet wiring.
    document.querySelectorAll('#tab1on1 .ms-limit-btn').forEach((b) => {
      b.addEventListener('click', () => _selectLimit(b.dataset.target, b.dataset.limit));
    });
    const fromInput = document.getElementById('msCustomFrom');
    const toInput   = document.getElementById('msCustomTo');
    if (fromInput) fromInput.addEventListener('change', () => {
      _state.customFrom = fromInput.value || '';
      if (_state.dateRange === 'custom') _applyDateRange();
    });
    if (toInput) toInput.addEventListener('change', () => {
      _state.customTo = toInput.value || '';
      if (_state.dateRange === 'custom') _applyDateRange();
    });

    // Per-student admin_note-badges initial load (PR6a — /api/notifications-list).
    loadAdminNoteBadges();

    // Default tab.
    activateTab('studenten');
  }

  // ── Fase 3a — Meldingen ─────────────────────────────────────────────────
  // _unreadAdminBadgeForOnb is verhuisd naar /modules/mentor-onboarding.html
  // (instroom-pijplijn). Mijn-studenten heeft alleen de per-bubble badge nodig.
  function _unreadAdminBadgeForBubble(bubbleId) {
    if (!bubbleId) return '';
    const n = _unreadByBubbleUser.get(String(bubbleId)) || 0;
    if (n <= 0) return '';
    return ' <span class="badge" style="background:#dc2626;color:#fff;padding:1px 7px;border-radius:999px;font-size:10.5px;font-weight:700" title="Ongelezen update van management">●</span>';
  }
  // Per-student admin_note-badges lezen uit het unified notifications-systeem
  // (/api/notifications-list). Filter server-side op type='onboarding.admin_note';
  // server enrich't onboarding-rijen met onboarding_bubble_user_id zodat we die
  // als map-key kunnen gebruiken (student cards zijn keyed op bubble_student_id).
  // De oude /api/mentor-notifications-list en de oude per-pagina bel zijn sinds
  // PR6b verwijderd — de sidebar-bel toont alle meldingen platform-breed.
  async function loadAdminNoteBadges() {
    const apiFetch = window.AgentShared?.apiFetch;
    if (typeof apiFetch !== 'function') return;
    try {
      const r = await apiFetch('/api/notifications-list?type=onboarding.admin_note');
      const d = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(d?.error || ('HTTP ' + r.status));
      const items = Array.isArray(d?.notifications) ? d.notifications : [];
      _unreadByBubbleUser.clear();
      for (const n of items) {
        if (n.read_at != null) continue;
        if (n.type !== 'onboarding.admin_note') continue; // defense
        const bid = n.onboarding_bubble_user_id;
        if (bid) {
          const k = String(bid);
          _unreadByBubbleUser.set(k, (_unreadByBubbleUser.get(k) || 0) + 1);
        }
      }
      try {
        if (typeof _applyStudentFilter === 'function') {
          _applyStudentFilter(document.getElementById('msSearch')?.value || '');
        }
      } catch {}
    } catch (e) {
      console.warn('[mentor-students] admin-note badges:', e?.message || e);
    }
  }

  document.addEventListener('DOMContentLoaded', init);
})();
</script>
</body>
</html>
