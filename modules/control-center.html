<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Control Center · De Forex Opleiding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/modules/shared/agent-shared.css"/>
  <style>
    /* ── KPI banner ── */
    .kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; margin-bottom:24px; }
    .kpi-card { background:var(--bg-elev); border:1px solid var(--border); border-radius:12px; padding:16px 20px; }
    .kpi-label { font-size:11px; color:var(--text-faint); text-transform:uppercase; letter-spacing:.5px; font-weight:600; margin-bottom:6px; }
    .kpi-value { font-size:24px; font-weight:800; color:var(--text); }
    .kpi-sub   { font-size:11px; color:var(--text-dim); margin-top:3px; }

    /* ── Section card ── */
    .cc-card { background:var(--bg-elev); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; }
    .cc-card-header { display:flex; align-items:center; gap:10px; justify-content:space-between; margin-bottom:14px; }
    .cc-card-title { font-size:14px; font-weight:700; display:flex; align-items:center; gap:8px; }
    .approval-badge-inline { background:var(--red); color:var(--text-inverse); border-radius:10px; padding:1px 8px; font-size:11px; font-weight:700; min-width:20px; text-align:center; }

    /* ── Filter input ── */
    .filter-select { padding:4px 8px; background:var(--bg-elev-2); border:1px solid var(--border); border-radius:6px; color:var(--text-dim); font-size:11px; font-family:inherit; outline:none; }
    .filter-select:focus { border-color:var(--accent-violet); }

    @media(max-width:1024px) { .kpi-grid { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>

<div id="sidebar-mount"></div>

<div class="main">
  <div class="main-inner">

    <div class="page-header">
      <div>
        <div class="page-title">🎛️ Control Center</div>
        <div class="page-sub">KPIs, agent-approvals en audit log</div>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="refreshAll()" style="font-size:12px">↺ Vernieuwen</button>
      </div>
    </div>

    <!-- KPI banner -->
    <div class="kpi-grid" id="kpiBanner">
      <div class="kpi-card">
        <div class="kpi-label">Openstaande approvals</div>
        <div class="kpi-value" id="kpiApprovals">—</div>
        <div class="kpi-sub">Wachten op jouw goedkeuring</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Vergaderingen vandaag</div>
        <div class="kpi-value" id="kpiMeetingsToday">—</div>
        <div class="kpi-sub">Gestart de afgelopen 24u</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Acties uitgevoerd (7d)</div>
        <div class="kpi-value" id="kpiActionsWeek">—</div>
        <div class="kpi-sub">Goedgekeurde agent-acties</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Fouten (7d)</div>
        <div class="kpi-value" id="kpiErrorsWeek">—</div>
        <div class="kpi-sub">Mislukte agent-acties</div>
      </div>
    </div>

    <!-- Approval inbox -->
    <div class="cc-card" id="ccApprovalCard">
      <div class="cc-card-header">
        <div class="cc-card-title">
          🔔 Approval Inbox
          <span id="approvalBadge" class="approval-badge-inline hidden">0</span>
        </div>
        <button class="btn btn-sm" onclick="window.AgentShared?.loadApprovals()">↺ Vernieuwen</button>
      </div>
      <div id="approvalList">
        <div style="color:var(--text-faint);font-size:12px">Laden…</div>
      </div>
    </div>

    <!-- Audit log -->
    <div class="cc-card" id="ccAuditCard">
      <div class="cc-card-header">
        <div class="cc-card-title">📋 Audit Log</div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="auditFilterAgent" class="filter-select" onchange="loadAuditLog()">
            <option value="">Alle agents</option>
            <option>Simon</option><option>Leon</option><option>Aron</option>
          </select>
          <button class="btn btn-sm" id="ccExportCsvBtn" onclick="exportAuditCsv()">⬇ CSV</button>
        </div>
      </div>
      <div id="auditLogList">
        <div style="color:var(--text-faint);font-size:12px">Laden…</div>
      </div>
    </div>

  </div>
</div>

<script src="/modules/shared/supabase-client.js"></script>
<script src="/modules/shared/agent-shared.js"></script>
  <script src="/modules/shared/theme-shared.js"></script>
<script>
const { esc, relTime, showToast } = AgentShared;

// ═══════════════════════════════════
// AUDIT LOG
// ═══════════════════════════════════
async function loadAuditLog() {
  const el          = document.getElementById('auditLogList');
  if (!el) return;
  const agentFilter = document.getElementById('auditFilterAgent')?.value || '';
  try {
    const url  = `/api/agent-audit?action=list&limit=30${agentFilter ? '&agent_filter=' + encodeURIComponent(agentFilter) : ''}`;
    const res  = await fetch(url);
    const data = await res.json();
    const entries = data.entries || [];
    if (!entries.length) {
      el.innerHTML = '<div style="color:var(--text-faint);font-size:12px">Geen audit-entries</div>';
      return;
    }
    el.innerHTML = entries.map(e => {
      const isOk = e.status === 'success';
      const name = e.agent_name || 'system';
      return `<div class="audit-row" onclick='showAuditDetail(${JSON.stringify(JSON.stringify(e))})'>
        <span class="${isOk ? 'audit-status-ok' : 'audit-status-err'}">${isOk ? '✓' : '✗'}</span>
        <span class="chip ${name.toLowerCase()}" style="font-size:10px">${esc(name)}</span>
        <span style="font-size:11px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.action)}</span>
        <span style="font-size:10px;color:var(--text-faint);flex-shrink:0">${relTime(e.created_at)}</span>
        ${e.triggered_by && e.triggered_by !== 'system' ? `<span style="font-size:10px;color:var(--text-faint);flex-shrink:0">✓ ${esc(e.triggered_by)}</span>` : ''}
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div style="color:var(--red);font-size:12px">${esc(e.message)}</div>`;
  }
}

function showAuditDetail(entryStr) {
  try {
    const entry = JSON.parse(entryStr);
    alert(JSON.stringify(entry, null, 2));
  } catch {}
}

function exportAuditCsv() {
  const agentFilter = document.getElementById('auditFilterAgent')?.value || '';
  window.open(`/api/agent-audit?action=export_csv${agentFilter ? '&agent_filter=' + encodeURIComponent(agentFilter) : ''}`, '_blank');
}

// ═══════════════════════════════════
// KPI BANNER
// ═══════════════════════════════════
async function loadKPIBanner() {
  try {
    // Approvals count
    const apRes  = await fetch('/api/agent-approval?action=list');
    const apData = await apRes.json();
    const pendingCount = (apData.pending || []).length;
    const kpiApprovals = document.getElementById('kpiApprovals');
    if (kpiApprovals) kpiApprovals.textContent = pendingCount;

    // Audit stats (7 days)
    const auditRes  = await fetch('/api/agent-audit?action=list&limit=200');
    const auditData = await auditRes.json();
    const entries   = auditData.entries || [];
    const oneWeekAgo = Date.now() - 7 * 24 * 3600 * 1000;
    const weekEntries = entries.filter(e => new Date(e.created_at).getTime() > oneWeekAgo);
    const actionsWeek = weekEntries.filter(e => e.status === 'success').length;
    const errorsWeek  = weekEntries.filter(e => e.status !== 'success').length;
    const kpiAct = document.getElementById('kpiActionsWeek');
    const kpiErr = document.getElementById('kpiErrorsWeek');
    if (kpiAct) kpiAct.textContent = actionsWeek;
    if (kpiErr) { kpiErr.textContent = errorsWeek; kpiErr.style.color = errorsWeek > 0 ? 'var(--red)' : 'var(--green)'; }

    // Meetings today
    const mtgRes  = await window.AgentShared.apiFetch('/api/agent-meeting?action=get_history');
    const mtgData = await mtgRes.json();
    const oneDayAgo = Date.now() - 24 * 3600 * 1000;
    const todayMtgs = (mtgData.meetings || []).filter(m => new Date(m.created_at).getTime() > oneDayAgo).length;
    const kpiMtg = document.getElementById('kpiMeetingsToday');
    if (kpiMtg) kpiMtg.textContent = todayMtgs;
  } catch (e) {
    console.warn('[CC] KPI banner fout:', e.message);
  }
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
function refreshAll() {
  loadKPIBanner();
  AgentShared.loadApprovals();
  loadAuditLog();
}

async function init() {
  await window._authSharedReady;
  const profile = await window.AuthShared.requireAuth();
  if (!profile) return;
  // adminNavLink wordt nu centraal door sidebar.js gegate (RBAC-voorbereiding)
  loadKPIBanner();
  AgentShared.startApprovalPolling();
  loadAuditLog();
}

init();
if (window._authSharedReady) {
  window._authSharedReady.then(() => window.AgentShared?.renderUserSection());
}
</script>
<script>
// RBAC frontend-gating (fail-open) — Control Center. super_admin = alles.
// approval.act-knoppen zitten in gedeelde agent-shared modal → niet granulair
// gegate (approvals.view verbergt de hele inbox-kaart).
(function () {
  var RULES = [
    ['#kpiBanner', 'controlcenter.kpi.view'],
    ['#ccApprovalCard', 'controlcenter.approvals.view'],
    ['#ccAuditCard', 'controlcenter.audit.view'],
    ['#ccExportCsvBtn', 'controlcenter.audit.export']
  ];
  async function applyRbacGating() {
    try { if (window._authSharedReady) await window._authSharedReady; } catch (e) {}
    if (!window.RBAC || typeof window.RBAC.ensurePermissionsLoaded !== 'function') return;
    var perms;
    try { perms = await window.RBAC.ensurePermissionsLoaded(); } catch (e) { return; }
    var roles = (typeof window.RBAC.getUserRoles === 'function' && window.RBAC.getUserRoles()) || [];
    if (!roles.length) return;
    if (perms.has('*')) return;
    var css = RULES.filter(function (r) { return !perms.has(r[1]); })
      .map(function (r) { return r[0] + '{display:none !important;}'; }).join('\n');
    if (css) { var st = document.createElement('style'); st.id = 'rbac-gating'; st.textContent = css; document.head.appendChild(st); }
  }
  applyRbacGating();
})();
</script>
<script src="/modules/shared/permissions.js"></script>
<script src="/modules/shared/sidebar.js"></script>
</body>
</html>
